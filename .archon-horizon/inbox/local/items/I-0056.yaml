  the advance on roadmap `AJC.picrep`.


  **Two cleanup decisions needing you (neither automatable):**


  - **`Picard-IdentityComponent` mirror is stale** — 3 commits behind AJC (missing
  `GeometricallyConnectedSection.lean`, older 9-sorry copy). Re-sync or retire? Its
  FBC-free-baseline role is largely served now. See roadmap comment on `PIC.idcomp`.

  - **Orphaned RR.4 chapter scratch** — `RationalCurveIso.{body,new,skeletal}` are
  git-tracked in the ROOT of BOTH `MainProjects/Algebraic-Jacobian-Challenge` and
  `SubProjects/Albanese`, drafting a `C ≅ ℙ¹` chapter never integrated (no `.tex`
  chapter, no Lean source). Left in place (may hold the only copy of drafted prose).
  Confirm descoped and I/Horizon can delete all six files.


  **Suggested next launch:** `horizon run AJC.pic0av` (the `tangentSpaceIso` leaf
  is the unblocked frontier).'
