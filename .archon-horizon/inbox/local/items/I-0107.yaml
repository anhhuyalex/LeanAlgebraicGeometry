body: '**T13 scope note — genus-0 Lean files already removed; cleanup is residue +
  one dependency trap.**


  - The genus split is **already retired in the Lean tree**: `Genus0BaseObjects/*`,
  `AbelianVarietyRigidity.lean`, `genusZeroWitness`/`positiveGenusWitness` are gone
  and `Jacobian C` is uniform. T13 is residue cleanup, not deletion of live construction
  files.

  - **Main in-scope target:** `roadmap.md` (root) is internally inconsistent — it
  still lists `Genus0BaseObjects/BareScheme`/`Points` as "sorry-free in-tree" and
  "Route C paused" for files that no longer exist (lines ~66/72/77/120).

  - **Do-not-delete trap:** `RiemannRoch/WeilDivisor.lean` is dual-purpose — its `PrimeDivisor`/`RationalMap.order`
  substrate is imported by `Albanese/CodimOneExtension.lean` (active `ALB.codim1`).
  Only the `-- Route C PAUSE` degree/RR→ℙ¹ block is dead genus-0 weight. Detailed
  carve-map in memory `I-0106`.

  - **Scope gap for your decision:** the residual genus-0 *doc comments* live in `AbelJacobi.lean`,
  `Jacobian.lean`, and `Genus.lean` (the last has a broken `.archon/STRATEGY.md` pointer)
  — all **outside** T13''s write globs. If you want a fully clean sweep, those three
  files need adding to the task scope. Note some `Jacobian.lean` comments document
  the *absence* of the split and read as good current docs, not stale.'
