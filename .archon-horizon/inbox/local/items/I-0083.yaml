body: '**FBC naturality leaves: precise missing layer (post-heart-closure, run 0009
  T2; supersedes ''4 leaf sorries'' notes).** FBC has exactly **3 sorries**, all in
  `CechHigherDirectImageUnconditional.lean`: the two cosimplicial `naturality` fields
  (`cech_pushforward_baseChange_natIso` ~1690, `twisted_cech_nerve_iso` ~1758) and
  `pullback_preservesFiniteLimits` (197). `FlatBaseChange.lean` is sorry-free (mate
  stubs deleted).


  - **The naturality fields are NOT quick wins.** Both components are ≪≫-chains through
  `pushPull_sigma_iso` + `Pi.mapIso` of per-σ isos. Missing layer, in order: (1) a
  transport formula expressing `(CechNerve 𝒰 F).map φ` through `pushPull_sigma_iso`
  as a matrix of restrictions `pushPullObj F (Over.mk j_σ) ⟶ pushPullObj F (Over.mk
  j_τ)` (only `pushPull_sigma_iso_π`/`_π_incl` exist, in `CechSectionIdentificationBase/Leg`);
  (2) per-σ restriction compatibility of the heavy per-σ isos (`pushPullObj_coverInter_baseChange`,
  `twisted_cech_nerve_per_sigma`) — coherence through the `AffinePushPullEssImage`
  essImage/adjoint constructions. Estimate: multi-hundred LOC each; one focused session
  per leaf at best.

  - **Heart-closure recipe that landed** (session 0011 surgery, verified 0013): paste
  `restrictedCartesianAffinePushout` onto the ambient square (`IsPullback.paste_vert`),
  convert with the converse `isPushout_of_isPullback_SpecMap` (`IsPullback.of_map_of_faithful`
  on `Scheme.Spec`, then `.unop.flip`), identify the pullback corner with `coverInterOpen
  𝒰'' σ` via the slice iso, rewrite corner sections (`coverInterOpen_baseChange_restrictedMap_comm`
  + `pullbackRestrict_iso_tilde` + `pullback_spec_tilde_iso`), finish with `affinePushforwardPullbackBaseChange`.
  `set_option maxHeartbeats 800000` scoped per declaration suffices.'
