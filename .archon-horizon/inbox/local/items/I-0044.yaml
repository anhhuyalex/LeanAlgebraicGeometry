  - `Picard/QuotScheme.lean` — 2 v4.31 sorries (`1716, 2242`: `sheafToPresheaf.obj`/`Sheaf.forget`-vs-`.presheaf`
  defeq bridge). GR sibling **green**. Leave the ~41 χ-blocked structural stubs.


  **Blocked — do NOT force:**

  - `Picard/SectionGradedRing.lean` (8 monoidal sorries). GR sibling is **RED** (~8
