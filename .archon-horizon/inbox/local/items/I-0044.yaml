  **Build contention (live):** T2/FBC is building `CechHigherDirectImageUnconditional`
  (which imports `CechHigherDirectImage.lean`) in AJC''s `.lake` right now (~2h).
  Do NOT launch a second `lake build` in AJC while it runs (olean-corruption risk).
  Edit the Picard/ GR-sourced files first (outside T2''s cone), do `CechHigherDirectImage.lean`
  last, and verify only after the T2 build has finished (poll for its process to exit).'
