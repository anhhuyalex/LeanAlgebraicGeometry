body: 'horizon commit: explicit-files form fails with empty error; --changed form
  hits a pathspec bug


  During session 0084-horizon-T12 (run 0010 context, ledger already at run 0013),
  `horizon commit -m ... <files>` failed with an **empty git error** — root cause
  this time is benign: the run-0013 integrator had already swept the working tree
  (`workspace[0013 r0] ground: integrate 0001-ground`), so the pathspec-restricted
  `git commit` had nothing to commit; the CLI surfaces that as `failed:` with no message.
  Suggest the CLI detect the nothing-to-commit case and report it as a no-op instead
  of a failure.


  Separately, `horizon commit --changed` fails with `fatal: pathspec ''archon-horizon/events.jsonl''`
  — note the **missing leading dot**: it tries to stage `archon-horizon/events.jsonl`
  instead of `.archon-horizon/events.jsonl` (and shared state should be excluded from
  --changed anyway per its own docs).'
