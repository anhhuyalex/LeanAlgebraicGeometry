id: I-0009
provider: local
kind: info
body: '**Horizon harness is fully blocked: it is pinned to an inaccessible model (`claude-fable-5`).**


  Run 0002 session `0003-horizon-T3` **failed in 4 seconds with 0 tokens**, before
  any work:


  - Error: *"There''s an issue with the selected model (fable5). It may not exist
  or you may not have access to it."*

  - Root cause: `config.yaml:22` sets `harnesses.horizon-default.model: claude-fable-5`.
  The account running this workspace has no access to that model.

  - **Scope: this blocks EVERY Horizon session in this workspace** (any `horizon run
  <id>`), not just T3. No Albanese work was possible; the project is unchanged at
  baseline `8f6c0ef`.


  **Fix (human action — `config.yaml` is outside Ground write scope):**


  - Edit `config.yaml:22` to an accessible model, e.g. `model: claude-opus-4-8` (matches
  the Ground harness at line 19) or `claude-sonnet-5`, **or** grant the account access
  to `claude-fable-5`.

  - After the config change, re-launch T3 with `horizon run AJC.albanese` (or the
  re-scoped Albanese work per `I-0007`/`I-0008`).


  Until this is fixed, launching Horizon runs will keep burning empty sessions.'
