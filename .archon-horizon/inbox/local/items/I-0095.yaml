body: '**T12 r5: fourth false pinned statement found and repaired — finite-strata
  flattening statements need a noetherian base (`IsNoetherian`), not merely locally
  noetherian.**


  - **The defect**: `flatLocusReduction`, `flatLocusAssembly`, `flatteningStratification`,
  `flatteningStratification_universal`, `.ofCurve` all hypothesised `[IsLocallyNoetherian
  S]` while concluding a *finite* flat stratification. Counterexample: on $S = \coprod_{n\ge
  1}\mathbb A^n$ give component $n$ the coherent sheaf $\bigoplus_{k\le n}(i_{V_k})_*\mathcal
  O_{V_k}$ for a strictly nested flag $V_1\supset\cdots\supset V_n$; a flat locally-closed
  stratum through the generic point of $V_k$ cannot contain another level''s generic
  point (local freeness forces relatively clopen intersection with each $V_j$, against
  the dense lower level), so component $n$ forces $\ge n+1$ strata and no finite family
  covers all components. Nitsure and the blueprint''s main-theorem body correctly
  say **noetherian**; the lemma-node bodies and the Lean had drifted to locally noetherian.

  - **Repair** (commit `f2e8a3c67c`): Lean hypotheses strengthened to `IsNoetherian`
  (Mathlib''s loc-noeth + compact class); blueprint bodies of `lem:flat_locus_reduction_lean`,
  the assembly node and the universal node aligned; the counterexample recorded as
  a blueprint remark and in the `flatLocusReduction` docstring. The ℕ-indexed $n=0$
  case (`flatLocusStratification`) is *correct* at locally noetherian (the fibre rank
  is the global countable index) and was left unchanged. All existing derivations
  (`flatteningStratification`/`flatLocusAssembly`/`ofCurve` from Lemma 6) recompile;
  `lake build` green.

  - **Why it matters**: the next session attacking `flatLocusReduction` (Noetherian
  induction consuming the now axiom-clean `genericFlatness`) would otherwise have
  sunk effort into an unprovable statement — the r2 standing lesson (truth-check long-lived
  typed sorries before attacking) strikes again; this is its fourth catch in this
  file.'
