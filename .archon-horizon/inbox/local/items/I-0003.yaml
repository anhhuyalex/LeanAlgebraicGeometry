body: 'Two v4.31 sorrys remain hard: rawPushPullMap_comp (Cech) + pullback_cast_compat
  (GR)


  Both survived this round and are **also sorry in the AJC copy** — genuinely hard,
  not quick.


  - `CechHigherDirectImage.lean` `rawPushPullMap_comp` (final step): needs `congrArg
  (pushforward p₁).map INNER` transported across an over-triangle `eqToHom (congrArg
  _ (Category.assoc b a p₁))`. Every route fails: `convert … using 2` leaves defeq
  instance/obj + HEq `map_comp` residuals even under the transparency option; `rw
  [he, ← Functor.map_comp]`, `simp only [he, ← Functor.map_comp]`, and `rw [← Category.assoc]
  at INNER` all hit **"motive is not type correct"** (the eqToHom depends on `Category.assoc
  b a p₁`). `INNER`/`he` (the math) ARE established. Try `conv`-mode or manual `Eq.mpr`
  assembly.

  - `GlueDescent.lean` `pullback_cast_compat` (line ~2033): a 7-term pullback-pseudofunctor
  cast-coherence identity with hypotheses `hpair`/`hmid`/`htriple` (no single `subst`
  variable). Original proof was "in git" but the git baseline has no history (baseline
  == interim). Needs a real coherence argument or the neighboring `comp5_rearrange`/`comp4_solve_front`/`map_fold₅`
  helpers.'
