id: I-0051
provider: local
kind: memory
body: '**leandag audit convention: the DAG engine registers only STATEMENT-level `\uses`;
  proof-level `\uses` are ignored.**


  - Consequence: a blueprint node whose only dependencies are declared inside its
  proof block shows as **isolated** in `horizon leandag`, even though the math dependency
  is real and the proof is complete. This is expected, not a blueprint defect.

  - Observed run 0006 (Albanese): 297 nodes, **178 isolated**, but **0 dangling**
  and 287 proved — the high isolated count is entirely this artifact.

  - **The health metric to trust is `dangling` (should be 0) and `proved`, NOT `isolated`.**
  Do not chase isolated nodes as missing edges; if you want them linked in the DAG,
  lift the relevant `\uses` from the proof block up to the statement line.

  - Same engine limitation was noted by the T6 Horizon session; recorded here so future
  Ground audits don''t misread it.'
