body: 'QuotScheme statement is unprovable-as-pinned: properness alone is not the Nitsure
  theorem


  The pinned AlgebraicGeometry.Scheme.QuotScheme (QuotFunctorDef.lean, final theorem)
  hypothesizes only [IsProper pi] [LocallyOfFiniteType pi] with arbitrary quasi-coherent
  L and arbitrary E, but the source theorem ([Nitsure] Sec. 5, thm:quot_representable)
  requires pi projective, L relatively very ample, E coherent. For merely proper X
  the Quot/Hilbert functor is in general only an algebraic space (Hironaka''s smooth
  proper non-projective 3-fold is the standard counterexample family), so the pinned
  statement is false-or-open, not the cited theorem. Same trap genus as the old Grassmannian.representable
  skeleton corrected this session (GrassmannianRepresentability.lean, thm:grassmannian_representable
  NOTE). Next action before attacking this sorry: design the projectivity / relative-very-ampleness
  encoding (absent from Mathlib v4.31, see I-0109 ampleness gap), restate faithfully,
  then prove. Do NOT close the sorry as stated.'
