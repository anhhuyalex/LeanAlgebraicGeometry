body: 'T12: QuotFunctor + Grassmannian are REAL functors (QuotFunctorDef.lean); coherence
  recipe + remaining leaves


  **The two headline Quot-chapter definitions are real** (run 0010 T12, `AlgebraicJacobian/Picard/QuotFunctorDef.lean`):
  `Scheme.QuotFunctor` = Setoid quotient of `QuotFamily` (finitely presented + `CoherentSheafFlat`
  + `HasProperSupport` + eventual-match Hilbert condition via `hilbertFunction`),
  morphism action = pullback along `quotBaseMap` ($\mathrm{id}_X \times_S \psi$);
  `Scheme.Grassmannian` = rank-$d$ locally free quotients of $V_T$ (deliberately NOT
  the Quot special case — the locally-free form is the base-independent universal
  property matching the merged absolute `Grassmannian.functor`). Both `(Over S)^{op}
  \to \mathrm{Type}\,(u+1)` (forced universe bump, picSharp precedent). Old stubs
  deleted from `QuotScheme.lean` (now 3 sorries = the FBC leaves).


  - **Functor laws** proved from Mathlib pseudofunctor coherences via two app-level
  lemmas `Modules.pullback_id_app_coherence` / `pullback_comp_app_coherence(_inv)`:
  prove by `subst` (state triangle equalities with free RHS variables!), one simp
  pass on the NatTrans law, congrArg-composition with `Iso.hom_inv_id_app_assoc`,
  then close by `exact lawV` — **comp-with-identity padding is DEFEQ in `X.Modules`;
  do not fight the instance-transparency walls with simp**.

  - Remaining 6 sorries in the file, all TRUE: `pullbackSlicePresentation_isFinite`
  (pure index bookkeeping; whnf through the 8-layer presentation transport exceeds
  8M heartbeats — needs a new idea, do not retry inferInstanceAs-defeq blindly), `CoherentSheafFlat.of_isPullback`
  (stalk route; needs the same stalk-of-pullback brick as FBC pullback_preservesFiniteLimits),
  `HasProperSupport.of_isPullback` (annihilator pullback inclusion + properness base
  change), `hilbertFunction_quotBaseMap` ($H^0$ flat base change along residue extensions
  on the proper support), and the two deep endgames `Grassmannian.representable`,
  `QuotScheme`.

  - Blueprint: new subsection `sec:quot_base_change` with 4 lemma nodes (complete
  proofs); `def:quot_functor`/`def:grassmannian_scheme` now honestly `\leanok`; `def:grassmannian_scheme`
  no longer `\uses` `def:quot_functor`.'
