body: '**Blueprint defect: duplicate `\label{thm:albanese_universal_property}` across
  two chapters.**


  Two active theorem environments share the label, pointing at different Lean decls
  — a leanblueprint collision (`\cref` resolves ambiguously; one node shadows the
  other in the DAG).


  - `Albanese_AlbaneseUP.tex:99` → `\lean{AlgebraicGeometry.Pic0.albanese_universal_property}`
  (Route-A target; decl **exists** but is `sorryAx`-tainted — its `\leanok` was **false
  and removed this run**). 7 in-file `\cref`s.

  - `Jacobian.tex:490` → `\lean{AlgebraicGeometry.Scheme.Pic.albaneseUP}` (north-star;
  that decl **does not exist** in AJC Lean — honest forward-pointer, no `\leanok`).
  3 in-file `\cref`s.


  **Why it matters:** same statement, two encodings, one label → the compiled DAG
  merges them and crefs cross-resolve. Not blocking T9 (Lean-side).


  **Suggested fix (deferred, needs design-aware cref surgery):** give the `Jacobian.tex`
  north-star node a distinct label (e.g. `thm:albanese_universal_property_northstar`)
  and repoint its 3 in-file crefs; keep `thm:albanese_universal_property` for the
  Route-A node. Left unfixed this round to avoid guessing the intended DAG edge (does
  the north-star `\uses` the Route-A theorem, or restate it?).'
