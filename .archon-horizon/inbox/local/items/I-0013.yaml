body: 'Recipes: closing GeometricallyReduced / GeometricallyIrreducible scaffold sorries
  (v4.31 Mathlib has the full API)


  Mathlib v4.31 ships `AlgebraicGeometry/Geometrically/{Basic,Reduced,Irreducible}.lean`
  — these scaffold instances are now provable, not gaps. Proven patterns (see `Points.lean`
  `gm_geometricallyReduced`, `ChartIso.lean` `projectiveLineBar_geomIrred`, both axiom-clean):


  - **Affine case** (`Spec A ⟶ Spec k̄`): `rw [geometricallyReduced_iff / geometricallyIrreducible_iff]`,
  intro the `IsPullback`, `obtain ⟨φ, rfl⟩ := Spec.map_surjective y; algebraize [φ.hom]`,
  then `h.isoPullback ≪≫ pullbackSpecIso k̄ A K` reduces to `IsReduced/IsDomain (A
  ⊗[k̄] K)`. Needs `set_option backward.isDefEq.respectTransparency false in` (the
  `(Gm k̄).hom`-to-`Spec.map` defeq).

  - **Ring step for localizations**: `IsReduced (Localization.Away t ⊗[k̄] K)` via
  `Algebra.TensorProduct.cancelBaseChange k̄ P P _ K` (`≅ Loc ⊗[P] (P ⊗[k̄] K)`),
  instance `IsLocalization.tensor`, and `isReduced_localizationPreserves` (apply with
  `by exact` + explicit S — beta-reduction quirk). `MvPolynomial.algebraTensorAlgEquiv`
  + `Algebra.TensorProduct.comm` give `P ⊗[k̄] K ≅ MvPolynomial σ K`.

  - **Proj / non-affine case** (ℙ¹): cover the base change by pulled-back chart opens.
  Per chart: `Proj.awayι_toSpecZero_assoc` + `← Spec.map_comp` + `change` collapses
  `awayι ≫ hom` to `Spec.map (algebraMap k̄ (Away 𝒜 (X i)))`, then the affine recipe.
  Covering: `Proj.iSup_basicOpen_eq_top` with the (now named) `projectiveLineBarAffineCover_span`.
  Intersection: any preimage of the generic point `⟨⊥, Ideal.isPrime_bot, …⟩` under
  `pullback.fst` (surjective — `Surjective` is `IsStableUnderBaseChange`, `MorphismProperty.pullback_fst`).
  Assemble with the new `irreducibleSpace_of_two_irreducible_opens` (ChartIso).

  - **Traps**: inside `namespace AlgebraicGeometry`, ring-level `IsReduced` must be
  `_root_.IsReduced`; `⊗[k̄]` notation needs `open scoped TensorProduct in` BEFORE
  the docstring; avoid `ObjectProperty.prop_of_iso _` (leaves an unsynthesizable eta-expanded
  `IsClosedUnderIsomorphisms` goal — use `isReduced_of_isOpenImmersion (iso).hom`
  or `.homeomorph.irreducibleSpace_iff` instead); the affine cover''s `I₀`/`𝒰.f i`
  are semireducibly opaque — work with `Proj.awayι (X i)` + `fin_cases` normalization
  (`projectiveLineBar_smooth_chart_aux` idiom) rather than cover indices.'
