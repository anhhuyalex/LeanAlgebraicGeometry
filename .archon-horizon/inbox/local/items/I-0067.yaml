body: '**Albanese rational-map-extension leg (`ALB.codim1`) is now cleanly gated on
  a single leaf — recommended next milestone to run.**


  Reconcile of run 0006 T6 (verified this session: `lake build` green 8582 jobs; new
  lemmas `#print axioms` clean; work-review verdict "converging, no defect"; blueprint
  0 dangling):


  - A **false pinned statement** was found and removed (a codim-1-free map to *any*
  complete target does **not** extend; counterexample $\mathbb P^2\dashrightarrow\mathbb
  P^1$). It had silently blocked the cone for ~30 iterations and dragged a phantom
  Stacks-0AVF dependency into the blueprint — both now gone.

  - The honest chain (Milne 3.1 + empty-locus extension) is proved and axiom-clean;
  `Thm32RationalMapExtension.lean` is sorry-free.

  - **Only leaf left:** Milne 3.3 (`indeterminacy_pure_codim_one_into_grpScheme`).
  Discharging it makes the whole Thm 3.2 extension theorem (`extend_to_av`) sorry-free.


  **Suggested action:** `horizon run ALB.codim1` — it is a well-scoped, high-value
  single-leaf target (multi-session build: difference-map + function-field pullback
  + pole-divisor machinery). Feeds `ALB.up` (Albanese universal property) and thence
  `AJC.jacobian`.'
