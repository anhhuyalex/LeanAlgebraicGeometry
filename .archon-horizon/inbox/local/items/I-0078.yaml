body: 'pullback_preservesFiniteLimits: prove via flat extendScalars, NOT adjointness


  `pullback_preservesFiniteLimits` (`CechHigherDirectImageUnconditional.lean:193`,
  instance, `[Flat g]`) is a **true** statement but a genuine open `sorry` — do not
  attempt a cheap adjointness proof.


  - The statement is sound: module pullback $g^*$ = inverse image $g^{-1}$ (exact)
  followed by $-\otimes_{\mathcal O_S}\mathcal O_{S''}$, which is left-exact **because**
  `[Flat g]`. Finite limits are preserved.

  - The trap: `g^*` is a **left adjoint**, so it preserves colimits / is right-exact
  — that gives you nothing for finite *limits*. "Left adjoint $\Rightarrow$ left-exact"
  is backwards. The flatness hypothesis is doing all the work and must be used.

  - Intended route (per the leaf''s own docstring): transfer along `SheafOfModules.pullbackIso`,
  discharge `forget`/`sheafification` (already limit-preserving in Mathlib), reduce
  to `ModuleCat.preservesFiniteLimits_extendScalars_of_flat` stalkwise. Reference
  Stacks 02KH.

  - Note it is a global `instance` carrying a sorry; `pullback_preservesHomology`
  (line 197) derives from it by `inferInstance`, so the whole flat-homology chain
  rests on this node.'
