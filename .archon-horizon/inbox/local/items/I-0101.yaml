body: 'Soundness review of session 0067 T12 (EntryIdealStratum.lean, 806 LOC): CLEAN.
  Verified the three flagged risk points are genuinely sound, no vacuity, no off-by-one.


  1) fiberRank_baseChange (L122-144): unconditional base-change invariance, NO flatness
  — correct; fiber rank = dim_κ(p)(κ(p)⊗M), proof is cancelBaseChange×2 + Module.finrank_baseChange.
  Sound.

  2) strataIdeal quasi-coherence map_strataIdeal_basicOpen (L655): denominator-clearing
  is noetherian-free — finite subcover from affine quasi-compactness (isCompact.elim_finite_subcover
  in ChartsCover.exists_finite_charts) + Finset.sup of clearing powers. Sound.

  3) mem_range_stratumι_iff (L777): support = rank EXACTLY e, not ≤ e. Reduces to
  EntryIdeal.entryIdeal_le_prime_iff (entryIdeal ≤ p ↔ fiberRank p M = e), both directions
  proved genuinely (entryIdeal = ideal of 1×1 minors; ⊆ p ⟺ relMatrix ≡ 0 mod p ⟺
  fiber has full dim e). No off-by-one/≤-vs-= slip. Chart-independence (chartFiberRank_eq,
  pointRank_eq_chartFiberRank) genuinely established via common-basic-open refinement
  + fiberRank_of_isLocalizedModule.


  SCOPE CAVEAT for downstream (not a bug): stratum/stratumι/strataData all require
  hcov : ChartsCover G e, which — since an e-generator presentation caps fiber rank
  at e (fiberRank_le) — forces fiber rank ≤ e at EVERY point of X. So ''rank-e stratum
  as closed subscheme of X'' is constructed only when e globally bounds fiber rank
  (i.e. after restricting to the open {rank ≤ e}, or e maximal). This is faithful
  to Nitsure''s inductive n=0 construction and is an honestly-named Prop hypothesis,
  not hidden — but flatLocusStratification_universal (Stage D/E, still 1 deliberate
  sorry) must discharge ChartsCover for the actual base. Verdict: genuine convergent
  progress, math-sound substrate.'
