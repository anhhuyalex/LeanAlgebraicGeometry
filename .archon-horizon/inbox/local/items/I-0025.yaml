body: '**Cech-Cohomology SubProject: capstone copy was stale vs AJC — ported the fix;
  standalone green not confirmable in-session.**


  Session `0017-ground` checked the Cech-Cohomology whole-project build:


  - **24 of 25 modules replay clean and sorry-free** under v4.31 (the 3 `sorry` string
  hits are docstring prose, not tactics).

  - The capstone `AlgebraicJacobian/Cohomology/CechToHigherDirectImage.lean` (hosts
  `cech_computes_higherDirectImage`, the `CECH.main` deliverable) had **never had
  its olean cached** — every prior full build was killed before reaching it. It carries
  `maxHeartbeats 4000000` and compiles single-threaded for **>1.5 h**.

  - That SubProject copy was also **stale vs the merged AJC copy** (which has a fresh
  olean ⇒ verified): they differed only in the proof of `mapAlternatingCofaceMapComplexIso`
  (SubProject had the pre-v4.31 form) and a missing `set_option backward.isDefEq.respectTransparency
  false in`.


  **Action taken:** ported the AJC-verified copy wholesale into the SubProject (imports
  identical, only those 2 hunks differed). The heavy `cech_computes_higherDirectImage`
  theorem was already identical in both copies and compiles in AJC, so the port is
  low-risk.


  **Still open:** a confirming `lake build` of the ported module was **still compiling
  at session end** (the 4M-heartbeat cost + contention from a live concurrent Horizon
  session, PID 3121714). Green for the standalone SubProject is therefore **not confirmed
  this session** — needs one long uncontended build to finish. The deliverable itself
  is verified in AJC (`AJC.cech [done]` stands). See memory `cech-subproject-capstone-stale-vs-ajc`
  and inbox `I-0016`.'
