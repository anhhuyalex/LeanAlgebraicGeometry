body: '**FBC member-node patterns (session 0007-T2) ‚ÄĒ the essImage route that closed
  `IsIso bareBC`.**


  - **Specialize the Beck‚ÄďChevalley square to `p = V‚āÄ.őĻ` (`V‚āÄ : X.Opens`, `IsAffineOpen
  V‚āÄ`)** instead of an abstract affine open immersion `p : V ‚ü∂ X`. Every consumer
  instantiates that form (`coverInterOpen`), and it makes qcoh bookkeeping FREE via
  iterated `isQuasicoherent_pullback_opens` ‚ÄĒ no general ''pullback along open immersion
  preserves qcoh'' needed (that exists only in sorry-tainted `QuotScheme.lean`, do
  NOT import it).

  - **Prove ''pullback of pushforward is a pushforward'' as essImage membership, with
  the ring square the ABSTRACT pushout** `B := pushout ŌÜ Ōą` (`IsPushout.of_hasPushout`):
  geometric cartesianness is free (`isPullback_SpecMap_of_isPushout`), `Spec ŌÉ` open-immersion
  by stability, its range via `IsOpenImmersion.range_pullbackSnd` + `hpb.isoPullback_hom_snd`
  + `Set.range_eq_univ.mpr h.surjective`, and the final match with the preimage open
  by `IsOpenImmersion.isoOfRangeEq` + `pushforwardComp/Congr`. NO four-corner isoSpec
  transport of a concrete square.

  - **`pullback e.hom ‚ČÖ pushforward e.inv`** (scheme iso e): `Adjunction.leftAdjointUniq
  (pullbackPushforwardAdjunction e.hom) (pushforwardEquivOfIso e).symm.toAdjunction`
  ‚ÄĒ one-liner, no defeq wall.

  - **Open-open pushforward‚Äďrestriction commutation**: the `glueOverlapBaseChangeIso`
  4-step pattern (`SheafOfModules.pushforwardComp ‚Č™‚Čę pushforwardNatIso(eqToIso) ‚Č™‚Čę
  pushforwardCongr ‚Č™‚Čę pushforwardComp.symm`) transfers verbatim to the square `opensInterLift
  V‚āÄ U ‚Čę V‚āÄ.őĻ = (U.őĻ ‚ĀĽ¬ĻŠĶĀ V‚āÄ).őĻ ‚Čę U.őĻ`; the appLE-coherence proof is the same 5 lines.

  - **Pointwise scheme-morphism reasoning**: derive morphism-level equalities first
  (cancel isos with `cancel_mono`), then apply at points with `Scheme.Hom.comp_apply`;
  raw `ConcreteCategory.hom`-coercion mismatches from `Set.mem_image` unfold are defeq
  ‚ÄĒ bridge with `have h'' : U.őĻ y = V‚āÄ.őĻ x := hyx` + `show`.

  - **Names**: `Opens.grothendieckTopology` (root ns), `Scheme.Hom.comp_apply`, `Scheme.Hom.comp_preimage`,
  `IsAffineOpen.inf` (needs `[IsAffineHom (pullback.diagonal (terminal.from X))]`
  ‚üł `IsSeparated.isClosedImmersion_diagonal`), `Scheme.Hom.isAffineOpen_iff_of_isOpenImmersion`,
  `IsOpenImmersion.of_comp`.

  - The whole 430-LOC file (`Cohomology/AffinePushPullEssImage.lean`) compiled with
  ~3 error-fix iterations ‚ÄĒ the iso-chain compositions (`pushforwardComp/Congr/Id
  .app` chains) hit NO v4.31 transparency walls.'
