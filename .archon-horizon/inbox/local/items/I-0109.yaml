body: '**T12 r-current: hilbertPolynomial headline def CLOSED (real definition) —
  updates the ''QuotScheme 8 sorries'' triage of I-0089.**


  - New file `Picard/HilbertPolynomial.lean` (~230 LOC, axiom-clean `[propext, Classical.choice,
  Quot.sound]`, LSP + full `lake build` green, 8647 jobs): `Scheme.hilbertPolynomial`
  is now REAL — the unique `Φ ∈ ℚ[λ]` eventually matching the graded Hilbert function
  `m ↦ dim_{κ(s)} Γ(X_s, F_s ⊗ L_s^{⊗m})` (`Scheme.hilbertFunction`), junk `0` outside
  the regime. Fibre = Mathlib `Scheme.Hom.fiber`; restrictions via `Scheme.Modules.pullback
  (π.fiberι s)` (`Hom.fiberModule`); twists via `SectionGradedRing.moduleTensorPow`;
  κ(s)-structure = `Module.compHom` along `Hom.fiberResidueMap` (`ΓSpecIso.inv ≫ (fiberToSpecResidueField).appTop`)
  — all compiled essentially first-try, no defeq walls.

  - API: `hilbertPolynomial_eq_of_eventually` (unconditional uniqueness via `Polynomial.eq_of_infinite_eval_eq`),
  `existsUnique_hilbertPolynomial_of_isRatHilb` + `hilbertPolynomial_eq_hilbertPoly`
  (existence from `IsRatHilb`, i.e. from the sorry-free `gradedModule_hilbertSeries_rational`
  engine via Mathlib `Polynomial.existsUnique_hilbertPoly`/`coeff_mul_invOneSubPow_eq_hilbertPoly_eval`).

  - **QuotScheme.lean now 7 sorries** (4 headline: QuotFunctor/Grassmannian/Grassmannian.representable/QuotScheme
  + 3 FBC-gated base-change leaves). QuotScheme.lean now imports HilbertPolynomial
  (which imports SectionGradedRing + GradedHilbertSerre; both were previously leaf
  files — no cycle, verified).

  - **Remaining Hilbert lane, in order**: (1) `lem:sectionGradedModule_fg` — Serre
  finite-generation of `⊕_m Γ(X_s, F_s ⊗ L_s^{⊗m})` over `⊕_m Γ(X_s, L_s^{⊗m})` for
  proper X_s + ample L_s, THE deep remaining input (needs ampleness vocabulary; multi-session);
  (2) the DirectSum-decomposition bridge instantiating `gradedModule_hilbertSeries_rational`
  at the fibre section module (external ⊕ → internal ℳ decomposition + degree-1 commuting
  endos from a κ(s)-basis of R₁ + Module.Finite over MvPolynomial); (3) then `QuotFunctor`
  def can consume `hilbertPolynomial` (its statement needs no new theory — flatness/coherence
  predicates + Setoid quotient + pullback functoriality, one focused session).'
