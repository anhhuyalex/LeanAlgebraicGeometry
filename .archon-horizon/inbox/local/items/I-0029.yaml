  still sorried.

  - Residual `isRegularLocalRing_stalk_of_smooth` sorry honestly documented: blocks
  ONLY on non-closed-point case = **Stacks 00OF**.


  **Two low-priority hygiene items (pre-existing, NOT this round):**

  - **Dead code**: the iter-200 private chain `MvPolynomial.maximalIdeal_height_*`
  → `ringKrullDim_localization_atMaximal_MvPolynomial` → `ringKrullDim_quotient_localization_MvPolynomial_of_regular`
  (`CodimOneExtension.lean` L647–871, ~250 LOC) is now fully superseded by `StandardSmoothDimension.lean`;
  the terminal decl is referenced nowhere. Safe to delete + re-point any blueprint
  nodes in a janitor pass.

  - Orphaned root scratch `RationalCurveIso.{body,new,skeletal}` (Jun 17, tracked,
  33KB `.body`) persist — a RiemannRoch draft chapter; left in place (not this round,
  possibly real content).


  **Recommendation:** No further generic T3 session is fruitful. `ALB.codim1` remains
  `active` but its stalk keystone is now 00OF-blocked (large homological build, do-not-side-quest).
  Remaining Albanese sorries are gated on `AJC.pic0av` / `AJC.picrep` / Mathlib upstream.'
