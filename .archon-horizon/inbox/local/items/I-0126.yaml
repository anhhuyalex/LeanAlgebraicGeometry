body: '**T14 projectivity foundation — durable state + constraints (run 0014).** Four
  new files under `Picard/`; full build green (8606 jobs), DAG `0 dangling`.


  - `ProjectiveSpace.lean`: `ℙ(n;S)` = fibre product over `Spec ℤ` of `Proj ℤ[Xᵢ]`;
  `isProper_over`/`isSeparated_over`, `isPullback_map` — **axiom-clean**.

  - `SerreTwist.lean`: `serreTwist n m` = O(m) glued from `D₊(Xᵢ)` trivialisations,
  transitions `(Xᵢ/Xⱼ)^m`. **One sorry `twistTransition_cocycle` (C2 triple-overlap
  transport)** taints everything mentioning `serreTwist` via `sorryAx`; rank-1 analogue
  of `bundleTransition_cocycle_transport`.

  - `ProjectiveMorphism.lean`: `Scheme.Hom.IsProjectiveWith π L` (closed immersion
  into `ℙ(Fin(d+1);S)` with `L ≅ i^*O(1)`, I-0118 encoding (a)); `isProper`/`comp_isClosedImmersion`/`baseChange`
  fully proved.

  - `SerreFiniteness.lean`: `sectionGradedModule_fg` **stated** under `IsProjectiveWith`
  (the deep Hilbert-lane leaf, `I-0109` item 1); genuine `sorry`.


  Durable constraints:

  - **Glue engine is universe-monomorphic** (`Scheme.Modules.glue` at `Scheme.GlueData.{0}`,
  `GlueDescent.lean:934`) ⇒ `serreTwist`, the predicate and its stability facts live
  at `Scheme.{0}`; the `QuotScheme` restatement will specialise to `Scheme.{0}` unless
  the engine is generalised.

  - **`quot_boundedness` deliberately not stated in Lean**: a faithful Castelnuovo–Mumford
  statement needs `Rⁱπ_*`-of-twists vocabulary that does not exist; `lem:quot_boundedness`
  is a blueprint target (`\lean` without `\leanok`). Stating it loosely would repeat
  the `I-0118` trap.

  - O(1) sign convention: transition `i→j` multiplies by `(Xᵢ/Xⱼ)^m`; validate against
  `Γ(ℙⁿ, O(1)) =` linear forms once sections are computed.


  Blueprint: `sec:projective_vocabulary` (`Picard_QuotScheme.tex:5044`), 12 nodes,
  complete proofs, `\source{nitsure-hilbert-quot}`.'
