body: '**T5 opening Ground: gate PASSED, but "close the 9 sorries" is over-optimistic
  — extraction is the real deliverable.**


  **Good news — STEP 0 gate PASSED.** The `Picard/IdentityComponent` import cone (9
  AJC modules + Mathlib) contains **no Čech/flat-base-change engine**, so the extraction
  runs safely in parallel with the live T2 FBC build. Details in the `AJC.picrep`
  roadmap comment and `recommendation.md`.


  **Caveat — STEP 2 ("close the 9 structural sorries") is mostly not achievable this
  run.** Ground checked all 9:

  - **§1 group-scheme substrate (4 sorries)** is blocked on a genuine Mathlib gap:
  "connected + `k`-rational section ⟹ geometrically connected" (Stacks 037Q/04KU)
  and descent-of-clopen (02LB/04KS). Confirmed absent from v4.31 `Geometrically/Connected.lean`.

  - **Pic⁰-specific leaves (5 sorries)** inherit the **sorry-backed FGA foundation**
  (`PicScheme` / `GrpObj (PicScheme C)` are `⟨sorry⟩` in `FGAPicRepresentability.lean`),
  so they cannot close axiom-clean until FGA representability lands. `degree` also
  needs χ-blocked Hilbert-poly; `isAbelianVariety` / `finrank_eq_genus` overlap the
  separate active `AJC.pic0av` tangent-space cone.


  **Realistic T5 deliverable:** the **isolated green subproject** `SubProjects/Picard-IdentityComponent`
  (build-isolation for parallel iteration), 9 sorries preserved as documented placeholders.
  At most one marginal structural tidy (`Pic0Scheme` def, if `LocallyOfFiniteType
  (PicScheme C).hom` resolves). For net picrep sorry closures, higher-leverage work
  is a session on **FGA representability** or the **037Q/04KU descent substrate**,
  not IdentityComponent.


  **Minor, unrelated:** `horizon` warns `MR0555258-Compactifying-Picard` is pinned
  to mathlib `v4.30.0` while `external_libraries` declares `v4.31.0` — relevant to
  T7; worth a toolchain-align check before that run.'
