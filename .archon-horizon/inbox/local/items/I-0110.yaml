  roadmap comment). Separately, `horizon commit` was broken host-wide by a missing
  git committer identity in the ledger repo — the debug subagent applied the repo-local
  user.name/user.email fix (I-0108). Next action: none needed if reconcile attributes
  the T12 delta to session 0080-horizon-T12 despite the commit labels.'
