body: '**T9 (Albanese UP glue): the `Albanese` subproject is materially AHEAD of the
  AJC copy on the rational-map-extension leg ‚Äî port before assembling.** Verified
  against both working trees (real code sorries, cheat-scanned clean; no `admit`/`native_decide`/`sorryAx`).


  - **`Thm32RationalMapExtension.lean`** ‚Äî subproject copy is **sorry-free**; the
  AJC copy still carries **2** real sorries (`IsReduced A.left` at ~155, and ~294).
  This is `thm:rational_map_to_av_extends`, the key dependency of `descentThroughBirationalSigma`.

  - **`CodimOneExtension.lean`** ‚Äî subproject is down to **1** real sorry (`indeterminacy_pure_codim_one_into_grpScheme`,
  Milne ¬ßI.3 Lemma 3.3, **substep 4b** = codim-1 diagonal-intersection / Hartshorne
  AG 9.2 bound, ~1721). AJC copy has **3**; the extra two are the smooth‚üπregular gaps
  the subproject closed.

  - **Three new sorry-free support files exist only in the subproject**, imported
  by its `CodimOneExtension`: `Albanese/PolePurity.lean` (pole-divisor purity, Milne
  3.3 substep 4a), `Albanese/SmoothPrimeRegularity.lean` (Stacks 00TT at all primes,
  Serre-free), `Albanese/StandardSmoothDimension.lean` (Stacks 00OE/00ON Krull-dim).
  Porting them into AJC closes the two extra `CodimOneExtension` sorries and supplies
  the 3.3 substep-4a input.

  - **`AlbaneseUP.lean` is byte-identical (skeleton) in both trees** ‚Äî 7 real sorries
  incl. `bundle := sorry` (representability-gated, out of T9 scope) plus the `descentThroughBirationalSigma`/`albanese_universal_property`
  assembly. Blueprint DAG is honest: `has_sorry` flags match Lean. `WeilDivisor.lean`''s
  `PrimeDivisor`/`order` substrate is a live dependency of this leg (`I-0106`), not
  dead genus-0 weight.'
