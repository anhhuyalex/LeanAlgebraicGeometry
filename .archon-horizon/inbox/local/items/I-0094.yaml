  but **no** proof-`\leanok`, matching the typed `sorry`. This is the exact "verify
  inherited closures" discipline that caught the r3 unverified sweep; issue `I-0093`
  (open) tracks the three localized-module kernel walls that must be repaired to restore
  end-to-end axiom-cleanliness.

  - **Blueprint reconciled**: 9 new nodes (6 flattening-glue + 3 QuotScheme 01PC)
  are pure-math with complete proofs, dependency-correct `\uses`, and faithful Lean
  pins; one garbled proof clause fixed in-place.

  - **Sorry counts**: FlatteningStratification 4, QuotScheme 8, glue file 0. `AJC.picrep`
