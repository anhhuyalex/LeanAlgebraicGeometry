body: '**Recipe: Stacks 00TT at ARBITRARY primes over a perfect field, Serre-free
  (supersedes the "00OF is the remaining genuine gap / do not attempt" guidance —
  00OF is no longer needed).**


  Proven in `Albanese/SmoothPrimeRegularity.lean` (axiom-clean, v4.31 Mathlib suffices).
  Structure, reusable for similar dimension-theory builds:


  - **Lemma A (trdeg–height)**: for prime `P ⊆ k[x_ι]`, `∃ d ≤ trdeg k (k[x_ι]⧸P)`
  with `#ι ≤ ht P + d`. Induction via `Finite.induction_empty_option`; one-variable
  step uses Stacks 00ON `Ideal.height_eq_height_add_of_liesOver_of_hasGoingDown` (+
  `Algebra.HasGoingDown.of_flat`, `Module.Flat.of_free`) and splits on the fiber prime
  in `(R⧸p)[X]` (`Ideal.polynomialQuotientEquivQuotientPolynomial`); the `∃ d ≤`-witness
  form avoids ALL fraction fields and exact-trdeg bookkeeping. Key trdeg API: `trdeg_add_le`,
  `trdeg_le_of_injective`, `Polynomial.trdeg_of_isDomain` (all root-namespace!).

  - **Lemma C**: `rank Ω[K⁄k] = trdeg k K` for `EssFiniteType` field ext of perfect
  `k`: `exists_isTranscendenceBasis_and_isSeparable_of_perfectField` (returns a `Finset`!)
  + `Algebra.FormallyEtale.of_isSeparable` + `tensorKaehlerEquivOfFormallyEtale` +
  `AlgebraicIndependent.aevalEquivField` + `Basis.ofIsLocalizedModule` over `mvPolynomialBasis`.

  - **Lemma D**: `dim_κ m/m² + dim_κ Ω[κ⁄R] = n` generalising iter-199 by dropping
  `Subsingleton Ω[κ/R]`: same `iff_split_injection` retraction + `exact_kerCotangentToTensor_mapBaseChange`
  + `mapBaseChange_surjective` + rank–nullity. `FormallySmooth k κ` is FREE from the
  new low-priority instance `Algebra.FormallySmooth.of_perfectField [EssFiniteType
  k κ]`.

  - Assembly: `finrank Cot ≤ ht q` by ℕ∞ cancellation (`ENat.add_le_add_iff_right`,
  pass `k :=` explicitly), then `IsRegularLocalRing.of_finrank_cotangentSpace_le_ringKrullDim`.


  **Traps**: (1) NEVER bridge AlgEquiv/RingEquiv coercion paths with `Iff.rfl`/`rfl`
  at FUNCTION level (whnf timeout on `renameEquiv`); state helpers with pointwise
  membership hypotheses (`∀ a, a ∈ P₀ ↔ g a ∈ P`) instead. (2) `have`-bound equivs
  are opaque — use `set ... with` when a later proof must compute through the definition.
  (3) In `of_equiv` induction branches don''t `rename_i` (grabs instances); avoid
  naming the types. (4) Multi-step `rw` chains on algebraMap-towers can close the
  goal mid-list and error — split into per-equation `have`s. (5) `Basis` is now `Module.Basis`
  (open Module).


  Dead code note: `stalkMap_flat_of_smooth` (Stage 1) and `exists_algebra_isStandardSmooth_section_stalk_isLocalization_of_smooth`
  (Stage 3) in `CodimOneExtension.lean` now have NO Lean consumers (the new stalk
  proof bypasses them); blueprint-pinned leaves — Ground may prune or keep.'
