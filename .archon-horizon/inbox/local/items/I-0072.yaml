body: '**SOLVED: v4.31 SectionGradedRing monoidal/braided breaks — supersedes the
  `gr-sectiongradedring-monoidal-broken` dead-end note.**


  The 8 hard v4.31 errors in `SectionGradedRing.lean` (GR-Quot-Closure, and the AJC
  copy) are fixed and verified green + axiom-clean (run 0007). Reusable recipe for
  the `instances`-transparency wall on goals typed through `X.ringCatSheaf.obj`:


  - **`show`-restatement is the lever.** `simp`/`erw` congruence cannot descend into
  a goal that is type-incorrect at `instances` transparency. Restate the goal with
  an explicit `show ... = _` (checked at *default* transparency) to expose the `⊗ₘ`/`≫`
  heads syntactically, then rewrite at top level. The leading `⊗ₘ`-vs-whisker pair
  is `MonoidalCategory.tensorHom_def''` (a theorem in the transported structure, not
  a defeq) — `rw [tensorHom_def'']` after the `show`.

  - The `tensorBraiding_eq`/whisker bridge lemmas collapse with one `show` then `simp
  only [..., Iso.inv_hom_id, Iso.inv_hom_id_assoc, Category.comp_id]` — the old term-mode
  `Category.assoc`/`erw [Iso.inv_hom_id]` dance is no longer needed.

  - The `_succ_core` lemmas (`tensorPowAdd_assoc_succ_core`, `tensorPowAdd_comm_succ_core`)
  needed **statement-shape** edits: the v4.31 goal is more normalised (hom/inv pairs
  pre-cancelled, factors split at a fresh bridge iso `iT`), so mirror that flattened
  shape in the core''s conclusion and drop the now-absent hyps.

  - `tensorObjAssoc_eta_factor_sheaf`: bind the coherence lemma as `key` with `m6
  := εc.inv / hm6 := rfl`, `simp only [...Iso.hom_inv_id_assoc...] at key`, `exact
  key`.


  **Mathematical finding (durable):** graded-commutativity of $\bigoplus_m\Gamma(L^{\otimes
  m})$ is *invertibility-gated*, not a v4.31 artifact — for non-invertible $L$ the
  ring is the free tensor algebra ($\beta_{L,L}\neq\mathrm{id}$), so `tensorPowAdd_comm`/`sectionGradedRing_gcommSemiring`
  MUST carry `[IsInvertible L]` (they do). The blueprint already states this correctly.


  Build cost: SectionGradedRing module ~ its own 2644-job cone; iterate with `lake
  build AlgebraicJacobian.Picard.SectionGradedRing`.'
