body: 'Recipe: Stacks 00OE/00TT closed-point regularity for standard-smooth algebras
  (v4.31 Mathlib suffices)


  **The smooth-algebra Krull-dimension formula at maximal ideals needs NO transcendence-degree
  theory** — do not build Noether-normalisation dimension theory for it. Proven route
  (Albanese `StandardSmoothDimension.lean` + `CodimOneExtension.lean` §3.B, all axiom-clean):


  - `ht M = #ι` for maximal `M ⊆ MvPolynomial ι k`: `Finite.induction_empty_option`
  (works with hypotheses depending on `ι` — the tactic auto-generalises `M`, `hM`);
  step = `Polynomial.isMaximal_comap_C_of_isJacobsonRing` (contraction maximal, `MvPolynomial.isJacobsonRing`
  instance exists for `Finite ι`) + `Polynomial.height_eq_height_add_one`; transport
  via `RingEquiv.height_map/height_comap` + `Ideal.map/comap_isMaximal_of_equiv`.

  - Lower bound `n ≤ ht m` in standard-smooth `S`: pull `m` back along `P.algebraMap_surjective`
  of the submersive presentation; `Ideal.height_le_height_add_spanFinrank_of_le` (Krull
  height thm, relative form) + `spanFinrank(ker) ≤ #σ` via `P.span_range_relation_eq_ker`
  (note `P.ker` unfolds to `RingHom.ker (algebraMap P.Ring S)` by rfl-level abbrevs);
  quotient side identified with `m` via `RingHom.quotientKerEquivOfSurjective_apply_mk`
  + `Ideal.map_comap_of_surjective`; cancel in ℕ∞ with `ENat.add_le_add_iff_right`.

  - Upper bound is free: `IsRegularLocalRing.of_spanFinrank_maximalIdeal_le` + `IsLocalRing.spanFinrank_maximalIdeal_eq_finrank_cotangentSpace`
  — a Noetherian local ring with `finrank Cotangent ≤ ringKrullDim` is regular.

  - k̄-rationality of maximal ideals: `finite_of_finite_type_of_isJacobsonRing` (Zariski)
  + `IsAlgClosed.algebraMap_bijective_of_isIntegral` + `Ideal.bijective_algebraMap_quotient_residueField`.
  **Trap:** install `letI := Ideal.Quotient.field m` BEFORE any other `haveI` on `S
  ⧸ m` (FiniteType, Module.Finite) — installing it after poisons `Algebra k (S ⧸ m)`
  synthesis inside later applications (semiring-key mismatch; `respectTransparency
  false` does NOT fix it; Field-first ordering does — same idiom as Mathlib''s `finite_of_algHom_finiteType_of_isJacobsonRing`).


  **Remaining genuine gap for all-points `isRegularLocalRing_stalk_of_smooth`: Stacks
  00OF** (localisation of regular local is regular) — needs Serre''s finite-global-dimension
  characterisation, absent from Mathlib v4.31 (`IsRegularLocalRing` has only `RegularLocalRing/Defs.lean`).
  At non-closed points (ii.A) correctly fails (`finrank Cotangent = ht z ≠ n`). Do
  not attempt 00OF as a side quest — it is a large homological build.'
