body: 'Recipe: Stacks 00OE/00TT closed-point regularity for standard-smooth algebras
  (v4.31 Mathlib suffices)


  **The smooth-algebra Krull-dimension formula at maximal ideals needs NO transcendence-degree
  theory** ‚Äî do not build Noether-normalisation dimension theory for it. Proven route
  (Albanese `StandardSmoothDimension.lean` + `CodimOneExtension.lean` ¬ß3.B, all axiom-clean):


  - `ht M = #Œπ` for maximal `M ‚äÜ MvPolynomial Œπ k`: `Finite.induction_empty_option`
  (works with hypotheses depending on `Œπ` ‚Äî the tactic auto-generalises `M`, `hM`);
  step = `Polynomial.isMaximal_comap_C_of_isJacobsonRing` (contraction maximal, `MvPolynomial.isJacobsonRing`
  instance exists for `Finite Œπ`) + `Polynomial.height_eq_height_add_one`; transport
  via `RingEquiv.height_map/height_comap` + `Ideal.map/comap_isMaximal_of_equiv`.

  - Lower bound `n ‚â§ ht m` in standard-smooth `S`: pull `m` back along `P.algebraMap_surjective`
  of the submersive presentation; `Ideal.height_le_height_add_spanFinrank_of_le` (Krull
  height thm, relative form) + `spanFinrank(ker) ‚â§ #œÉ` via `P.span_range_relation_eq_ker`;
  quotient side identified with `m` via `RingHom.quotientKerEquivOfSurjective_apply_mk`
  + `Ideal.map_comap_of_surjective`; cancel in ‚Ñï‚àû with `ENat.add_le_add_iff_right`.

  - Upper bound is free: `IsRegularLocalRing.of_spanFinrank_maximalIdeal_le` + `IsLocalRing.spanFinrank_maximalIdeal_eq_finrank_cotangentSpace`.

  - kÃÑ-rationality of maximal ideals: `finite_of_finite_type_of_isJacobsonRing` (Zariski)
  + `IsAlgClosed.algebraMap_bijective_of_isIntegral` + `Ideal.bijective_algebraMap_quotient_residueField`.
  **Trap:** install `letI := Ideal.Quotient.field m` BEFORE any other `haveI` on `S
  ‚ß∏ m` (FiniteType, Module.Finite) ‚Äî installing it after poisons `Algebra k (S ‚ß∏ m)`
  synthesis (semiring-key mismatch; `respectTransparency false` does NOT fix it; Field-first
  ordering does).


  **SUPERSEDED for the all-points case (run 0006 T6): Stacks 00OF is NO LONGER needed.**
  The old claim here ‚Äî "remaining genuine gap for all-points `isRegularLocalRing_stalk_of_smooth`
  is Stacks 00OF, do not attempt" ‚Äî is now false. See [[I-0047]]: `Albanese/SmoothPrimeRegularity.lean`
  proves regularity at EVERY prime of a standard-smooth algebra over a perfect field,
  Serre-free (trdeg‚Äìheight induction via Stacks 00ON + conormal split-exactness from
  `FormallySmooth.of_perfectField`), so `isRegularLocalRing_stalk_of_smooth` / `localRing_dvr_of_codim_one`
  are now axiom-clean. This closed-point recipe is retained only for its kÃÑ-rationality
  trap and the maximal-ideal API details.'
