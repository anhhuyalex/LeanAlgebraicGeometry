body: '**IdentityComponent (A.3) — all 9 sorries are blocked, not proof-search debt.
  Do not re-probe.**


  Verified run 0005 (T5 opening Ground):


  - **§1 group-scheme substrate — `geometricallyConnected_of_connected_of_section`,
  `isSubgroupHomomorphism`, `isFiniteTypeGeometricallyIrreducible` (QC∧GeomIrred half),
  `baseChangeIso` (iso slot)** — bottleneck is Stacks **037Q/04KU** ("connected `k`-scheme
  + `k`-rational section ⟹ geometrically connected") and **02LB/04KS** descent-of-clopen
  along base change. **Confirmed absent from v4.31 `Mathlib/AlgebraicGeometry/Geometrically/Connected.lean`**:
  that file has only the FORWARD direction (`GeometricallyConnected ⟹ ConnectedSpace
  / fiber connected`, plus `IsStableUnderBaseChange`); the reverse we need is not
  there. `geometrically_iff_of_commRing_of_isClosedUnderIsomorphisms` (Basic.lean)
  exists and the file already uses it to reduce to `ConnectedSpace (pullback f g)`,
  but the remaining step is the missing gap. This is a large descent/homological build
  — NOT a proof-search win.


  - **Pic⁰-specific leaves — `Pic0Scheme`, `degree`, `isAbelianVariety`, `finrank_eq_genus`,
  `kPoints_iff_kerDegree`** — inherit the **sorry-backed FGA foundation**: `PicScheme`
  is `instHasPicScheme ⟨sorry⟩` and `GrpObj (PicScheme C)` is `instPicSchemeGroupObject
  ⟨sorry⟩` (`Picard/FGAPicRepresentability.lean`, 26 sorries). Anything referencing
  `PicScheme C` inherits `sorryAx`, so cannot be axiom-clean until FGA representability
  lands. `degree` also needs the χ-blocked Hilbert-polynomial endgame; `isAbelianVariety`/`finrank_eq_genus`
  need `T_e ≅ H¹` smoothness = the separate active `AJC.pic0av` cone (do not duplicate).


  - **Import cone is FBC-free** (STEP-0 gate): 9 AJC modules + Mathlib; only `Cohomology.*`
  present are `StructureSheaf{Ab,ModuleK,…}`+`SheafCompose` via `Genus` (H¹ substrate),
  NOT `Cech*`/`FlatBaseChange*`. Safe to extract/iterate in parallel with T2.


  - Marginal-only structural tidy: `Pic0Scheme` def can become `GroupScheme.IdentityComponent
  (PicScheme C)` iff `LocallyOfFiniteType (PicScheme C).hom` resolves — removes the
  `sorry` token but stays FGA-taint (not axiom-clean).'
