  \ @284, `tensorObj_restrict_iso` @465. Port those bodies (v4.31-clean).\n- The **keystone\
  \ was refactored OUT** of `TensorObjSubstrate.lean` into a new file **`Picard/TensorObjInverse.lean`**\
  \ (`lemma exists_tensorObj_inverse` @3312, 3424 lines). LBC's `TensorObjSubstrate.lean`\
  \ no longer declares it (old stub removed @692).\n\nNew files to bring into AJC\
  \ (all **absent** in AJC, all `sorry`-free in LBC) â€” keystone import-chain:\n\n\
  - `TensorObjSubstrate/DualInverse/PresheafDualPullback.lean`\n- `TensorObjSubstrate/DualInverse/PresheafDualUnitPullback.lean`\n\
  - `TensorObjSubstrate/DualInverse/PresheafDualPullbackNatural.lean`\n- `TensorObjSubstrate/PullbackTensorMapIso.lean`\n\
  - `TensorObjSubstrate/TrivialisationRestrict.lean`\n- `TensorObjInverse.lean` (top;\
  \ in LBC also imported by `RelPicFunctor`)\n\n`PullbackTensorIso.lean` is **not**\
  \ needed for the keystone â€” nothing in the chain imports it.\n\n**Reconciliation\
  \ risks â€” this is NOT a clean \"add 6 files\":**\n\n- **Base files diverge.** AJC\
  \ `TensorObjSubstrate.lean` is 2185 lines vs LBC 4592; `DualInverse.lean` differs\
  \ too. The new LBC files were written against LBC's *larger* base and may reference\
  \ declarations absent from AJC's leaner copies. `diff` the base files and pull in\
  \ whatever decls the new files need (or lift AJC's base to LBC's version), watching\
  \ AJC-only downstream consumers (`RelPicFunctor`, `Pic0AbelianVariety`, â€¦) that\
  \ import them.\n- **Pullback-tensor route mismatch.** AJC uses `PullbackTensorComp.lean`;\
  \ LBC uses `PullbackTensorMapIso.lean`. `TensorObjInverse`/`TrivialisationRestrict`\
  \ import `PullbackTensorMapIso`. Either add LBC's `PullbackTensorMapIso.lean` or\
  \ rewire the import onto AJC's `PullbackTensorComp` if it exposes the same API.\n\
  \n**Done-when + blueprint follow-up:** once AJC `lake build` is green (no new `sorry`/axioms),\
  \ add the **proof-level** `\\leanok` to blueprint nodes `lem:tensorobj_restrict_iso`,\
  \ `lem:tensorobj_inverse_invertible`, and `lem:tensorobj_unit_iso` in `Picard_TensorObjSubstrate.tex`\
  \ (currently honestly proof-unmarked), refresh the DAG, then close `AJC.linebundle`."
