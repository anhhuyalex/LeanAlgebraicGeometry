body: '**T12 / `AJC.picrep` cone triage (run 0010) — what is closable vs blocked;
  do not re-triage from scratch.**


  In-scope real sorries (23): `FGAPicRepresentability` 4, `QuotScheme` 12, `FlatteningStratification`
  7; `GrassmannianQuot` and `RelPicFunctor` are sorry-free.


  - **All headline decls are multi-session, Mathlib-v4.31-gapped**: `hilbertPolynomial`
  (coherent-sheaf $\chi$/Snapper polynomiality), `QuotFunctor`/`QuotScheme` (Nitsure
  §5), `Grassmannian`/`Grassmannian.representable`, `genericFlatness`/`flatteningStratification`(+`_universal`)
  (Nitsure §4, Fitting-ideal strata + generic freeness). Needs relative $\mathbb P^n_S$,
  CM boundedness, Altman–Kleiman flat-proper equiv-relation descent — none in Mathlib.

  - **The 4 FGAPic stubs are gated on the A.2.b Quot engine** (closure order B→C→A).
  `instHasDivFunctor` (L185) and `instHasAbelMap` (L291) are DELIBERATE "awaiting
  real definition" flags — their `Nonempty` is trivially true (const functor / zero
  nat-trans); **do NOT close them vacuously** (false progress, removes the A.2.b-not-done
  signal). `instHasPicScheme` (L244) is the load-bearing FGA theorem; `instPicSchemeLocallyOfFiniteType`
  (L508) is part of that obligation.

  - **The `QuotScheme` base-change chain (L596/620/1065/1227/1278/1328) is gated on
  the still-open T2/`AJC.fbc` engine** (`cech_flatBaseChange`, Stacks 02KH). As of
  run 0010, `CechHigherDirectImageUnconditional.lean` still carries 3 leaf sorries
  (L196/1646/1712). All these helpers bottom out in the same un-closed "01HQ/02KE
  section-vs-tensor transport" gap.

  - **Only genuinely-correct single-session leaf**: `flatteningStratification.ofCurve`
  (L530) = `flatteningStratification (pullback.snd C.hom T.hom) F` (properness auto).
  Correct delegation; reduces leaf count, not axiom-debt (rests on still-open L445).

  - **Highest-math-value stretch (>1 session)**: `tildeIso_of_isQuasicoherent_isAffineOpen`
  (L676, Stacks 01I8); substrate `Cohomology/QcohTildeSections.lean` `qcoh_iso_tilde_sections`
  (sorry-free) + `pullbackRestrict_iso_tilde` exist; residual is the Σ-pair section
  identity.


  Blueprint `Picard_FGAPicRepresentability.tex` is complete and dependency-correct
  (closure order documented). Prereq for a real T12 push: finish T2/`AJC.fbc` + a
  Route-C Riemann–Roch / coherent-$\chi$ substrate.'
