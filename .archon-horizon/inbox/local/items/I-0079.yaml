body: 'MR0555258 migrated to mathlib v4.31.0 and builds green for the first time (8560
  jobs)


  **The v4.31.0 migration debt (T8) is now fully retired across the workspace.** The
  last piece was `MR0555258-Compactifying-Picard`, which was still pinned to lean/mathlib
  v4.30.0 (tripping the commit-guard warning on every `horizon commit`) and had never
  been built.


  - Bumped `lean-toolchain` + lakefile mathlib pin to **v4.31.0**, pinned `doc-gen4`
  to the AJC-known-good rev `0bc516c1b9db` (its `main` drags in a v4.32.0-rc1 toolchain),
  regenerated `lake-manifest.json` via `lake update` — now byte-aligned with the workspace
  `external_libraries` (mathlib `fabf563`).

  - Repaired the 4 v4.31 proof breaks in `Basic.lean` (§1 base-change scaffolding,
  all proof-body-only): `coyonedaCompFF` naturality, the two associator-naturality
  legs `tensorAssocNatIso₁/₃`, and `restrictionRingSheafHom` (now uses Mathlib''s
  `appIso_inv_naturality`).

  - **First-ever green build: 8560 jobs**; the single pre-existing `sorry` (`hSupportBC`,
  ~line 2712) and the deliberate `External` axioms are untouched. Committed as `80754a2d4c`.

  - Roadmap note for Ground: `MR.pic` says ''Lean target is currently a stub aggregator''
  — it is actually a ~3900-line §1 (Altman–Kleiman base-change) scaffold, now compiling;
  and the `AJC.cech` ''Residual 16 sorry are v4.31 migration-interim'' note is stale
  (they are all closed).'
