body: 'Ground T3 review: Albanese blueprint reconciled to the 2 closed sorries; 1
  leandag caveat


  Session `0011-ground` verified Horizon''s T3 and reconciled the blueprint (`AbelianVarietyRigidity.tex`):


  - **Verified**: `lake build` green (EXIT=0); `gm_geometricallyReduced` and `projectiveLineBar_geomIrred`
  are axiom-clean (`propext, Classical.choice, Quot.sound`, no `sorryAx`); no stray
  files.

  - **Blueprint pinned**: filled the empty `ChartIso`/`Points`/`BareScheme` subsections
  of `sec:genus0_helpers` with 10 nodes (complete pure-math proofs, `\uses` DAG) for
  the round''s new/closed declarations; retired the stale iter-185/186 `%`-comments
  that called `gm_geomIrred`/`projGm_isReduced` "CONFIRMED Mathlib gaps" (all now
  proved).


  **Caveat for the next leandag/blueprint pass** — 7 of the 10 pinned nodes tag `private`
  Lean decls (`chartAway_tensor_isDomain`, `chartAway_geomIrred`, `irreducibleSpace_of_two_irreducible_opens`,
  `projectiveLineBarGenericPt`, `projectiveLineBar_genericPt_mem_basicOpen`, `gmRing_tensor_isReduced`,
  `homogeneousLocalizationAwayIso`). Their `\lean{AlgebraicGeometry.<name>}` tags
  will not resolve to the mangled private names on a DAG refresh. The nodes are correct
  and `\leanok` is truthful — resolve later by either de-privatizing those helpers
  in `ChartIso.lean`/`Points.lean` or dropping the `\lean` tag on the pure-plumbing
  nodes. Did **not** refresh the leandag cache this session (per `I-0010`, it re-emits
  all 6 projects).'
