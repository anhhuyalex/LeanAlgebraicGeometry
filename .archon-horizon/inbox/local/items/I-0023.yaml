body: 'Session 0007 (run 0004): pivoted off stale T1 focus → new sorry-free `AJC.pic0av`
  tangent-space substrate


  **T1 was already merged and verified** (`I-0017`/`I-0019`); the only residual T1
  action (one confirming full `lake build`) is explicitly deferred behind the still-live
  T2 session (verified live: `claude` PID `3121714` + `lake build ...CechHigherDirectImageUnconditional`,
  lean at 78+ min CPU on `CechSectionIdentificationLegMid1`). Per `recommendation.md`
  I did **not** run a competing full AJC build and instead took the recommended next
  cone `AJC.pic0av` (Albanese leaves are outside this session''s write scope).


  **Deliverable: new file `AlgebraicJacobian/Picard/TangentSpaceDualNumbers.lean`
  (~510 LOC, 0 sorry)** — the commutative-algebra core of Kleiman §5 Thm 5.11 ("tangent
  space via dual numbers") feeding `Scheme.Pic0.tangentSpaceIso`:


  - `derivationCotangentDual` — a k-derivation `R → κ` kills `m²`, descends R-linearly
  to `m/m²`.

  - `derivationEquivCotangentDual` — for k-rational R (`algebraMap k κ` bijective):
  `Derivation k R κ ≃+ Hom_R(m/m², κ)`, inverse via the canonical splitting `R = k
  ⊕ m`.

  - `localDualNumberHomEquivDerivation` — local k-algebra maps `R → k[ε]` (fst kills
  `m`) ≃ derivations; locality forces fst = residue.

  - `cotangentDualExtendScalars` — `Hom_R(m/m², κ) ≃ₗ[R] Module.Dual κ (m/m²)` (via
  `LinearMap.extendScalarsOfSurjectiveEquiv`).

  - Capstone `localDualNumberHomEquivCotangentSpaceDual` — dual-number points of the
  closed point ≃ `Module.Dual κ (CotangentSpace R)`.


  **Verification:**


  - `lake env lean` on the file: EXIT=0, zero diagnostics; targeted `lake build AlgebraicJacobian.Picard.TangentSpaceDualNumbers`
  green (11s, no contention with T2''s cone — Mathlib-only imports).

  - `#print axioms` on `derivationEquivCotangentDual` + both capstones: `[propext,
  Classical.choice, Quot.sound]` — no `sorryAx`.

  - Consumer `Pic0AbelianVariety.lean` re-elaborates green with the new import (only
  its 5 pre-existing skeleton sorries).


  **Wiring:** imports added to root `AlgebraicJacobian.lean` and `Picard/Pic0AbelianVariety.lean`.
  Blueprint `Picard_Pic0AbelianVariety.tex` gained 6 `\leanok` nodes (`lem:tangent_derivation_descends`,
  `lem:tangent_derivation_cotangent_dual`, `lem:tangent_dual_number_derivation`, `cor:tangent_dual_number_cotangent_dual`,
  `lem:tangent_cotangent_dual_kappa_linear`, `cor:tangent_dual_number_cotangent_space_dual`)
  with complete proofs, wired into `thm:pic0_tangent_space_iso`''s proof `\uses`.
  DAG refreshed: AJC 2034 nodes, 0 dangling, all 6 new nodes `proved=True`.


  **Next for the `tangentSpaceIso` cone** (in dependency order): (1) scheme-level
  layer — `Spec k[ε] ⟶ X` lifting a k-point ≃ local k-algebra maps `𝒪_{X,x} → k[ε]`
  via `AlgebraicGeometry.SpecToEquivOfLocalRing`; (2) the truncated exponential sequence
  `0 → 𝒪_C → 𝒪_{C_ε}^× → 𝒪_C^× → 1` on H¹ (needs the Čech engine — coordinate with
  T2''s cone); (3) the representability comparison (gated on `AJC.picrep`). Note LSP
  works fine on fresh `import Mathlib` files (~500 LOC) — the "LSP dead" memory applies
  only to the huge legacy files.'
