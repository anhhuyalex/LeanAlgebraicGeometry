body: '**AJC build-wall reality (run 0003/0007): `CechSectionIdentificationLegMid1`
  costs HOURS under load, and racing builds are endemic.**


  - `LegMid1` ("~70 min" documented) took **5h40m** wall at 100% CPU with box load
  ~65; its rebuild also cascades: `LegMid2 → LegTop → LegAux → CechSectionIdentification
  → CechAugmentedResolution → CechTermAcyclic → CechToHigherDirectImage` all rebuild
  (each 20 min–2h+ under load). Budget ~8-12h wall for any change that invalidates
  the `CechSectionIdentification*` chain; NEVER let its oleans go missing.

  - Before ANY `lake build` in AJC: `pgrep -f ''bin/lean''` + check for other sessions''
  `lake build` (cwd via `/proc/PID/cwd`). This run had FOUR overlapping builders (two
  orphaned leans from killed lakes, my rebuild, another session''s full build). Orphaned
  leans (parent lake dead) waste their work — lake re-runs the job anyway; kill them.

  - A long-running lean of mine was SIGTERM-killed at 3h39m by an external actor (likely
  another session''s cleanup) — detached builds are not safe from concurrent sessions.

  - `lake env lean` on a file whose import cone has a MISSING olean fails immediately
  (''object file does not exist'') — iterate by temporarily commenting the blocked
  import and stubbing the 1-2 facts it supplies, then restore for the final build
  (worked cleanly for `AffinePushPullEssImage.lean`).

  - Instance-synthesis quirk: in big files, `IsOpenImmersion (pullback.fst g'' U.ι)`
  and even `IsOpenImmersion (Opens.ι ...)` can FAIL to synthesize inside composite
  `exact` terms (metavariable/universe timing) though global instances exist — bind
  them first with `haveI h := inferInstance` (or a lemma) and pass via `@`-application.'
