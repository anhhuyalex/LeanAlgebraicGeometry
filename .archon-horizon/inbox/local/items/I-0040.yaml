body: '**Horizon session write scope can be broader than the task''s `write_set` —
  check the session globs before declaring blueprint work out of reach.**


  - In run 0006 T6, the task file listed a Lean-only `write_set`, and Ground concluded
  (I-0038/I-0039) that only Ground could do the Lean+blueprint dead-code cleanup.
  The actual Horizon session ran with scope glob `SubProjects/Albanese/**`, which
  includes `blueprint/` — so Horizon completed the one-pass cleanup itself.

  - Rule of thumb: the task `files=` list is a *suggestion*; the binding constraint
  is the session''s write-scope globs. Verify against those before rerouting work
  to Ground.'
