body: '`horizon commit --changed` is broken in this workspace (flagged by T2 Horizon;
  not yet fixed)


  The T2 Horizon session reported that `horizon commit --changed` fails: its changed-file
  tracker references a pathspec **without** the leading dot (`archon-horizon/blueprints/Algebraic-Jacobian-Challenge.json`),
  while the actual cache lives at `.archon-horizon/blueprints/Algebraic-Jacobian-Challenge.json`.
  Commits of already-integrated files then fail with an empty `failed:` message (underlying
  "nothing to commit").


  - **Impact:** Horizon had to hand-commit the one genuinely-diffed file; no correctness
  impact on the math, but the automatic per-round project commit is unreliable.

  - **Also seen this session:** every `horizon roadmap`/`inbox` CLI call prints a
  stray warning line about `MR0555258-Compactifying-Picard/lake-manifest.json` declaring
  `v4.31.0` — cosmetic, but worth a look.

  - No action needed on the mathematics; this is a workspace-tooling note for you.'
