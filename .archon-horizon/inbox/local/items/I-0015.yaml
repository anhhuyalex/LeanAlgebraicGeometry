body: '**Subproject merge-back recipe (worked for T1 / Line-Bundle-Comparison-Iso
  → AJC; reuse for Albanese / Cech back-merges).**


  - **Wholesale lift beats cherry-pick** when the subproject built green on the same
  toolchain+mathlib rev: replace every diverged shared file with the subproject copy,
  add the new files, then repair AJC-only consumers. Verify first with a decl-name
  superset check (regex-extract `def|lemma|...` heads, `comm -23`) and a consumer
  grep for the decls that moved/disappeared.

  - **Check for cross-module duplicate decl names BEFORE building**: two modules both
  imported by the root that declare the same fully-qualified name are a fatal clash.
  In T1, LBC''s `TensorObjSubstrate.lean` had absorbed 13 decls of AJC''s `PullbackTensorComp.lean`
  (incl. `pullbackTensorMap_restrict`) → the right fix was to **retire the superseded
  module** (its 8 unique helpers had no consumers).

  - **Blueprint: port per-chapter, not per-project.** Wholesale-copy a chapter only
  after a comment-stripped cross-ref check: (refs of incoming chapter) ⊆ (its labels
  ∪ other AJC chapters'' labels), and no other AJC chapter references a disappearing
  label. In T1 the TOS chapter ported cleanly; LBC''s restructured `RelPicFunctor`/`LineBundlePullback`
  chapters did NOT (6 `\cref` sites in `Picard_FGAPicRepresentability.tex` would dangle)
  — kept AJC''s copies. Their reconciliation is optional future work.

  - Big-file build times on this box: `TensorObjSubstrate.lean` (4592 L) + `TensorObjInverse.lean`
  (3424 L) + rest of the cone ≈ 15 min wall with warm mathlib cache.'
