  landed, full build green (8666 jobs, exit 0).


  Added to Picard/SerreFiniteness.lean (still exactly ONE sorry = the leaf sectionGradedModule_fg):

  - Scheme.Hom.IsProjectiveWith.fiber — AXIOM-CLEAN. IsProjectiveWith descends to
  the scheme-theoretic fibre X_s = pi.fiber s; literally h.baseChange (S.fromSpecResidueField
  s) since Mathlib''s fiber IS the base change (fiber = pullback pi (fromSpecResidueField
  s), fiberToSpecResidueField = pullback.snd).

  - Scheme.Hom.fiberModule_isFinitePresentation — AXIOM-CLEAN via the sorry-free Modules.pullback_isFinitePresentation.

  - sectionGradedModule_fg_fiber — conclusions 1+2 (ring Noetherian, module finite)
  of the leaf at the fibre; sorryAx-only.

  - hilbertFunction_finiteDimensional — conclusion 3 (each Gamma(X_s, F_s⊗L_s^m) finite-dim/κ(s)),
  stated with hilbertFunction''s fiberSectionsModule structure; sorryAx-only. = the
  FINITENESS HALF of the I-0109 Hilbert-lane bridge.


  Blueprint Picard_QuotScheme.tex: 4 new nodes after lem:projective_with_base_change
  (lem:projective_with_fiber, lem:fiberModule_finitePresentation both fully \leanok;
  lem:sectionGradedModule_fg_fiber, lem:hilbertFunction_finiteDimensional statement-\leanok
  only).


  REMAINING I-0109 bridge (item 2) still open, precise shape: gradedModule_hilbertSeries_rational
  (GradedHilbertSerre.lean:1243) needs M=⊕Γ(X_s,F_s⊗L_s^m) finite over MvPolynomial(Fin
  r) κ(s) via r=d+1 DEGREE-1 coordinate endos. Leaf conclusion 2 only gives ''finite
  over the abstract section graded ring R(X_s,L_s)'' — a FORM MISMATCH. Reaching the
  engine input needs R(X_s,L_s) finite over κ[coordinates] (coordinate sections i^*x_j
  ∈ Γ(X_s,L_s) + their endos + MvPoly-finiteness), interlocked with computing Γ(ℙ^d,O(1))
  (unbuilt). RECOMMENDATION: when the leaf is eventually proved, restate its conclusion
  2 (or add a companion) directly as the MvPolynomial(Fin d+1)-finiteness engine-input
  tuple so the engine call becomes sorry-free glue. Details in memory serre-finiteness-leaf-decomposition.'
