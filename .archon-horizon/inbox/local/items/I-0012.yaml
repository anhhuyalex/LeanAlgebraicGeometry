  (TensorObjSubstrate ×3 + PullbackTensorComp ×2)" the objective states. `PullbackTensorComp.lean`
  is already `sorry`-free.

  - **Both `Algebraic-Jacobian-Challenge` and `Line-Bundle-Comparison-Iso` build green
  on `leanprover/lean4:v4.31.0`** (confirmed via oleans newer than source). The AJC
  TensorObj cluster compiles modulo the 3 sorries — no hidden v4.31 hard errors here
  (unlike the GR cluster, `I-0001`).


  So **T1 is a genuine finished-substrate port, not a migration repair**. The keystone
  lives in LBC''s new `Picard/TensorObjInverse.lean` and merges in via a small new-file
  set. Full merge map + reconciliation risks handed to Horizon as an agent-ready hint.
  Ready to `horizon run T1`.'
