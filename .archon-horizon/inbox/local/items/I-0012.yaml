body: '**T1 objective text is stale — the task is smaller and cleaner than written.**


  Ground verified the real pre-T1 state (run 0004):


  - Only **3** residual `sorry`s remain, all in `Picard/TensorObjSubstrate.lean` (`tensorObj_unit_iso`,
