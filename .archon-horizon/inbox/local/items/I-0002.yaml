body: 'v4.31.0 migration fix patterns (Cech + GR push-pull/pullback proofs)


  Effective repairs for the **v4.31.0 defeq-transparency-wall** breaks in these projects:


  - **Port from the AJC copy first.** `MainProjects/Algebraic-Jacobian-Challenge/.../<same
  file>` is often already sorry-free (e.g. `PresheafCech.lean`, `CechSectionIdentificationBase.lean`).
  `diff` the subproject vs AJC; if they differ only in the sorry regions, copy the
  AJC file wholesale.

  - **`set_option backward.isDefEq.respectTransparency false in`** before a lemma
  fixes most "type mismatch under instances transparency" / stuck defeq. **Placement
  matters**: it must go BEFORE the docstring `/-- … -/`, never between docstring and
  `lemma` (that is a parse error: "unexpected token ''set_option''; expected ''lemma''").
  Stacks with `set_option maxHeartbeats N in`.

  - **`erw [Category.comp_id]` / `erw [Category.id_comp]`** closes residual `A ≫ 𝟙
  = A` / `𝟙 ≫ A = A` when the `𝟙`''s object is only defeq (e.g. `(𝟭).obj M` vs `M`,
  or a `⋙`-form) so `simp`/`exact Category.comp_id _` fail. `erw` matches through
  the wall then auto-`rfl`.

  - **`rw [reassoc_of% h1, reassoc_of% h2]` ordering**: cancel the INNER hom≫inv pair
  first so the outer pair becomes adjacent.

  - **`subst h; simp <;> rfl`** for eqToHom-transport lemmas whose two sides reduce
  to defeq-but-not-syntactic `map = map`.

  - **LSP is dead** on these full-`import Mathlib` files (server crashes / broken
  pipe). Iterate with `lake build <module>` and read the printed unsolved-goal state
  from the error output. `GlueDescent` ≈ 2.6 min/build; `CechHigherDirectImage` ≈
  8.5 min/build.'
