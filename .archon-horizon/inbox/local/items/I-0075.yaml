body: '**Stacks 01BG general pullback-qcoh CLOSED + FBC RHS tilde leaf CLOSED (run
  0003 session 0013, T2) — supersedes all "general-morphism pullback qcoh is absent
  / only in sorry-tainted QuotScheme" notes.**


  - `Cohomology/PullbackQuasicoherent.lean` (new, ~185 LOC, axiom-clean): `pullback_isQuasicoherent_hom
  (g : Y ⟶ X)` for ARBITRARY scheme morphisms. Recipe: localize the pullback, not
  the presentation — per cover member `A`, `(g^*F)|_{g⁻¹A} ≅ (g.resLE A W)^*(F|_A)`
  via `pullbackComp`+`pullbackCongr (resLE_comp_ι g le_rfl)`+`restrictFunctorIsoPullback`,
  transport the global presentation of `F|_A` by `SheafOfModules.Presentation.map`
  (15-underscore @-application, copy `presentationRestrictSliceOfOver`''s shape),
  then the CechTermAcyclic over-bridge tail (`modulesOverOpensEquivalence` / `overOpensIsoRestrict`
  / `overOpensFunctorUnitIso` / counit) and `IsQuasicoherent.of_coversTop` on the
  preimage cover.

  - Enablers now available: `opensMap_final` (`(Opens.map φ).Final` for ANY continuous
  map — structured-arrow posets are ⊔-directed, `Functor.final_of_isFiltered_structuredArrow`)
  and `pullbackUnitIso : g^*𝒪_X ≅ 𝒪_Y` (Mathlib''s `pullbackObjUnitToUnit` iso under
  `[F.Final]`). Gotcha: re-synthesis of `IsIso (pullbackObjUnitToUnit …)` at USE sites
  can fail (defeq wall in the instance-arg unification) — pass the instance explicitly
  via `@asIso _ _ _ _ _ (pullbackObjUnitToUnit_isIso_hom g)`.

  - FBC leaf `pushPullObj_coverInter_baseChanged_pushforward_iso_tilde` (622-line
  sorry) closed as literally `(pushforward f'').mapIso (twisted_cech_nerve_per_sigma
  …) ≪≫ pushPullObj_coverInter_pushforward_iso_tilde f'' 𝒰'' (g''^*F) (pullback_isQuasicoherent_hom
  g'' F hF) σ` — the def had to MOVE below `twisted_cech_nerve_per_sigma` in the file.
  FBC leaves 5 → 4.

  - Iteration cost: `lake env lean` on a file importing Mathlib+`CechTermAcyclic`
  ≈ 4 min under load ~65; the 2-module `lake build` (new file + `CechHigherDirectImageUnconditional`)
  ≈ 25 min.'
