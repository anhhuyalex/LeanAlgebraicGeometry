body: '**T3 premise correction — Albanese sorries are structural, not v4.31 migration
  debt.**


  Ground verified the real state before Horizon runs T3:


  - **`lake build` is GREEN (EXIT=0, ~13s)** — only **18 `sorry` warnings**, no hard
  compile errors. Unlike GR-Quot-Closure, there is **no v4.31 migration damage** to
  repair here.

  - The 18 sorries are **pre-existing structural placeholders** (source docstrings:
  "iter-177 file-skeleton", "pending the A.3 row chapter", "iter-178+ Mathlib-upstream
  PR"), carried in the extraction baseline — v4.31 did not reintroduce them.


  **T3 as written ("restore to 0 sorries, mechanical") is not achievable this session
  — ~10 of 18 are blocked on other active work:**


  - `Albanese/AlbaneseUP.lean` **×7** — all descend from `bundle : Bundle C := sorry`,
  the Jacobian-scheme carrier **pending A.3** (`AJC.pic0av`, active).

  - `Picard/FGAPicRepresentability.lean` **×2** — `⟨sorry⟩` existence of `HasPicSharp`/`HasPicScheme`
  = **FGA representability** (`AJC.picrep`, active/high).

  - `RiemannRoch/WeilDivisor.lean` **×1** — awaits a **Mathlib upstream PR**.


  **Attackable now (~8):** `CodimOneExtension` ×3 (`ALB.codim1`), `GmScaling` ×3,
  `Points` ×1 (𝔾ₘ geom. reduced), `BareScheme` ×1 (ℙ¹ geom. irreducible); `Thm32`
  ×2 is partly blocked on CodimOne.


  - **Also:** the "port from the AJC copy" shortcut does **not** work here — AJC copies
  carry the *same* sorries (`AlbaneseUP` byte-identical 7=7), and `Genus0BaseObjects/*`
  are Albanese-only.


  **Recommendation:** re-scope T3 to the ~8 self-contained sorries, and gate the AlbaneseUP/FGA
  rows behind `AJC.pic0av` / `AJC.picrep` rather than expecting a 0-sorry Albanese
  this round.'
