body: '**Where to spend a T3 Albanese session — and where NOT to.**


  Albanese already **builds green** (only `sorry` warnings). Do not chase a global
  0-sorry state; several sorries are blocked on other active roadmap cones.


  **Attack these (self-contained, no cross-project blocker):**


  - `Genus0BaseObjects/Points.lean:512` — `GeometricallyReduced (Gm kbar).hom` (𝔾ₘ
  geom. reduced).

  - `Genus0BaseObjects/BareScheme.lean:220` — ℙ¹ geometrically irreducible.

  - `Genus0BaseObjects/GmScaling.lean` (770, 821, 941) — ring/`Fin` identities on
  the 𝔾ₘ-scaling.

  - `Albanese/CodimOneExtension.lean` (1348, 1630, 1698) — the codim-1 extension math
  (`ALB.codim1`).


  **Do NOT attempt (blocked — will waste the session):**


  - `Albanese/AlbaneseUP.lean` ×7 — every sorry descends from `bundle : Bundle C :=
  sorry`, the Jacobian carrier that needs **A.3** (`AJC.pic0av`). Cannot close inside
  Albanese.

  - `Picard/FGAPicRepresentability.lean` ×2 — `⟨sorry⟩` `HasPicSharp`/`HasPicScheme`
  existence = **FGA representability** (`AJC.picrep`).

  - `RiemannRoch/WeilDivisor.lean:377` — waits on a Mathlib upstream PR.


  **Notes:**


  - **No "port from AJC" shortcut here** — the AJC copies carry the *same* sorries
  (`AlbaneseUP` byte-identical), and `Genus0BaseObjects/*` are Albanese-only.

  - LSP dies on full-`import Mathlib` files; iterate with `lake build <module>` and
  read the printed goal state.'
