body: '**A.3 Pic0 cone state after run-0008 T5 — supersedes the run-0005 ''IdentityComponent
  all 9 sorries blocked'' memory.**


  - **Proved sorry-free**: `Pic0.grpObj` (`Nonempty (GrpObj (Pic0Scheme C))` = `isSubgroupHomomorphism
  (PicScheme C)`; instances synthesize directly from `groupSchemeStructure` (CommGrpObj
  parent projection) + the `PicSchemeLocallyOfFiniteType` projection instance; `Pic0Scheme`
  unfolds by rfl, plain `exact` works). Also `Pic0.geometricallyIrreducible` (specialisation
  of the substrate), both `isAbelianVariety` assemblies (the `Pic0Scheme`-namespace
  one MOVED to `Pic0AbelianVariety.lean`), and `tangentSpaceCotangentDual` now hypothesis-free.

  - **Still blocked, do not re-probe**: `isFiniteTypeGeometricallyIrreducible` QC∧GeomIrred
  conjunct (EGA IV₂ 4.5.8/4.6.1 translate-cover argument, not in Mathlib v4.31); `degree`/`kPoints_iff_kerDegree`
  (Quot/Hilbert χ endgame); `finrank_eq_genus`, `Pic0.smooth`, `Pic0.proper` (need
  tangentSpaceIso resp. Chevalley–Rosenlicht).

  - **tangentSpaceIso attack path opened**: the ring-level truncated-exponential splitting
  is DONE (`Picard/DualNumberUnits.lean`, axiom-clean: `(R[ε])ˣ ≃* Rˣ × (R,+)` + naturality
  via `mapRingHom`; blueprint `sec:pic0_trunc_exp`, 15 nodes). Next bricks in order:
  (1) dual-number points of `Pic0Scheme` ↔ `ker(picSharp(Spec k[ε]) → picSharp(Spec
  k))` via `(representable C).homEquiv` (clopen ⟹ Pic vs Pic⁰ dual-number points at
  0 agree); (2) sheaf-level sequence on `C_ε = C ×ₖ Spec k[ε]` (identify `O_{C_ε}`
  sections with `O_C(U)[ε]`); (3) Čech `H¹(O^×)` cocycle classification of line bundles
  trivial mod ε.'
