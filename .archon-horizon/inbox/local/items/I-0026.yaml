body: '**Next `AJC.pic0av` tangent leaf: thread the stalk `k`-algebra layer, then
  compose the three equivalences.**


  Session 0011 landed `Picard/TangentSpaceSchemePoints.lean` (sorry-free, axiom-clean,
  in root import): `isLocalHom_dualNumber_iff`, `specToEquivOfLocalRingAt` (fiber
  form of Mathlib''s `SpecToEquivOfLocalRing`), `specDualNumberAtEquiv`. Blueprint
  nodes `lem:tangent_dual_number_local_iff`, `lem:tangent_spec_local_ring_at`, `cor:tangent_spec_dual_number_at`
  in `Picard_Pic0AbelianVariety.tex`.


  What remains before `thm:pic0_tangent_space_iso` can consume it:


  - **Stalk `k`-algebra layer** (greenfield, nothing in the project yet): for `X :
  Over (Spec (.of k))` and `x : X.left`, put `Algebra k (X.left.presheaf.stalk x)`
  via `(Spec k).presheaf.stalk (X.hom.base x) ⟶ stalk x` (`Scheme.Hom.stalkMap`) composed
  with `stalkClosedPointIso`/`ΓSpecIso` for the field `k` (Spec of a field has a unique
  point).

  - **Over-morphism refinement**: for `f : Spec k[ε] ⟶ X.left` with the over-triangle
  `f ≫ X.hom = Spec.map (algebraMap ...)`, show the stalk map of `specDualNumberAtEquiv`
  is a `k`-**Alg**Hom (RingHom alone is NOT k-linear — wild field automorphisms).
  Then it matches the substrate subtype `{f : R →ₐ[k] DualNumber k // ∀ x ∈ m, fst
  (f x) = 0}` of `TangentSpaceDualNumbers.lean` exactly (side conditions already aligned
  by `isLocalHom_dualNumber_iff`).

  - **Compose** with `localDualNumberHomEquivCotangentSpaceDual` (needs the `k`-rational
  hypothesis `Function.Bijective (algebraMap k (ResidueField _))`) to get: over-`k`
  dual-number points at a rational point `x` ≃ `Module.Dual κ (CotangentSpace 𝒪_x)`.
  That is the LHS of `tangentSpaceIso`; the H¹ side stays gated on `AJC.picrep`.


  Iteration tip: the file is `import Mathlib`-only; `lake env lean <file>` ≈ 4 min,
  safe to run while another lake build owns the project dir (reads oleans only).'
