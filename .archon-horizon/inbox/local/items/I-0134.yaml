body: 'DG-vs-AG Jacobian post-mortem: why DG closed in 2 days vs AG 2 months, + the
  transferable steals


  Analysis of rkirov/jacobian-fable@lean-eval (2026-07-07). Ranked reasons: (1) INTRINSIC/dominant:
  the DG contract asks for a CONCRETE object (complex torus C^g/Lambda + injective
  Abel map; NO universal property, NO representability) while challenge.lean demands
  the Albanese UP = representability-grade mathematics over arbitrary k. (2) INTRINSIC:
  over C every homological input has an elementary analytic substitute (Serre duality
  -> Miranda Laurent-tail residue pairing; sheaf cohomology -> one directed-colimit
  Cech H^1; derived functors -> one dbar-on-a-disk lemma); over arbitrary k these
  substitutes do not exist. (3) mathlib asymmetry: Analysis/Manifolds mature; AG pillars
  ABSENT (P^n coherent cohomology, EnoughInjectives for SheafOfModules, ample vocabulary,
  Altman-Kleiman, EGA IV 8.11.5). (4) elaboration friction ~100x lower in DG (one
  ULift wall + ~50 heartbeat bumps vs our instance diamonds / defeq walls / 6.4M-heartbeat
  chases). (5) ACTIONABLE: DAG geometry - DG funneled to ONE keystone (h^1 <= g) with
  a wide parallel base and NAMED-HYPOTHESIS GATING (unproven pillars as Prop classes,
  downstream builds now, ungates by inferInstance later). STEALS for AJC: (a) adelic/Laurent-tail
  Riemann-Roch (Weil repartitions; field-agnostic, no EnoughInjectives/derived functors/P^n
  cohomology) - would unlock FiniteDimensional H^1(C,O_C), finrank_eq_genus, tangentSpaceIso
  dual flip, and deg>2g-2 vanishing replacing Castelnuovo-Mumford FOR CURVES; design
  doc commissioned. (b) extend the HasPicScheme/HasAbelMap Prop-class gating to all
  remaining pillars. (c) acceptance-gist: pin challenge.lean signatures as examples
  + print-axioms audit in a ChallengeAcceptance.lean. Next action: review the adelic-RR
  lane design, then blueprint + fleet it.'
