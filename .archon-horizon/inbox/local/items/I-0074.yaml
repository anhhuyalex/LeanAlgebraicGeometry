body: '**FGA picSharp rewire LANDED (run 0008): route-(b) conventions + two standing
  caveats.**


  State after the rewire (`Picard/FGAPicRepresentability.lean`, **4 real `sorry`s**,
  all TRUE statements — Ground-verified run 0008 reconcile):


  - `picSharp C := PicSharp.relPresheaf C ⋙ forget AddCommGrpCat` (`Type (u+1)`-valued,
  REAL). `Scheme.HasRationalPoint C` = Nonempty section subtype of `C.hom`; the ONE
  genuine FGA sorry is `instHasPicScheme [HasRationalPoint C]`. The other three are
  typed-sorry carriers: `PicSchemeLocallyOfFiniteType` (Kleiman §4 `th:main`(1), true
  under the rational point) and the pre-existing Quot-blocked `HasDivFunctor` / `HasAbelMap`.

  - `instPicSharpRepresentable` proved by `choose_spec`; `groupSchemeStructure : CommGrpObj
  (PicScheme C)` proved via `CommGrpObj.ofRepresentableBy` + a `Multiplicative.ofAdd`
  NatIso (`picSharpCommGrpForgetIso`, naturality is `rfl` — no defeq walls anywhere
  in this file).

  - Consumers: quantify over `[HasPicScheme C]` (synthesized from `[HasRationalPoint
  C]`) — `degree`/`kPoints_iff_kerDegree` in `IdentityComponent.lean` now carry it.
  `Pic0Scheme C := GroupScheme.IdentityComponent (PicScheme C)` is now a real def
  (axiom-clean), gated on `PicSchemeLocallyOfFiniteType`.


  **Caveat 1 — pointless curves:** `JacobianWitness` (`Jacobian.lean`) requires the
  abelian variety $J$ to exist UNconditionally, but route (b) only builds `PicScheme`
  for pointed $C$. For a genus-$\ge 1$ curve without a rational point the eventual
  `picardJacobianWitness` proof needs Galois/étale descent from a finite extension
  where $C$ gains a point (or a pointed restatement of the north star). Not blocking
  anything now — record before anyone tries to close `picardJacobianWitness` directly.


  **Caveat 2 — `smoothProperQuotient` statement is WEAKER than Kleiman lm:qt and unprovable
  as stated:** Mathlib v4.31 has NO quasi-projectivity vocabulary, so hypothesis (2)
  of lm:qt is missing from the Lean statement; without it the statement is FALSE (Hironaka-type
  free ℤ/2 action on a smooth proper non-projective 3-fold: smooth proper equivalence
  relation, étale-quotient sheaf a non-scheme algebraic space). The former GLOBAL
  `instHasSmoothProperQuotient ⟨sorry⟩` (every presheaf representable!) was deleted
  this run (Ground-confirmed gone); the class is a use-site hypothesis only. Do NOT
  reintroduce a global instance, and do NOT try to prove the theorem as stated.'
