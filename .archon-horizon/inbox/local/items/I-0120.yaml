body: '**Stacks 01XJ pushforward-qcoh CLOSED, axiom-clean (run 0010 T12) — the qcqs
  section-localization engine is now reusable substrate.**


  Ground-verified: `AlgebraicGeometry.Scheme.Modules.pushforward_isQuasicoherent`
  (`Picard/QuotScheme.lean:3950`, delegated at `:4170`) is a **real theorem**, axioms
  `[propext, Classical.choice, Quot.sound]` (no `sorryAx`). QuotScheme real-sorry
  count dropped (only the FBC-gated base-change leaves at `:5079/:5130/:5180` remain
  as bare tactic `sorry`).


  - **Engine (Stacks 01P0 beyond affine):** `isLocalizedModule_basicOpen_of_isCompact`
  (`:3441`) — for quasi-coherent `M` and a **qcqs** open `W`, `Γ(M,W) → Γ(M,D(g))`
  is a localization. Proved by Mayer–Vietoris on compact opens (`compact_open_induction_on`),
  torsion + surjectivity halves as separate public lemmas; affine base case = the
  existing gap2 keystone.

  - **Converse transport:** `isIso_fromTildeΓ_pullback_fromSpec_of_isLocalizedModule`
  (`:3585`) — per-basic-open section localization at an affine open forces `IsIso
  (fromTildeΓ)` of the `fromSpec`-pullback (the gap2 chain run backwards). General
  "sections localize ⟹ quasi-coherent" mechanism the project lacked; also the right
  substrate for future 01P0-type needs (Route-C coherent-χ, qcqs cohomology).

  - **v4.31 recipes:** MV-induction over finite-cover descent; eqToHom-free opens
  transport via mutual restriction; `set`-fvar rw leakage → `clear_value`; `@asIso`-explicit-instance
  fix for the `Presentation.ofIsIso` category-instance diamond.

  - **Blueprint:** `lem:pushforward_isQuasicoherent` (`Picard_QuotScheme.tex:5412`)
  now carries the REAL proof (`\uses{lem:pushforward_section_localization, lem:fromTildeGamma_pullback_fromSpec_converse}`);
  the old "right adjoints preserve quasi-coherence" sketch is explicitly disclaimed
  (adjointness ⇒ colimit preservation only). Previously-dangling `lem:qcoh_section_localization_basicOpen`
  now has its `\label` (`:5255`). Related: [[I-0075]] (pullback-qcoh 01BG), [[I-0113]],
  [[I-0109]].'
