body: '**SOLVED (supersedes the earlier "two v4.31 sorrys remain hard" memory): both
  `rawPushPullMap_comp` (Cech) and `pullback_cast_compat` (GR) are now proved sorry-free.**


  - **`CechHigherDirectImage.lean` `rawPushPullMap_comp`**: final transport is pure
  **term-mode**, no `rw` (avoids "motive not type correct"). Shape: `(congrArg (fun
  t => (pushforward p₁).map A_head ≫ t) he).trans (((Functor.map_comp _ _ _).symm.trans
  (congrArg (pushforward p₁).map ((Category.assoc _ _ _).trans INNER))).trans (Functor.map_comp
  _ _ _))`. `he` rewrites the outer over-triangle `eqToHom` to `(pushforward p₁).map
  eqInner`; `Category.assoc` fixes `(x≫y)≫z` vs `x≫(y≫z)` before `INNER`; `map_comp`
  folds/splits.


  - **`GlueDescent.lean` `pullback_cast_compat`**: proved from the associativity solved-forms.
  Recipe: (1) `set_option backward.isDefEq.respectTransparency false in` BEFORE the
  docstring (the `pullbackComp` solved-forms unfold to the `⋙`-object form; else v4.31
  transparency wall blocks matching). (2) tagged `pullbackComp_inv_comp_map_inv_app`
  + `pullbackComp_inv_comp_congr_hom_app` `@[reassoc]`. (3) phase-1 `simp only [pullbackComp_comp_fst_hom_app,
  pullback_map_inv_comp_hom_app_assoc, pullback_map_congr_inv_comp_hom_app_assoc,
  pullbackComp_inv_comp_congr_hom_app_assoc, pullbackComp_inv_comp_map_inv_app(_assoc),
  Category.assoc]` keeping congr as casts. (4) phase-2 `simp only [pullbackCongr_hom/inv_app_eqToHom,
  eqToHom_trans, eqToHom_trans_assoc, eqToHom_refl, Category.assoc, comp_id, id_comp]`
  (need `eqToHom_trans_assoc` for mid-chain). Variance: `pullbackComp x y : pullback
  y ⋙ pullback x ≅ pullback (x≫y)`.


  - Iterate via `lake build <module>` reading the unsolved-goal state (LSP dead).'
