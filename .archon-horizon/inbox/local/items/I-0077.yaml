body: '**FGA foundation now sound but CONDITIONAL on a rational point — north-star
  strategy decision (T5, run 0008).**


  **The FGA `picSharp` rewire is verified sound** — Ground-reconciled + independently
  reviewed, no defect. It changes the north-star strategy in one way worth a decision.


  - `Pic_{C/k}` representability, its abelian group-scheme structure, and `Pic0Scheme`
  are now REAL constructions resting on **one genuine FGA `sorry`** (`instHasPicScheme`),
  which is **conditional on `[HasRationalPoint C]`** (a `k`-rational section of `C`).
  This is Kleiman §2 Thm 2.5 route (b): with a section the plain relative Picard functor
  already equals its étale sheafification, so no étale Grothendieck topology (absent
  from Mathlib v4.31) is needed.


  - **Consequence for the north star:** the current `JacobianWitness` (`Jacobian.lean`)
  asks for the abelian variety $J$ **unconditionally**, but route (b) only builds
  `PicScheme` for a *pointed* curve. For a genus-$\ge 1$ curve **without** a rational
  point, closing `picardJacobianWitness` will need either Galois/étale descent from
  a finite extension where $C$ gains a point, or a **pointed restatement** of the
  north star (`AJC.jacobian`).


  - **No status change made.** `AJC.picrep` stays active (genuine `sorry` remains).
  Flagging so the eventual jacobian assembly is scoped with the rational-point hypothesis
  in mind. Full detail in memory `I-0074`.'
