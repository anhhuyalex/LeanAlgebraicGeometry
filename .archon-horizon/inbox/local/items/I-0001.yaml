body: 'GR full build blocked: ~12 pre-existing v4.31 errors in SectionGradedRing +
  GrassmannianQuot


  The roadmap tracked only **GR 3 sorrys** (all in `GlueDescent.lean`), but a full
  `lake build` of GR-Quot-Closure fails with **~12 hard compile errors** (not sorrys)
  in files the roadmap treated as done:


  - `SectionGradedRing.lean` — **8 errors** (lines 1546, 1664, 1704, 1888, 1935, 2640,
  3173, 3840). Deep **v4.31 monoidal/braided-category API** breaks: braiding naturality
  (`β_`, `▷`, `◁`), `Localization.Monoidal.μ` isos, `sheafificationCounitIso` `rfl`s,
  `synthInstance` failures. Its `TO_USER.md` still claims this file is "sorry-free".

  - `GrassmannianQuot.lean` — **4 errors** (lines 835, 912, 2396, 3350): `rw` "did
  not find pattern" + `simp made no progress`.


  **Cause:** these were almost certainly masked by **stale oleans** from before the
  v4.31 bump; the errors surface only on a clean rebuild. `SectionGradedRing.lean`
  does **not** import `GlueDescent`, so they are independent of this round''s `GlueDescent`
  edits (proof-body-only, same signatures).


  **Impact:** GR-Quot-Closure cannot go green until these are migrated. This is a
  larger, separate task than "restore the 3 GlueDescent sorrys".


  **Next action:** schedule a dedicated v4.31 monoidal-API migration pass over `SectionGradedRing.lean`
  and `GrassmannianQuot.lean`.'
