body: '**T13 genus-0 / Route-C retirement: `WeilDivisor.lean` is DUAL-PURPOSE — carve,
  do not delete.**


  The genus split is *already* mostly retired: `Genus0BaseObjects.lean`, `AbelianVarietyRigidity.lean`,
  and `genusZeroWitness`/`positiveGenusWitness` are deleted; `Jacobian C` is uniform
  via `picardJacobianWitness`. The remaining T13 work is residue cleanup, with one
  dependency trap.


  **Trap — `AlgebraicJacobian/RiemannRoch/WeilDivisor.lean` serves two masters.**


  - Its `Scheme.PrimeDivisor` type and `Scheme.RationalMap.order : X.functionField
  → ℤ` valuation are the codim-1 substrate that `Albanese/CodimOneExtension.lean`
  (`ALB.codim1`, live north-star path) imports and uses — the `coheight = 1` convention
  (`CodimOneExtension.lean:177`) and the order-valuation appeal (`:1823`).

  - The `degree` / `degree_hom` / `principal_degree_zero` / `positivePart` / RR→ℙ¹
  block (5 sorries, `-- Route C PAUSE`) exists only to prove the now-obsolete `genusZero_curve_iso_P1`.
  That block is the Route-C / genus-0 dead weight.


  **Consequence:** a wholesale delete of `WeilDivisor.lean` breaks the codim-1 extension
  build. The dependency-safe shape is a surgical carve of the RR/degree/ℙ¹ portion
  plus the file header (which frames the whole file around `genusZero_curve_iso_P1`),
  retaining the `PrimeDivisor`/`order` substrate.


  **Also live, not genus-0:** `RigidityLemma.lean` and blueprint `AbelianVarietyRigidity.tex`
  are the sorry-free rigidity-lemma + Milne §I.1–I.3 corollaries used by the uniform
  Albanese construction; only their "feed the genus-0 base case (Route C)" prose is
  stale — clean the prose, keep the math.'
