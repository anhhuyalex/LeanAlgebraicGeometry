objective: 'Close the full Grothendieck–Altman–Kleiman Quot scheme construction in
  `AlgebraicJacobian/Picard/QuotScheme.lean` (the **A.2.b** chapter) sorry-free. This
  is the projective S-scheme `Quot^{Φ,L}_{E/X/S}` representing the functor of T-flat
  coherent quotients of `E_T` with Hilbert polynomial Φ on every fiber — via Nitsure
  §5: boundedness ⟶ Grassmannian embedding ⟶ flattening stratification ⟶ valuative
  criterion. The file is currently a 6-declaration skeleton with genuine structural
  sorries (roadmap counts QuotScheme ×14; `grep sorry` shows ~39 lines, inflated by
  docstrings). Residual non-migration sorries in `GrassmannianQuot.lean` (the `Grassmannian.representable`
  endgame, distinct from the already-sorry-free `Grassmannian.represents`) are in
  scope as the embedding input.


  NOTE — this is NOT a separate deliverable from GR-Quot-Closure: that subproject
  completed the *Grassmannian representability* leg (`Grassmannian.represents`, section
  graded ring/module, cell atlas), now sorry-free in-tree. The full Quot scheme `Quot^{Φ,L}`
  was never in its scope and remains open here.


  ⚠️ OVERLAP WITH T12: T12 ("Picard scheme representability (FGA)") already lists
  `QuotScheme.lean` and `GrassmannianQuot.lean` in its write scope as part of the
  broader `AJC.picrep` cone (5 files). T14 is the QuotScheme-focused SUBSET of T12,
  offered as a narrower push you can launch independently. Do NOT run T12 and T14
  concurrently — they would race on the same files. Launch one or the other; if T14
  lands first, T12''s remaining scope shrinks to FGAPicRepresentability + FlatteningStratification
  + RelPicFunctor.


  DONE WHEN: `QuotScheme.lean` sorry-free (Quot^{Φ,L} representability holds), `lake
  build` green, `#print axioms` clean bar explicitly-frozen upstream carriers; roadmap
  `AJC.picrep` advances.'
