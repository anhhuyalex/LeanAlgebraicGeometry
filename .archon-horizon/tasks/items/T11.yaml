id: T11
project: Algebraic-Jacobian-Challenge
objective: 'Prove the codimension-one extension of rational maps into an abelian variety
  (Weil / Hartshorne condition $(\ast)$): a rational map $f\colon C \dashrightarrow
  A$ from a smooth curve to an abelian variety is defined in codimension one, hence

  $$f\ \text{extends to a morphism}\ C \to A\quad(\text{the locus of indeterminacy
  has codim} \ge 2 = \varnothing\ \text{on a curve}).$$'
