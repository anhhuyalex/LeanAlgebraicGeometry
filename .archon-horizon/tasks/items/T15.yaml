id: T15
project: Algebraic-Jacobian-Challenge
objective: 'Close the relative Picard-scheme representability theorem AlgebraicGeometry.Scheme.instHasPicScheme
  (Picard/FGAPicRepresentability.lean) — the north-star AJC.picrep root: for a smooth
  proper geometrically integral curve C/k with a k-rational point, the relative Picard
  functor picSharp C is representable by a k-scheme locally of finite type. PREREQUISITE:
  T14 (the ampleness / projective-morphism / Serre-finiteness foundation) — do not
  start until T14''s vocabulary (P(n;S), O(1), projective-with-L predicate, sectionGradedModule_fg,
  quot_boundedness) is available. instHasPicScheme is a TRUE theorem (Kleiman th:main
  + cor:algsch via §2 Thm 2.5), not a trap; keep the [HasRationalPoint C] hypothesis
  (without a section picSharp is not even a Zariski sheaf).


  CHAIN (dependency-ordered):

  1. Restate thm:quot_representable / Scheme.QuotScheme faithfully per I-0118 (the
  pinned statement with only [IsProper pi] is false-or-open — Hironaka non-projective
  3-fold). Use T14''s projective-with-L hypothesis (∃ n, ∃ closed immersion i : X
  ↪ P(n;S) over S with L ≅ i^* O(1); E finitely presented). Flip the blueprint node
  thm:quot_representable from \notready. Then PROVE it (Nitsure §5): boundedness (T14
  lem:quot_boundedness / lem:sectionGradedModule_fg) → embed into a Grassmannian by
  pushing forward twists (the sorry-free Scheme.Grassmannian.represents / .representable
  is in-tree) → flattening stratification (Picard/FlatteningStratification.lean, sorry-free)
  → valuative criterion for the closed embedding (blueprint lem:quot_valuative_criterion).

  2. Finish the Quot base-change substrate leaves still standing after the current
  session (all honest, standard, no new foundation needed): Modules.pullbackTensorMap_isIso
  (QuotFunctorDef.lean, Stacks 01CD, canonical pullback-tensor comparison is iso),
  gammaFiber_finrank_baseChange_field (QuotFunctorDef.lean, Stacks 02KH i=0 over a
  residue field), pullback_baseMap_sectionLinearEquiv_of_quasiCompact (QuotScheme.lean,
  the Stacks 02KE H⁰ finite-cover-equalizer heart — two bricks already proved in-file),
  Modules.pullback_kernel_isLocallyTrivial (DivFunctorDef.lean, Kleiman §3 Tor_1 divisor
  leaf).

  3. Div_{C/k} = open subfunctor of Hilb = Quot(O_C) (Kleiman §3 th:repDiv, openness
  of the effective-divisor locus + properness of the projection). Then the REAL Abel
  map D ↦ class of (ker q)⁻¹ in relPresheaf, closing instHasAbelMap (naturality is
  the DivFunctorDef divisor leaf); rewire abelMap to a real def.

  4. Kleiman §2 Thm 2.5: under the rational point + O_T = pi_{T*}O universally (proper
  geometrically integral fibres), picSharp C is an étale (hence Zariski) sheaf coinciding
  with its sheafification — the concretely usable form is IsZariskiSheafOver picSharp
  so Scheme.representable_of_openCover (sorry-free, in-tree) applies.

  5. Altman–Kleiman smooth-proper quotient descent (blueprint lem:smooth_proper_quotient
  with REAL content, consuming T14 quasi-projectivity): represent Pic as the quotient
  of Div by the Abel fibration, discharging the HasSmoothProperQuotient use-site instance
  and closing instHasPicScheme. The strengthened HasPicScheme existential already
  carries LocallyOfFiniteType, so instPicSchemeLocallyOfFiniteType follows.


  Verify axiom-clean with lake build + lean_verify at each closure; #print axioms
  instHasPicScheme should end at [propext, Classical.choice, Quot.sound]. Update the
  roadmap AJC.picrep line and the T12 cone comments when the root closes.'
