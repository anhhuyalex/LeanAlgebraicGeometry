objective: 'Reconcile the project''s strategy scaffolding with the north-star statement,
  which has ALREADY abolished the genus split. `Jacobian.lean` (lines 22-24, 178-182)
  states verbatim there is **no** genus=0 / genus>0 split: the witness is uniform
  in the genus via the FGA Picard identity component `Pic⁰_{C/k}`, and genus 0 falls
  out automatically (H¹(C,𝒪_C)=0 ⟹ Pic⁰=Spec k). The former `genusZeroWitness` / `positiveGenusWitness`
  lane and the bespoke Route-C (Riemann–Roch) genus-0 base case were removed from
  the witness — but the surrounding docs/code have NOT caught up.


  Two-part task (AUDIT-AND-RECONCILE — verify before deleting; not a blind delete):


  (1) FRAMING/DOCS. Rewrite the ~11 file headers that still call themselves "the positive-genus
  arm of nonempty_jacobianWitness" (QuotScheme, IdentityComponent, FlatteningStratification,
  RelativeSpec, RelPicFunctor, LineBundlePullback, TensorObjSubstrate, Albanese/AlbaneseUP,
  Albanese/CodimOneExtension, Albanese/Thm32RationalMapExtension, Albanese/AuslanderBuchsbaum)
  to the correct uniform framing (e.g. "the FGA/Picard arm", drop "positive-genus").
  Update roadmap.md: retire the "Route C paused" line under "Smooth proper curves",
  and re-caption the "Genus-0 base + Weil-divisor riders" item.


  (2) DEAD-CODE vs LOAD-BEARING. CAREFULLY distinguish: `Genus0BaseObjects/*` (BareScheme,
  Points) is NOT dead — the roadmap records it holds load-bearing base-scheme instances
  (ℙ¹ = ProjectiveLineBar, grading, Over, standard-smooth) that Albanese''s carve
  had to restore from the parent; keep the objects, only fix the misleading name/docs
  if warranted. The genuinely-removable dead lane is the Route-C Riemann–Roch remnant:
  `RiemannRoch/WeilDivisor.lean` (the ×2 residual sorries + the literal `-- Route
  C PAUSE` block) and the `RigidityLemma.lean` "genus-0 base case (Route C)" reference.
  Build-verify (`lake build` green) that removing each remnant does not break the
  uniform witness before deleting; if a remnant turns out to be load-bearing, keep
  it and document why instead.


  DONE WHEN: no source file or roadmap entry describes a genus-0/positive-genus/Route-C
  split that the north star has retired; `lake build` green; `#print axioms` on `nonempty_jacobianWitness`
  unchanged (no new axioms, no regressions). Coordinate with T12 (owns the Picard/*.lean
  bodies) — this task edits headers/docs there, not proof bodies; sequence so the
  two do not race on the same files.'
