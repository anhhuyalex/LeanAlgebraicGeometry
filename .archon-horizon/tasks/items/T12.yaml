id: T12
project: Algebraic-Jacobian-Challenge
objective: 'Prove **representability of the relative Picard functor by a scheme**
  (FGA / Grothendieck FGA 232) — roadmap cone `AJC.picrep`. For a smooth proper geometrically
  irreducible curve $C/k$ with a $k$-rational point, the relative Picard functor is
  representable by a $k$-scheme locally of finite type:


  $$\underline{\mathrm{Pic}}_{C/k}\ \text{representable by a scheme, locally of finite
  type}.$$


  This is the step AFTER T2 (flat base change, its cohomological input — DONE) and
  T8 (the v4.31.0 migration-debt cleanup that unblocks these files but DELIBERATELY
  LEFT the structural stubs untouched). It closes exactly those structural, non-migration
  sorries.


  Cone (per `AJC.picrep`): the Quot scheme endgame, the Grassmannian embedding, and
  the flattening stratification feed the representability theorem.


  Target declarations / files (write scope):

  - `AlgebraicJacobian/Picard/FGAPicRepresentability.lean` — the top representability
  statement `FGAPicRepresentability` (Pic_{C/k} representable, locally of finite type).

  - `AlgebraicJacobian/Picard/QuotScheme.lean` — the Quot endgame: `hilbertPolynomial`,
  `QuotFunctor`, and the `Quot` representability, plus the ~12 χ-blocked structural
  stubs T8 left intact.

  - `AlgebraicJacobian/Picard/GrassmannianQuot.lean` — `Grassmannian.representable`
  and the remaining structural (non-v4.31) sorries.

  - `AlgebraicJacobian/Picard/FlatteningStratification.lean` — the flattening-stratification
  input.

  - `AlgebraicJacobian/Picard/RelPicFunctor.lean` — the relative Picard functor whose
  representability is the goal.


  Consumes: T2''s `IsIso bareBC` / Čech higher-direct-image machinery for the cohomological
  (χ / Hilbert polynomial) inputs. Do NOT re-open T2''s exclusive files (`Cohomology/FlatBaseChange*`,
  `Cohomology/CechHigherDirectImageUnconditional.lean`).


  Interfaces with `Picard/IdentityComponent.lean` (T5, in progress) downstream: representability
  + local finite type is the hypothesis IdentityComponent needs, but IdentityComponent
  is NOT in this write scope — freeze its signatures.


  DONE WHEN: `FGAPicRepresentability` holds sorry-free, `lake build` green, `#print
  axioms` clean bar any explicitly-frozen upstream carriers; roadmap `AJC.picrep`
  advances/closes.'
