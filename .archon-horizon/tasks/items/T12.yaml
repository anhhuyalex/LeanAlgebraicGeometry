project: Algebraic-Jacobian-Challenge
objective: 'Prove **representability of the relative Picard functor by a scheme**
  (FGA / Grothendieck FGA 232 / Theorem 4.8 in Kleiman) — roadmap cone `AJC.picrep`.
  For a smooth proper geometrically irreducible curve $C/k$ with a $k$-rational point,
  the relative Picard functor is representable by a $k$-scheme locally of finite type:


  $$\underline{\mathrm{Pic}}_{C/k}\ \text{representable by a scheme, locally of finite
  type}.$$'
