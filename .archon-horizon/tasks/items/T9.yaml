id: T9
project: Algebraic-Jacobian-Challenge
objective: 'If representability is not yet proven, don''t try to fill its sorries,
  this is another task, just work on the albanese part. For a smooth proper geometrically
  irreducible curve $C/k$ with $k$-rational point, the Jacobian $J = \mathrm{Pic}^{0}_{C/k}$
  satisfies the Albanese universal property

  $$\forall\, (A,a)\ \text{pointed abelian variety},\quad \mathrm{Hom}_{\ast}(C,A)\
  \xrightarrow{\ \sim\ }\ \mathrm{Hom}_{\mathrm{AbVar}}(J,A),$$

  and is the unique such object up to canonical isomorphism.


  You may read the Albanese subproject to see whether there has already been progress
  not updated with this project.'
