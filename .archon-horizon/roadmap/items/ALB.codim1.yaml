summary: '**Codim-one & Thm 3.2 rational-map extension.** A rational map from a smooth
  variety to an abelian variety extends off a locus of codimension $\ge 2$:

  $$X\dashrightarrow A\ \Longrightarrow\ X\setminus Z\to A,\ \operatorname{codim}Z\ge
  2.$$

  Milne 3.1 (codim-$\ge2$ indeterminacy, valuative) and the empty-locus extension
  theorem are proved; `Thm32RationalMapExtension` is sorry-free. The chain is now
  gated on the single remaining leaf **Milne 3.3** (`indeterminacy_pure_codim_one_into_grpScheme`):
  a pure-codim-$1$ indeterminacy point of a map into a group scheme forces the difference-map
  contradiction.

  '
