summary: '**Albanese universal property of $\mathrm{Pic}^{0}$** (Milne III §6, Prop
  6.1). Every pointed map to an abelian variety factors uniquely through the Jacobian:

  $$\forall\,\phi:(C,p)\to A,\ \exists!\ \bar{\phi}:\mathrm{Pic}^{0}_{C/k}\to A\ \text{with}\
  \phi=\bar\phi\circ\mathrm{aj}.$$

  `AlbaneseUP` (×7): the headline `Pic.albaneseUP` + universal-map descent.

  '
