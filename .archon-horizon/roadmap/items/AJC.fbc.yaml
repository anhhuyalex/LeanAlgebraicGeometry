summary: '**Flat base change (Stacks 02KH), Čech route.** For flat $g$:

  $$g^{*}R^{i}f_{*}\mathcal{F}\;\xrightarrow{\ \sim\ }\;R^{i}f''_{*}\,g''^{*}\mathcal{F}.$$

  Homology machinery sorry-free (separated, no spectral sequence). **Beck–Chevalley
  heart of 02KG closed**: `openImmersion_beckChevalley`/`bareBC`, the affine essential-image
  member node (`Cohomology/AffinePushPullEssImage.lean`, `twisted_cech_nerve_per_sigma`),
  and the **per-$\sigma$ RHS tilde leaf** `pushPullObj_coverInter_baseChanged_pushforward_iso_tilde`
  are sorry-free and axiom-clean. Pullback along an **arbitrary** scheme morphism
  now preserves quasi-coherence (`Cohomology/PullbackQuasicoherent.lean`, Stacks 01BG).
  Residual toward `cechComplex_baseChange_iso` — **4 leaf sorries**: the `pushPullObj_coverInter_baseChange`
  affine-gap heart (`lem:coverinter_rhs_tensor_rewrite`), the two cosimplicial `naturality`
  fields, and `pullback_preservesFiniteLimits` (flat $g^{*}$ left-exact — **not**
  an adjointness freebie, see `I-0076`). See task **T2**.

  '
