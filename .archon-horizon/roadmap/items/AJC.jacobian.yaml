summary: '**North star.** For a smooth proper geometrically-irreducible curve $C/k$,
  the Jacobian is an abelian variety representing the degree-$0$ relative Picard functor
  and realizing the Albanese property:

  $$\mathrm{Pic}^{0}_{C/k}(T)\;=\;\ker\!\big(\mathrm{Pic}(C\times_{k}T)\to\mathrm{Pic}(C)\big),\qquad
  \dim_{k}\mathrm{Pic}^{0}_{C/k}=g.$$

  Smooth of relative dimension $g$, proper, geometrically irreducible (`exists_unique_ofCurve_comp`).

  '
