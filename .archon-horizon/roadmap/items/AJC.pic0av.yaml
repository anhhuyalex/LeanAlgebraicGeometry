summary: '**$\mathrm{Pic}^{0}$ is an abelian variety (A.3).** Kleiman §5 tangent-space
  identification, then structure:

  $$T_{e}\,\mathrm{Pic}^{0}_{C/k}\;\cong\;H^{1}(C,\mathcal{O}_{C}),\qquad \dim=g.$$

  Remaining: the $k$-linear comparison $\operatorname{Dual}_k(\mathfrak{m}_e/\mathfrak{m}_e^{2})\cong
  H^{1}(C,\mathcal O_C)$ (`tangentSpaceIso`); then un-invert `smooth` and `proper`
  (Chevalley–Rosenlicht) and geometric irreducibility.

  '
