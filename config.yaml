workspace:
  name: JacobianChallenge
  state_dir: .archon-horizon
  # Maximum number of collaboration rounds the orchestrator will allow before halting.
  rounds: 8
  ground_agent:
    harness: ground-default
  horizon_agent:
    harness: horizon-fable5
  scheduler:
    # How many horizon agents can run simultaneously.
    max_parallel_sessions: 5

# Lean libraries the agents and the `horizon search` index should know about.
# mathlib is included by default. Add more with a GitHub shorthand or a full git
# url; `name` alone works for well-known libraries.
external_libraries:
  - name: mathlib
    rev: v4.31.0
  # - name: my-lib            # clones https://github.com/owner/my-lib by default
  #   github: owner/my-lib
  #   rev: main
  # - name: vendored          # already checked out under the workspace
  #   path: vendor/vendored
  #   git: https://example.com/vendored.git

references:
  transcription:
    # Page-level PDF transcription defaults to the Ground subagent harness.
    # Override both fields to pin a cheap vision-capable model.
    # harness: ground-default
    # model: <vision-capable-model>

harnesses:
  ground-default:
    kind: "claude-code"
    model: claude-opus-4-8
    options:
      # Effort → thinking budget — 'default' leaves Claude Code's own default.
      # default | low | medium | high | xhigh | max | ultracode  (or a raw integer)
      effort: default
      # backend: default   # default | vscode | desktop | claude-p
  horizon-default:
    kind: "claude-code"
    model: claude-opus-4-8
    options:
      # Effort → thinking budget — 'default' leaves Claude Code's own default.
      # default | low | medium | high | xhigh | max | ultracode  (or a raw integer)
      effort: ultracode
      # backend: default   # default | vscode | desktop | claude-p
  horizon-fable5:
    kind: "claude-code"
    model: claude-fable-5
    options:
      effort: high

github:
  enabled: true
  repo: AxelDlv00/LeanAlgebraicGeometry-Horizon
projects:
  Algebraic-Jacobian-Challenge:
    path: MainProjects/Algebraic-Jacobian-Challenge
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Algebraic-Jacobian-Challenge.git
    build:
      command: lake build
  Line-Bundle-Comparison-Iso:
    path: SubProjects/Line-Bundle-Comparison-Iso
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Line-Bundle-Comparison-Iso.git
