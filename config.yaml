workspace:
  name: JacobianChallenge
  state_dir: .archon-horizon
  rounds: 5
  ground_agent:
    harness: ground-default
  horizon_agent:
    harness: horizon-default
  scheduler:
    max_parallel_sessions: 5
external_libraries:
- name: mathlib
  rev: v4.31.0
references:
  transcription: null
harnesses:
  ground-default:
    kind: claude-code
    model: claude-opus-4-8
  horizon-default:
    kind: claude-code
    model: fable5
github:
  enabled: true
  repo: AxelDlv00/LeanAlgebraicGeometry-Horizon
projects:
  Algebraic-Jacobian-Challenge:
    path: MainProjects/Algebraic-Jacobian-Challenge
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Algebraic-Jacobian-Challenge.git
    build:
      command: lake build
  Line-Bundle-Comparison-Iso:
    path: SubProjects/Line-Bundle-Comparison-Iso
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Line-Bundle-Comparison-Iso.git
    build:
      command: lake build
  Albanese:
    path: SubProjects/Albanese
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Albanese.git
    build:
      command: lake build
  Cech-Cohomology:
    path: SubProjects/Cech-Cohomology
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/Cech-Cohomology.git
    build:
      command: lake build
  GR-Quot-Closure:
    path: SubProjects/GR-Quot-Closure
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/GR-Quot-Closure.git
    build:
      command: lake build
  MR0555258-Compactifying-Picard:
    path: SubProjects/RelatedPapersFormalisation/MR0555258-Compactifying-Picard
    type: lean
    vcs:
      enabled: true
      git_dir: .archon-horizon/vcs/MR0555258-Compactifying-Picard.git
    build:
      command: lake build
