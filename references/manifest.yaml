  # ---------------------------------------------------------------------------
  # Adelic Riemann-Roch lane (added 2026-07-07).
  #
  # PRIMARY target requested: Stichtenoth, "Algebraic Function Fields and Codes"
  # (Springer GTM 254, 2nd ed. 2009), Chapter 1 -- the adele / Weil-differential
  # proof of Riemann-Roch over an arbitrary constant field. FALLBACK requested:
  # Serre, GACC (Hermann 1959), Chap. II. BOTH are paywalled and NOT legitimately
  # openly downloadable (only a 16-page Springer reading-sample excerpt, a Google
  # Books preview, and an Internet-Archive controlled-lending copy exist for
  # Stichtenoth; Serre GACC is sold only commercially). Shadow-library mirrors
  # (dokumen.pub, epdf.pub, ...) were deliberately NOT fetched.
  #
  # Instead, four legitimately open sources that reproduce the SAME adele /
  # Weil-differential development (over an arbitrary, not-necessarily-algebraically-
  # closed constant field) were fetched and verified. The Papaioannou notes are
  # the closest surrogate: an explicitly Stichtenoth-following, self-contained
  # adelic proof of Riemann-Roch. NOTE: none of these use Stichtenoth's exact
  # section/theorem numbering -- cite each by its own internal numbers.
  # ---------------------------------------------------------------------------

  - slug: papaioannou-algebraic-rr
    title: "An algebraic approach to the Riemann-Roch theorem and the arithmetic theory of function fields"
    authors: [Athanasios Papaioannou]
    year: 2005
    source: "http://www.fen.bilkent.edu.tr/~franz/mat/Riemann-Roch.pdf (expository notes openly hosted on F. Lemmermeyer's Bilkent University faculty page; PDF creation date 2005-02-06)"
    retrieved: 2026-07-07
    status: ok
    files:
      - { path: papaioannou-algebraic-rr/papaioannou-algebraic-rr.pdf, format: pdf }
    read: >-
      Text-extractable PDF, 15 pp. PRIMARY open surrogate for Stichtenoth GTM 254
      Ch. 1 (adele / Weil-differential proof of Riemann-Roch over an arbitrary
      constant field). Author states the exposition is "inspired by the treatment
      in Stichtenoth's [ST] (=Alg. Function Fields and Codes) and Iwasawa's [IW]
      books"; part 2 follows Rosen [RO]. Section map: 1.1 valuations / valuation
      rings / places; 1.2 Weak Approximation Theorem; 1.3 divisors, dim D = ell(D),
      genus g; 1.4 THE adelic RR proof -- Def 1.11 adele space A_F and A_F(D),
      Weil differentials Omega_F, Thm 1.18 (Riemann inequality dim D >= deg D + 1 - g),
      Lemma 1.21/1.22, Thm 1.23 dim_F Omega_F = 1, Thm 1.25 (duality / RR),
      Cor 1.28 canonical divisor W has deg 2g-2 and dim g, Cor 1.29 RR sharp for
      deg D >= 2g-1. Section 2 = Hurwitz genus formula + arithmetic theory. Cite
      by its own Thm/Def numbers (they do NOT match Stichtenoth's).
    topics: [function-fields, adeles, weil-differentials, riemann-roch, genus, canonical-divisor, valuations, places, divisors, index-of-specialty]

  - slug: cff-curves-function-fields
    title: "Curves and Function Fields (course notes, 'list of claims')"
    authors: [Jan Zemlicka]
    year: 2022
    source: "https://www2.karlin.mff.cuni.cz/~zemlicka/21-22/CFF.pdf (Charles University Prague, course 'Curves and Function Fields' 2021/22; compiled 2023-03-06)"
    retrieved: 2026-07-07
    status: ok
    files:
      - { path: cff-curves-function-fields/cff-curves-function-fields.pdf, format: pdf }
    read: >-
      Text-extractable PDF, 24 pp. Statement-level ("list of claims") companion
      covering the full arc over a general constant field ~K with [~K:K] finite.
      Numbering parallels Stichtenoth: sec.11 Weak/Strong Approximation; sec.12
      divisors, L(A), dim_{L/K} A, degree, deg((s))=0, linear equivalence; sec.13
      Weil differentials Omega_{L/K}, canonical divisor W (Lemma 13.3: unique W
      with omega); THEOREM 14.1 (Riemann-Roch: l(A) = deg A + 1 - g + l(W-A)),
      Cor 14.2 (l(W)=g, deg W = 2g-2), Cor 14.3 (RR sharp for deg A >= 2g-1);
      sec.15 elliptic function fields / group law. Terse (few proofs); use
      alongside papaioannou-algebraic-rr and vater-weil-differentials for proofs.
    topics: [function-fields, weil-differentials, riemann-roch, divisors, canonical-divisor, approximation-theorem, genus, elliptic-function-field]

  - slug: vater-weil-differentials
    title: "Weil differentials (diploma thesis)"
    authors: [Ondrej Vater]
    year: 2015
    source: "https://dspace.cuni.cz/handle/20.500.11956/62611 (Charles University Prague, Dept. of Algebra, diploma thesis; supervisor Ales Drapal; DPTX_2012_2_11320; PDF dated 2015-05-12)"
    retrieved: 2026-07-07
    status: ok
    files:
      - { path: vater-weil-differentials/vater-weil-differentials.pdf, format: pdf }
    read: >-
      Text-extractable PDF, 114 pp (English body, Czech abstract). Comprehensive,
      explicitly "built upon [1]" = Stichtenoth GTM 254, reusing his exact notation
      (places P_F, valuation rings O_P, degree, field of constants ~K, Weil
      differentials Omega_F, local components omega_P). Ch.1 recaps Stichtenoth
      Ch.1/Ch.3 with proofs (valuations, places, divisors, rational + elliptic
      function fields, the distinguished Weil differential eta of K(x)); Ch.3-5
      give the deep Weil-differential machinery -- local components, residues,
      cotrace and Different, derivations, completion of a valued field, P-adic
      completion. Best source for detailed proofs of the Weil-differential /
      local-component theory underlying the duality theorem.
    topics: [function-fields, weil-differentials, local-components, residues, different, cotrace, valuations, completions]

  - slug: scheidler-function-fields
    title: "An Introduction to Function Fields (PIMS summer-school lecture slides)"
    authors: [Renate Scheidler]
    year: 2021
    source: "https://cspages.ucalgary.ca/~rscheidl/pims/handouts/main.pdf (University of Calgary; PIMS Summer School 'Inclusive Paths to Number Theory', Aug 2021)"
    retrieved: 2026-07-07
    status: ok
    files:
      - { path: scheidler-function-fields/scheidler-function-fields.pdf, format: pdf }
    read: >-
      Text-extractable Beamer slides, 95 pp. FOUNDATIONS ONLY (Stichtenoth 1.1/1.3
      analog over a general constant field): valuation theory, places, degree,
      function fields, divisors and class groups, decomposition of places, genus
      (defined via the Different / Hurwitz, NOT via adeles), genus-0/1 and
      hyperelliptic function fields. Does NOT cover the adele space, Weil
      differentials, or the Riemann-Roch theorem -- use only for the
      places/valuations/divisors foundations; the adelic RR proof is in
      papaioannou-algebraic-rr / cff-curves-function-fields / vater-weil-differentials.
    topics: [function-fields, valuations, places, divisors, class-group, genus, hyperelliptic]
