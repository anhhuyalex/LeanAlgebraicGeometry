m:generic-flatness-algebra": {"id": "lem:generic-flatness-algebra", "type": "lemma", "title": "Algebraic generic flatness", "chapter": "Generic Flatness and the Flattening Stratification", "statement": "\\textit{Source: Nitsure, Lemma (Generic Flatness), §4.}\n  Let \\(A\\) be a noetherian domain and \\(B\\) a finite-type \\(A\\)-algebra. Let\n  \\(M\\) be a finite \\(B\\)-module. Then there exists a nonzero \\(f\\in A\\) such that\n  the localisation \\(M_f\\) is a free module over \\(A_f\\).", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.genericFlatness_algebra", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Let \\(K\\) be the quotient field of \\(A\\) and put \\(B_K = K\\ot_A B\\),\n  \\(M_K = K\\ot_A M\\); then \\(B_K\\) is a finite-type \\(K\\)-algebra and \\(M_K\\) is a\n  finite \\(B_K\\)-module. Let \\(n\\) be the dimension of the support of \\(M_K\\) over\n  \\(\\spec B_K\\). We argue by induction on \\(n\\).\n\n  \\emph{Base case \\(n=-1\\)}, i.e.\\ \\(M_K=0\\). Since \\(M_K = S^{-1}M\\) with\n  \\(S = A\\setminus\\{0\\}\\), every element of \\(M\\) is annihilated by a nonzero\n  element of \\(A\\). Taking a finite generating set and a common multiple of the\n  corresponding annihilators yields a nonzero \\(f\\in A\\) with \\(fM=0\\), so\n  \\(M_f=0\\), which is free over \\(A_f\\).\n\n  \\emph{Inductive step \\(n\\ge 0\\).} Two reductions. First, the property\n  ``\\(M_f\\) free over \\(A_f\\) for some nonzero \\(f\\)'' is stable under short exact\n  sequences: if \\(0\\to M'\\to M\\to M''\\to 0\\) and \\(M'_{f'}\\), \\(M''_{f''}\\) are\n  free, then \\(M_f\\) is free for \\(f=f'f''\\). As \\(B\\) is noetherian and \\(M\\)\n  finite, \\(M\\) admits a finite filtration with successive quotients of the form\n  \\(B/\\pp_i\\); so we may assume \\(M = B/\\pp\\), and replacing \\(B\\) by \\(B/\\pp\\)\n  reduces to \\(B\\) a domain and \\(M=B\\). Since \\(B_K\\) has dimension \\(n\\ge 0\\) it\n  is nonzero, so \\(A\\hookrightarrow B\\). By Noether normalisation there are\n  algebraically independent \\(b_1,\\dots,b_n\\in B\\) with \\(B_K\\) finite over\n  \\(K[b_1,\\dots,b_n]\\); clearing denominators of the integral-dependence\n  equations gives a nonzero \\(g\\in A\\) with \\(B_g\\) finite over\n  \\(A_g[b_1,\\dots,b_n]\\). Let \\(m\\) be the generic rank of \\(B_g\\) over the domain\n  \\(A_g[b_1,\\dots,b_n]\\), giving a short exact sequence\n  \\[\n    0\\to A_g[b_1,\\dots,b_n]^{\\oplus m}\\to B_g \\to T \\to 0\n  \\]\n  with \\(T\\) a finite torsion module. Then the support of \\(K\\ot_{A_g}T\\) has\n  dimension strictly less than \\(n\\), so by the inductive hypothesis applied to\n  \\((A_g, B_g, T)\\) there is a nonzero \\(h\\in A\\) with \\(T_h\\) free over\n  \\(A_{gh}\\). Taking \\(f=gh\\), the displayed sequence shows \\(M_f=B_f\\) is free\n  over \\(A_f\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/FlatteningStratification.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 2015, "effort_local": 2015, "proof_size_tex_total": 2015, "proof_size_lean_total": null, "effort_total": 2015}, "thm:generic-flatness": {"id": "thm:generic-flatness", "type": "theorem", "title": "Generic flatness", "chapter": "Generic Flatness and the Flattening Stratification", "statement": "\\textit{Source: Nitsure, Theorem (Generic Flatness), §4.}\n  Let \\(S\\) be a noetherian integral scheme, \\(p:X\\to S\\) a finite-type morphism,\n  and \\(\\Ff\\) a coherent sheaf of \\(\\Oo_X\\)-modules. Then there exists a nonempty\n  open subscheme \\(U\\subset S\\) such that the restriction of \\(\\Ff\\) to\n  \\(X_U = p^{-1}(U)\\) is flat over \\(\\Oo_U\\).", "uses": ["lem:generic-flatness-algebra"], "lean_name": "MR2223407ConstructionHilbertQuot.genericFlatness", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:generic-flatness-algebra}\n  Flatness over \\(\\Oo_U\\) may be checked over a nonempty affine open\n  \\(U=\\spec A\\subset S\\), with \\(A\\) a noetherian domain. Cover \\(p^{-1}(U)\\) by\n  finitely many affine opens \\(\\spec B_j\\) with each \\(B_j\\) a finite-type\n  \\(A\\)-algebra, on which \\(\\Ff\\) is given by a finite \\(B_j\\)-module \\(M_j\\). By\n  \\cref{lem:generic-flatness-algebra} there is a nonzero \\(f_j\\in A\\) with\n  \\((M_j)_{f_j}\\) free, hence flat, over \\(A_{f_j}\\). Let \\(f\\) be the product of\n  the \\(f_j\\); over the nonempty open \\(\\spec A_f\\subset U\\) every \\(M_j\\) becomes\n  flat over \\(A_f\\), so \\(\\Ff\\) restricted to \\(X_{\\spec A_f}\\) is flat over\n  \\(\\Oo_{\\spec A_f}\\). Take this open as the required \\(U\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/FlatteningStratification.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": 720, "effort_local": 720, "proof_size_tex_total": 2735, "proof_size_lean_total": null, "effort_total": 2735}, "thm:flattening-stratification": {"id": "thm:flattening-stratification", "type": "theorem", "title": "Flattening stratification", "chapter": "Generic Flatness and the Flattening Stratification", "statement": "\\textit{Source: Nitsure, Theorem (Existence of Flattening Stratification), §4.}\n  Let \\(S\\) be a noetherian scheme and let \\(\\Ff\\) be a coherent sheaf on the\n  projective space \\(\\PP^n_S\\) over \\(S\\). Then the set \\(I\\) of Hilbert\n  polynomials of the restrictions of \\(\\Ff\\) to the fibres of \\(\\PP^n_S\\to S\\) is\n  finite. Moreover, for each \\(f\\in I\\) there is a locally closed subscheme\n  \\(S_f\\subset S\\) such that:\n\n  \\textbf{(i) Point-set.} The underlying set \\(|S_f|\\) consists of all \\(s\\in S\\)\n  at which the Hilbert polynomial of \\(\\restr{\\Ff}{\\PP^n_s}\\) equals \\(f\\). In\n  particular the \\(|S_f|\\) are pairwise disjoint and cover \\(|S|\\).\n\n  \\textbf{(ii) Universal property.} Let \\(S'=\\coprod_f S_f\\) and let \\(i:S'\\to S\\)\n  be the morphism induced by the inclusions \\(S_f\\hookrightarrow S\\). Then\n  \\(i^*\\Ff\\) on \\(\\PP^n_{S'}\\) is flat over \\(S'\\), and \\(i\\) has the universal\n  property that for any morphism \\(\\varphi:T\\to S\\) the pullback\n  \\(\\varphi^*\\Ff\\) on \\(\\PP^n_T\\) is flat over \\(T\\) if and only if \\(\\varphi\\)\n  factors through \\(i\\). The subscheme \\(S_f\\) is uniquely determined by \\(f\\).\n\n  \\textbf{(iii) Closure of strata.} Give \\(I\\) the total order in which \\(f<g\\)\n  iff \\(f(m)<g(m)\\) for all \\(m\\gg 0\\). Then the closure in \\(S\\) of \\(|S_f|\\) is\n  contained in \\(\\bigcup_{f\\le g}|S_g|\\).", "uses": ["thm:generic-flatness", "def:hilbert-polynomial", "thm:semicontinuity", "thm:base-change-flat", "lem:flatness-from-local-freeness", "lem:quot-hilbert-decomposition"], "lean_name": "MR2223407ConstructionHilbertQuot.flatteningStratification", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:generic-flatness, def:hilbert-polynomial, thm:semicontinuity, lem:flatness-from-local-freeness, lem:quot-hilbert-decomposition}\n  By the universal property the strata constructed over an open cover of \\(S\\)\n  glue, so it suffices to prove the theorem locally on \\(S\\).\n\n  \\emph{Special case \\(n=0\\) (in full).} Here \\(\\PP^0_S=S\\). For \\(s\\in S\\) write\n  \\(\\restr{\\Ff}{s}\\) for the fibre \\(\\Ff_s\\ot_{\\Oo_{S,s}}\\kappa(s)\\); its Hilbert\n  polynomial is the constant \\(e=\\dim_{\\kappa(s)}\\restr{\\Ff}{s}\\). By Nakayama's\n  lemma a basis of \\(\\restr{\\Ff}{s}\\) extends, over a neighbourhood \\(V\\) of\n  \\(s\\), to a presentation\n  \\[\n    \\Oo_V^{\\oplus m}\\xrightarrow{\\;\\psi\\;}\\Oo_V^{\\oplus e}\n      \\xrightarrow{\\;\\phi\\;}\\Ff\\to 0 .\n  \\]\n  Let \\(I_e\\subset\\Oo_V\\) be the ideal sheaf generated by the entries\n  \\(\\psi_{i,j}\\) of the \\(e\\times m\\) matrix of \\(\\psi\\), and let \\(V_e\\subset V\\)\n  be the closed subscheme it cuts out. For any morphism \\(f:T\\to V\\), tensoring\n  is right exact, so\n  \\[\n    \\Oo_T^{\\oplus m}\\xrightarrow{f^*\\psi}\\Oo_T^{\\oplus e}\n      \\xrightarrow{f^*\\phi} f^*\\Ff\\to 0\n  \\]\n  is exact; hence \\(f^*\\Ff\\) is locally free of rank \\(e\\) iff \\(f^*\\psi=0\\),\n  i.e.\\ iff \\(f\\) factors through \\(V_e\\hookrightarrow V\\). This proves\n  \\textbf{(i)} and \\textbf{(ii)} for \\(n=0\\) (the stratum at level \\(e\\) is\n  \\(V_e\\), with the stated universal property). Finally the rank of the matrix\n  \\((\\psi_{i,j})\\) is lower semicontinuous, so \\(e\\) is upper semicontinuous,\n  which gives \\textbf{(iii)}. This settles \\(n=0\\).\n\n  \\emph{General case (sketch).} The strategy is to realise the stratification of\n  \\(\\Ff\\) as a common refinement (a ``g.c.d.'') of the \\(n=0\\) flattening\n  stratifications of finitely many direct images \\(\\pi_*\\Ff(N+i)\\), where\n  \\(\\pi:\\PP^n_S\\to S\\). The mechanism rests on \\cref{lem:flatness-from-local-freeness}:\n  \\(\\Ff\\) is flat over the base precisely when the direct images\n  \\(\\pi_*\\Ff(m)\\) are locally free for all large \\(m\\).\n\n  \\emph{Step 1 — reduction inputs.} As \\(S\\) is noetherian it has finitely many\n  irreducible components; giving each its reduced structure and removing overlaps\n  yields, via \\cref{thm:generic-flatness} and noetherian induction, finitely many\n  reduced, mutually disjoint, locally closed \\(V_i\\subset S\\) covering \\(|S|\\)\n  set-theoretically with \\(\\restr{\\Ff}{\\PP^n_{V_i}}\\) flat over \\(\\Oo_{V_i}\\).\n  Because Hilbert polynomials are locally constant in a flat family\n  (\\cref{def:hilbert-polynomial}), this gives statement \\textbf{(A)}: only\n  finitely many polynomials \\(P_s(m)=\\chi(\\PP^n_s,\\Ff_s(m))\\) occur as \\(s\\)\n  ranges over \\(S\\); in particular the set \\(I\\) is finite.\n\n  \\emph{Step 2 — uniform cohomology and base change.} The semicontinuity and\n  base-change machinery (\\cref{thm:semicontinuity}) applied to the flat families\n  over the \\(V_i\\) yields: \\textbf{(B)} an integer \\(N_1\\) with\n  \\(R^r\\pi_*\\Ff(m)=0\\) and \\(H^r(\\PP^n_s,\\Ff_s(m))=0\\) for all \\(r\\ge 1\\),\n  \\(m\\ge N_1\\), \\(s\\in S\\); and, combining the two base-change isomorphisms over\n  each \\(V_i\\), \\textbf{(C)} an integer \\(N\\ge N_1\\) such that\n  \\((\\pi_*\\Ff(m))|_s\\to H^0(\\PP^n_s,\\Ff_s(m))\\) is an isomorphism for all\n  \\(m\\ge N\\) and \\(s\\in S\\).\n\n  \\emph{Step 3 — assembling the strata.} Set \\(E_i=\\pi_*\\Ff(N+i)\\) for\n  \\(i=0,\\dots,n\\), coherent sheaves on \\(S\\). Applying the \\(n=0\\) case\n  successively to \\(E_0,E_1,\\dots,E_n\\) (each over the strata produced by the\n  previous step) gives finitely many locally closed \\(W_{e_0,\\dots,e_n}\\subset S\\)\n  through which a morphism \\(f:T\\to S\\) factors iff every \\(f^*E_i\\) is locally\n  free of rank \\(e_i\\). Via the bijection \\(f\\leftrightarrow(e_0,\\dots,e_n)\\),\n  \\(e_i=f(N+i)\\), between numerical polynomials of degree \\(\\le n\\) and tuples in\n  \\(\\ZZ^{n+1}\\) (here \\(P_s\\) has degree \\(\\le n\\) and by \\textbf{(B)} is\n  determined by its values at \\(N,\\dots,N+n\\)), relabel these as \\(W_f\\); then\n  every \\(s\\in W_f\\) has Hilbert polynomial \\(f\\). This is the decomposition of\n  the base by fibrewise Hilbert polynomial recorded in\n  \\cref{lem:quot-hilbert-decomposition}.\n\n  \\emph{Step 4 — refining \\(W_f\\) to \\(S_f\\).} By \\textbf{(C)} each\n  \\(\\pi_*\\Ff(N+i)\\) has constant fibre rank \\(f(N+i)\\) on \\(W_f\\) but need not be\n  locally free there; the locus of local freeness of rank \\(f(N+i)\\) is a closed\n  subscheme \\(W_f^{(i)}\\subset W_f\\) with \\(|W_f^{(i)}|=|W_f|\\), defined by a\n  coherent ideal \\(I_i\\subset\\Oo_{W_f}\\) and carrying the corresponding universal\n  property. By the noetherian condition the increasing chain\n  \\(I_0\\subset I_0+I_1\\subset\\cdots\\) stabilises, so \\(I=\\sum_{i\\ge 0}I_i\\) is\n  coherent; let \\(S_f\\subset W_f\\) be the closed subscheme it defines. Then\n  \\(|S_f|=|W_f|\\) and every \\(\\pi_*\\Ff(N+i)\\) is locally free of rank \\(f(N+i)\\)\n  on \\(S_f\\). Property \\textbf{(i)} is immediate from this construction.\n\n  \\emph{Step 5 — universal property and closure.} For \\textbf{(ii)}, choosing\n  \\(N'\\ge N\\) (by \\cref{thm:semicontinuity}) so that base change\n  \\((\\pi_*\\Ff(m))|_{S_f}\\to(\\pi_{S_f})_*\\Ff_{S_f}(m)\\) is an isomorphism for all\n  \\(m\\ge N'\\), the direct images \\(\\pi_*\\Ff(m)\\) are locally free on \\(S_f\\), so\n  \\(\\Ff_{S_f}\\) is flat over \\(S_f\\) by \\cref{lem:flatness-from-local-freeness}.\n  Conversely if \\(\\varphi:T\\to S\\) has \\(\\Ff_T\\) flat, the Hilbert polynomial is\n  locally constant on \\(T\\); on the open-and-closed locus \\(T_f\\subset T\\) where\n  it equals \\(f\\) the direct images \\({\\pi_T}_*\\Ff_T(m)\\) are locally free of rank\n  \\(f(m)\\), and this forces \\(T_f\\to S\\) to factor schematically through\n  \\(S_f\\) — giving the universal property and the uniqueness of \\(S_f\\). For\n  \\textbf{(iii)}, since only finitely many \\(f\\) occur (statement \\textbf{(A)})\n  there is \\(p\\ge N\\) with \\(f<g\\iff f(p)<g(p)\\) for all occurring \\(f,g\\); as\n  \\(S_f\\) is the flattening stratum of \\(\\pi_*\\Ff(p)\\), the closure property\n  follows from the upper-semicontinuity established in the \\(n=0\\) case applied to\n  \\(\\pi_*\\Ff(p)\\). This completes the proof.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/FlatteningStratification.tex", "lean_file": "", "dep_count": 6, "rdep_count": 3, "descendant_count": 9, "proof_size_tex": 5983, "effort_local": 5983, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15842}, "def:projective-morphism": {"id": "def:projective-morphism", "type": "definition", "title": "Projective morphism", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5.}\n  Let $S$ be a noetherian scheme. A morphism $X \\to S$ is \\emph{projective}\n  (in the sense of Grothendieck) if there exists a coherent sheaf $E$ on $S$\n  together with a closed embedding $X \\hookrightarrow \\PP(E) = \\Proj \\Sym_{\\Oo_S} E$\n  over $S$. Equivalently, $X \\to S$ is projective when it is proper and carries\n  a relatively very ample line bundle $L$ over $S$. The two descriptions are\n  matched by taking $L = \\restr{\\Oo_{\\PP(E)}(1)}{X}$, or conversely $E = \\pi_* L$.", "uses": ["def:projective-space", "def:very-ample", "def:relative-proj"], "lean_name": "MR2223407ConstructionHilbertQuot.ProjectiveMorphism", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": null, "effort_local": 507, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1537}, "def:strongly-projective": {"id": "def:strongly-projective", "type": "definition", "title": "Strongly projective morphism", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5.}\n  A morphism $X \\to S$ of noetherian schemes is \\emph{strongly projective}\n  (respectively, \\emph{strongly quasi-projective}) if there exists a vector\n  bundle $E$ on $S$ together with a closed embedding (respectively, a locally\n  closed embedding) $X \\subset \\PP(E)$ over $S$. This is the special case of\n  \\cref{def:projective-morphism} in which the coherent sheaf $E$ is required to\n  be locally free.", "uses": ["def:projective-morphism", "def:relative-proj"], "lean_name": "MR2223407ConstructionHilbertQuot.StronglyProjective", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": null, "effort_local": 434, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1971}, "thm:grothendieck-quot": {"id": "thm:grothendieck-quot", "type": "theorem", "title": "Grothendieck Quot scheme", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, Theorem (Grothendieck).}\n  Let $S$ be a noetherian scheme, $\\pi : X \\to S$ a projective morphism, and\n  $L$ a relatively very ample line bundle on $X$. Then for any coherent\n  $\\Oo_X$-module $E$ and any polynomial $\\Phi \\in \\QQ[\\lambda]$, the functor\n  $\\Quotf_{E/X/S}^{\\Phi,L}$ is representable by a projective $S$-scheme\n  $\\quotsch_{E/X/S}^{\\Phi,L}$.", "uses": ["def:quot-functor-phi", "def:projective-morphism"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_grothendieck", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:altman-kleiman-quot, thm:mumford-regularity, thm:grassmannian-represents, thm:flattening-stratification, thm:valuative-criterion-properness}\n  This is the noetherian form of the Altman--Kleiman theorem with the strong\n  projectivity hypothesis weakened to projectivity. Since $S$ is noetherian one\n  may, as in \\cref{thm:altman-kleiman-quot}, choose a single integer $m$ (by\n  Castelnuovo--Mumford regularity, \\cref{thm:mumford-regularity}, and\n  semicontinuity) so that for every field-valued point $s : \\spec k \\to S$ and\n  every coherent quotient $q : E_s \\to \\Ff$ of Hilbert polynomial $\\Phi$ the\n  sheaves $E_s(r)$, $\\Ff(r)$ and $\\Gg(r) = \\ker(q)(r)$ are globally generated\n  with vanishing higher cohomology for $r \\ge m$. As in\n  \\cref{lem:quot-embed-grassmannian} this gives an injection of\n  $\\Quotf_{E/X/S}^{\\Phi,L}$ into the Grassmannian functor of $\\pi_* E(r)$. Here\n  $\\pi_* E(r)$ is coherent but need not be a quotient of a vector bundle, so the\n  Grassmannian $\\grasssch(\\pi_* E(r), \\Phi(r))$ is projective over $S$ but not\n  necessarily strongly projective. Flattening stratification\n  (\\cref{thm:flattening-stratification}), performed over an affine open cover of\n  $S$, cuts out a locally closed subscheme representing\n  $\\Quotf_{E/X/S}^{\\Phi,L}$, which is closed by the valuative criterion\n  (\\cref{thm:valuative-criterion-properness}). Hence $\\quotsch_{E/X/S}^{\\Phi,L}$\n  is projective over $S$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1425, "effort_local": 1425, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5630}, "thm:altman-kleiman-quot": {"id": "thm:altman-kleiman-quot", "type": "theorem", "title": "Altman--Kleiman Quot scheme", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, Theorem (Altman--Kleiman).}\n  Let $S$ be a noetherian scheme, $X$ a closed subscheme of $\\PP(V)$ for some\n  vector bundle $V$ on $S$, $L = \\restr{\\Oo_{\\PP(V)}(1)}{X}$, $E$ a coherent\n  quotient sheaf of $\\pi^*(W)(\\nu)$ where $W$ is a vector bundle on $S$ and\n  $\\nu$ an integer, and $\\Phi \\in \\QQ[\\lambda]$. Then the functor\n  $\\Quotf_{E/X/S}^{\\Phi,L}$ is representable by a scheme\n  $\\quotsch_{E/X/S}^{\\Phi,L}$ which embeds over $S$ as a closed subscheme of\n  $\\PP(F)$ for some vector bundle $F$ on $S$. The bundle $F$ may be taken to be\n  an exterior power of the tensor product of $W$ with a symmetric power of $V$,\n  namely $F = \\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S} \\Sym^r V)$ for a suitable $r$.", "uses": ["def:quot-functor-phi", "def:strongly-projective", "lem:quot-reduction", "thm:mumford-regularity", "thm:flattening-stratification", "thm:grassmannian-represents", "lem:quot-embed-grassmannian", "lem:quot-properness"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_altmanKleiman", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-reduction, lem:quot-uniform-regularity, lem:quot-embed-grassmannian, lem:quot-flattening-stratum, lem:quot-properness}\n  The argument is the assembly of the lemmas that follow.\n  \\begin{enumerate}\n    \\item By \\cref{lem:quot-reduction} it suffices to treat the model case\n      $X = \\PP(V)$, $E = \\pi^* W$: tensoring by $L^\\nu$ reduces the general\n      polynomial to a shifted one, and a surjection of coherent sheaves induces\n      a closed embedding of the corresponding Quot functors, so the general\n      $\\quotsch_{E/X/S}^{\\Phi,L}$ sits as a closed subscheme of the model one.\n    \\item By \\cref{lem:quot-uniform-regularity}, Castelnuovo--Mumford regularity\n      (\\cref{thm:mumford-regularity}) supplies a single integer $m$, depending\n      only on $\\rank V$, $\\rank W$ and $\\Phi$, so that for every member of the\n      family the kernel, the source and the quotient become $m$-regular; their\n      direct images under $\\pi$ after twisting by $r \\ge m$ are then locally\n      free of fixed rank with vanishing higher direct images.\n    \\item By \\cref{lem:quot-embed-grassmannian}, sending\n      $\\langle \\Ff, q\\rangle$ to the quotient\n      $\\pi_* E(r) \\to \\pi_* \\Ff(r)$ of rank $\\Phi(r)$ defines an injective\n      morphism of functors\n      $\\alpha : \\Quotf_{E/X/S}^{\\Phi,L} \\to \\grassf(W \\ot_{\\Oo_S} \\Sym^r V, \\Phi(r))$,\n      with $\\pi_* E(r) = W \\ot_{\\Oo_S} \\Sym^r V$; the Grassmannian functor is\n      representable (\\cref{thm:grassmannian-represents}).\n    \\item By \\cref{lem:quot-flattening-stratum}, the image of $\\alpha$ is the\n      flattening stratum (\\cref{thm:flattening-stratification}) for the\n      universal quotient over the Grassmannian for Hilbert polynomial $\\Phi$,\n      giving a locally closed subscheme that represents\n      $\\Quotf_{E/X/S}^{\\Phi,L}$ and thus a locally closed embedding\n      $\\quotsch_{E/X/S}^{\\Phi,L} \\subset \\PP(\\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V))$.\n      In particular $\\quotsch_{E/X/S}^{\\Phi,L} \\to S$ is separated and of finite\n      type.\n    \\item By \\cref{lem:quot-properness}, the valuative criterion shows\n      $\\quotsch_{E/X/S}^{\\Phi,L} \\to S$ is proper; being also of finite type over\n      the noetherian $S$, the locally closed embedding above is in fact a closed\n      embedding into $\\PP(F)$. This completes the proof.\\qedhere\n  \\end{enumerate}\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 8, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": 2335, "effort_local": 2335, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 41303}, "thm:quot-pn": {"id": "thm:quot-pn", "type": "theorem", "title": "Quot scheme in projective space", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, Theorem (trivial-bundle case).}\n  Let $S$ be a noetherian scheme, $X$ a closed subscheme of $\\PP^n_S$ for some\n  $n \\ge 0$, $L = \\restr{\\Oo_{\\PP^n_S}(1)}{X}$, $E$ a coherent quotient sheaf of\n  $\\oplus^p \\Oo_X(\\nu)$ for integers $p \\ge 0$ and $\\nu$, and\n  $\\Phi \\in \\QQ[\\lambda]$. Then $\\Quotf_{E/X/S}^{\\Phi,L}$ is representable by a\n  scheme $\\quotsch_{E/X/S}^{\\Phi,L}$ which embeds over $S$ as a closed subscheme\n  of $\\PP^r_S$ for some $r \\ge 0$.", "uses": ["thm:altman-kleiman-quot"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_projectiveSpace", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:altman-kleiman-quot}\n  Apply \\cref{thm:altman-kleiman-quot} with $V = \\Oo_S^{\\,n+1}$ and\n  $W = \\Oo_S^{\\,p}$ both trivial. Then $\\PP(V) = \\PP^n_S$, the sheaf\n  $\\pi^*(W)(\\nu) = \\oplus^p \\Oo_X(\\nu)$, and the closed embedding target\n  $\\PP(\\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V))$ becomes a trivial projective\n  bundle $\\PP^r_S$ with $r + 1 = \\rank \\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V)$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 405, "effort_local": 405, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 41708}, "lem:quot-reduction": {"id": "lem:quot-reduction", "type": "lemma", "title": "Reduction to the model case", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, Lemma (reduction).}\n  Let $\\pi : X \\to S$ be projective with relatively very ample $L$.\n  \\begin{enumerate}\n    \\item For any integer $\\nu$, tensoring by $L^\\nu$ gives an isomorphism of\n      functors $\\Quotf_{E/X/S}^{\\Phi,L} \\cong \\Quotf_{E(\\nu)/X/S}^{\\Psi,L}$,\n      where $\\Psi \\in \\QQ[\\lambda]$ is defined by $\\Psi(\\lambda) = \\Phi(\\lambda + \\nu)$.\n    \\item For any surjective homomorphism $\\phi : E \\to G$ of coherent sheaves\n      on $X$, the induced natural transformation\n      $\\Quotf_{G/X/S}^{\\Phi,L} \\to \\Quotf_{E/X/S}^{\\Phi,L}$ is a closed embedding.\n  \\end{enumerate}\n  Consequently, to prove \\cref{thm:altman-kleiman-quot} it suffices to treat the\n  model case $X = \\PP(V)$ and $E = \\pi^* W$ for vector bundles $V, W$ on $S$:\n  every $\\quotsch_{E/X/S}^{\\Phi,L}$ then arises as a closed subscheme of\n  $\\quotsch_{\\pi^*W/\\PP(V)/S}^{\\Phi,L}$.", "uses": ["def:quot-functor-phi"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_reduction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:quot-functor-phi}\n  Part (i) is immediate: $L^\\nu$-twisting is an equivalence on coherent\n  quotients, and a fibrewise twist shifts the Hilbert polynomial of a quotient\n  by $\\nu$, so $\\langle \\Ff, q\\rangle \\mapsto \\langle \\Ff(\\nu), q(\\nu)\\rangle$\n  is the claimed isomorphism with $\\Psi(\\lambda) = \\Phi(\\lambda + \\nu)$.\n\n  Part (ii) is the statement that for a locally noetherian $T$ and a family\n  $\\langle \\Ff, q\\rangle \\in \\Quotf_{E/X/S}^{\\Phi,L}(T)$ there is a closed\n  subscheme $T' \\subset T$ such that a morphism $U \\to T$ factors through $T'$\n  if and only if the pulled-back quotient $q_U : E_U \\to \\Ff_U$ factors through\n  $\\phi_U : E_U \\to G_U$. Take $T'$ to be the vanishing scheme of the composite\n  $\\ker(\\phi) \\hookrightarrow E \\xrightarrow{q} \\Ff$ of coherent sheaves on\n  $X_T$; this is well-defined because $\\ker(\\phi)$ and $\\Ff$ are coherent on\n  $X_T$ and $\\Ff$ is flat over $T$, and it manifestly has the required universal\n  property. Hence the natural transformation is a closed embedding.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1023, "effort_local": 1023, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3991}, "lem:quot-uniform-regularity": {"id": "lem:quot-uniform-regularity", "type": "lemma", "title": "Uniform $m$-regularity of the family", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, ``Use of $m$-Regularity''.}\n  Work in the model case $E = \\pi^* W$ on $X = \\PP(V)$ with\n  $L = \\Oo_{\\PP(V)}(1)$, set $n = \\rank V - 1$ and $p = \\rank W$. By\n  \\cref{thm:mumford-regularity} there is a single integer $m$, depending only on\n  $\\rank V$, $\\rank W$ and $\\Phi$, such that for every field-valued point $s$ of\n  $S$ the sheaf $E_s$ is $m$-regular and, for every coherent quotient\n  $q : E_s \\to \\Ff$ on $\\PP(V)_s$ of Hilbert polynomial $\\Phi$, both $\\Ff$ and\n  the kernel $\\Gg = \\ker(q)$ are $m$-regular. Consequently, for any $S$-scheme\n  $T$ and any $T$-flat coherent quotient $q : E_T \\to \\Ff$ of Hilbert\n  polynomial $\\Phi$ with kernel $\\Gg$, and for all $r \\ge m$: the sheaves\n  $\\pi_{T*}\\Gg(r)$, $\\pi_{T*}E_T(r)$, $\\pi_{T*}\\Ff(r)$ are locally free of fixed\n  ranks determined by $n, p, r, \\Phi$; the natural maps\n  $\\pi_T^*\\pi_{T*}(-) \\to (-)$ are surjective; and the higher direct images\n  $R^i\\pi_{T*}(-)$ vanish for $i \\ge 1$. In particular $\\pi_{T*}\\Ff(r)$ has rank\n  $\\Phi(r)$ and $\\pi_*E(r) = W \\ot_{\\Oo_S} \\Sym^r V$.", "uses": ["thm:mumford-regularity", "lem:castelnuovo", "def:hilbert-polynomial", "thm:base-change-flat"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_uniformRegularity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:mumford-regularity, lem:castelnuovo, thm:cohomology-base-change, def:hilbert-polynomial}\n  Fibrewise, $\\PP(V)_s \\cong \\PP^n_k$ and $E_s \\cong \\oplus^p \\Oo_{\\PP(V)_s}$,\n  so Mumford's bound (\\cref{thm:mumford-regularity}) applied to the kernels of\n  quotients with the fixed Hilbert polynomial $\\Phi$ yields one integer $m$\n  uniform over all such fibres. By the Castelnuovo Lemma\n  (\\cref{lem:castelnuovo}), $m$-regularity gives, for $r \\ge m$ and $i \\ge 1$,\n  the vanishing $H^i(X_s, -(r)) = 0$ and the global generation of\n  $H^0(X_s, -(r))$ for each of $E_s$, $\\Ff$, $\\Gg$. Cohomology and base change\n  for flat sheaves (\\cref{thm:cohomology-base-change}) then propagates this over\n  any base $T$: the direct images $\\pi_{T*}(-)(r)$ are locally free of the rank\n  computed fibrewise from $n, p, r, \\Phi$, the higher direct images vanish, and\n  the canonical evaluation maps $\\pi_T^*\\pi_{T*}(-)(r) \\to (-)(r)$ are\n  surjective. Twisting the short exact sequence\n  $0 \\to \\Gg \\to E_T \\to \\Ff \\to 0$ by $r$ and applying $\\pi_{T*}$ keeps it\n  exact, which is the diagram used below.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 9, "proof_size_tex": 1091, "effort_local": 1091, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14291}, "lem:quot-embed-grassmannian": {"id": "lem:quot-embed-grassmannian", "type": "lemma", "title": "Embedding of Quot into a Grassmannian", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, ``Embedding Quot into Grassmannian''.}\n  Fix an integer $r \\ge m$. Since $\\pi_{T*}\\Ff(r)$ has rank $\\Phi(r)$ and\n  $\\pi_*E(r) = W \\ot_{\\Oo_S}\\Sym^r V$, the surjection\n  $\\pi_{T*}E_T(r) \\to \\pi_{T*}\\Ff(r)$ defines a $T$-point of the Grassmannian\n  $\\grasssch(W \\ot_{\\Oo_S}\\Sym^r V, \\Phi(r))$. This gives a morphism of functors\n  \\[\n    \\alpha : \\Quotf_{E/X/S}^{\\Phi,L} \\to \\grassf(W \\ot_{\\Oo_S}\\Sym^r V, \\Phi(r)),\n    \\qquad \\langle \\Ff, q\\rangle \\mapsto \\pi_{T*}(q(r)),\n  \\]\n  and $\\alpha$ is injective. The Grassmannian functor is representable\n  (\\cref{thm:grassmannian-represents}).", "uses": ["lem:quot-uniform-regularity", "thm:grassmannian-represents"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_embedGrassmannian", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-uniform-regularity, thm:grassmannian-represents}\n  The map $\\alpha$ is well-defined by \\cref{lem:quot-uniform-regularity}: for\n  $r \\ge m$, $\\pi_{T*}(q(r))$ is a locally free quotient of\n  $\\pi_{T*}E_T(r) = W_T \\ot \\Sym^r V_T$ of rank $\\Phi(r)$, hence a $T$-point of\n  the Grassmannian, which is representable by \\cref{thm:grassmannian-represents}.\n  For injectivity, the kernel inclusion $\\pi_{T*}\\Gg(r) \\hookrightarrow\n  \\pi_{T*}E_T(r)$ is recovered from $\\pi_{T*}(q(r))$. Let $h$ be the composite\n  $\\pi_T^*\\pi_{T*}\\Gg(r) \\to \\pi_T^*\\pi_{T*}E_T(r) \\to E_T(r)$. By the surjective\n  evaluation maps and exact rows of \\cref{lem:quot-uniform-regularity},\n  \\[\n    \\pi_T^*\\pi_{T*}\\Gg(r) \\xrightarrow{\\ h\\ } E_T(r) \\xrightarrow{\\ q(r)\\ } \\Ff(r) \\to 0\n  \\]\n  is right exact, so $q(r)$ is the cokernel of $h$; twisting by $-r$ recovers\n  $q$. Thus $\\alpha$ is injective.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": 880, "effort_local": 880, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 18748}, "lem:quot-flattening-stratum": {"id": "lem:quot-flattening-stratum", "type": "lemma", "title": "The representing flattening stratum", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, ``Use of Flattening Stratification''.}\n  The morphism $\\alpha$ of \\cref{lem:quot-embed-grassmannian} is relatively\n  representable by locally closed immersions. Concretely, for any locally\n  noetherian $S$-scheme $T$ and any surjection\n  $f : W_T \\ot_{\\Oo_T}\\Sym^r V_T \\to \\J$ onto a locally free $\\Oo_T$-module $\\J$\n  of rank $\\Phi(r)$, form $\\Kk = \\ker(f)$, the composite\n  $h : \\pi_Y^*\\Kk_Y \\to \\pi_Y^*(W \\ot_{\\Oo_S}\\Sym^r V) = \\pi_Y^*\\pi_{Y*}E_Y \\to E_Y$\n  after pullback along $\\phi : Y \\to T$, and the cokernel $q : E_Y \\to \\Ff$ of\n  $h$. There is a locally closed subscheme $T' \\subset T$ such that $\\phi$\n  factors through $T'$ if and only if $\\Ff$ is $Y$-flat with fibrewise Hilbert\n  polynomial $\\Phi$: namely $T'$ is the stratum of Hilbert polynomial $\\Phi$ in\n  the flattening stratification of $\\Ff$ on $X_T$\n  (\\cref{thm:flattening-stratification}). Taking\n  $T = \\grasssch(W \\ot_{\\Oo_S}\\Sym^r V, \\Phi(r))$ with its universal quotient,\n  the corresponding $T'$ represents $\\Quotf_{E/X/S}^{\\Phi,L}$, yielding a locally\n  closed embedding\n  $\\quotsch_{E/X/S}^{\\Phi,L} \\subset \\PP(\\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V))$;\n  in particular $\\quotsch_{E/X/S}^{\\Phi,L} \\to S$ is separated and of finite type.", "uses": ["lem:quot-embed-grassmannian", "thm:flattening-stratification", "lem:grassmannian-very-ample"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_flatteningStratum", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-embed-grassmannian, thm:flattening-stratification}\n  Given the data $f, \\J$ over $T$, the cokernel construction $q : E_Y \\to \\Ff$\n  is functorial in $\\phi : Y \\to T$, and by the recovery in\n  \\cref{lem:quot-embed-grassmannian} a $T$-point lies in the image of $\\alpha$\n  exactly when this $\\Ff$ is flat over $Y$ with fibrewise Hilbert polynomial\n  $\\Phi$. The flattening stratification theorem\n  (\\cref{thm:flattening-stratification}) provides, for the sheaf $\\Ff$ on $X_T$,\n  a locally finite stratification of $T$ by locally closed subschemes indexed by\n  Hilbert polynomials, with the universal property that $\\phi : Y \\to T$\n  pulls $\\Ff$ back to a $Y$-flat sheaf of fibrewise polynomial $\\Phi$ iff $\\phi$\n  factors through the stratum $T'$ of polynomial $\\Phi$. Applying this to\n  $T = \\grasssch(W \\ot_{\\Oo_S}\\Sym^r V, \\Phi(r))$ and its universal quotient,\n  $T'$ represents $\\Quotf_{E/X/S}^{\\Phi,L}$. Since the Grassmannian embeds as a\n  closed subscheme of $\\PP(\\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V))$ via the\n  Plücker embedding, $T' = \\quotsch_{E/X/S}^{\\Phi,L}$ acquires a locally closed\n  embedding into that projective bundle, hence is separated and of finite type\n  over $S$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 1207, "effort_local": 1207, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 35917}, "lem:quot-properness": {"id": "lem:quot-properness", "type": "lemma", "title": "Properness via the valuative criterion", "chapter": "Construction of Quot Schemes", "statement": "\\textit{Source: Nitsure, §5, ``Valuative Criterion for Properness''.}\n  The functor $\\Quotf_{E/X/S}^{\\Phi,L}$ satisfies the valuative criterion of\n  properness over $S$: for every discrete valuation ring $R$ over $S$ with\n  fraction field $K$, the restriction map\n  \\[\n    \\Quotf_{E/X/S}^{\\Phi,L}(\\spec R) \\to \\Quotf_{E/X/S}^{\\Phi,L}(\\spec K)\n  \\]\n  is bijective. Combined with finite type over the noetherian $S$\n  (\\cref{lem:quot-flattening-stratum}), it follows that\n  $\\quotsch_{E/X/S}^{\\Phi,L} \\to S$ is proper, and hence the locally closed\n  embedding into $\\PP(\\bigwedge^{\\Phi(r)}(W \\ot_{\\Oo_S}\\Sym^r V))$ is a closed\n  embedding.", "uses": ["lem:quot-flattening-stratum", "thm:valuative-criterion-properness"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_properness", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-flattening-stratum, thm:valuative-criterion-properness}\n  Let $R$ be a discrete valuation ring over $S$ with fraction field $K$ and\n  $j : X_K \\hookrightarrow X_R$ the open inclusion. Given\n  $\\langle \\Ff, q\\rangle \\in \\Quotf_{E/X/S}^{\\Phi,L}(\\spec K)$, let\n  $\\overline{\\Ff}$ be the image of the composite\n  $E_R \\to j_*(E_K) \\to j_*\\Ff$ and $\\overline{q} : E_R \\to \\overline{\\Ff}$ the\n  induced surjection. Then $\\overline{\\Ff}$ is torsion-free over $R$, hence flat\n  (flatness over a dvr is torsion-freeness), with the same Hilbert polynomial\n  $\\Phi$, so $\\langle \\overline{\\Ff}, \\overline{q}\\rangle$ is an $R$-point\n  restricting to $\\langle \\Ff, q\\rangle$; uniqueness follows from the same\n  torsion-free characterization. This verifies the valuative criterion, so by\n  \\cref{thm:valuative-criterion-properness} and finite type over the noetherian\n  $S$ (\\cref{lem:quot-flattening-stratum}), $\\quotsch_{E/X/S}^{\\Phi,L} \\to S$ is\n  proper. A locally closed immersion that is also proper is a closed immersion,\n  giving the closed embedding into the projective bundle.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/QuotConstruction.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1087, "effort_local": 1087, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 37004}, "lem:quot-open-subfunctor": {"id": "lem:quot-open-subfunctor", "type": "lemma", "title": "Quot of an open is an open subfunctor", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6 (two exercises).}\n  Let $\\pi\\colon Z\\to S$ be a proper morphism of noetherian schemes, $Y\\subset Z$\n  a closed subscheme and $\\Ff$ a coherent sheaf on $Z$. Then there is an open\n  subscheme $S'\\subset S$ with the universal property that a morphism $T\\to S$\n  factors through $S'$ if and only if the support of the pull-back $\\Ff_T$ on\n  $Z_T = Z\\times_S T$ is disjoint from $Y_T = Y\\times_S T$. As a consequence, if\n  $X\\subset Z$ is an open subscheme and $E$ is a coherent sheaf on $Z$, then\n  $\\Quotf_{\\restr{E}{X}/X/S}$ is an open subfunctor of $\\Quotf_{E/Z/S}$.", "uses": ["def:quot-functor"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_open_subfunctor", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:quot-functor}\n  \n  \n  For the first assertion, the support $\\mathrm{Supp}\\,\\Ff$ is a closed subset of\n  $Z$, hence so is $W = \\mathrm{Supp}\\,\\Ff\\cap Y$. Since $\\pi$ is proper, the image\n  $\\pi(W)$ is closed in $S$; set $S' = S\\setminus \\pi(W)$ with its open subscheme\n  structure. Formation of the support of a coherent sheaf commutes with the flat\n  (indeed arbitrary, on the level of underlying sets) base change $Z_T\\to Z$, so\n  $\\mathrm{Supp}\\,\\Ff_T = \\mathrm{Supp}(\\Ff)\\times_S T$; likewise\n  $Y_T = Y\\times_S T$. Hence $\\mathrm{Supp}\\,\\Ff_T$ is disjoint from $Y_T$ exactly\n  when the image of $T\\to S$ avoids $\\pi(W)$, i.e.\\ when $T\\to S$ factors through\n  $S'$. This is the required universal property.\n\n  For the consequence, write $Y = Z\\setminus X$ with its reduced (or any) closed\n  structure. A $T$-valued point of $\\Quotf_{E/Z/S}$ is a coherent quotient\n  $q\\colon E_T\\twoheadrightarrow \\Gg$ on $Z_T$ with $\\Gg$ flat over $T$ and of\n  support proper over $T$; it lies in the subfunctor $\\Quotf_{\\restr{E}{X}/X/S}$\n  precisely when $\\mathrm{Supp}\\,\\Gg$ is disjoint from $Y_T$ (so that the quotient\n  is supported in $X_T$ and is determined by its restriction to $X_T$). Applying\n  the first assertion to the proper morphism $Z_T\\to T$, the closed subscheme\n  $Y_T$ and the coherent sheaf $\\Gg$ shows that the locus of base changes\n  satisfying this condition is represented by an open subscheme of $T$. Thus the\n  inclusion of functors is representable by open immersions, i.e.\\\n  $\\Quotf_{\\restr{E}{X}/X/S}$ is an open subfunctor of $\\Quotf_{E/Z/S}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 1573, "effort_local": 1573, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3016}, "thm:strongly-quasiprojective-quot": {"id": "thm:strongly-quasiprojective-quot", "type": "theorem", "title": "Strongly quasi-projective Quot, Altman--Kleiman", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Theorem (Strongly quasi-projective quot).}\n  Let $S$ be a noetherian scheme, $X$ a locally closed subscheme of $\\PP(V)$ for\n  a vector bundle $V$ on $S$, $L = \\restr{\\Oo_{\\PP(V)}(1)}{X}$, $E$ a coherent\n  quotient sheaf of $\\restr{\\pi^*(W)(\\nu)}{X}$ where $W$ is a vector bundle on $S$\n  and $\\nu\\in\\ZZ$, and $\\Phi\\in\\QQ[\\lambda]$. Then $\\Quotf_{E/X/S}^{\\Phi,L}$ is\n  representable by a scheme $\\quotsch_{E/X/S}^{\\Phi,L}$ which embeds over $S$ as a\n  locally closed subscheme of $\\PP(F)$ for some vector bundle $F$ on $S$; $F$ may\n  be taken to be an exterior power of the tensor product of $W$ with a symmetric\n  power of $V$.", "uses": ["lem:quot-open-subfunctor", "thm:altman-kleiman-quot", "def:strongly-projective"], "lean_name": "MR2223407ConstructionHilbertQuot.stronglyQuasiprojectiveQuot", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-open-subfunctor, thm:altman-kleiman-quot}\n  Let $\\overline X\\subset \\PP(V)$ be the schematic closure of $X$, an open\n  subscheme $j\\colon X\\hookrightarrow \\overline X$, and let $\\overline E$ be the\n  image of the composite\n  $\\restr{\\pi^*(W)(\\nu)}{\\overline X}\\to j_*(\\restr{\\pi^*(W)(\\nu)}{X})\\to j_*E$.\n  This gives a quotient $\\restr{\\pi^*(W)(\\nu)}{\\overline X}\\to \\overline E$ whose\n  restriction to $X$ is the given quotient $\\restr{\\pi^*(W)(\\nu)}{X}\\to E$. By\n  \\cref{lem:quot-open-subfunctor}, $\\Quotf_{E/X/S}$ is an open subfunctor of\n  $\\Quotf_{\\overline E/\\overline X/S}$. Since $\\overline X$ is a closed subscheme\n  of $\\PP(V)$, hence strongly projective over $S$, \\cref{thm:altman-kleiman-quot}\n  represents $\\Quotf_{\\overline E/\\overline X/S}^{\\Phi,L}$ by a closed subscheme\n  of a suitable $\\PP(F)$; the open subfunctor $\\Quotf_{E/X/S}^{\\Phi,L}$ is then\n  represented by the corresponding open part, a locally closed subscheme of\n  $\\PP(F)$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 969, "effort_local": 969, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 43845}, "lem:coherent-prolongation": {"id": "lem:coherent-prolongation", "type": "lemma", "title": "Coherent prolongation", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Lemma (coherent prolongation).}\n  Any coherent sheaf on an open subscheme of a noetherian scheme $S$ can be\n  prolonged to a coherent sheaf on all of $S$.", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.coherent_prolongation", "proved": false, "mathlib_ok": false, "proof_tex": "\n  First let $S = \\spec A$ be affine with inclusion $j\\colon U\\hookrightarrow S$.\n  The quasi-coherent sheaf $j_*\\Ff$ corresponds to the $A$-module\n  $M = H^0(S,j_*\\Ff)$, i.e.\\ $j_*\\Ff = \\widetilde M$. For each $u\\in U$ pick\n  finitely many $e_1,\\dots,e_n\\in M$ generating the fibre $\\Ff_u$ over\n  $\\kappa(u)$; by Nakayama these generate the stalk of $\\Ff$ on an open\n  neighbourhood of $u$ in $U$, and by noetherianity finitely many\n  $e_1,\\dots,e_r\\in M$ generate the stalk of $\\Ff$ at every point of $U$. If\n  $N\\subset M$ is the submodule they generate, then $\\Gg = \\widetilde N$ is a\n  coherent prolongation of $\\Ff$ to $S$. In general, by noetherianity there is a\n  maximal coherent prolongation $(U',\\Ff')$ of $\\Ff$. If $U'\\ne S$, choose\n  $u\\in S\\setminus U'$ and an affine open $V\\ni u$; the affine case prolongs\n  $\\restr{\\Ff'}{U'\\cap V}$ to $V$, and gluing along $U'\\cap V$ extends $\\Ff'$ to\n  $U'\\cup V$, contradicting maximality. Hence $U' = S$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 955, "effort_local": 955, "proof_size_tex_total": 955, "proof_size_lean_total": null, "effort_total": 955}, "thm:quasiprojective-quot": {"id": "thm:quasiprojective-quot", "type": "theorem", "title": "Quasi-projective Quot, Grothendieck", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Theorem (Quasi-projective quot).}\n  Let $S$ be a noetherian scheme, $X$ a quasi-projective scheme over $S$, $L$ a\n  relatively very ample line bundle on $X$, $E$ a quotient sheaf on $X$ and\n  $\\Phi\\in\\QQ[\\lambda]$. Then $\\Quotf_{E/X/S}^{\\Phi,L}$ is representable by a\n  scheme $\\quotsch_{E/X/S}^{\\Phi,L}$ which is quasi-projective over $S$.", "uses": ["lem:coherent-prolongation", "lem:quot-open-subfunctor", "thm:grothendieck-quot"], "lean_name": "MR2223407ConstructionHilbertQuot.quasiprojectiveQuot", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:coherent-prolongation, lem:quot-open-subfunctor, thm:grothendieck-quot}\n  By quasi-projectivity, $X$ embeds over $S$ as a locally closed subscheme of\n  $\\PP(V)$ for some coherent sheaf $V$ on $S$, with\n  $L\\cong \\restr{\\Oo_{\\PP(V)}(1)}{X}$. Let $\\overline X\\subset \\PP(V)$ be the\n  schematic closure of $X$; it is projective over $S$ and contains $X$ as an open\n  subscheme. By \\cref{lem:coherent-prolongation} the coherent sheaf $E$ admits a\n  coherent prolongation $\\overline E$ to $\\overline X$. For any such prolongation,\n  \\cref{lem:quot-open-subfunctor} shows $\\Quotf_{E/X/S}$ is an open subfunctor of\n  $\\Quotf_{\\overline E/\\overline X/S}$. The latter is representable by a\n  projective $S$-scheme by \\cref{thm:grothendieck-quot}, so its open subfunctor\n  $\\Quotf_{E/X/S}^{\\Phi,L}$ is representable by a quasi-projective $S$-scheme.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 849, "effort_local": 849, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9007}, "def:hilbert-scheme": {"id": "def:hilbert-scheme", "type": "definition", "title": "Hilbert scheme", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6 (Hilbert scheme as Quot of the structure sheaf).}\n  For $X$ over $S$, a relatively very ample $L$ and $\\Phi\\in\\QQ[\\lambda]$, the\n  \\emph{Hilbert functor} $\\Hilbf_{X/S}^{\\Phi,L}$ is by definition the Quot\n  functor $\\Quotf_{\\Oo_X/X/S}^{\\Phi,L}$ of the structure sheaf: its $T$-points are\n  the closed subschemes $Z\\subset X_T$ flat and proper over $T$ with Hilbert\n  polynomial $\\Phi$ relative to $L$. When it is representable, the representing\n  scheme $\\hilbsch_{X/S}^{\\Phi,L} = \\quotsch_{\\Oo_X/X/S}^{\\Phi,L}$ is the\n  \\emph{Hilbert scheme} of $X$ over $S$.", "uses": ["def:hilbert-functor", "def:quot-functor"], "lean_name": "MR2223407ConstructionHilbertQuot.hilbertScheme", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": null, "effort_local": 585, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2468}, "thm:hilbert-scheme-exists": {"id": "thm:hilbert-scheme-exists", "type": "theorem", "title": "Existence of the Hilbert scheme", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6 (the $E=\\Oo_X$ case of the Quot theorem).}\n  Let $S$ be noetherian, $X$ strongly projective over $S$ with relatively very\n  ample $L$, and $\\Phi\\in\\QQ[\\lambda]$. Then $\\Hilbf_{X/S}^{\\Phi,L}$ is\n  representable by a scheme $\\hilbsch_{X/S}^{\\Phi,L}$ which is a closed subscheme\n  of a suitable $\\PP(F)$ over $S$; in particular the Hilbert scheme is projective\n  over $S$.", "uses": ["def:hilbert-scheme", "def:hilbert-functor", "thm:altman-kleiman-quot"], "lean_name": "MR2223407ConstructionHilbertQuot.hilbertScheme_exists", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hilbert-scheme, thm:altman-kleiman-quot}\n  By \\cref{def:hilbert-scheme}, $\\Hilbf_{X/S}^{\\Phi,L} = \\Quotf_{\\Oo_X/X/S}^{\\Phi,L}$.\n  Apply \\cref{thm:altman-kleiman-quot} with the coherent sheaf $E = \\Oo_X$: it\n  represents this Quot functor by a scheme embeddable as a closed subscheme of a\n  projective bundle $\\PP(F)$ over $S$. This representing scheme is, by definition,\n  $\\hilbsch_{X/S}^{\\Phi,L}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 409, "effort_local": 409, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 42737}, "lem:flatness-local-criterion": {"id": "lem:flatness-local-criterion", "type": "lemma", "title": "Local criterion of flatness, anchors", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Lemma (local criterion); Altman--Kleiman [A-K~1] Ch.~V.}\n  Let all schemes be noetherian. \\textbf{(1)} A finite-type flat morphism is open.\n  \\textbf{(2)} For a finite-type morphism $\\pi\\colon Y\\to X$, the set of $y\\in Y$\n  at which $\\pi$ is flat (i.e.\\ $\\Oo_{Y,y}$ is flat over $\\Oo_{X,\\pi(y)}$) is open\n  in $Y$. \\textbf{(3)} Let $f\\colon X\\to S$ and $g\\colon Y\\to S$ be finite-type\n  flat, and $\\pi\\colon Y\\to X$ with $g = f\\circ\\pi$. For $y\\in Y$, $x = \\pi(y)$,\n  $s = g(y)$: if the fibre morphism $\\pi_s\\colon Y_s\\to X_s$ is flat at $y$, then\n  $\\pi$ is flat at $y$.", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.flatness_local_criterion", "proved": false, "mathlib_ok": false, "proof_tex": "\n  These are standard facts; see Altman--Kleiman [A-K~1] Chapter~V. Statement\n  \\textbf{(3)} is the local criterion of flatness. Treated as foundational\n  inputs (citations to the literature; not re-proved here).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 209, "effort_local": 209, "proof_size_tex_total": 209, "proof_size_lean_total": null, "effort_total": 209}, "thm:isomorphism-is-open": {"id": "thm:isomorphism-is-open", "type": "theorem", "title": "Flat-locus and isomorphism-locus are open", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Theorem (isomorphism is open).}\n  Let $S$ be noetherian, $f\\colon X\\to S$ and $g\\colon Y\\to S$ proper flat, and\n  $\\pi\\colon Y\\to X$ projective with $g = f\\circ\\pi$. Then $S$ has open\n  subschemes $S_2\\subset S_1\\subset S$ with the universal properties: for any\n  locally noetherian $S$-scheme $T$, \\textbf{(a)} the base change\n  $\\pi_T\\colon Y_T\\to X_T$ is flat iff $T\\to S$ factors through $S_1$ (projectivity\n  of $\\pi$ not needed); \\textbf{(b)} $\\pi_T$ is an isomorphism iff $T\\to S$\n  factors through $S_2$.", "uses": ["lem:flatness-local-criterion", "thm:flattening-stratification"], "lean_name": "MR2223407ConstructionHilbertQuot.isomorphism_is_open", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:flatness-local-criterion, thm:flattening-stratification}\n  \\textbf{(a)} By \\cref{lem:flatness-local-criterion}\\,(2) the flat locus\n  $Y'\\subset Y$ of $\\pi$ is open; since $g$ is proper, $S_1 = S\\setminus g(Y\\setminus Y')$\n  is open, given the induced open subscheme structure. By\n  \\cref{lem:flatness-local-criterion}\\,(3), $S_1$ consists exactly of the $s\\in S$\n  for which the fibre morphism $\\pi_s\\colon Y_s\\to X_s$ is flat, and the local\n  criterion gives the stated universal property (this is the flattening behaviour\n  recorded in \\cref{thm:flattening-stratification}).\n\n  \\textbf{(b)} Pull $\\pi$ back along $S_1\\hookrightarrow S$ to\n  $\\pi_1\\colon Y_1\\to X_1$ and choose a relatively very ample $L$ for $\\pi_1$. By\n  noetherianity there is $m\\ge 1$ with $\\pi_{1*}L^m$ globally generated and\n  $R^i\\pi_{1*}L^m = 0$ for $i\\ge 1$; flatness of $\\pi_1$ makes $\\pi_{1*}L^m$\n  locally free. Let $U\\subset X_1$ be the open locus where $\\pi_{1*}L^m$ has rank\n  $1$, and set $S_2 = S_1\\setminus f(X_1\\setminus U)$, open since $f$ is proper.\n  With the induced structure, $S_2$ has the universal property \\textbf{(b)}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 1125, "effort_local": 1125, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 17176}, "thm:scheme-of-morphisms": {"id": "thm:scheme-of-morphisms", "type": "theorem", "title": "Scheme of morphisms", "chapter": "Variants and Applications", "statement": "\\textit{Source: Nitsure §6, Theorem (scheme of morphisms).}\n  Let $S$ be noetherian, $X$ projective and flat over $S$, and $Y$\n  quasi-projective over $S$. Then $\\Mor_S(X,Y)$ is representable by an open\n  subscheme $\\Mor_S(X,Y)$ of the Hilbert scheme $\\hilbsch_{X\\times_S Y/S}$ of\n  graphs.", "uses": ["thm:hilbert-scheme-exists", "thm:isomorphism-is-open"], "lean_name": "MR2223407ConstructionHilbertQuot.schemeOfMorphisms", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:hilbert-scheme-exists, thm:isomorphism-is-open}\n  To a morphism $f\\colon X_T\\to Y_T$ associate its graph\n  $\\Gamma_T(f)\\subset (X\\times_S Y)_T$, closed by separatedness of $Y\\to S$ and\n  isomorphic to $X$ via $(\\id_X,f)$ and the projection. Since $X$ is proper and\n  flat over $S$, so is $\\Gamma_T(f)$, giving a functorial map\n  $\\Gamma_T\\colon \\Mor_S(X,Y)(T)\\to \\Hilbf_{X\\times_S Y/S}(T)$ and hence a\n  morphism of functors $\\Gamma\\colon \\Mor_S(X,Y)\\to \\Hilbf_{X\\times_S Y/S}$, the\n  Hilbert functor being representable by \\cref{thm:hilbert-scheme-exists}. Given a\n  family $Z\\subset (X\\times_S Y)_T$, applying \\cref{thm:isomorphism-is-open}\\,(b)\n  to the projection $Z\\to X$ produces an open $T'\\subset T$ over which (and only\n  over which, after base change) $Z$ maps isomorphically to $X$; over $T'$, $Z$ is\n  the graph of a unique morphism $X_{T'}\\to Y_{T'}$. Thus $\\Gamma$ is a\n  representable open embedding, and $\\Mor_S(X,Y)$ is represented by an open\n  subscheme of $\\hilbsch_{X\\times_S Y/S}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Variants.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1012, "effort_local": 1012, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 45083}, "lem:descent-of-subschemes": {"id": "lem:descent-of-subschemes", "type": "lemma", "title": "Descent of ightarrows X$ are proper and flat. Then a schematic\n  quotient $X\\to Q$ exists over $S$; $Q$ is quasi-projective over $S$, the\n  morphism $X\\to Q$ is faithfully flat and projective, and\n  $(f_1,f_2)\\colon R\\to X\\times_Q X$ is an isomorphism (the quotient is\n  effective).", "uses": ["thm:hilbert-scheme-exists", "thm:isomorphism-is-open", "lem:descent-of-subschemes", "thm:quasiprojective-quot"], "lean_name": "MR2223407ConstructionHilbertQuot.projectiveFlatQuotient", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:hilbert-scheme-exists, thm:isomorphism-is-open, lem:descent-of-subschemes, thm:quasiprojective-quot}\n  \n  \n  \\emph{Following Altman--Kleiman [A-K~2].} Properness of the $f_i$ and\n  separatedness of $X\\to S$ make $f\\colon R\\to X\\times_S X$ proper; being\n  functorially injective, $f$ is a closed embedding, so $R$ is a closed subscheme\n  of $X\\times_S X$ with $p_2|_R = f_2$ proper and flat. This makes $R$ an element\n  of $\\Hilbf_{X/S}(X)$.\n\n  By \\cref{thm:quasiprojective-quot} (applied to $E = \\Oo_X$, i.e.\\\n  \\cref{thm:hilbert-scheme-exists}) the Hilbert functor is representable; since\n  $X$ is noetherian and the Hilbert polynomial is locally constant, only finitely\n  many $\\Phi$ occur as Hilbert polynomials of the fibres of $f_2$ relative to a\n  chosen very ample $L$. Let $H$ be the finite disjoint union of the corresponding\n  $\\hilbsch_{X/S}^{\\Phi,L}$, a quasi-projective $S$-scheme. The family $(R)$ then\n  gives a classifying morphism $\\varphi\\colon X\\to H$ with $\\varphi^*D = R$, where\n  $D\\subset X\\times_S H$ is the universal family; the projection $p\\colon D\\to H$\n  is proper and flat, and surjective (as $\\Delta_X\\subset R$ makes every fibre of\n  $f_2$ non-empty), hence faithfully flat.\n\n  One establishes the crucial property: for any $S$-scheme $T$ and\n  $x,y\\in X(T)$, $(x,y)\\in R(T) \\iff x\\in\\varphi(y) \\iff \\varphi(x)=\\varphi(y)$.\n  The graph $(\\id_X,\\varphi)\\colon X\\to X // ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,

// Which universe a node belongs to. A node "has Lean" if it carries Lean source
// (lean_aux nodes always do; blueprint nodes do once their \lean{} resolved).

const inBlueprint = n => n.type !== "lean_aux";

  const n = allNodes[id];

  if (state.nodeset === "lean")      return hasLean(n);
  return true;                                   // union
}

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));
  }
  let ids = Object.keys(allNodes).filter(inNodeset);
  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

// ── Network ─────────────────────────────────────────────────────────────────

const nodesDS = new vis.DataSet();
const edgesDS = new vis.DataSet();

// Force-directed layout: connected nodes attract, so each declaration settles
// next to what it depends on. Direction is conveyed by the arrows, not columns.
const N_TOTAL = graphData.nodes.length;
const PHYSICS_OPTS = {

// ── Isolated-node layout ──────────────────────────────────────────────────────
// Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

const fileOf = (n, mode) => mode === "lean" ? (n.lean_file || "") : (n.tex_file || "");

// A curated, perceptually-distinct palette (d3 category20-style). A file's
// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],
  [174,199,232],[255,187,120],[152,223,138],[255,152,150],[197,176,213],

  const tier = Math.floor(slot / FILE_PALETTE.length) % 3;   // 0 normal · 1 dark · 2 light

       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))
       : base.slice();
}

// driven by the name, and it never shifts under focus/reset/filtering (the file
// set is fixed for the session, and the map is cached).
const _fileSlots = {};

function fileCounts(mode) {
  const counts = {};

    const f = fileOf(allNodes[id], mode);
    if (f) counts[f] = (counts[f] || 0) + 1;

let fileBg = null;            // {canvas, minX, minY, w, h, W, H} in graph coords

function rebuildFileBg(quick) {
  const mode = state.fileview;
  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }

      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;

    return bs;

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");

    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;

// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
