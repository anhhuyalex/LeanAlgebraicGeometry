<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="chapter"><option value="">All chapters</option></select>

  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">

  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">

      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:projective-space": {"id": "def:projective-space", "type": "definition", "title": "Projective space over a base", "chapter": "Foundations and Conventions", "statement": "For a scheme $S$ and $n\\ge 0$, projective $n$-space $\\PP^n_S$ over $S$ is the\n  base change to $S$ of $\\PP^n_{\\ZZ} = \\Proj \\ZZ[x_0,\\dots,x_n]$, equipped with\n  its structure morphism to $S$ and Serre twisting sheaves $\\Oo(r)$.\n  \\textit{Source: Nitsure §1; standard (EGA II / Mathlib \\texttt{Proj}).}", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.projectiveSpace", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 11, "descendant_count": 52, "proof_size_tex": null, "effort_local": 300, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 300}, "def:relative-proj": {"id": "def:relative-proj", "type": "definition", "title": "Relative Proj of a graded sheaf; projective bundle", "chapter": "Foundations and Conventions", "statement": "For a coherent sheaf (or vector bundle) $V$ on a scheme $S$, the projective\n  bundle $\\PP(V) = \\Proj_S \\Sym_{\\Oo_S} V$ is the relative Proj of the graded\n  sheaf of $\\Oo_S$-algebras $\\Sym_{\\Oo_S} V$, equipped with its structure\n  morphism to $S$ and tautological very ample line bundle $\\Oo_{\\PP(V)}(1)$.\n  \\textit{Source: Nitsure §5 lines 2160--2173; standard (EGA II 3; built by\n  gluing the graded-ring $\\Proj$ on an affine cover of $S$).}", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.relativeProj", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:relative-proj}\n  Construction (project BUILD item, see \\texttt{STRATEGY.md} foundational-anchor\n  table): cover $S$ by affine opens $\\spec A$ on which $V$ trivializes; over each\n  take the graded-ring $\\Proj A[\\Sym V]$ (available in Mathlib as\n  \\texttt{AlgebraicGeometry.Proj}); glue along the overlaps using the transition\n  functions of $V$, and check the gluing cocycle. The twisting sheaves\n  $\\Oo_{\\PP(V)}(1)$ glue compatibly. Finite construction; no $\\infty$ hole.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 14, "proof_size_tex": 481, "effort_local": 442, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 742}, "def:very-ample": {"id": "def:very-ample", "type": "definition", "title": "Relatively very ample line bundle", "chapter": "Foundations and Conventions", "statement": "A line bundle $L$ on a scheme $X$ over $S$ is \\emph{relatively very ample} if\n  there is a closed immersion $X\\hookrightarrow \\PP(V)$ over $S$, for some\n  coherent sheaf $V$ on $S$, under which $L$ is the restriction of\n  $\\Oo_{\\PP(V)}(1)$.\n  \\textit{Source: Nitsure §5 lines 2160--2173.}", "uses": ["def:projective-space", "def:relative-proj"], "lean_name": "MR2223407ConstructionHilbertQuot.RelativelyVeryAmple", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": null, "effort_local": 288, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1030}, "thm:coherent-higher-direct-image": {"id": "thm:coherent-higher-direct-image", "type": "theorem", "title": "Coherence and finiteness of higher direct images", "chapter": "Foundations and Conventions", "statement": "Let $\\pi\\colon X\\to S$ be a projective morphism of noetherian schemes and let\n  $\\Ff$ be a coherent sheaf on $X$. Then each higher direct image\n  $R^i\\pi_*\\Ff$ is a coherent sheaf on $S$, and vanishes for $i$ greater than\n  the fibre dimension.\n  \\textit{Source: EGA III 3.2 (Nitsure §1, §3); used pervasively.}", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.coherent_higher_direct_image", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:coherent-higher-direct-image}\n  Classical theorem of Grothendieck on the finiteness of cohomology of proper\n  morphisms; reduces to the affine-base case and the computation of the\n  cohomology of $\\Oo_{\\PP^n}(r)$ via the Čech complex of the standard cover.\n  Treated as a foundational input (Mathlib anchor when available); see\n  \\texttt{STRATEGY.md} for the proof obligation status.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 33, "proof_size_tex": 393, "effort_local": 393, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 693}, "thm:serre-vanishing": {"id": "thm:serre-vanishing", "type": "theorem", "title": "Serre vanishing and global generation", "chapter": "Foundations and Conventions", "statement": "Let $\\Ff$ be a coherent sheaf on $\\PP^n_S$ with $S$ noetherian affine. Then\n  there is an integer $r_0$ such that for all $r\\ge r_0$ the sheaf $\\Ff(r)$ is\n  generated by finitely many global sections and $H^i(\\PP^n_S,\\Ff(r)) = 0$ for\n  all $i\\ge 1$.\n  \\textit{Source: Serre (FAC); EGA III 2.2.1; Nitsure §2--§3.}", "uses": ["thm:coherent-higher-direct-image"], "lean_name": "MR2223407ConstructionHilbertQuot.serre_vanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:serre-vanishing}\n  Standard: write $\\Ff$ as a quotient of a finite sum of twists\n  $\\Oo(-d)^{\\oplus}$ and use the explicit cohomology of line bundles on\n  $\\PP^n$. Foundational input; refined quantitatively in\n  Chapter~\\ref{chap:regularity} (Castelnuovo--Mumford regularity).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 14, "proof_size_tex": 286, "effort_local": 286, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 979}, "thm:cohomology-base-change": {"id": "thm:cohomology-base-change", "type": "theorem", "title": "Cohomology and base change", "chapter": "Foundations and Conventions", "statement": "Let $\\pi\\colon X\\to S$ be projective with $S$ noetherian and $\\Ff$ coherent on\n  $X$ and flat over $S$. There is a bounded complex $K^\\bullet$ of finite\n  locally free $\\Oo_S$-modules (the Grothendieck complex) computing the\n  cohomology of $\\Ff$ universally: for every base change $\\phi\\colon T\\to S$,\n  $R^i\\pi_{T*}\\Ff_T \\cong \\mathcal{H}^i(\\phi^* K^\\bullet)$.\n  \\textit{Source: EGA III 7.7 (Nitsure §3 lines 1449--1607).}", "uses": ["thm:coherent-higher-direct-image"], "lean_name": "MR2223407ConstructionHilbertQuot.cohomology_and_base_change", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:cohomology-base-change}\n  Classical (EGA III §7). Detailed development of the consequences used in this\n  project (semicontinuity, base change for flat sheaves) is given in\n  Chapter~\\ref{chap:semicontinuity}. Foundational input.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": 239, "effort_local": 239, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 932}, "thm:valuative-criterion-properness": {"id": "thm:valuative-criterion-properness", "type": "theorem", "title": "Valuative criterion of properness", "chapter": "Foundations and Conventions", "statement": "A finite-type morphism $X\\to S$ of noetherian schemes is proper if and only if\n  it is separated and satisfies the valuative criterion of properness with\n  respect to discrete valuation rings: for every dvr $R$ with fraction field $K$,\n  every $S$-morphism $\\spec K\\to X$ extends uniquely to $\\spec R\\to X$.\n  \\textit{Source: EGA II 7.3 (Nitsure §1 lines 865--891); available in Mathlib.}", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.valuativeCriterion_proper", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:valuative-criterion-properness}\n  Standard; available in Mathlib's algebraic geometry library. Mathlib anchor.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": 120, "effort_local": 120, "proof_size_tex_total": 120, "proof_size_lean_total": null, "effort_total": 120}, "thm:ffdescent": {"id": "thm:ffdescent", "type": "theorem", "title": "Faithfully flat descent for quasi-coherent sheaves", "chapter": "Foundations and Conventions", "statement": "Quasi-coherent sheaves, and morphisms between them, satisfy descent along\n  faithfully flat quasi-compact morphisms; in particular the Hilbert and Quot\n  functors are sheaves for the fppf topology.\n  \\textit{Source: SGA1/EGA (Nitsure §1 lines 382--439); standard.}", "uses": [], "lean_name": "MR2223407ConstructionHilbertQuot.faithfullyFlatDescent", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:ffdescent}\n  Classical fppf descent. Foundational input; only the qualitative ``the functor\n  is a sheaf'' statement is used. Mathlib anchor when available.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Basic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 166, "effort_local": 166, "proof_size_tex_total": 166, "proof_size_lean_total": null, "effort_total": 166}, "def:hilbert-functor-pn": {"id": "def:hilbert-functor-pn", "type": "definition", "title": "The Hilbert functor of projective space", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Let $S$ be a locally noetherian scheme. A \\emph{family of subschemes of\n  $\\PP^n$ parametrised by $S$} is a closed subscheme $Y\\subset\\PP^n_S =\n  \\PP^n_{\\ZZ}\\times S$ that is flat over $S$. For a morphism $f\\colon T\\to S$ of\n  locally noetherian schemes, pullback along $\\id\\times f\\colon\\PP^n_T\\to\\PP^n_S$\n  sends a family $Y$ over $S$ to the family $f^*(Y) = (\\id\\times f)^{-1}(Y)\n  \\subset\\PP^n_T$ over $T$. This defines the contravariant set-valued functor\n  \\[\n    \\Hilbf_{\\PP^n}(S) \\;=\\; \\{\\, Y\\subset\\PP^n_S \\mid Y \\text{ is flat over } S \\,\\}.\n  \\]", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.hilbertFunctorPn", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 588, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 888}, "def:quot-functor-pn": {"id": "def:quot-functor-pn", "type": "definition", "title": "The Quot functor of $\\oplus^r\\Oo_{\\PP^n}$", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Fix a positive integer $r$. A \\emph{family of quotients of $\\oplus^r\\Oo_{\\PP^n}$\n  parametrised by} a locally noetherian scheme $S$ is a pair $(\\Ff,q)$ where\n  (i) $\\Ff$ is a coherent sheaf on $\\PP^n_S$ flat over $S$, and\n  (ii) $q\\colon\\oplus^r\\Oo_{\\PP^n_S}\\to\\Ff$ is a surjective\n  $\\Oo_{\\PP^n_S}$-linear homomorphism. Two families $(\\Ff,q)$ and $(\\Ff',q')$ are\n  \\emph{equivalent} if there is an isomorphism $f\\colon\\Ff\\to\\Ff'$ with\n  $f\\circ q = q'$; equivalently $\\ker(q) = \\ker(q')$. Write $\\langle\\Ff,q\\rangle$\n  for an equivalence class. Pullback under $\\id\\times f\\colon\\PP^n_T\\to\\PP^n_S$\n  sends $q$ to $f^*(q)\\colon\\oplus^r\\Oo_{\\PP^n_T}\\to f^*(\\Ff)$ (well-defined,\n  since tensor product is right exact and preserves flatness) and respects\n  equivalence, giving the contravariant functor\n  \\[\n    \\Quotf_{\\oplus^r\\Oo_{\\PP^n}}(S) \\;=\\;\n    \\{\\,\\text{all }\\langle\\Ff,q\\rangle \\text{ parametrised by } S\\,\\}.\n  \\]", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.quotFunctorPn", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 953, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1253}, "def:quot-functor": {"id": "def:quot-functor", "type": "definition", "title": "The Quot functor $\\Quotf_{E/X/S}$", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Let $S$ be noetherian, $X\\to S$ a morphism of finite type, and $E$ a coherent\n  sheaf on $X$. Let $\\Sch_S$ be the category of locally noetherian $S$-schemes.\n  For $T\\to S$ in $\\Sch_S$, a \\emph{family of quotients of $E$ parametrised by\n  $T$} is a pair $(\\Ff,q)$ where (i) $\\Ff$ is a coherent sheaf on $X_T =\n  X\\times_S T$ whose schematic support is proper over $T$ and which is flat over\n  $T$, and (ii) $q\\colon E_T\\to\\Ff$ is a surjective $\\Oo_{X_T}$-linear\n  homomorphism, $E_T$ being the pullback of $E$ along $X_T\\to X$. Two families are\n  equivalent if $\\ker(q) = \\ker(q')$, with class $\\langle\\Ff,q\\rangle$. Since\n  properness and flatness are stable under base change and tensor product is\n  right exact, pullback along an $S$-morphism $T'\\to T$ is well-defined, yielding\n  the contravariant functor $\\Quotf_{E/X/S}\\colon\\Sch_S\\to\\Sets$,\n  $T\\mapsto\\{\\text{all }\\langle\\Ff,q\\rangle \\text{ parametrised by } T\\}$. The\n  functors of \\cref{def:quot-functor-pn,def:hilbert-functor-pn} are the special\n  cases $\\Quotf_{\\oplus^r\\Oo_{\\PP^n_{\\ZZ}}/\\PP^n_{\\ZZ}/\\spec\\ZZ}$ and\n  $\\Hilbf_{\\PP^n_{\\ZZ}/\\spec\\ZZ}$.", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.quotFunctor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 19, "proof_size_tex": null, "effort_local": 1143, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1443}, "def:hilbert-functor": {"id": "def:hilbert-functor", "type": "definition", "title": "The Hilbert functor $\\Hilbf_{X/S}$", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Taking $E = \\Oo_X$ in \\cref{def:quot-functor}, a surjection\n  $\\Oo_{X_T}\\to\\Ff$ with $\\ker$ recording the data is the same as a closed\n  subscheme $Y\\subset X_T$ proper and flat over $T$. The resulting functor\n  $\\Hilbf_{X/S} := \\Quotf_{\\Oo_X/X/S}$ sends $T$ to the set of closed subschemes\n  $Y\\subset X_T$ that are proper and flat over $T$. In particular $\\Hilbf_{\\PP^n}\n  = \\Hilbf_{\\PP^n_{\\ZZ}/\\spec\\ZZ}$.", "uses": ["def:quot-functor"], "lean_name": "MR2223407ConstructionHilbertQuot.hilbertFunctor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": null, "effort_local": 440, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1883}, "def:hilbert-polynomial": {"id": "def:hilbert-polynomial", "type": "definition", "title": "Hilbert polynomial of a coherent sheaf", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Let $X$ be of finite type over a field $k$ with a line bundle $L$, and let $F$\n  be a coherent sheaf on $X$ whose support is proper over $k$. Its \\emph{Hilbert\n  polynomial} $\\Phi\\in\\QQ[\\lambda]$ is the polynomial agreeing for all integers\n  $m$ with the Euler characteristic\n  \\[\n    \\Phi(m) \\;=\\; \\chi(F(m)) \\;=\\;\n    \\sum_{i\\ge 0}(-1)^i\\dim_k H^i\\!\\left(X,\\, F\\ot L^{\\ot m}\\right),\n  \\]\n  the cohomology groups being finite-dimensional by coherence and properness.\n  That $m\\mapsto\\chi(F(m))$ is given by a polynomial is the content of Snapper's\n  lemma, which we take as an external input (cited, not proved here); the\n  finiteness of the $H^i$ is \\cref{thm:coherent-higher-direct-image}.", "uses": ["thm:coherent-higher-direct-image"], "lean_name": "MR2223407ConstructionHilbertQuot.hilbertPolynomial", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 18, "proof_size_tex": null, "effort_local": 724, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1417}, "def:quot-functor-phi": {"id": "def:quot-functor-phi", "type": "definition", "title": "The fixed-polynomial Quot subfunctor", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Fix a line bundle $L$ on $X$ and a polynomial $\\Phi\\in\\QQ[\\lambda]$. The\n  subfunctor $\\Quotf_{E/X/S}^{\\Phi,L}\\subset\\Quotf_{E/X/S}$ assigns to $T$ the\n  set of classes $\\langle\\Ff,q\\rangle$ such that for every point $t\\in T$ the\n  Hilbert polynomial of the fibre $\\Ff_t$, computed with respect to the pullback\n  of $L$ to $X_t$, equals $\\Phi$ (\\cref{def:hilbert-polynomial}).", "uses": ["def:quot-functor", "def:hilbert-polynomial"], "lean_name": "MR2223407ConstructionHilbertQuot.quotFunctorPhi", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 14, "proof_size_tex": null, "effort_local": 408, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2968}, "lem:quot-hilbert-decomposition": {"id": "lem:quot-hilbert-decomposition", "type": "lemma", "title": "Decomposition by Hilbert polynomial", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  With $L$ a line bundle on $X$, the functor $\\Quotf_{E/X/S}$ is the coproduct\n  \\[\n    \\Quotf_{E/X/S} \\;=\\; \\coprod_{\\Phi\\in\\QQ[\\lambda]}\\Quotf_{E/X/S}^{\\Phi,L}\n  \\]\n  of the subfunctors of \\cref{def:quot-functor-phi}.", "uses": ["def:quot-functor-phi", "def:hilbert-polynomial"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_hilbert_decomposition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:quot-hilbert-decomposition, def:quot-functor-phi, def:hilbert-polynomial}\n  Fix a family $\\langle\\Ff,q\\rangle\\in\\Quotf_{E/X/S}(T)$. Since $\\Ff$ is coherent\n  on $X_T$, flat over $T$, with support proper over $T$, the function\n  $t\\mapsto\\Phi_t$ sending a point of $T$ to the Hilbert polynomial of the fibre\n  $\\Ff_t$ (computed with the pullback of $L$) is locally constant on $T$ --- a\n  standard consequence of flatness, the constancy of the fibrewise Euler\n  characteristic in a flat family (cited, via \\cref{def:hilbert-polynomial} and\n  the cohomology-and-base-change input). Hence $T$ is the disjoint union of the\n  open-and-closed loci $T_\\Phi = \\{t : \\Phi_t = \\Phi\\}$, on each of which the\n  restricted family lies in $\\Quotf_{E/X/S}^{\\Phi,L}$. As only finitely many\n  $\\Phi$ occur on a given $T$ and the loci are disjoint, the assignment\n  $\\langle\\Ff,q\\rangle\\mapsto(\\langle\\Ff,q\\rangle|_{T_\\Phi})_\\Phi$ is a natural\n  bijection $\\Quotf_{E/X/S}(T)\\cong\\coprod_\\Phi\\Quotf_{E/X/S}^{\\Phi,L}(T)$,\n  giving the stated coproduct decomposition.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": 1056, "effort_local": 1056, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4024}, "lem:quot-ffdescent": {"id": "lem:quot-ffdescent", "type": "lemma", "title": "The Hilbert and Quot functors are fppf sheaves", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  The functors $\\Quotf_{E/X/S}$ and $\\Hilbf_{X/S}$ satisfy faithfully flat\n  descent; that is, they are sheaves for the fppf topology.", "uses": ["def:quot-functor", "def:hilbert-functor", "thm:ffdescent"], "lean_name": "MR2223407ConstructionHilbertQuot.quot_ffdescent", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:ffdescent}\n  A family $\\langle\\Ff,q\\rangle$ over $T$ is a quasi-coherent sheaf $\\Ff$ on\n  $X_T$ together with a homomorphism $q\\colon E_T\\to\\Ff$, data of a local\n  (quasi-coherent) nature on $X_T$. The coherence, flatness, properness of\n  support, and surjectivity conditions are all fppf-local on the base $T$.\n  Faithfully flat descent for quasi-coherent sheaves and their morphisms\n  (\\cref{thm:ffdescent}) therefore glues compatible families over an fppf cover\n  to a unique family over the base, so $\\Quotf_{E/X/S}$ is an fppf sheaf;\n  $\\Hilbf_{X/S}$ is the special case $E = \\Oo_X$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 598, "effort_local": 598, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2647}, "def:grassmannian-scheme": {"id": "def:grassmannian-scheme", "type": "definition", "title": "The Grassmannian scheme by gluing affine charts", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  Fix integers $r\\ge d\\ge 1$. For each subset $I\\subset\\{1,\\dots,r\\}$ with\n  $\\#I = d$, let $X^I$ be the $d\\times r$ matrix whose $I$-th $d\\times d$ minor\n  $X^I_I$ is the identity $1_{d\\times d}$ and whose remaining entries are\n  independent variables $x^I_{p,q}$; set $U^I = \\spec\\ZZ[X^I]$, non-canonically\n  $\\AAA^{d(r-d)}_{\\ZZ}$. For $J$ with $\\#J = d$ put $P^I_J = \\det(X^I_J)$ and let\n  $U^I_J = \\spec\\ZZ[X^I, 1/P^I_J]\\subset U^I$ be the locus where $X^I_J$ is\n  invertible. Define $\\theta_{I,J}\\colon\\ZZ[X^J,1/P^J_I]\\to\\ZZ[X^I,1/P^I_J]$ by\n  the matrix formula $\\theta_{I,J}(X^J) = (X^I_J)^{-1}X^I$ (so\n  $\\theta_{I,J}(P^J_I) = 1/P^I_J$, and the map extends to the localisation). The\n  $\\binom{r}{d}$ charts $U^I$ glued along the $\\theta_{I,J}$ form the\n  finite-type scheme $\\grasssch(r,d)$ over $\\ZZ$, which is smooth over $\\spec\\ZZ$\n  of relative dimension $d(r-d)$.", "uses": ["def:projective-space"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannianScheme", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 15, "proof_size_tex": null, "effort_local": 906, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1206}, "lem:grassmannian-cocycle": {"id": "lem:grassmannian-cocycle", "type": "lemma", "title": "Cocycle condition for the gluing", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  One has $\\theta_{I,I} = \\id$ on $U^I$, and for any three index sets $I,J,K$ of\n  cardinality $d$ the cocycle identity\n  $\\theta_{I,K} = \\theta_{I,J}\\circ\\theta_{J,K}$ holds on the relevant overlaps.\n  Hence the gluing data of \\cref{def:grassmannian-scheme} is valid.", "uses": ["def:grassmannian-scheme"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannian_cocycle", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:grassmannian-scheme}\n  All three maps are computed by the same matrix bookkeeping. On\n  $\\ZZ[X^K,\\dots]$, applying $\\theta_{J,K}$ then $\\theta_{I,J}$ sends $X^K$ to\n  $\\theta_{I,J}\\big((X^J_K)^{-1}X^J\\big) = \\big(\\theta_{I,J}(X^J)_K\\big)^{-1}\n  \\theta_{I,J}(X^J)$. Substituting $\\theta_{I,J}(X^J) = (X^I_J)^{-1}X^I$ and\n  using that the $K$-minor of $(X^I_J)^{-1}X^I$ is $(X^I_J)^{-1}X^I_K$, the\n  leading factor $(X^I_J)^{-1}$ cancels:\n  $\\big((X^I_J)^{-1}X^I_K\\big)^{-1}(X^I_J)^{-1}X^I = (X^I_K)^{-1}X^I =\n  \\theta_{I,K}(X^K)$. Since $\\theta_{I,I}(X^I) = (X^I_I)^{-1}X^I = X^I$ (as\n  $X^I_I = 1$), $\\theta_{I,I} = \\id$, and the cocycle condition holds on the\n  triple overlaps where all the relevant minors are invertible.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": 734, "effort_local": 734, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1940}, "lem:grassmannian-separated": {"id": "lem:grassmannian-separated", "type": "lemma", "title": "Separatedness of the Grassmannian", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  The scheme $\\grasssch(r,d)$ is separated over $\\ZZ$: for any two charts, the\n  intersection of the diagonal with $U^I\\times U^J$ is the closed subscheme\n  $\\Delta_{I,J}\\subset U^I\\times U^J$ cut out by the entries of\n  $X^J_I\\,X^I - X^J = 0$.", "uses": ["def:grassmannian-scheme"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannian_separated", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:grassmannian-scheme}\n  To check separatedness it suffices to show that for every pair of charts the\n  diagonal $\\grasssch(r,d)\\to\\grasssch(r,d)\\times_\\ZZ\\grasssch(r,d)$ meets\n  $U^I\\times U^J$ in a closed subscheme. A point of $U^I\\times U^J$ lies on the\n  diagonal exactly when the two matrices represent the same quotient, i.e. when\n  $X^J = X^J_I\\,X^I$ (the change-of-chart relation from $\\theta$). The entries of\n  $X^J_I\\,X^I - X^J$ are regular functions on $U^I\\times U^J$, so their vanishing\n  locus $\\Delta_{I,J}$ is closed; this is the diagonal restricted to that chart\n  product. As this holds for all $I,J$, the diagonal is a closed immersion and\n  $\\grasssch(r,d)$ is separated.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": 700, "effort_local": 700, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1906}, "lem:grassmannian-proper": {"id": "lem:grassmannian-proper", "type": "lemma", "title": "Properness of the Grassmannian", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  The structure morphism $\\pi\\colon\\grasssch(r,d)\\to\\spec\\ZZ$ is proper.", "uses": ["def:grassmannian-scheme", "lem:grassmannian-separated", "lem:grassmannian-cocycle", "thm:valuative-criterion-properness"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannian_proper", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:grassmannian-scheme, lem:grassmannian-separated, lem:grassmannian-cocycle, thm:valuative-criterion-properness}\n  The morphism is of finite type, and by \\cref{lem:grassmannian-separated} it is\n  separated; by \\cref{thm:valuative-criterion-properness} it suffices to verify\n  the valuative criterion for discrete valuation rings. Let $\\Rr$ be a dvr with\n  fraction field $\\K$ and valuation $\\nu$, and let $\\varphi\\colon\\spec\\K\\to\n  \\grasssch(r,d)$ be a $\\ZZ$-morphism. It factors through some chart $U^I$, given\n  by $f\\colon\\ZZ[X^I]\\to\\K$. Choose $J$ minimising $\\nu(f(P^I_J))$; since\n  $P^I_I = 1$ we have $\\nu(f(P^I_J))\\le\\nu(f(P^I_I)) = 0$, so $f(P^I_J)\\ne 0$ and\n  $f(X^I_J)\\in\\GL_d(\\K)$. Define $g\\colon\\ZZ[X^J]\\to\\K$ by\n  $g(X^J) = f\\big((X^I_J)^{-1}X^I\\big)$; by the cocycle relation\n  (\\cref{lem:grassmannian-cocycle}) $g$ defines the same morphism $\\varphi$. For\n  every $K$ the minor satisfies $g(P^J_K) = f(P^I_K)/f(P^I_J)$, which has\n  $\\nu\\ge 0$ by minimality of $\\nu(f(P^I_J))$. Since $X^J_J = 1$, expanding the\n  entries of $X^J$ in terms of these minors gives $\\nu(g(x^J_{p,q}))\\ge 0$ for\n  all entries; hence $g$ factors uniquely through $\\Rr\\subset\\K$, producing a\n  morphism $\\spec\\Rr\\to U^J\\hookrightarrow\\grasssch(r,d)$ extending $\\varphi$.\n  Existence plus separatedness (uniqueness) give the valuative criterion, so\n  $\\pi$ is proper.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 9, "proof_size_tex": 1366, "effort_local": 1366, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4126}, "def:grassmannian-universal-quotient": {"id": "def:grassmannian-universal-quotient", "type": "definition", "title": "The tautological quotient on the Grassmannian", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  On each chart $U^I$ define a surjection $u^I\\colon\\oplus^r\\Oo_{U^I}\\to\n  \\oplus^d\\Oo_{U^I}$ by the matrix $X^I$. Glue the trivial rank-$d$ bundles\n  $\\oplus^d\\Oo_{U^I}$ by the transition matrices $g_{I,J} = (X^I_J)^{-1}\\in\n  \\GL_d(U^I_J)$; these are compatible with the chart gluing $(\\theta_{I,J})$ of\n  \\cref{def:grassmannian-scheme} and with the $u^I$. The result is a rank-$d$\n  locally free sheaf $\\Uu$ on $\\grasssch(r,d)$ with a surjective homomorphism\n  $u\\colon\\oplus^r\\Oo_{\\grasssch(r,d)}\\to\\Uu$, the \\emph{tautological quotient}.", "uses": ["def:grassmannian-scheme"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannianUniversalQuotient", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": null, "effort_local": 571, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1777}, "lem:grassmannian-very-ample": {"id": "lem:grassmannian-very-ample", "type": "lemma", "title": "The determinant of $\\Uu$ is very ample; the Pl\\\"ucker embedding", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  The determinant line bundle $\\det(\\Uu)$ has transition functions\n  $\\det(g_{I,J}) = 1/P^I_J$. The Pl\\\"ucker sections $\\sigma_I\\in\n  \\Gamma(\\grasssch(r,d),\\det(\\Uu))$, defined by\n  $\\sigma_I|_{U^J} = P^J_I$, form a base-point-free linear system separating\n  points and tangent vectors relative to $\\spec\\ZZ$, and give a closed embedding\n  $\\grasssch(r,d)\\hookrightarrow\\PP^m_{\\ZZ}$ with $m = \\binom{r}{d}-1$. In\n  particular $\\det(\\Uu)$ is relatively very ample over $\\ZZ$.", "uses": ["def:grassmannian-universal-quotient", "lem:grassmannian-proper", "def:very-ample"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannian_very_ample", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:grassmannian-universal-quotient, lem:grassmannian-proper, def:very-ample}\n  Since $\\Uu$ has transition matrices $g_{I,J} = (X^I_J)^{-1}$, its top exterior\n  power $\\det(\\Uu)$ has transition functions $\\det(g_{I,J}) = 1/P^I_J$. The local\n  expressions $\\sigma_I|_{U^J} = P^J_I$ are compatible with these transitions\n  ($P^K_I = P^K_J\\cdot P^J_I/\\!\\det$-cocycle on overlaps), hence glue to global\n  sections $\\sigma_I\\in\\Gamma(\\grasssch(r,d),\\det(\\Uu))$, indexed by the\n  $\\binom{r}{d}$ subsets $I$. On the chart $U^J$ one has $\\sigma_J|_{U^J} =\n  P^J_J = 1$, nowhere vanishing, so the $\\sigma_I$ have no common zero: the\n  system is base-point free and defines a morphism\n  $\\grasssch(r,d)\\to\\PP^m_{\\ZZ}$, $m = \\binom{r}{d}-1$. On each chart the\n  remaining ratios $\\sigma_I/\\sigma_J = P^J_I$ recover the chart coordinates, so\n  the morphism separates points and tangent vectors and is an immersion. By\n  properness of $\\pi$ (\\cref{lem:grassmannian-proper}) the immersion is a closed\n  immersion; thus $\\det(\\Uu)$ is relatively very ample in the sense of\n  \\cref{def:very-ample}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 1088, "effort_local": 1088, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6515}, "thm:grassmannian-represents": {"id": "thm:grassmannian-represents", "type": "theorem", "title": "The Grassmannian represents the quotient functor", "chapter": "The Hilbert and Quot Functors, and the Grassmannian", "statement": "\\textit{Source: Nitsure, §1.}\n  The scheme $\\grasssch(r,d)$, together with its tautological quotient\n  $u\\colon\\oplus^r\\Oo_{\\grasssch(r,d)}\\to\\Uu$, represents the contravariant\n  functor\n  \\[\n    \\grassf(r,d)(T) \\;=\\;\n    \\{\\,\\langle\\Ff,q\\rangle : q\\colon\\oplus^r\\Oo_T\\twoheadrightarrow\\Ff,\\\n    \\Ff \\text{ locally free of rank } d\\,\\}.\n  \\]\n  That is, for every scheme $T$ pulling back $u$ gives a natural bijection\n  $\\Mor(T,\\grasssch(r,d))\\cong\\grassf(r,d)(T)$, with $u$ the universal quotient.", "uses": ["def:grassmannian-scheme", "def:grassmannian-universal-quotient", "lem:grassmannian-cocycle"], "lean_name": "MR2223407ConstructionHilbertQuot.grassmannian_represents", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:grassmannian-scheme, def:grassmannian-universal-quotient, lem:grassmannian-cocycle}\n  Pullback of the tautological quotient gives a natural transformation\n  $\\Mor(-,\\grasssch(r,d))\\to\\grassf(r,d)$, $\\psi\\mapsto\\langle\\psi^*\\Uu,\\psi^*\n  u\\rangle$. We construct the inverse. Given a rank-$d$ locally free quotient\n  $q\\colon\\oplus^r\\Oo_T\\twoheadrightarrow\\Ff$ on $T$, the homomorphism $q$ is\n  locally an $r\\to d$ surjection; over the open set $T_I$ where the composite\n  $\\oplus^r\\Oo_T\\to\\Ff$ restricted to the coordinates indexed by $I$ is an\n  isomorphism (equivalently, the corresponding $d\\times d$ minor is invertible),\n  trivialise $\\Ff$ by that isomorphism. In this trivialisation $q$ is given by a\n  $d\\times r$ matrix whose $I$-minor is the identity, hence by a unique morphism\n  $T_I\\to U^I$ classifying its free entries. As $I$ ranges over all index sets\n  the $T_I$ cover $T$ (some $d\\times d$ minor of $q$ is invertible at each point,\n  $\\Ff$ being a rank-$d$ quotient), and on overlaps the two classifying maps\n  differ exactly by the change-of-chart $\\theta_{I,J}$ (\\cref{lem:grassmannian-cocycle}),\n  so they glue to a unique morphism $\\varphi_q\\colon T\\to\\grasssch(r,d)$ with\n  $\\varphi_q^*u\\cong q$. The two constructions are mutually inverse and natural\n  in $T$, so $\\grasssch(r,d)$ represents $\\grassf(r,d)$ with universal family\n  $u$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Functors.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": 1366, "effort_local": 1366, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3877}, "def:m-regular": {"id": "def:m-regular", "type": "definition", "title": "$m$-regular sheaf", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $k$ be a field, let $\\Ff$ be a coherent sheaf on projective space $\\PP^n$\n  over $k$, and let $m$ be an integer. The sheaf $\\Ff$ is said to be\n  \\emph{$m$-regular} if\n  \\[\n    H^i(\\PP^n, \\Ff(m-i)) = 0 \\quad\\text{for every } i \\ge 1 .\n  \\]\n  \\textit{Source: Nitsure \\S2, lines 960--963.}\n  The definition, which may look strange at first sight, is designed to support\n  induction on $n = \\dim(\\PP^n)$ by restriction to a suitable hyperplane: the\n  shift $m-i$ is exactly what makes the property survive such a restriction\n  (\\cref{lem:regularity-hyperplane-restriction}). The cohomology groups\n  $H^i(\\PP^n,\\Ff(m-i))$ are finite-dimensional $k$-vector spaces by\n  \\cref{thm:coherent-higher-direct-image} (applied to the structure morphism\n  $\\PP^n\\to\\spec k$).", "uses": ["def:projective-space", "thm:coherent-higher-direct-image"], "lean_name": "MR2223407ConstructionHilbertQuot.IsMRegular", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 16, "proof_size_tex": null, "effort_local": 763, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1456}, "lem:regularity-hyperplane-restriction": {"id": "lem:regularity-hyperplane-restriction", "type": "lemma", "title": "Regularity restricts to a generic hyperplane", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $\\Ff$ be a coherent sheaf on $\\PP^n$ over a field $k$, and let\n  $H\\subset\\PP^n$ be a hyperplane that contains no associated point of $\\Ff$.\n  Write $\\Ff_H$ for the restriction of $\\Ff$ to $H\\simeq\\PP^{n-1}$. If $\\Ff$ is\n  $m$-regular, then $\\Ff_H$ is again $m$-regular, with the \\emph{same} value of\n  $m$. Moreover, whenever $\\Ff$ is coherent its set of associated points is\n  finite, so at least one such hyperplane $H$ exists when $k$ is infinite.\n  \\textit{Source: Nitsure \\S2, lines 966--981.}", "uses": ["def:m-regular"], "lean_name": "MR2223407ConstructionHilbertQuot.isMRegular_restrict_hyperplane", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:m-regular, thm:coherent-higher-direct-image}\n  Fix $i\\ge 1$. Because $H$ contains no associated point of $\\Ff$, a local\n  defining equation of $H$ is a non-zero-divisor on $\\Ff$, so multiplication by\n  it gives an injection $\\alpha\\colon \\Ff(m-i-1)\\hookrightarrow \\Ff(m-i)$ whose\n  cokernel is the restriction $\\Ff_H(m-i)$. Twisting the structure sequence of\n  $H$ by $\\Ff(m-i)$ thus yields the short exact sequence\n  \\[\n    0 \\to \\Ff(m-i-1) \\xrightarrow{\\ \\alpha\\ } \\Ff(m-i) \\to \\Ff_H(m-i) \\to 0 .\n  \\]\n  Its long exact cohomology sequence contains\n  \\[\n    \\cdots \\to H^i(\\PP^n,\\Ff(m-i)) \\to H^i(H,\\Ff_H(m-i))\n      \\to H^{i+1}(\\PP^n,\\Ff(m-i-1)) \\to \\cdots .\n  \\]\n  If $\\Ff$ is $m$-regular then $H^i(\\PP^n,\\Ff(m-i)) = 0$ and, since the\n  exponent on the right is $(m-1)-(i+1)$ shifted appropriately, also\n  $H^{i+1}(\\PP^n,\\Ff(m-i-1)) = H^{i+1}(\\PP^n,\\Ff(m-(i+1)))=0$ by definition of\n  $m$-regularity applied at index $i+1$. Exactness forces the middle term\n  $H^i(H,\\Ff_H(m-i)) = 0$. As $i\\ge1$ was arbitrary, $\\Ff_H$ is $m$-regular.\n  Finiteness of the set of associated points of a coherent sheaf gives, for $k$\n  infinite, a hyperplane $H$ avoiding all of them. (All cohomology groups are\n  finite-dimensional over $k$ by \\cref{thm:coherent-higher-direct-image}.)\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 15, "proof_size_tex": 1279, "effort_local": 1279, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2735}, "lem:castelnuovo-vanishing": {"id": "lem:castelnuovo-vanishing", "type": "lemma", "title": "Castelnuovo, vanishing of higher cohomology", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $\\Ff$ be an $m$-regular coherent sheaf on $\\PP^n$ over a field $k$. Then\n  \\[\n    H^i(\\PP^n,\\Ff(r)) = 0 \\quad\\text{whenever } i\\ge1 \\text{ and } r\\ge m-i .\n  \\]\n  In particular, if $\\Ff$ is $m$-regular then it is $m'$-regular for every\n  $m'\\ge m$.\n  \\textit{Source: Nitsure \\S2, lines 994--996 (part (b)).}", "uses": ["def:m-regular", "lem:regularity-hyperplane-restriction"], "lean_name": "MR2223407ConstructionHilbertQuot.castelnuovo_vanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:m-regular, lem:regularity-hyperplane-restriction}\n  Since cohomology commutes with field extension, we may assume $k$ infinite,\n  and we argue by induction on $n$. For $n=0$ the only twist with $i\\ge1$ has\n  vanishing cohomology, so the statement holds. Let $n\\ge1$ and choose a\n  hyperplane $H$ avoiding the associated points of $\\Ff$; by\n  \\cref{lem:regularity-hyperplane-restriction}, $\\Ff_H$ is $m$-regular on\n  $H\\simeq\\PP^{n-1}$, so the inductive hypothesis applies to $\\Ff_H$.\n\n  Fix $i\\ge1$. When $r=m-i$ the equality $H^i(\\PP^n,\\Ff(r))=0$ holds by the\n  definition of $m$-regularity. We now induct on $r\\ge m-i+1$. From the short\n  exact sequence\n  $0\\to\\Ff(r-1)\\to\\Ff(r)\\to\\Ff_H(r)\\to0$ we extract\n  \\[\n    H^i(\\PP^n,\\Ff(r-1)) \\to H^i(\\PP^n,\\Ff(r)) \\to H^i(H,\\Ff_H(r)) .\n  \\]\n  The left term vanishes by the inductive hypothesis on $r-1$, and the right\n  term vanishes by the inductive hypothesis on $n-1$ (it equals\n  $H^i(H,\\Ff_H((m+i)-i))$ with $r\\ge m-i+1>m-i$, covered by regularity of\n  $\\Ff_H$ at smaller dimension). Exactness gives $H^i(\\PP^n,\\Ff(r))=0$. The\n  final statement is the case $r\\ge m$ rephrased: $m$-regularity at $m'\\ge m$\n  asks $H^i(\\Ff(m'-i))=0$, which holds since $m'-i\\ge m-i$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 14, "proof_size_tex": 1224, "effort_local": 1224, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3959}, "lem:castelnuovo-surjective": {"id": "lem:castelnuovo-surjective", "type": "lemma", "title": "Castelnuovo, surjectivity of multiplication", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $\\Ff$ be an $m$-regular coherent sheaf on $\\PP^n$ over a field $k$. Then\n  for every $r\\ge m$ the canonical multiplication map\n  \\[\n    H^0(\\PP^n,\\Oo_{\\PP^n}(1)) \\ot H^0(\\PP^n,\\Ff(r))\n      \\longrightarrow H^0(\\PP^n,\\Ff(r+1))\n  \\]\n  is surjective.\n  \\textit{Source: Nitsure \\S2, lines 990--992 (part (a)).}", "uses": ["def:m-regular", "lem:regularity-hyperplane-restriction", "lem:castelnuovo-vanishing"], "lean_name": "MR2223407ConstructionHilbertQuot.castelnuovo_surjective", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:m-regular, lem:regularity-hyperplane-restriction, lem:castelnuovo-vanishing}\n  We may assume $k$ infinite and induct on $n$; the case $n=0$ is immediate.\n  Let $n\\ge1$, pick a hyperplane $H$ avoiding the associated points of $\\Ff$, so\n  that $\\Ff_H$ is $m$-regular (\\cref{lem:regularity-hyperplane-restriction}) and\n  the inductive hypothesis holds on $H\\simeq\\PP^{n-1}$. Write $\\mu$ for the\n  multiplication map to be shown surjective, $\\nu_r$ for the restriction\n  $H^0(\\PP^n,\\Ff(r))\\to H^0(H,\\Ff_H(r))$, and consider the commutative diagram\n  \\[\n    \\begin{array}{ccc}\n      H^0(\\PP^n,\\Ff(r))\\ot H^0(\\PP^n,\\Oo_{\\PP^n}(1))\n        & \\xrightarrow{\\ \\sigma\\ }\n        & H^0(H,\\Ff_H(r))\\ot H^0(H,\\Oo_H(1)) \\\\\n      \\big\\downarrow{\\scriptstyle\\mu} & & \\big\\downarrow{\\scriptstyle\\tau} \\\\\n      H^0(\\PP^n,\\Ff(r+1)) & \\xrightarrow{\\ \\nu_{r+1}\\ } & H^0(H,\\Ff_H(r+1)) .\n    \\end{array}\n  \\]\n  The top map $\\sigma=\\nu_r\\ot\\rho$ is surjective: by\n  \\cref{lem:castelnuovo-vanishing}, $H^1(\\PP^n,\\Ff(r-1))=0$ for $r\\ge m$, so the\n  long exact sequence of $0\\to\\Ff(r-1)\\to\\Ff(r)\\to\\Ff_H(r)\\to0$ makes $\\nu_r$\n  surjective; and the restriction\n  $\\rho\\colon H^0(\\PP^n,\\Oo_{\\PP^n}(1))\\to H^0(H,\\Oo_H(1))$ is surjective. The\n  vertical map $\\tau$ is surjective by the inductive hypothesis on $\\dim H=n-1$.\n  Hence $\\nu_{r+1}\\circ\\mu=\\tau\\circ\\sigma$ is surjective, so\n  $H^0(\\PP^n,\\Ff(r+1)) = \\im(\\mu)+\\ker(\\nu_{r+1})$. By exactness of the bottom\n  row, $\\ker(\\nu_{r+1})=\\im(\\alpha)$, where $\\alpha$ is multiplication by the\n  section of $\\Oo_{\\PP^n}(1)$ cutting out $H$; this section lies in the image of\n  the multiplication map, so $\\im(\\alpha)\\subset\\im(\\mu)$. Therefore\n  $H^0(\\PP^n,\\Ff(r+1)) = \\im(\\mu)$, i.e. $\\mu$ is surjective.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": 1732, "effort_local": 1732, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5691}, "lem:castelnuovo-globally-generated": {"id": "lem:castelnuovo-globally-generated", "type": "lemma", "title": "Castelnuovo, global generation", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $\\Ff$ be an $m$-regular coherent sheaf on $\\PP^n$ over a field $k$. Then\n  for every $r\\ge m$ the twist $\\Ff(r)$ is generated by its global sections and\n  $H^i(\\PP^n,\\Ff(r))=0$ for all $i\\ge1$.\n  \\textit{Source: Nitsure \\S2, lines 999--1000 (part (c)).}", "uses": ["def:m-regular", "lem:castelnuovo-surjective", "lem:castelnuovo-vanishing", "thm:serre-vanishing"], "lean_name": "MR2223407ConstructionHilbertQuot.castelnuovo_globally_generated", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:castelnuovo-surjective, lem:castelnuovo-vanishing, thm:serre-vanishing}\n  Iterating \\cref{lem:castelnuovo-surjective} shows that the map\n  $H^0(\\PP^n,\\Ff(r))\\ot H^0(\\PP^n,\\Oo_{\\PP^n}(p))\\to H^0(\\PP^n,\\Ff(r+p))$ is\n  surjective for $r\\ge m$ and $p\\ge0$. By Serre vanishing\n  (\\cref{thm:serre-vanishing}), for $p\\gg0$ the sheaf $\\Ff(r+p)$ is generated by\n  its global sections. Surjectivity of the displayed map then propagates global\n  generation downward: every fibre of $\\Ff(r)$ is hit by global sections of\n  $\\Ff(r)$, so $\\Ff(r)$ is globally generated for $r\\ge m$. Vanishing of higher\n  cohomology for $r\\ge m$ is the case $i\\ge1$, $r\\ge m\\ge m-i$ of\n  \\cref{lem:castelnuovo-vanishing}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 12, "proof_size_tex": 700, "effort_local": 700, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6677}, "lem:castelnuovo": {"id": "lem:castelnuovo", "type": "lemma", "title": "Castelnuovo's lemma", "chapter": "Castelnuovo--Mumford Regularity", "statement": "Let $\\Ff$ be an $m$-regular coherent sheaf on $\\PP^n$ over a field $k$. Then,\n  for all $r\\ge m$:\n  \\textbf{(a)} the multiplication map\n  $H^0(\\Oo_{\\PP^n}(1))\\ot H^0(\\Ff(r))\\to H^0(\\Ff(r+1))$ is surjective;\n  \\textbf{(b)} $H^i(\\Ff(r'))=0$ for all $i\\ge1$ and $r'\\ge m-i$ (so $\\Ff$ is\n  $m'$-regular for all $m'\\ge m$); and\n  \\textbf{(c)} $\\Ff(r)$ is globally generated with vanishing higher cohomology.\n  \\textit{Source: Nitsure \\S2, Lemma (Castelnuovo), lines 986--1001.}", "uses": ["lem:castelnuovo-surjective", "lem:castelnuovo-vanishing", "lem:castelnuovo-globally-generated"], "lean_name": "MR2223407ConstructionHilbertQuot.castelnuovo", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:castelnuovo-surjective, lem:castelnuovo-vanishing, lem:castelnuovo-globally-generated}\n  Parts (a), (b), (c) are \\cref{lem:castelnuovo-surjective},\n  \\cref{lem:castelnuovo-vanishing}, and \\cref{lem:castelnuovo-globally-generated}\n  respectively.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": 255, "effort_local": 255, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6932}, "thm:mumford-regularity": {"id": "thm:mumford-regularity", "type": "theorem", "title": "Mumford's regularity theorem", "chapter": "Castelnuovo--Mumford Regularity", "statement": "For all non-negative integers $p$ and $n$ there exists a polynomial $F_{p,n}$\n  in $n+1$ variables with integer coefficients with the following property. Let\n  $k$ be any field, let $\\Ff$ be a coherent sheaf on $\\PP^n$ over $k$ that is\n  isomorphic to a subsheaf of $\\oplus^p\\Oo_{\\PP^n}$, and write its Hilbert\n  polynomial in the binomial basis as\n  \\[\n    \\chi(\\Ff(r)) = \\sum_{i=0}^n a_i \\binom{r}{i}, \\qquad a_0,\\dots,a_n\\in\\ZZ .\n  \\]\n  Then $\\Ff$ is $m$-regular for $m = F_{p,n}(a_0,\\dots,a_n)$.\n  \\textit{Source: Nitsure \\S2, Theorem (Mumford), lines 1131--1148.}", "uses": ["lem:castelnuovo", "lem:regularity-hyperplane-restriction", "def:hilbert-polynomial"], "lean_name": "MR2223407ConstructionHilbertQuot.mumford_regularity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:castelnuovo, lem:regularity-hyperplane-restriction, def:hilbert-polynomial, thm:coherent-higher-direct-image, thm:serre-vanishing}\n  Following Mumford, we may assume $k$ infinite and argue by induction on $n$.\n  For $n=0$ any polynomial $F_{p,0}$ works, since every coherent sheaf on\n  $\\spec k$ is $m$-regular for all $m$.\n\n  \\emph{Reduction to a hyperplane.} Let $n\\ge1$ and choose a hyperplane\n  $H\\subset\\PP^n$ avoiding the finitely many associated points of the quotient\n  $\\oplus^p\\Oo_{\\PP^n}/\\Ff$. Then $\\mathrm{Tor}^1_{\\Oo_{\\PP^n}}(\\Oo_H,\n  \\oplus^p\\Oo_{\\PP^n}/\\Ff) = 0$, so restricting\n  $0\\to\\Ff\\to\\oplus^p\\Oo_{\\PP^n}\\to\\oplus^p\\Oo_{\\PP^n}/\\Ff\\to0$ to $H$ keeps it\n  exact and exhibits $\\Ff_H$ as a subsheaf of $\\oplus^p\\Oo_{H}\\cong\n  \\oplus^p\\Oo_{\\PP^{n-1}_k}$. Since $\\Ff$ is torsion free (if nonzero), the\n  sequence $0\\to\\Ff(-1)\\to\\Ff\\to\\Ff_H\\to0$ is exact, whence\n  \\[\n    \\chi(\\Ff_H(r)) = \\chi(\\Ff(r))-\\chi(\\Ff(r-1))\n      = \\sum_{i=0}^n a_i\\binom{r-1}{i-1} = \\sum_{j=0}^{n-1} b_j\\binom{r}{j},\n  \\]\n  with $b_j = g_j(a_0,\\dots,a_n)$ for fixed integer polynomials $g_j$\n  independent of $k$ and $\\Ff$ (\\cref{def:hilbert-polynomial} for the binomial\n  expansion).\n\n  \\emph{Inductive bound on $\\Ff_H$.} By the inductive hypothesis there is a\n  polynomial $F_{p,n-1}$ making $\\Ff_H$ be $m_0$-regular with\n  $m_0 = F_{p,n-1}(b_0,\\dots,b_{n-1}) = G(a_0,\\dots,a_n)$, $G$ an integer\n  polynomial independent of $k$ and $\\Ff$.\n\n  \\emph{Controlling $h^1$.} For $m\\ge m_0-1$ the cohomology sequence of\n  $0\\to\\Ff(m-1)\\to\\Ff(m)\\to\\Ff_H(m)\\to0$ reads\n  \\[\n    0\\to H^0(\\Ff(m-1))\\to H^0(\\Ff(m))\\xrightarrow{\\nu_m} H^0(\\Ff_H(m))\n      \\to H^1(\\Ff(m-1))\\to H^1(\\Ff(m))\\to0,\n  \\]\n  with $H^i(\\Ff(m-1))\\xrightarrow{\\sim}H^i(\\Ff(m))$ for $i\\ge2$. Since\n  $H^i(\\Ff(m))=0$ for $m\\gg0$ (\\cref{thm:serre-vanishing}), these isomorphisms\n  give $H^i(\\Ff(m))=0$ for all $i\\ge2$ and $m\\ge m_0-2$. The surjections\n  $H^1(\\Ff(m-1))\\to H^1(\\Ff(m))$ make $h^1(\\Ff(m))$ non-increasing for\n  $m\\ge m_0-2$; moreover $h^1(\\Ff(m-1))=h^1(\\Ff(m))$ exactly when $\\nu_m$ is\n  surjective. As $\\Ff_H$ is $m_0$-regular, \\cref{rem:surjectivity-of-restriction}\n  shows $\\nu_j$ is surjective for all $j\\ge m_0$, so $h^1(\\Ff(m))$ is strictly\n  decreasing for $m\\ge m_0$ until it reaches $0$. Hence\n  $H^1(\\Ff(m))=0$ for $m\\ge m_0 + h^1(\\Ff(m_0))$.\n\n  \\emph{Bounding $h^1(\\Ff(m_0))$.} From $\\Ff\\subset\\oplus^p\\Oo_{\\PP^n}$ we get\n  $h^0(\\Ff(r))\\le p\\,h^0(\\Oo_{\\PP^n}(r)) = p\\binom{n+r}{n}$. Using\n  $h^i(\\Ff(m))=0$ for $i\\ge2$, $m\\ge m_0-2$,\n  \\[\n    h^1(\\Ff(m_0)) = h^0(\\Ff(m_0))-\\chi(\\Ff(m_0))\n      \\le p\\binom{n+m_0}{n} - \\sum_{i=0}^n a_i\\binom{m_0}{i}\n      =: P(a_0,\\dots,a_n),\n  \\]\n  with $P$ an integer polynomial (substitute $m_0=G(a_0,\\dots,a_n)$) independent\n  of $k$ and $\\Ff$, and $P(a_0,\\dots,a_n)\\ge0$. Therefore $H^1(\\Ff(m))=0$ for\n  $m\\ge G+P$. Combined with the vanishing of $H^i(\\Ff(m))$ for $i\\ge2$ and the\n  definition of regularity, taking $F_{p,n} := G + P$ makes $\\Ff$ be\n  $F_{p,n}(a_0,\\dots,a_n)$-regular. (All $h^i$ are finite by\n  \\cref{thm:coherent-higher-direct-image}.)\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Regularity.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": 3077, "effort_local": 3077, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10733}, "lem:base-change-without-flatness": {"id": "lem:base-change-without-flatness", "type": "lemma", "title": "Base change without flatness", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (Base-change without Flatness).}\n  Let $\\phi\\colon T\\to S$ be a morphism of noetherian schemes, let $\\Ff$ be a\n  coherent sheaf on $\\PP^n_S$, and let $\\Ff_T$ denote the pull-back of $\\Ff$\n  under the induced morphism $\\PP^n_T\\to\\PP^n_S$. Let\n  $\\pi_S\\colon \\PP^n_S\\to S$ and $\\pi_T\\colon \\PP^n_T\\to T$ denote the\n  projections. Then there exists an integer $r_0$ such that the base-change\n  homomorphism\n  \\[\n    \\phi^*{\\pi_S}_*\\,\\Ff(r)\\;\\longrightarrow\\;{\\pi_T}_*\\,\\Ff_T(r)\n  \\]\n  is an isomorphism for all $r\\ge r_0$.", "uses": ["def:projective-space", "thm:serre-vanishing", "lem:five-lemma"], "lean_name": "MR2223407ConstructionHilbertQuot.base_change_without_flatness", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:projective-space, thm:serre-vanishing, lem:five-lemma}\n  Base change holds for open immersions, so using a finite affine open cover\n  $\\{U_i\\}$ of $S$ and a finite affine open cover $\\{V_{i,j}\\}$ of each\n  $\\phi^{-1}(U_i)$ (possible by the noetherian hypothesis), we reduce to the case\n  where $S = \\spec A$ and $T = \\spec B$ are affine.\n\n  For every integer $i$ the base-change map\n  $\\phi^*{\\pi_S}_*\\Oo_{\\PP^n_S}(i)\\to {\\pi_T}_*\\Oo_{\\PP^n_T}(i)$ is an\n  isomorphism, and pull-back of a homomorphism $\\Oo(a)\\to\\Oo(b)$ is compatible\n  with these isomorphisms. Since $S$ is noetherian affine, there is a finite\n  presentation by twists\n  \\[\n    \\textstyle\\bigoplus^p \\Oo_{\\PP^n_S}(a)\\xrightarrow{u}\n    \\bigoplus^q \\Oo_{\\PP^n_S}(b)\\xrightarrow{v}\\Ff\\to 0,\n  \\]\n  whose pull-back to $\\PP^n_T$ is again exact. Put $\\Gg=\\ker(v)$ and\n  $\\Hh=\\ker(v_T)$. Twisting and applying $\\pi_*$ to the two short exact sequences\n  yields, for every $r$, exact sequences ending in $R^1{\\pi_S}_*\\Gg(r)$ and\n  $R^1{\\pi_T}_*\\Hh(r)$ respectively. By Serre vanishing\n  (\\cref{thm:serre-vanishing}) there is an $r_0$ with $R^1{\\pi_S}_*\\Gg(r)=0$ and\n  $R^1{\\pi_T}_*\\Hh(r)=0$ for all $r\\ge r_0$; hence both $\\pi_*$-sequences become\n  right-exact presentations of ${\\pi_S}_*\\Ff(r)$ and ${\\pi_T}_*\\Ff_T(r)$.\n  Pulling the $S$-presentation back under $\\phi$ (using right-exactness of\n  $\\ot$) gives a commutative diagram with exact rows whose first two vertical\n  maps are the base-change isomorphisms above. By the five lemma\n  (\\cref{lem:five-lemma}) the third vertical map\n  $\\phi^*{\\pi_S}_*\\Ff(r)\\to{\\pi_T}_*\\Ff_T(r)$ is an isomorphism for all\n  $r\\ge r_0$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1641, "effort_local": 1641, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2620}, "lem:five-lemma": {"id": "lem:five-lemma", "type": "lemma", "title": "Five lemma, right-exact form", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Provided by Mathlib.}\n  Given a commutative diagram of modules with right-exact rows\n  $M_1\\to M_2\\to M_3\\to 0$ and $N_1\\to N_2\\to N_3\\to 0$ and vertical maps\n  $i_1,i_2,i_3$, if $i_1$ is surjective and $i_2$ is bijective then $i_3$ is\n  bijective. (Used to conclude that the third base-change map is an isomorphism\n  once the first two are.)", "uses": [], "lean_name": "LinearMap.bijective_of_surjective_of_bijective_of_right_exact", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:flatness-from-local-freeness": {"id": "lem:flatness-from-local-freeness", "type": "lemma", "title": "Flatness from local freeness of direct images", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (Flatness of $\\Ff$ from Local Freeness of $\\pi_*\\Ff(r)$).}\n  Let $S$ be a noetherian scheme and let $\\Ff$ be a coherent sheaf on $\\PP^n_S$.\n  Suppose there exists an integer $N$ such that for all $r\\ge N$ the direct image\n  $\\pi_*\\Ff(r)$ is locally free. Then $\\Ff$ is flat over $S$.", "uses": ["def:projective-space", "thm:coherent-higher-direct-image"], "lean_name": "MR2223407ConstructionHilbertQuot.flatness_of_locally_free_direct_image", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:projective-space}\n  Consider the graded $\\Oo_S$-module $M=\\bigoplus_{r\\ge N}M_r$ with\n  $M_r=\\pi_*\\Ff(r)$. Then $\\Ff\\cong M^\\sim$ on\n  $\\PP^n_S=\\Proj_S\\Oo_S[x_0,\\dots,x_n]$. Each $M_r$ is flat over $\\Oo_S$ (locally\n  free), hence so is $M$, and therefore so is each localization $M_{x_i}$. Grade\n  $M_{x_i}$ over $\\ZZ$ by $\\deg(v_p/x_i^q)=p-q$ for $v_p\\in M_p$; the degree-zero\n  component $(M_{x_i})_0$ is a direct summand of $M_{x_i}$, hence flat over\n  $\\Oo_S$. By definition of $M^\\sim$ this summand is $\\Gamma(U_i,\\Ff)$ on the\n  standard affine $U_i=\\Specc_S\\Oo_S[x_0/x_i,\\dots,x_n/x_i]\\subset\\PP^n_S$. As\n  the $U_i$ cover $\\PP^n_S$, the sheaf $\\Ff$ is flat over $\\Oo_S$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": 687, "effort_local": 687, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1380}, "thm:grothendieck-complex": {"id": "thm:grothendieck-complex", "type": "theorem", "title": "Grothendieck complex", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (Grothendieck Complex); EGA III 7.7.}\n  Let $\\pi\\colon X\\to S$ be a proper morphism of noetherian schemes with\n  $S=\\spec A$ affine, and let $\\Ff$ be a coherent $\\Oo_X$-module flat over\n  $\\Oo_S$. Then there exists a finite complex\n  \\[\n    0\\to K^0\\to K^1\\to\\cdots\\to K^n\\to 0\n  \\]\n  of finitely generated projective $A$-modules, together with a functorial\n  $A$-linear isomorphism\n  \\[\n    H^p(X,\\Ff\\ot_A M)\\;\\xrightarrow{\\ \\sim\\ }\\;H^p(K^\\bullet\\ot_A M)\n  \\]\n  on the category of all $A$-modules $M$.", "uses": ["thm:cohomology-base-change"], "lean_name": "MR2223407ConstructionHilbertQuot.grothendieck_complex", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:cohomology-base-change}\n  This is the affine-base, explicit form of the cohomology-and-base-change anchor\n  \\cref{thm:cohomology-base-change}. It is a classical theorem of Grothendieck;\n  see EGA III 7.7 (and Mumford, \\emph{Abelian Varieties}, §5, for the standard\n  exposition). The complex $K^\\bullet$ is obtained from the \\v{C}ech complex of a\n  finite affine cover of $X$ by replacing it with a quasi-isomorphic complex of\n  finite projective $A$-modules, using flatness of $\\Ff$ to ensure base-change\n  compatibility. Treated as a foundational input; not reproved here.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 15, "proof_size_tex": 584, "effort_local": 584, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1516}, "thm:cokernel-of-dual": {"id": "thm:cokernel-of-dual", "type": "theorem", "title": "Cokernel of the dual {\\rm (EGA III 7.7.6)}", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (EGA III 7.7.6).}\n  Let $S$ be a noetherian scheme and $\\pi\\colon X\\to S$ a proper morphism. Let\n  $\\Ff$ be a coherent sheaf on $X$ which is flat over $S$. Then there exists a\n  coherent sheaf $\\mathcal{Q}$ on $S$ together with a functorial\n  $\\Oo_S$-linear isomorphism\n  \\[\n    \\theta_{\\Gg}\\colon \\pi_*\\bigl(\\Ff\\ot_{\\Oo_X}\\pi^*\\Gg\\bigr)\n      \\;\\longrightarrow\\;\\mathcal{H}om_{\\Oo_S}(\\mathcal{Q},\\Gg)\n  \\]\n  on the category of all quasi-coherent sheaves $\\Gg$ on $S$. By its universal\n  property the pair $(\\mathcal{Q},\\theta)$ is unique up to unique isomorphism.\n  When $\\mathcal{Q}$ is used to form the affine $S$-scheme\n  $\\spec\\Sym_{\\Oo_S}\\mathcal{Q}$ (a \\emph{linear scheme}), this representability\n  is what makes the relevant $\\Hom$-functors representable downstream.", "uses": ["thm:grothendieck-complex"], "lean_name": "MR2223407ConstructionHilbertQuot.cokernel_of_dual", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:grothendieck-complex}\n  When $S=\\spec A$, choose a Grothendieck complex\n  $0\\to K^0\\xrightarrow{\\partial}K^1\\to\\cdots\\to K^n\\to 0$ for $\\Ff$\n  (\\cref{thm:grothendieck-complex}), and let $Q=\\coker\\bigl(\\partial^\\vee\\colon\n  (K^1)^\\vee\\to(K^0)^\\vee\\bigr)$ with $\\mathcal{Q}=Q^\\sim$. For any $A$-module\n  $M$, applying $\\Hom_A(-,M)$ to the right-exact sequence\n  $(K^1)^\\vee\\to(K^0)^\\vee\\to Q\\to 0$ gives a left-exact sequence\n  $0\\to\\Hom_A(Q,M)\\to K^0\\ot_A M\\to K^1\\ot_A M$, whose kernel is by\n  \\cref{thm:grothendieck-complex} identified with $H^0(X_A,\\Ff_A\\ot_A M)$. This\n  furnishes the isomorphism $\\theta^A_M$. For general $S$, the locally\n  constructed pairs $(\\mathcal{Q},\\theta)$ glue over an affine cover by their\n  uniqueness.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 744, "effort_local": 744, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2260}, "thm:semicontinuity": {"id": "thm:semicontinuity", "type": "theorem", "title": "Upper semicontinuity of fibre cohomology {\\rm (EGA III 7.7.8--7.7.9)}", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (Base-change for flat sheaves, parts (1)--(3); EGA III 7.7.8--7.7.9).}\n  Let $\\pi\\colon X\\to S$ be a proper morphism of noetherian schemes and $\\Ff$ a\n  coherent $\\Oo_X$-module flat over $\\Oo_S$. Then:\n  \\begin{enumerate}\n    \\item for every integer $i$ the function\n      $s\\mapsto\\dim_{\\kappa(s)}H^i(X_s,\\Ff_s)$ is upper semicontinuous on $S$;\n    \\item the function $s\\mapsto\\sum_i(-1)^i\\dim_{\\kappa(s)}H^i(X_s,\\Ff_s)$ is\n      locally constant on $S$;\n    \\item if for some $i$ there is $d\\ge 0$ with\n      $\\dim_{\\kappa(s)}H^i(X_s,\\Ff_s)=d$ for all $s\\in S$, then $R^i\\pi_*\\Ff$ is\n      locally free of rank $d$ and $(R^{i-1}\\pi_*\\Ff)_s\\to H^{i-1}(X_s,\\Ff_s)$ is\n      an isomorphism for all $s\\in S$.\n  \\end{enumerate}", "uses": ["thm:grothendieck-complex"], "lean_name": "MR2223407ConstructionHilbertQuot.semicontinuity_fibre_cohomology", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:grothendieck-complex}\n  All assertions are local on $S$, so we may assume $S=\\spec A$ and use a\n  Grothendieck complex $K^\\bullet$ of finite projective $A$-modules computing the\n  cohomology of $\\Ff$ universally (\\cref{thm:grothendieck-complex}). Then\n  $\\dim_{\\kappa(s)}H^i(X_s,\\Ff_s)=\\dim_{\\kappa(s)}H^i(K^\\bullet\\ot\\kappa(s))$,\n  which jumps up on closed conditions (ranks of the differentials drop), giving\n  (1); the alternating sum equals $\\sum(-1)^p\\rank K^p$, giving (2); and (3) is\n  the rigidity of the complex when a fibre dimension is constant. See Hartshorne\n  III.12 (or EGA III §7) for the standard argument.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": 633, "effort_local": 633, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2149}, "thm:base-change-flat": {"id": "thm:base-change-flat", "type": "theorem", "title": "Base change for flat sheaves {\\rm (EGA III 7.7.8--7.7.9)}", "chapter": "Semicontinuity and Base Change", "statement": "\\textit{Source: Nitsure §3 (Base-change for flat sheaves, parts (4)--(5); EGA III 7.7.8--7.7.9).}\n  With $\\pi\\colon X\\to S$ proper between noetherian schemes and $\\Ff$ coherent\n  and flat over $S$:\n  \\begin{enumerate}\n    \\item[(4)] if for some $i$ and $s\\in S$ the map\n      $(R^i\\pi_*\\Ff)_s\\to H^i(X_s,\\Ff_s)$ is surjective, then there is an open\n      $U\\ni s$ such that for every quasi-coherent $\\Oo_U$-module $\\Gg$ the\n      natural map\n      $(R^i{\\pi_U}_*\\Ff_{X_U})\\ot_{\\Oo_U}\\Gg\\to\n       R^i{\\pi_U}_*(\\Ff_{X_U}\\ot_{\\Oo_{X_U}}\\pi_U^*\\Gg)$\n      is an isomorphism; in particular $(R^i\\pi_*\\Ff)_{s'}\\to H^i(X_{s'},\\Ff_{s'})$\n      is an isomorphism for all $s'\\in U$;\n    \\item[(5)] under the same surjectivity hypothesis, $R^i\\pi_*\\Ff$ is locally\n      free near $s$ iff $(R^{i-1}\\pi_*\\Ff)_s\\to H^{i-1}(X_s,\\Ff_s)$ is surjective.\n  \\end{enumerate}\n  In particular, applied with $i=0$ to the twists $\\Ff(r)$ for $X=\\PP^n_S$ and\n  $r\\gg 0$ (where the higher cohomology of the flat $\\Ff$ vanishes fibrewise),\n  $\\pi_*\\Ff(r)$ is locally free and commutes with arbitrary base change; this is\n  the converse to \\cref{lem:flatness-from-local-freeness}.", "uses": ["thm:grothendieck-complex", "lem:flatness-from-local-freeness"], "lean_name": "MR2223407ConstructionHilbertQuot.base_change_for_flat_sheaves", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:grothendieck-complex, lem:flatness-from-local-freeness}\n  Work locally with a Grothendieck complex $K^\\bullet$ as in\n  \\cref{thm:grothendieck-complex}. Surjectivity of\n  $(R^i\\pi_*\\Ff)_s\\to H^i(X_s,\\Ff_s)$ is, via the complex, the statement that the\n  $i$-th cohomology of $K^\\bullet$ is computed compatibly with $\\ot\\kappa(s)$;\n  Nakayama's lemma applied to $K^\\bullet$ then propagates this to a neighbourhood\n  and yields the universal base-change isomorphism in (4), replacing the formal\n  function theorem used in Hartshorne III.12. Part (5) is the local-freeness\n  criterion for $R^i\\pi_*\\Ff$ in terms of exactness of the dual complex at the\n  relevant spot. For $i=0$ and $r\\gg 0$, fibrewise Serre vanishing makes the\n  surjectivity hypothesis automatic, so $\\pi_*\\Ff(r)$ is locally free and\n  base-change compatible; together with \\cref{lem:flatness-from-local-freeness}\n  this is the announced converse. See Hartshorne III.12 / EGA III §7.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/SemicontinuityBaseChange.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": 957, "effort_local": 957, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3160}, "le
