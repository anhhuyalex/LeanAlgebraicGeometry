f $\\sC \\to \\Delta$. An\n  \\emph{isomonodromic deformation to an analytically general nearby curve} is its\n  restriction to a general fibre, i.e.\\ a fibre lying in the complement of a\n  nowhere-dense closed analytic subset of $\\Delta$.", "uses": ["def:isomonodromy", "def:analytically-general"], "lean_name": "LandesmanLitt.NearbyCurve", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": null, "effort_local": 455, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4471}, "def:refinements": {"id": "def:refinements", "type": "definition", "title": "Refinement of a parabolic structure", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.4.}\n  Let $E_\\star = (E,\\{E^i_j\\}_{1\\le j\\le n,\\,1\\le i\\le n_j+1},\n  \\{\\alpha^i_j\\}_{1\\le j\\le n,\\,1\\le i\\le n_j})$ be a parabolic bundle on $(C,D)$,\n  and let $D' = \\sum_{j \\in I} x_j$ be an effective sub-divisor of $D$\n  ($I \\subset \\{1,\\dots,n\\}$). A parabolic bundle $F_\\star$ on $(C,D')$ is\n  \\emph{refined by} $E_\\star$ if for each $j \\in I$ there is a subset\n  $\\{i_1,\\dots,i_{m_j}\\} \\subset \\{2,\\dots,n_j\\}$ giving an isomorphism of\n  parabolic bundles\n  \\[\n    F_\\star \\simeq \\bigl(E, \\{E^i_j\\}_{j \\in I,\\, i \\in \\{1,i_1,\\dots,i_{m_j}\\}},\n    \\{\\alpha^i_j\\}_{j \\in I,\\, i \\in \\{1,i_1,\\dots,i_{m_j}\\}}\\bigr).\n  \\]\n  Informally, $F_\\star$ is obtained from $E_\\star$ by forgetting part of the\n  quasiparabolic data; the most important case is when $E_\\star$ refines the\n  trivial parabolic structure $E_0$ on $E$. Each $F_\\star$ refined by $E_\\star$\n  carries its own isomonodromic deformation over $\\Delta$, obtained from\n  $\\mathscr{E}_\\star$ by forgetting the corresponding part of the parabolic\n  structure.", "uses": ["def:parabolic-bundle"], "lean_name": "LandesmanLitt.Refinement", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 1054, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1856}, "def:curve-deformation": {"id": "def:curve-deformation", "type": "definition", "title": "Deformations of a curve with divisor", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.5.}\n  Let $\\on{Def}_{(C,D)}: \\on{Art}_\\C \\to \\on{Set}$ be the functor sending a local\n  Artin $\\C$-algebra $(A,\\mathfrak{m},\\kappa)$ to the set of flat deformations of\n  $(C,D)$ over $A$: tuples $(\\sC,\\mathscr{D},q,f)$ with $q: \\sC \\to \\Spec A$\n  flat, $\\mathscr{D} \\subset \\sC$ a relative Cartier divisor over $\\Spec A$, and\n  $f: C \\to \\sC$ inducing an isomorphism $C \\xrightarrow{\\sim} \\sC \\times_{\\Spec A}\n  \\Spec \\kappa$ carrying $D$ isomorphically to $\\mathscr{D} \\times_{\\Spec A}\n  \\Spec \\kappa$.", "uses": [], "lean_name": "LandesmanLitt.DefCurveDivisor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": null, "effort_local": 540, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 540}, "prop:curve-deformation": {"id": "prop:curve-deformation", "type": "proposition", "title": "First-order curve deformations", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.5.}\n  There is a canonical and functorial bijection\n  \\[\n    \\on{Def}_{(C,D)}(\\C[\\varepsilon]/\\varepsilon^2)\n    \\xrightarrow{\\ \\sim\\ } H^1(C, T_C(-D)).\n  \\]", "uses": ["def:curve-deformation"], "lean_name": "LandesmanLitt.curve_deformation_h1", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:curve-deformation}\n  This is standard deformation theory of a curve with marked points; see\n  \\cite[Proposition 3.4.17]{sernesi:deformations-of-algebraic-schemes}. A\n  first-order deformation is classified by a class in\n  $H^1(C, T_C(-D))$, the cohomology of the sheaf of vector fields vanishing along\n  $D$, which controls deformations of the pointed curve.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 368, "effort_local": 368, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 908}, "prop:filtered-bundle-deformation": {"id": "prop:filtered-bundle-deformation", "type": "proposition", "title": "First-order deformations of a filtered parabolic bundle", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.5.}\n  Let $(E_\\star,P^\\bullet)$ be a filtered parabolic vector bundle on $C$ and\n  $D \\subset C$ reduced effective. Writing $\\on{Def}_{(C,D,E_\\star,P^\\bullet)}$\n  for the functor of flat deformations of $(C,D,E_\\star,P^\\bullet)$ over Artin\n  rings, there is a canonical and functorial bijection\n  \\[\n    \\on{Def}_{(C,D,E_\\star,P^\\bullet)}(\\C[\\varepsilon]/\\varepsilon^2)\n    \\xrightarrow{\\ \\sim\\ } H^1\\bigl(C, \\on{At}_{(C,D)}(E_\\star,P^\\bullet)\\bigr).\n  \\]\n  When $P^\\bullet$ is trivial this reads\n  $\\on{Def}_{(C,D,E_\\star)}(\\C[\\varepsilon]/\\varepsilon^2) \\xrightarrow{\\sim}\n  H^1(C, \\on{At}_{(C,D)}(E_\\star))$.", "uses": ["def:parabolic-atiyah-bundle", "def:atiyah-bundle-divisor", "def:parabolic-bundle"], "lean_name": "LandesmanLitt.filtered_bundle_deformation", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:parabolic-atiyah-bundle}\n  In the non-parabolic case this is \\cite[\\S2.2]{BHH:logarithmic}: deformations of\n  $(C,D,E)$ are governed by $H^1$ of the Atiyah bundle, the symbol map\n  $\\on{At}_{(C,D)}(E) \\to T_C(-D)$ recording the underlying curve deformation and\n  the kernel $\\sheafend(E)$ the bundle deformation. The parabolic case follows by\n  replacing $\\on{At}_{(C,D)}(E)$ with the parabolic Atiyah bundle\n  $\\on{At}_{(C,D)}(E_\\star,P^\\bullet)$, whose local sections preserve both the\n  quasiparabolic and the $P^\\bullet$ filtrations; this is\n  \\cite[Lemma 3.2]{BHH:parabolic} for a one-step filtration, and the general case\n  is analogous.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 653, "effort_local": 653, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5549}, "prop:connection-h1": {"id": "prop:connection-h1", "type": "proposition", "title": "The connection as a section on first-order deformations", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.5.}\n  Let $\\delta: \\on{At}_{(C,D)}(E_\\star) \\to T_C(-D)$ be the symbol map and\n  $q^\\nabla: T_C(-D) \\to \\on{At}_{(C,D)}(E_\\star)$ the section to $\\delta$ arising\n  from $\\nabla$ via \\cref{prop:atiyah-splittings},\n  \\cref{def:associated-parabolic}, and \\cite[Lemma 4.1]{BHH:parabolic}. Under the\n  identifications of \\cref{prop:curve-deformation} and\n  \\cref{prop:filtered-bundle-deformation}, the forgetful map\n  $\\on{Forget}: \\on{Def}_{(C,D,E_\\star)} \\to \\on{Def}_{(C,D)}$ corresponds to\n  $\\delta_*: H^1(C,\\on{At}_{(C,D)}(E_\\star)) \\to H^1(C,T_C(-D))$, and the\n  isomonodromy section $\\on{iso}: \\on{Def}_{(C,D)} \\to \\on{Def}_{(C,D,E_\\star)}$\n  corresponds to $(q^\\nabla)_*: H^1(C,T_C(-D)) \\to H^1(C,\\on{At}_{(C,D)}(E_\\star))$;\n  i.e.\\ both squares relating these maps commute.", "uses": ["prop:curve-deformation", "prop:filtered-bundle-deformation", "def:associated-parabolic", "prop:atiyah-splittings", "def:parabolic-atiyah-bundle"], "lean_name": "LandesmanLitt.connection_h1", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:curve-deformation, prop:filtered-bundle-deformation}\n  Both squares are the functoriality of the deformation--to--$H^1$ dictionary\n  under the maps of functors $\\on{Forget}$ and $\\on{iso}$. The symbol map\n  $\\delta$ realizes $\\on{Forget}$ on tangent spaces, and the section $q^\\nabla$\n  (which exists because $\\nabla$ splits the Atiyah sequence,\n  \\cref{prop:atiyah-splittings}, and factors through the parabolic Atiyah bundle\n  by \\cref{def:associated-parabolic}) realizes $\\on{iso}$. Naturality of the\n  identifications $\\on{Def}(\\C[\\varepsilon]/\\varepsilon^2) \\simeq H^1$ then gives\n  $\\on{Forget} \\leftrightarrow \\delta_*$ and $\\on{iso} \\leftrightarrow\n  (q^\\nabla)_*$. See \\cite[Lemmas 3.1, 4.3]{BHH:parabolic} and\n  \\cite[\\S2.2, \\S4.1]{BHH:logarithmic}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 5, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 770, "effort_local": 770, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9798}, "lem:parabolic-extension-obstruction": {"id": "lem:parabolic-extension-obstruction", "type": "lemma", "title": "Obstruction to extending the filtration", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.5.}\n  With $(C,D,E_\\star,\\nabla)$ as in \\cref{prop:connection-h1} and $P^\\bullet$ a\n  filtration of $E$, let $s \\in \\on{Def}_{(C,D)}(\\C[\\varepsilon]/\\varepsilon^2)\n  \\simeq H^1(C,T_C(-D))$ classify a first-order deformation $(\\sC,\\mathscr{D})$\n  of $(C,D)$. If $q^\\nabla(s)$ corresponds to a deformation\n  $(\\sC,\\mathscr{D},\\mathscr{E}_\\star)$ of $(C,D,E_\\star)$ in which $P^\\bullet$\n  extends to a filtration $\\mathscr{P}^\\bullet$ of $\\sE$, then\n  \\[\n    q^\\nabla(s) \\in \\ker\\Bigl(H^1(C,\\on{At}_{(C,D)}(E_\\star)) \\to\n    H^1\\bigl(C,\\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet)\\bigr)\\Bigr).\n  \\]", "uses": ["prop:connection-h1", "def:parabolic-atiyah-bundle"], "lean_name": "LandesmanLitt.parabolic_extension_obstruction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:connection-h1, def:parabolic-atiyah-bundle}\n  The map $H^1(C,\\on{At}_{(C,D)}(E_\\star)) \\to\n  H^1(C,\\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet))$ is induced by the\n  surjection of sheaves $\\on{At}_{(C,D)}(E_\\star) \\to\n  \\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet)$ of\n  \\eqref{eq:quotient-atiyah-bundles}. The hypothesis that $P^\\bullet$ extends over\n  the deformation means exactly that $q^\\nabla(s)$ lies in the image of\n  $H^1(C,\\on{At}_{(C,D)}(E_\\star,P^\\bullet)) \\to\n  H^1(C,\\on{At}_{(C,D)}(E_\\star))$. But the composition\n  \\[\n    H^1(C,\\on{At}_{(C,D)}(E_\\star,P^\\bullet)) \\to\n    H^1(C,\\on{At}_{(C,D)}(E_\\star)) \\to\n    H^1(C,\\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet))\n  \\]\n  is part of the long exact cohomology sequence of\n  \\eqref{eq:quotient-atiyah-bundles} and hence vanishes. Therefore $q^\\nabla(s)$\n  lies in the stated kernel.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 865, "effort_local": 865, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10663}, "def:complex-variation": {"id": "def:complex-variation", "type": "definition", "title": "Polarizable complex variation of Hodge structure", "chapter": "Hodge-theoretic preliminaries", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §4.1, Definition of polarizable\n  complex variation of Hodge structure.}\n\n  Let \\(X\\) be a smooth irreducible complex variety. A \\emph{complex variation of\n  Hodge structure} on \\(X\\) is a triple \\((V, V^{p,q}, D)\\) where \\(V\\) is a\n  \\(C^\\infty\\) complex vector bundle on \\(X\\), \\(V = \\bigoplus_{p,q} V^{p,q}\\) is a\n  direct sum decomposition into \\(C^\\infty\\) complex sub-bundles, and \\(D\\) is a\n  flat connection on \\(V\\) satisfying the \\emph{Griffiths transversality}\n  condition\n  \\[\n    D(V^{p,q}) \\subset A^{1,0}(V^{p,q}) \\oplus A^{0,1}(V^{p,q})\n    \\oplus A^{1,0}(V^{p-1,q+1}) \\oplus A^{0,1}(V^{p+1,q-1}),\n  \\]\n  where \\(A^{a,b}(W)\\) denotes the smooth \\((a,b)\\)-forms valued in \\(W\\).\n\n  A \\emph{polarization} on \\((V, V^{p,q}, D)\\) is a flat Hermitian form \\(\\psi\\) on\n  \\(V\\) under which the \\(V^{p,q}\\) are mutually orthogonal and such that\n  \\((-1)^p \\psi\\) is positive definite on each \\(V^{p,q}\\). A \\emph{polarizable}\n  complex variation of Hodge structure is one which admits a polarization.\n\n  The \\emph{holomorphic flat vector bundle associated} to the variation is\n  \\((E, \\nabla) := (\\ker(D) \\otimes_{\\C} \\sO,\\ \\id \\otimes d)\\), a flat bundle in\n  the sense of \\cref{def:flat-bundle}. The filtration \\(F^p V := \\bigoplus_{j \\geq p}\n  V^{j,q}\\) induces a decreasing \\emph{Hodge filtration} \\(F^\\bullet V\\) by\n  holomorphic sub-bundles satisfying\n  \\begin{equation}\n    \\nabla(F^p) \\subset F^{p-1} \\otimes \\Omega^1_X.\n  \\end{equation}\n  A complex local system \\(\\bV\\) on \\(X\\) \\emph{underlies a polarizable complex\n  variation of Hodge structure} if \\(\\bV \\simeq \\ker(D)\\) for some polarizable\n  complex variation of Hodge structure \\((V, V^{p,q}, D)\\).", "uses": ["def:flat-bundle"], "lean_name": "LandesmanLitt.ComplexVHS", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hodge.tex", "lean_file": "", "dep_count": 1, "rdep_count": 8, "descendant_count": 12, "proof_size_tex": null, "effort_local": 1718, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2441}, "def:parabolic-higgs": {"id": "def:parabolic-higgs", "type": "definition", "title": "The associated parabolic Higgs bundle", "chapter": "Hodge-theoretic preliminaries", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §4.1, Definition of the\n  associated Higgs bundle.}\n\n  Let \\((E, F^\\bullet, \\nabla)\\) consist of a holomorphic vector bundle \\(E\\) on a\n  smooth variety \\(\\overline{X}\\), a flat connection \\(\\nabla\\) with regular\n  singularities along a simple normal crossings divisor \\(Z \\subset \\overline{X}\\),\n  and a decreasing filtration \\(F^\\bullet\\) by holomorphic sub-bundles satisfying\n  the Griffiths transversality condition\n  \\begin{equation}\n    \\nabla(F^p) \\subset F^{p-1} \\otimes \\Omega^1_{\\overline{X}}(\\log Z).\n  \\end{equation}\n  The \\emph{associated Higgs bundle} is the pair \\((\\bigoplus_i \\gr^i_{F^\\bullet} E,\n  \\theta)\\), where the \\emph{Higgs field}\n  \\[\n    \\theta := \\bigoplus_i \\bigl(\\theta_i : \\gr^i_{F^\\bullet} E \\to\n    \\gr^{i-1}_{F^\\bullet} E \\otimes \\Omega^1_{\\overline{X}}(\\log Z)\\bigr)\n  \\]\n  is the \\(\\sO_{\\overline{X}}\\)-linear map induced by \\(\\nabla\\) (the\n  Kodaira--Spencer map); it is \\(\\sO\\)-linear because Griffiths transversality\n  forces \\(\\nabla\\) to shift the filtration by exactly one step.\n\n  The bundle \\(E\\) carries a canonical parabolic structure \\(E_\\star\\) in the sense\n  of \\cref{def:parabolic-bundle}. This induces a parabolic structure on\n  \\(\\bigoplus_i \\gr^i_{F^\\bullet} E_\\star\\), realized as a direct sum of\n  subquotients of \\(E\\) and preserved by \\(\\theta\\). The pair\n  \\((\\bigoplus_i \\gr^i_{F^\\bullet} E_\\star, \\theta)\\) with this parabolic structure\n  is the \\emph{parabolic Higgs bundle associated to the variation of Hodge\n  structure}. When the input \\((E, F^\\bullet, \\nabla)\\) is the Deligne canonical\n  extension of the flat bundle associated (\\cref{def:complex-variation}) to a\n  polarizable complex variation of Hodge structure, this is the parabolic Higgs\n  bundle of that variation.", "uses": ["def:complex-variation", "def:parabolic-bundle"], "lean_name": "LandesmanLitt.ParabolicHiggs", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hodge.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": null, "effort_local": 1784, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5027}, "prop:basic-facts": {"id": "prop:basic-facts", "type": "proposition", "title": "Basic facts on complex variations of Hodge structure", "chapter": "Hodge-theoretic preliminaries", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §4.1, Proposition prop:basic-facts.}\n\n  Let \\(\\overline{X}\\) be a smooth projective curve, \\(Z \\subset \\overline{X}\\) a\n  reduced divisor, and let \\(X = \\overline{X} \\setminus Z\\). Let\n  \\((V, V^{p,q}, D)\\) be a polarizable complex variation of Hodge structure on\n  \\(X\\), and let \\((E, F^\\bullet, \\nabla)\\) be the holomorphic flat vector bundle\n  associated to this variation, with its Hodge filtration. Let\n  \\((\\overline{E}, \\overline{\\nabla})\\) be its Deligne canonical extension, and let\n  \\(\\overline{E}_\\star\\) be the parabolic bundle associated to\n  \\((\\overline{E}, \\nabla)\\) in the sense of \\cref{def:associated-parabolic}. Then:\n  \\begin{enumerate}\n    \\item the local system \\(\\bV := \\ker(\\nabla)\\) associated to \\((E, \\nabla)\\) is\n      semisimple;\n    \\item \\(\\bV\\) decomposes canonically as\n      \\(\\bV \\simeq \\bigoplus_i \\bL_i \\otimes W_i\\), where the \\(\\bL_i\\) are pairwise\n      non-isomorphic irreducible complex local systems on \\(X\\) and each \\(W_i\\) is\n      a complex vector space; each \\(\\bL_i\\) underlies a polarizable complex\n      variation of Hodge structure and each \\(W_i\\) carries a complex polarized\n      Hodge structure, both unique up to shifting the grading and compatible with\n      the variation carried by \\(\\bV\\);\n    \\item \\(\\overline{E}_\\star\\) has parabolic degree zero;\n    \\item there exists a canonical extension of \\(F^\\bullet\\) to \\(\\overline{E}\\)\n      such that \\((\\overline{E}, F^\\bullet, \\overline{\\nabla})\\) satisfies the\n      Griffiths transversality condition \\eqref{eqn:griffiths-transversality-2};\n    \\item the associated parabolic Higgs bundle\n      \\((\\bigoplus_i \\gr^i_{F^\\bullet} \\overline{E}_\\star, \\theta)\\) of\n      \\((\\overline{E}_\\star, F^\\bullet, \\overline{\\nabla})\\) is parabolically\n      polystable of degree zero. That is, there exist parabolic vector bundles\n      \\(E^j_\\star\\) with \\(\\deg(E^j_\\star) = 0\\) and maps\n      \\(\\theta^j : E^j_\\star \\to E^j_\\star \\otimes \\Omega^1_{\\overline{X}}(\\log Z)\\)\n      such that\n      \\((\\bigoplus_i \\gr^i_{F^\\bullet} \\overline{E}_\\star, \\theta) =\n      \\bigoplus_j (E^j_\\star, \\theta^j)\\), and for every \\(\\theta^j\\)-stable proper\n      sub-bundle \\(H_\\star \\subset E^j_\\star\\) with its induced parabolic structure\n      one has \\(\\operatorname{par-deg} H_\\star < 0\\).\n  \\end{enumerate}", "uses": ["def:complex-variation", "def:parabolic-higgs", "def:associated-parabolic", "def:par-degree", "def:parabolic-stability"], "lean_name": "LandesmanLitt.basic_facts", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is an external, black-box result; we record the literature references the\n  paper gives. Parts (1) and (2) are explained in \\cite[1.11--1.12]{deligne1987theoreme}\n  and \\cite[1.13]{deligne1987theoreme} respectively. Part (3) follows from\n  \\cite[B.3]{esnault1986logarithmic}, and part (4) is explained in\n  e.g.\\ \\cite[Section 7]{brunebarbe2017semi}. Finally, part (5) is due to Simpson\n  \\cite[Theorem 5]{simpson1990harmonic}. See the introduction of\n  \\cite{arapura2019vanishing} for a summary of this and related topics.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hodge.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 528, "effort_local": 528, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11888}, "lem:positive-Hodge-bundle": {"id": "lem:positive-Hodge-bundle", "type": "lemma", "title": "Positivity of the top Hodge bundle", "chapter": "Hodge-theoretic preliminaries", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §4.1, Lemma on positivity of the\n  Hodge bundle.}\n\n  Let \\(C\\) be a smooth proper curve, \\(Z \\subset C\\) a reduced effective divisor,\n  and \\((V, V^{p,q}, D)\\) a polarizable complex variation of Hodge structure on\n  \\(C \\setminus Z\\). Let \\((\\overline{E}_\\star, F^\\bullet, \\nabla)\\) be the Deligne\n  canonical extension of the associated flat holomorphic vector bundle to \\(C\\),\n  with its canonical parabolic structure. Let \\(i\\) be maximal such that\n  \\(F^i \\overline{E}_\\star\\) is non-trivial, where \\(F^\\bullet\\) is the Hodge\n  filtration, and suppose the Higgs field\n  \\[\n    \\theta_i : F^i \\overline{E}_\\star \\to\n    \\gr^{i-1}_{F^\\bullet} \\overline{E}_\\star \\otimes \\Omega^1_C(\\log Z)\n  \\]\n  is non-zero. Then \\(F^i \\overline{E}_\\star\\) has positive parabolic degree.", "uses": ["def:complex-variation", "def:parabolic-higgs", "def:par-slope"], "lean_name": "LandesmanLitt.positive_Hodge_bundle", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:basic-facts, def:parabolic-stability, def:par-slope}\n  The parabolic vector bundle \\(F^i \\overline{E}_\\star\\), equipped with the zero\n  Higgs field, is a quotient of the associated parabolic Higgs bundle\n  \\((\\bigoplus_i \\gr^i_{F^\\bullet} \\overline{E}_\\star, \\theta)\\) of\n  \\cref{def:parabolic-higgs}. By \\cref{prop:basic-facts}(5) that parabolic Higgs\n  bundle is parabolically polystable, hence semistable, of parabolic degree zero.\n  Therefore the quotient \\(F^i \\overline{E}_\\star\\) has non-negative parabolic\n  degree.\n\n  Its parabolic degree is zero if and only if \\(F^i \\overline{E}_\\star\\) is a\n  direct summand of the polystable parabolic Higgs bundle as a Higgs sub-object.\n  The non-vanishing of \\(\\theta_i\\) means that \\(F^i \\overline{E}_\\star\\) with its\n  zero Higgs field is not preserved as a Higgs sub-object, so it cannot be such a\n  direct summand. Hence its parabolic degree is strictly positive.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hodge.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 926, "effort_local": 926, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6687}, "cor:unstable": {"id": "cor:unstable", "type": "corollary", "title": "Instability of the parabolic bundle", "chapter": "Hodge-theoretic preliminaries", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §4.1, Corollary on instability.}\n\n  Let \\((\\overline{E}_\\star, F^\\bullet, \\nabla)\\) be as in\n  \\cref{lem:positive-Hodge-bundle}. Then the parabolic bundle\n  \\(\\overline{E}_\\star\\) is not semistable. Equivalently, a flat bundle underlying\n  a polarizable complex variation of Hodge structure with more than one non-zero\n  Hodge piece is parabolically unstable: parabolic semistability forces the Hodge\n  filtration to have a single part.", "uses": ["lem:positive-Hodge-bundle", "def:parabolic-higgs", "def:complex-variation"], "lean_name": "LandesmanLitt.unstable", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:basic-facts, def:parabolic-stability, def:par-slope}\n  The parabolic vector bundle \\(\\overline{E}_\\star\\) has parabolic degree zero by\n  \\cref{prop:basic-facts}(3) (a basic property of the Deligne canonical extension\n  of the flat bundle of a polarizable complex variation of Hodge structure). By\n  \\cref{lem:positive-Hodge-bundle}, the sub-bundle \\(F^i \\overline{E}_\\star\\) has\n  positive parabolic degree. A parabolic sub-bundle of positive parabolic degree\n  inside a parabolic bundle of parabolic degree zero is destabilizing, so\n  \\(\\overline{E}_\\star\\) is not semistable.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hodge.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 588, "effort_local": 588, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7275}, "lem:center-free-group": {"id": "lem:center-free-group", "type": "lemma", "title": "Center-free-group lemma", "chapter": "The Kodaira--Parshin counterexample", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §5, Lemma on the center-free\n  group.}\n\n  Keeping the notation above, the map \\(\\gamma\\) determines a well-defined\n  surjective homomorphism\n  \\[\n    \\widetilde{\\gamma} : \\Gamma \\longrightarrow G, \\qquad\n    h \\longmapsto \\widetilde{\\gamma}(h).\n  \\]\n  Moreover, \\(\\Gamma \\subset \\pi_1(\\sM_{g,2}, x)\\) has finite index.", "uses": [], "lean_name": "LandesmanLitt.centerFreeGroup", "proved": false, "mathlib_ok": false, "proof_tex": "\n  First, \\(\\Gamma\\) contains \\(\\pi_1(C^\\circ, x)\\) and \\(\\widetilde{\\gamma}\\)\n  surjects onto \\(G\\): for \\(h \\in \\pi_1(C^\\circ, x)\\) one may take\n  \\(\\widetilde{\\gamma}(h) = \\gamma(h)\\), so the surjectivity of \\(\\gamma\\)\n  implies that of \\(\\widetilde{\\gamma}\\).\n\n  Next, for each \\(h \\in \\Gamma\\) the element \\(\\widetilde{\\gamma}(h)\\) is\n  uniquely determined. Suppose both \\(\\alpha\\) and \\(\\beta\\) work; then\n  \\(\\alpha\\, \\gamma(g)\\, \\alpha^{-1} = \\beta\\, \\gamma(g)\\, \\beta^{-1}\\) for all\n  \\(g\\). Since \\(\\gamma\\) is surjective, \\(\\alpha \\beta^{-1}\\) lies in the center\n  of \\(G\\), which is trivial because \\(G\\) is center-free; hence\n  \\(\\alpha = \\beta\\). This uniqueness shows \\(\\widetilde{\\gamma}\\) is a\n  well-defined map, and it is a homomorphism because uniqueness forces\n  \\(\\widetilde{\\gamma}(h)\\, \\widetilde{\\gamma}(h') = \\widetilde{\\gamma}(h h')\\).\n\n  Finally, \\(\\Gamma\\) has finite index. There is an action of\n  \\(\\pi_1(\\sM_{g,2}, x)\\) on the set of surjective homomorphisms\n  \\(\\pi_1(C^\\circ, x) \\to G\\) sending \\(\\phi\\) to \\(\\phi^h(g) := \\phi(h g h^{-1})\\),\n  and by definition \\(h \\in \\Gamma\\) if and only if \\(\\gamma^h\\) is conjugate to\n  \\(\\gamma\\). Thus \\(\\Gamma\\) contains the stabilizer of \\(\\gamma\\) under this\n  action. That stabilizer has finite index because \\(G\\) is finite and\n  \\(\\pi_1(C^\\circ, x)\\) is finitely generated, so there are only finitely many\n  homomorphisms \\(\\pi_1(C^\\circ, x) \\to G\\) at all.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Counterexample.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 1434, "effort_local": 1434, "proof_size_tex_total": 1434, "proof_size_lean_total": null, "effort_total": 1434}, "prop:kodaira-parshin": {"id": "prop:kodaira-parshin", "type": "proposition", "title": "Kodaira--Parshin trick", "chapter": "The Kodaira--Parshin counterexample", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §5, Kodaira--Parshin trick.}\n\n  Let \\(Y\\) be a Riemann surface of genus \\(g \\geq 1\\) with a point \\(p \\in Y\\),\n  let \\(Y^\\circ := Y - p\\), and choose a basepoint \\(y \\in Y^\\circ\\). Suppose\n  \\(G\\) is a finite center-free group with a surjection\n  \\(\\phi : \\pi_1(Y^\\circ, y) \\twoheadrightarrow G\\) which sends the loop around\n  the puncture \\(p \\in Y\\) to a non-identity element of \\(G\\). Then there exists\n  a smooth proper relative-dimension-\\(1\\) map of analytic stacks\n  \\(f : \\mathscr{X} \\to \\sM_{g,1}\\) such that the fiber over a geometric point\n  \\([(C,p)] \\in \\sM_{g,1}\\) is a finite disjoint union of \\(G\\)-covers of \\(C\\)\n  ramified at \\(p\\).", "uses": ["lem:center-free-group"], "lean_name": "LandesmanLitt.kodairaParshin", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:center-free-group}\n  This is a black-box construction in mapping-class-group topology; we record\n  the argument and its external inputs but do not reprove them, as no Mathlib\n  support is available.\n\n  The setup relies on the short exact sequence\n  \\(1 \\to \\pi_1(C^\\circ, x) \\to \\pi_1(\\sM_{g,2}, x) \\to \\pi_1(\\sM_{g,1}, \\bar{x})\n  \\to 1\\). This is obtained from the Birman exact sequence for mapping class\n  groups (Farb--Margalit, \\emph{A primer on mapping class groups}, Theorem 4.6),\n  after identifying \\(\\pi_1(\\sM_{g,n})\\) with the mapping class group of an\n  \\(n\\)-times punctured genus-\\(g\\) surface; the case \\(n = 0\\) uses the\n  contractibility of the universal cover of \\(\\sM_g\\) (Farb--Margalit, Theorem\n  10.6), and the general case is deduced from the Birman exact sequence.\n\n  Given this, let \\(\\widetilde{\\Gamma}\\) be the kernel of the homomorphism\n  \\(\\widetilde{\\gamma}\\) of \\cref{lem:center-free-group}. Since \\(\\Gamma\\) has\n  finite index, \\(\\widetilde{\\Gamma}\\) corresponds to a finite étale cover\n  \\(\\mathscr{X}^\\circ \\to \\sM_{g,2}\\). Viewing \\(\\sM_{g,2}\\) as a dense open\n  substack of \\(\\sM_{g,1} \\times_{\\sM_g} \\sM_{g,1}\\), let \\(\\mathscr{X}\\) be the\n  normalization of \\(\\sM_{g,1} \\times_{\\sM_g} \\sM_{g,1}\\) in the function field of\n  \\(\\mathscr{X}^\\circ\\). Restricting the natural map\n  \\(\\mathscr{X} \\to \\sM_{g,1} \\times_{\\sM_g} \\sM_{g,1}\\) to a fiber \\(C\\) of the\n  universal curve \\(\\sM_{g,1} \\times_{\\sM_g} \\sM_{g,1} \\to \\sM_{g,1}\\) yields a\n  finite disjoint union of \\(G\\)-covers of \\(C\\) ramified only over the\n  tautological marked point. The desired map \\(f : \\mathscr{X} \\to \\sM_{g,1}\\) is\n  the composition\n  \\(\\mathscr{X} \\to \\sM_{g,1} \\times_{\\sM_g} \\sM_{g,1} \\to \\sM_{g,1}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Counterexample.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 1726, "effort_local": 1726, "proof_size_tex_total": 3160, "proof_size_lean_total": null, "effort_total": 3160}, "ex:kodaira-parshin-S3": {"id": "ex:kodaira-parshin-S3", "type": "definition", "title": "The Kodaira--Parshin trick for \\(S_3\\)", "chapter": "The Kodaira--Parshin counterexample", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §5, Example with \\(G = S_3\\).}\n\n  The symmetric group \\(G = S_3\\) on three letters is center-free and satisfies\n  the hypotheses of \\cref{prop:kodaira-parshin}. Identify\n  \\(\\pi_1(Y^\\circ, y)\\) with the free group on generators\n  \\(a_1, \\ldots, a_g, b_1, \\ldots, b_g\\); the group \\(\\pi_1(Y, y)\\) is the\n  quotient by the single relation \\(\\prod_{i=1}^g [a_i, b_i]\\). Consider the\n  surjection \\(\\phi : \\pi_1(C^\\circ, y) \\twoheadrightarrow S_3\\) sending\n  \\(a_1 \\mapsto (12)\\), \\(b_1 \\mapsto (13)\\), and \\(a_i, b_i \\mapsto \\id\\) for\n  \\(i > 1\\). Then the loop around the puncture maps to\n  \\[\n    \\phi\\Bigl(\\prod_{i=1}^g [a_i, b_i]\\Bigr) = (12)(13)(12)^{-1}(13)^{-1}\n    = (123) \\neq \\id,\n  \\]\n  so \\(\\phi\\) sends the loop around the puncture to a non-identity element, as\n  required. Hence \\(S_3\\) provides an explicit instance of\n  \\cref{prop:kodaira-parshin}.", "uses": ["prop:kodaira-parshin", "lem:center-free-group"], "lean_name": "LandesmanLitt.kodairaParshin_S3", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Counterexample.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 907, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4067}, "thm:counterexample": {"id": "thm:counterexample", "type": "theorem", "title": "Counterexample to semistability of isomonodromic deformations", "chapter": "The Kodaira--Parshin counterexample", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §1, Theorem counterexample.}\n\n  Let \\(g \\geq 2\\) be an integer. There exists a vector bundle with flat\n  connection \\((\\sF, \\nabla)\\) on \\(\\sM_{g,1}\\) such that for each fiber \\(C\\) of\n  the forgetful morphism \\(\\sM_{g,1} \\to \\sM_g\\), the restriction\n  \\((\\sF, \\nabla)|_C\\)\n  \\begin{enumerate}\n    \\item has semisimple monodromy, and\n    \\item is not semistable.\n  \\end{enumerate}", "uses": ["prop:kodaira-parshin", "ex:kodaira-parshin-S3", "lem:positive-Hodge-bundle", "cor:unstable", "def:complex-variation"], "lean_name": "LandesmanLitt.counterexample", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:kodaira-parshin, ex:kodaira-parshin-S3, lem:positive-Hodge-bundle,\n  cor:unstable, def:complex-variation}\n  Let \\(f : \\mathscr{X} \\to \\sM_{g,1}\\) be the map from\n  \\cref{prop:kodaira-parshin}, applied with the center-free group \\(G = S_3\\) and\n  the surjection \\(\\phi\\) of \\cref{ex:kodaira-parshin-S3}. Define the local\n  system \\(\\bV := R^1 f_* \\C\\) on \\(\\sM_{g,1}\\), and let \\(\\sF := \\bV \\otimes \\sO\\)\n  be the associated vector bundle, with its natural Gauss--Manin connection\n  \\(\\nabla = \\id \\otimes d\\). The local system \\(\\bV\\) underlies a polarizable\n  complex variation of Hodge structure in the sense of\n  \\cref{def:complex-variation}.\n\n  Fix a fiber \\(C\\) of the forgetful morphism \\(\\sM_{g,1} \\to \\sM_g\\) and set\n  \\(X := f^{-1}(C) \\subset \\mathscr{X}\\).\n\n  \\emph{Semisimplicity.} The restriction \\((\\sF, \\nabla)|_C\\) has semisimple\n  monodromy because it arises from the Gauss--Manin connection on the cohomology\n  of a smooth proper family; this is Deligne's semisimplicity theorem (purity of\n  the variation of Hodge structure).\n\n  \\emph{Non-semistability.} The fiber of \\(f|_X : X \\to C\\) over a point\n  \\(x \\in C\\) is a finite disjoint union of finite covers of \\(C\\) branched only\n  over \\(x\\). As \\(x\\) varies these fibers vary in moduli, since by de~Franchis'\n  theorem there are only finitely many non-constant maps between two fixed curves\n  of genus at least \\(2\\); hence \\(f|_X : X \\to C\\) is not isotrivial.\n  Consequently the period map of the variation is non-constant, so the\n  Kodaira--Spencer / Higgs field \\(\\theta_1\\) on the top Hodge piece\n  \\(F^1 \\sF|_C \\simeq (f|_X)_* \\omega_{f|_X}\\) is non-zero. The restriction\n  \\((\\sF, \\nabla)|_C\\) therefore satisfies the hypotheses of\n  \\cref{lem:positive-Hodge-bundle}, so \\(F^1 \\sF|_C\\) has positive parabolic\n  degree, and by \\cref{cor:unstable} the bundle \\(\\sF|_C\\) is not semistable.\n  (Equivalently, by Catanese--Dettweiler the destabilizing subsheaf is\n  \\((f|_X)_* \\omega_{f|_X}\\).)\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Counterexample.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 1977, "effort_local": 1977, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 13319}, "cor:counterexample": {"id": "cor:counterexample", "type": "corollary", "title": "Irreducible counterexample", "chapter": "The Kodaira--Parshin counterexample", "statement": "\\textit{Source: MR4736527 (arXiv:2202.00039), §1, Corollary counterexample.}\n\n  Let \\(C\\) be a smooth projective curve of genus at least \\(2\\). There exists an\n  irreducible flat vector bundle \\((E, \\nabla)\\) on \\(C\\) whose isomonodromic\n  deformations to a nearby curve are never semistable.", "uses": ["thm:counterexample", "def:isomonodromy"], "lean_name": "LandesmanLitt.counterexample_irreducible", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:counterexample, def:isomonodromy}\n  The restriction \\((\\sF, \\nabla)|_C\\) from \\cref{thm:counterexample} is a\n  semisimple flat vector bundle, each of whose flat summands has degree zero. By\n  \\cref{thm:counterexample}(2) its isomonodromic deformation\n  (\\cref{def:isomonodromy}) to a nearby curve is never semistable. Since\n  semistability of the whole would follow from semistability of each summand, one\n  of the irreducible summands of \\((\\sF, \\nabla)|_C\\) must itself have\n  non-semistable isomonodromic deformation, and so satisfies the statement.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Counterexample.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 562, "effort_local": 562, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16257}, "def:generic-global-generation": {"id": "def:generic-global-generation", "type": "definition", "title": "Generic global generation", "chapter": "Analysis of the Harder--Narasimhan filtration", "statement": "\\textit{Source: Landesman--Litt, \\S6.}\n  A vector bundle $V$ on a smooth proper curve $C$ is \\emph{generically globally\n  generated} if the evaluation map\n  \\[\n    H^0(C, V) \\otimes \\sO_C \\longrightarrow V\n  \\]\n  does not factor through a proper subbundle of $V$; equivalently, if the cokernel\n  of this map is a torsion sheaf, i.e.\\ the evaluation map is surjective at the\n  generic point of $C$. A parabolic sheaf $E_\\star$ is called generically globally\n  generated if its underlying vector bundle $E = E_0$ is.", "uses": [], "lean_name": "LandesmanLitt.GenericallyGloballyGenerated", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/HarderNarasimhan.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 514, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 514}, "thm:clifford-vector-bundles": {"id": "thm:clifford-vector-bundles", "type": "theorem", "title": "Clifford's theorem for vector bundles", "chapter": "Analysis of the Harder--Narasimhan filtration", "statement": "\\textit{Source: Brambila-Paz--Grzegorczyk--Newstead, Theorem 2.1 (cited in Landesman--Litt, \\S6).}\n  Let $V$ be a semistable vector bundle on a smooth proper curve $C$ of genus $g$\n  whose slope satisfies $0 \\leq \\mu(V) \\leq 2g - 2$. Then\n  \\[\n    \\dim H^0(C, V) \\leq \\frac{\\deg V}{2} + \\rk V.\n  \\]", "uses": [], "lean_name": "LandesmanLitt.clifford_vb", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is the Clifford-type bound for semistable vector bundles on curves,\n  Theorem~2.1 of Brambila-Paz, Grzegorczyk and Newstead, \\emph{Geography of\n  Brill--Noether loci for small slopes} (J.\\ Algebraic Geom.\\ \\textbf{6} (1997),\n  645--669). We take it as an external input; no Mathlib analogue is available.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/HarderNarasimhan.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 309, "effort_local": 309, "proof_size_tex_total": 309, "proof_size_lean_total": null, "effort_total": 309}, "lem:cohomology-bound": {"id": "lem:cohomology-bound", "type": "lemma", "title": "Cohomology bound for slopes in $[0,2g", "chapter": "Analysis of the Harder--Narasimhan filtration", "statement": "$]\n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Landesman--Litt, \\S6.}\n  Let $V$ be a vector bundle on a smooth proper curve $C$ of genus $g$ with\n  Harder--Narasimhan filtration $0 = N^0 \\subset N^1 \\subset \\cdots \\subset N^m =\n  V$, and suppose that for each $i$ the slope of $\\gr^i_N V = N^i / N^{i-1}$\n  satisfies\n  \\[\n    0 \\leq \\mu(\\gr^i_N V) := \\frac{\\deg(\\gr^i_N V)}{\\rk(\\gr^i_N V)} \\leq 2g.\n  \\]\n  Then\n  \\[\n    \\dim H^0(C, V) \\leq \\frac{\\deg V}{2} + \\rk V.\n  \\]", "uses": ["thm:clifford-vector-bundles", "def:parabolic-HN"], "lean_name": "LandesmanLitt.cohomology_bound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:clifford-vector-bundles}\n  Write $W_i := \\gr^i_N V = N^i / N^{i-1}$, and split the indices: say\n  $W_1, \\ldots, W_k$ have slopes $> 2g - 2$ and $W_{k+1}, \\ldots, W_m$ have slopes\n  $\\leq 2g - 2$. Each $W_i$ is semistable, being a Harder--Narasimhan graded piece.\n\n  For $i > k$ the hypothesis gives $0 \\leq \\mu(W_i) \\leq 2g - 2$, so Clifford's\n  theorem for vector bundles (\\cref{thm:clifford-vector-bundles}) yields\n  $\\dim H^0(C, W_i) \\leq \\tfrac{\\deg W_i}{2} + \\rk W_i$. For $i \\leq k$ the slope\n  exceeds $2g - 2$, so a semistable $W_i$ admits no nonzero map to $\\omega_C$;\n  hence $H^1(C, W_i) = 0$ and Riemann--Roch gives\n  $\\dim H^0(C, W_i) = \\deg W_i + (1-g)\\rk W_i$.\n\n  Summing $\\dim H^0(C, V) \\leq \\sum_i \\dim H^0(C, W_i)$ and regrouping,\n  \\[\n    \\dim H^0(C, V) \\leq \\frac{\\deg V}{2} + \\rk V\n      + \\sum_{i=1}^k \\Big( \\frac{\\deg W_i}{2} - g\\,\\rk W_i \\Big).\n  \\]\n  Each summand is $\\leq 0$: the hypothesis $\\mu(W_i) \\leq 2g$ gives\n  $\\deg W_i \\leq 2g\\,\\rk W_i$, hence $\\tfrac{\\deg W_i}{2} \\leq g\\,\\rk W_i$. The\n  stated bound follows.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/HarderNarasimhan.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1055, "effort_local": 1055, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4539}, "thm:hn-constraints-parabolic": {"id": "thm:hn-constraints-parabolic", "type": "theorem", "title": "Parabolic Harder--Narasimhan constraints", "chapter": "Analysis of the Harder--Narasimhan filtration", "statement": "\\textit{Source: Landesman--Litt, \\S6, Theorem (parabolic Harder--Narasimhan constraints).}\n  Let $(C, D)$ be hyperbolic of genus $g$ with $D = x_1 + \\cdots + x_n$, and let\n  $(E, \\nabla)$ be a flat vector bundle on $C$ with regular singularities along\n  $D$ and irreducible monodromy. Let $E_\\star$ be a parabolic structure on $E$\n  refined by the parabolic structure associated to $\\nabla$. Suppose\n  $(E_\\star', \\nabla')$ is an isomonodromic deformation of $(E_\\star, \\nabla)$ to\n  an analytically general nearby curve, with Harder--Narasimhan filtration\n  \\[\n    0 = (F_\\star')^0 \\subset (F_\\star')^1 \\subset \\cdots \\subset (F_\\star')^m =\n    E_\\star',\n  \\]\n  and for $1 \\leq i \\leq m$ let $\\mu_i$ denote the parabolic slope of\n  $\\gr^i_{\\HN} E_\\star' := (F_\\star')^i / (F_\\star')^{i-1}$. Then:\n  \\begin{enumerate}\n    \\item If $E_\\star'$ is not parabolically semistable, then for every\n      $0 < i < m$ there exist $j < i < k$ with\n      \\[\n        \\rk \\gr^{j+1}_{\\HN} E_\\star' \\cdot \\rk \\gr^k_{\\HN} E_\\star' \\geq g + 1.\n      \\]\n    \\item $0 < \\mu_i - \\mu_{i+1} \\leq 1$ for all $i < m$.\n  \\end{enumerate}", "uses": ["lem:cohomology-bound", "def:generic-global-generation", "def:parabolic-HN", "prop:connection-h1", "lem:parabolic-extension-obstruction", "prop:irreducibility-splitting"], "lean_name": "LandesmanLitt.hn_constraints_parabolic", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:cohomology-bound, def:generic-global-generation,\n        prop:connection-h1, lem:parabolic-extension-obstruction,\n        prop:irreducibility-splitting, def:parabolic-HN}\n  We sketch the argument; the full proof is assembled from the deformation-theoretic\n  lemmas of the chapters on parabolic bundles and isomonodromic deformations.\n\n  The central idea is that any counterexample produces a semistable parabolic\n  vector bundle of high slope that fails to be generically globally generated,\n  which contradicts the cohomology bound. In detail, after deforming to an\n  analytically general nearby curve one may assume the Harder--Narasimhan\n  filtration of $E_\\star'$ extends to a first-order neighborhood. For part (1),\n  if $E_\\star'$ is not parabolically semistable then for each $0 < i < m$ the\n  splitting of the Atiyah sequence determined by the connection\n  (\\cref{prop:connection-h1}) induces, for some $j < i$ and $k \\geq i+1$, a\n  nonzero map $T_{C'}(-D') \\to \\sheafhom(\\gr^{j+1}_{\\HN} E_\\star',\n  \\gr^k_{\\HN} E_\\star')_\\star$ whose persistence under the deformation is governed\n  by the parabolic extension obstruction (\\cref{lem:parabolic-extension-obstruction});\n  the vanishing of the induced map on $H^1$ forces the dual twist\n  $\\sheafhom(\\gr^{j+1}_{\\HN} E_\\star', \\gr^k_{\\HN} E_\\star')^\\vee \\otimes\n  \\omega_C(D)$ to fail generic global generation\n  (\\cref{def:generic-global-generation}). A bundle of this slope that is not\n  generically globally generated has, by the section bound built from\n  \\cref{lem:cohomology-bound}, a rank constraint\n  $\\rk \\gr^{j+1}_{\\HN} E_\\star' \\cdot \\rk \\gr^k_{\\HN} E_\\star' \\geq g + 1$,\n  giving (1). For part (2), the same dual twist must have slope at most\n  $2g - 1 + n$; since the relevant $\\sheafhom$ has negative parabolic slope by the\n  definition of the Harder--Narasimhan filtration (\\cref{def:parabolic-HN}), the\n  parabolic slope of $\\sheafhom(\\gr^{j+1}_{\\HN} E_\\star', \\gr^k_{\\HN} E_\\star')$\n  lies in $[-1, 0)$, whence $0 < \\mu_{j+1} - \\mu_k \\leq 1$, and the intermediate\n  slopes are squeezed to give $0 < \\mu_i - \\mu_{i+1} \\leq 1$. Irreducibility of\n  the monodromy (\\cref{prop:irreducibility-splitting}) is lat vector bundle on $C \\setminus \\{x_1, \\ldots, x_n\\}$\n  underlying a polarizable complex variation of Hodge structure. Let\n  $(\\overline{E}_\\star, \\overline{\\nabla})$ be the Deligne canonical extension of\n  $(E, \\nabla)$ to a flat bundle on $C$ with regular singularities at the $x_i$,\n  equipped with the parabolic structure associated to $\\overline{\\nabla}$. If the\n  parabolic bundle $\\overline{E}_\\star$ is semistable, then the monodromy\n  representation of $\\pi_1(C \\setminus \\{x_1, \\ldots, x_n\\})$ associated to\n  $(E, \\nabla)$ is unitary.", "uses": ["cor:unstable", "def:complex-variation", "def:parabolic-stability", "def:unitary-monodromy", "prop:basic-facts"], "lean_name": "LandesmanLitt.unitary", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:unstable, prop:basic-facts, def:complex-variation,\n    def:parabolic-stability, def:unitary-monodromy}\n  By \\cref{prop:basic-facts}(2) we may decompose the local system\n  $\\bV := \\ker(\\nabla)$ as $\\bV = \\bigoplus_i \\bL_i \\otimes W_i$, where each\n  $\\bL_i$ has irreducible monodromy and underlies a polarizable variation of\n  Hodge structure and each $W_i$ is a constant complex Hodge structure. It\n  suffices to prove that the representation associated to each $\\bL_i$ is unitary,\n  so we may reduce to the case $\\bV = \\bL_i$ and assume $(E, \\nabla)$ has\n  irreducible monodromy.\n\n  Let $i$ be maximal such that $F^i \\overline{E}_\\star \\neq 0$. Since\n  $\\overline{E}_\\star$ is parabolically semistable, \\cref{cor:unstable} shows that\n  the map\n  \\[\n    F^i \\overline{E}_\\star \\to\n      \\bigl(F^{i-1}\\overline{E}_\\star / F^i\\overline{E}_\\star\\bigr) \\otimes\n      \\omega_C\n  \\]\n  induced by the connection vanishes; that is, the connection preserves\n  $F^i \\overline{E}_\\star$. Indeed, were the Hodge filtration to have more than\n  one nonzero part, \\cref{cor:unstable} would force $\\overline{E}_\\star$ to be\n  parabolically unstable, contr ation. Hence the finite-image\n  representations are contained in the proper closed subvariety $V_{(m_r!)}$ and\n  are not Zariski dense.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/HodgeResults.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 2275, "effort_local": 2275, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3507}};

for (const e of graphData.edges) {
  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;
}
const isOrphan = id => !(deg[id] > 0);

// weakly-connected components via union-find (orphans excluded)
const parent = {};
function find(x) { while (parent[x] !== x) x = parent[x] = parent[parent[x]]; return x; }
for (const id in allNodes) parent[id] = id;
for (const e of graphData.edges)
  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

const compMembers = {};
for (const id in allNodes) {
  if (isOrphan(id)) continue;
  const r = find(id);
  (compMembers[r] = compMembers[r] || []).push(id);
}
const components = Object.values(compMembers).sort((a, b) => b.length - a.length);
const compOf = {};
components.forEach((m, i) => m.forEach(id => compOf[id] = i));
