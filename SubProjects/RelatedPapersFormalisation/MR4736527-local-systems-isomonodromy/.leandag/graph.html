<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

<div id="controls">

    <option value="blueprint">Blueprint only</option>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:hyperbolic": {"id": "def:hyperbolic", "type": "definition", "title": "Hyperbolic pointed curve", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Definition 1.1.}\n  Let $C$ be a smooth proper connected curve over $\\C$ of genus $g$, and let\n  $D \\subset C$ be a reduced effective divisor of degree $n$. The pair $(C, D)$\n  is \\emph{hyperbolic} if one of the following holds:\n  \\[\n    g \\ge 2 \\text{ and } n \\ge 0, \\qquad\n    g = 1 \\text{ and } n > 0, \\qquad\n    g = 0 \\text{ and } n > 2.\n  \\]\n  An $n$-pointed curve $(C, x_1, \\ldots, x_n)$ is \\emph{hyperbolic} if\n  $(C, x_1 + \\cdots + x_n)$ is hyperbolic.\n\n  \n  \n  \n  Equivalently, $(C, D)$ is hyperbolic if and only if it has no infinitesimal\n  automorphisms, i.e.\\ $H^0(C, T_C(-D)) = 0$.", "uses": [], "lean_name": "LandesmanLitt.Hyperbolic", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 8, "proof_size_tex": null, "effort_local": 626, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 626}, "def:analytically-general": {"id": "def:analytically-general", "type": "definition", "title": "Analytically general point", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Definition 1.2.}\n  A property holds for an \\emph{analytically general} point of a complex orbifold\n  $X$ if there exists a nowhere dense closed analytic subset $S \\subset X$ such\n  that the property holds on $X - S$. Equivalently (and more in line with the very\n  general notion below), the property holds analytically generally if, locally on\n  $X$, there is a nowhere dense closed analytic subset on whose complement the\n  property holds.", "uses": ["def:moduli-stack"], "lean_name": "LandesmanLitt.AnalyticallyGeneral", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 473, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 917}, "def:analytically-very-general": {"id": "def:analytically-very-general", "type": "definition", "title": "Analytically very general point", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Definition 1.2.}\n  A property holds for an \\emph{analytically very general} point of a complex\n  orbifold $X$ if, locally on $X$, there exists a countable collection of nowhere\n  dense closed analytic subsets such that the property holds on the complement of\n  their union. A property holds for an analytically (very) general $n$-pointed\n  curve of genus $g$ if it holds for an analytically (very) general point of the\n  analytic moduli stack $\\sM_{g,n}$ (\\cref{def:moduli-stack}).", "uses": ["def:moduli-stack", "def:analytically-general"], "lean_name": "LandesmanLitt.AnalyticallyVeryGeneral", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 514, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1431}, "def:moduli-stack": {"id": "def:moduli-stack", "type": "definition", "title": "Analytic moduli stack of pointed curves", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  We write $\\sM_{g,n}$ for the analytic moduli stack of smooth proper curves of\n  genus $g$ with geometrically connected fibers and $n$ distinct marked points.\n  For the purposes of this formalization, $\\sM_{g,n}$ is modeled as an opaque\n  complex orbifold, equipped with the analytically general and analytically very\n  general predicates of \\cref{def:analytically-general,def:analytically-very-general}.", "uses": [], "lean_name": "LandesmanLitt.ModuliStack", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": null, "effort_local": 444, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 444}, "def:local-system": {"id": "def:local-system", "type": "definition", "title": "Complex local system", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  A rank-$r$ \\emph{complex local system} $\\bV$ on a connected complex manifold or\n  punctured curve $X$ is a locally constant sheaf of $r$-dimensional $\\C$-vector\n  spaces on $X$. Fixing a base point, this is the same datum as a representation\n  $\\pi_1(X) \\to \\GL_r(\\C)$, well defined up to conjugacy; we write\n  $\\rk \\bV = r$ for its rank.", "uses": [], "lean_name": "LandesmanLitt.LocalSystem", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 0, "rdep_count": 4, "descendant_count": 14, "proof_size_tex": null, "effort_local": 379, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 379}, "def:monodromy": {"id": "def:monodromy", "type": "definition", "title": "Monodromy representation", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  The \\emph{monodromy representation} of a rank-$n$ local system $\\bV$ on $X$ (or\n  of a flat vector bundle, via its underlying local system of flat sections) is\n  the representation\n  \\[\n    \\rho : \\pi_1(X) \\longrightarrow \\GL_n(\\C)\n  \\]\n  obtained by parallel transport. Its image $\\rho(\\pi_1(X)) \\subseteq \\GL_n(\\C)$\n  is the \\emph{monodromy group}.", "uses": ["def:local-system"], "lean_name": "LandesmanLitt.Monodromy", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 11, "proof_size_tex": null, "effort_local": 391, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 770}, "def:infinite-monodromy": {"id": "def:infinite-monodromy", "type": "definition", "title": "Infinite monodromy", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  A local system $\\bV$ (or flat vector bundle) has \\emph{infinite monodromy} if\n  its monodromy group $\\rho(\\pi_1(X))$ is infinite.", "uses": ["def:monodromy"], "lean_name": "LandesmanLitt.InfiniteMonodromy", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": null, "effort_local": 170, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 940}, "def:unitary-monodromy": {"id": "def:unitary-monodromy", "type": "definition", "title": "Unitary monodromy", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  A flat vector bundle (equivalently, its local system of flat sections) has\n  \\emph{unitary monodromy} if the associated monodromy representation\n  $\\rho : \\pi_1(C) \\to \\GL_n(\\C)$ has image with compact closure.", "uses": ["def:monodromy"], "lean_name": "LandesmanLitt.UnitaryMonodromy", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": null, "effort_local": 251, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1021}, "def:OK-local-system": {"id": "def:OK-local-system", "type": "definition", "title": "$\\sO_K$-local system", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Theorem 1.3.}\n  Let $K$ be a number field with ring of integers $\\sO_K$. An \\emph{$\\sO_K$-local\n  system} on a space $X$ is a locally constant sheaf of $\\sO_K$-modules on $X$\n  that is locally free of finite rank; its rank is written $\\rk_{\\sO_K}(\\bV)$.\n  For each embedding $\\iota : \\sO_K \\to \\C$ it gives rise to a complex local\n  system $\\bV \\otimes_{\\sO_K, \\iota} \\C$ of rank $\\rk_{\\sO_K}(\\bV)$.", "uses": ["def:local-system"], "lean_name": "LandesmanLitt.OKLocalSystem", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": null, "effort_local": 432, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 811}, "def:geometric-origin": {"id": "def:geometric-origin", "type": "definition", "title": "Local system of geometric origin", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  Let $X$ be a smooth variety. A complex local system $\\bV$ on $X$ is \\emph{of\n  geometric origin} if there exists a dense open subset $U \\subseteq X$ and a\n  smooth proper morphism $f : Y \\to U$ such that $\\bV|_U$ is a direct summand of\n  $R^i f_* \\C$ for some $i \\ge 0$.", "uses": ["def:local-system"], "lean_name": "LandesmanLitt.GeometricOrigin", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": null, "effort_local": 311, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 690}, "def:character-variety": {"id": "def:character-variety", "type": "definition", "title": "Character variety", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, \\S1.}\n  For a punctured curve $C \\setminus \\{x_1, \\ldots, x_n\\}$, the \\emph{character\n  variety} is the geometric invariant theory quotient\n  \\[\n    \\sM_{B,r}(C \\setminus \\{x_1, \\ldots, x_n\\})\n      := \\Hom\\!\\bigl(\\pi_1(C \\setminus \\{x_1, \\ldots, x_n\\}), \\GL_r(\\C)\\bigr)\n         /\\!/ \\GL_r(\\C),\n  \\]\n  parametrizing conjugacy classes of semisimple representations of\n  $\\pi_1(C \\setminus \\{x_1, \\ldots, x_n\\})$ into $\\GL_r(\\C)$.", "uses": ["def:local-system", "def:monodromy"], "lean_name": "LandesmanLitt.CharacterVariety", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": null, "effort_local": 462, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1232}, "thm:very-general-VHS": {"id": "thm:very-general-VHS", "type": "theorem", "title": "Rank bound for very general VHS", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Theorem 1.3.}\n  Let $K$ be a number field with ring of integers $\\sO_K$. Suppose\n  $(C, x_1, \\ldots, x_n)$ is an analytically very general $n$-pointed hyperbolic\n  curve of genus $g$, and $\\bV$ is an $\\sO_K$-local system on\n  $C \\setminus \\{x_1, \\ldots, x_n\\}$ with infinite monodromy. Suppose\n  additionally that for each embedding $\\iota : \\sO_K \\to \\C$, the complex local\n  system $\\bV \\otimes_{\\sO_K, \\iota} \\C$ underlies a polarizable complex\n  variation of Hodge structure. Then\n  \\[\n    \\rk_{\\sO_K}(\\bV) \\ge 2\\sqrt{g+1}.\n  \\]", "uses": ["thm:isomonodromic-deformation-CVHS", "lem:integral-and-unitary-implies-finite", "def:hyperbolic", "def:analytically-very-general", "def:OK-local-system", "def:infinite-monodromy", "def:complex-variation"], "lean_name": "LandesmanLitt.very_general_VHS", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:isomonodromic-deformation-CVHS, lem:integral-and-unitary-implies-finite,\n        def:unitary-monodromy, def:infinite-monodromy}\n  We argue by contradiction: suppose $\\rk_{\\sO_K}(\\bV) < 2\\sqrt{g+1}$. Fix an\n  embedding $\\iota : \\sO_K \\to \\C$ and let $(E, \\nabla)$ be the flat vector bundle\n  with regular singularities underlying $\\bV \\otimes_{\\sO_K, \\iota} \\C$, so that\n  $\\rk E = \\rk_{\\sO_K}(\\bV) < 2\\sqrt{g+1}$. Because $(C, x_1, \\ldots, x_n)$ is\n  analytically very general, an isomonodromic deformation of $(E, \\nabla)$ to an\n  analytically general nearby pointed curve still underlies a polarizable complex\n  variation of Hodge structure. By \\cref{thm:isomonodromic-deformation-CVHS},\n  $(E, \\nabla)$ then has unitary monodromy.\n\n  Thus the monodromy representation $\\rho$ has image with compact closure. On the\n  other hand, the $\\sO_K$-structure forces the image of $\\rho$ to be a discrete\n  subset of $\\GL_n(\\C)$: a discrete subset of a set with compact closure is\n  finite, so the monodromy group is finite. This is recorded in\n  \\cref{lem:integral-and-unitary-implies-finite}. A finite monodromy group\n  contradicts the hypothesis that $\\bV$ has infinite monodromy. Hence\n  $\\rk_{\\sO_K}(\\bV) \\ge 2\\sqrt{g+1}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 7, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 1229, "effort_local": 1229, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11266}, "thm:isomonodromic-deformation-CVHS": {"id": "thm:isomonodromic-deformation-CVHS", "type": "theorem", "title": "Isomonodromic deformations underlying CVHS are unitary", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Theorem 1.6.}\n  Let $(C, x_1, \\ldots, x_n)$ be an $n$-pointed hyperbolic curve of genus $g$.\n  Let $(E, \\nabla)$ be a flat vector bundle on $C$ with $\\rk E < 2\\sqrt{g+1}$ and\n  with regular singularities at the $x_i$. If an isomonodromic deformation of\n  $(E, \\nabla)$ to an analytically general nearby $n$-pointed curve underlies a\n  polarizable complex variation of Hodge structure, then $(E, \\nabla)$ has\n  unitary monodromy.", "uses": ["def:hyperbolic", "def:isomonodromy", "def:nearby", "def:complex-variation", "def:unitary-monodromy"], "lean_name": "LandesmanLitt.isomonodromic_deformation_CVHS", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:unitary, cor:unstable, cor:stable-parabolic}\n  The proof is carried out in the chapter on Hodge-theoretic stability results.\n  In outline: by the Harder--Narasimhan analysis, the small-rank hypothesis\n  $\\rk E < 2\\sqrt{g+1}$ forces an isomonodromic deformation of $(E, \\nabla)$ to an\n  analytically general nearby curve to be parabolically semistable\n  (\\cref{cor:stable-parabolic}). A flat vector bundle underlying a polarizable\n  complex variation of Hodge structure whose underlying bundle is semistable must\n  have unitary monodromy, because a non-unitary variation produces an unstable\n  Hodge filtration (\\cref{cor:unstable}); this contrast is packaged as\n  \\cref{lem:unitary}. Combining these, $(E, \\nabla)$ has unitary monodromy.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 747, "effort_local": 747, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7957}, "cor:geometric-local-systems": {"id": "cor:geometric-local-systems", "type": "corollary", "title": "Geometric local systems on very general curves", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Corollary 1.4.}\n  Let $(C, x_1, \\ldots, x_n)$ be an analytically very general hyperbolic\n  $n$-pointed curve of genus $g$. If $\\bV$ is a local system on\n  $C \\setminus \\{x_1, \\ldots, x_n\\}$ of geometric origin and with infinite\n  monodromy, then $\\dim_{\\C} \\bV \\ge 2\\sqrt{g+1}$.", "uses": ["thm:very-general-VHS", "def:geometric-origin", "def:infinite-monodromy"], "lean_name": "LandesmanLitt.geometric_local_systems", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:very-general-VHS, def:geometric-origin}\n  A local system of geometric origin is a direct summand of $R^i f_* \\C$ for a\n  smooth proper morphism $f$; by the theory of polarizable variations of Hodge\n  structure such a summand carries a polarizable complex variation of Hodge\n  structure, and it is integral (indeed it underlies a $\\Z$-, hence $\\sO_K$-, local\n  system). Thus $\\bV$ satisfies the hypotheses of \\cref{thm:very-general-VHS} with\n  $\\sO_K = \\Z$, and that theorem gives\n  $\\dim_{\\C} \\bV = \\rk_{\\Z}(\\bV) \\ge 2\\sqrt{g+1}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 540, "effort_local": 540, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 12117}, "cor:abelian-schemes": {"id": "cor:abelian-schemes", "type": "corollary", "title": "Abelian schemes over very general curves", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Corollary 1.5.}\n  If $(C, x_1, \\ldots, x_n)$ is an analytically very general hyperbolic\n  $n$-pointed genus $g$ curve, then any non-isotrivial abelian scheme over\n  $C \\setminus \\{x_1, \\ldots, x_n\\}$ has relative dimension at least\n  $\\sqrt{g+1}$. Similarly, any relative smooth proper curve over\n  $C \\setminus \\{x_1, \\ldots, x_n\\}$ has genus at least $\\sqrt{g+1}$.", "uses": ["cor:geometric-local-systems"], "lean_name": "LandesmanLitt.abelian_schemes", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:geometric-local-systems}\n  A non-isotrivial abelian scheme $A \\to C \\setminus \\{x_1, \\ldots, x_n\\}$ of\n  relative dimension $d$ gives a geometric local system $R^1 \\pi_* \\C$ of rank\n  $2d$ with infinite monodromy (non-isotriviality forces the monodromy to be\n  infinite). By \\cref{cor:geometric-local-systems}, $2d \\ge 2\\sqrt{g+1}$, i.e.\\\n  $d \\ge \\sqrt{g+1}$. For a relative smooth proper curve of genus $h$, its\n  Jacobian is an abelian scheme of relative dimension $h$, and the same argument\n  gives $h \\ge \\sqrt{g+1}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 532, "effort_local": 532, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 12649}, "cor:non-density": {"id": "cor:non-density", "type": "corollary", "title": "Non-density of geometric local systems", "chapter": "Foundations and main statements", "statement": "\\textit{Source: Landesman--Litt, Corollary 1.7.}\n  Let $(C, x_1, \\ldots, x_n)$ be an analytically very general hyperbolic\n  $n$-pointed curve of genus $g$. If $1 < r < 2\\sqrt{g+1}$, then the local\n  systems of geometric origin are not Zariski-dense in the character variety\n  $\\sM_{B,r}(C \\setminus \\{x_1, \\ldots, x_n\\})$.", "uses": ["cor:geometric-local-systems", "def:character-variety", "lem:finite-image-not-dense"], "lean_name": "LandesmanLitt.non_density", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:geometric-local-systems, def:character-variety, lem:finite-image-not-dense}\n  By \\cref{cor:geometric-local-systems}, every rank-$r$ local system of geometric\n  origin with $r < 2\\sqrt{g+1}$ has finite monodromy. Points of the character\n  variety corresponding to representations with finite image are not Zariski-dense\n  when $r > 1$ (\\cref{lem:finite-image-not-dense}): they lie in a proper closed\n  subset. Hence the geometric local systems, all of which have finite monodromy in\n  this rank range, fail to be Zariski-dense in\n  $\\sM_{B,r}(C \\setminus \\{x_1, \\ldots, x_n\\})$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Foundations.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 587, "effort_local": 587, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15441}, "def:parabolic-bundle": {"id": "def:parabolic-bundle", "type": "definition", "title": "Parabolic bundle", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  Let $E$ be a vector bundle over $C$. A \\emph{quasiparabolic structure} on $E$\n  over $D$ is, for each $1 \\leq j \\leq n$, a strictly decreasing filtration of\n  subspaces of the fibre $E_{x_j}$\n  \\[\n    E_{x_j} = E_j^1 \\supsetneq E_j^2 \\supsetneq \\cdots \\supsetneq E_j^{n_j+1} = 0 .\n  \\]\n  A \\emph{parabolic structure} on $E$ over $D$ is a quasiparabolic structure\n  together with, for each $1 \\leq j \\leq n$, a strictly increasing sequence of\n  \\emph{weights}\n  \\[\n    0 \\leq \\alpha^1_j < \\alpha^2_j < \\cdots < \\alpha^{n_j}_j < 1 .\n  \\]\n  A \\emph{parabolic bundle} is a vector bundle equipped with a parabolic\n  structure. We say it has \\emph{rational weights} if all $\\alpha^i_j \\in \\Q$.\n  We abbreviate the data $(E, \\{E^i_j\\}, \\{\\alpha^i_j\\})$ as $E_\\star$.", "uses": [], "lean_name": "LandesmanLitt.ParabolicBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 11, "descendant_count": 33, "proof_size_tex": null, "effort_local": 802, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 802}, "def:bundle-degree": {"id": "def:bundle-degree", "type": "definition", "title": "Bundle degree on a curve", "chapter": "Background on parabolic bundles", "statement": "For a vector bundle $E$ on the smooth proper curve $C$, $\\deg E \\in \\Z$ denotes\n  its degree, i.e.\\ the degree of the line bundle $\\det E = \\bigwedge^{\\rk E} E$.\n  It is additive in short exact sequences: $\\deg E = \\deg F + \\deg Q$ whenever\n  $0 \\to F \\to E \\to Q \\to 0$ is exact.", "uses": [], "lean_name": "LandesmanLitt.ParabolicBundle.deg", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 19, "proof_size_tex": null, "effort_local": 280, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 280}, "def:par-degree": {"id": "def:par-degree", "type": "definition", "title": "Parabolic degree", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  For a parabolic bundle $E_\\star = (E, \\{E^i_j\\}, \\{\\alpha^i_j\\})$, the\n  \\emph{parabolic degree} is\n  \\[\n    \\pardeg(E_\\star) := \\deg(E) + \\sum_{j=1}^n \\sum_{i=1}^{n_j}\n      \\alpha^i_j \\, \\dim\\!\\left(E_j^i / E_j^{i+1}\\right).\n  \\]", "uses": ["def:parabolic-bundle", "def:bundle-degree"], "lean_name": "LandesmanLitt.parDeg", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 5, "descendant_count": 18, "proof_size_tex": null, "effort_local": 274, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1356}, "def:par-slope": {"id": "def:par-slope", "type": "definition", "title": "Parabolic slope", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  The \\emph{parabolic slope} of a parabolic bundle $E_\\star$ is\n  \\[\n    \\mu_\\star(E_\\star) := \\frac{\\pardeg(E_\\star)}{\\rk(E_\\star)} .\n  \\]", "uses": ["def:par-degree"], "lean_name": "LandesmanLitt.parSlope", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 16, "proof_size_tex": null, "effort_local": 180, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1536}, "def:filtered-OX-module": {"id": "def:filtered-OX-module", "type": "definition", "title": "$\\R$-filtered $\\sO_X$-module", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  Let $X$ be a scheme and $D \\subset X$ an effective Cartier divisor. Regard\n  $\\R$ as a category with a single morphism $i^{\\alpha,\\beta}:\\alpha\\to\\beta$\n  exactly when $\\alpha \\geq \\beta$, and let $\\sM_X$ be the category of sheaves of\n  $\\sO_X$-modules. An \\emph{$\\R$-filtered $\\sO_X$-module} is a functor\n  $E_\\star : \\R \\to \\sM_X$; we write $E_\\alpha := E_\\star(\\alpha)$ and\n  $i_E^{\\alpha,\\beta} := E_\\star(i^{\\alpha,\\beta})$ for the transition maps.\n  For $\\alpha \\in \\R$ the shifted module $E[\\alpha]_\\star$ is defined by\n  $E[\\alpha]_\\beta := E_{\\alpha+\\beta}$, with transition maps inherited from $E$.", "uses": [], "lean_name": "LandesmanLitt.FilteredModule", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": null, "effort_local": 651, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 651}, "def:parabolic-sheaf": {"id": "def:parabolic-sheaf", "type": "definition", "title": "Parabolic sheaf", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  A \\emph{parabolic sheaf} on $X$ with respect to $D$ is an $\\R$-filtered\n  $\\sO_X$-module $E_\\star$ together with an isomorphism\n  \\[\n    j_E : E_\\star \\otimes \\sO_X(-D) \\xrightarrow{\\;\\sim\\;} E[1]_\\star\n  \\]\n  satisfying $i_E^{[1,0]} \\circ j_E = \\mathrm{id}_{E_\\star} \\otimes i_D$, where\n  $i_D : \\sO_X(-D) \\to \\sO_X$ is the natural inclusion. A \\emph{parabolic\n  morphism} $f : E_\\star \\to F_\\star$ is a natural transformation commuting with\n  the structure isomorphisms $j_E, j_F$. We write $\\Hom(E_\\star, F_\\star)$ for\n  the set of parabolic morphisms and $\\sheafhom(E_\\star, F_\\star)$ for the\n  associated sheaf-Hom; the parabolic sheaf $\\sheafhom(E_\\star, F_\\star)_\\star$\n  has $\\sheafhom(E_\\star, F_\\star)_\\alpha := \\sheafhom(E_\\star, F[\\alpha]_\\star)$.\n  We set $\\End(E_\\star) := \\Hom(E_\\star, E_\\star)$ and\n  $\\sheafend(E_\\star) := \\sheafhom(E_\\star, E_\\star)$.", "uses": ["def:filtered-OX-module"], "lean_name": "LandesmanLitt.ParabolicSheaf", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 9, "proof_size_tex": null, "effort_local": 912, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1563}, "def:parabolic-bundle-sheaf": {"id": "def:parabolic-bundle-sheaf", "type": "definition", "title": "Parabolic sheaf of a parabolic bundle", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  Every parabolic bundle $E_\\star = (E, \\{E^i_j\\}, \\{\\alpha^i_j\\})$ determines a\n  parabolic sheaf: for $0 \\leq \\alpha < 1$ set\n  \\[\n    E_\\alpha := \\bigcap_{j=1}^n \\ker\\!\\left(E \\to E_{x_j}/E^{\\beta(\\alpha,j)}_j\\right),\n  \\]\n  where $\\beta(\\alpha,j) = \\min\\{ i : \\alpha^i_j \\geq \\alpha\\}$ for\n  $\\alpha \\leq \\max_i \\alpha^i_j$, and $\\beta(\\alpha,j) = n_j+1$ for\n  $\\max_i \\alpha^i_j < \\alpha < 1$; extend by $E_{\\alpha+m} := E_\\alpha(-mD)$ for\n  $m \\in \\Z$, with the natural inclusions as transition maps. We identify a\n  parabolic bundle with its associated parabolic sheaf.", "uses": ["def:parabolic-bundle", "def:parabolic-sheaf"], "lean_name": "LandesmanLitt.ParabolicBundle.toParabolicSheaf", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": null, "effort_local": 617, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2982}, "def:coparabolic-bundle": {"id": "def:coparabolic-bundle", "type": "definition", "title": "Coparabolic bundle", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (after Boden--Yokogawa).}\n  Let $E_\\star$ be a parabolic bundle, viewed as a parabolic sheaf via\n  \\cref{def:parabolic-bundle-sheaf}. The associated \\emph{coparabolic bundle}\n  $\\widehat{E}_\\star$ is the parabolic sheaf with\n  \\[\n    \\widehat{E}_\\alpha := \\colim_{\\beta > \\alpha} E_\\beta ,\n  \\]\n  the colimit (union) taken over the transition inclusions $i^{\\alpha,\\beta}_E$.", "uses": ["def:parabolic-bundle", "def:parabolic-sheaf", "def:parabolic-bundle-sheaf"], "lean_name": "LandesmanLitt.CoparabolicBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 5, "proof_size_tex": null, "effort_local": 414, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3396}, "def:copar-degree": {"id": "def:copar-degree", "type": "definition", "title": "Coparabolic degree and slope", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  For a coparabolic bundle $F_\\star = \\widehat{E}_\\star$ with $E_\\star$ a\n  parabolic bundle, the \\emph{coparabolic degree} and \\emph{slope} are\n  $\\copardeg(F_\\star) := \\pardeg(E_\\star)$ and\n  $\\mu_\\star(F_\\star) := \\mu_\\star(E_\\star)$.", "uses": ["def:coparabolic-bundle", "def:par-degree", "def:par-slope"], "lean_name": "LandesmanLitt.coparDeg", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 278, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4408}, "def:induced-subbundle": {"id": "def:induced-subbundle", "type": "definition", "title": "Induced parabolic structure on a subbundle", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (after Seshadri).}\n  Let $E_\\star = (E, \\{E^i_j\\}, \\{\\alpha^i_j\\})$ be a parabolic bundle and\n  $F \\subset E$ a subbundle. The \\emph{induced parabolic structure} $F_\\star$ has\n  quasiparabolic filtration over $x_j$ obtained from\n  \\[\n    F_{x_j} = E^1_j \\cap F_{x_j} \\supset E^2_j \\cap F_{x_j} \\supset \\cdots\n      \\supset E^{n_j+1}_j \\cap F_{x_j} = 0\n  \\]\n  by deleting repetitions, and the weight of a step $F^i_j \\subset F_{x_j}$ is\n  $\\max\\{ \\alpha^k_j : 1 \\leq k \\leq n_j,\\ F^i_j = E^k_j \\cap F_{x_j}\\}$.", "uses": ["def:parabolic-bundle"], "lean_name": "LandesmanLitt.inducedSub", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": null, "effort_local": 548, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1350}, "def:induced-quotient": {"id": "def:induced-quotient", "type": "definition", "title": "Induced parabolic structure on a quotient", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  Let $E \\to Q$ be a quotient bundle with kernel $F$. The \\emph{induced\n  parabolic structure} $Q_\\star$ has quasiparabolic filtration over $x_j$\n  obtained from\n  \\[\n    Q_{x_j} = (E^1_j + F_{x_j})/F_{x_j} \\supset (E^2_j + F_{x_j})/F_{x_j} \\supset\n      \\cdots \\supset (E^{n_j+1}_j + F_{x_j})/F_{x_j} = 0\n  \\]\n  by deleting repetitions, and the weight of a step $Q^i_j \\subset Q_{x_j}$ is\n  $\\max\\{ \\alpha^k_j : 1 \\leq k \\leq n_j,\\ Q^i_j = (E^k_j + F_{x_j})/F_{x_j}\\}$.", "uses": ["def:parabolic-bundle"], "lean_name": "LandesmanLitt.inducedQuot", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 511, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1313}, "def:parabolic-stability": {"id": "def:parabolic-stability", "type": "definition", "title": "Parabolic (semi)stability", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  A parabolic bundle $E_\\star$ is \\emph{parabolically semistable}\n  (respectively \\emph{stable}) if $\\mu_\\star(F_\\star) \\leq \\mu_\\star(E_\\star)$\n  (respectively $\\mu_\\star(F_\\star) < \\mu_\\star(E_\\star)$) for every parabolic\n  subbundle $F_\\star \\subset E_\\star$, with the induced parabolic structure of\n  \\cref{def:induced-subbundle}.", "uses": ["def:par-slope", "def:induced-subbundle"], "lean_name": "LandesmanLitt.ParabolicSemistable", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 5, "descendant_count": 10, "proof_size_tex": null, "effort_local": 375, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2459}, "def:coparabolic-stability": {"id": "def:coparabolic-stability", "type": "definition", "title": "Coparabolic (semi)stability", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  A coparabolic bundle $E_\\star$ is \\emph{coparabolically semistable} if it is of\n  the form $E_\\star = \\widehat{F}_\\star$ for a (parabolically) semistable\n  parabolic bundle $F_\\star$. Thus parabolic and coparabolic stability are both\n  defined in terms of parabolic bundles.", "uses": ["def:coparabolic-bundle", "def:parabolic-stability"], "lean_name": "LandesmanLitt.CoparabolicSemistable", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 317, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5370}, "lem:quotient-semistable": {"id": "lem:quotient-semistable", "type": "lemma", "title": "Degree additivity and the quotient criterion", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  Let $E_\\star$ be a parabolic bundle, $F_\\star \\subset E_\\star$ a parabolic\n  subbundle with the induced structure, and $Q_\\star = E_\\star/F_\\star$ with the\n  induced quotient structure. Then\n  \\[\n    \\pardeg(E_\\star) = \\pardeg(F_\\star) + \\pardeg(Q_\\star) .\n  \\]\n  Consequently $E_\\star$ is parabolically semistable (respectively stable) if and\n  only if $\\mu_\\star(E_\\star) \\leq \\mu_\\star(Q_\\star)$ (respectively\n  $\\mu_\\star(E_\\star) < \\mu_\\star(Q_\\star)$) for every parabolic quotient\n  bundle $Q_\\star$.", "uses": ["def:par-degree", "def:par-slope", "def:induced-subbundle", "def:induced-quotient", "def:parabolic-stability"], "lean_name": "LandesmanLitt.parDeg_quotient", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:par-degree, def:par-slope, def:induced-subbundle, def:induced-quotient}\n  The degree-additivity statement is \\cite[Part 3, \\S1.A, p.~69, Remark\n  3]{seshadri:fibres-vectoriels-sur-les-courbes-algebriques}, together with the\n  notion of an exact sequence of parabolic bundles \\cite[Part 3, \\S1.A,\n  p.~68]{seshadri:fibres-vectoriels-sur-les-courbes-algebriques}: on underlying\n  bundles $\\deg E = \\deg F + \\deg Q$, and a point-by-point comparison of the\n  induced sub- and quotient filtrations shows the weighted correction terms add,\n  so $\\pardeg(E_\\star) = \\pardeg(F_\\star) + \\pardeg(Q_\\star)$.\n  The quotient criterion follows formally: writing $r = \\rk E_\\star$,\n  $s = \\rk F_\\star$ and $d = \\pardeg E_\\star$, $e = \\pardeg F_\\star$, the\n  inequality $\\tfrac{e}{s} < \\tfrac{d}{r}$ for the subbundle is equivalent to\n  $\\tfrac{d-e}{r-s} > \\tfrac{d}{r}$ for the complementary quotient (and likewise\n  with $\\leq$ in place of $<$, or with equalities). Hence the slope condition on\n  all subbundles is equivalent to the reversed slope condition on all quotients.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 5, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1071, "effort_local": 1071, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4041}, "def:parabolic-HN": {"id": "def:parabolic-HN", "type": "definition", "title": "Parabolic Harder--Narasimhan filtration", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (after Seshadri).}\n  Every parabolic bundle $E_\\star$ admits a unique \\emph{Harder--Narasimhan\n  filtration}: a filtration by parabolic subbundles\n  $0 = E^{(0)}_\\star \\subsetneq E^{(1)}_\\star \\subsetneq \\cdots \\subsetneq\n  E^{(\\ell)}_\\star = E_\\star$ (with induced structures) whose successive\n  quotients $E^{(k)}_\\star / E^{(k-1)}_\\star$ are parabolically semistable with\n  strictly decreasing parabolic slopes\n  $\\mu_\\star(E^{(1)}_\\star/E^{(0)}_\\star) > \\cdots >\n  \\mu_\\star(E^{(\\ell)}_\\star/E^{(\\ell-1)}_\\star)$. Existence and uniqueness are\n  proved as for ordinary vector bundles \\cite[Part 3, \\S1.B, Theorem\n  8]{seshadri:fibres-vectoriels-sur-les-courbes-algebriques}.", "uses": ["def:parabolic-bundle", "def:par-slope", "def:parabolic-stability"], "lean_name": "LandesmanLitt.parabolicHN", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": null, "effort_local": 716, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3175}, "def:parabolic-dual": {"id": "def:parabolic-dual", "type": "definition", "title": "Parabolic dualization", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  For a parabolic sheaf $F_\\star$, the \\emph{parabolic dual} is\n  $F^\\vee_\\star := \\sheafhom(F_\\star, \\sO_X)_\\star$.", "uses": ["def:parabolic-sheaf"], "lean_name": "LandesmanLitt.parabolicDual", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 3, "proof_size_tex": null, "effort_local": 157, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1720}, "lem:parabolic-dual-formula": {"id": "lem:parabolic-dual-formula", "type": "lemma", "title": "Parabolic dualization formula", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (cf. Yokogawa (3.1)).}\n  If $F_\\star$ arises from a parabolic vector bundle, then for every $\\alpha$\n  \\[\n    F^\\vee_\\alpha \\simeq \\left(\\widehat{F}_{-\\alpha}\\right)^\\vee(-D) .\n  \\]", "uses": ["def:parabolic-dual", "def:coparabolic-bundle"], "lean_name": "LandesmanLitt.parabolicDual_formula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:parabolic-dual, def:coparabolic-bundle}\n  This is the description of parabolic dualization recorded in\n  \\cite[(3.1)]{yokogawa:infinitesimal-deformation}: unwinding\n  $\\sheafhom(F_\\star, \\sO_X)_\\alpha = \\sheafhom(F_\\star, \\sO_X[\\alpha]_\\star)$ and\n  the structure isomorphism of the parabolic sheaf $\\sO_X$ identifies the\n  $\\alpha$-piece of $F^\\vee_\\star$ with the ordinary dual of the coparabolic\n  piece $\\widehat{F}_{-\\alpha}$, twisted by $-D$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 458, "effort_local": 458, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4011}, "def:parabolic-tensor": {"id": "def:parabolic-tensor", "type": "definition", "title": "Parabolic tensor product", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (cf. Yokogawa, Example 3.2).}\n  Let $\\tau : X - D \\to X$ be the inclusion. For parabolic modules\n  $E_\\star, F_\\star$ with each $E_\\alpha$ and $F_\\alpha$ locally free, the\n  \\emph{parabolic tensor product} is\n  \\[\n    (E_\\star \\otimes F_\\star)_\\alpha := \\sum_{\\alpha_1 + \\alpha_2 = \\alpha}\n      E_{\\alpha_1} \\otimes F_{\\alpha_2} ,\n  \\]\n  viewed as a subbundle of $\\tau_* \\tau^*(E \\otimes F)$, with the natural\n  inclusions as transition maps.", "uses": ["def:parabolic-sheaf"], "lean_name": "LandesmanLitt.parabolicTensor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": null, "effort_local": 482, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2045}, "lem:degree-in-duals": {"id": "lem:degree-in-duals", "type": "lemma", "title": "Degree of duals and tensor products", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3.}\n  For parabolic bundles $E_\\star$ and $F_\\star$,\n  \\[\n    \\pardeg(E_\\star \\otimes F_\\star) = \\pardeg(E_\\star)\\,\\rk(F_\\star) +\n      \\pardeg(F_\\star)\\,\\rk(E_\\star), \\qquad\n    \\pardeg(E^\\vee_\\star) = -\\pardeg(E_\\star) .\n  \\]", "uses": ["def:parabolic-tensor", "def:parabolic-dual", "def:par-degree", "lem:parabolic-dual-formula"], "lean_name": "LandesmanLitt.parDeg_dual_tensor", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:parabolic-dual-formula, def:par-degree}\n  Both identities are obtained by unwinding the definitions; the source omits the\n  computation. The tensor formula is the parabolic analogue of the classical\n  $\\deg(E \\otimes F) = \\deg E \\cdot \\rk F + \\deg F \\cdot \\rk E$, the weighted\n  correction terms adding accordingly. For the dual,\n  \\cref{lem:parabolic-dual-formula} expresses $E^\\vee_\\star$ through\n  $\\widehat{E}_{-\\alpha}$ and a twist by $-D$; writing\n  $E^\\vee_\\star = (E^\\vee_0, \\{F^i_j\\}, \\{\\beta^i_j\\})$ one finds\n  $\\beta^i_j = 1 - \\alpha^{n_j+1-i}_j$ with matching jumps, and summing the\n  weighted contributions against $\\deg(E^\\vee_0(-D))$ yields\n  $\\pardeg(E^\\vee_\\star) = -\\pardeg(E_\\star)$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 4, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 713, "effort_local": 713, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5760}, "prop:serre-duality": {"id": "prop:serre-duality", "type": "proposition", "title": "Parabolic Serre duality", "chapter": "Background on parabolic bundles", "statement": "\\textit{Source: Landesman--Litt, \\S2.3 (after Yokogawa, Proposition 3.7).}\n  Let $X$ be a smooth projective variety of dimension $n$ over an algebraically\n  closed field $k$, with dualizing sheaf $\\omega_X$. For every parabolic vector\n  bundle $E_\\star$ there is a canonical isomorphism\n  \\[\n    H^i(X, E_\\star) \\simeq H^{n-i}\\!\\left(X,\\ \\widehat{E^\\vee_\\star} \\otimes\n      \\omega_X(D)\\right)^{\\vee} .\n  \\]", "uses": ["def:parabolic-dual", "def:parabolic-tensor", "def:coparabolic-bundle", "lem:parabolic-dual-formula"], "lean_name": "LandesmanLitt.serreDuality", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:parabolic-dual, def:parabolic-tensor, def:coparabolic-bundle, lem:parabolic-dual-formula}\n  The general statement is \\cite[Proposition\n  3.7]{yokogawa:infinitesimal-deformation}, namely the natural isomorphism\n  \\[\n    \\mathrm{Ext}^i_X(E_\\star,\\ F_\\star \\otimes \\omega_X(D)) \\simeq\n      \\mathrm{Ext}^{n-i}_X(F_\\star,\\ \\widehat{E}_\\star)^{\\vee} .\n  \\]\n  Specializing $E_\\star = \\sO_X$ and using \\cite[Lemma\n  3.6]{yokogawa:infinitesimal-deformation} gives\n  \\[\n    H^i(X, F_\\star \\otimes \\omega_X(D)) \\simeq\n      H^{n-i}(X, F^\\vee_\\star \\otimes \\widehat{\\sO_X})^{\\vee} \\simeq\n      H^{n-i}(X, \\widehat{F^\\vee_\\star})^{\\vee} .\n  \\]\n  Finally, applying this with $E_\\star := F_\\star \\otimes \\omega_X(D)$, so that\n  $F^\\vee_\\star = E^\\vee_\\star \\otimes \\omega_X(D)$, yields\n  \\[\n    H^i(X, E_\\star) \\simeq H^{n-i}\\!\\left(X,\\ \\widehat{E^\\vee_\\star} \\otimes\n      \\omega_X(D)\\right)^{\\vee} . \\qedhere\n  \\]\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Parabolic.tex", "lean_file": "", "dep_count": 4, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 911, "effort_local": 911, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5404}, "def:flat-bundle": {"id": "def:flat-bundle", "type": "definition", "title": "Flat vector bundle with regular singularities", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.}\n  Let $D \\subset C$ be a reduced effective divisor. A \\emph{flat vector bundle on\n  $C$ with regular singularities along $D$} is a pair $(E,\\nabla)$ consisting of a\n  vector bundle $E$ on $C$ together with a logarithmic connection\n  \\[\n    \\nabla: E \\to E \\otimes \\Omega^1_C(\\log D),\n  \\]\n  i.e.\\ a $\\C$-linear map satisfying the Leibniz rule\n  $\\nabla(fs) = f\\,\\nabla(s) + s \\otimes df$ for $f \\in \\sO_C$ and $s \\in E$,\n  with logarithmic poles along $D$. On a curve every such connection is\n  automatically flat (integrable), the curvature lying in\n  $E \\otimes \\Omega^2_C(\\log D) = 0$. The poles being logarithmic encodes that\n  the singularities of $\\nabla$ along $D$ are regular.", "uses": [], "lean_name": "LandesmanLitt.FlatBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 25, "proof_size_tex": null, "effort_local": 723, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 723}, "def:atiyah": {"id": "def:atiyah", "type": "definition", "title": "The Atiyah bundle", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.1 (after [BHH, ``Very stable''], p. 5).}\n  Let $E$ be a vector bundle on $C$. The \\emph{Atiyah bundle}\n  $\\on{At}_C(E) \\subset \\on{Diff}^1(E,E)$ is the subsheaf whose sections over an\n  open $U \\subset C$ are those $\\C$-endomorphisms $\\tau \\in \\on{Diff}^1(E,E)(U)$\n  such that, for each $f \\in \\sO_C(U)$, the endomorphism\n  $\\tau_f: v \\mapsto \\tau(fv) - f\\tau(v)$ is multiplication by a section\n  $\\delta_\\tau(f) \\in \\sO_C(U)$. The assignment $f \\mapsto \\delta_\\tau(f)$ is a\n  derivation, giving the symbol map $\\delta$ below.", "uses": [], "lean_name": "LandesmanLitt.AtiyahBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": null, "effort_local": 563, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 563}, "def:atiyah-filtered": {"id": "def:atiyah-filtered", "type": "definition", "title": "Atiyah bundle of a filtered vector bundle", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.1.}\n  Let $P^\\bullet := (0 = P^0 \\subset P^1 \\subset \\cdots \\subset P^m = E)$ be a\n  filtration of $E$ by sub-bundles. The \\emph{Atiyah bundle of the filtered\n  bundle} $\\on{At}_C(E,P^\\bullet) \\subset \\on{At}_C(E)$ is the subsheaf of those\n  differential operators that preserve $P^\\bullet$.", "uses": ["def:atiyah"], "lean_name": "LandesmanLitt.AtiyahBundleFiltered", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 15, "proof_size_tex": null, "effort_local": 328, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 891}, "def:atiyah-bundle-divisor": {"id": "def:atiyah-bundle-divisor", "type": "definition", "title": "Atiyah bundle with respect to a divisor", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.1.}\n  Let $D \\subset C$ be a reduced effective divisor. The \\emph{Atiyah bundle with\n  respect to $D$} is the preimage\n  \\[\n    \\on{At}_{(C,D)}(E,P^\\bullet) := \\delta^{-1}\\bigl(T_C(-D)\\bigr),\n  \\]\n  where $\\delta$ is the symbol map of \\eqref{eq:atiyah-ses-nonlog} and\n  $T_C(-D) \\hookrightarrow T_C$ is the natural inclusion. It fits into the\n  logarithmic Atiyah exact sequence\n  \\begin{equation}\n    \n    0 \\to \\sheafend(E,P^\\bullet) \\to \\on{At}_{(C,D)}(E,P^\\bullet)\n    \\to T_C(-D) \\to 0.\n  \\end{equation}\n  When $P^\\bullet = (0 \\subset E)$ is trivial we omit it, writing\n  $\\on{At}_{(C,D)}(E)$.", "uses": ["def:atiyah-filtered"], "lean_name": "LandesmanLitt.AtiyahBundleDivisor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 14, "proof_size_tex": null, "effort_local": 635, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1526}, "prop:atiyah-splittings": {"id": "prop:atiyah-splittings", "type": "proposition", "title": "Splittings of the Atiyah sequence are connections", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.1.}\n  Let $E$ be a vector bundle on $C$ and $D \\subset C$ a reduced effective divisor.\n  There is a natural bijection between splittings of the Atiyah exact sequence\n  \\eqref{eq:atiyah-ses-log} and flat connections on $E$ with regular\n  singularities along $D$ preserving $P^\\bullet$. Concretely, a connection\n  $\\nabla: E \\to E \\otimes \\Omega^1_C(\\log D)$ preserving $P^\\bullet$ corresponds\n  by adjointness to a map $q^\\nabla: T_C(-D) \\to \\sheafend_{\\C}(E)$; this factors\n  through $\\on{At}_{(C,D)}(E,P^\\bullet)$ and is a section of $\\delta$, and every\n  section of $\\delta$ arises this way. We pass freely between $\\nabla$ and\n  $q^\\nabla$, calling each a connection.", "uses": ["def:atiyah-bundle-divisor", "def:flat-bundle"], "lean_name": "LandesmanLitt.atiyah_splittings", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:atiyah-bundle-divisor}\n  This is a matter of unwinding definitions. A splitting of\n  \\eqref{eq:atiyah-ses-log} is an $\\sO_C$-linear section\n  $q: T_C(-D) \\to \\on{At}_{(C,D)}(E,P^\\bullet)$ of the symbol $\\delta$; composing\n  with the inclusion $\\on{At}_{(C,D)}(E,P^\\bullet) \\subset \\on{Diff}^1(E,E)$ and\n  using the Leibniz identity $\\delta_\\tau(f) = $ symbol of $\\tau$ recovers a\n  logarithmic connection $\\nabla$ with $\\nabla$-derivative along a vector field\n  $\\theta \\in T_C(-D)$ equal to $q(\\theta)$. Conversely, adjointness turns\n  $\\nabla: E \\to E \\otimes \\Omega^1_C(\\log D)$ into\n  $q^\\nabla: T_C(-D) \\to \\sheafend_\\C(E)$ landing in\n  $\\on{At}_{(C,D)}(E,P^\\bullet)$ with $\\delta \\circ q^\\nabla = \\mathrm{id}$.\n  The two assignments are mutually inverse, and both respect the filtration\n  $P^\\bullet$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 10, "proof_size_tex": 817, "effort_local": 817, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3066}, "def:residue": {"id": "def:residue", "type": "definition", "title": "The residue homomorphism and the residue of a connection", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.2.1 (after [BHH, ``Parabolic''], (2.9)).}\n  Fix $x_j$ in the support of $D$. Comparing the fibre at $x_j$ of the\n  logarithmic Atiyah sequence \\eqref{eq:atiyah-ses-log} (for the trivial\n  filtration) with that of the non-logarithmic sequence\n  \\eqref{eq:atiyah-ses-nonlog}, the right-hand vertical map\n  $T_C(-D)_{x_j} \\to (T_C)_{x_j}$ vanishes (it is induced by the inclusion of\n  invertible sheaves $T_C(-D) \\hookrightarrow T_C$, which vanishes at $x_j$).\n  Hence the middle vertical map $\\alpha_j: \\on{At}_{(C,D)}(E)_{x_j} \\to\n  \\on{At}_C(E)_{x_j}$ factors through $\\sheafend(E)_{x_j}$, yielding the\n  \\emph{residue homomorphism}\n  \\[\n    \\phi_j: \\on{At}_{(C,D)}(E)_{x_j} \\to \\sheafend(E)_{x_j},\n  \\]\n  which restricts to the identity on $\\sheafend(E)_{x_j}$ and so produces a\n  splitting $\\on{At}_{(C,D)}(E)_{x_j} \\simeq \\sheafend(E)_{x_j} \\oplus\n  T_C(-D)_{x_j}$. Let $z$ be a uniformizer at $x_j$, so $z\\,\\partial/\\partial z$\n  is a canonical section of $T_C(-D)$ at $x_j$, independent of $z$. For a\n  connection $q^\\nabla: T_C(-D) \\to \\on{At}_{(C,D)}(E)$ with regular\n  singularities, the \\emph{residue} $\\on{Res}(\\nabla)(x_j) \\in \\sheafend(E)_{x_j}$\n  is the $\\sheafend(E)_{x_j}$-component of\n  $q^\\nabla_{x_j}(z\\,\\partial/\\partial z)$ under this splitting.", "uses": ["def:atiyah-bundle-divisor"], "lean_name": "LandesmanLitt.residue", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": null, "effort_local": 1302, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2828}, "def:parabolic-atiyah-bundle": {"id": "def:parabolic-atiyah-bundle", "type": "definition", "title": "Atiyah bundle of a parabolic bundle", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.2.}\n  Let $E_\\star = (E,\\{E^i_j\\},\\{\\alpha^i_j\\})$ be a parabolic bundle on $(C,D)$.\n  For each $j$ let $\\widehat{\\phi}_j: \\on{At}_{(C,D)}(E) \\to\n  \\sheafend(E)_{x_j}/\\on{End}_j(E_\\star)$ be the composition of restriction to\n  the fibre at $x_j$, the residue homomorphism $\\phi_j$, and the quotient map.\n  The \\emph{parabolic Atiyah bundle} is the coherent subsheaf\n  \\[\n    \\on{At}_{(C,D)}(E_\\star) := \\ker\\Bigl(\\on{At}_{(C,D)}(E)\n    \\xrightarrow{\\oplus_j \\widehat{\\phi}_j}\n    \\bigoplus_{j=1}^n \\sheafend(E)_{x_j}/\\on{End}_j(E_\\star)\\Bigr),\n  \\]\n  consisting of those differential operators preserving the quasiparabolic\n  filtration at each $x_j$. For a filtration $P^\\bullet$ of $E$ we write\n  $\\on{At}_{(C,D)}(E_\\star,P^\\bullet) \\subset \\on{At}_{(C,D)}(E_\\star)$ for the\n  subsheaf preserving $P^\\bullet$. It fits into a short exact sequence\n  \\begin{equation}\n    \n    0 \\to \\sheafend(E_\\star,P^\\bullet) \\to\n    \\on{At}_{(C,D)}(E_\\star,P^\\bullet) \\to T_C(-D) \\to 0,\n  \\end{equation}\n  and comparing $P^\\bullet$ with the trivial filtration gives\n  \\begin{equation}\n    \n    0 \\to \\on{At}_{(C,D)}(E_\\star,P^\\bullet) \\to \\on{At}_{(C,D)}(E_\\star)\n    \\to \\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet) \\to 0.\n  \\end{equation}", "uses": ["def:residue", "def:atiyah-bundle-divisor", "def:parabolic-bundle"], "lean_name": "LandesmanLitt.ParabolicAtiyahBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 8, "proof_size_tex": null, "effort_local": 1266, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4896}, "def:associated-parabolic": {"id": "def:associated-parabolic", "type": "definition", "title": "Parabolic bundle associated to a connection", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.3.}\n  Let $q^\\nabla: T_C(-D) \\to \\on{At}_{(C,D)}(E)$ be a connection with regular\n  singularities along $D$ and residue $\\on{Res}(\\nabla)(x_j)$ at each $x_j$\n  (\\cref{def:residue}). Let $\\eta^1_j,\\dots,\\eta^{s_j}_j$ be the eigenvalues of\n  $\\on{Res}(\\nabla)(x_j)$, and put\n  $\\lambda^i_j := \\on{Re}(\\eta^i_j) - \\lfloor \\on{Re}(\\eta^i_j)\\rfloor \\in [0,1)$;\n  after reordering and removing repetitions,\n  $0 \\le \\lambda^1_j < \\cdots < \\lambda^{n_j}_j < 1$. Define\n  $E^i_j \\subset E_{x_j}$ as the sum of all generalized eigenspaces of\n  $\\on{Res}(\\nabla)(x_j)$ whose eigenvalue has fractional real part\n  $\\ge \\lambda^i_j$. The data $(E,\\{E^i_j\\},\\{\\lambda^i_j\\})$ is the\n  \\emph{parabolic bundle $E_\\star$ associated to $\\nabla$}. By\n  \\cite[Lemma 4.1]{BHH:parabolic}, $q^\\nabla$ factors through\n  $\\on{At}_{(C,D)}(E_\\star) \\subset \\on{At}_{(C,D)}(E)$. If each\n  $\\on{Re}(\\eta^i_j) \\in [0,1)$, then $(E_\\star,\\nabla)$ is the\n  \\emph{Deligne canonical extension} of $(E,\\nabla)|_{C \\setminus D}$.", "uses": ["def:residue", "def:parabolic-bundle", "prop:atiyah-splittings"], "lean_name": "LandesmanLitt.associatedParabolic", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 9, "proof_size_tex": null, "effort_local": 1031, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6201}, "prop:irreducibility-splitting": {"id": "prop:irreducibility-splitting", "type": "proposition", "title": "Irreducibility forces the splitting condition", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.3.}\n  Let $(E,\\nabla)$ be a flat vector bundle on $C$ with regular singularities\n  along $D$, with associated parabolic bundle $E_\\star$\n  (\\cref{def:associated-parabolic}). Suppose the monodromy representation\n  $\\rho$ of $(E,\\nabla)|_{C \\setminus D}$ (via Riemann--Hilbert) is irreducible,\n  and let $q^\\nabla: T_C(-D) \\to \\on{At}_{(C,D)}(E_\\star)$ be the corresponding\n  splitting. Then for any nontrivial filtration $P^\\bullet$ of $E$, the\n  composition\n  \\[\n    T_C(-D) \\xrightarrow{q^\\nabla} \\on{At}_{(C,D)}(E_\\star)\n    \\to \\on{At}_{(C,D)}(E_\\star)/\\on{At}_{(C,D)}(E_\\star,P^\\bullet)\n    \\simeq \\sheafend(E_\\star)/\\sheafend(E_\\star,P^\\bullet)\n  \\]\n  is nonzero.", "uses": ["def:associated-parabolic", "prop:atiyah-splittings", "def:parabolic-atiyah-bundle"], "lean_name": "LandesmanLitt.irreducibility_splitting_condition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:atiyah-splittings, def:parabolic-atiyah-bundle}\n  Suppose the composition vanishes. Then $q^\\nabla$ has image in\n  $\\on{At}_{(C,D)}(E_\\star,P^\\bullet)$ and hence is a splitting of\n  \\eqref{eq:atiyah-ses-parabolic}. By \\cref{prop:atiyah-splittings} the\n  corresponding regular-singular connection on $E$ preserves $P^1$, so it\n  restricts to a flat connection on $P^1$ with regular singularities along $D$,\n  whose monodromy is a subrepresentation of $\\rho$. As $P^\\bullet$ is nontrivial\n  this is a proper nonzero subrepresentation, contradicting the irreducibility of\n  $\\rho$. (Compare \\cite[Proof of Proposition 5.3]{BHH:logarithmic} for the\n  non-parabolic case.)\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 678, "effort_local": 678, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8145}, "lem:iso-extension": {"id": "lem:iso-extension", "type": "lemma", "title": "Canonical extension of a flat bundle over the family", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.4.}\n  With notation as above, let $(E,\\nabla: E \\to E \\otimes \\Omega^1_C(\\log D))$ be\n  a flat vector bundle on $C$ with regular singularities along $D$. Then\n  $(E,\\nabla)$ extends canonically (uniquely up to unique isomorphism) to a flat\n  vector bundle\n  $(\\sE, \\widetilde{\\nabla}: \\sE \\to \\sE \\otimes \\Omega^1_{\\sC}(\\log \\mathscr{D}))$\n  on $\\sC$ with regular singularities along $\\mathscr{D}$, together with an\n  isomorphism $(\\sE,\\widetilde{\\nabla})|_C \\simeq (E,\\nabla)$.", "uses": ["def:flat-bundle"], "lean_name": "LandesmanLitt.iso_extension", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:flat-bundle}\n  This is due to Deligne \\cite{deligne:regular-singular}, with the family version\n  recorded in \\cite[Theorem 3.4]{Heu:universal-isomonodromic} after Malgrange\n  \\cite{malgrange:I, malgrange:II}. The restriction of $(E,\\nabla)$ to\n  $C \\setminus D$ is flat and so determines the local system\n  $\\mathbb{V} := \\ker(\\nabla)$ of $\\C$-vector spaces on $C \\setminus D$. Since\n  $\\Delta$ is contractible, the inclusion\n  $C \\setminus D \\hookrightarrow \\sC \\setminus \\mathscr{D}$ is a homotopy\n  equivalence, so $\\mathbb{V}$ extends uniquely (up to canonical isomorphism) to\n  a local system $\\widetilde{\\mathbb{V}}$ on $\\sC \\setminus \\mathscr{D}$. By\n  Manin's local extension result\n  \\cite[Proposition 5.4]{deligne:regular-singular}, the flat bundle\n  $(\\widetilde{\\mathbb{V}} \\otimes_\\C \\sO_{\\sC \\setminus \\mathscr{D}},\n  \\on{id} \\otimes d)$ admits a canonical extension\n  $(\\sE,\\widetilde{\\nabla})$ across $\\mathscr{D}$ with regular singularities,\n  unique up to unique isomorphism and restricting to $(E,\\nabla)$ on $C$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 1042, "effort_local": 1042, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1765}, "def:isomonodromy": {"id": "def:isomonodromy", "type": "definition", "title": "Isomonodromic deformation", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.4.}\n  Let $D = x_1 + \\cdots + x_n$, so $(C,D)$ is an $n$-pointed hyperbolic curve of\n  genus $g$, and let $(E,\\nabla)$ be a flat vector bundle on $C$ with regular\n  singularities at the $x_i$. The canonical extension $(\\sE,\\widetilde{\\nabla})$\n  of \\cref{lem:iso-extension} over the family $\\sC/\\Delta$ is the\n  \\emph{isomonodromic deformation} of $(E,\\nabla)$; it has constant monodromy in\n  the sense that all fibres carry the local system $\\widetilde{\\mathbb{V}}$. When\n  $\\Delta = \\mathscr{T}_{g,n}$ is the universal cover of the analytic stack\n  $\\mathscr{M}_{g,n}$ and $\\sC \\to \\Delta$ is the universal curve, it is the\n  \\emph{universal isomonodromic deformation}.", "uses": ["lem:iso-extension", "def:hyperbolic"], "lean_name": "LandesmanLitt.IsomonodromicDeformation", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Deformation.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": null, "effort_local": 708, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3099}, "def:nearby": {"id": "def:nearby", "type": "definition", "title": "Nearby curve", "chapter": "Atiyah bundles and isomonodromic deformations", "statement": "\\textit{Source: Landesman--Litt, \\S3.4.}\n  Take $\\Delta$ the universal cover of $\\mathscr{M}_{g,n}$. An \\emph{isomonodromic\n  deformation to a nearby curve} is the restriction of\n  $(\\sE,\\widetilde{\\nabla})$ to any fibre o
