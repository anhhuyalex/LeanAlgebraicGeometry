name = "mr4717077-canonical-representations-of-surface-groups"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MR4717077CanonicalRepresentationsOfSurfaceGroups"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"

[[lean_lib]]
name = "MR4717077CanonicalRepresentationsOfSurfaceGroups"
