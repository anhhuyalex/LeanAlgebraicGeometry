<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">

    <option value="lean">File view: Lean files</option>

  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:surface-group": {"id": "def:surface-group", "type": "definition", "title": "Surface group", "chapter": "Overview", "statement": "Fix non-negative integers $g, n$ with $\\Sigma_{g,n}$ hyperbolic, i.e.\\\n  $n \\geq 1$ if $g = 1$ and $n \\geq 3$ if $g = 0$.\n  The \\emph{surface group} $\\pi_1(\\Sigma_{g,n})$ is the fundamental group of\n  an orientable topological surface of genus $g$ with $n$ punctures.\n  For $n = 0$ it has the standard presentation\n  \\[\n    \\langle a_1, b_1, \\ldots, a_g, b_g \\mid\n      [a_1,b_1]\\cdots[a_g,b_g] = 1 \\rangle.\n  \\]\n  For $n \\geq 1$ the group $\\pi_1(\\Sigma_{g,n})$ is free on $2g + n - 1$\n  generators.", "uses": [], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.SurfaceGroup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 12, "proof_size_tex": null, "effort_local": 499, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 499}, "def:mapping-class-group": {"id": "def:mapping-class-group", "type": "definition", "title": "Mapping class group", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, §1.1 notation.}\n  The \\emph{mapping class group} $\\Mod_{g,n} = \\pi_0(\\mathrm{Homeo}^+(\\Sigma_{g,n}))$\n  is the group of isotopy classes of orientation-preserving homeomorphisms of\n  $\\Sigma_{g,n}$ fixing the set of punctures setwise.\n  It acts on $\\pi_1(\\Sigma_{g,n})$ via an outer action induced by the\n  homeomorphism action.\n  The \\emph{pure mapping class group}\n  $\\PMod_{g,n} = \\pi_1(\\mathcal{M}_{g,n})$\n  is the index-$n!$ subgroup of $\\Mod_{g,n}$ preserving each puncture\n  pointwise, where $\\mathcal{M}_{g,n}$ is the Deligne--Mumford moduli stack\n  of $n$-pointed genus-$g$ smooth proper curves.", "uses": [], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.MappingClassGroup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 12, "proof_size_tex": null, "effort_local": 636, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 636}, "def:mcg-finite": {"id": "def:mcg-finite", "type": "definition", "title": "MCG-finite representation", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Definition 1.1.1.}\n  For $g, n, r \\geq 0$, a representation\n  $\\rho\\colon \\pi_1(\\Sigma_{g,n}, x) \\to \\GL_r(\\mathbb{C})$ is\n  \\emph{MCG-finite} if its conjugacy class has finite orbit under the action\n  of $\\Mod_{g,n}$ on conjugacy classes of representations.", "uses": ["def:surface-group", "def:mapping-class-group"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.MCGFinite", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": null, "effort_local": 291, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1426}, "lem:birman-exact-sequence": {"id": "lem:birman-exact-sequence", "type": "lemma", "title": "Birman exact sequence", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Lemma 2.0.1.}\n  For basepoints $m \\in \\mathcal{M}_{g,n}$ and $m' \\in \\mathcal{M}_{g,n+1}$\n  lifting $m$, there are isomorphisms\n  $\\pi_1(\\mathcal{M}_{g,n+1}, m') \\cong \\PMod_{g,n+1}$ and\n  $\\pi_1(\\mathcal{M}_{g,n}, m) \\cong \\PMod_{g,n}$\n  fitting into the Birman exact sequence\n  \\[\n    1 \\to \\pi_1(\\Sigma_{g,n}) \\to \\PMod_{g,n+1} \\to \\PMod_{g,n} \\to 1,\n  \\]\n  where the inclusion $\\pi_1(\\Sigma_{g,n}) \\hookrightarrow \\PMod_{g,n+1}$\n  is the point-pushing subgroup.", "uses": ["def:mapping-class-group", "def:surface-group"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.BirmanExactSequence", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:mapping-class-group, def:surface-group}\n  \n  This follows from the contractibility of the universal cover of\n  $\\mathcal{M}_{g,n}$ and the fact that $\\mathcal{M}_{g,n}$ is the quotient\n  of its universal cover by the properly discontinuous action of $\\PMod_{g,n}$;\n  see Farb--Margalit \\S10.6.3 and p.~353.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 316, "effort_local": 316, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1451}, "prop:mcg-finite-basic": {"id": "prop:mcg-finite-basic", "type": "proposition", "title": "Basic properties of MCG-finite representations", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Proposition 2.1.1.}\n  The direct sum and tensor product of two MCG-finite representations of\n  $\\pi_1(\\Sigma_{g,n})$ is MCG-finite.\n  Any semisimple subquotient of an MCG-finite representation is MCG-finite.", "uses": ["def:mcg-finite"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.mcgFinite_directSum", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:mcg-finite}\n  \n  The claim about direct sums and tensor products is clear from the definition.\n  The claim about semisimple subquotients follows since the stabilizer of any\n  irreducible subquotient has finite index in the stabilizer of the original\n  representation (Lawrence, Lemma 2.2.1).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 301, "effort_local": 301, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1727}, "prop:mcg-finite-family": {"id": "prop:mcg-finite-family", "type": "proposition", "title": "MCG-finite from family of curves", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Proposition 2.1.3.}\n  Let $\\pi^\\circ\\colon \\mathcal{C}^\\circ \\to \\mathcal{M}$ be a punctured versal\n  family of $n$-pointed genus-$g$ curves, i.e.\\ the map\n  $\\mathcal{M} \\to \\mathcal{M}_{g,n}$ is dominant \\'{e}tale.\n  If $\\mathbb{V}$ is a local system on $\\mathcal{C}^\\circ$ and $C^\\circ$ is any\n  fiber of $\\pi^\\circ$, then $\\mathbb{V}|_{C^\\circ}$ is MCG-finite.", "uses": ["def:mcg-finite", "def:mapping-class-group", "lem:birman-exact-sequence"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.mcgFinite_of_localSystem", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:mcg-finite, lem:birman-exact-sequence}\n  The fibration sequence for $\\mathcal{C}^\\circ \\to \\mathcal{M}$ induces an\n  outer action of $\\pi_1(\\mathcal{M})$ on $\\pi_1(C^\\circ)$, which factors\n  through the outer action of $\\PMod_{g,n}$ on $\\pi_1(C^\\circ)$ from the\n  Birman exact sequence (\\cref{lem:birman-exact-sequence}).\n  Since $\\mathcal{M} \\to \\mathcal{M}_{g,n}$ is dominant \\'{e}tale, the image\n  of $\\pi_1(\\mathcal{M}) \\to \\PMod_{g,n}$ has finite index.\n  Any element of $\\pi_1(\\mathcal{C}^\\circ)$ above such a class conjugates the\n  restriction, preserving its conjugacy class; hence the stabilizer of the\n  conjugacy class of $\\mathbb{V}|_{C^\\circ}$ has finite index in $\\Mod_{g,n}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 700, "effort_local": 700, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2442}, "thm:period-map": {"id": "thm:period-map", "type": "theorem", "title": "Period map derivative", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 5.1.6 (proved in Appendix~A).}\n  Let $C$ be a smooth projective curve with boundary divisor $D$, and let\n  $E$ be the Mehta--Seshadri vector bundle on $C$ associated to a unitary\n  local system on $C \\setminus D$.\n  The derivative of the period map associated to the mixed Hodge structure on\n  $R^1\\pi^\\circ_* \\mathbb{V}$ is identified with the natural multiplication map\n  \\[\n    H^0(E \\otimes \\omega_C(D)) \\otimes H^0(E^\\vee \\otimes \\omega_C)\n    \\xrightarrow{\\otimes}\n    H^0(E \\otimes E^\\vee \\otimes \\omega_C^{\\otimes 2}(D))\n    \\xrightarrow{\\mathrm{tr}}\n    H^0(\\omega_C^{\\otimes 2}(D)),\n  \\]\n  where $\\mathrm{tr}$ is induced by the trace pairing\n  $E \\otimes E^\\vee \\to \\mathcal{O}_C$.\n  (Introduced as an axiom pending Hodge theory infrastructure in Mathlib.)", "uses": [], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.periodMap_derivative", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved in Appendix~A of Landesman--Litt (arXiv:2205.15352) via an explicit\n  computation of the Kodaira--Spencer class and its interaction with the\n  Mehta--Seshadri correspondence.  Introduced as an axiom in the Lean\n  formalization, as the required mixed Hodge theory is not yet available in\n  Mathlib.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 304, "effort_local": 304, "proof_size_tex_total": 304, "proof_size_lean_total": null, "effort_total": 304}, "thm:rank-bound-subsystem": {"id": "thm:rank-bound-subsystem", "type": "theorem", "title": "Cohomological rank bound", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 1.7.1.}\n  Let $\\pi\\colon \\mathcal{C} \\to \\mathcal{M}$ be a smooth proper family of\n  $n$-pointed genus-$g$ curves with geometrically connected fibers such that\n  $\\mathcal{M} \\to \\mathcal{M}_{g,n}$ is dominant \\'{e}tale.\n  Let $\\mathbb{V}$ be a unitary local system on the associated family of\n  punctured curves $\\mathcal{C}^\\circ$.\n  Then any nonzero sub-local system of $R^1\\pi^\\circ_* \\mathbb{V}$ has rank\n  at least $2g - 2\\rk \\mathbb{V}$.\n  In particular, $H^0(\\mathcal{M},\\, R^1\\pi^\\circ_* \\mathbb{V}) = 0$ whenever\n  $g > \\rk \\mathbb{V}$.", "uses": ["thm:period-map"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.rankBound_subsystem", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:period-map}\n  A sub-local system of $R^1\\pi^\\circ_* \\mathbb{V}$ of rank below\n  $2g - 2\\rk\\mathbb{V}$ would, by the theorem of the fixed part, force the\n  derivative of the period map to have a kernel.\n  By \\cref{thm:period-map}, that derivative is a multiplication map on\n  global sections of $E \\otimes \\omega_C(D)$ versus $E^\\vee \\otimes \\omega_C$;\n  its non-degeneracy is ruled out by Clifford-type vector bundle arguments\n  applied to the pairing $B_E$ (Landesman--Litt [LL22], \\S6).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": 498, "effort_local": 498, "proof_size_tex_total": 802, "proof_size_lean_total": null, "effort_total": 802}, "lem:tensor-product-unitary": {"id": "lem:tensor-product-unitary", "type": "lemma", "title": "Tensor product decomposition for unitary local systems", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Lemma 2.4.2.}\n  Let $\\mathbb{V}$ be a local system on $\\mathcal{C}^\\circ$ whose restriction\n  to a fiber $C^\\circ$ is unitary.\n  After replacing $\\mathcal{M}$ by a dominant \\'{e}tale cover $\\mathcal{M}'$,\n  there is a decomposition\n  \\[\n    \\mathbb{V}|_{\\mathcal{C}'^\\circ}\n    \\cong \\bigoplus_{i=1}^s \\mathbb{U}_i \\otimes (\\pi'^\\circ)^* \\mathbb{W}_i,\n  \\]\n  where each $\\mathbb{U}_i$ is an irreducible unitary local system on\n  $\\mathcal{C}'^\\circ$ and each $\\mathbb{W}_i$ is a local system on\n  $\\mathcal{M}'$.", "uses": ["def:mcg-finite"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.tensorDecomp_unitary", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:mcg-finite, prop:mcg-finite-basic, prop:mcg-finite-family}\n  Decompose the unitary fibral monodromy as a direct sum of irreducibles\n  $\\mathbb{V}_0 \\cong \\bigoplus_i \\mathbb{S}_i^{n_i}$.\n  Each $\\mathbb{S}_i$ is MCG-finite by \\cref{prop:mcg-finite-basic,prop:mcg-finite-family};\n  lift each to a unitary local system $\\mathbb{U}_i$ on a suitable finite\n  \\'{e}tale cover.\n  Set $\\mathbb{W}_i = \\pi'^\\circ_* \\mathrm{Hom}(\\mathbb{U}_i, \\mathbb{V})$;\n  the evaluation map $\\bigoplus_i (\\pi'^\\circ)^* \\mathbb{W}_i \\otimes \\mathbb{U}_i\n  \\to \\mathbb{V}$ is an isomorphism fiberwise by Schur's lemma.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 604, "effort_local": 604, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2030}, "thm:cohomological-vanishing": {"id": "thm:cohomological-vanishing", "type": "theorem", "title": "Cohomological vanishing", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 6.2.1.}\n  Let $\\pi^\\circ\\colon \\mathcal{C}^\\circ \\to \\mathcal{M}$ be a punctured versal\n  family of genus-$g$ curves.\n  Let $\\mathbb{V}$ be a local system on $\\mathcal{C}^\\circ$ whose restriction\n  to a fiber $C^\\circ$ is unitary, with $\\rk \\mathbb{V} < g$.\n  Then $H^0(\\mathcal{M},\\, R^1\\pi^\\circ_* \\mathbb{V}) = 0$.\n  In particular, $R^1\\pi^\\circ_* \\mathbb{V}$ has no nonzero unitary\n  sub-local systems.", "uses": ["thm:rank-bound-subsystem", "lem:tensor-product-unitary"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.cohomologicalVanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:rank-bound-subsystem, lem:tensor-product-unitary}\n  By \\cref{lem:tensor-product-unitary}, after a dominant \\'{e}tale base change\n  write $\\mathbb{V} \\cong \\bigoplus_i \\mathbb{U}_i \\otimes (\\pi^\\circ)^* \\mathbb{W}_i$\n  with $\\mathbb{U}_i$ unitary.\n  A nonzero global section of $R^1\\pi^\\circ_*(\\mathbb{U}_i \\otimes (\\pi^\\circ)^* \\mathbb{W}_i)\n  = (R^1\\pi^\\circ_* \\mathbb{U}_i) \\otimes \\mathbb{W}_i$ yields a nonzero map\n  $\\mathbb{W}_i^\\vee \\to R^1\\pi^\\circ_* \\mathbb{U}_i$, i.e.\\ a sub-local system\n  of rank $\\rk\\mathbb{W}_i$.\n  Since $\\mathbb{U}_i$ is unitary, \\cref{thm:rank-bound-subsystem} gives\n  $\\rk\\mathbb{W}_i \\geq 2g - 2\\rk\\mathbb{U}_i$, so\n  $\\rk\\mathbb{V} \\geq \\rk\\mathbb{U}_i \\cdot \\rk\\mathbb{W}_i \\geq g$,\n  contradicting $\\rk\\mathbb{V} < g$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 767, "effort_local": 767, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3599}, "thm:cohomologically-rigid-integral": {"id": "thm:cohomologically-rigid-integral", "type": "theorem", "title": "Cohomologically rigid implies integral", "chapter": "Overview", "statement": "An irreducible cohomologically rigid local system on a smooth complex variety\n  with quasi-unipotent local monodromy around boundary components of a good\n  compactification is defined over the ring of integers $\\mathcal{O}_K$ of some\n  number field $K$.\n  (Axiom: main result of Esnault--Groechenig \\cite{esnault2018cohomologically}\n  and Klevdal--Patrikis \\cite{klevdalP:g-rigid-local-systems-are-integral};\n  not yet available in Mathlib.)", "uses": [], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.cohomRigid_isIntegral", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved by Esnault--Groechenig (arXiv:1711.06427) and, in the generality\n  needed here, by Klevdal--Patrikis.  The argument combines $p$-adic Hodge\n  theory and de Rham cohomology to extract an integral structure from\n  cohomological rigidity.  Introduced as an axiom in the Lean formalization;\n  the relevant $p$-adic Hodge theory infrastructure is not yet in Mathlib.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 8, "proof_size_tex": 368, "effort_local": 368, "proof_size_tex_total": 368, "proof_size_lean_total": null, "effort_total": 368}, "lem:isomonodromy-rigidity": {"id": "lem:isomonodromy-rigidity", "type": "proposition", "title": "Isomonodromy rigidity", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Proposition 8.2.1.}\n  Let $\\mathbb{V}$ be an irreducible $\\GL_r$-local system on $\\mathcal{C}^\\circ$\n  with $r < \\sqrt{g+1}$, whose restriction to a fiber $C^\\circ$ is unitary.\n  Then $\\mathbb{V}$ is strongly cohomologically rigid; in particular, it is\n  cohomologically rigid and its isomonodromic deformations are algebraic.", "uses": ["thm:cohomologically-rigid-integral"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.isomonodromy_rigidity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:cohomological-vanishing, thm:cohomologically-rigid-integral}\n  Strong cohomological rigidity requires $H^1(\\mathcal{C}^\\circ, \\mathrm{ad}\\,\\mathbb{V}) = 0$.\n  By the Leray spectral sequence, it suffices to show\n  $H^0(\\mathcal{M}, R^1\\pi^\\circ_* \\mathrm{ad}\\,\\mathbb{V}) = 0$ and\n  $H^1(\\mathcal{M}, \\pi^\\circ_* \\mathrm{ad}\\,\\mathbb{V}) = 0$.\n  The first vanishes by \\cref{thm:cohomological-vanishing} since\n  $\\rk(\\mathrm{ad}\\,\\mathbb{V}) = r^2-1 < g$ (because $r < \\sqrt{g+1}$) and\n  $\\mathrm{ad}\\,\\mathbb{V}|_{C^\\circ}$ is unitary.\n  The second vanishes by Schur's lemma since $\\mathbb{V}|_{C^\\circ}$ is\n  irreducible.\n  By \\cref{thm:cohomologically-rigid-integral}, the cohomological rigidity\n  implies $\\mathbb{V}$ is defined over $\\mathcal{O}_K$, so isomonodromic\n  deformations are algebraic.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 809, "effort_local": 809, "proof_size_tex_total": 1177, "proof_size_lean_total": null, "effort_total": 1177}, "thm:nah-unitarity": {"id": "thm:nah-unitarity", "type": "theorem", "title": "Non-abelian Hodge unitarity", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt [LL22], Theorem 1.2.12 (cited in MR4717077, §§1.9.1–1.9.2).}\n  Let $\\mathbb{V}$ be a semisimple, cohomologically rigid local system of rank\n  $r < \\sqrt{g+1}$ on a curve $C^\\circ$ that underlies a complex polarizable\n  variation of Hodge structure (i.e.\\ is defined over $\\mathcal{O}_K$ and each\n  Galois conjugate is a VHS).\n  Then $\\mathbb{V}$ is unitary: its monodromy representation factors through\n  the unitary group $U(r)$.\n  (Axiom: relies on non-abelian Hodge theory developed in [LL22]; not yet\n  available in Mathlib.)", "uses": ["thm:cohomologically-rigid-integral"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.nah_unitarity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved in Landesman--Litt (arXiv:2202.05190), Theorem 1.2.12, using the\n  Corlette--Simpson correspondence and the assumption that the local system is\n  defined over a number ring with all Galois conjugates giving VHS.\n  Since every complex polarizable VHS of rank $r < \\sqrt{g+1}$ on a curve has\n  unitary monodromy, the integrality from \\cref{thm:cohomologically-rigid-integral}\n  combined with the VHS property forces unitarity.\n  Introduced as an axiom here pending formalization of non-abelian Hodge theory.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 512, "effort_local": 512, "proof_size_tex_total": 880, "proof_size_lean_total": null, "effort_total": 880}, "prop:unitary-case": {"id": "prop:unitary-case", "type": "proposition", "title": "Unitary case", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Proposition 8.4.1.}\n  Let $\\rho\\colon \\pi_1(\\Sigma_{g,n}) \\to \\GL_r(\\mathbb{C})$ be a unitary\n  MCG-finite representation with $r < \\sqrt{g+1}$.\n  Then $\\rho$ has finite image.", "uses": ["thm:cohomologically-rigid-integral", "thm:cohomological-vanishing", "thm:nah-unitarity"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.finiteImage_unitary", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:isomonodromy-rigidity, thm:cohomologically-rigid-integral, prop:mcg-finite-basic, thm:nah-unitarity}\n  By \\cref{prop:mcg-finite-basic} it suffices to treat the irreducible case.\n  By \\cref{lem:isomonodromy-rigidity}, $\\rho$ is cohomologically rigid.\n  By \\cref{thm:cohomologically-rigid-integral} (Klevdal--Patrikis), $\\rho$ is\n  defined over $\\mathcal{O}_K$ for some number field $K$.\n  For each embedding $\\tau\\colon \\mathcal{O}_K \\hookrightarrow \\mathbb{C}$,\n  the twist $\\rho_\\tau = \\rho \\otimes_{\\mathcal{O}_K,\\tau} \\mathbb{C}$ is also\n  cohomologically rigid, irreducible, and MCG-finite; by\n  \\cref{thm:nah-unitarity} each $\\rho_\\tau$ is unitary.\n  Since $\\rho$ takes values in $\\GL_r(\\mathcal{O}_K)$ with every embedding\n  giving a unitary representation, compactness of $U(r)$ and discreteness of\n  $\\mathcal{O}_K$ give finite image.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 852, "effort_local": 852, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5331}, "thm:semisimple-case": {"id": "thm:semisimple-case", "type": "theorem", "title": "Semisimple case", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 8.5.3.}\n  Let $\\rho\\colon \\pi_1(\\Sigma_{g,n}) \\to \\GL_r(\\mathbb{C})$ be a semisimple\n  MCG-finite representation with $r < \\sqrt{g+1}$.\n  Then $\\rho$ has finite image.", "uses": ["thm:cohomological-vanishing", "prop:unitary-case", "lem:isomonodromy-rigidity", "prop:mcg-finite-basic", "prop:mcg-finite-family", "thm:nah-unitarity"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.finiteImage_semisimple", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:mcg-finite-basic, prop:mcg-finite-family, prop:unitary-case, thm:cohomological-vanishing}\n  By \\cref{prop:mcg-finite-basic} it suffices to treat the irreducible case.\n  Lift $\\rho$ to a local system $\\mathbb{V}$ on a punctured versal family\n  $\\pi^\\circ\\colon \\mathcal{C}^\\circ \\to \\mathcal{M}$ (converse of\n  \\cref{prop:mcg-finite-family}).\n  By non-abelian Hodge theory, deform $\\mathbb{V}$ (with constant determinant)\n  to $\\mathbb{V}_0$ underlying a complex polarizable variation of Hodge\n  structure.\n  Since $r < 2\\sqrt{g+1}$, Landesman--Litt [LL22] Theorem~1.2.12 gives that\n  $\\mathbb{V}_0|_{C^\\circ}$ is unitary; it is MCG-finite by\n  \\cref{prop:mcg-finite-family}; hence by \\cref{prop:unitary-case} it has\n  finite image.\n  Finally, $\\mathbb{V}|_{C^\\circ} = \\mathbb{V}_0|_{C^\\circ}$: the unitary\n  fibral monodromy of $\\mathbb{V}_0$ admits no nontrivial MCG-finite\n  deformations by \\cref{thm:cohomological-vanishing} (applied as in\n  Lemma~8.3.2 of the paper), so the deformation was trivial on fibers.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 6, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1024, "effort_local": 1024, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8481}, "thm:putman-wieland-asymptotic": {"id": "thm:putman-wieland-asymptotic", "type": "theorem", "title": "Asymptotic Putman--Wieland", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 7.2.1.}\n  Let $\\Sigma_{g'} \\to \\Sigma_g$ be a finite Galois $H$-cover, $\\rho$ an\n  irreducible complex $H$-representation, and $\\Gamma \\subset \\PMod_{g,n+1}$\n  the finite-index subgroup preserving the cover up to conjugacy.\n  The $\\rho$-isotypic component $H_1(\\Sigma_{g'}, \\mathbb{C})^\\rho$ has no\n  nonzero $\\Gamma$-stable subrepresentation of dimension strictly less than\n  $2g - 2\\dim\\rho$.", "uses": ["thm:rank-bound-subsystem"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.putmanWieland_asymptotic", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:rank-bound-subsystem, lem:tensor-product-unitary}\n  The $H$-cover produces finite-monodromy (hence unitary) local systems\n  $\\mathbb{U}_\\rho$ on $\\mathcal{C}^\\circ$ with monodromy given by the\n  irreducible representations of $H$.\n  After passing to a finite \\'{e}tale cover to trivialize $\\mathbb{W}_\\rho$\n  (via \\cref{lem:tensor-product-unitary}), a $\\Gamma$-stable subspace of\n  $H_1(\\Sigma_{g'})^\\rho$ of dimension less than $2g - 2\\dim\\rho$ would yield\n  a sub-local system of $R^1\\pi^\\circ_* \\mathbb{U}_\\rho$ of rank below\n  $2g - 2\\rk\\mathbb{U}_\\rho$, contradicting \\cref{thm:rank-bound-subsystem}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 615, "effort_local": 615, "proof_size_tex_total": 1417, "proof_size_lean_total": null, "effort_total": 1417}, "cor:putman-wieland-small-H": {"id": "cor:putman-wieland-small-H", "type": "corollary", "title": "Putman--Wieland for small $|H|$", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Corollary 7.2.4.}\n  For $g \\geq 2$, $n \\geq 0$, and any finite group $H$ with $\\#H < g^2$, the\n  Putman--Wieland conjecture for $(g, n, H)$ holds: every nonzero vector in\n  $H_1(\\Sigma_{g'}, \\mathbb{C})$ (for any finite $H$-cover\n  $\\Sigma_{g'} \\to \\Sigma_g$) has infinite orbit under $\\Gamma$.", "uses": ["thm:putman-wieland-asymptotic"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.putmanWieland_smallH", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:putman-wieland-asymptotic}\n  Since $\\#H < g^2$ and $\\#H$ equals the sum of squares of dimensions of\n  irreducible representations of $H$, every irreducible $\\rho$ of $H$\n  satisfies $\\dim\\rho < g$.\n  Apply \\cref{thm:putman-wieland-asymptotic}: any $\\Gamma$-stable subspace of\n  $H_1(\\Sigma_{g'})^\\rho$ has dimension at least $2g - 2\\dim\\rho > 0$, so\n  no nonzero invariant vector exists.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 397, "effort_local": 397, "proof_size_tex_total": 1814, "proof_size_lean_total": null, "effort_total": 1814}, "lem:semisimplicity": {"id": "lem:semisimplicity", "type": "lemma", "title": "Semisimplicity of low-rank MCG-finite representations", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Lemma 8.6.1.}\n  Let $\\rho$ be an MCG-finite representation of $\\pi_1(\\Sigma_{g,n})$ with\n  $\\rk\\rho < \\sqrt{g+1}$.\n  Let $\\rho_1 \\subset \\rho$ be a semisimple characteristic subrepresentation,\n  $\\rho_2 = \\rho/\\rho_1$ semisimple, with $\\rho_1, \\rho_2$ both of finite\n  image.\n  Then $\\rho$ has finite image, i.e.\\ the extension of $\\rho_2$ by $\\rho_1$\n  splits.\n  In particular, every MCG-finite representation of $\\pi_1(\\Sigma_{g,n})$\n  with $\\rk < \\sqrt{g+1}$ is semisimple.", "uses": ["thm:putman-wieland-asymptotic"], "lean_name": "MR4717077CanonicalRepresentationsOfSurfaceGroups.mcgFinite_isSemisimple", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:putman-wieland-asymptotic}\n  Pass to a finite Galois cover $\\Sigma_{g',n'} \\to \\Sigma_{g,n}$ (Galois\n  group $H$) trivializing $\\rho_1$ and $\\rho_2$.\n  The extension class lies in\n  $\\Ext^1_{\\pi_1(\\Sigma_{g',n'})}(\\rho_2, \\rho_1)\n  = \\mathrm{Hom}(\\pi_1(\\Sigma_{g',n'}), \\mathrm{Hom}(\\rho_2,\\rho_1))$,\n  which factors through $H_1(\\Sigma_{g',n'})$.\n  Decompose $\\rho_2^\\vee \\otimes \\rho_1 = \\bigoplus_i \\sigma_i^{n_i}$\n  irreducibly; since $\\rk\\rho < \\sqrt{g+1}$, the AM-GM inequality gives\n  $n_i \\dim\\sigma_i < (g+1)/4$, so $\\dim\\sigma_i < g$.\n  The projection of the extension class onto the $\\sigma_i$-isotypic part of\n  $H_1(\\Sigma_{g',n'})$ gives a $\\Gamma$-stable subspace of rank at most\n  $(g+1)/4$.\n  But \\cref{thm:putman-wieland-asymptotic} shows any nonzero such subspace has\n  rank at least $2g - 2\\dim\\sigma_i > (g+1)/4$, so each projection is zero\n  and $\\rho$ has finite image.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 902, "effort_local": 902, "proof_size_tex_total": 2319, "proof_size_lean_total": null, "effort_total": 2319}, "thm:finite-image": {"id": "thm:finite-image", "type": "theorem", "title": "Finite image of MCG-finite representations", "chapter": "Overview", "statement": "\\textit{Source: Landesman--Litt, Theorem 1.2.1.}\n  For $g, n, r \\geq 0$, let\n  $\\rho\\colon \\pi_1(\\Sigma_{g,n}) \\to \\GL_r(\\mathbb{C})$ be a MCG-finite\n  representation.\n  If $r < \\sqrt{g+1}$, then $\\rho$ has finite ima // ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};
for (const id in allNodes) { succ[id] = []; pred[id] = []; deg[id] = 0; }

  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;

  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

}

  const sorry  = vals.filter(n => n.has_sorry).length;

  for (const n of vals) {

// a human label for each component: its highest-degree member
function compRepr(members) {
  let best = members[0];
  for (const id of members) if ((deg[id] || 0) > (deg[best] || 0)) best = id;
  return best.split(":").pop();
}

// ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,
                nodeset: "union", fileview: "off" };

// Which universe a node belongs to. A node "has Lean" if it carries Lean source
// (lean_aux nodes always do; blueprint nodes do once their \lean{} resolved).
const hasLean    = n => n.type === "lean_aux" || !!(n.lean_source && n.lean_source.length);
const inBlueprint = n => n.type !== "lean_aux";
function inNodeset(id) {
  const n = allNodes[id];
  if (state.nodeset === "blueprint") return inBlueprint(n);
  if (state.nodeset === "lean")      return hasLean(n);
  return true;                                   // union
}

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

// all transitive predecessors of id (its full upstream dependency set)
function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

function visibleSet() {
  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));
  }
  let ids = Object.keys(allNodes).filter(inNodeset);
  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

const nodesDS = new vis.DataSet();

const N_TOTAL = graphData.nodes.length;
const PHYSICS_OPTS = {

// ── Isolated-node layout ──────────────────────────────────────────────────────
// Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

const fileOf = (n, mode) => mode === "lean" ? (n.lean_file || "") : (n.tex_file || "");

// A curated, perceptually-distinct palette (d3 category20-style). A file's
// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],

function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;

const _SLOTS = FILE_PALETTE.length * 3;          // 20 hues × 3 lightness tiers
function slotColor(slot) {
  const base = FILE_PALETTE[slot % FILE_PALETTE.length];
  const tier = Math.floor(slot / FILE_PALETTE.length) % 3;   // 0 normal · 1 dark · 2 light
  return tier === 1 ? base.map(v => Math.round(v * 0.68))
       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))
       : base.slice();
}
// Per-mode slot assignment: each file's preferred slot is its name-hash; exact
// collisions within the same mode are bumped to the next free slot. So every
// file in a mode gets a distinct colour (up to _SLOTS files), the colour is
// driven by the name, and it never shifts under focus/reset/filtering (the file
// set is fixed for the session, and the map is cached).
const _fileSlots = {};
function ensureFileSlots(mode) {
  if (_fileSlots[mode]) return _fileSlots[mode];
  const files = Object.keys(fileCounts(mode)).sort();
  const used = new Set(), map = {};
  for (const f of files) {
    let slot = hashStr(f) % _SLOTS, t = 0;
    while (used.has(slot) && t < _SLOTS) { slot = (slot + 1) % _SLOTS; t++; }
    used.add(slot); map[f] = slot;
  }

}

  const slot = (file in map) ? map[file] : hashStr(file) % _SLOTS;

}

function fileCounts(mode) {

  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
  const sc  = network.getScale();
  if (e.ctrlKey) {
    const f        = e.deltaY > 0 ? 0.9 : 1 / 0.9;
    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, sc * f));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    let nx = pos.x + e.deltaX / sc;
    let ny = pos.y + e.deltaY / sc;
    if (graphBounds) {
      nx = Math.max(graphBounds.left, Math.min(graphBounds.right,  nx));
      ny = Math.max(graphBounds.top,  Math.min(graphBounds.bottom, ny));
    }
    network.moveTo({ position: { x: nx, y: ny }, animation: false });
  }
}, { capture: true, passive: false });

// ── Apply current filter state to the canvas ────────────────────────────────

function apply() {
  const vis   = visibleSet();
  const nodes = graphData.nodes.filter(n => vis.has(n.id));
  const edges = graphData.edges.filter(e => vis.has(e.from) && vis.has(e.to));

  nodesDS.clear(); edgesDS.clear();
  nodesDS.add(nodes); edgesDS.add(edges);

  $("stat").innerHTML =
    `${nodes.length} / ${graphData.nodes.length} nodes &middot; ${edges.length} edges`;

  const pill = $("focus-pill");
  if (state.focus) {
    pill.style.display = "inline-flex";
    pill.querySelector(".lbl").textContent = "focus: " + state.focus.split(":").pop();
  } else {
    pill.style.display = "none";
  }

  // Re-settle the now-visible subset; the stabilization handler freezes and
  // fits when it finishes. With nothing to simulate (a lone node, or only
  // isolated nodes — which are physics:false) we lay out and fit directly.
  const anyPhysics = nodes.some(n => n.physics !== false);
  if (nodes.length > 1 && anyPhysics) {
    network.setOptions({ physics: PHYSICS_OPTS });
  } else {
    setTimeout(() => { layoutOrphans(); fitFloored(); }, 0);
  }
}

function syncControls() {
  $("orphans").checked  = state.showOrphans;
  $("nodeset").value    = state.nodeset;
  $("fileview").value   = state.fileview;
  $("component").value  = state.component === null ? "" : String(state.component);
  $("chapter").value    = state.chapter || "";
}

// ── Reveal-aware navigation ─────────────────────────────────────────────────

function goTo(id) {
  if (!allNodes[id]) return;
  if (!visibleSet().has(id)) {            // relax filters until the node is shown
    state.focus = null;
    state.component = null;
    state.chapter = null;
    if (!inNodeset(id)) state.nodeset = "union";
    if (isOrphan(id)) state.showOrphans = true;
    syncControls();
    apply();
  }
  setTimeout(() => jumpTo(id), 70);
}

function jumpTo(id) {
  if (!allNodes[id]) return;
  network.selectNodes([id]);
  network.focus(id, { scale: 1.2, animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  renderNode(id);
  highlightCone(id);
}

function setFocus(id) {
  if (!allNodes[id]) return;
  state.focus = id;
  apply();
  renderNode(id);
  setTimeout(() => jumpTo(id), 70);
}

function clearFocus() { state.focus = null; apply(); }

function resetView() {
  state.showOrphans = false;
  state.focus = null;
  state.component = null;
  state.chapter = null;
  state.nodeset = "union";
  $("search").value = "";
  syncControls();
  apply();
}

// ── Control wiring ──────────────────────────────────────────────────────────

$("orphans").addEventListener("change", e => {
  state.showOrphans = e.target.checked; state.focus = null; apply();
});
$("nodeset").addEventListener("change", e => {
  state.nodeset = e.target.value; state.focus = null; apply();
});
$("component").addEventListener("change", e => {
  state.component = e.target.value === "" ? null : Number(e.target.value);
  state.focus = null; apply();
});
$("chapter").addEventListener("change", e => {
  state.chapter = e.target.value || null; state.focus = null; apply();
});
$("fileview").addEventListener("change", e => {
  state.fileview = e.target.value; rebuildFileBg();
});
$("search").addEventListener("change", e => {
  const v = e.target.value.trim();
  if (allNodes[v]) goTo(v);
});
$("reset").addEventListener("click", resetView);
$("focus-pill").addEventListener("click", clearFocus);

// ── Lean syntax highlighter ─────────────────────────────────────────────────

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _KW      = /\b(def|lemma|theorem|instance|class|structure|inductive|abbrev|noncomputable|private|protected|section|namespace|end|open|variable|where|do|let|have|show|suffices|calc|if|then|else|return|for|in|fun|match|with|by|sorry)\b/g;
const _TACTIC  = /\b(simp|ext|rfl|exact|intro|intros|apply|refine|constructor|use|rw|rewrite|rcases|rintro|obtain|push_neg|norm_num|ring|group|linarith|omega|decide|trivial|assumption|congr|tauto|aesop|cases|induction|revert|clear|next|all_goals|repeat|try|first|solve|fin_cases|positivity|gcongr|field_simp)\b/g;
const _TYPE    = /\b(Nat|Int|Bool|String|List|Array|Option|Type|Prop|Sort|True|False|And|Or|Not|Iff|Eq|Subgroup|Group|Ring|Field|Fintype|Finite)\b/g;
const _NUM     = /\b(\d+)\b/g;
const _STR     = /("(?:[^"\\]|\\.)*")/g;

function highlightLean(raw) {
  return raw.split('\n').map(line => {
    let commentAt = -1;
    let inStr = false;
    for (let i = 0; i < line.length - 1; i++) {
      if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inStr = !inStr;
      if (!inStr && line[i] === '-' && line[i+1] === '-') { commentAt = i; break; }
    }
    const code    = commentAt >= 0 ? line.slice(0, commentAt) : line;
    const comment = commentAt >= 0 ? line.slice(commentAt)    : '';
    let h = esc(code);
    h = h.replace(_STR,    m => `<span class="hl-str">${m}</span>`);
    h = h.replace(_KW,     m => `<span class="hl-kw">${m}</span>`);
    h = h.replace(_TACTIC, m => `<span class="hl-tactic">${m}</span>`);
    h = h.replace(_TYPE,   m => `<span class="hl-type">${m}</span>`);
    h = h.replace(_NUM,    m => `<span class="hl-num">${m}</span>`);
    const commentHtml = comment ? `<span class="hl-comment">${esc(comment)}</span>` : '';
    return h + commentHtml;
  }).join('\n');
}

// ── LaTeX renderer ───────────────────────────────────────────────────────────

function processNonMath(s) {
  return esc(s)
    .replace(/\\emph\{([^}]*)\}/g,   '<em>$1</em>')
    .replace(/\\textbf\{([^}]*)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^}]*)\}/g, '<em>$1</em>')
    .replace(/\\text\{([^}]*)\}/g,   '$1');
}

function renderLatex(el, text) {
  if (!text || !text.trim()) {
    el.classList.add('empty'); el.textContent = '—'; return;
  }
  // Match every math delimiter style leanblueprint uses: $$…$$ and \[…\]
  // (display) and \(…\) and $…$ (inline). $$ and \[ \] come first so the
  // single-$ branch can't grab a $$ opener.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$(?:[^$\\]|\\.)+?\$)/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    html += processNonMath(text.slice(last, m.index));
    const raw = m[0];
    let disp, math;
    if      (raw.startsWith('$$'))  { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\[')) { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\(')) { disp = false; math = raw.slice(2, -2); }
    else                            { disp = false; math = raw.slice(1, -1); }
    if (window.katex) {
      try {
        html += katex.renderToString(math, {
          displayMode: disp, throwOnError: false, macros: katexMacros,
        });
      }
      catch (_) { html += esc(raw); }
    } else {
      html += `<span style="color:#94a3b8">${esc(raw)}</span>`;
    }
    last = re.lastIndex;
  }
  html += processNonMath(text.slice(last));
  el.innerHTML = html;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function charVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  return `<span class="m-val">${v.toLocaleString()}</span>`;
}
function workVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  if (v === 0) return '<span class="m-val m-done">0 ✓</span>';
  return `<span class="m-val m-work">${v.toLocaleString()}</span>`;
}
function charsPair(rel, cum) {
  const f = v => (v === null || v === undefined)
    ? '<span class="chars-inf">∞</span>'
    : `<span class="chars-val">${v}</span>`;
  return `<span class="chars-pair">ℓ<sub>local</sub>=${f(rel)} &nbsp; ℓ<sub>total</sub>=${f(cum)}</span>`;
}

function renderNode(id) {
  const n = allNodes[id];
  if (!n) return;

  $("sidebar-empty").style.display = "none";
  const content = $("sidebar-content");
  content.style.display = "flex";

  const statusBadge = n.proved
    ? '<span class="badge badge-proved">✓ leanok</span>'
    : (n.mathlib_ok
        ? '<span class="badge badge-proved">ⓜ mathlib</span>'
        : (n.has_sorry
            ? '<span class="badge badge-sorry">sorry</span>'
            : '<span class="badge badge-unproved">unproved</span>'));

  const mkChip = u => `<span class="dep-chip" onclick="goTo('${esc(u)}')">${esc(u)}</span>`;
  const depsHtml = n.uses.length
    ? n.uses.map(mkChip).join('')
    : '<span class="no-deps">none — axiom</span>';

  // full transitive upstream, with the direct deps split out
  const anc       = ancestorsOf(id);
  const directSet = new Set(n.uses);
  const indirect  = [...anc].filter(x => !directSet.has(x)).sort();
  const transHtml = indirect.length
    ? indirect.map(mkChip).join('')
    : '<span class="no-deps">none beyond the direct ones</span>';

  const focusLabel = state.focus === id ? 'Clear focus' : 'Focus dependency cone';
  const focusCall  = state.focus === id ? 'clearFocus()' : `setFocus('${esc(id)}')`;

  content.innerHTML = `
    <div class="card">
      <div class="node-badges">
        <span class="badge badge-type">${n.type.toUpperCase()}</span>${statusBadge}
      </div>
      <div class="node-title">${esc(n.title || n.id)}</div>
      <div class="node-id">${esc(n.id)}</div>
      ${n.chapter   ? `<div class="node-chapter">§ ${esc(n.chapter)}</div>` : ''}
      ${n.lean_name ? `<div class="lean-ref">Lean: <code>${esc(n.lean_name)}</code></div>` : ''}
      ${n.tex_file  ? `<div class="lean-ref">tex: <code>${esc(n.tex_file)}</code></div>` : ''}
      ${n.lean_file ? `<div class="lean-ref">file: <code>${esc(n.lean_file)}</code></div>` : ''}
      <button class="btn-focus" onclick="${focusCall}">⊙ ${focusLabel}</button>
    </div>

    <div class="card">
      <div class="card-title">Structure</div>
      <div class="degrees">
        <div class="degree">
          <span class="degree-val">${n.dep_count}</span>
          <span class="degree-label">direct deps</span>
        </div>
        <div class="degree">
          <span class="degree-val">${anc.size}</span>
          <span class="degree-label">total upstream</span>
        </div>
        <div class="degree">
          <span class="degree-val">${n.rdep_count}</span>
          <span class="degree-label">used by</span>
        </div>
      </div>
      <div class="deps-sub">direct dependencies</div>
      <div class="deps-list">${depsHtml}</div>
      <div class="deps-sub">indirect (transitive) dependencies</div>
      <div class="deps-list">${transHtml}</div>
    </div>

    <div class="card">
      <div class="card-title">Complexity</div>
      <div class="metrics-grid">
        <span></span>
        <span class="col-head">local</span>
        <span class="col-head">total</span>
        <span class="m-label">LaTeX ℓ</span>${charVal(n.proof_size_tex)}${charVal(n.proof_size_tex_total)}
        <span class="m-label">Lean ℓ</span>${charVal(n.proof_size_lean)}${charVal(n.proof_size_lean_total)}
        <span class="m-label">Effort</span>${workVal(n.effort_local)}${workVal(n.effort_total)}
      </div>
    </div>

    <div class="card">
      <div class="sec-hdr"><span class="card-title" style="margin:0">LaTeX statement</span></div>
      <div class="latex-rendered" id="latex-stmt"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">LaTeX proof</span>
        ${charsPair(n.proof_size_tex, n.proof_size_tex_total)}
      </div>
      <div class="latex-rendered" id="latex-proof"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">Lean code</span>
        ${charsPair(n.proof_size_lean, n.proof_size_lean_total)}
      </div>
      <pre class="code-block" id="lean-code"></pre>
    </div>
  `;

  renderLatex($('latex-stmt'),  n.statement);
  renderLatex($('latex-proof'), n.proof_tex ? n.proof_tex.trim() : '');

  const leanEl = $('lean-code');
  if (n.lean_source) {
    leanEl.innerHTML = highlightLean(n.lean_source);
  } else {
    leanEl.classList.add('empty');
    leanEl.textContent = 'declaration not found';
  }
}

// ── Cone highlighting on click ───────────────────────────────────────────────
// Selecting a node lights up its WHOLE transitive cone — every ancestor and
// descendant and the edges between them — while everything else fades back.

const baseNodeById = {};
for (const vn of graphData.nodes) baseNodeById[vn.id] = vn;

const EDGE_BASE = { color: "#cbd5e1", highlight: "#64748b" };

function highlightCone(id) {
  const cone = coneOf(id);   // {id} ∪ ancestors ∪ descendants
  nodesDS.update(nodesDS.getIds().map(nid =>
    cone.has(nid)
      ? baseNodeById[nid]                                   // full styling
      : { id: nid, color: { background: "#e5e7eb", border: "#d1d5db" },
          font: { color: "#cbd5e1" } }                      // faded
  ));
  edgesDS.update(edgesDS.get().map(e => {
    const on = cone.has(e.from) && cone.has(e.to);
    return { id: e.id,
             color: on ? { color: "#475569", highlight: "#334155" } : { color: "#edf0f4" },
             width: on ? 2.5 : 1 };
  }));
}

function clearHighlight() {
  nodesDS.update(nodesDS.getIds().map(nid => baseNodeById[nid]));
  edgesDS.update(edgesDS.get().map(e => ({ id: e.id, color: EDGE_BASE, width: 1 })));
}

network.on("click", params => {
  if (params.nodes.length) { renderNode(params.nodes[0]); highlightCone(params.nodes[0]); }
  else                     { clearHighlight(); }
});
network.on("doubleClick", params => { if (params.nodes.length) setFocus(params.nodes[0]); });

// ── Initial render ───────────────────────────────────────────────────────────

apply();
</script>
</body>
</html>
