<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">

    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"lem:NumberField_mathlib": {"id": "lem:NumberField_mathlib", "type": "lemma", "title": "Number fields --- Mathlib anchor", "chapter": "Overview", "statement": "\\textit{Provided by Mathlib.}\n  A number field $F$ is an instance of Mathlib's \\texttt{NumberField}\n  typeclass (characteristic zero, finite degree over $\\bQ$).  This\n  anchor makes explicit that the ambient fields $F$ and $E$ of the\n  paper are covered by existing Mathlib infrastructure.", "uses": [], "lean_name": "Mathlib.NumberTheory.NumberField.Basic.NumberField", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 24, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:TotallyRealField": {"id": "def:TotallyRealField", "type": "definition", "title": "Totally real field and CM extension", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.2.}\n  Fix a rational prime $p$.  Let $F$ be a totally real field and let\n  $E/F$ be a CM quadratic extension.  Set\n  $G_0 := \\Res_{F/\\bQ}\\mathrm{GL}_2$ and\n  $H := \\Res_{E/\\bQ}\\mathbf{G}_m$.  Let $L$ be a finite extension of\n  $\\bQ_p$ splitting $F$.", "uses": ["lem:NumberField_mathlib"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.totallyRealField", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 23, "proof_size_tex": null, "effort_local": 277, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 277}, "def:QuaternionAlgebra": {"id": "def:QuaternionAlgebra", "type": "definition", "title": "Quaternion algebra", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.1.}\n  Let $\\bB$ be a quaternion algebra over $F_{\\bA}$ with ramification\n  set $\\Sg \\sqcup \\{v \\mid \\infty\\}$ satisfying\n  $|\\Sg| \\equiv [F:\\bQ] - 1 \\pmod{2}$.  Then\n  $\\bG(\\bA) := \\bB^\\times$ is an \\emph{incoherent} algebraic group over\n  $\\bQ$.  For every $v \\in \\Sg$ we require $E_v / F_v$ to be nonsplit;\n  this guarantees a unique $\\bB^\\times$-conjugacy class of embeddings\n  $E_{\\bA} \\hookrightarrow \\bB$, of which we fix one, yielding\n  $\\mathrm{e} \\colon H \\hookrightarrow G$.", "uses": ["def:TotallyRealField"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.quaternionAlgebra", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 22, "proof_size_tex": null, "effort_local": 514, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 791}, "def:GroupGH": {"id": "def:GroupGH", "type": "definition", "title": "Incoherent groups $G$, $H$, $Z$, $(G \\times H)'$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.1.}\n  The groups of interest, collectively denoted $G_*$, are:\n  \\[\n    G, \\quad H, \\quad G \\times H, \\quad (G \\times H)' := (G \\times H)/Z,\n    \\quad H' := H/Z,\n  \\]\n  where $Z := \\Res_{F/\\bQ}\\mathbf{G}_m$ is embedded diagonally, $G$\n  is the incoherent group of \\cref{def:QuaternionAlgebra}, and\n  $H = \\Res_{E/\\bQ}\\mathbf{G}_m$.", "uses": ["def:QuaternionAlgebra"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.groupGH", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 21, "proof_size_tex": null, "effort_local": 361, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1152}, "def:ShimuraVarieties": {"id": "def:ShimuraVarieties", "type": "definition", "title": "Shimura varieties", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.1.}\n  Associated with the groups in \\cref{def:GroupGH} and suitable Shimura\n  data are towers of compactified Shimura varieties\n  \\[\n    X_{/F},\\quad Y_{/E},\\quad (X \\times_F Y)_{/E},\\quad Z_{/E},\\quad Y'_{/E}.\n  \\]\n  The varieties $X$, $Z$, $X \\times_F Y$ are curves; $Y$ and $Y'$ have\n  dimension $0$.  The embedding $\\mathrm{e} \\colon H \\hookrightarrow G$\n  induces a diagonal embedding $H' \\hookrightarrow (G \\times H)'$, hence\n  a morphism of Shimura varieties $\\mathrm{e}' \\colon Y' \\to Z$.", "uses": ["def:GroupGH"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.shimuraVarieties", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 20, "proof_size_tex": null, "effort_local": 526, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1678}, "def:AutomorphicRepresentation": {"id": "def:AutomorphicRepresentation", "type": "definition", "title": "Cuspidal cohomological automorphic representation", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.2.}\n  Let $W$ be an algebraic representation of $G_{*,\\infty}$ over $L$ and\n  let $\\cW$ be the corresponding \\'{e}tale local system on the tower\n  $X_*$.  A \\emph{(cuspidal, cohomological) automorphic representation\n  of $G_*(\\bA)$ over $L$ of weight $W$} is a representation\n  $\\Pi = \\Pi^\\infty \\otimes W$ of $G_*(\\bA)$ occurring in\n  $H^\\bullet(X_{*,\\overline{E}}, \\cW^\\vee) \\otimes W$.", "uses": ["def:ShimuraVarieties"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.automorphicRepresentation", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 19, "proof_size_tex": null, "effort_local": 418, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2096}, "def:OrdinaryAutomorphicRep": {"id": "def:OrdinaryAutomorphicRep", "type": "definition", "title": "Ordinary automorphic representation", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.2.}\n  An automorphic representation $\\pi_0$ of $G_0(\\bA)$ over $L$ is\n  \\emph{ordinary} if for all $v \\mid p$, the associated\n  $G_{F_v}$-representation $V_{\\pi_0,v}$ reduces nontrivially as\n  \\[\n    0 \\to V_{\\pi_0,v}^+ \\to V_{\\pi_0,v} \\to V_{\\pi_0,v}^- \\to 0,\n  \\]\n  with $G_{F_v}$ acting on $V_{\\pi_0,v}^+$ via $\\chi_{\\mathrm{cyc}}\n  \\cdot \\alpha_v^\\circ$ where $\\alpha_v^\\circ$ takes values in\n  $p$-adic units.", "uses": ["def:AutomorphicRepresentation", "def:GaloisRepresentation"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.ordinaryAutomorphicRep", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 442, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3074}, "def:LocallyDistinguished": {"id": "def:LocallyDistinguished", "type": "definition", "title": "Locally distinguished", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.4, Definition (loc dist).}\n  For each place $v$ of $F$, define the local epsilon factor\n  \\[\n    \\varepsilon_v^G(V) := \\varepsilon(V_v)\\,\\chi_v(-1)\\,\\eta_v(-1)\\,\n    \\varepsilon(\\bB_v) \\;\\in\\; \\{\\pm 1\\}.\n  \\]\n  An automorphic representation $\\Pi$ of $(G \\times H)'(\\bA)$ is\n  \\emph{locally distinguished by $H'$} if $\\varepsilon_v^G(V) = +1$\n  for all places $v$.", "uses": ["def:AutomorphicRepresentation", "def:GaloisRepresentation"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.locallyDistinguished", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 13, "proof_size_tex": null, "effort_local": 393, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3025}, "def:HidaFamily": {"id": "def:HidaFamily", "type": "definition", "title": "Hida family for $(G \\times H)'$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.4.2.}\n  Fix an open compact $K^p \\subset (G \\times H)'(\\bA^{p\\infty})$.  Let\n  $\\cE^{\\ord}_{K^p} := \\mathrm{Spec}\\,\\mathbf{T}^{\\mathrm{sph},\\ord}_{K^p,\\bQ_p}$\n  be the ordinary eigenvariety for $(G \\times H)'$, with dense classical\n  locus $\\cE^{\\ord,\\mathrm{cl}}$.  A \\emph{Hida family} is an irreducible\n  component $\\cX \\subset \\cE^{\\ord}_{K^p}$; set\n  $\\cX^{\\mathrm{cl}} := \\cX \\cap \\cE^{\\ord,\\mathrm{cl}}$.\n\n  The Hida family $\\cX$ is \\emph{locally distinguished} if for every\n  classical point $z \\in \\cX^{\\mathrm{cl}}$ (of weight satisfying the\n  weight condition~(wt)), the attached Galois representation\n  $\\cV_z$ satisfies $\\varepsilon_v^G(\\cV_z) = +1$ for all\n  $v \\nmid p\\infty$.", "uses": ["def:AutomorphicRepresentation", "def:LocallyDistinguished"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.hidaFamily", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 6, "descendant_count": 11, "proof_size_tex": null, "effort_local": 719, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3744}, "def:GaloisRepresentation": {"id": "def:GaloisRepresentation", "type": "definition", "title": "Galois representation $V_\\Pi$ and the sheaf $\\cV$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.3.}\n  For $\\Pi = \\pi \\otimes \\chi$ a cuspidal automorphic representation of\n  $(G \\times H)'(\\bA)$ over $L$, the associated $G_E$-representation is\n  $V = V_\\Pi := V_{\\pi|G_E} \\otimes V_\\chi$.\n\n  Over a locally distinguished Hida family $\\cX$\n  (up to replacing $\\cX$ by an open subset containing $\\cX^{\\mathrm{cl}}$),\n  there exists a locally free sheaf $\\cV$ of rank $2$ with a\n  $G_{E,Sp}$-action such that $\\cV_{|z} \\cong V_{\\Pi_z}$ for all\n  $z \\in \\cX^{\\mathrm{cl}}$ via the Langlands correspondence.", "uses": ["def:AutomorphicRepresentation"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.galoisRepresentation", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 17, "proof_size_tex": null, "effort_local": 536, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2632}, "lem:OrdinaryReductionAtP": {"id": "lem:OrdinaryReductionAtP", "type": "lemma", "title": "Ordinary filtration of $\\cV$ at $p$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.4.3.}\n  For each $w \\mid p$ there is an exact sequence of\n  $\\scO_\\cX[G_{E_w}]$-modules\n  \\[\n    0 \\to \\cV_w^+ \\to \\cV_w \\to \\cV_w^- \\to 0,\n  \\]\n  where $\\cV_w^\\pm$ are line bundles over $\\cX$, specialising to the\n  ordinary filtration $0 \\to V_w^+ \\to V_w \\to V_w^- \\to 0$ at all\n  $z \\in \\cX^{\\mathrm{cl}}$.", "uses": ["def:GaloisRepresentation", "def:HidaFamily", "def:OrdinaryAutomorphicRep"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.ordinaryReductionAtP", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{}\n  \\textit{Proof: see Disegni, §3.2 (Proposition 3.2.1).}\n  The sheaf $\\cV$ over $\\cX$ is constructed in §3.2 from the completed homology module\n  $\\cM_{K^{p\\prime}}$.  For each $w \\mid p$, the ordinary filtration is extracted using\n  Hida's $U_p$-operator: the universal ordinary character $\\alpha^\\circ_{|F_w^\\times}\n  \\langle\\,\\cdot\\,\\rangle_{F_w}$ (arising from the eigenvalue of $U_p$ on the ordinary\n  quotient) defines the line-bundle $\\cV_w^+$ via its action on a rank-$1$ summand of\n  $\\cV_w$.  More precisely, one defines $\\cW_v^? :=\n  \\mathrm{Hom}_{\\scO_\\cX}(\\cV_{0,v}^+, \\cV_{0,v}^?)$ and uses a weight argument at each\n  classical point $x$ (where $H^0(F_v, \\cW_{v,x}^-)= H^2(F_v, \\cW_{v,x}^-)=0$) to\n  propagate the splitting to an open neighbourhood of $\\cX^{\\mathrm{cl}}$.  At every\n  $z \\in \\cX^{\\mathrm{cl}}$, the specialisation $\\cV_{w,z}^+$ recovers the ordinary\n  sub-representation $V_w^+$ by the definition of ordinarity in §2.4.3.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 961, "effort_local": 961, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5147}, "def:SelmerGroup": {"id": "def:SelmerGroup", "type": "definition", "title": "Bloch--Kato and \\nek's Selmer groups", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.1.1.}\n  For a number field $E$ and a geometric $p$-adic $G_E$-representation\n  $V$, the \\emph{Bloch--Kato Selmer group} is $H^1_f(E,V)$, an\n  $L$-subspace of $H^1(G_E, V)$ defined by local conditions.\n\n  \\nek's theory of Selmer complexes yields, for nice $p$-adic families\n  of $G_E$-representations (in particular for the sheaf $\\cV$ over\n  $\\cX$ with the local condition at $p$ coming from\n  \\cref{lem:OrdinaryReductionAtP}), the Selmer groups\n  $\\tH^i_f(E, V)$ for all $i \\geq 0$.  When $V$ is ordinary and not\n  exceptional, $\\tH^1_f(E, V) = H^1_f(E, V)$.", "uses": ["def:GaloisRepresentation"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.selmerGroup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 9, "proof_size_tex": null, "effort_local": 587, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3219}, "def:HeightPairing": {"id": "def:HeightPairing", "type": "definition", "title": "$p$-adic height pairing", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.5.}\n  Fix a Galois-equivariant pairing $V \\otimes V^\\iota \\to L(1)$ where\n  $V^\\iota := V_{\\Pi^\\vee}$.  The ordinary filtrations at $w \\mid p$\n  from \\cref{lem:OrdinaryReductionAtP} satisfy the exactness condition\n  that $V_w^+$ and $V^{\\iota,+}_w$ are exact orthogonal complements.\n  This data determines a \\emph{$p$-adic height pairing}\n  \\[\n    h_V \\colon \\tH^1_f(E,V) \\otimes \\tH^1_f(E,V^\\iota)\n    \\longrightarrow L \\,\\hat\\otimes\\, \\GF\n  \\]\n  on \\nek's Selmer groups.\n\n  Over the Hida family $\\cX$, the interpolated duality\n  $\\cV \\otimes \\cV^\\iota \\to \\scO_\\cX(1)$ and the family of filtrations\n  yield a height pairing\n  \\[\n    h_{\\cV/\\cV^\\iota} \\colon\n    \\tH^1_f(E,\\cV) \\otimes_{\\scO_\\cX} \\tH^1_f(E,\\cV^\\iota)\n    \\longrightarrow \\cN^*_{\\cX/\\cX^0}\n    \\cong \\scO_\\cX \\,\\hat\\otimes\\, \\GF,\n  \\]\n  where $\\cX^0$ denotes the base Hida family for $G_0 \\times H$.", "uses": ["def:SelmerGroup", "lem:OrdinaryReductionAtP"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.heightPairing", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 5, "proof_size_tex": null, "effort_local": 896, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6630}, "def:HeegnerCycle": {"id": "def:HeegnerCycle", "type": "definition", "title": "Heegner cycle $P_W$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.6.}\n  Assume the weight condition~(wt).  The map $\\mathrm{e}' \\colon Y' \\to Z$\n  induces, for every $V' \\subset H'(\\bA^\\infty) \\cap K$, a canonical\n  map $H_0(Y'_{V'}, L) \\to H_0(Z_K, \\cW)$.  The image\n  $\\Delta^\\circ_{W,f_\\infty} \\in H_0(Z_K, \\cW)_0$ of the normalised\n  fundamental class $[Y'_{V'}] = |Y'(\\overline{E})|^{-1}\\sum_{y \\in\n  Y'(\\overline{E})} [y]$ lies in the kernel of\n  $H_0(Z_K, \\cW) \\to H_0(\\overline{Z}_K, \\cW)$.  The images under the\n  Abel--Jacobi maps\n  $\\mathrm{AJ} \\colon H_0(Z_K, \\cW)_0 \\to H^1(E, H_1(\\overline{Z}_K,\n  \\cW))$ are tower-compatible and $H'(\\bA)$-invariant, hence define\n  \\[\n    P_W := \\varprojlim \\mathrm{AJ}(\\Delta^\\circ_{W,-})\n    \\;\\in\\; \\varprojlim_K H^1\\!\\left(E,\\,\n    H_1(\\overline{Z}_K, \\cW)^{H'(\\bA)}\\right).\n  \\]", "uses": ["def:ShimuraVarieties", "def:AutomorphicRepresentation"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.heegnerCycle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": null, "effort_local": 795, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2891}, "def:HeegnerFunctional": {"id": "def:HeegnerFunctional", "type": "definition", "title": "Heegner functional $P_\\Pi$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.6.}\n  Via the Carayol injection\n  $\\Pi \\hookrightarrow \\varinjlim_K \\mathrm{Hom}_{L[G_E]}(H_1(\\overline{Z}_K,\n  \\cW), V_\\Pi)$, the class $P_W$ defines an $H'(\\bA)$-invariant\n  functional\n  \\[\n    P_\\Pi \\colon \\Pi_{H'_\\infty} \\longrightarrow H^1(G_E, V_\\Pi).\n  \\]\n  When $\\Pi$ is ordinary and not exceptional, the image of $P_\\Pi$\n  lies in $H^1_f(E, V_\\Pi)$.\n  The composition $P_\\Pi^{\\ord} := P_W \\circ \\gamma^{\\ord}_{H'}$ of\n  $P_\\Pi$ with Hida's ordinary projector operator $\\gamma^{\\ord}_{H'}$\n  is the \\emph{ordinary Heegner functional}.", "uses": ["def:HeegnerCycle", "def:GaloisRepresentation", "def:SelmerGroup"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.heegnerFunctional", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 572, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4586}, "def:UniversalHeegnerClass": {"id": "def:UniversalHeegnerClass", "type": "definition", "title": "Universal Heegner class $\\cP_{K^p}$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.4.4.}\n  The ordinary Heegner class $P^\\ord_{W,K^{p\\prime}} := P_{W,K^{p\\prime}} \\circ\n  \\gamma^\\ord_{H'}$ is $H'(\\bA^{p\\infty})$-invariant.  Its localisation\n  over $\\cX$ (in the case $W$ trivial) is a section of\n  $\\tH^1_f(E, \\cM_{K^{p\\prime}}^{H'_\\Sg})$, where the subscript $f$\n  uses the local condition from \\cref{lem:OrdinaryReductionAtP}.\n  Via the Carayol map over $\\cX$, this section defines an\n  $\\scO_\\cX$-module map\n  \\[\n    \\cP_{K^{p\\prime}} \\colon\n    \\Pi^{K^{p\\prime},\\ord}_{H'_\\Sg}\n    \\longrightarrow \\tH^1_f(E, \\cV),\n  \\]\n  the \\emph{universal Heegner class}.", "uses": ["def:HeegnerFunctional", "def:HidaFamily", "def:SelmerGroup"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.universalHeegnerClass", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": null, "effort_local": 605, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6303}, "def:PAdicLFunction": {"id": "def:PAdicLFunction", "type": "definition", "title": "$p$-adic $L$-function $\\cL_p(\\cV^\\sharp)$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.5.2, Theorem (the main theorem of \\cite{dd-pLf}).}\n  Let $\\cX^\\sharp$ denote the Hida family for $G \\times H$ overlying\n  $\\cX$, and let $\\cX_0^\\sharp := \\iota_{\\mathrm{JL}}(\\cX^\\sharp)\n  \\subset \\cE^{\\sharp,\\ord}_{G_0 \\times H}$.  There exists a meromorphic\n  function\n  \\[\n    \\cL_p(\\cV^\\sharp) \\in \\cK(\\cX_0^\\sharp)\n  \\]\n  whose polar locus does not meet $\\cX_0^{\\mathrm{cl}}$, uniquely\n  characterised by the interpolation property: for each classical\n  $z = (x,y) \\in \\cX_0^{\\sharp,\\mathrm{cl}}$ outside the polar locus,\n  corresponding to $\\pi_x \\otimes \\chi_y$ with weights $(\\underline{w}_x,\n  \\underline{l}_y)$ satisfying $|l_{y,\\sigma}| < w_{x,\\sigma}$ and\n  $|w_x + l_y| \\leq w_{x,\\sigma} - |l_{y,\\sigma}| - 2$ for all\n  $\\sigma \\colon F \\hookrightarrow \\mathbf{C}$, one has\n  \\[\n    \\cL_p(\\cV^\\sharp)(x,y)\n    = e_{p\\infty}(V_{(\\pi_x, \\chi_y)}) \\cdot\n    \\mathscr{L}(V_{(\\pi_x, \\chi_y)}, 0).\n  \\]", "uses": ["def:GaloisRepresentation", "def:HidaFamily"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.padicLFunction", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": null, "effort_local": 936, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4680}, "def:CyclotomicDerivative": {"id": "def:CyclotomicDerivative", "type": "definition", "title": "Cyclotomic derivative $\\mathrm{d}^\\sharp \\cL_p(\\cV)$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.5.3.}\n  Under the local distinction hypothesis on $\\cX$, the function\n  $\\cL_p(\\cV^\\sharp)$ vanishes identically on $\\cX_0$.  The conormal\n  sheaf\n  $\\cN^*_{\\cX_0/\\cX_0^\\sharp} = \\mathcal{I}_{\\cX_0}/\\mathcal{I}_{\\cX_0}^2\n  \\otimes_{\\scO_{\\cX_0^\\sharp}} \\scO_{\\cX_0} \\cong \\scO_{\\cX_0}\n  \\,\\hat\\otimes\\, \\GF$\n  carries the \\emph{cyclotomic derivative}\n  \\[\n    \\mathrm{d}^\\sharp\\cL_p(\\cV) :=\n    \\mathrm{d}_{\\cX_0/\\cX_0^\\sharp}\\,\\cL_p(\\cV^\\sharp)\n    \\;\\in\\; \\cK(\\cX_0)\\,\\hat\\otimes\\,\\GF\n    \\;=\\; \\cK(\\cX)\\,\\hat\\otimes\\,\\GF.\n  \\]", "uses": ["def:PAdicLFunction", "def:HidaFamily"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.cyclotomicDerivative", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 557, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5237}, "def:GlobalToricPairing": {"id": "def:GlobalToricPairing", "type": "definition", "title": "Global toric period pairing $Q$", "chapter": "Overview", "statement": "\\textit{Source: Disegni, §1.3.4.}\n  For $\\Pi$ locally distinguished, the local toric period\n  $Q_{v,dt_v}(f_{1,v} \\otimes f_{2,v} / f_{3,v} \\otimes f_{4,v})$ is\n  an explicit generator of $\\Pi_v^{*,H'_v} \\otimes (\\Pi_v^\\vee)^{*,H'_v}$\n  normalised by the local $L$-factor $\\mathscr{L}(V_{(\\pi,\\chi),v},0)$\n  and the Haar measure $dt_v$.  Choosing measures with\n  $\\mathrm{vol}(H'(\\bQ)\\backslash H'(\\bA), dt) = 1$, the \\emph{global\n  toric period pairing} is\n  \\[\n    Q\\!\\left(\\frac{f_1 \\otimes f_2}{f_3 \\otimes f_4}\\right)\n    := \\prod_v Q_{v,dt_v}\\!\\left(\\frac{f_{1,v} \\otimes f_{2,v}}\n    {f_{3,v} \\otimes f_{4,v}}\\right)\n  \\]\n  for $f_1 \\in \\Pi_{H'}$, $f_2 \\in \\Pi^\\vee_{H'}$, $f_3 \\in \\Pi$,\n  $f_4 \\in \\Pi^\\vee$ with $\\prod_v (f_{3,v}, f_{4,v})_v \\neq 0$.", "uses": ["def:LocallyDistinguished"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.globalToricPairing", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": null, "effort_local": 759, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3784}, "thm:TheoremB": {"id": "thm:TheoremB", "type": "theorem", "title": "Theorem B: $p$-adic Gross--Zagier formula for a fixed representation", "chapter": "Overview", "statement": "\\textit{Source: Disegni, Theorem~B (§1.3).}\n  Let $\\Pi = \\pi \\otimes \\chi$ be an ordinary, locally distinguished,\n  non-exceptional automorphic representation of $(G \\times H)'(\\bA)$\n  over $L$.  Let $V = V_\\Pi$.\n\n  The image of $P_\\Pi$ lies in $H^1_f(E, V)$, and for all\n  $f_1 \\in \\Pi_{H'_\\infty}$, $f_2 \\in \\Pi^\\vee_{H'_\\infty}$,\n  $f_3 \\in \\Pi$, $f_4 \\in \\Pi^\\vee$ with $(f_3, f_4)_\\Pi \\neq 0$:\n  \\[\n    \\frac{h_V(P_\\Pi(f_1),\\, P_{\\Pi^\\vee}(f_2))}{(f_3, f_4)_\\Pi}\n    =\n    e_{p\\infty}(V_{(\\pi,\\chi)})^{-1}\n    \\cdot \\cL_p'(V_{(\\pi,\\chi)}, 0)\n    \\cdot Q\\!\\left(\\frac{f_1 \\otimes f_2}{f_3 \\otimes f_4}\\right),\n  \\]\n  where $e_{p\\infty}(V_{(\\pi,\\chi)}) \\in L^\\times$ is the\n  $p$-interpolation factor for $\\cL_p(V_{(\\pi,\\chi)},s)$.", "uses": ["def:HeegnerFunctional", "def:HeightPairing", "def:PAdicLFunction", "def:GlobalToricPairing", "def:OrdinaryAutomorphicRep", "def:LocallyDistinguished"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.theoremB", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:TheoremD, thm:TheoremC}\n  \\textit{Proof: see Disegni, §7.1.}\n  The proof is completed in §7.1 by specialising \\cref{thm:TheoremD} to a classical point.\n  Fix a classical point $z \\in \\cX^{\\mathrm{cl}}$ corresponding to $\\Pi$; the right-hand\n  side of the universal formula (\\cref{thm:TheoremD}) specialises to\n  $e_{p\\infty}(V)^{-1} \\cdot \\cL_p'(V, 0) \\cdot Q(\\cdot)$ by the interpolation property\n  of $\\mathrm{d}^\\sharp \\cL_p$ at classical points.  The height pairing\n  $h_{\\cV/\\cV^\\iota}$ specialises to $h_V$ by §5.3; the universal Heegner class\n  $\\cP_{K^{p\\prime}}$ specialises to $P^\\ord_{\\Pi_z}$ by \\cref{thm:TheoremC}.  The\n  image of $P_\\Pi$ lies in $H^1_f(E,V)$ by Proposition 6.4.7 (valid when $B_p$ is split\n  and $\\Pi$ is ordinary and not exceptional).  For representations of trivial weight\n  satisfying the technical conditions (p-crys) and (ram), the formula is\n  \\cite[Theorem~B]{nonsplit}; Proposition~7.1.6 (``final lemma'') shows this implies the\n  general case via the density of such points.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 6, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1024, "effort_local": 1024, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10716}, "thm:TheoremC": {"id": "thm:TheoremC", "type": "theorem", "title": "Theorem C: Universal Heegner class interpolates Heegner cycles", "chapter": "Overview", "statement": "\\textit{Source: Disegni, Theorem~C (§1.4).}\n  Let $\\cX$ be a locally distinguished Hida family for $(G \\times H)'$.\n  There exist an open subset $\\cX' \\subset \\cX$ containing\n  $\\cX^{\\mathrm{cl}}$ and a map of sheaves over $\\cX'$\n  \\[\n    \\cP_{K^{p\\prime}} \\colon\n    \\Pi^{K^{p\\prime},\\ord}_{H'_\\Sg}\n    \\longrightarrow \\tH^1_f(E_{Sp}, \\cV),\n  \\]\n  satisfying:\n  \\begin{enumerate}\n    \\item $\\cP_{K^{p\\prime}}$ is invariant under the away-from-$p\\Sg$\n          Hecke algebra of $H'$;\n    \\item for all $z \\in \\cX^{\\mathrm{cl}}$ with $\\Pi_z$ satisfying~(wt),\n          $\\cP_{K^{p\\prime}|z} = P^\\ord_{\\Pi_z, K^{p\\prime}}$ under the\n          natural map\n          $\\tH^1_f(E_{Sp},\\cV)_{|z} \\to H^1(G_{E,Sp}, V_{\\Pi_z})$.\n  \\end{enumerate}", "uses": ["def:HidaFamily", "def:UniversalHeegnerClass", "def:SelmerGroup"], "lean_name": "MR4493324TheUniversalPAdicGrossZagierFormula.Basic.TODO.theoremC", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:HeegnerCycle, def:HeegnerFunctional, lem:OrdinaryReductionAtP}\n  \\textit{Proof: see Disegni, §6.3--6.4 and Proposition~A.2.4.}\n  The map $\\cP_{K^{p\\prime}} = P_{W,K^{p\\prime}} \\circ \\gamma^\\ord_{H'}$ is\n  $H'(\\bA^{p\\infty})$-invariant because both $P_{W,K^{p\\prime}}$ (by construction)\n  and $\\gamma^\\ord_{H'}$ (a Hecke-equivariant projector) are; this gives part~(1).\n  For part~(2), via Proposition~3.2.5, the class $\\cP_{K^{p\\prime}}$ can be viewed as an\n  $\\scO_\\cX$-linear functional into $H^1(G_{E,Sp}, \\cV)$ over the open $\\cX^{(3,f)}$;\n  the local Selmer conditions at $w \\nmid p$ (Lemma~6.4.1) and at $w \\mid p$ using the\n  filtration from \\cref{lem:OrdinaryReductionAtP} (Lemma~6.4.3) force $\\cP$ into the\n  Selmer group $\\tH^1_f(E,\\cV)$.  The interpolation property\n  $\\cP_{K^{p\\prime}|z} = P^\\ord_{\\Pi_z, K^{p\\prime}}$ follows from the definition of\n  $\\cP_W$ in §6.3 and the weight-independence result (Proposition~6.3.2), which\n  identifies $\\gamma^\\ord_{H'}$ as a limit of $p^\\infty$-Hecke operators intertwining\n  toric and ordinary parts (Proposition~A.2.4).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_c
