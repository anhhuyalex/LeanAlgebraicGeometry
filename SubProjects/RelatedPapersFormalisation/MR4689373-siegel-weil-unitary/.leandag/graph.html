<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <span class="brand">Blueprint DAG</span>

  <span class="legend"><span class="leg-dot" style="background:#22c55e"></span><span class="leg-txt">done</span><span class="leg-dot" style="background:#3b82f6"></span><span class="leg-txt">mathlib</span><span class="leg-bar"></span><span class="leg-txt">more effort</span><span class="leg-dot" style="background:#ef4444"></span><span class="leg-txt">∞ no proof</span></span>
  <span class="legend sym-legend">
    <span class="leg-txt">✓ Lean proof</span>
    <span class="leg-txt">⚠ sorry</span>
    <span class="leg-txt">ⓜ mathlib</span>
    <span class="leg-txt">λ Lean decl</span>
    <span class="leg-txt">★ LaTeX proof</span>

  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>
</div>
<div id="controls">

  <datalist id="node-ids"></datalist>
  <select id="nodeset" title="Which declarations to include">
    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">
        <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:base-curve": {"id": "def:base-curve", "type": "definition", "title": "Base curve", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S1 Notation.}\n  A smooth, proper, geometrically connected curve \\(X\\) over \\(k = \\mathbf{F}_q\\) of\n  odd characteristic \\(p \\neq 2\\), equipped with:\n  \\begin{itemize}\n    \\item canonical bundle \\(\\om_X\\) (the line bundle of 1-forms);\n    \\item function field \\(F = k(X)\\);\n    \\item adèle ring \\(\\BA = \\BA_F\\);\n    \\item set of closed points \\(|X|\\);\n    \\item for each \\(v \\in |X|\\): completed local ring \\(\\cO_v\\) with fraction field\n      \\(F_v\\), residue field \\(k_v\\), degree \\(\\deg(v) = [k_v:k]\\),\n      \\(q_v = q^{\\deg(v)} = \\#k_v\\), uniformizer \\(\\varpi_v\\), and absolute value\n      \\(|\\cdot|_v : F_v^\\times \\to q_v^{\\mathbb{Z}}\\) normalized by\n      \\(|\\varpi_v|_v = q_v^{-1}\\).\n  \\end{itemize}", "uses": [], "lean_name": "HSW.BaseCurve", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 13, "descendant_count": 49, "proof_size_tex": null, "effort_local": 728, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 728}, "def:etale-cover": {"id": "def:etale-cover", "type": "definition", "title": "\\'Etale double cover", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S1 Notation.}\n  A finite étale double cover \\(\\nu : X' \\to X\\) (the split case \\(X' = X \\sqcup X\\)\n  is allowed), with non-trivial involution \\(\\sigma \\in \\mathrm{Aut}(X'/X)\\). The ring\n  of rational functions \\(F'\\) on \\(X'\\) is either a quadratic extension of \\(F\\) or\n  \\(F \\times F\\). When \\(\\nu\\) is étale, the arithmetic genus of \\(X'\\) satisfies\n  \\(g' = 2g - 1\\), where \\(g\\) is the genus of \\(X\\).", "uses": ["def:base-curve"], "lean_name": "HS ll, "effort_local": 413, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1571}, "def:chi-character": {"id": "def:chi-character", "type": "definition", "title": "Unramified character", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.1 and Remark~2.1.}\n  The quadratic character \\(\\eta : \\BA_F^\\times / F^\\times \\to \\mathbf{C}^\\times\\)\n  associated to \\(F'/F\\) by class field theory.  A character\n  \\(\\chi : \\BA_{F'}^\\times / F'^\\times \\to \\mathbf{C}^\\times\\) such that\n  \\(\\chi|_{\\BA_F^\\times} = \\eta^n\\), chosen to be unramified everywhere. Such \\(\\chi\\)\n  exists: injectivity of \\(\\mathbf{C}^\\times\\) in abelian groups reduces the question to\n  showing \\(\\eta^n\\) is trivial on \\(\\ker(\\Pic(X) \\to \\Pic(X'))\\), which holds by the\n  alternating property of the cup product pairing on\n  \\(H^1(X_{\\overline{\\mathbf{F}}_q}, \\mathbb{Z}/2\\mathbb{Z})\\) when \\(\\mathrm{char}(k) \\neq 2\\).", "uses": ["def:base-curve", "def:etale-cover"], "lean_name": "HSW.UnramifiedCharacter", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": null, "effort_local": 674, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1832}, "def:siegel-parabolic": {"id": "def:siegel-parabolic", "type": "definition", "title": "Siegel parabolic", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.1.}\n  The standard split \\(F'/F\\)-skew-Hermitian space \\(W\\) of dimension \\(2n\\), with\n  unitary group \\(H_n = \\U(W)\\). The standard Siegel parabolic\n  \\(P_n(\\BA) = M_n(\\BA) N_n(\\BA)\\) of \\(H_n(\\BA)\\) consists of:\n  \\[\n    M_n(\\BA) = \\Bigl\\{ m(\\alpha) = \\begin{pmatrix}\\alpha & 0 \\\\ 0 &\n      {}^t\\bar\\alpha^{-1}\\end{pmatrix} : \\alpha \\in \\GL_n(\\BA_{F'}) \\Bigr\\},\n  \\]\n  \\[\n    N_n(\\BA) = \\Bigl\\{ n(\\beta) = \\begin{pmatrix} 1_n & \\beta \\\\ 0 & 1_n\n    \\end{pmatrix} : \\beta \\in \\Herm_n(\\BA_F) \\Bigr\\}.\n  \\]", "uses": ["def:base-curve", "def:etale-cover", "def:hermitian-spaces"], "lean_name": "HSW.SiegelParabolic", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 15, "proof_size_tex": null, "effort_local": 532, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2103}, "def:degenerate-principal-series": {"id": "def:degenerate-principal-series", "type": "definition", "title": "Degenerate principal series", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.1.}\n  The \\emph{degenerate principal series}\n  \\[\n    I_n(s, \\chi) = \\Ind_{P_n(\\BA)}^{H_n(\\BA)}\n      \\bigl(\\chi \\cdot |\\cdot|_{F'}^{s + n/2}\\bigr), \\quad s \\in \\mathbf{C},\n  \\]\n  is the unnormalized smooth induction.", "uses": ["def:siegel-parabolic", "def:chi-character"], "lean_name": "HSW.DegeneratePrincipalSeries", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": null, "effort_local": 244, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3021}, "def:levi-element-map": {"id": "def:levi-element-map", "type": "definition", "title": "Levi element map", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.1.}\n  For a rank-\\(n\\) vector bundle \\(\\cE\\) on \\(X'\\), the associated \\emph{Levi element}\n  \\(m(\\cE) \\in M_n(\\BA)\\) is the adelization of the \\(\\GL_n(\\BA_{F'})\\)-valued matrix\n  corresponding to \\(\\cE\\) via the adelic description of vector bundles on \\(X'\\). This\n  defines a map\n  \\[\n    m : \\Bun_{\\GL_n}(X') \\to M_n(\\BA),\n  \\]\n  where \\(M_n(\\BA)\\) is the Levi component of the Siegel parabolic\n  (Definition~\\ref{def:siegel-parabolic}). The element \\(m(\\cE)\\) is the point at which\n  the Eisenstein series is evaluated in the normalized Fourier coefficient formula.", "uses": ["def:siegel-parabolic", "def:etale-cover"], "lean_name": "HSW.LeviElementMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": null, "effort_local": 595, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2698}, "def:siegel-eisenstein-series": {"id": "def:siegel-eisenstein-series", "type": "definition", "title": "Siegel--Eisenstein series", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.1.}\n  The standard unramified section \\(\\Phi(-,s) \\in I_n(s, \\chi)\\) is the unique\n  \\(K = H_n(\\hat{\\cO})\\)-invariant section with \\(\\Phi(1_{2n}, s) = 1\\). The\n  \\emph{Siegel--Eisenstein series} is\n  \\[\n    E(g, s, \\Phi) = \\sum_{\\gamma \\in P_n(F) \\backslash H_n(F)} \\Phi(\\gamma g, s),\n    \\quad g \\in H_n(\\BA),\n  \\]\n  converging absolutely for \\(\\mathrm{Re}(s) \\gg 0\\) and admitting meromorphic\n  continuation to all \\(s \\in \\mathbf{C}\\).", "uses": ["def:degenerate-principal-series", "def:chi-character"], "lean_name": "HSW.SiegelEisensteinSeries", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": null, "effort_local": 465, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3486}, "def:fourier-coefficient": {"id": "def:fourier-coefficient", "type": "definition", "title": "Fourier coefficient", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.2.}\n  Let \\(\\om_F\\) be the generic fiber of \\(\\om_X\\). The Eisenstein series admits a\n  Fourier expansion indexed by \\(T \\in \\Herm_n(F, \\om_F)\\):\n  \\[\n    E(g, s, \\Phi) = \\sum_{T \\in \\Herm_n(F, \\om_F)} E_T(g, s, \\Phi),\n  \\]\n  where\n  \\[\n    E_T(g, s, \\Phi) = \\int_{N_n(F) \\backslash N_n(\\BA)}\n      E(n(b)\\, g, s, \\Phi)\\, \\psi_0(\\langle T, b \\rangle)\\, dn(b),\n  \\]\n  with \\(\\langle T, b \\rangle = \\mathrm{Res}(-\\mathrm{Tr}(Tb))\\) and the Haar measure\n  \\(dn(b)\\) normalized so that \\(N_n(F) \\backslash N_n(\\BA)\\) has volume \\(1\\). For\n  \\emph{nonsingular} \\(T\\) (non-vanishing determinant) and factorizable\n  \\(\\Phi = \\bigotimes_v \\Phi_v\\), the Fourier coefficient factorizes as in\n  Lemma~\\ref{lem:fourier-coeff-factorization}.", "uses": ["def:siegel-eisenstein-series", "def:hermitian-spaces"], "lean_name": "HSW.FourierCoefficient", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": null, "effort_local": 755, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4241}, "def:local-whittaker": {"id": "def:local-whittaker", "type": "definition", "title": "Local Whittaker function", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.2.}\n  The \\emph{local Whittaker function} is\n  \\[\n    W_{T,v}(g_v, s, \\Phi_v) = \\int_{N_n(F_v)}\n      \\Phi_v\\!\\bigl(w_n^{-1} n(b)\\, g_v,\\, s\\bigr)\\,\n      \\psi_0(\\langle T, b \\rangle_v)\\, d_v n(b),\n    \\quad w_n = \\begin{pmatrix} 0 & 1_n \\\\ -1_n & 0 \\end{pmatrix},\n  \\]\n  where \\(d_v n(b)\\) is normalized so that \\(N_n(\\cO_v)\\) has volume \\(1\\). It\n  admits analytic continuation to all \\(s \\in \\mathbf{C}\\).", "uses": ["def:siegel-parabolic"], "lean_name": "HSW.LocalWhittakerFunction", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 435, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2538}, "def:normalized-fourier-coeff": {"id": "def:normalized-fourier-coeff", "type": "definition", "title": "Normalized Fourier coefficient", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S1.1 and \\S2.}\n  The \\emph{normalized Fourier coefficient}\n  \\(\\widetilde{E}_a(m(\\cE), s, \\Phi)\\) is the \\(a\\)-th Fourier coefficient of \\(E\\),\n  evaluated at \\(m(\\cE) \\in M_n(\\BA)\\) (the Levi element corresponding to the rank-\\(n\\)\n  bundle \\(\\cE\\)), and multiplied by certain normalization factors specified in \\S2 of\n  the paper. In this normalization, \\(s = 0\\) is the center of the functional equation.", "uses": ["def:fourier-coefficient", "def:siegel-parabolic", "def:levi-element-map"], "lean_name": "HSW.NormalizedFourierCoeff", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 4, "proof_size_tex": null, "effort_local": 431, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5267}, "def:central-value-d": {"id": "def:central-value-d", "type": "definition", "title": "Central value \\texorpdfstring{$d$}{d}", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], Theorem~1.1.}\n  For a rank-\\(n\\) vector bundle \\(\\cE\\) on \\(X'\\), set\n  \\[\n    d = d(\\cE) := -\\deg(\\cE) + n \\deg \\om_X = -\\chi(X', \\cE) \\in \\mathbf{Z}.\n  \\]", "uses": ["def:base-curve", "def:etale-cover"], "lean_name": "HSW.CentralValueD", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 4, "proof_size_tex": null, "effort_local": 179, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1337}, "thm:higher-siegel-weil": {"id": "thm:higher-siegel-weil", "type": "theorem", "title": "Higher Siegel--Weil formula for unitary groups", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], Theorem~1.1.}\n  Let \\(n \\geq 1\\) and \\(r \\geq 0\\). Let \\(\\cE\\) be a rank-\\(n\\) vector bundle on\n  \\(X'\\) and \\(a : \\cE \\to \\sigma^* \\cE^\\vee\\) an injective Hermitian map. Then\n  \\[\n    \\frac{1}{(\\log q)^r}\n    \\left(\\frac{d}{ds}\\right)^r\\!\\Bigg|_{s=0}\n    \\!\\bigl(q^{d s}\\,\\widetilde{E}_a(m(\\cE), s, \\Phi)\\bigr)\n    \\;=\\; \\deg[\\cZ_{\\cE}^r(a)],\n  \\]\n  where \\(d = d(\\cE) = -\\deg(\\cE) + n\\deg\\om_X\\) (see Definition~\\ref{def:central-value-d}).", "uses": ["def:normalized-fourier-coeff", "def:degree-special-cycle", "def:central-value-d", "def:hermitian-map", "def:etale-cover", "def:base-curve"], "lean_name": "HSW.higherSiegelWeilFormula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:fourier-coefficient, lem:fourier-coeff-factorization,\n        def:local-density, def:local-siegel-series, thm:cho-yamauchi,\n        def:special-cycle, def:virtual-fundamental-class,\n        lem:properness-special-cycle, def:degree-special-cycle,\n        def:hermitian-shtukas-stack}\n  The proof proceeds in three steps following \\S1.2 of the paper.\n\n  \\textbf{Step~1: Analytic side (\\S\\S2--5).}\n  Express \\(\\widetilde{E}_a(m(\\cE), s, \\Phi)\\) as a product of local Whittaker\n  functions using Lemma~\\ref{lem:fourier-coeff-factorization}.  Apply the\n  Cho--Yamauchi formula (Theorem~\\ref{thm:cho-yamauchi}) for local representation\n  densities of Hermitian lattices.  The cokernel \\(\\cQ = \\coker(a)\\) is a Hermitian\n  torsion sheaf on \\(X'\\), and both the Fourier coefficient and the density formula\n  depend only on \\(\\cQ\\). This yields a graded perverse sheaf\n  \\(\\cK^{\\mathrm{Eis}}_d = \\bigoplus_{i=0}^d \\cK^{\\mathrm{Eis}}_{d,i}\\) on\n  \\(\\Herm_{2d}(X'/X)\\), constructed from isotypical components of the Hermitian\n  Springer sheaf \\(\\mathrm{Spr}^{\\mathrm{Herm}}_{2d}\\) under the Weyl group\n  \\(W_d = (\\mathbf{Z}/2\\mathbf{Z})^d \\rtimes S_d\\), such that\n  \\[\n    \\widetilde{E}_a(m(\\cE), s, \\Phi) = \\sum_{i=0}^d\n      \\Tr\\!\\bigl(\\Frob_{\\cQ},\\; (\\cK^{\\mathrm{Eis}}_{d,i})_{\\cQ}\\bigr)\\, q^{-2is}.\n  \\]\n\n  \\textbf{Step~2: Geometric side (\\S\\S6--11).}\n  Express \\(\\deg[\\cZ_{\\cE}^r(a)]\\) as an intersection number on \\(\\Sht_{\\U(n)}^r\\).\n  Unfold via the Lefschetz trace formula using a Hitchin-type moduli stack\n  \\(\\mathcal{M}_d\\) (whose base \\(\\mathcal{A}_d\\) maps canonically to\n  \\(\\Herm_{2d}(X'/X)\\)).  The \\(r\\)-th power of a canonical endomorphism \\(C\\) on\n  the direct image \\(Rf_*\\overline{\\mathbf{Q}}_\\ell\\) of the Hitchin map\n  \\(f_d : \\mathcal{M}_d \\to \\mathcal{A}_d\\) descends to a graded perverse sheaf\n  \\(\\cK^{\\mathrm{Int}}_d = \\bigoplus_{i=0}^d \\cK^{\\mathrm{Int}}_{d,i}\\) on\n  \\(\\Herm_{2d}(X'/X)\\), graded by eigenvalues \\((d-2i)\\) of \\(C\\), such that\n  \\[\n    \\deg[\\cZ_{\\cE}^r(a)] = \\sum_{i=0}^d\n      \\Tr\\!\\bigl(\\Frob_{\\cQ},\\; (\\cK^{\\mathrm{Int}}_{d,i})_{\\cQ}\\bigr)\\cdot (d-2i)^r.\n  \\]\n\n  \\textbf{Step~3: Comparison (\\S12).}\n  Both \\(\\cK^{\\mathrm{Eis}}_d\\) and \\(\\cK^{\\mathrm{Int}}_d\\) are linear combinations of\n  isotypical summands of \\(\\mathrm{Spr}^{\\mathrm{Herm}}_{2d}\\) under \\(W_d\\). The\n  isomorphism \\(\\cK^{\\mathrm{Eis}}_d \\cong \\cK^{\\mathrm{Int}}_d\\) as graded perverse\n  sheaves reduces to an explicit identity of graded virtual representations of \\(W_d\\),\n  verified directly.\n\n  \\textbf{Conclusion.}\n  Substituting the graded isomorphism into the two expressions and differentiating\n  \\(q^{ds} \\sum_{i=0}^d c_i q^{-2is}\\) \\(r\\) times at \\(s = 0\\) gives\n  \\(\\frac{1}{(\\log q)^r} \\cdot (\\log q)^r \\sum_{i=0}^d c_i (d-2i)^r\\), matching the\n  geometric side.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 6, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 2789, "effort_local": 2789, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11352}, "lem:properness-special-cycle": {"id": "lem:properness-special-cycle", "type": "lemma", "title": "Properness of special cycles", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S1.1.}\n  If \\(a : \\cE \\to \\sigma^* \\cE^\\vee\\) is injective and \\(\\rank(\\cE) = n\\), then\n  \\(\\cZ_{\\cE}^r(a)\\) is proper over \\(\\mathbf{F}_q\\).", "uses": ["def:special-cycle", "def:hermitian-shtukas-stack", "def:hermitian-map"], "lean_name": "HSW.properSpecialCycle", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:special-cycle, def:hermitian-shtukas-stack}\n  The injectivity of \\(a\\) forces the virtual dimension of \\(\\cZ_{\\cE}^r(a)\\) to be\n  zero. Properness follows from the compactness of \\(\\Sht_{\\U(n)}^r\\) over\n  \\(\\mathbf{F}_q\\), established in Proposition~7.9 of the paper via the\n  Hermitian-shtuka structure and the projectivity of \\(X\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": 344, "effort_local": 344, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3488}, "lem:fourier-coeff-factorization": {"id": "lem:fourier-coeff-factorization", "type": "lemma", "title": "Fourier coefficient factorization", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.2 (cf.\\ Kudla 1997, \\S4).}\n  For nonsingular \\(T \\in \\Herm_n(F, \\om_F)\\) and factorizable\n  \\(\\Phi = \\bigotimes_v \\Phi_v\\),\n  \\[\n    E_T(g, s, \\Phi) = |\\om_X|_F^{-n^2/2} \\prod_v W_{T,v}(g_v, s, \\Phi_v).\n  \\]", "uses": ["def:fourier-coefficient", "def:local-whittaker"], "lean_name": "HSW.fourierCoeffFactorization", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:fourier-coefficient, def:local-whittaker}\n  Standard: follows from the Iwasawa decomposition and local-global compatibility of\n  the Weil representation. The factor \\(|\\om_X|_F^{-n^2/2}\\) is the ratio between the\n  global Haar measure \\(dn(b)\\) and the product of the local measures\n  \\(\\prod_v d_v n(b)\\). See Kudla (1997), \\S4.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 339, "effort_local": 339, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5015}, "def:local-density": {"id": "def:local-density", "type": "definition", "title": "Local density", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], \\S2.3.}\n  Let \\(F\\) be a non-archimedean local field with \\(\\mathrm{char}(F) \\neq 2\\),\n  \\(F'/F\\) either an unramified quadratic extension or \\(F \\times F\\), and let\n  \\(L, M\\) be Hermitian \\(\\cO_{F'}\\)-lattices with \\(\\cO_{F'}\\)-ranks \\(n\\) and \\(m\\)\n  respectively. The \\emph{local density} of integral representations of \\(M\\) by\n  \\(L\\) is\n  \\[\n    \\Den(M, L) := \\lim_{N \\to +\\infty}\n      \\frac{\\# \\Rep_{M,L}(\\cO_F / \\varpi^N)}{q^{N \\cdot \\dim(\\Rep_{M,L})_F}},\n  \\]\n  where \\(\\Rep_{M,L}\\) is the scheme of Hermitian \\(\\cO_F\\)-algebra homomorphisms from\n  \\(L\\) to \\(M\\). When the generic fiber \\((\\Rep_{M,L})_F \\neq \\varnothing\\), one has\n  \\(n \\leq m\\) and \\(\\dim(\\Rep_{M,L})_F = n(2m - n)\\).", "uses": ["def:base-curve"], "lean_name": "HSW.LocalDensity", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": null, "effort_local": 721, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1449}, "def:local-siegel-series": {"id": "def:local-siegel-series", "type": "definition", "title": "Local Siegel series", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], Theorem~2.3(2).}\n  There is a unique polynomial \\(\\Den(T, L) \\in \\mathbf{Z}[T]\\), called the\n  \\emph{(normalized) local Siegel series} of \\(L\\), characterized by\n  \\[\n    \\Den\\bigl((\\eta(\\varpi) q)^{-j},\\, L\\bigr) =\n      \\frac{\\Den(\\mathbf{1}^{n+j},\\, L)}{\\Den(\\mathbf{1}^{n+j},\\, \\mathbf{1}^n)}\n    \\quad \\text{for all } j \\geq 0,\n  \\]\n  where \\(\\mathbf{1}^m\\) denotes the self-dual Hermitian \\(\\cO_{F'}\\)-lattice of\n  rank \\(m\\) with Hermitian form given by the identity matrix.", "uses": ["def:local-density"], "lean_name": "HSW.LocalSiegelSeries", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 504, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1953}, "thm:cho-yamauchi": {"id": "thm:cho-yamauchi", "type": "theorem", "title": "Cho--Yamauchi formula", "chapter": "Overview", "statement": "\\textit{Source: [FYZ], Theorem~2.3.}\n  For a Hermitian \\(\\cO_{F'}\\)-lattice \\(L\\) of rank \\(n\\), the normalized local\n  Siegel series is\n  \\[\n    \\Den(T, L) = \\sum_{L \\subset L' \\subset L'^\\vee \\subset L^\\vee}\n      T^{2\\ell'(L'/L)}\\, \\mathfrak{m}(t'(L');\\, T),\n  \\]\n  where the sum is over \\(\\cO_{F'}\\)-lattices \\(L'\\) containing \\(L\\) in the\n  \\(F'\\)-Hermitian space spanned by \\(L\\) on which the Hermitian form is integral, and\n  \\[\n    \\mathfrak{m}(a;\\, T) := \\prod_{i=0}^{a-1}\\bigl(1 - (\\eta(\\varpi) q)^i T\\bigr)\n      \\in \\mathbf{Z}[T].\n  \\]\n  Here \\(\\ell'(\\cdot)\\) denotes length as an \\(\\cO_{F'}\\)-module and \\(t'(L')\\) is the\n  \\(k'\\)-rank of the radical of \\(L' \\otimes_{\\cO_F} k\\).", "uses": ["def:local-siegel-series", "def:local-density"], "lean_name": "HSW.choYamauchi", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:local-density, def:local-siegel-series}\n  The non-split case is [LZ22a, Thm.~3.5.1]. For the split case \\(F' = F \\times F\\),\n  one reduces to counting isometric embeddings over the residue field. Writing\n  \\(L_k = L \\otimes_{\\cO_F} k\\), a direct computation shows\n  \\[\n    \\# \\mathrm{Isom}_{\\mathbf{1}^m_k, L_k}(k)\n      = q^{m^2-(m-n)^2} \\prod_{i=0}^{n+a-1}(1 - q^{i-m}),\n    \\quad a = t'(L),\n  \\]\n  using the splitting formula\n  \\(\\# \\mathrm{Isom}(V_m, U_{n-a,a}) = \\# \\mathrm{Isom}(V_m, U_{n-a,0})\n    \\cdot \\# \\mathrm{Isom}(V_{m-(n-a)}, U_{0,a})\\),\n  which reduces to the two extremes \\(a = 0\\) and \\(a = n\\), each verified by a\n  count of injective linear maps between \\(k\\)-vector spaces.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 704, "effort_local": 704, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2657}, "def:herm-shtuka-chain": {"id": "def:herm-shtuka-chain", "type": "definition", "title": "Hermitian shtuka chain", "chapter": "The Geometric Side: Hermitian Shtukas and Virtual Fundamental Classes", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S5.1--5.2.}\n  A \\emph{rank-\\(n\\) Hermitian shtuka chain of level \\(r\\)} over a test scheme \\(S\\) is\n  a diagram of rank-\\(n\\) vector bundles\n  \\[\n    \\cE_0 \\xleftarrow{\\;f_1\\;} \\cE_1 \\xleftarrow{\\;f_2\\;} \\cdots \\xleftarrow{\\;f_r\\;}\n    \\cE_r\n  \\]\n  on \\(X' \\times S\\), together with Hermitian structures\n  \\(h_i : \\cE_i \\xrightarrow{\\sim} \\sigma^*\\cE_i^\\vee\\) and an isomorphism\n  \\(\\varphi : \\cE_r \\xrightarrow{\\sim} \\sigma^*\\cE_0^\\vee\\) compatible with all \\(h_i\\),\n  such that:\n  \\begin{enumerate}\n    \\item Each \\(f_i : \\cE_i \\to \\cE_{i-1}\\) is an \\emph{elementary modification}: an\n      injective bundle map whose cokernel is a skyscraper sheaf at a single closed point\n      \\(x'_i \\in X'(S)\\) of length \\(1\\).\n    \\item The composite\n      \\(\\cE_0 \\hookrightarrow \\cdots \\hookrightarrow \\cE_r \\xrightarrow{\\varphi}\n      \\sigma^*\\cE_0^\\vee\\)\n      is an injective Hermitian map (Definition~\\ref{def:hermitian-map}).\n  \\end{enumerate}\n  The moduli functor of such chains represents a locally Noetherian algebraic stack, which\n  is the explicit model of \\(\\Sht_{\\U(n)}^r\\) (Definition~\\ref{def:hermitian-shtukas-stack}).", "uses": ["def:hermitian-shtukas-stack", "def:etale-cover", "def:serre-dual-vb", "def:hermitian-map"], "lean_name": "HSW.HermShtukaChain", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Geometric_Side.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 11, "proof_size_tex": null, "effort_local": 1173, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3790}, "lem:line-bundle-dim": {"id": "lem:line-bundle-dim", "type": "lemma", "title": "Virtual dimension in the line-bundle case", "chapter": "The Geometric Side: Hermitian Shtukas and Virtual Fundamental Classes", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S6.1--6.3.}\n  When \\(n = 1\\) (i.e., \\(\\cE = \\cL\\) is a line bundle) and\n  \\(a : \\cL \\to \\sigma^*\\cL^\\vee\\) is an injective Hermitian map, the special cycle\n  \\(\\cZ_{\\cL}^r(a)\\) has virtual dimension \\(0\\): the expected codimension \\(r\\) cut\n  in \\(\\Sht_{\\U(1)}^r\\) (which has virtual dimension \\(r\\)) is achieved exactly.", "uses": ["def:herm-shtuka-chain", "def:special-cycle", "def:base-curve"], "lean_name": "HSW.lineBundleVirtualDim", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:herm-shtuka-chain, def:special-cycle}\n  The moduli stack \\(\\Sht_{\\U(1)}^r\\) has virtual dimension \\(r\\): each elementary\n  modification in the shtuka chain contributes \\(1\\) to the dimension count\n  (a point of \\(X'\\)), giving \\(r\\) parameters. The Hermitian condition imposed by\n  \\(a\\) is a degree-\\(r\\) closed condition that cuts out a zero-dimensional substack.\n  Formally, the \\(r\\) elementary modifications at legs \\(x'_1, \\ldots, x'_r \\in X'(S)\\)\n  together with the constraint that the composite map equals \\(a\\) impose \\(r\\) scalar\n  conditions (one per leg) on the \\(r\\)-dimensional space of legs, leaving virtual\n  dimension \\(0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Geometric_Side.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 652, "effort_local": 652, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4969}, "def:virtual-class-lb": {"id": "def:virtual-class-lb", "type": "definition", "title": "Virtual class in the line-bundle case", "chapter": "The Geometric Side: Hermitian Shtukas and Virtual Fundamental Classes", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S6.4--6.6.}\n  For a line bundle \\(\\cL\\) on \\(X'\\) and an injective Hermitian map\n  \\(a : \\cL \\to \\sigma^*\\cL^\\vee\\), the \\emph{virtual fundamental class}\n  \\[\n    [\\cZ_{\\cL}^r(a)] \\in \\Ch_0(\\cZ_{\\cL}^r(a))_{\\mathbf{Q}}\n  \\]\n  is defined as the intersection product of the \\(r\\) relative effective Cartier divisors\n  \\(D_1, \\ldots, D_r\\) on \\(\\Sht_{\\U(1)}^r\\), where \\(D_i\\) is the divisor defined by the\n  \\(i\\)-th elementary modification \\(\\cE_{i-1} \\leftarrow \\cE_i\\) (i.e., the zero locus\n  of the modification map viewed as a section of a line bundle). The intersection\n  \\(D_1 \\cdot D_2 \\cdots D_r\\) lies in \\(\\Ch_0\\) by Lemma~\\ref{lem:line-bundle-dim}.", "uses": ["lem:line-bundle-dim", "def:special-cycle", "def:base-curve", "def:virtual-fundamental-class"], "lean_name": "HSW.VirtualClassLineBdl", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Geometric_Side.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 705, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6209}, "def:good-framing": {"id": "def:good-framing", "type": "definition", "title": "Good framing", "chapter": "The Geometric Side: Hermitian Shtukas and Virtual Fundamental Classes", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S8.1--8.3.}\n  Let \\(\\cE\\) be a rank-\\(n\\) vector bundle on \\(X'\\) with an injective Hermitian map\n  \\(a : \\cE \\to \\sigma^*\\cE^\\vee\\). A \\emph{good framing} for \\((\\cE, a)\\) is a\n  datum \\((\\cL_1, \\ldots, \\cL_n, \\phi)\\) consisting of line bundles \\(\\cL_i\\) on\n  \\(X'\\) and an isomorphism\n  \\[\n    \\phi : \\cL_1 \\oplus \\cdots \\oplus \\cL_n \\xrightarrow{\\;\\sim\\;} \\cE\n  \\]\n  such that the induced Hermitian map\n  \\(a_\\phi := \\phi^{-1} \\circ a \\circ \\phi : \\bigoplus \\cL_i \\to\n  \\sigma^*\\bigoplus \\cL_i^\\vee\\)\n  is diagonal (i.e., \\(a_\\phi = \\mathrm{diag}(a_{11}, \\ldots, a_{nn})\\) with each\n  \\(a_{ii} : \\cL_i \\to \\sigma^*\\cL_i^\\vee\\) injective Hermitian).\n  Good framings exist after passing to an étale cover of the base \\(S\\).", "uses": ["def:herm-shtuka-chain", "def:special-cycle", "def:etale-cover"], "lean_name": "HSW.GoodFraming", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Geometric_Side.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 771, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5088}, "lem:framing-independence": {"id": "lem:framing-independence", "type": "lemma", "title": "Independence of framing", "chapter": "The Geometric Side: Hermitian Shtukas and Virtual Fundamental Classes", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S\\S9--10.}\n  For any two good framings \\(\\phi_1, \\phi_2\\) of \\((\\cE, a)\\), the virtual fundamental\n  classes they define in \\(\\Ch_0(\\cZ_{\\cE}^r(a))_{\\mathbf{Q}}\\) are equal.", "uses": ["def:good-framing", "def:virtual-class-lb", "def:special-cycle"], "lean_name": "HSW.framingIndependence", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:good-framing, def:virtual-class-lb}\n  Any two good framings differ by an element \\(g \\in \\GL_n\\) (acting on\n  \\(\\bigoplus \\cL_i\\)), and the diagonal Hermitian maps transform by\n  \\(a \\mapsto g \\cdot a \\cdot {}^t\\bar{g}\\). The intersection class\n  \\([\\cZ_{\\cE}^r(a_\\phi)] = \\prod_i [\\cZ_{\\cL_i}^r(a_{ii})]\\) depends only on the\n  diagonal entries \\(a_{ii}\\), which transform by the \\(\\GL_n\\)-action.  A direct\n  computation on intersection products shows the class is invariant under this\n  action: the permutation matrix \\(S_n\\)-action on the \\(\\cL_i\\) permutes the\n  factors of the product, and the \\((\\mathbf{Z}/2\\mathbf{Z})^n\\)-action (changing\n  sign of some \\(a_{ii}\\)) preserves injectivity and the class. Independence then\n  follows by descent, since good framings form an étale torsor.\n", "lean_s emize}\n    \\item the \\(S_d\\)-action permutes the steps of the flag \\((\\cQ_\\bullet)\\);\n    \\item the \\((\\mathbf{Z}/2\\mathbf{Z})^d\\)-action applies the Hermitian involution\n      \\(\\iota\\) on individual graded pieces \\(\\cQ_i/\\cQ_{i-1}\\).\n  \\end{itemize}\n  This is the Hermitian analogue of Laumon's Springer sheaf on \\(\\mathrm{Coh}_d(X)\\).", "uses": ["def:herm-springer-resolution", "def:herm-torsion-stack"], "lean_name": "HSW.HermSpringerSheaf", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Hermitian_Springer.tex", "lean_file": "", "dep_count": 2, "rdep_count": 6, "descendant_count": 11, "proof_size_tex": null, "effort_local": 965, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4052}, "thm:springer-decomp": {"id": "thm:springer-decomp", "type": "theorem", "title": "Decomposition of the Hermitian Springer sheaf", "chapter": "Hermitian Springer Theory", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S4.2--4.3.}\n  There is a canonical \\(W_d\\)-equivariant decomposition\n  \\[\n    \\mathrm{Spr}^{\\mathrm{Herm}}_{2d}\n    \\;\\cong\\;\n    \\bigoplus_{\\chi \\in \\mathrm{Irr}(W_d)}\n    V_\\chi \\otimes_{\\Ql} \\mathrm{IC}_\\chi\n  \\]\n  in \\(\\mathrm{Perv}(\\Herm_{2d}(X'/X), \\Ql)\\), where:\n  \\begin{itemize}\n    \\item \\(\\mathrm{Irr}(W_d)\\) is the set of irreducible \\(\\Ql\\)-representations of\n      \\(W_d\\), parameterized by bipartitions \\((\\lambda, \\mu)\\) with\n      \\(|\\lambda| + |\\mu| = d\\);\n    \\item \\(V_\\chi\\) is the underlying \\(\\Ql\\)-vector space of the irreducible\n      representation \\(\\chi\\) of \\(W_d\\);\n    \\item \\(\\mathrm{IC}_\\chi\\) is the intersection cohomology complex on\n      \\(\\Herm_{2d}(X'/X)\\) associated to the \\(\\chi\\)-isotypical local system on\n      the open stratum.\n  \\end{itemize}\n  The multiplicity of \\(\\mathrm{IC}_\\chi\\) in  d(\\cE) = -\\deg(\\cE) + n\\deg\\om_X\\)\n  (Definition~\\ref{def:central-value-d}).", "uses": ["def:K-Eis", "def:normalized-fourier-coeff", "def:central-value-d", "def:herm-torsion-stack", "def:fourier-coefficient"], "lean_name": "HSW.traceFrob_Eis", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:K-Eis, def:normalized-fourier-coeff}\n  By definition of \\(\\cK_d^{\\mathrm{Eis}}\\): the Frobenius trace at \\(\\cQ\\) computes\n  the automorphic coefficient by the function-sheaf dictionary\n  (Grothendieck--Lefschetz trace formula for \\(\\ell\\)-adic sheaves). Expanding the\n  Eisenstein series \\(\\widetilde{E}_a\\) as a sum over \\(\\Herm_{2d}(\\mathbf{F}_q)\\)\n  with weights \\(|\\mathrm{Aut}(\\cQ)|^{-1}\\), the grading by \\(q^{-2is}\\) records\n  the \\(\\ell\\)-adic weight filtration, and the sum over graded pieces gives the\n  stated formula.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Perverse_Sheaves_K.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 539, "effort_local": 539, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9896}, "thm:trace-Int": {"id": "thm:trace-Int", "type": "theorem", "title": "Frobenius trace formula: intersection side", "chapter": "Perverse Sheaves \\texorpdfstring{$\\cK_d^{\\mathrm{Eis", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S14.1, eq.~(1.3).}\n  For \\(\\cQ \\in \\Herm_{2d}(\\mathbf{F}_q)\\), \\(d \\geq 0\\), and \\(r = d\\),\n  the graded Frobenius trace formula holds:\n  \\[\n    \\deg[\\cZ_{\\cE}^r(a)]\n    \\;=\\;\n    \\sum_{i=0}^{d}\n    \\Tr\\!\\bigl(\\Frob_q,\\; (\\cK^{\\mathrm{Int}}_{d,i})_{\\overline{\\cQ}}\\bigr)\n    \\cdot (d - 2i)^r,\n  \\]\n  where \\(\\cK^{\\mathrm{Int}}_d = \\bigoplus_{i=0}^d \\cK^{\\mathrm{Int}}_{d,i}\\) is graded\n  by eigenvalues \\((d-2i)\\) of the canonical endomorphism \\(\\bar{C}\\) on\n  \\(Rf_{d*}\\Ql\\) (the Hitchin endomorphism), and\n  \\(\\deg[\\cZ_{\\cE}^r(a)]\\) is the degree of the virtual fundamental class from\n  Definition~\\ref{def:virtual-class-full}.", "uses": ["def:K-Int", "def:degree-special-cycle", "def:virtual-class-full", "def:herm-torsion-stack"], "lean_name": "HSW.traceFrob_Int", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:K-Int, def:virtual-class-full}\n  By the Grothendieck--Lefschetz trace formula, the Frobenius trace of\n  \\((f_{d*}\\Ql)_{\\overline{\\cQ}}\\) counts \\(\\mathbf{F}_q\\)-points of the fiber\n  \\(f_d^{-1}(\\cQ)\\) weighted by \\(|\\mathrm{Aut}|^{-1}\\). By the virtual class\n  construction (Definition~\\ref{def:virtual-class-full}), this weighted count equals\n  \\(\\deg[\\cZ_{\\cE}^r(a)]\\). The grading by \\((d-2i)^r\\) arises from the Hitchin\n  endomorphism \\(\\bar{C}\\) on the Hitchin fibration: its eigenvalues on the fiber\n  stalk are \\((d-2i)\\), and raising to the \\(r\\)-th power recovers the factor\n  needed to match the \\(r\\)-th derivative at \\(s = 0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Perverse_Sheaves_K.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 649, "effort_local": 649, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15139}, "def:W-d-group": {"id": "def:W-d-group", "type": "definition", "title": "Weyl group \\texorpdfstring{$W_d$}{Wd}", "chapter": "\\texorpdfstring{$W_d$", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S3.1, \\S4.1.}\n  For \\(d \\geq 0\\), the \\emph{Weyl group of type \\(B_d\\)/\\(C_d\\)} is\n  \\[\n    W_d = (\\mathbf{Z}/2\\mathbf{Z})^d \\rtimes S_d,\n  \\]\n  where \\(S_d\\) acts on \\((\\mathbf{Z}/2\\mathbf{Z})^d\\) by permuting coordinates.\n  Concretely, elements of \\(W_d\\) are pairs \\((\\varepsilon, \\sigma)\\) with\n  \\(\\varepsilon \\in \\{0,1\\}^d\\) and \\(\\sigma \\in S_d\\), with group law\n  \\((\\varepsilon_1, \\sigma_1) \\cdot (\\varepsilon_2, \\sigma_2) =\n  (\\varepsilon_1 + \\sigma_1(\\varepsilon_2),\\; \\sigma_1 \\sigma_2)\\).\n  The group \\(W_d\\) has order \\(2^d \\cdot d!\\); it is the Weyl group of the\n  symplectic group \\(\\mathrm{Sp}_{2d}\\) and of the unitary group\n  \\(\\U(d,d)\\) acting on \\(\\Herm_{2d}(X'/X)\\).", "uses": ["def:base-curve"], "lean_name": "HSW.WdGroup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Wd_Representations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 735, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1463}, "def:wd-rep-ring": {"id": "def:wd-rep-ring", "type": "definition", "title": "Graded virtual representation ring", "chapter": "\\texorpdfstring{$W_d$", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S4.1.}\n  The \\emph{graded virtual representation ring} of \\(W_d\\) is\n  \\[\n    R(W_d) := K_0(\\Rep_{\\Ql}(W_d)) \\otimes_{\\mathbf{Z}} \\mathbf{Z}[t],\n  \\]\n  the Grothendieck ring of finite-dimensional \\(\\Ql\\)-representations of \\(W_d\\),\n  tensored with the polynomial ring in a formal grading variable \\(t\\). An element\n  of \\(R(W_d)\\) is a formal \\(\\mathbf{Z}\\)-linear combination\n  \\(\\sum_{i \\geq 0} [V_i]\\, t^i\\) of virtual representations \\([V_i]\\) graded by\n  cohomological degree.\n  As a \\(\\mathbf{Z}\\)-module, \\(K_0(\\Rep_{\\Ql}(W_d))\\) is free on the set of\n  irreducible \\(\\Ql\\)-representations of \\(W_d\\).", "uses": ["def:W-d-group"], "lean_name": "HSW.WdRepRing", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Wd_Representations.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": null, "effort_local": 655, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2118}, "def:wd-irr-chars": {"id": "def:wd-irr-chars", "type": "definition", "title": "Irreducible representations of \\texorpdfstring{$W_d$}{Wd}", "chapter": "\\texorpdfstring{$W_d$", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S4.2; Geck--Pfeiffer, Ch.~5.}\n  The irreducible \\(\\Ql\\)-representations of \\(W_d\\) are parameterized by\n  \\emph{bipartitions} \\((\\lambda, \\mu)\\) of \\(d\\): ordered pairs of partitions with\n  \\(|\\lambda| + |\\mu| = d\\). For each such bipartition, there is an irreducible\n  representation\n  \\[\n    \\rho_{\\lambda,\\mu} \\in \\mathrm{Irr}(W_d)\n  \\]\n  of dimension \\(\\binom{d}{|\\lambda|} \\dim V_\\lambda \\cdot \\dim V_\\mu\\),\n  where \\(V_\\lambda\\) and \\(V_\\mu\\) are the Specht modules for \\(S_{|\\lambda|}\\)\n  and \\(S_{|\\mu|}\\) respectively. The representation \\(\\rho_{\\lambda,\\mu}\\) is\n  induced from the subgroup \\(S_{|\\lambda|} \\times (\\mathbf{Z}/2\\mathbf{Z})^{|\\mu|}\n  \\times S_{|\\mu|} \\leq W_d\\) via appropriate sign characters; the full character\n  table is determined by Clifford theory.", "uses": ["def:wd-rep-ring", "def:W-d-group"], "lean_name": "HSW.WdIrrChars", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Wd_Representations.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": null, "effort_local": 827, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2945}, "lem:wd-eis-formula": {"id": "lem:wd-eis-formula", "type": "lemma", "title": "\\texorpdfstring{$W_d$}{Wd}-formula for \\texorpdfstring{$\\cK_d^{\\mathrm{Eis}}$}{K-Eis}", "chapter": "\\texorpdfstring{$W_d$", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S13.1--13.3.}\n  As a virtual \\(W_d\\)-module (expressed via the decomposition\n  \\(\\mathrm{Spr}^{\\mathrm{Herm}}_{2d} \\cong \\bigoplus_\\chi V_\\chi \\otimes \\mathrm{IC}_\\chi\\)\n  from Theorem~\\ref{thm:springer-decomp} of Chapter~\\ref{chap:hermitian-springer}), the\n  Eisenstein perverse sheaf satisfies:\n  \\[\n    [\\cK_d^{\\mathrm{Eis}}]\n    = \\sum_{\\substack{(\\lambda,\\mu) \\\\ |\\lambda|+|\\mu|=d}}\n      c_{\\lambda,\\mu}^{\\mathrm{Eis}}(q) \\cdot [\\rho_{\\lambda,\\mu}]\n    \\;\\in\\; R(W_d),\n  \\]\n  where the coefficients \\(c_{\\lambda,\\mu}^{\\mathrm{Eis}}(q)\\) are explicit polynomials\n  in \\(q^{1/2}\\) computed from the Fourier coefficient expansion of the Eisenstein series\n  via the Cho--Yamauchi polynomial (Theorem~\\ref{thm:cho-yamauchi} of\n  Chapter~\\ref{chap:overview}). Explicitly:\n  \\[\n    c_{\\lambda,\\mu}^{\\mathrm{Eis}}(q)\n    \\;=\\;\n    \\prod_{\\square \\in \\lambda} \\bigl(1 - q^{c(\\square)}\\bigr) \\cdot\n    \\prod_{\\square \\in \\mu} \\bigl(1 + q^{c(\\square)}\\bigr),\n  \\]\n  where the product runs over boxes \\(\\square\\) in the Young diagrams of \\(\\lambda\\)\n  and \\(\\mu\\), and \\(c(\\square)\\) is the content of \\(\\square\\).", "uses": ["def:wd-irr-chars", "def:K-Eis", "def:springer-sheaf-herm"], "lean_name": "HSW.wdEisFormula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:K-Eis, def:wd-irr-chars}\n  By Theorem~\\ref{thm:trace-Eis} (Chapter~\\ref{chap:perverse-sheaves-K}), the Frobenius\n  trace of \\(\\cK_d^{\\mathrm{Eis}}\\) at \\(\\cQ\\) equals the normalized Fourier coefficient\n  \\(\\widetilde{E}_a(m(\\cE), 0, \\Phi)\\). Expanding via the Cho--Yamauchi polynomial and\n  the Euler product formula for the Siegel--Eisenstein series, one computes the trace\n  function on \\(\\Herm_{2d}(\\mathbf{F}_q)\\). Decomposing this trace function into\n  class functions on \\(W_d\\) (via the combinatorial correspondence between\n  \\(\\Herm_{2d}(\\mathbf{F}_q)\\)-orbits and \\(W_d\\)-conjugacy classes) and applying the\n  character orthogonality relations yields the explicit formula for\n  \\(c_{\\lambda,\\mu}^{\\mathrm{Eis}}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Wd_Representations.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 732, "effort_local": 732, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10346}, "lem:wd-int-formula": {"id": "lem:wd-int-formula", "type": "lemma", "title": "\\texorpdfstring{$W_d$}{Wd}-formula for \\texorpdfstring{$\\cK_d^{\\mathrm{Int}}$}{K-Int}", "chapter": "\\texorpdfstring{$W_d$", "statement": "\\textit{Source: Feng--Yun--Zhang [MR4689373], \\S14.2--14.3.}\n  As a virtual \\(W_d\\)-module, the intersection perverse sheaf satisfies:\n  \\[\n    [\\cK_d^{\\mathrm{Int}}]\n    = \\sum_{\\substack{(\\lambda,\\mu) \\\\ |\\lambda|+|\\mu|=d}}\n      c_{\\lambda,\\mu}^{\\mathrm{Int}}(q) \\cdot [\\rho_{\\lambda,\\mu}]\n    \\;\\in\\; R(W_d),\n  \\]\n  where the coefficients \\(c_{\\lambda,\\mu}^{\\mathrm{Int}}(q)\\) are computed from the\n  virtual fundamental class formula (Definition~\\ref{def:virtual-class-full},\n  Chapter~\\ref{chap:geometric-side}):\n  \\[\n    c_{\\lambda,\\mu}^{\\mathrm{Int}}(q)\n    \\;=\\;\n    \\prod_{\\square \\in \\lambda} \\bigl(1 - q^{c(\\square)}\\bigr) \\cdot\n    \\prod_{\\square \\in \\mu} \\bigl(1 + q^{c(\\square)}\\bigr)\n    \\;=\\;\n    c_{\\lambda,\\mu}^{\\mathrm{Eis}}(q).\n  \\]", "uses": ["def:wd-irr-chars", "def:K-Int", "def:springer-sheaf-herm", "def:virtual-class-full"], "lean_name": "HSW.wdIntFormula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:K-Int, def:wd-irr-chars, def:virtual-class-full}\n  By Theorem~\\ref{thm:trace-Int} (Chapter~\\ref{chap:perverse-sheaves-K}), the Frobenius\n  trace of \\(\\cK_d^{\\mathrm{Int}}\\) equals (up to a grading factor) the degree\n  \\(\\deg[\\cZ_{\\cE}^r(a)]\\). The virtual class computation in\n  Definition~\\ref{def:virtual-class-full} (using good framings and intersection products\n  of line-bundle divisors) gives an ex
