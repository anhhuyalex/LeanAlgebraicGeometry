<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">

  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>

      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

enoted \\(\\mathfrak{X}_\\theta\\) and \\(\\mathfrak{X}_\\theta^S\\). The corresponding primitive and \\(S\\)-imprimitive Selmer groups for \\(M_E\\) are defined by the same kernel conditions, but this chapter does not enter the \\(M_E[p]\\) comparison theory.", "uses": [], "lean_name": "MR4372220.Local.iwasawaAlgebra", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 0, "rdep_count": 20, "descendant_count": 32, "proof_size_tex": null, "effort_local": 1902, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1902}, "def:char-ideal": {"id": "def:char-ideal", "type": "definition", "title": "Characteristic ideal", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Standard Iwasawa theory, characteristic ideals of torsion \\(\\Lambda\\)-modules.}\n\n  Let \\(M\\) be a finitely generated torsion \\(\\Lambda\\)-module. The \\emph{characteristic ideal} of \\(M\\) is\n  \\[\n    \\mathrm{char}_\\Lambda(M) = \\prod_{\\mathfrak{P}} \\mathfrak{P}^{\\mathrm{length}_{\\Lambda_\\mathfrak{P}}(M_\\mathfrak{P})} \\subset \\Lambda,\n  \\]\n  where the product runs over height-one primes \\(\\mathfrak{P}\\) of \\(\\Lambda\\). It is a principal ideal \\(\\mathrm{char}_\\Lambda(M) = (f_M)\\) for some \\(f_M \\in \\Lambda\\) (since \\(\\Lambda\\) is a UFD). The \\emph{\\(\\mu\\)-invariant} of \\(M\\) is \\(\\mu(M) = \\mathrm{ord}_{(p)}(f_M)\\) and the \\emph{\\(\\lambda\\)-invariant} is \\(\\lambda(M) = \\deg(\\bar{f}_M)\\) where \\(\\bar{f}_M \\in \\mathbb{Z}_p[T]\\) is the image of \\(f_M\\) after the choice of topological generator \\(\\gamma \\in \\Gamma\\).\n\n  Key properties: (1) \\(\\mathrm{char}_\\Lambda\\) is multiplicative on short exact sequences of torsion \\(\\Lambda\\)-modules; (2) \\(\\mu(M) = 0\\) and \\(\\lambda(M) = n\\) iff \\(\\mathrm{length}_{\\mathbb{F}_p}(M[p]) = n\\) (when \\(M\\) has no non-trivial finite submodules); (3) if \\(M\\) and \\(N\\) are pseudo-isomorphic then \\(\\mathrm{char}_\\Lambda(M) = \\mathrm{char}_\\Lambda(N)\\).", "uses": ["def:iwasawa-algebra"], "lean_name": "MR4372220.Local.charIdeal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 1207, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3109}, "lem:commalg": {"id": "lem:commalg", "type": "lemma", "title": "Commutative algebra criterion", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Local cohomology groups of characters, \\(w\\mid p\\).}\n  Let \\(X\\) be a finitely generated \\(\\Lambda\\)-module. If \\(X[T]=0\\) and \\(X/TX\\) is a free \\(\\mathbb{Z}_p\\)-module of rank \\(r\\), then \\(X\\) is a free \\(\\Lambda\\)-module of rank \\(r\\).", "uses": ["def:iwasawa-algebra"], "lean_name": "MR4372220.Local.commAlgCriterion", "proved": false, "mathlib_ok": false, "proof_tex": "\nUse Nakayama to produce a surjection \\(\\Lambda^r\\twoheadrightarrow X\\), then compare modulo \\(T\\). The condition \\(X[T]=0\\) kills the kernel after reduction, and a second Nakayama argument shows that the kernel is already zero.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": 227, "effort_local": 227, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2129}, "lem:local-char-wneqp": {"id": "lem:local-char-wneqp", "type": "lemma", "title": "Split local cohomology away from \\(p\\)", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Local cohomology groups of characters, \\(w\\nmid p\\) split in \\(K\\).}\n  For a prime \\(w\\nmid p\\) split in \\(K\\), the local dual \\(H^1(K_w,M_\\theta)^\\vee\\) is \\(\\Lambda\\)-torsion with characteristic ideal generated by \\(\\mathcal{P}_w(\\theta)\\). In particular, \\(H^1(K_w,M_\\theta)^\\vee\\) has \\(\\mu=0\\).", "uses": ["def:iwasawa-algebra"], "lean_name": "MR4372220.Local.localCohomologySplit", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe key point is that \\(w\\) is finitely decomposed in \\(K_\\infty/K\\), so the local cohomology is governed by the unramified quotient of inertia. The characteristic ideal is the local Euler factor, and therefore no nontrivial \\(\\mu\\)-part can appear.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 15, "proof_size_tex": 249, "effort_local": 249, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2151}, "lem:local-char-wp": {"id": "lem:local-char-wp", "type": "proposition", "title": "Local cohomology at \\(p\\)", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Local cohomology groups of characters, \\(w\\mid p\\).}\n  Let \\(\\omega : G_{\\mathbb{Q}}\\to \\mathbb{F}_p^\\times\\) be the mod \\(p\\) cyclotomic character, and let \\(w\\mid p\\) be a place of \\(K\\). If \\(\\theta|_{G_w}\\neq 1,\\omega\\), then the restriction map\n  \\[\n    H^1(K_w,M_\\theta)\\to H^1(I_w,M_\\theta)^{G_w/I_w}\n  \\]\n  is an isomorphism, and \\(H^1(K_w,M_\\theta)\\) is \\(\\Lambda\\)-cofree of rank \\(1\\).", "uses": ["def:iwasawa-algebra", "lem:commalg"], "lean_name": "MR4372220.Local.localCohomologyAtP", "proved": false, "mathlib_ok": false, "proof_tex": "\nInjectivity comes from the vanishing of \\(M_\\theta^{G_w}\\), and the cofree statement is reduced to a rank computation for the Pontryagin dual. The quotient by \\(T\\) vanishes on the character module, so \\cref{lem:commalg} applies after local duality and the local Euler characteristic formula.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 15, "proof_size_tex": 292, "effort_local": 292, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2421}, "thm:mu-zero-theta": {"id": "thm:mu-zero-theta", "type": "theorem", "title": "Rubin--Hida \\(\\mu=0\\) theorem", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Selmer groups of characters.}\n  If \\(\\theta|_{G_{\\bar v}}\\neq 1,\\omega\\), then \\(\\mathfrak{X}_\\theta\\) is a torsion \\(\\Lambda\\)-module with \\(\\mu=0\\).", "uses": ["def:iwasawa-algebra", "lem:local-char-wneqp", "lem:local-char-wp"], "lean_name": "MR4372220.Local.muZeroTheta", "proved": false, "mathlib_ok": false, "proof_tex": "\nIdentify the Selmer group with the \\(\\theta\\)-isotypic component of the relevant anticyclotomic class group by Shapiro's lemma and class field theory. Rubin's main-conjecture input gives the characteristic ideal, and Hida's vanishing of the \\(\\mu\\)-invariant for the Katz \\(p\\)-adic \\(L\\)-function gives the conclusion.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 14, "proof_size_tex": 319, "effort_local": 319, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2989}, "prop:lambda-theta": {"id": "prop:lambda-theta", "type": "proposition", "title": "Imprimitive \\(\\lambda\\)-formula", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Selmer groups of characters.}\n  If \\(\\theta|_{G_{\\bar v}}\\neq 1,\\omega\\), then \\(\\mathfrak{X}_\\theta^S\\) is a torsion \\(\\Lambda\\)-module with \\(\\mu=0\\), and\n  \\[\n    \\lambda(\\mathfrak{X}_\\theta^S)\n    = \\lambda(\\mathfrak{X}_\\theta) + \\sum_{w\\in S,\\; w\\nmid p}\\lambda(\\mathcal{P}_w(\\theta)).\n  \\]\n  Moreover, \\(H^1_{\\mathcal{F}_{\\mathrm{Gr}}^S}(K,M_\\theta[p])\\) is finite and\n  \\[\n    \\dim_{\\mathbb{F}_p}\\bigl(H^1_{\\mathcal{F}_{\\mathrm{Gr}}^S}(K,M_\\theta[p])\\bigr)=\\lambda(\\mathfrak{X}_\\theta^S).\n  \\]", "uses": ["def:iwasawa-algebra", "thm:mu-zero-theta", "lem:local-char-wneqp", "lem:local-char-wp"], "lean_name": "MR4372220.Local.lambdaTheta", "proved": false, "mathlib_ok": false, "proof_tex": "\nCompare the primitive and \\(S\\)-imprimitive Selmer groups by exactness of localisation, then use \\cref{thm:mu-zero-theta} and the split-prime local calculation to read off the Euler-factor contribution to \\(\\lambda\\). The absence of nonzero pseudo-null submodules turns the \\(\\lambda\\)-invariant into the size of the residual Selmer group.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": 339, "effort_local": 339, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3328}, "cor:characters": {"id": "cor:characters", "type": "corollary", "title": "Residual exactness", "chapter": "Local Iwasawa Selmer", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, Corollary (Residual Exactness).}\n  If \\(\\theta|_{G_{\\bar v}}\\neq 1,\\omega\\), then \\(H^2(K^\\Sigma/K,M_\\theta[p])=0\\), and the residual sequence\n  \\[\n    0\\to H^1_{\\mathcal{F}_{\\mathrm{Gr}}^S}(K,M_\\theta[p])\\to H^1(K^\\Sigma/K,M_\\theta[p])\\to H^1(K_{\\bar v},M_\\theta[p])\\to 0\n  \\]\n  is exact.", "uses": ["def:iwasawa-algebra", "prop:lambda-theta", "lem:local-char-wp"], "lean_name": "MR4372220.Local.charactersResidualExactness", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe previous proposition gives \\(H^2(K^\\Sigma/K,M_\\theta)=0\\), and the short exact sequence induced by multiplication by \\(p\\) then identifies the residual \\(H^2\\)-group. Divisibility of the imprimitive Selmer group and the \\(\\Lambda\\)-cofreeness of the local term at \\(\\bar v\\) force the snake-lemma sequence to be exact.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Local_Iwasawa_Selmer.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": 322, "effort_local": 322, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3650}, "prop:modp-E": {"id": "prop:modp-E", "type": "proposition", "title": "Residual comparison for \\(E[p", "chapter": "Algebraic Iwasawa Comparison", "statement": "\\)]\n  \n  \n  \n  \n  \n  \\textit{Source: MR4372220, Selmer groups of E.}\n  The short exact sequence \\(0 \\to M_\\phi[p] \\to M_E[p] \\to M_\\psi[p] \\to 0\\) induces a natural exact sequence\n  \\[\n  0 \\to \\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_\\phi[p]) \\to \\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_E[p]) \\to\n  \\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_\\psi[p]) \\to 0.\n  \\]\n  In particular, the imprimitive residual Selmer group of \\(E\\) is finite, and its \\(\\mathbb F_p\\)-dimension is the sum of the corresponding character dimensions.", "uses": ["def:iwasawa-algebra", "cor:characters"], "lean_name": "MR4372220.Algebraic.residualComparison", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe restriction diagram at \\(\\bar v\\) has exact rows for \\(\\phi\\), \\(\\psi\\), and \\(E\\). Applying the snake lemma gives the exact sequence on \\(S\\)-imprimitive residual Selmer groups. The finiteness and dimension statement follows by adding the character-side residual dimensions.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Algebraic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 9, "proof_size_tex": 279, "effort_local": 279, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3929}, "prop:modp-E-tors": {"id": "prop:modp-E-tors", "type": "proposition", "title": "Torsion and \\(\\mu=0\\) for \\(E\\)", "chapter": "Algebraic Iwasawa Comparison", "statement": "\\textit{Source: MR4372220, Selmer groups of E.}\n  The natural map\n  \\[\n  \\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_E[p]) \\simeq \\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_E)[p]\n  \\]\n  identifies the residual and \\(p\\)-torsion Selmer groups. Consequently, \\(\\mathfrak X_E^S\\) and \\(\\mathfrak X_E\\) are \\(\\Lambda\\)-torsion, and both have \\(\\mu\\)-invariant zero.", "uses": ["prop:modp-E"], "lean_name": "MR4372220.Algebraic.muZeroE", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe assumption on \\(\\phi|_{G_p}\\) forces \\(E(K_{\\bar v})[p]=0\\), so the local \\(p\\)-torsion comparison at \\(\\bar v\\) is an isomorphism. The finiteness of the residual group then implies \\(\\mu=0\\) for \\(\\mathfrak X_E^S\\), and the quotient map \\(\\mathfrak X_E^S \\twoheadrightarrow \\mathfrak X_E\\) gives the same conclusion for \\(\\mathfrak X_E\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Algebraic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": 343, "effort_local": 343, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4272}, "cor:lambda-E": {"id": "cor:lambda-E", "type": "corollary", "title": "No finite submodules", "chapter": "Algebraic Iwasawa Comparison", "statement": "\\textit{Source: MR4372220, Selmer groups of E.}\n  The module \\(\\mathfrak X_E^S\\) has no non-trivial finite \\(\\Lambda\\)-submodules, and\n  \\[\n  \\lambda(\\mathfrak X_E^S)=\\dim_{\\mathbb F_p}\\rH^1_{\\Fcal_{\\rm Gr}^S}(K,M_E[p]).\n  \\]", "uses": ["prop:modp-E-tors", "lem:local-char-wp"], "lean_name": "MR4372220.Algebraic.lambdaE", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe dual local cohomology at \\(\\bar v\\) is \\(\\Lambda\\)-cofree, so the standard Greenberg quotient argument removes finite submodules. Combined with the identification of residual and \\(p\\)-torsion Selmer groups from the previous proposition, this gives the \\(\\lambda\\)-dimension formula.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Algebraic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 287, "effort_local": 287, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4559}, "MAINalgside": {"id": "MAINalgside", "type": "theorem", "title": "Algebraic Iwasawa comparison", "chapter": "Algebraic Iwasawa Comparison", "statement": "\\textit{Source: MR4372220, Comparison I: Algebraic Iwasawa invariants.}\n  Assume that \\(\\phi|_{G_p}\\neq \\mathds{1},\\omega\\). Then \\(\\mathfrak X_E\\) is \\(\\Lambda\\)-torsion with \\(\\mu(\\mathfrak X_E)=0\\), and\n  \\[\n  \\lambda(\\mathfrak X_E)=\\lambda(\\mathfrak X_\\phi)+\\lambda(\\mathfrak X_\\psi)\n  +\\sum_{w\\in S}\\Bigl(\\lambda(\\mathcal P_w(\\phi))+\\lambda(\\mathcal P_w(\\psi))-\\lambda(\\mathcal P_w(E))\\Bigr).\n  \\]", "uses": ["prop:modp-E-tors", "cor:lambda-E", "prop:lambda-theta"], "lean_name": "MR4372220.Algebraic.mainAlgSide", "proved": false, "mathlib_ok": false, "proof_tex": "\nThe torsion and \\(\\mu\\)-vanishing part is already supplied by Proposition~\\ref{prop:modp-E-tors}. For the \\(\\lambda\\)-invariant, the corollary gives the residual comparison on the \\(E\\)-side, while the character-side formula supplies the corresponding identity for \\(\\mathfrak X_\\phi\\) and \\(\\mathfrak X_\\psi\\). The only remaining step is to subtract the local split-prime Euler factors, whose \\(E\\)-contribution is \\(\\mathcal P_w(E)\\) and whose character contributions are \\(\\mathcal P_w(\\phi)\\) and \\(\\mathcal P_w(\\psi)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Algebraic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 524, "effort_local": 524, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5083}, "thm:BDP": {"id": "thm:BDP", "type": "theorem", "title": "BDP anticyclotomic \\(p\\)-adic \\(L\\)-function", "chapter": "Analytic Iwasawa Comparison", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, MR4372220, §Analytic side, \\S{}\\(p\\)-adic \\(L\\)-functions, Theorem~BDP.}\n\n  There exists an element \\(\\Lcal_E \\in \\Lambda^{\\mathrm{ur}}\\) characterized by the following interpolation property. For every character \\(\\xi\\) of \\(\\Gamma\\) crystalline at both \\(v\\) and \\(\\bar{v}\\) and corresponding to a Hecke character of \\(K\\) of infinity type \\((n,-n)\\) with \\(n\\in\\mathbb{Z}_{>0}\\) and \\(n\\equiv 0\\pmod{p-1}\\), we have\n  \\[\n    \\Lcal_E(\\xi)\n    = \\frac{\\Omega_p^{4n}}{\\Omega_\\infty^{4n}}\n      \\cdot\\frac{\\Gamma(n)\\Gamma(n+1)\\,\\xi(\\mathfrak{N}^{-1})}{4\\,(2\\pi)^{2n+1}\\sqrt{D_K}^{2n-1}}\n      \\cdot\\bigl(1 - a_p\\xi(\\bar{v})p^{-1} + \\xi(\\bar{v})^2 p^{-1}\\bigr)^2\n      \\cdot L(f/K,\\xi,1),\n  \\]\n  where \\(\\Omega_p\\) and \\(\\Omega_\\infty\\) are the CM periods attached to \\(K\\), \\(f\\in S_2(\\Gamma_0(N))\\) is the newform associated with \\(E\\), and the Euler factor \\(\\bigl(1-a_p\\xi(\\bar{v})p^{-1}+\\xi(\\bar{v})^2p^{-1}\\bigr)^2\\) is nonzero under our hypotheses.", "uses": ["def:iwasawa-algebra"], "lean_name": "MR4372220.Analytic.bdpLFunction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  The element \\(\\Lcal_E\\) was originally constructed in Bertolini--Darmon--Prasanna as a continuous function of \\(\\xi\\), and later explicitly constructed as a measure by Castella--Hsieh, following the approach of Brakočević. The construction proceeds via Serre--Tate theory: for a class \\([\\mathfrak{a}]\\) in \\(\\mathrm{Pic}(\\mathcal{O}_c)\\) (for an auxiliary integer \\(c\\) prime to \\(Np\\)), the newform \\(f\\) admits a Serre--Tate expansion \\(f(t_{\\mathfrak{a}})\\in\\mathbb{Z}_p^{\\mathrm{ur}}\\llbracket t_{\\mathfrak{a}}-1\\rrbracket\\), which defines a \\(\\mathbb{Z}_p^{\\mathrm{ur}}\\)-valued measure \\(\\mathrm{d}\\mu_{f,\\mathfrak{a}}\\) on \\(\\mathbb{Z}_p\\) via Mahler's theorem. Using the \\(p\\)-depletion \\(f^\\flat\\) and an auxiliary anticyclotomic Hecke character \\(\\eta\\) of infinity type \\((1,-1)\\) and conductor \\(c\\), one forms the measure \\(\\mathscr{L}_{v,\\eta}\\in\\Lambda^{\\mathrm{ur}}\\) by integrating against \\(\\eta_v\\)-twists. The element \\(\\Lcal_E\\) is then defined by \\(\\Lcal_E(\\xi) := \\mathscr{L}_{v,\\eta}(\\eta^{-1}\\xi)^2\\), and the stated interpolation formula follows from the computation in Castella--Hsieh.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Analytic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 12, "proof_size_tex": 1113, "effort_local": 1113, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3015}, "thm:Katz": {"id": "thm:Katz", "type": "theorem", "title": "Katz anticyclotomic \\(p\\)-adic \\(L\\)-function", "chapter": "Analytic Iwasawa Comparison", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, MR4372220, §Analytic side, Katz \\(p\\)-adic \\(L\\)-functions, Theorem~\\(\\ref{thm:Katz}\\).}\n\n  Let \\(\\theta : G_{\\mathbb{Q}}\\to\\mathbb{Z}_p^\\times\\) be a Dirichlet character of conductor \\(C\\) with \\(C\\mid N\\), and let \\(\\mathfrak{C}\\mid\\mathfrak{N}\\) be such that \\(\\mathcal{O}_K/\\mathfrak{C} = \\mathbb{Z}/C\\mathbb{Z}\\). There exists an element \\(\\Lcal_\\theta\\in\\Lambda^{\\mathrm{ur}}\\) characterized by the following interpolation property. For every character \\(\\xi\\) of \\(\\Gamma\\) crystalline at both \\(v\\) ence", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:BDP, thm:Katz}\n  By Theorem~34 and Remark~32 of Kriz, the hypothesis on \\(E[p]\\) implies a congruence of \\(p\\)-adic modular forms \\(f\\equiv G\\pmod{p}\\), where \\(G\\) is a weight-two Eisenstein series of type \\(E_2^{\\phi,\\phi^{-1},(N)}\\). Viewing \\(G\\) as a \\(p\\)-adic modular form, its Serre--Tate expansions define \\(\\mathbb{Z}_p^{\\mathrm{ur}}\\)-valued measures \\(\\mu_{G,\\mathfrak{a}}\\) on \\(\\mathbb{Z}_p\\) by the same rule as in the proof of \\cref{thm:BDP}. The corresponding measure element \\(\\Lcal_G \\in \\Lambda^{\\mathrm{ur}}\\) is defined by \\(\\Lcal_G(\\xi) := \\mathscr{L}_{v,\\eta}(G, \\eta^{-1}\\xi)\\). The interpolation computation of Kriz (Prop.~37 of \\emph{op.\\,cit.}, with \\(\\chi^{-1} = \\xi\\mathbf{N}_K\\), \\(\\psi_1 = \\phi\\), \\(\\psi_2 = \\phi^{-1} = \\psi\\omega^{-1}\\)) then gives \\(\\Lcal_G = \\mathcal{E}_{\\phi,\\psi}^\\iota\\cdot\\Lcal_\\phi\\), using that \\(\\mathcal{E}_{\\phi,\\psi}(\\xi^{-1}) = \\Xi_{\\xi^{-1}\\mathbf{N}_K^{-1}}(\\phi,\\psi\\omega^{-1}, N_+, N_-, N_0)\\). On the other hand, the congruence \\(f\\equiv G\\pmod{p}\\) implies \\(\\Lcal_E \\equiv (\\Lcal_G)^2 \\pmod{p\\Lambda^{\\mathrm{ur}}}\\). Combining these two identities yields the stated congruence.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Analytic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 1160, "effort_local": 1160, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5003}, "cor:Kriz": {"id": "cor:Kriz", "type": "corollary", "title": "mu/lambda formula for \\(\\Lcal_E\\)", "chapter": "Analytic Iwasawa Comparison", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, MR4372220, §Analytic side, Comparison II, Theorem~\\(\\ref{cor:Kriz}\\).}\n\n  Under the hypotheses of \\cref{thm:kriz}, we have \\(\\mu(\\Lcal_E) = 0\\) and\n  \\[\n    \\lambda(\\Lcal_E)\n    = \\lambda(\\Lcal_\\phi) + \\lambda(\\Lcal_\\psi)\n      + \\sum_{w\\in S}\\bigl\\{\\lambda(\\mathcal{P}_w(\\phi)) + \\lambda(\\mathcal{P}_w(\\psi)) - \\lambda(\\mathcal{P}_w(E))\\bigr\\},\n  \\]\n  where \\(S\\) is the set of primes \\(w\\nmid p\\) in \\(\\Sigma\\) split in \\(K\\).", "uses": ["thm:kriz", "thm:Katz", "def:iwasawa-algebra"], "lean_name": "MR4372220.Analytic.krizLambda", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kriz}\n  Since \\(K\\) satisfies the Heegner and split hypotheses, the conductors of \\(\\phi\\) and \\(\\psi\\) are only divisible by primes split in \\(K\\). Therefore \\(\\mu(\\Lcal_E) = 0\\) follows from the congruence of \\cref{thm:kriz} and Hida's theorem \\(\\mu = 0\\) for Katz \\(p\\)-adic \\(L\\)-functions (note that the Euler factor terms \\(\\mathcal{P}_w(\\phi)\\) and \\(\\mathcal{P}_w(\\psi)\\) also have vanishing \\(\\mu\\)-invariant, since the primes \\(w\\) are split in \\(K\\)).\n\n  For the \\(\\lambda\\)-invariant formula, the involution \\(\\gamma\\mapsto\\gamma^{-1}\\) of \\(\\Lambda\\) preserves \\(\\lambda\\)-invariants, so\n  \\[\n    \\lambda(\\mathcal{P}_w(\\theta)^2) = \\lambda(\\mathcal{P}_w(\\theta)) + \\lambda(\\mathcal{P}_{\\bar{w}}(\\theta)),\n  \\]\n  using that complex conjugation acts as inversion on \\(\\Gamma\\). For the term \\(\\mathcal{E}_{\\phi,\\psi}\\) from \\cref{thm:kriz} we therefore get\n  \\[\n    \\lambda((\\mathcal{E}_{\\phi,\\psi}^\\iota)^2)\n    = \\sum_{w\\mid N_0 N_-}\\lambda(\\mathcal{P}_w(\\phi)) + \\sum_{w\\mid N_0 N_+}\\lambda(\\mathcal{P}_w(\\psi)),\n  \\]\n  where \\(w\\) runs over all divisors. Using the congruence relations in \\cref{thm:kriz} (in particular \\(a_\\ell\\equiv 0\\pmod{p}\\) for \\(\\ell\\mid N_0\\)), this rewrites as\n  \\[\n    \\lambda((\\mathcal{E}_{\\phi,\\psi}^\\iota)^2)\n    = \\sum_{w\\in S}\\bigl\\{\\lambda(\\mathcal{P}_w(\\phi)) + \\lambda(\\mathcal{P}_w(\\psi)) - \\lambda(\\mathcal{P}_w(E))\\bigr\\}.\n  \\]\n  Since \\(\\psi = \\phi^{-1}\\omega\\), the functional equation for the Katz \\(p\\)-adic \\(L\\)-function gives \\(\\lambda(\\Lcal_\\psi) = \\lambda(\\Lcal_\\phi)\\). The result now follows from \\cref{thm:kriz} combined with these two identities.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Analytic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1622, "effort_local": 1622, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6625}, "mulambda": {"id": "mulambda", "type": "theorem", "title": "Analytic-algebraic lambda comparison", "chapter": "Analytic Iwasawa Comparison", "statement": "\\textit{Source: Castella--Grossi--Lee--Skinner, MR4372220, §Analytic side, Comparison II, Theorem~\\(\\ref{mulambda}\\).}\n\n  Assume \\(E[p]^{ss} = \\mathbb{F}_p(\\phi)\\oplus\\mathbb{F}_p(\\psi)\\) with \\(\\phi|_{G_p}\\neq\\mathds{1},\\omega\\). Then\n  \\[\n    \\mu(\\Lcal_E) = \\mu(\\mathfrak{X}_E) = 0\n    \\quad\\text{and}\\quad\n    \\lambda(\\Lcal_E) = \\lambda(\\mathfrak{X}_E).\n  \\]", "uses": ["cor:Kriz", "MAINalgside"], "lean_name": "MR4372220.Analytic.mulambda", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:Kriz, MAINalgside}\n  The vanishing \\(\\mu(\\mathfrak{X}_E) = 0\\) is the algebraic conclusion of \\cref{MAINalgside}, and \\(\\mu(\\Lcal_E) = 0\\) is \\cref{cor:Kriz}. For the \\(\\lambda\\)-equality, Rubin's proof of Iwasawa's main conjecture for \\(K\\) gives in particular \\(\\lambda(\\Lcal_\\phi) = \\lambda(\\mathfrak{X}_\\phi)\\) and \\(\\lambda(\\Lcal_\\psi) = \\lambda(\\mathfrak{X}_\\psi)\\). Substituting these equalities into the formula of \\cref{cor:Kriz} and comparing with the algebraic comparison formula of \\cref{MAINalgside} (which expresses \\(\\lambda(\\mathfrak{X}_E)\\) in terms of \\(\\lambda(\\mathfrak{X}_\\phi)\\), \\(\\lambda(\\mathfrak{X}_\\psi)\\), and the local Euler factors) yields \\(\\lambda(\\Lcal_E) = \\lambda(\\mathfrak{X}_E)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Analytic_Iwasawa_Comparison.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 727, "effort_local": 727, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10533}, "def:selmer-triple": {"id": "def:selmer-triple", "type": "definition", "title": "Selmer triple and Kolyvagin system", "chapter": "Howard--Kolyvagin Bound", "statement": "\\textit{Source: MR4372220, §A Kolyvagin system argument, Selmer structures and Kolyvagin systems.}\n\n  Let \\((R, \\mathfrak{m})\\) be a complete Noetherian local ring with finite residue field of characteristic \\(p\\), and let \\(T\\) be a compact \\(R\\)-module with continuous \\(G_K\\)-action unramified outside a finite set of primes.\n  A \\emph{Selmer structure} \\(\\mathcal{F}\\) on \\(T\\) is a finite set \\(\\Sigma = \\Sigma(\\mathcal{F})\\) of places of \\(K\\) containing \\(\\infty\\), the primes above \\(p\\), and the ramified primes, together with a choice of \\(R\\)-submodules (local conditions) \\(\\rH^1_{\\mathcal{F}}(K_w, T) \\subset \\rH^1(K_w, T)\\) for every \\(w \\in \\Sigma\\). The associated Selmer group is\n  \\[\n    \\rH^1_{\\mathcal{F}}(K, T) := \\ker\\!\\left\\{\\rH^1(K^\\Sigma/K, T) \\to \\prod_{w \\in \\Sigma} \\frac{\\rH^1(K_w, T)}{\\rH^1_{\\mathcal{F}}(K_w, T)}\\right\\}.\n  \\]\n\n  Let \\(\\mathcal{L}_0 = \\mathcal{L}_0(T)\\) be the set of rational primes \\(\\ell \\neq p\\) that are inert in \\(K\\) and at which \\(T\\) is unramified. For \\(\\lambda \\mid \\ell \\in \\mathcal{L}_0\\), let \\(I_\\ell\\) be the smallest ideal containing \\(\\ell + 1\\) for which \\(\\mathrm{Frob}_\\lambda \\in G_{K_\\lambda}\\) acts trivially on \\(T/I_\\ell T\\), and set \\(G_\\ell = \\mathrm{Gal}(K[\\ell]/K[1])\\). There is a \\emph{finite-singular comparison isomorphism}\n  \\[\n    \\phi_\\lambda^{\\mathrm{fs}} : \\rH^1_{\\mathrm{f}}(K_\\lambda, T/I_\\ell T) \\xrightarrow{\\sim} T/I_\\ell T \\xrightarrow{\\sim} \\rH^1_{\\mathrm{s}}(K_\\lambda, T/I_\\ell T) \\otimes G_\\ell.\n  \\]\n\n  A \\emph{Selmer triple} \\((T, \\mathcal{F}, \\mathcal{L})\\) is the data of a Selmer structure \\(\\mathcal{F}\\) on \\(T\\) and a subset \\(\\mathcal{L} \\subset \\mathcal{L}_0\\) with \\(\\mathcal{L} \\cap \\Sigma(\\mathcal{F}) = \\emptyset\\). For pairwise coprime integers \\(a, b, c\\) divisible only by primes in \\(\\mathcal{L}_0\\), the \\emph{modified Selmer group} \\(\\rH^1_{\\mathcal{F}^a_b(c)}(K, T)\\) has \\(\\Sigma(\\mathcal{F}^a_b(c)) = \\Sigma(\\mathcal{F}) \\cup \\{w \\mid abc\\}\\) and local conditions equal to \\(\\rH^1(K_\\lambda, T)\\) at \\(\\lambda \\mid a\\), to zero at \\(\\lambda \\mid b\\), to the transverse condition \\(\\rH^1_{\\mathrm{tr}}(K_\\lambda, T)\\) at \\(\\lambda \\mid c\\), and to \\(\\rH^1_{\\mathcal{F}}(K_w, T)\\) otherwise.\n\n  For \\(n \\in \\mathcal{N}(\\mathcal{L})\\) the set of squarefree products of primes in \\(\\mathcal{L}\\), set \\(I_n = \\sum_{\\ell \\mid n} I_\\ell\\) and \\(G_n = \\bigotimes_{\\ell \\mid n} G_\\ell\\). A \\emph{Kolyvagin system} for \\((T, \\mathcal{F}, \\mathcal{L})\\) is a collection\n  \\[\n    \\kappa = \\bigl\\{\\kappa_n \\in \\rH^1_{\\mathcal{F}(n)}(K, T/I_n T) \\otimes G_n\\bigr\\}_{n \\in \\mathcal{N}}\n  \\]\n  satisfying \\((\\phi_\\lambda^{\\mathrm{fs}} \\otimes 1)(\\mathrm{loc}_\\lambda(\\kappa_n)) = \\mathrm{loc}_\\lambda(\\kappa_{n\\ell})\\) for all \\(n\\ell \\in \\mathcal{N}\\). The \\(R\\)-module of Kolyvagin systems is denoted \\(\\mathbf{KS}(T, \\mathcal{F}, \\mathcal{L})\\).\n\n  The ordinary Selmer structure \\(\\mathcal{F}_{\\mathrm{ord}}\\) on \\(T_\\alpha := T_p E \\otimes_{\\mathbb{Z}_p} R(\\alpha)\\) for a character \\(\\alpha : \\Gamma \\to R^\\times\\) uses the image of \\(\\rH^1(K_w, \\mathrm{Fil}_w^+(T_\\alpha))\\) at primes \\(w \\mid p\\) and the unramified "\n  \\uses{def:selmer-triple}\n  The proof is a standard application of the Čebotarev density theorem. The set \\(\\mathcal{L}^{(k)}\\) consists of primes \\(\\ell\\) for which the Frobenius \\(\\mathrm{Frob}_\\ell\\) at \\(\\ell\\) (in \\(\\mathrm{Gal}(\\mathbb{Q}(T^{(k)}, E[I_\\ell])/\\mathbb{Q})\\)) satisfies the Kolyvagin density condition. By the Čebotarev theorem this set has positive density. For a given nonzero class \\(x\\), the evaluation map \\(\\mathrm{loc}_\\lambda(x)\\) is a nonzero element of the singular cohomology at the primes in \\(\\mathcal{L}^{(k)}\\); the density argument provides a prime \\(\\ell\\) where this evaluation is a generator. The finite index set \\(\\{{\\rm primes} \\mid n\\}\\) is excluded by restricting to \\(\\ell\\nmid n\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Howard_Kolyvagin.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": 726, "effort_local": 726, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6266}, "lem:kolyvagin-inductive-step": {"id": "lem:kolyvagin-inductive-step", "type": "lemma", "title": "Kolyvagin inductive step", "chapter": "Howard--Kolyvagin Bound", "statement": "\\textit{Source: MR4372220, §A Kolyvagin system argument, Bounding Selmer groups, inductive step.}\n\n  Let \\((T, \\mathcal{F}, \\mathcal{L})\\) be a Selmer triple, fix \\(k \\geq 0\\), and for \\(n \\in \\mathcal{N}^{(k)}\\) write\n  \\[\n    \\rH^1_{\\mathcal{F}(n)}(K, T^{(k)}) \\simeq (R^{(k)})^{\\varepsilon} \\oplus M^{(k)}(n) \\oplus M^{(k)}(n)\n  \\]\n  for the structure furnished by Howard's Proposition~1.5.5 (\\(\\varepsilon \\in \\{0,1\\}\\) independent of \\(k,n\\)). If \\(\\kappa \\in \\mathbf{KS}(T, \\mathcal{F}, \\mathcal{L})\\) has \\(\\kappa_n \\neq 0\\), then for the prime \\(\\ell \\in \\mathcal{L}^{(k)}\\) supplied by \\cref{lem:cebotarev-kolyvagin},\n  \\[\n    \\mathrm{length}_{R^{(k)}}(M^{(k)}(n)) \\leq \\mathrm{length}_{R^{(k)}}(M^{(k)}(n\\ell)).\n  \\]\n  Taking \\(n = 1\\) and iterating gives\n  \\[\n    \\mathrm{length}_{R^{(k)}}(M^{(k)}(1)) \\leq \\mathrm{length}_{R^{(k)}}\\!\\left(\\rH^1_{\\mathcal{F}_{\\mathrm{ord}}}(K, T^{(k)}) / R^{(k)} \\cdot \\kappa_1^{(k)}\\right).\n  \\]", "uses": ["def:selmer-triple", "lem:cebotarev-kolyvagin"], "lean_name": "MR4372220.Howard.kolyvaginInductiveStep", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:selmer-triple, lem:cebotarev-kolyvagin}\n  Given \\(\\kappa_n \\neq 0\\) in \\(\\rH^1_{\\mathcal{F}(n)}(K, T^{(k)}) \\simeq (R^{(k)})^{\\varepsilon} \\oplus M^{(k)}(n)^2\\), \\cref{lem:cebotarev-kolyvagin} supplies \\(\\ell \\in \\mathcal{L}^{(k)}\\) such that \\(\\mathrm{loc}_\\lambda(\\kappa_n)\\) generates the singular cohomology \\(\\rH^1_{\\mathrm{s}}(K_\\lambda, T^{(k)}/I_\\ell T^{(k)}) \\otimes G_\\ell\\). The Kolyvagin system norm relation \\((\\phi_\\lambda^{\\mathrm{fs}} \\otimes 1)(\\mathrm{loc}_\\lambda(\\kappa_n)) = \\mathrm{loc}_\\lambda(\\kappa_{n\\ell})\\) from \\cref{def:selmer-triple} implies that \\(\\mathrm{loc}_\\lambda(\\kappa_{n\\ell}) \\neq 0\\) in the finite part, and hence \\(\\kappa_{n\\ell}\\) contributes to \\(M^{(k)}(n\\ell)\\) via the structure theorem. The comparison of the two module structures via the exact sequence relating \\(\\rH^1_{\\mathcal{F}(n\\ell)}\\) and \\(\\rH^1_{\\mathcal{F}(n)}\\) (which inserts the transverse condition at \\(\\lambda\\)) then gives the length inequality by a counting argument.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Howard_Kolyvagin.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 996, "effort_local": 996, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7262}, "thm:Zp-twisted": {"id": "thm:Zp-twisted", "type": "theorem", "title": "\\(\\mathbb{Z}_p\\)-twisted Kolyvagin bound", "chapter": "Howard--Kolyvagin Bound", "statement": "\\textit{Source: MR4372220, §A Kolyvagin system argument, Bounding Selmer groups.}\n\n  Let \\(\\Phi/\\mathbb{Q}_p\\) be a finite extension with ring of integers \\(R\\). Let \\(\\alpha : \\Gamma \\to R^\\times\\) be a character with \\(\\alpha \\neq 1\\). Set \\(T_\\alpha = T_p E \\otimes_{\\mathbb{Z}_p} R(\\alpha)\\) and \\(A_\\alpha = T_\\alpha \\otimes_R \\Phi/R\\). Define\n  \\[\n    C_\\alpha =\n    \\begin{cases}\n      v_p\\!\\bigl(\\alpha(\\gamma) - \\alpha^{-1}(\\gamma)\\bigr) & \\text{if } \\alpha \\neq \\alpha^{-1}, \\\\\n      0 & \\text{if } \\alpha = \\alpha^{-1},\n    \\end{cases}\n  \\]\n  and let \\(E_\\alpha \\geq 0\\) be a constant depending only on \\(C_\\alpha\\), \\(T_p E\\), and \\(\\mathrm{rank}_{\\mathbb{Z}_p}(R)\\).\n\n  If there is a Kolyvagin system \\(\\kappa_\\alpha \\in \\mathbf{KS}(T_\\alpha, \\mathcal{F}_{\\mathrm{ord}}, \\mathcal{L}_E)\\) with \\(\\kappa_{\\alpha,1} \\neq 0\\), then \\(\\rH^1_{\\mathcal{F}_{\\mathrm{ord}}}(K, T_\\alpha)\\) has rank one over \\(R\\), and there is a finite \\(R\\)-module \\(M_\\alpha\\) such that\n  \\[\n    \\rH^1_{\\mathcal{F}_{\\mathrm{ord}}}(K, A_\\alpha) \\simeq (\\Phi/R) \\oplus M_\\alpha \\oplus M_\\alpha\n  \\]\n  with\n  \\[\n    \\mathrm{length}_R(M_\\alpha) \\leq \\mathrm{length}_R\\!\\left(\\rH^1_{\\mathcal{F}_{\\mathrm{ord}}}(K, T_\\alpha) / R \\cdot \\kappa_{\\alpha,1}\\right) + E_\\alpha.\n  \\]", "uses": ["def:selmer-triple", "def:iwasawa-algebra", "lem:cebotarev-kolyvagin", "lem:kolyvagin-inductive-step"], "lean_name": "MR4372220.Howard.zpTwistedBound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:selmer-triple, def:iwasawa-algebra}\n  The proof runs by induction on the level \\(k\\) of mod-\\(\\mathfrak{m}^k\\) approximations. Set \\(R^{(k)} = R/\\mathfrak{m}^k R\\), \\(T^{(k)} = T_\\alpha/\\mathfrak{m}^k T_\\alpha\\), and let \\(\\mathcal{L}^{(k)} \\subset \\mathcal{L}_E\\) be the subset of primes with \\(I_\\ell \\subset p^k \\mathbb{Z}_p\\).\n\n e divisibility in \\textup{(ii)} holds in \\(\\Lambda[1/p]\\).", "uses": ["thm:howard", "thm:howard-HPKS", "def:iwasawa-algebra"], "lean_name": "MR4372220.Howard.heegnerHoward", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:howard, thm:howard-HPKS}\n  By \\cref{thm:howard-HPKS}, there exists \\(\\kappa^{\\mathrm{Hg}} \\in \\mathbf{KS}(\\mathbf{T}, \\mathcal{F}_\\Lambda, \\mathcal{L}_E)\\) with \\(\\kappa_1^{\\mathrm{Hg}} \\neq 0\\). Applying \\cref{thm:howard} to this Kolyvagin system immediately yields the pseudo-isomorphism \\(\\mathcal{X} \\sim \\Lambda \\oplus M \\oplus M\\) and the divisibility of \\(\\mathrm{char}_\\Lambda(M)\\) by \\(\\mathrm{char}_\\Lambda(\\rH^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})/\\Lambda\\kappa_1^{\\mathrm{Hg}})\\) in \\(\\Lambda[1/p, 1/(\\gamma-1)]\\).\n\n  The refinement to \\(\\Lambda[1/p]\\): the additional corank-one hypothesis implies \\(\\mathrm{ord}_{\\mathfrak{P}_0}(\\mathrm{char}_\\Lambda(\\mathcal{X}_{\\mathrm{tors}})) = 0\\) (as shown in the corollary to \\cref{thm:howard} in the source), which removes the \\(1/(\\gamma-1)\\) denominator and gives the divisibility in \\(\\Lambda[1/p]\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Howard_Kolyvagin.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 870, "effort_local": 870, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15767}, "def:bdp-class": {"id": "def:bdp-class", "type": "definition", "title": "BDP \\(\\Lambda\\)-adic Heegner class", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: MR4372220, §Proof of Theorem C and Corollary D.}\n  The \\emph{BDP \\(\\Lambda\\)-adic Heegner class} is a canonical element\n  \\[\n    \\kappa_\\infty \\in \\rH^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})\n  \\]\n  interpolating Heegner points over the anticyclotomic tower. Specifically, for each crystalline character \\(\\xi\\) of \\(\\Gamma\\) of infinity type \\((n,-n)\\) with \\(n > 0\\) and \\(n \\equiv 0 \\pmod{p-1}\\), the evaluation \\(\\kappa_\\infty(\\xi) \\in \\rH^1_{\\mathcal{F}_{\\mathrm{ord}}}(K, T_\\xi)\\) satisfies the explicit BDP interpolation formula of \\cref{thm:BDP}. The class \\(\\kappa_\\infty\\) and the Howard Heegner class \\(\\kappa_1^{\\mathrm{Hg}}\\) of \\cref{thm:howard-HPKS} generate the same \\(\\Lambda\\)-submodule of \\(\\rH^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})\\).", "uses": ["def:iwasawa-algebra", "thm:BDP"], "lean_name": "MR4372220.Applications.bdpClass", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 8, "proof_size_tex": null, "effort_local": 769, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3784}, "thm:control-jsw": {"id": "thm:control-jsw", "type": "theorem", "title": "Anticyclotomic control theorem (Jetchev--Skinner--Wan)", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: Jetchev--Skinner--Wan, anticyclotomic control theorem (Theorem~3.3.1 of \\emph{loc.~cit.}).}\n  Assume the hypotheses of \\cref{thm:thmA}, and let \\(P \\in E(K)\\) be a Heegner point of infinite order. Assume \\(E(K)[p] = 0\\). Let \\(\\mathcal{F}_E \\in \\Lambda\\) generate \\(\\mathrm{char}_\\Lambda(\\mathfrak{X}_E)\\). Then\n  \\[\n    \\#(\\mathbb{Z}_p / \\mathcal{F}_E(0)\\mathbb{Z}_p)\n    = \\#\\sha(E/K)[p^\\infty]\n      \\cdot \\left(\\frac{[(1 - a_p + p)/p]\\cdot\\log_{\\omega_E} P}{[E(K) : \\mathbb{Z}\\cdot P]_p}\\right)^2\n      \\cdot \\prod_{w \\mid N} c_w(E/K)_p,\n  \\]\n  where \\(\\log_{\\omega_E}\\) is the formal group logarithm attached to the Néron differential \\(\\omega_E\\), \\([E(K):\\mathbb{Z}{\\cdot}P]_p\\) is the \\(p\\)-part of the index, and \\(c_w(E/K)\\) are the Tamagawa numbers.", "uses": ["def:iwasawa-algebra", "def:bdp-class", "def:char-ideal"], "lean_name": "MR4372220.Applications.controlJSW", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:iwasawa-algebra, def:bdp-class}\n  This is Theorem~3.3.1 of Jetchev--Skinner--Wan, adapted to the Greenberg Selmer structure. The key input is that \\(\\mathcal{F}_E(0) = u \\cdot \\mathcal{L}_E(0)\\) for a \\(p\\)-adic unit \\(u \\in (\\mathbb{Z}_p^{\\mathrm{ur}})^\\times\\) (by \\cref{thm:thmA}), and the specialization of the control theorem at the trivial character gives the stated formula. The proof is sorry-backed at this stage; the Lean verification will supply the missing comparison details.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 498, "effort_local": 498, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5489}, "thm:padic-gz": {"id": "thm:padic-gz", "type": "theorem", "title": "BDP \\(p\\)-adic Gross--Zagier formula", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: Castella--Hsieh, BDP \\(p\\)-adic Gross--Zagier formula.}\n  Let \\(P_K \\in E(K)\\) be the Heegner point. Assume \\(E(K)[p] = 0\\) and let \\(a_p^2 - (a_p^2 - 4p)^{1/2} \\in \\mathbb{Z}_p\\) be the unit root of \\(X^2 - a_p X + p = 0\\). Under the BDP interpolation formula,\n  \\[\n    \\mathcal{L}_E(0) = c_E^{-2}\\bigl(1 - a_p p^{-1} + p^{-1}\\bigr)^2 \\cdot \\log_{\\omega_E}(P_K)^2,\n  \\]\n  where \\(c_E = [E(K) : \\mathbb{Z} \\cdot P_K]_p\\) is the \\(p\\)-part of the index. Equivalently, \\(\\mathrm{ord}_p(\\mathcal{L}_E(0)) = 2\\,\\mathrm{ord}_p(\\log_{\\omega_E}(P_K))\\).", "uses": ["thm:BDP", "def:bdp-class"], "lean_name": "MR4372220.Applications.padicGrossZagier", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:BDP, def:bdp-class}\n  This is the specialization of the BDP interpolation formula of \\cref{thm:BDP} at the trivial character \\(\\xi = 1\\), via the explicit formula of Castella--Hsieh. The key computation is that the Euler factor \\((1 - a_p\\xi(\\bar{v})p^{-1} + \\xi(\\bar{v})^2 p^{-1})^2|_{\\xi=1} = (1 - a_p p^{-1} + p^{-1})^2\\) is the square of the unit root factor, and the interpolation period ratio \\(\\Omega_p^0 / \\Omega_\\infty^0 = 1\\) at \\(n = 0\\) is replaced by the formal logarithm of the Heegner point via the Serre--Tate expansion. The proof is sorry-backed at this stage.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 587, "effort_local": 587, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4371}, "prop:equiv-imc": {"id": "prop:equiv-imc", "type": "proposition", "title": "Equivalence of the two anticyclotomic main conjectures", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: MR4372220, \\S{}Proof of the Iwasawa main conjectures.}\n  Assume that $p = v\\bar{v}$ splits in~$K$ and that $E(K)[p] = 0$.\n  The following statements are equivalent:\n  \\begin{enumerate}\n    \\item[(i)] Both $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})$ and\n      $\\mathcal{X} = \\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, M_E)^\\vee$\n      have $\\Lambda$-rank one, and\n      \\[\n        \\mathrm{char}_\\Lambda(\\mathcal{X}_{\\mathrm{tors}})\n        \\supset\n        \\mathrm{char}_\\Lambda\\!\\bigl(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K,\\mathbf{T})/\\Lambda\\kappa_\\infty\\bigr)^2\n      \\]\n      as ideals in $\\Lambda_{\\mathrm{ac}} := \\Lambda[1/p]$.\n    \\item[(ii)] Both $\\mathrm{H}^1_{\\mathcal{F}_{\\mathrm{Gr}}}(K, \\mathbf{T})$\n      and $\\mathfrak{X}_E = \\mathrm{H}^1_{\\mathcal{F}_{\\mathrm{Gr}}}(K, M_E)^\\vee$\n      are $\\Lambda$-torsion, and\n      \\[\n        \\mathrm{char}_\\Lambda(\\mathfrak{X}_E)\\,\\Lambda^{\\mathrm{ur}}\n        \\supset (\\mathcal{L}_E)\n      \\]\n      as ideals in $\\Lambda^{\\mathrm{ur}} \\otimes_{\\mathbb{Z}_p} \\mathbb{Q}_p$.\n  \\end{enumerate}\n  Moreover, the same equivalence holds for the opposite divisibilities\n  ($\\supset$ replaced by $\\subset$).", "uses": ["def:iwasawa-algebra", "def:bdp-class"], "lean_name": "MR4372220.Applications.equivImc", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:iwasawa-algebra}\n  This is \\cite[Thm.~5.2]{BCK} (Castella--Grossi--Lee--Skinner). The two formulations\n  are related via the involution on~$\\Lambda$ that swaps the Greenberg and\n  Perrin-Riou Selmer conditions. Specifically, the BDP $L$-function $\\mathcal{L}_E$\n  and the $\\Lambda$-adic Heegner class $\\kappa_\\infty$ are matched by this\n  involution: the Greenberg characteristic ideal $\\mathrm{char}_\\Lambda(\\mathfrak{X}_E)$\n  corresponds to $\\mathrm{char}_\\Lambda(\\mathcal{X}_{\\mathrm{tors}})$ after applying\n  the involution, and $(\\mathcal{L}_E)$ corresponds to\n  $\\mathrm{char}_\\Lambda(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}/\\Lambda\\kappa_\\infty)^2$.\n  The argument of \\cite{BCK} goes through after inverting~$p$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 724, "effort_local": 724, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4508}, "thm:thmA": {"id": "thm:thmA", "type": "theorem", "title": "Anticyclotomic Iwasawa main conjecture for $E$", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: MR4372220, \\S{}Proof of the Iwasawa main conjectures, Theorem~A.}\n  Suppose that $K$ satisfies the Heegner hypothesis (every prime $\\ell \\mid N$ splits\n  in~$K$), that $p = v\\bar{v}$ splits in~$K$, that the discriminant $D_K$ is odd and\n  $D_K \\neq -3$, and that the $\\mathbb{Z}_p$-corank of $\\mathrm{Sel}_{p^\\infty}(E/K)$\n  equals~$1$. Assume also that $E[p]^{ss} \\cong \\mathbb{F}_p(\\phi) \\oplus \\mathbb{F}_p(\\psi)$\n  as $G_{\\mathbb{Q}}$-modules, with $\\phi|_{G_p} \\neq \\mathbf{1}, \\omega$.\n  Then $\\mathfrak{X}_E$ is $\\Lambda$-torsion, and\n  \\[\n    \\mathrm{char}_\\Lambda(\\mathfrak{X}_E)\\,\\Lambda^{\\mathrm{ur}} = (\\mathcal{L}_E)\n  \\]\n  as ideals in $\\Lambda^{\\mathrm{ur}}$.", "uses": ["prop:equiv-imc", "thm:howard-HP", "mulambda"], "lean_name": "MR4372220.Applications.mainConjectureA", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:howard-HP, mulambda, prop:equiv-imc}\n  By \\cref{thm:howard-HP}, the modules $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})$\n  and $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, M_E)^\\vee$ both have $\\Lambda$-rank one, with\n  Howard's divisibility\n  \\[\n    \\mathrm{char}_\\Lambda\\!\\bigl(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K,M_E)^\\vee_{\\mathrm{tors}}\\bigr)\n    \\supset\n    \\mathrm{char}_\\Lambda\\!\\bigl(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K,\\mathbf{T})/\\Lambda\\kappa_1^{\\mathrm{Hg}}\\bigr)^2\n  \\]\n  as ideals in $\\Lambda_{\\mathrm{ac}} = \\Lambda[1/p]$.\n  The $\\Lambda$-adic Heegner class $\\kappa_1^{\\mathrm{Hg}}$ and the BDP class\n  $\\kappa_\\infty$ generate the same $\\Lambda$-submodule of\n  $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})$ (the $\\alpha$-stabilization\n  comparison). By \\cref{prop:equiv-imc} (applied in the direction (i)$\\Rightarrow$(ii)),\n  $\\mathfrak{X}_E$ is $\\Lambda$-torsion, and\n  \\[\n    \\mathrm{char}_\\Lambda(\\mathfrak{X}_E)\\,\\Lambda^{\\mathrm{ur}} \\supset (\\mathcal{L}_E)\n  \\]\n  as ideals in $\\Lambda_{\\mathrm{ac}} \\widehat{\\otimes}_{\\mathbb{Z}_p} \\mathbb{Z}_p^{\\mathrm{ur}}$.\n  This divisibility, combined with the mu/lambda equalities\n  $\\mu(\\mathfrak{X}_E) = \\mu(\\mathcal{L}_E) = 0$ and\n  $\\lambda(\\mathfrak{X}_E) = \\lambda(\\mathcal{L}_E)$ from \\cref{mulambda},\n  upgrades the divisibility to equality, completing the proof.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 1354, "effort_local": 1354, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 25497}, "cor:PR": {"id": "cor:PR", "type": "corollary", "title": "Perrin-Riou's Heegner-point main conjecture", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: MR4372220, \\S{}Proof of the Iwasawa main conjectures, Corollary (Perrin-Riou).}\n  Under the same hypotheses as \\cref{thm:thmA}, both\n  $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})$ and\n  $\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, M_E)^\\vee$ have $\\Lambda$-rank one, and\n  \\[\n    \\mathrm{char}_\\Lambda\\!\\bigl(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, M_E)^\\vee_{\\mathrm{tors}}\\bigr)\n    = \\mathrm{char}_\\Lambda\\!\\bigl(\\mathrm{H}^1_{\\mathcal{F}_\\Lambda}(K, \\mathbf{T})/\\Lambda\\kappa_\\infty\\bigr)^2\n  \\]\n  as ideals in $\\Lambda_{\\mathrm{ac}}$.\n  In other words, Perrin-Riou's Heegner-point main conjecture holds for $E$ at $p$.", "uses": ["thm:thmA", "prop:equiv-imc"], "lean_name": "MR4372220.Applications.perrinRiou", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:thmA, prop:equiv-imc}\n  This follows from \\cref{thm:thmA} and \\cref{prop:equiv-imc}.\n  More precisely, \\cref{thm:thmA} gives the equality\n  $\\mathrm{char}_\\Lambda(\\mathfrak{X}_E)\\Lambda^{\\mathrm{ur}} = (\\mathcal{L}_E)$,\n  and the comparison of the BDP class $\\kappa_\\infty$ with the Howard class\n  $\\kappa_1^{\\mathrm{Hg}}$ (they generate the same $\\Lambda$-submodule) allows\n  \\cref{prop:equiv-imc} to be applied in the direction (ii)$\\Rightarrow$(i),\n  yielding the Perrin-Riou equality of characteristic ideals in $\\Lambda_{\\mathrm{ac}}$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Main_Conjecture_Applications.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 550, "effort_local": 550, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 26047}, "thm:thmB": {"id": "thm:thmB", "type": "theorem", "title": "$p$-converse to Gross--Zagier--Kolyvagin", "chapter": "Main Conjecture and Applications", "statement": "\\textit{Source: MR4372220, \\S{}Proof of the $p$-converse, Theorem~B.}\n  Let $E/\\mathbb{Q}$ be an elliptic curve and $p > 2$ an Eisenstein prime for $E$,\n  so that $E[p]^{ss} \\cong \\mathbb{F}_p(\\phi) \\oplus \\mathbb{F}_p(\\psi)$ as\n  $G_{\\mathbb{Q}}$-modules, with $\\phi|_{G_p} \\neq \\mathbf{1}, \\omega$.\n  Let $r \\in \\{0, 1\\}$. Then:\n  \\[\n    \\operatorname{corank}_{\\mathbb{Z}_p} \\mathrm{Sel}_{p^\\infty}(E/\\mathbb{Q}) = r\n    \\;\\Longrightarrow\\;\n    \\operatorname{ord}_{s=1} L(E, s) = r,\n  \\]\n  and consequently $\\operatorname{rank}_{\\mathbb{Z}} E(\\mathbb{Q}) = r$ and\n  $\\sha(E/\\mathbb{Q})[p^\\infty]$ is finite.", "uses": ["cor:PR", "def:iwasawa-algebra"], "lean_name": "MR4372220.Applications.pConverse", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:PR}\n  The proof proceeds by choosing an imaginary quadratic field $K$ depending on $r$.\n\n  \\textbf{Case $r = 1$.}\n  If $\\operatorname{corank}_{\\mathbb{Z}_p} \\mathrm{Sel}_{p^\\infty}(E/\\mathbb{Q}) = 1$,\n  then the root number $w(E/\\mathbb{Q}) = -1$.\n  Choose $K$ of odd discriminant $D_K < -4$ such that every prime $\\ell \\mid N$\n  splits in~$K$, $p = v\\bar{v}$ splits in~$K$, and $L(E^K, 1) \\neq 0$\n  (infinitely many such $K$ exist). Kolyvagin's theorem then implies that\n  $\\mathrm{Sel}_{p^\\infty}(E^K/\\mathbb{Q})$ is finite, so\n  $\\operatorname{corank}_{\\mathbb{Z}_p} \\mathrm{Sel}_{p^\\infty}(E/K) = 1$,\n  which is hypothesis (Sel). All hypotheses of \\cref{cor:P
