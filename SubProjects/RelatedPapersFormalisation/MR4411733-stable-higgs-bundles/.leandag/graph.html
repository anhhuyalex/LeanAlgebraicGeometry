<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>

<div id="controls">

  <datalist id="node-ids"></datalist>

    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>

  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">
        <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:semi_proj_variety": {"id": "def:semi_proj_variety", "type": "definition", "title": "Semi-projective variety", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §2.1.}\n  A \\emph{semi-projective variety} is a normal complex quasi-projective algebraic variety \\(M\\)\n  equipped with a \\(\\T\\)-action such that:\n  \\begin{enumerate}\n    \\item the fixed-point locus \\(M^{\\T}\\) is projective, and\n    \\item for every \\(x \\in M\\) there exists \\(p \\in M^{\\T}\\) such that\n          \\(\\lim_{\\lambda \\to 0} \\lambda \\cdot x = p\\), meaning there is a \\(\\T\\)-equivariant\n          morphism \\(g : \\A^1 \\to M\\) with \\(g(1) = x\\) and \\(g(0) = p\\), where \\(\\T\\) acts on\n          \\(\\A^1\\) by the standard multiplication.\n  \\end{enumerate}\n  Examples include cotangent bundles of smooth projective varieties, moduli spaces of Higgs\n  bundles, and Nakajima quiver varieties.", "uses": [], "lean_name": "VeryStableHiggsBundles.TODO.SemiProjectiveVariety", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 24, "proof_size_tex": null, "effort_local": 715, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 715}, "def:upward_flow": {"id": "def:upward_flow", "type": "definition", "title": "Upward flow", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §2.1.}\n  Let \\(M\\) be a semi-projective variety and \\(\\alpha \\in M^{\\T}\\) a fixed point.  The\n  \\emph{upward flow} from \\(\\alpha\\) is\n  \\[\n    W^+_\\alpha := \\{ x \\in M \\mid \\lim_{\\lambda \\to 0} \\lambda \\cdot x = \\alpha \\}.\n  \\]", "uses": ["def:semi_proj_variety"], "lean_name": "VeryStableHiggsBundles.TODO.UpwardFlow", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 15, "proof_size_tex": null, "effort_local": 251, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 966}, "def:downward_flow": {"id": "def:downward_flow", "type": "definition", "title": "Downward flow", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §2.1.}\n  The \\emph{downward flow} from \\(\\alpha \\in M^{\\T}\\) is\n  \\[\n    W^-_\\alpha := \\{ x \\in M \\mid \\lim_{\\lambda \\to \\infty} \\lambda \\cdot x = \\alpha \\}.\n  \\]", "uses": ["def:semi_proj_variety"], "lean_name": "VeryStableHiggsBundles.TODO.DownwardFlow", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 13, "proof_size_tex": null, "effort_local": 186, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 901}, "def:attractor": {"id": "def:attractor", "type": "definition", "title": "Attractor and repeller", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §2.1.}\n  For a connected component \\(F \\in \\pi_0(M^{\\T})\\) of the fixed-point locus, the\n  \\emph{attractor} (resp.\\ \\emph{repeller}) of \\(F\\) is\n  \\[\n    W^+_F := \\bigcup_{\\alpha \\in F} W^+_\\alpha\n    \\qquad \\text{(resp.\\ } W^-_F := \\bigcup_{\\alpha \\in F} W^-_\\alpha \\text{)}.\n  \\]\n  The \\emph{core} of \\(M\\) is \\(\\mathcal{C} := \\coprod_{F \\in \\pi_0(M^{\\T})} W^-_F\\).", "uses": ["def:upward_flow", "def:downward_flow"], "lean_name": "VeryStableHiggsBundles.TODO.Attractor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": null, "effort_local": 391, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1543}, "def:weight_decomp": {"id": "def:weight_decomp", "type": "definition", "title": "Weight decomposition of the tangent space", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §2.1.}\n  Let \\(\\alpha \\in M^{s\\T}\\) be a smooth fixed point.  The \\(\\T\\)-action on the tangent space\n  \\(T_\\alpha M\\) splits into weight spaces \\(T_\\alpha M \\cong \\bigoplus_{k \\in \\Z} (T_\\alpha M)_k\\),\n  where \\(\\lambda \\in \\T\\) acts on \\((T_\\alpha M)_k\\) by multiplication by \\(\\lambda^k\\).\n  Define\n  \\[\n    T^+_\\alpha M := \\bigoplus_{k > 0} (T_\\alpha M)_k, \\qquad\n    T^-_\\alpha M := \\bigoplus_{k < 0} (T_\\alpha M)_k, \\qquad\n    T^0_\\alpha M := (T_\\alpha M)_0,\n  \\]\n  giving the decomposition \\(T_\\alpha M \\cong T^+_\\alpha M \\oplus T^0_\\alpha M \\oplus T^-_\\alpha M\\).", "uses": ["def:semi_proj_variety"], "lean_name": "VeryStableHiggsBundles.TODO.WeightDecomposition", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": null, "effort_local": 594, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1309}, "prop:BB_theory": {"id": "prop:BB_theory", "type": "proposition", "title": "Bialynicki-Birula", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Proposition 2.1.}\n  For a smooth fixed point \\(\\alpha \\in M^{s\\T}\\) in a semi-projective variety \\(M\\), the upward\n  flow \\(W^+_\\alpha\\) and downward flow \\(W^-_\\alpha\\) are \\(\\T\\)-invariant locally closed\n  subvarieties of \\(M\\), and there are \\(\\T\\)-equivariant isomorphisms\n  \\(W^+_\\alpha \\cong T^+_\\alpha M\\) and \\(W^-_\\alpha \\cong T^-_\\alpha M\\) as varieties.", "uses": ["def:semi_proj_variety", "def:upward_flow", "def:downward_flow", "def:weight_decomp"], "lean_name": "VeryStableHiggsBundles.TODO.BialynickiBirula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:semi_proj_variety, def:upward_flow, def:downward_flow, def:weight_decomp}\n  Take a \\(\\T\\)-invariant open affine neighbourhood \\(U\\) of \\(\\alpha\\) in the smooth locus\n  (which exists by Sumihiro's theorem).  The \\(\\T\\)-action on \\(U\\) induces a \\(\\Z\\)-grading\n  \\(\\C[U] = A = A_- \\oplus A_0 \\oplus A_+\\) by non-negative, zero, and non-positive degrees.\n  The attractor locus satisfies \\(\\C[W^+_F] = A/(A_-)\\): a point \\(p \\in U\\) lies in\n  \\(W^+_F\\) if and only if all negatively-graded functions vanish at \\(p\\).  Computing tangent\n  spaces via the dual basis \\(\\{\\partial_i\\}\\) of a homogeneous coordinate system, one shows\n  \\(T_p W^+_\\alpha = \\operatorname{span}\\{\\partial_i|_p \\mid \\deg(x_i) > 0\\}\\).\n  The map \\(f_\\alpha : W^+_\\alpha \\to T^+_\\alpha M\\) sending \\(p \\mapsto \\sum_{\\deg(x_i)>0} x_i(p)\\,\\partial_i\\)\n  is an étale \\(\\T\\)-equivariant morphism whose image is an open \\(\\T\\)-invariant subset of the\n  contractible space \\(T^+_\\alpha M\\) containing the origin; simple-connectivity forces it to be\n  an isomorphism.  The downward case follows by inverting the \\(\\T\\)-action.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 9, "proof_size_tex": 1097, "effort_local": 1097, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2843}, "def:Higgs_bundle": {"id": "def:Higgs_bundle", "type": "definition", "title": "Higgs bundle", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §3.}\n  Fix a smooth complex projective curve \\(C\\) of genus \\(g > 1\\).  A \\emph{Higgs bundle} on\n  \\(C\\) is a pair \\((E, \\Phi)\\) where \\(E\\) is a rank-\\(n\\) degree-\\(d\\) vector bundle on \\(C\\)\n  and \\(\\Phi \\in H^0(C;\\, \\End(E) \\otimes K)\\) is a \\emph{Higgs field} (\\(K\\) the canonical\n  bundle of \\(C\\)).  The pair is \\emph{stable} (resp.\\ \\emph{semi-stable}) if for every\n  \\(\\Phi\\)-invariant proper subbundle \\(F \\subset E\\) one has\n  \\(\\deg(F)/\\rank(F) < \\deg(E)/\\rank(E)\\) (resp.\\ \\(\\leq\\)).", "uses": [], "lean_name": "VeryStableHiggsBundles.TODO.HiggsBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 23, "proof_size_tex": null, "effort_local": 519, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 519}, "def:moduli_Higgs": {"id": "def:moduli_Higgs", "type": "definition", "title": "Moduli space of Higgs bundles", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §3.}\n  The \\emph{moduli space} \\(\\cM := \\cM^d_n\\) is the GIT moduli space of semi-stable rank-\\(n\\)\n  degree-\\(d\\) Higgs bundles on \\(C\\).  It is a normal quasi-projective algebraic variety; at its\n  smooth points (the stable locus \\(\\cM^s \\subset \\cM\\)) it carries a hyperkähler metric and in\n  particular an algebraic symplectic structure.  We assume \\(g > 1\\) throughout.", "uses": ["def:Higgs_bundle"], "lean_name": "VeryStableHiggsBundles.TODO.ModuliHiggsBundles", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 22, "proof_size_tex": null, "effort_local": 398, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 917}, "def:T_action_moduli": {"id": "def:T_action_moduli", "type": "definition", "title": "\\(\\T\\)-action on the moduli space", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §3.}\n  The group \\(\\T\\) acts on \\(\\cM\\) by scaling the Higgs field:\n  \\(\\lambda \\cdot (E, \\Phi) = (E, \\lambda\\Phi)\\) for \\(\\lambda \\in \\T\\).\n  Under this action \\(\\cM\\) is semi-projective; the Hitchin map is \\(\\T\\)-equivariant\n  (weight \\(i\\) on \\(H^0(C; K^i)\\)).", "uses": ["def:moduli_Higgs", "def:semi_proj_variety"], "lean_name": "VeryStableHiggsBundles.TODO.TActionOnModuli", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 16, "proof_size_tex": null, "effort_local": 287, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1919}, "def:T_fixed_type": {"id": "def:T_fixed_type", "type": "definition", "title": "Type of a \\(\\T\\)-fixed Higgs bundle", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §3.1.}\n  A semi-stable Higgs bundle \\((E, \\Phi) \\in \\cM^{\\T}\\) fixed by the \\(\\T\\)-action decomposes\n  as \\(E = L_0 \\oplus \\cdots \\oplus L_k\\) with the weight-space decomposition of the induced\n  \\(\\T\\)-action on \\(E\\), and \\(\\Phi(L_i) \\subset L_{i+1} \\otimes K\\).  The \\emph{type} of\n  \\((E,\\Phi)\\) is the ordered partition \\((\\rank(L_0), \\ldots, \\rank(L_k))\\) of \\(n\\).", "uses": ["def:T_action_moduli"], "lean_name": "VeryStableHiggsBundles.TODO.TFixedType", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": null, "effort_local": 395, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2314}, "def:very_stable_Higgs": {"id": "def:very_stable_Higgs", "type": "definition", "title": "Very stable Higgs bundle", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  A \\(\\T\\)-fixed stable Higgs bundle \\(\\cE = (E, \\Phi) \\in \\cM^{s\\T}\\) is \\emph{very stable} if\n  the only Higgs bundle \\((E', \\Phi') \\in W^+_{\\cE}\\) with nilpotent Higgs field \\(\\Phi'\\) is\n  \\(\\cE\\) itself.", "uses": ["def:upward_flow", "def:T_action_moduli"], "lean_name": "VeryStableHiggsBundles.TODO.VeryStableHiggs", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 6, "descendant_count": 10, "proof_size_tex": null, "effort_local": 236, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2406}, "def:Hitchin_map": {"id": "def:Hitchin_map", "type": "definition", "title": "Hitchin map", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  The \\emph{Hitchin map} is\n  \\[\n    h : \\cM \\longrightarrow \\cA := \\bigoplus_{i=1}^n H^0(C;\\, K^i),\n    \\qquad (E, \\Phi) \\mapsto \\det(\\Phi - x),\n  \\]\n  defined by the characteristic polynomial.  It is a proper, completely integrable Hamiltonian\n  system; the generic fibre is isomorphic to a Jacobian of a spectral curve.\n  \\(\\cA\\) is called the \\emph{Hitchin base}.", "uses": ["def:moduli_Higgs"], "lean_name": "VeryStableHiggsBundles.TODO.HitchinMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 13, "proof_size_tex": null, "effort_local": 396, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1313}, "def:nilpotent_cone": {"id": "def:nilpotent_cone", "type": "definition", "title": "Nilpotent cone", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  The \\emph{nilpotent cone} is the scheme-theoretic fibre \\(N := h^{-1}(0) \\subset \\cM\\).  It is\n  non-reduced; its irreducible components are labelled by \\(F \\in \\pi_0(\\cM^{\\T})\\) with\n  reductions \\((N_F)_\\mathrm{red} \\cong \\overline{W^-_F}\\).  The core of \\(\\cM\\) is\n  \\(\\mathcal{C} := \\bigcup_{F \\in \\pi_0(\\cM^{\\T})} W^-_F \\cong N_\\mathrm{red}\\).", "uses": ["def:Hitchin_map", "def:attractor", "def:downward_flow"], "lean_name": "VeryStableHiggsBundles.TODO.NilpotentCone", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": null, "effort_local": 379, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3235}, "def:component_multiplicity": {"id": "def:component_multiplicity", "type": "definition", "title": "Component multiplicity", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  The \\emph{multiplicity} of the component \\(N_F \\subset N\\) is\n  \\(m_F := \\ell(\\cO_{N, N_F})\\), the length of the local ring of \\(N\\) at the generic point\n  of \\(N_F\\).", "uses": ["def:nilpotent_cone"], "lean_name": "VeryStableHiggsBundles.TODO.ComponentMultiplicity", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 198, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3433}, "def:T_pos_module": {"id": "def:T_pos_module", "type": "definition", "title": "Positive \\(\\T\\)-module", "chapter": "Overview", "statement": "A \\emph{positive \\(\\T\\)-module} is a finite-dimensional \\(\\T\\)-representation \\(V\\) with weight\n  space decomposition \\(V = \\bigoplus_{\\lambda > 0} V_\\lambda\\) (all weights strictly positive).", "uses": [], "lean_name": "VeryStableHiggsBundles.TODO.TPositiveModule", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": null, "effort_local": 192, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 192}, "def:T_char_sym": {"id": "def:T_char_sym", "type": "definition", "title": "\\(\\T\\)-character of the symmetric algebra", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  For a positive \\(\\T\\)-module \\(V = \\bigoplus_{\\lambda > 0} V_\\lambda\\), the\n  \\(\\T\\)-\\emph{character of its symmetric algebra} is\n  \\[\n    \\chi_{\\T}\\!\\bigl(\\Sym(V^*)\\bigr)\n    := \\sum_{\\lambda \\leq 0} \\dim\\!\\bigl(\\Sym(V^*)_\\lambda\\bigr)\\, t^{-\\lambda}\n    = \\prod_{\\lambda > 0} \\frac{1}{(1 - t^{\\lambda})^{\\dim V_\\lambda}}\n    \\;\\in\\; \\Z[[t]],\n  \\]\n  where \\(t\\) denotes the \\(\\T\\)-character of weight \\(-1\\).", "uses": ["def:T_pos_module"], "lean_name": "VeryStableHiggsBundles.TODO.TCharSymAlgebra", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 440, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 632}, "def:virtual_multiplicity": {"id": "def:virtual_multiplicity", "type": "definition", "title": "Virtual multiplicity", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  For \\(\\cE \\in \\cM^{s\\T}\\), the \\emph{virtual multiplicity} is the a priori rational function\n  in \\(t\\)\n  \\[\n    m_{\\cE}(t)\n    := \\frac{\\chi_{\\T}\\!\\bigl(\\Sym(T^{+*}_{\\cE}\\cM)\\bigr)}\n            {\\chi_{\\T}\\!\\bigl(\\Sym(\\cA^*)\\bigr)},\n  \\]\n  where \\(T^{+*}_{\\cE}\\cM\\) is the dual of the positive part of the tangent space at \\(\\cE\\)\n  and \\(\\cA^* = \\bigoplus_{i=1}^n H^0(C;K^i)^*\\) is the dual of the Hitchin base.", "uses": ["def:T_char_sym", "def:weight_decomp", "def:T_action_moduli"], "lean_name": "VeryStableHiggsBundles.TODO.VirtualMultiplicity", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": null, "effort_local": 443, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3588}, "def:equivariant_multiplicity": {"id": "def:equivariant_multiplicity", "type": "definition", "title": "Equivariant multiplicity", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  For a very stable \\(\\cE \\in \\cM^{s\\T}\\), the virtual multiplicity \\(m_{\\cE}(t)\\) is in fact a\n  polynomial in \\(t\\) (proved in \\cref{thm:multiplicity_formula}).  This polynomial is called the\n  \\emph{equivariant multiplicity} of \\(\\cE\\).  Its value at \\(t = 1\\) equals the multiplicity\n  \\(m_{F_{\\cE}}\\) of the corresponding nilpotent cone component.", "uses": ["def:virtual_multiplicity", "def:very_stable_Higgs"], "lean_name": "VeryStableHiggsBundles.TODO.EquivariantMultiplicity", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 381, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4456}, "def:type_one_one_bundle": {"id": "def:type_one_one_bundle", "type": "definition", "title": "Type-\\((1,\\ldots,1)\\) Higgs bundle", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1 and §3.1.}\n  A \\emph{type-\\((1,\\ldots,1)\\) Higgs bundle} is a \\(\\T\\)-fixed Higgs bundle\n  \\((E, \\Phi)\\) with \\(E = L_0 \\oplus \\cdots \\oplus L_{n-1}\\) a direct sum of line bundles and\n  Higgs field components\n  \\[\n    b_i := \\Phi|_{L_{i-1}} \\in H^0(C;\\, L_{i-1}^* L_i K), \\quad i = 1, \\ldots, n-1.\n  \\]\n  The \\emph{composed section} is \\(b := b_{n-1} \\circ \\cdots \\circ b_1 \\in H^0(C;\\, L_0^* L_{n-1} K^{n-1})\\).\n  The isomorphism class depends only on the divisors \\(\\delta_i = \\operatorname{div}(b_i)\\) and\n  the line bundle \\(L_0\\); we write \\(\\cE_\\delta\\) for the Higgs bundle associated to divisor\n  data \\(\\delta = (\\delta_0, \\delta_1, \\ldots, \\delta_{n-1})\\) with \\(L_0 = \\cO_C(\\delta_0)\\).", "uses": ["def:Higgs_bundle", "def:T_fixed_type"], "lean_name": "VeryStableHiggsBundles.TODO.TypeOneOneBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 6, "descendant_count": 7, "proof_size_tex": null, "effort_local": 723, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3037}, "def:canonical_uniformising": {"id": "def:canonical_uniformising", "type": "definition", "title": "Canonical uniformising Higgs bundle", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  The \\emph{canonical uniformising Higgs bundle} is the type-\\((1,\\ldots,1)\\) Higgs bundle\n  \\[\n    \\cE_0 := \\bigl(\\cO_C \\oplus K^{-1} \\oplus \\cdots \\oplus K^{-n+1},\\;\n    \\Phi|_{K^{-i+1}} = 1 : K^{-i+1} \\to K^{-i} \\otimes K\\bigr).\n  \\]\n  Its upward flow \\(W^+_{\\cE_0}\\) is a Hitchin section, hence closed in \\(\\cM\\), showing that\n  \\(\\cE_0\\) is very stable.", "uses": ["def:type_one_one_bundle"], "lean_name": "VeryStableHiggsBundles.TODO.CanonicalUniformisingBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": null, "effort_local": 387, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3424}, "lem:T_char_product": {"id": "lem:T_char_product", "type": "lemma", "title": "Product formula for the \\(\\T\\)-character", "chapter": "Overview", "statement": "For a positive \\(\\T\\)-module \\(V = \\bigoplus_{\\lambda > 0} V_\\lambda\\), the formal identity\n  \\[\n    \\chi_{\\T}\\!\\bigl(\\Sym(V^*)\\bigr)\n    = \\prod_{\\lambda > 0} \\frac{1}{(1 - t^\\lambda)^{\\dim V_\\lambda}}\n  \\]\n  holds in \\(\\Z[[t]]\\).", "uses": ["def:T_char_sym"], "lean_name": "VeryStableHiggsBundles.TODO.TCharProduct", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:T_char_sym}\n  The symmetric algebra splits over weight spaces: \\(\\Sym(V^*) = \\bigotimes_{\\lambda > 0} \\Sym(V^*_\\lambda)\\).\n  The weight-\\(\\mu\\) piece of \\(\\Sym(V^*_\\lambda)\\) is the degree-\\((-\\mu/\\lambda)\\) part of\n  the polynomial ring in \\(\\dim V_\\lambda\\) variables of weight \\(-\\lambda\\), giving the factor\n  \\(1/(1-t^\\lambda)^{\\dim V_\\lambda}\\) in the Hilbert series.  The result follows from\n  multiplicativity of Poincaré series over tensor products.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 468, "effort_local": 468, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1100}, "lem:pushforward_locally_free": {"id": "lem:pushforward_locally_free", "type": "lemma", "title": "Pushforward is locally free", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Theorem 1.3(1).}\n  Let \\(\\cE \\in \\cM^{s\\T}\\) be very stable.  The pushforward\n  \\(h_*(\\cO_{W^+_{\\cE}})\\) is a locally free sheaf on \\(\\cA\\).", "uses": ["def:very_stable_Higgs", "def:Hitchin_map", "prop:BB_theory"], "lean_name": "VeryStableHiggsBundles.TODO.PushforwardLocallyFree", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:very_stable_Higgs, def:Hitchin_map, prop:BB_theory, thm:very_stable_closed}\n  By \\cref{thm:very_stable_closed}, very stability implies \\(W^+_{\\cE}\\) is a closed subvariety\n  of \\(\\cM\\).  By \\cref{prop:BB_theory}, \\(W^+_{\\cE} \\cong T^+_{\\cE}\\cM\\) as varieties, hence\n  \\(W^+_{\\cE}\\) is a vector space (affine space), so \\(\\cO_{W^+_{\\cE}}\\) has no higher direct\n  images under \\(h\\).  Properness of \\(h\\) and the vanishing of higher direct images then\n  force \\(h_*(\\cO_{W^+_{\\cE}})\\) to be locally free on \\(\\cA\\) by the cohomology-and-base-change\n  theorem together with flatness considerations.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 605, "effort_local": 605, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5284}, "thm:very_stable_closed": {"id": "thm:very_stable_closed", "type": "theorem", "title": "Very stable iff closed upward flow", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Theorem 1.1.}\n  \\(\\cE \\in \\cM^{s\\T}\\) is very stable if and only if \\(W^+_{\\cE} \\subset \\cM\\) is closed.", "uses": ["def:very_stable_Higgs", "prop:BB_theory", "def:Hitchin_map", "def:nilpotent_cone", "def:attractor"], "lean_name": "VeryStableHiggsBundles.TODO.VeryStableClosed", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:very_stable_Higgs, prop:BB_theory, def:Hitchin_map, def:nilpotent_cone, def:attractor}\n  \\textit{Forward direction (Proposition 4.1 of the paper).}\n  Suppose \\(\\cE\\) is very stable, so \\(W^+_{\\cE} \\cap \\mathcal{C} = \\{\\cE\\}\\).  Embed \\(\\cM\\)\n  equivariantly in a projective space via a linearised \\(\\T\\)-action on a very ample line\n  bundle; then every non-trivial \\(\\T\\)-orbit has two distinct fixed points in its closure.\n  Consider the compactification \\(\\overline{\\cM} = (\\cM \\times \\C) /\\!/ \\T\\); the projectivisation\n  \\(\\mathbb{P}(W^+_{\\cE} \\times \\C)\\) is a projective (hence closed) subscheme of\n  \\(\\overline{\\cM}\\), and all its boundary points lie on the divisor at infinity.  Hence\n  \\(W^+_{\\cE}\\) is closed in \\(\\cM\\).\n  \\textit{Converse.}  If \\(W^+_{\\cE}\\) is closed in \\(\\cM\\), then any\n  \\(\\beta \\in W^+_{\\cE} \\cap \\mathcal{C}\\) with \\(\\beta \\neq \\cE\\) would satisfy\n  \\(\\lim_{\\lambda \\to \\infty} \\lambda \\cdot \\beta \\neq \\cE\\), giving two distinct limit points\n  of the \\(\\T\\)-orbit of \\(\\beta\\) in the closure \\(W^+_{\\cE}\\), contradicting closedness\n  (the two limit points would be different fixed points of the closed orbit).\n  Hence \\(W^+_{\\cE} \\cap \\mathcal{C} = \\{\\cE\\}\\), i.e.\\ \\(\\cE\\) is very stable.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 5, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": 1235, "effort_local": 1235, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6684}, "thm:type_one_one_classification": {"id": "thm:type_one_one_classification", "type": "theorem", "title": "Classification of type-\\((1,\\ldots,1)\\) very stable bundles", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Theorem 1.2.}\n  Let \\((E, \\Phi)\\) be a stable type-\\((1,\\ldots,1)\\) Higgs bundle with\n  \\(E = L_0 \\oplus \\cdots \\oplus L_{n-1}\\) and \\(b_i = \\Phi|_{L_{i-1}}\\).  Then \\((E, \\Phi)\\)\n  is very stable if and only if the composed section\n  \\(b = b_{n-1} \\circ \\cdots \\circ b_1 \\in H^0(C;\\, L_0^* L_{n-1} K^{n-1})\\)\n  has no repeated zero.", "uses": ["def:type_one_one_bundle", "def:very_stable_Higgs", "def:canonical_uniformising", "thm:very_stable_closed"], "lean_name": "VeryStableHiggsBundles.TODO.TypeOneOneClassification", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:type_one_one_bundle, def:canonical_uniformising, thm:very_stable_closed}\n  \\textit{Base case.}  When \\(b\\) has no zeroes, \\((E, \\Phi)\\) is a uniformising Higgs bundle;\n  its upward flow is a Hitchin section, which is closed in \\(\\cM\\) (Hitchin), hence very stable\n  by \\cref{thm:very_stable_closed}.\n  \\textit{General case via Hecke transformations.}  Starting from a Hitchin section, apply Hecke\n  transformations at points of \\(C\\) to modify the divisors \\(\\delta_i\\) one zero at a time.\n  Each Hecke transform preserves the stability and very-stability properties as long as the\n  resulting divisor \\(\\delta_1 + \\cdots + \\delta_{n-1}\\) remains reduced (i.e.\\ \\(b\\) has only\n  simple zeros).  Introducing a double zero at a Hecke step yields a wobbly (not very stable)\n  bundle.  One verifies that every type-\\((1,\\ldots,1)\\) upward flow can be reached in this way,\n  completing the classification.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 910, "effort_local": 910, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9099}, "thm:multiplicity_formula": {"id": "thm:multiplicity_formula", "type": "theorem", "title": "Multiplicity formula", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Theorem 1.3.}\n  Let \\(\\cE \\in \\cM^{s\\T}\\) be very stable, \\(T^+_{\\cE}\\cM\\) the positive part of the tangent\n  space, and \\(F_{\\cE} \\in \\pi_0(\\cM^{\\T})\\) the fixed-point component containing \\(\\cE\\).\n  Then:\n  \\begin{enumerate}\n    \\item The pushforward \\(h_*(\\cO_{W^+_{\\cE}})\\) is locally free on \\(\\cA\\).\n    \\item The multiplicity satisfies\n          \\[\n            m_{F_{\\cE}}\n            = \\rank\\bigl(h_*(\\cO_{W^+_{\\cE}})\\bigr)\n            = \\left.\\frac{\\chi_{\\T}\\!\\bigl(\\Sym(T^{+*}_{\\cE}\\cM)\\bigr)}\n                         {\\chi_{\\T}\\!\\bigl(\\Sym(\\cA^*)\\bigr)}\\right|_{t=1}.\n          \\]\n    \\item For generic \\(a \\in \\cA\\), the intersection \\(W^+_{\\cE} \\cap h^{-1}(a)\\) is\n          transversal with cardinality \\(m_{F_{\\cE}}\\).\n  \\end{enumerate}\n  In particular, the virtual multiplicity \\(m_{\\cE}(t)\\) is a polynomial in \\(t\\) for very stable\n  \\(\\cE\\) (i.e.\\ \\(\\cE\\) has an equivariant multiplicity in the sense of\n  \\cref{def:equivariant_multiplicity}).", "uses": ["def:very_stable_Higgs", "def:virtual_multiplicity", "def:equivariant_multiplicity", "def:component_multiplicity", "lem:pushforward_locally_free", "prop:BB_theory", "lem:T_char_product", "def:Hitchin_map"], "lean_name": "VeryStableHiggsBundles.TODO.MultiplicityFormula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:pushforward_locally_free, prop:BB_theory, lem:T_char_product,\n        def:very_stable_Higgs, def:virtual_multiplicity, def:component_multiplicity}\n  Part (1) is \\cref{lem:pushforward_locally_free}.\n  For part (2): by \\cref{prop:BB_theory}, \\(W^+_{\\cE} \\cong T^+_{\\cE}\\cM\\) as \\(\\T\\)-equivariant\n  varieties, so \\(\\cO_{W^+_{\\cE}} \\cong \\Sym(T^{+*}_{\\cE}\\cM)\\) as \\(\\T\\)-modules via the\n  isomorphism of coordinate rings.  The \\(\\T\\)-equivariant fibre of \\(h_*(\\cO_{W^+_{\\cE}})\\) at\n  \\(0 \\in \\cA\\) has \\(\\T\\)-character\n  \\(\\chi_{\\T}(h_*(\\cO_{W^+_{\\cE}})_0) = m_{\\cE}(t)\\).  Since \\(h_*(\\cO_{W^+_{\\cE}})\\) is\n  locally free (part (1)), its \\(\\T\\)-character is a polynomial in \\(t\\); evaluating at \\(t=1\\)\n  yields \\(\\rank(h_*(\\cO_{W^+_{\\cE}})) = m_{\\cE}(1) = m_{F_{\\cE}}\\) using the identification of\n  the fibre at \\(0\\) with the entire stalk (by equivariant localization and the\n  \\(\\T\\)-equivariant structure on \\(\\cA\\)).\n  Part (3) follows because \\(h_*(\\cO_{W^+_{\\cE}})\\) is locally free of rank \\(m_{F_{\\cE}}\\),\n  so for generic \\(a\\) the fibre \\(W^+_{\\cE} \\cap h^{-1}(a)\\) is a finite reduced scheme of\n  degree \\(m_{F_{\\cE}}\\), which is exactly a transversal intersection of that cardinality.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 8, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 1208, "effort_local": 1208, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9384}, "cor:explicit_multiplicity": {"id": "cor:explicit_multiplicity", "type": "corollary", "title": "Explicit multiplicities", "chapter": "Overview", "statement": "\\textit{Source: [HH21], Corollary 1.4.}\n  \\begin{enumerate}\n    \\item The multiplicity of \\(\\cN\\) (the moduli space of semi-stable rank-\\(n\\) degree-\\(d\\)\n          vector bundles) in the nilpotent cone is\n          \\[\n            m_{\\cN} = 2^{3g-3} \\cdot 3^{5g-5} \\cdots n^{(2n-1)(g-1)}.\n          \\]\n    \\item For a type-\\((1,\\ldots,1)\\) very stable Higgs bundle \\(\\cE_\\delta \\in \\cM^{s\\T}\\) as\n          in \\cref{thm:type_one_one_classification} with \\(m_i = \\deg(b_i)\\), the multiplicity is\n          \\[\n            m_{F_{\\cE_\\delta}} = \\prod_{i=1}^{n-1} \\binom{n}{n-i}^{m_i}.\n          \\]\n  \\end{enumerate}", "uses": ["thm:multiplicity_formula", "def:canonical_uniformising", "def:type_one_one_bundle", "thm:type_one_one_classification"], "lean_name": "VeryStableHiggsBundles.TODO.ExplicitMultiplicity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:multiplicity_formula, def:canonical_uniformising, def:type_one_one_bundle,\n        lem:T_char_product}\n  \\textit{Part (1).}  Apply \\cref{thm:multiplicity_formula} to the canonical uniformising Higgs\n  bundle \\(\\cE_0\\) (\\cref{def:canonical_uniformising}).  The weight spaces of \\(T^+_{\\cE_0}\\cM\\)\n  are computed via the deformation complex at \\(\\cE_0\\); one finds that the weight-\\(j-i\\) spaces\n  for \\(j > i\\) have dimension \\(\\dim H^0(C; K^{j-i}) = (j-i)(2g-2) - g + 1\\) when\n  \\(j > i\\) (by Riemann-Roch), giving the product formula\n  \\(m_{\\cN} = \\prod_{1 \\leq i < j \\leq n} (j-i)^{2g-2-1}\\), which simplifies to the stated\n  formula.\n  \\textit{Part (2).}  For \\(\\cE_\\delta\\) of type \\((1,\\ldots,1)\\) with divisors of degrees\n  \\(m_i = \\deg(\\delta_i)\\), the positive tangent space \\(T^+_{\\cE_\\delta}\\cM\\) decomposes\n  according to the \\(m_i\\) sections \\(b_i\\); each \\(b_i\\) contributes a weight-\\(i\\) block of\n  dimension \\(m_i \\cdot \\binom{n}{n-i}\\) to the character formula, yielding the stated product\n  via \\cref{lem:T_char_product}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1049, "effort_local": 1049, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14083}, "def:structure_sheaf_upward_flow": {"id": "def:structure_sheaf_upward_flow", "type": "definition", "title": "Structure sheaf of the upward flow", "chapter": "Overview", "statement": "\\textit{Source: [HH21], §1.}\n  For a very stable type-\\((1,\\ldots,1)\\) Higgs bundle \\(\\cE_\\delta \\in \\cM^{s\\T}\\), the\n  upward flow \\(W^+_{\\cE_\\delta} \\subset \\cM\\) is a closed Lagrangian subvariety.  Its\n  structure sheaf is denoted \\(\\cL_\\delta := \\cO_{W^+_{\\cE_\\delta}}\\).", "uses": ["def:very_stable_Higgs", "def:upward_flow", "def:type_one_one_bundle", "thm:very_stable_closed"], "lean_name": "VeryStableHiggsBundles.TODO.StructureSheafUpwardFlow", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 3, "proof_size_tex": null, "effort_local": 275, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8077}, "d const $ = id => document.getElementById(id);

// ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};

  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

  if (isOrphan(id)) continue;

// ── Project-stats overlay ────────────────────────────────────────────────────

// a human label for each component: its highest-degree member
function compRepr(members) {
  let best = members[0];
  for (const id of members) if ((deg[id] || 0) > (deg[best] || 0)) best = id;
  return best.split(":").pop();
}

const chapters = [...new Set(
  Object.values(allNodes).map(n => n.chapter).filter(Boolean)

// ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,
                nodeset: "union", fileview: "off" };

// Which universe a node belongs to. A node "has Lean" if it carries Lean source
// (lean_aux nodes always do; blueprint nodes do once their \lean{} resolved).
const hasLean    = n => n.type === "lean_aux" || !!(n.lean_source && n.lean_source.length);
const inBlueprint = n => n.type !== "lean_aux";
function inNodeset(id) {

  if (state.nodeset === "blueprint") return inBlueprint(n);
  if (state.nodeset === "lean")      return hasLean(n);
  return true;                                   // union
}

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

function visibleSet() {
  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));
  }
  let ids = Object.keys(allNodes).filter(inNodeset);
  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

// ── Network ─────────────────────────────────────────────────────────────────

const nodesDS = new vis.DataSet();
const edgesDS = new vis.DataSet();

// Force-directed layout: connected nodes attract, so each declaration settles
// next to what it depends on. Direction is conveyed by the arrows, not columns.
const N_TOTAL = graphData.nodes.length;
const PHYSICS_OPTS = {
  enabled: true,
  solver: "forceAtlas2Based",
  forceAtlas2Based: {

  $("graph"),
  { nodes: nodesDS, edges: edgesDS },
  {
    // physics does the placement; improvedLayout seeds it (skip on huge graphs)
    layout: { improvedLayout: N_TOTAL <= 250 },
    physics: { enabled: false },   // enabled per-apply, then frozen once settled
    edges: {

      color: { color: "#cbd5e1", highlight: "#64748b" },

      width: 1,
    },
    nodes: { shape: "dot" },
    interaction: { hover: true, tooltipDelay: 150, zoomView: false },
  }

// Once a settle finishes, freeze the simulation (so the view is stable and
// draggable) and frame the result.
network.on("stabilizationIterationsDone", () => {
  network.setOptions({ physics: false });
  layoutOrphans();
  fitFloored();

// ── Isolated-node layout ──────────────────────────────────────────────────────
// Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],

const _SLOTS = FILE_PALETTE.length * 3;          // 20 hues × 3 lightness tiers

       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))

  const used = new Set(), map = {};
  for (const f of files) {
    let slot = hashStr(f) % _SLOTS, t = 0;
    while (used.has(slot) && t < _SLOTS) { slot = (slot + 1) % _SLOTS; t++; }
    used.add(slot); map[f] = slot;
  }
  return (_fileSlots[mode] = map);
}
function colorRGB(file) {
  const map = ensureFileSlots(state.fileview);
  const slot = (file in map) ? map[file] : hashStr(file) % _SLOTS;
  return slotColor(slot);
}

function fileCounts(mode) {
  const counts = {};
  for (const id in allNodes) {
    const f = fileOf(allNodes[id], mode);
    if (f) counts[f] = (counts[f] || 0) + 1;
  }
  return counts;
}

let fileBg = null;            // {canvas, minX, minY, w, h, W, H} in graph coords

function rebuildFileBg(quick) {
  const mode = state.fileview;
  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
  const sc  = network.getScale();
  if (e.ctrlKey) {
    const f        = e.deltaY > 0 ? 0.9 : 1 / 0.9;
    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, sc * f));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    let nx = pos.x + e.deltaX / sc;
    let ny = pos.y + e.deltaY / sc;
    if (graphBounds) {
      nx = Math.max(graphBounds.left, Math.min(graphBounds.right,  nx));
      ny = Math.max(graphBounds.top,  Math.min(graphBounds.bottom, ny));
    }
    network.moveTo({ position: { x: nx, y: ny }, animation: false });
  }
}, { capture: true, passive: false });

// ── Apply current filter state to the canvas ────────────────────────────────

function apply() {
  const vis   = visibleSet();
  const nodes = graphData.nodes.filter(n => vis.has(n.id));
  const edges = graphData.edges.filter(e => vis.has(e.from) && vis.has(e.to));

  nodesDS.clear(); edgesDS.clear();
  nodesDS.add(nodes); edgesDS.add(edges);

  $("stat").innerHTML =
    `${nodes.length} / ${graphData.nodes.length} nodes &middot; ${edges.length} edges`;

  const pill = $("focus-pill");
  if (state.focus) {
    pill.style.display = "inline-flex";
    pill.querySelector(".lbl").textContent = "focus: " + state.focus.split(":").pop();
  } else {
    pill.style.display = "none";
  }

  // Re-settle the now-visible subset; the stabilization handler freezes and
  // fits when it finishes. With nothing to simulate (a lone node, or only
  // isolated nodes — which are physics:false) we lay out and fit directly.
  const anyPhysics = nodes.some(n => n.physics !== false);
  if (nodes.length > 1 && anyPhysics) {
    network.setOptions({ physics: PHYSICS_OPTS });
  } else {
    setTimeout(() => { layoutOrphans(); fitFloored(); }, 0);
  }
}

function syncControls() {
  $("orphans").checked  = state.showOrphans;
  $("nodeset").value    = state.nodeset;
  $("fileview").value   = state.fileview;
  $("component").value  = state.component === null ? "" : String(state.component);
  $("chapter").value    = state.chapter || "";
}

// ── Reveal-aware navigation ─────────────────────────────────────────────────

function goTo(id) {
  if (!allNodes[id]) return;
  if (!visibleSet().has(id)) {            // relax filters until the node is shown
    state.focus = null;
    state.component = null;
    state.chapter = null;
    if (!inNodeset(id)) state.nodeset = "union";
    if (isOrphan(id)) state.showOrphans = true;
    syncControls();
    apply();
  }
  setTimeout(() => jumpTo(id), 70);
}

function jumpTo(id) {
  if (!allNodes[id]) return;
  network.selectNodes([id]);
  network.focus(id, { scale: 1.2, animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  renderNode(id);
  highlightCone(id);
}

function setFocus(id) {
  if (!allNodes[id]) return;
  state.focus = id;
  apply();
  renderNode(id);
  setTimeout(() => jumpTo(id), 70);
}

function clearFocus() { state.focus = null; apply(); }

function resetView() {
  state.showOrphans = false;
  state.focus = null;
  state.component = null;
  state.chapter = null;
  state.nodeset = "union";
  $("search").value = "";
  syncControls();
  apply();
}

// ── Control wiring ──────────────────────────────────────────────────────────

$("orphans").addEventListener("change", e => {
  state.showOrphans = e.target.checked; state.focus = null; apply();
});
$("nodeset").addEventListener("change", e => {
  state.nodeset = e.target.value; state.focus = null; apply();
});
$("component").addEventListener("change", e => {
  state.component = e.target.value === "" ? null : Number(e.target.value);
  state.focus = null; apply();
});
$("chapter").addEventListener("change", e => {
  state.chapter = e.target.value || null; state.focus = null; apply();
});
$("fileview").addEventListener("change", e => {
  state.fileview = e.target.value; rebuildFileBg();
});
$("search").addEventListener("change", e => {
  const v = e.target.value.trim();
  if (allNodes[v]) goTo(v);
});
$("reset").addEventListener("click", resetView);
$("focus-pill").addEventListener("click", clearFocus);

// ── Lean syntax highlighter ─────────────────────────────────────────────────

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _KW      = /\b(def|lemma|theorem|instance|class|structure|inductive|abbrev|noncomputable|private|protected|section|namespace|end|open|variable|where|do|let|have|show|suffices|calc|if|then|else|return|for|in|fun|match|with|by|sorry)\b/g;
const _TACTIC  = /\b(simp|ext|rfl|exact|intro|intros|apply|refine|constructor|use|rw|rewrite|rcases|rintro|obtain|push_neg|norm_num|ring|group|linarith|omega|decide|trivial|assumption|congr|tauto|aesop|cases|induction|revert|clear|next|all_goals|repeat|try|first|solve|fin_cases|positivity|gcongr|field_simp)\b/g;
const _TYPE    = /\b(Nat|Int|Bool|String|List|Array|Option|Type|Prop|Sort|True|False|And|Or|Not|Iff|Eq|Subgroup|Group|Ring|Field|Fintype|Finite)\b/g;
const _NUM     = /\b(\d+)\b/g;
const _STR     = /("(?:[^"\\]|\\.)*")/g;

function highlightLean(raw) {
  return raw.split('\n').map(line => {
    let commentAt = -1;
    let inStr = false;
    for (let i = 0; i < line.length - 1; i++) {
      if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inStr = !inStr;
      if (!inStr && line[i] === '-' && line[i+1] === '-') { commentAt = i; break; }
    }
    const code    = commentAt >= 0 ? line.slice(0, commentAt) : line;
    const comment = commentAt >= 0 ? line.slice(commentAt)    : '';
    let h = esc(code);
    h = h.replace(_STR,    m => `<span class="hl-str">${m}</span>`);
    h = h.replace(_KW,     m => `<span class="hl-kw">${m}</span>`);
    h = h.replace(_TACTIC, m => `<span class="hl-tactic">${m}</span>`);
    h = h.replace(_TYPE,   m => `<span class="hl-type">${m}</span>`);
    h = h.replace(_NUM,    m => `<span class="hl-num">${m}</span>`);
    const commentHtml = comment ? `<span class="hl-comment">${esc(comment)}</span>` : '';
    return h + commentHtml;
  }).join('\n');
}

// ── LaTeX renderer ───────────────────────────────────────────────────────────

function processNonMath(s) {
  return esc(s)
    .replace(/\\emph\{([^}]*)\}/g,   '<em>$1</em>')
    .replace(/\\textbf\{([^}]*)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^}]*)\}/g, '<em>$1</em>')
    .replace(/\\text\{([^}]*)\}/g,   '$1');
}

function renderLatex(el, text) {
  if (!text || !text.trim()) {
    el.classList.add('empty'); el.textContent = '—'; return;
  }
  // Match every math delimiter style leanblueprint uses: $$…$$ and \[…\]
  // (display) and \(…\) and $…$ (inline). $$ and \[ \] come first so the
  // single-$ branch can't grab a $$ opener.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$(?:[^$\\]|\\.)+?\$)/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    html += processNonMath(text.slice(last, m.index));
    const raw = m[0];
    let disp, math;
    if      (raw.startsWith('$$'))  { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\[')) { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\(')) { disp = false; math = raw.slice(2, -2); }
    else                            { disp = false; math = raw.slice(1, -1); }
    if (window.katex) {
      try {
        html += katex.renderToString(math, {
          displayMode: disp, throwOnError: false, macros: katexMacros,
        });
      }
      catch (_) { html += esc(raw); }
    } else {
      html += `<span style="color:#94a3b8">${esc(raw)}</span>`;
    }
    last = re.lastIndex;
  }
  html += processNonMath(text.slice(last));
  el.innerHTML = html;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function charVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  return `<span class="m-val">${v.toLocaleString()}</span>`;
}
function workVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  if (v === 0) return '<span class="m-val m-done">0 ✓</span>';
  return `<span class="m-val m-work">${v.toLocaleString()}</span>`;
}
function charsPair(rel, cum) {
  const f = v => (v === null || v === undefined)
    ? '<span class="chars-inf">∞</span>'
    : `<span class="chars-val">${v}</span>`;
  return `<span class="chars-pair">ℓ<sub>local</sub>=${f(rel)} &nbsp; ℓ<sub>total</sub>=${f(cum)}</span>`;
}

function renderNode(id) {
  const n = allNodes[id];
  if (!n) return;

  $("sidebar-empty").style.display = "none";
  const content = $("sidebar-content");
  content.style.display = "flex";

  const statusBadge = n.proved
    ? '<span class="badge badge-proved">✓ leanok</span>'
    : (n.mathlib_ok
        ? '<span class="badge badge-proved">ⓜ mathlib</span>'
        : (n.has_sorry
            ? '<span class="badge badge-sorry">sorry</span>'
            : '<span class="badge badge-unproved">unproved</span>'));

  const mkChip = u => `<span class="dep-chip" onclick="goTo('${esc(u)}')">${esc(u)}</span>`;
  const depsHtml = n.uses.length
    ? n.uses.map(mkChip).join('')
    : '<span class="no-deps">none — axiom</span>';

  // full transitive upstream, with the direct deps split out
  const anc       = ancestorsOf(id);
  const directSet = new Set(n.uses);
  const indirect  = [...anc].filter(x => !directSet.has(x)).sort();
  const transHtml = indirect.length
    ? indirect.map(mkChip).join('')
    : '<span class="no-deps">none beyond the direct ones</span>';

  const focusLabel = state.focus === id ? 'Clear focus' : 'Focus dependency cone';
  const focusCall  = state.focus === id ? 'clearFocus()' : `setFocus('${esc(id)}')`;

  content.innerHTML = `
    <div class="card">
      <div class="node-badges">
        <span class="badge badge-type">${n.type.toUpperCase()}</span>${statusBadge}
      </div>
      <div class="node-title">${esc(n.title || n.id)}</div>
      <div class="node-id">${esc(n.id)}</div>
      ${n.chapter   ? `<div class="node-chapter">§ ${esc(n.chapter)}</div>` : ''}
      ${n.lean_name ? `<div class="lean-ref">Lean: <code>${esc(n.lean_name)}</code></div>` : ''}
      ${n.tex_file  ? `<div class="lean-ref">tex: <code>${esc(n.tex_file)}</code></div>` : ''}
      ${n.lean_file ? `<div class="lean-ref">file: <code>${esc(n.lean_file)}</code></div>` : ''}
      <button class="btn-focus" onclick="${focusCall}">⊙ ${focusLabel}</button>
    </div>

    <div class="card">
      <div class="card-title">Structure</div>
      <div class="degrees">
        <div class="degree">
          <span class="degree-val">${n.dep_count}</span>
          <span class="degree-label">direct deps</span>
        </div>
        <div class="degree">
          <span class="degree-val">${anc.size}</span>
          <span class="degree-label">total upstream</span>
        </div>
        <div class="degree">
          <span class="degree-val">${n.rdep_count}</span>
          <span class="degree-label">used by</span>
        </div>
      </div>
      <div class="deps-sub">direct dependencies</div>
      <div class="deps-list">${depsHtml}</div>
      <div class="deps-sub">indirect (transitive) dependencies</div>
      <div class="deps-list">${transHtml}</div>
    </div>

    <div class="card">
      <div class="card-title">Complexity</div>
      <div class="metrics-grid">
        <span></span>
        <span class="col-head">local</span>
        <span class="col-head">total</span>
        <span class="m-label">LaTeX ℓ</span>${charVal(n.proof_size_tex)}${charVal(n.proof_size_tex_total)}
        <span class="m-label">Lean ℓ</span>${charVal(n.proof_size_lean)}${charVal(n.proof_size_lean_total)}
        <span class="m-label">Effort</span>${workVal(n.effort_local)}${workVal(n.effort_total)}
      </div>
    </div>

    <div class="card">
      <div class="sec-hdr"><span class="card-title" style="margin:0">LaTeX statement</span></div>
      <div class="latex-rendered" id="latex-stmt"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">LaTeX proof</span>
        ${charsPair(n.proof_size_tex, n.proof_size_tex_total)}
      </div>
      <div class="latex-rendered" id="latex-proof"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">Lean code</span>
        ${charsPair(n.proof_size_lean, n.proof_size_lean_total)}
      </div>
      <pre class="code-block" id="lean-code"></pre>
    </div>
  `;

  renderLatex($('latex-stmt'),  n.statement);
  renderLatex($('latex-proof'), n.proof_tex ? n.proof_tex.trim() : '');

  const leanEl = $('lean-code');
  if (n.lean_source) {
    leanEl.innerHTML = highlightLean(n.lean_source);
  } else {
    leanEl.classList.add('empty');
    leanEl.textContent = 'declaration not found';
  }
}

// ── Cone highlighting on click ───────────────────────────────────────────────
// Selecting a node lights up its WHOLE transitive cone — every ancestor and
// descendant and the edges between them — while everything else fades back.

const baseNodeById = {};
for (const vn of graphData.nodes) baseNodeById[vn.id] = vn;

const EDGE_BASE = { color: "#cbd5e1", highlight: "#64748b" };

function highlightCone(id) {
  const cone = coneOf(id);   // {id} ∪ ancestors ∪ descendants
  nodesDS.update(nodesDS.getIds().map(nid =>
    cone.has(nid)
      ? baseNodeById[nid]                                   // full styling
      : { id: nid, color: { background: "#e5e7eb", border: "#d1d5db" },
          font: { color: "#cbd5e1" } }                      // faded
  ));
  edgesDS.update(edgesDS.get().map(e => {
    const on = cone.has(e.from) && cone.has(e.to);
    return { id: e.id,
             color: on ? { color: "#475569", highlight: "#334155" } : { color: "#edf0f4" },
             width: on ? 2.5 : 1 };
  }));
}

function clearHighlight() {
  nodesDS.update(nodesDS.getIds().map(nid => baseNodeById[nid]));
  edgesDS.update(edgesDS.get().map(e => ({ id: e.id, color: EDGE_BASE, width: 1 })));
}

network.on("click", params => {
  if (params.nodes.length) { renderNode(params.nodes[0]); highlightCone(params.nodes[0]); }
  else                     { clearHighlight(); }
});
network.on("doubleClick", params => { if (params.nodes.length) setFocus(params.nodes[0]); });

// ── Initial render ───────────────────────────────────────────────────────────

apply();
</script>
