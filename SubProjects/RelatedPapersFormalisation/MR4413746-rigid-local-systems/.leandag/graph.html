<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

<div id="toolbar">
  <span class="brand">Blueprint DAG</span>
  <span class="stat" id="stat">24 nodes &middot; 55 edges</span>
  <span class="legend"><span class="leg-dot" style="background:#22c55e"></span><span class="leg-txt">done</span><span class="leg-dot" style="background:#3b82f6"></span><span class="leg-txt">mathlib</span><span class="leg-bar"></span><span class="leg-txt">more effort</span><span class="leg-dot" style="background:#ef4444"></span><span class="leg-txt">∞ no proof</span></span>
  <span class="legend sym-legend">
    <span class="leg-txt">✓ Lean proof</span>
    <span class="leg-txt">⚠ sorry</span>
    <span class="leg-txt">ⓜ mathlib</span>
    <span class="leg-txt">λ Lean decl</span>
    <span class="leg-txt">★ LaTeX proof</span>
    <span class="leg-txt">§ statement</span>

  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>
</div>
<div id="controls">

  <datalist id="node-ids"></datalist>
  <select id="nodeset" title="Which declarations to include">
    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">
        <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:local-system": {"id": "def:local-system", "type": "definition", "title": "LocalSystem", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.1.}\n  A \\emph{rank \\(\\ell\\) local system} on \\(\\PP^1_\\C - S\\), where \\(S = \\{p_1, \\ldots, p_s\\}\\) is a finite set of distinct points, is an \\(s\\)-tuple \\((A_1, \\ldots, A_s)\\) of matrices \\(A_i \\in \\mathrm{GL}(\\ell, \\C)\\) satisfying \\(A_1 A_2 \\cdots A_s = I_\\ell\\), taken up to simultaneous conjugacy: \\((A_1, \\ldots, A_s) \\sim (C A_1 C^{-1}, \\ldots, C A_s C^{-1})\\) for any \\(C \\in \\mathrm{GL}(\\ell, \\C)\\). The conjugacy class of \\(A_i\\) is called the \\emph{local monodromy} at \\(p_i\\).", "uses": [], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.LocalSystem", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 9, "proof_size_tex": null, "effort_local": 532, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 532}, "def:irreducible-local-system": {"id": "def:irreducible-local-system", "type": "definition", "title": "IsIrreducible", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.1.}\n  A local system \\((A_1, \\ldots, A_s)\\) is \\emph{irreducible} if the only subspaces of \\(\\C^\\ell\\) invariant under all \\(A_i\\) simultaneously are \\(\\{0\\}\\) and \\(\\C^\\ell\\).", "uses": ["def:local-system"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.IsIrreducible", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 5, "proof_size_tex": null, "effort_local": 222, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 754}, "def:rigid-local-system": {"id": "def:rigid-local-system", "type": "definition", "title": "IsRigid", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.1.}\n  A local system \\((A_1, \\ldots, A_s)\\) is \\emph{rigid} if any other local system \\((B_1, \\ldots, B_s)\\) with the same conjugacy classes of local monodromies (i.e., there exist \\(C_i \\in \\mathrm{GL}(\\ell, \\C)\\) with \\(B_i = C_i A_i C_i^{-1}\\)) is globally conjugate to it: there exists \\(C \\in \\mathrm{GL}(\\ell, \\C)\\) such that \\(B_i = C A_i C^{-1}\\) for all \\(i\\).", "uses": ["def:local-system"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.IsRigid", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 5, "proof_size_tex": null, "effort_local": 415, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 947}, "def:unitary-local-system": {"id": "def:unitary-local-system", "type": "definition", "title": "IsUnitary", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.1.}\n  A local system \\((A_1, \\ldots, A_s)\\) is \\emph{unitary} if each matrix \\(A_i\\) is unitary, equivalently if the representation \\(\\pi_1(\\PP^1 - S) \\to \\mathrm{GL}(\\ell, \\C)\\) factors through \\(\\mathrm{U}(\\ell)\\).", "uses": ["def:local-system"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.IsUnitary", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": null, "effort_local": 262, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 794}, "def:delta-n": {"id": "def:delta-n", "type": "definition", "title": "EigenvalueSimplex", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.2.}\n  The \\emph{eigenvalue simplex} for \\(\\mathrm{SU}(n)\\) is the set\n  \\[\n    \\Delta_n = \\bigl\\{ a = (a_1, \\ldots, a_n) \\in \\mathbb{R}^n \\mid a_1 \\geq a_2 \\geq \\cdots \\geq a_n \\geq a_1 - 1,\\; \\textstyle\\sum_{i=1}^n a_i = 0 \\bigr\\}.\n  \\]\n  Conjugacy classes in \\(\\mathrm{SU}(n)\\) are in bijection with points of \\(\\Delta_n\\): the point \\(a \\in \\Delta_n\\) corresponds to the conjugacy class of the diagonal matrix with entries \\(\\exp(2\\pi \\sqrt{-1} a_i)\\).", "uses": [], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.EigenvalueSimplex", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 4, "descendant_count": 13, "proof_size_tex": null, "effort_local": 501, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 501}, "def:multiplicative-eigenvalue-polytope": {"id": "def:multiplicative-eigenvalue-polytope", "type": "definition", "title": "MultiplicativeEigenvaluePolytope", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.2.}\n  The \\emph{multiplicative eigenvalue polytope} \\(P_n(s) \\subset \\Delta_n^s\\) is the set of \\(s\\)-tuples \\(\\vec{a} = (a^1, \\ldots, a^s) \\in \\Delta_n^s\\) such that there exist matrices \\(A_1, \\ldots, A_s \\in \\mathrm{SU}(n)\\) with \\(A_i\\) in the conjugacy class corresponding to \\(a^i\\) and \\(A_1 A_2 \\cdots A_s = I_n\\). This is a compact convex polytope.", "uses": ["def:delta-n"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.MultiplicativeEigenvaluePolytope", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 7, "descendant_count": 9, "proof_size_tex": null, "effort_local": 403, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 904}, "def:gromov-witten-number": {"id": "def:gromov-witten-number", "type": "definition", "title": "GromovWittenNumber", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Definition 1.4.}\n  Let \\(I^1, \\ldots, I^s\\) be subsets of \\([n] = \\{1, \\ldots, n\\}\\) each of cardinality \\(r\\), and let \\(d \\geq 0\\) be an integer. Fix distinct points \\(p_1, \\ldots, p_s \\in \\PP^1\\) and complete flags \\(F^1_\\bullet, \\ldots, F^s_\\bullet\\) on \\(\\C^n\\) in general position. The \\emph{Gromov-Witten number}\n  \\[\n    \\langle \\sigma_{I^1}, \\sigma_{I^2}, \\ldots, \\sigma_{I^s} \\rangle_d\n  \\]\n  is the (finite) count of degree-\\(d\\) maps \\(f: \\PP^1 \\to \\mathrm{Gr}(r, n)\\) such that \\(f(p_i) \\in \\Omega_{I^i}(F^i_\\bullet)\\) for \\(i = 1, \\ldots, s\\), where \\(\\Omega_{I^i}(F^i_\\bullet)\\) is the Schubert variety associated to \\(I^i\\) and \\(F^i_\\bullet\\). This number is independent of the choice of general position flags and of the points \\(p_i\\).", "uses": [], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.GromovWittenNumber", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 790, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 790}, "thm:abw": {"id": "thm:abw", "type": "theorem", "title": "ABW", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Theorem 1.5.}\n  A tuple \\(\\vec{a} = (a^1, \\ldots, a^s) \\in \\Delta_n^s\\) belongs to \\(P_n(s)\\) if and only if for every collection \\((d, r, I^1, \\ldots, I^s)\\) with each \\(I^j \\subset [n]\\) of cardinality \\(r\\), \\(d \\geq 0\\), and \\(\\langle \\sigma_{I^1}, \\ldots, \\sigma_{I^s} \\rangle_d = 1\\), the inequality\n  \\[\n    \\sum_{j=1}^s \\sum_{k \\in I^j} a_k^j \\leq d\n  \\]\n  holds. The system of inequalities is irredundant; equality in each defines a \\emph{regular facet} of \\(P_n(s)\\).", "uses": ["def:multiplicative-eigenvalue-polytope", "def:gromov-witten-number"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.abw_inequalities", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:multiplicative-eigenvalue-polytope, def:gromov-witten-number}\n  This theorem is due to Agnihotri-Woodward \\cite{AW} and Belkale \\cite{BLocal}, proved using the Mehta-Seshadri theorem and the theory of parabolic bundles on \\(\\PP^1\\). The key steps are:\n  \\begin{enumerate}\n    \\item (Sufficiency) Each inequality \\(\\sum_{j,k \\in I^j} a_k^j \\leq d\\) with \\(\\langle \\sigma_{I^1}, \\ldots, \\sigma_{I^s} \\rangle_d = 1\\) is a necessary condition for the existence of a unitary representation, derived from the Mehta-Seshadri theorem applied to a rank-\\(r\\) subbundle of degree \\(-d\\) of the rank-\\(n\\) bundle associated to the local system.\n    \\item (Necessity) Conversely, if all the GW inequalities hold, one constructs an \\(\\mathrm{SU}(n)\\)-valued representation directly via the theory of semistable parabolic bundles; the condition \\(\\langle \\sigma \\rangle_d = 1\\) ensures the requisite subbundles exist.\n    \\item Irredundancy is proved in \\cite[Remark 8.6]{BKq}.\n  \\end{enumerate}\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 991, "effort_local": 991, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2685}, "lem:pinky": {"id": "lem:pinky", "type": "lemma", "title": "VerticesOnRegularFaces", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Lemma 9.1.}\n  Every vertex of \\(P_n(s)\\) lies on a regular facet (i.e., on some wall \\(\\sum_{j,k \\in I^j} a_k^j = d\\) with \\(\\langle \\sigma_{I^1}, \\ldots, \\sigma_{I^s} \\rangle_d = 1\\)). Moreover, if \\(\\vec{a} \\in P_n(s)\\) is a vertex and \\(\\rho\\) is any unitary representation of the fundamental group \\(\\pi_1(\\PP^1 - S)\\) with local monodromies given by \\(\\vec{a}\\), then \\(\\rho\\) is reducible.", "uses": ["def:multiplicative-eigenvalue-polytope", "thm:abw"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.vertices_lie_on_regular_faces", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:multiplicative-eigenvalue-polytope, def:delta-n, thm:abw}\n  Suppose \\(\\vec{a}\\) is a vertex of \\(P_n(s)\\) not lying on any regular facet. Then \\(\\vec{a}\\) must be a vertex of the ambient simplex \\(\\Delta_n^s\\), and since it also lies in \\(P_n(s)\\), it corresponds to scalar matrices \\(\\zeta^{m_i} I_n\\) with \\(\\sum m_i \\equiv 0 \\pmod n\\) and \\(\\zeta = \\zeta_n\\) a primitive \\(n\\)-th root of unity. However, any point of \\(\\Delta_n^s\\) in a sufficiently small neighbourhood of \\(\\vec{a}\\) would again lie in \\(P_n(s)\\) (because the constraints involve only central elements of \\(\\mathrm{SU}(n)\\)), contradicting \\(\\vec{a}\\) being a vertex. The reducibility claim follows because at a vertex of \\(P_n(s)\\), the linearization of the GW inequality is tight, which via the Mehta-Seshadri theorem forces the bundle to split.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 828, "effort_local": 828, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3513}, "def:f-vertex": {"id": "def:f-vertex", "type": "definition", "title": "IsFVertex", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Definition 1.3.}\n  A vertex \\(\\vec{a}\\) of \\(P_n(s)\\) is called an \\emph{F-vertex} if there is a unique unitary local system with local monodromies given by \\(\\vec{a}\\), i.e., the matrix equation \\(A_1 A_2 \\cdots A_s = I_n\\) with \\(A_i \\in \\mathrm{SU}(n)\\) conjugate to \\(a^i\\) has a unique solution up to overall conjugacy.", "uses": ["def:multiplicative-eigenvalue-polytope"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.IsFVertex", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 5, "proof_size_tex": null, "effort_local": 360, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1264}, "def:monodromy-data": {"id": "def:monodromy-data", "type": "definition", "title": "MonodromyData", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Section 1.3.}\n  A \\emph{monodromy datum of type \\((n, \\ell, s)\\)} is an \\(s\\)-tuple \\(\\mathcal{A} = (\\bar{A}_1, \\ldots, \\bar{A}_s)\\) of semisimple conjugacy classes in \\(\\mathrm{GL}(\\ell, \\C)\\) with \\(\\bar{A}_i^n = I_\\ell\\) and \\(\\prod_{i=1}^s \\det \\bar{A}_i = 1\\). The eigenvalues of \\(\\bar{A}_i\\) are \\(\\exp(2\\pi \\sqrt{-1} \\mu^i_j / n)\\) for integers \\(0 \\leq \\mu^i_j < n\\), so that \\(\\mu^i = (\\mu^i_1, \\ldots, \\mu^i_\\ell)\\) is a Young diagram fitting in an \\(\\ell \\times n\\) box.", "uses": [], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.MonodromyData", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 4, "descendant_count": 7, "proof_size_tex": null, "effort_local": 518, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 518}, "def:strange-duality-map": {"id": "def:strange-duality-map", "type": "definition", "title": "StrangeDualityMap", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Definition 1.6 and Section 1.3.}\n  Given monodromy data \\(\\mathcal{A}\\) as above, form the \\emph{transpose Young diagrams} \\(\\lambda^i = (\\mu^i)^T\\) (fitting in an \\(n \\times \\ell\\) box). Define\n  \\[\n    a^i = \\frac{1}{\\ell} \\Bigl( \\lambda^i - \\frac{|\\lambda^i|}{n}(1, 1, \\ldots, 1) \\Bigr) \\in \\Delta_n,\n  \\]\n  where \\(|\\lambda^i| = \\sum_{j=1}^n \\lambda^i_j\\). The \\emph{strange duality map} is \\(v(\\mathcal{A}) = (a^1, \\ldots, a^s) \\in \\Delta_n^s\\).", "uses": ["def:monodromy-data", "def:delta-n"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.strangeDualityMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": null, "effort_local": 486, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1505}, "prop:strange-duality-in-polytope": {"id": "prop:strange-duality-in-polytope", "type": "proposition", "title": "StrangeDualityInPolytope", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Proposition 5.1.}\n  There exists a unitary representation of \\(\\pi_1(\\PP^1 - S)\\) with local monodromy data \\(\\mathcal{A}\\) if and only if \\(v(\\mathcal{A}) \\in P_n(s)\\). Equivalently, the line bundle \\(\\mathcal{B}(\\vec{\\lambda}, \\ell)\\) on \\(\\mathrm{Par}_{n, \\mathcal{O}, S}\\) (where \\(\\vec{\\lambda}\\) are the transpose Young diagrams of \\(\\mathcal{A}\\)) is effective.", "uses": ["def:strange-duality-map", "def:multiplicative-eigenvalue-polytope", "def:local-system", "def:f-line-bundle"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.strangeDuality_mem_polytope", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:strange-duality-map, def:multiplicative-eigenvalue-polytope, def:f-line-bundle, thm:abw}\n  Write \\(\\sum |\\mu^i| = nu\\); let \\(\\widetilde{\\mathcal{N}}\\) be a line bundle of degree \\(-u\\) on \\(\\PP^1\\). There is a unitary representation with monodromy data \\(\\mathcal{A}\\) if and only if the line bundle \\(\\mathcal{B}(\\vec{\\mu}, n)\\) on \\(\\mathrm{Par}_{\\ell, \\widetilde{\\mathcal{N}}, S}\\) is effective (Corollary sansD of the paper, with roles of \\(n\\) and \\(\\ell\\) interchanged). By \\emph{numerical strange duality} (Proposition BWag, Equation GepnerPP), this holds if and only if \\(\\mathcal{B}(\\vec{\\lambda}, \\ell)\\) on \\(\\mathrm{Par}_{n, \\mathcal{O}, S}\\) is effective. Since the line bundle has grade zero, it is effective if and only if \\((\\kappa(\\lambda^1/\\ell), \\ldots, \\kappa(\\lambda^s/\\ell)) \\in P_n(s)\\). A direct computation shows \\(v(\\mathcal{A}) = (\\kappa(\\lambda^1/\\ell), \\ldots, \\kappa(\\lambda^s/\\ell))\\), completing the proof.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 949, "effort_local": 949, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4802}, "thm:egregium": {"id": "thm:egregium", "type": "theorem", "title": "Egregium", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Theorem 1.7.}\n  For fixed \\(n\\) and \\(s = |S|\\), the map \\(\\mathcal{A} \\mapsto v(\\mathcal{A})\\) is a bijective correspondence between:\n  \\begin{enumerate}\n    \\item The set of monodromy data \\(\\mathcal{A}\\) (with \\(n\\) fixed, \\(\\ell\\) varying) for which there exists a rigid irreducible unitary local system on \\(\\PP^1 - S\\) with local monodromy data \\(\\mathcal{A}\\).\n    \\item The set of F-vertices of \\(P_n(s)\\).\n  \\end{enumerate}\n  Consequently, since \\(P_n(s)\\) has only finitely many vertices, there are only finitely many unitary irreducible rigid local systems (across all ranks) with \\(n\\)-th root of unity local monodromies on \\(\\PP^1 - S\\).", "uses": ["def:monodromy-data", "def:strange-duality-map", "def:f-vertex", "def:multiplicative-eigenvalue-polytope", "def:rigid-local-system", "def:irreducible-local-system", "def:unitary-local-system", "lem:christmas", "lem:fvertex-flinebundle", "prop:strange-duality-in-polytope"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.egregium", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:abw, prop:strange-duality-in-polytope, def:f-vertex, lem:pinky, def:f-line-bundle, lem:christmas, lem:fvertex-flinebundle}\n  By \\cref{lem:christmas}, rigid irreducible unitary local systems on \\(\\PP^1 - S\\) with local monodromy data \\(\\mathcal{A}\\) biject with F-line bundles on \\(\\mathrm{Par}_{n,\\mathcal{O},S}\\) of level \\(\\ell\\). By \\cref{lem:fvertex-flinebundle}, F-line bundles on \\(\\mathrm{Par}_{n,\\mathcal{O},S}\\) biject with F-vertices of \\(P_n(s)\\). Under these bijections, \\(v(\\mathcal{A})\\) corresponds the F-line bundle to the F-vertex via \\cref{prop:strange-duality-in-polytope}. All three steps are sorry-bounded under Route B.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 10, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 651, "effort_local": 651, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8246}, "def:t-m-map": {"id": "def:t-m-map", "type": "definition", "title": "SymmetryGroupAction", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Definition 1.10.}\n  The simplex \\(\\Delta_n\\) is identified with \\(\\Delta'_n = \\{x = (x_1, \\ldots, x_{n-1}) \\mid x_i \\geq 0, \\sum x_i = 1\\}\\) via \\(x_i = a_i - a_{i+1}\\). For \\(\\gcd(m, n) = 1\\), define \\(T_m: \\Delta'_n \\to \\Delta'_n\\) by \\(x'_{mi \\bmod n} = x_i\\). This extends to \\(T_m: \\Delta_n^s \\to \\Delta_n^s\\) coordinate-wise, and permutes vertices of \\(P_n(s)\\).", "uses": ["def:delta-n"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.symmetryGroupAction", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 404, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 905}, "cor:egregiumprime": {"id": "cor:egregiumprime", "type": "corollary", "title": "Egregiumprime", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Corollary 1.11.}\n  The map \\(\\mathcal{A} \\mapsto v(\\mathcal{A})\\) is a bijection between:\n  \\begin{enumerate}\n    \\item Monodromy data \\(\\mathcal{A}\\) (fixed \\(n\\), varying \\(\\ell\\)) for which there exists a rigid irreducible local system with data \\(\\mathcal{A}\\) and finite global monodromy.\n    \\item F-vertices \\(\\vec{a}\\) of \\(P_n(s)\\) such that \\(T_m(\\vec{a})\\) is also an F-vertex for every integer \\(m\\) with \\(1 \\leq m \\leq n\\) and \\(\\gcd(m, n) = 1\\).\n  \\end{enumerate}", "uses": ["thm:egregium", "def:t-m-map", "def:f-vertex"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.egregiumprime", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:egregium, def:t-m-map}\n  The condition on finite global monodromy is equivalent (via Galois theory) to requiring that all Galois conjugates of a given unitary rigid local system are also unitary rigid local systems. Since the Galois group \\(\\mathrm{Gal}(\\mathbb{Q}(\\zeta_n)/\\mathbb{Q})\\) acts via \\(\\zeta_n \\mapsto \\zeta_n^m\\) (for \\(\\gcd(m,n)=1\\)), and the Galois conjugate corresponds to applying \\(T_m\\) to the F-vertex, the result follows from Theorem~\\cref{thm:egregium}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 486, "effort_local": 486, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9136}, "def:tau-n-s": {"id": "def:tau-n-s", "type": "definition", "title": "TauGroup", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Definition symmetry.}\n  The \\emph{symmetry group} \\(\\tau_n(s)\\) is the finite subgroup of \\((\\mu_n)^s\\) defined by\n  \\[\n    \\tau_n(s) = \\bigl\\{ (\\zeta^{m_1}, \\zeta^{m_2}, \\ldots, \\zeta^{m_s}) \\mid \\textstyle\\sum_{i=1}^s m_i \\equiv 0 \\pmod{n} \\bigr\\},\n  \\]\n  where \\(\\zeta = \\zeta_n = \\exp(2\\pi\\sqrt{-1}/n)\\) and \\(\\mu_n = Z(\\mathrm{SU}(n))\\) is the center. The group \\(\\tau_n(s)\\) acts coordinate-by-coordinate on \\(\\Delta_n^s\\) and on \\(P_n(s)\\).", "uses": ["def:delta-n"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.TauGroup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": null, "effort_local": 483, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 984}, "lem:tau-acts-fvertex": {"id": "lem:tau-acts-fvertex", "type": "lemma", "title": "TauActsFVertex", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, following Definition symmetry.}\n  The group \\(\\tau_n(s)\\) acts coordinate-by-coordinate on \\(P_n(s)\\), as does the permutation group \\(S_s\\) of \\(\\{1, \\ldots, s\\}\\). The semidirect product \\(\\tau_n(s) \\rtimes S_s\\) acts on \\(P_n(s)\\) permuting its vertices, and in particular preserves the set of F-vertices.", "uses": ["def:tau-n-s", "def:f-vertex", "def:multiplicative-eigenvalue-polytope"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.tau_acts_fvertex", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:tau-n-s, def:f-vertex, def:multiplicative-eigenvalue-polytope}\n  The coordinate-by-coordinate action of \\(\\tau_n(s)\\) on \\(\\Delta_n^s\\) restricts to an action on \\(P_n(s)\\) because the conditions defining \\(P_n(s)\\) are stable under this action. The action permutes vertices and preserves the set of F-vertices. This is sorry-bounded under Route B.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 358, "effort_local": 358, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2105}, "prop:property-p": {"id": "prop:property-p", "type": "proposition", "title": "PropertyP", "chapter": "Rigid Local Systems and the Multiplicative Eigenvalue Problem", "statement": "\\textit{Source: Belkale, MR4413746, Proposition propP (Section KatzSection).}\n  Let \\(\\mathcal{T}\\) be a rank \\(\\ell\\) irreducible rigid local system with \\(\\bar{A}_i^n = I_\\ell\\).\n  \\begin{enumerate}\n    \\item If \\(\\mathcal{T}\\) is unitary, and \\(\\alpha, \\beta\\) are two eigenvalues of some \\(\\bar{A}_i\\), then \\(\\alpha^{-1}\\beta \\neq \\zeta_n\\), where \\(\\zeta_n = e^{2\\pi\\sqrt{-1}/n}\\). No two eigenvalues of a local monodromy of a unitary rigid irreducible local system can differ by the primitive \\(n\\)-th root of unity \\(\\zeta_n\\).\n    \\item If \\(\\mathcal{T}\\) has finite global monodromy, then \\(\\alpha^{-1}\\beta\\) is not any primitive \\(n\\)-th root of unity (i.e., not \\(\\zeta_n^m\\) for any \\(m\\) with \\(\\gcd(m,n)=1\\)).\n  \\end{enumerate}", "uses": ["def:rigid-local-system", "def:irreducible-local-system", "def:unitary-local-system", "def:monodromy-data"], "lean_name": "MR4413746RigidLocalSystemsAndTheMultiplicativeEigenvalueProblem.propertyP", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:egregium, def:f-vertex, def:tau-n-s}\n  Part (1): Via the bijection of \\cref{thm:egregium}, the monodromy data \\(\\mathcal{A}\\) corresponds to an F-vertex \\(\\vec{a} = v(\\mathcal{A}) \\in P_n(s)\\). The F-line bundle \\(\\mathcal{O}(E)\\) on \\(\\mathrm{Par}_{n,\\mathcal{O},S}\\) associated to \\(\\vec{a}\\) has the property (from Proposition enumerative of the paper) that if \\(\\exp(2\\pi\\sqrt{-1} b/n)\\) is an eigenvalue of \\(\\bar{A}_i\\) with multiplicity \\(c^b_i > 0\\), then \\(b \\in J^i\\) and \\(b+1 \\notin J^i\\) (where \\(J^i\\) is the set governing the divisor \\(E\\)). In particular \\(1\\) and \\(\\z // ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,
                nodeset: "union", fileview: "off" };

// Which universe a node belongs to. A node "has Lean" if it carries Lean source

const hasLean    = n => n.type === "lean_aux" || !!(n.lean_source && n.lean_source.length);

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

// all transitive predecessors of id (its full upstream dependency set)
function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));

  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

const fileOf = (n, mode) => mode === "lean" ? (n.lean_file || "") : (n.tex_file || "");

// A curated, perceptually-distinct palette (d3 category20-style). A file's
// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],
  [174,199,232],[255,187,120],[152,223,138],[255,152,150],[197,176,213],
  [196,156,148],[247,182,210],[252,146,114],[219,219,141],[158,218,229],
];
function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
const _SLOTS = FILE_PALETTE.length * 3;          // 20 hues × 3 lightness tiers
function slotColor(slot) {
  const base = FILE_PALETTE[slot % FILE_PALETTE.length];
  const tier = Math.floor(slot / FILE_PALETTE.length) % 3;   // 0 normal · 1 dark · 2 light
  return tier === 1 ? base.map(v => Math.round(v * 0.68))
       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))
       : base.slice();
}
// Per-mode slot assignment: each file's preferred slot is its name-hash; exact
// collisions within the same mode are bumped to the next free slot. So every
// file in a mode gets a distinct colour (up to _SLOTS files), the colour is
// driven by the name, and it never shifts under focus/reset/filtering (the file
// set is fixed for the session, and the map is cached).
const _fileSlots = {};
function ensureFileSlots(mode) {
  if (_fileSlots[mode]) return _fileSlots[mode];
  const files = Object.keys(fileCounts(mode)).sort();
  const used = new Set(), map = {};
  for (const f of files) {
    let slot = hashStr(f) % _SLOTS, t = 0;
    while (used.has(slot) && t < _SLOTS) { slot = (slot + 1) % _SLOTS; t++; }
    used.add(slot); map[f] = slot;
  }
  return (_fileSlots[mode] = map);
}
function colorRGB(file) {
  const map = ensureFileSlots(state.fileview);
  const slot = (file in map) ? map[file] : hashStr(file) % _SLOTS;
  return slotColor(slot);
}

function fileCounts(mode) {
  const counts = {};
  for (const id in allNodes) {
    const f = fileOf(allNodes[id], mode);
    if (f) counts[f] = (counts[f] || 0) + 1;
  }
  return counts;
}

let fileBg = null;            // {canvas, minX, minY, w, h, W, H} in graph coords

function rebuildFileBg(quick) {
  const mode = state.fileview;
  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
  const sc  = network.getScale();
  if (e.ctrlKey) {
    const f        = e.deltaY > 0 ? 0.9 : 1 / 0.9;
    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, sc * f));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    let nx = pos.x + e.deltaX / sc;
    let ny = pos.y + e.deltaY / sc;
    if (graphBounds) {
      nx = Math.max(graphBounds.left, Math.min(graphBounds.right,  nx));
      ny = Math.max(graphBounds.top,  Math.min(graphBounds.bottom, ny));
    }
    network.moveTo({ position: { x: nx, y: ny }, animation: false });
  }
}, { capture: true, passive: false });

// ── Apply current filter state to the canvas ────────────────────────────────

function apply() {
  const vis   = visibleSet();
  const nodes = graphData.nodes.filter(n => vis.has(n.id));
  const edges = graphData.edges.filter(e => vis.has(e.from) && vis.has(e.to));

  nodesDS.clear(); edgesDS.clear();
  nodesDS.add(nodes); edgesDS.add(edges);

  $("stat").innerHTML =
    `${nodes.length} / ${graphData.nodes.length} nodes &middot; ${edges.length} edges`;

  const pill = $("focus-pill");
  if (state.focus) {
    pill.style.display = "inline-flex";
    pill.querySelector(".lbl").textContent = "focus: " + state.focus.split(":").pop();
  } else {
    pill.style.display = "none";
  }

  // Re-settle the now-visible subset; the stabilization handler freezes and
  // fits when it finishes. With nothing to simulate (a lone node, or only
  // isolated nodes — which are physics:false) we lay out and fit directly.
  const anyPhysics = nodes.some(n => n.physics !== false);
  if (nodes.length > 1 && anyPhysics) {
    network.setOptions({ physics: PHYSICS_OPTS });
  } else {
    setTimeout(() => { layoutOrphans(); fitFloored(); }, 0);
  }
}

function syncControls() {
  $("orphans").checked  = state.showOrphans;
  $("nodeset").value    = state.nodeset;
  $("fileview").value   = state.fileview;
  $("component").value  = state.component === null ? "" : String(state.component);
  $("chapter").value    = state.chapter || "";
}

// ── Reveal-aware navigation ─────────────────────────────────────────────────

function goTo(id) {
  if (!allNodes[id]) return;
  if (!visibleSet().has(id)) {            // relax filters until the node is shown
    state.focus = null;
    state.component = null;
    state.chapter = null;
    if (!inNodeset(id)) state.nodeset = "union";
    if (isOrphan(id)) state.showOrphans = true;
    syncControls();
    apply();
  }
  setTimeout(() => jumpTo(id), 70);
}

function jumpTo(id) {
  if (!allNodes[id]) return;
  network.selectNodes([id]);
  network.focus(id, { scale: 1.2, animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  renderNode(id);
  highlightCone(id);
}

function setFocus(id) {
  if (!allNodes[id]) return;
  state.focus = id;
  apply();
  renderNode(id);
  setTimeout(() => jumpTo(id), 70);
}

function clearFocus() { state.focus = null; apply(); }

function resetView() {
  state.showOrphans = false;
  state.focus = null;
  state.component = null;
  state.chapter = null;
  state.nodeset = "union";
  $("search").value = "";
  syncControls();
  apply();
}

// ── Control wiring ──────────────────────────────────────────────────────────

$("orphans").addEventListener("change", e => {
  state.showOrphans = e.target.checked; state.focus = null; apply();
});
$("nodeset").addEventListener("change", e => {
  state.nodeset = e.target.value; state.focus = null; apply();
});
$("component").addEventListener("change", e => {
  state.component = e.target.value === "" ? null : Number(e.target.value);
  state.focus = null; apply();
});
$("chapter").addEventListener("change", e => {
  state.chapter = e.target.value || null; state.focus = null; apply();
});
$("fileview").addEventListener("change", e => {
  state.fileview = e.target.value; rebuildFileBg();
});
$("search").addEventListener("change", e => {
  const v = e.target.value.trim();
  if (allNodes[v]) goTo(v);
});
$("reset").addEventListener("click", resetView);
$("focus-pill").addEventListener("click", clearFocus);

// ── Lean syntax highlighter ─────────────────────────────────────────────────

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _KW      = /\b(def|lemma|theorem|instance|class|structure|inductive|abbrev|noncomputable|private|protected|section|namespace|end|open|variable|where|do|let|have|show|suffices|calc|if|then|else|return|for|in|fun|match|with|by|sorry)\b/g;
const _TACTIC  = /\b(simp|ext|rfl|exact|intro|intros|apply|refine|constructor|use|rw|rewrite|rcases|rintro|obtain|push_neg|norm_num|ring|group|linarith|omega|decide|trivial|assumption|congr|tauto|aesop|cases|induction|revert|clear|next|all_goals|repeat|try|first|solve|fin_cases|positivity|gcongr|field_simp)\b/g;
const _TYPE    = /\b(Nat|Int|Bool|String|List|Array|Option|Type|Prop|Sort|True|False|And|Or|Not|Iff|Eq|Subgroup|Group|Ring|Field|Fintype|Finite)\b/g;
const _NUM     = /\b(\d+)\b/g;
const _STR     = /("(?:[^"\\]|\\.)*")/g;

function highlightLean(raw) {
  return raw.split('\n').map(line => {
    let commentAt = -1;
    let inStr = false;
    for (let i = 0; i < line.length - 1; i++) {
      if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inStr = !inStr;
      if (!inStr && line[i] === '-' && line[i+1] === '-') { commentAt = i; break; }
    }
    const code    = commentAt >= 0 ? line.slice(0, commentAt) : line;
    const comment = commentAt >= 0 ? line.slice(commentAt)    : '';
    let h = esc(code);
    h = h.replace(_STR,    m => `<span class="hl-str">${m}</span>`);
    h = h.replace(_KW,     m => `<span class="hl-kw">${m}</span>`);
    h = h.replace(_TACTIC, m => `<span class="hl-tactic">${m}</span>`);
    h = h.replace(_TYPE,   m => `<span class="hl-type">${m}</span>`);
    h = h.replace(_NUM,    m => `<span class="hl-num">${m}</span>`);
    const commentHtml = comment ? `<span class="hl-comment">${esc(comment)}</span>` : '';
    return h + commentHtml;
  }).join('\n');
}

// ── LaTeX renderer ───────────────────────────────────────────────────────────

function processNonMath(s) {
  return esc(s)
    .replace(/\\emph\{([^}]*)\}/g,   '<em>$1</em>')
    .replace(/\\textbf\{([^}]*)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^}]*)\}/g, '<em>$1</em>')
    .replace(/\\text\{([^}]*)\}/g,   '$1');
}

function renderLatex(el, text) {
  if (!text || !text.trim()) {
    el.classList.add('empty'); el.textContent = '—'; return;
  }
  // Match every math delimiter style leanblueprint uses: $$…$$ and \[…\]
  // (display) and \(…\) and $…$ (inline). $$ and \[ \] come first so the
  // single-$ branch can't grab a $$ opener.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$(?:[^$\\]|\\.)+?\$)/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    html += processNonMath(text.slice(last, m.index));
    const raw = m[0];
    let disp, math;
    if      (raw.startsWith('$$'))  { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\[')) { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\(')) { disp = false; math = raw.slice(2, -2); }
    else                            { disp = false; math = raw.slice(1, -1); }
    if (window.katex) {
      try {
        html += katex.renderToString(math, {
          displayMode: disp, throwOnError: false, macros: katexMacros,
        });
      }
      catch (_) { html += esc(raw); }
    } else {
      html += `<span style="color:#94a3b8">${esc(raw)}</span>`;
    }
    last = re.lastIndex;
  }
  html += processNonMath(text.slice(last));
  el.innerHTML = html;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function charVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  return `<span class="m-val">${v.toLocaleString()}</span>`;
}
function workVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  if (v === 0) return '<span class="m-val m-done">0 ✓</span>';
  return `<span class="m-val m-work">${v.toLocaleString()}</span>`;
}
function charsPair(rel, cum) {
  const f = v => (v === null || v === undefined)
    ? '<span class="chars-inf">∞</span>'
    : `<span class="chars-val">${v}</span>`;
  return `<span class="chars-pair">ℓ<sub>local</sub>=${f(rel)} &nbsp; ℓ<sub>total</sub>=${f(cum)}</span>`;
}

function renderNode(id) {
  const n = allNodes[id];
  if (!n) return;

  $("sidebar-empty").style.display = "none";
  const content = $("sidebar-content");
  content.style.display = "flex";

  const statusBadge = n.proved
    ? '<span class="badge badge-proved">✓ leanok</span>'
    : (n.mathlib_ok
        ? '<span class="badge badge-proved">ⓜ mathlib</span>'
        : (n.has_sorry
            ? '<span class="badge badge-sorry">sorry</span>'
            : '<span class="badge badge-unproved">unproved</span>'));

  const mkChip = u => `<span class="dep-chip" onclick="goTo('${esc(u)}')">${esc(u)}</span>`;
  const depsHtml = n.uses.length
    ? n.uses.map(mkChip).join('')
    : '<span class="no-deps">none — axiom</span>';

  // full transitive upstream, with the direct deps split out
  const anc       = ancestorsOf(id);
  const directSet = new Set(n.uses);
  const indirect  = [...anc].filter(x => !directSet.has(x)).sort();
  const transHtml = indirect.length
    ? indirect.map(mkChip).join('')
    : '<span class="no-deps">none beyond the direct ones</span>';

  const focusLabel = state.focus === id ? 'Clear focus' : 'Focus dependency cone';
  const focusCall  = state.focus === id ? 'clearFocus()' : `setFocus('${esc(id)}')`;

  content.innerHTML = `
    <div class="card">
      <div class="node-badges">
        <span class="badge badge-type">${n.type.toUpperCase()}</span>${statusBadge}
      </div>
      <div class="node-title">${esc(n.title || n.id)}</div>
      <div class="node-id">${esc(n.id)}</div>
      ${n.chapter   ? `<div class="node-chapter">§ ${esc(n.chapter)}</div>` : ''}
      ${n.lean_name ? `<div class="lean-ref">Lean: <code>${esc(n.lean_name)}</code></div>` : ''}
      ${n.tex_file  ? `<div class="lean-ref">tex: <code>${esc(n.tex_file)}</code></div>` : ''}
      ${n.lean_file ? `<div class="lean-ref">file: <code>${esc(n.lean_file)}</code></div>` : ''}
      <button class="btn-focus" onclick="${focusCall}">⊙ ${focusLabel}</button>
    </div>

    <div class="card">
      <div class="card-title">Structure</div>
      <div class="degrees">
        <div class="degree">
          <span class="degree-val">${n.dep_count}</span>
          <span class="degree-label">direct deps</span>
        </div>
        <div class="degree">
          <span class="degree-val">${anc.size}</span>
          <span class="degree-label">total upstream</span>
        </div>
        <div class="degree">
          <span class="degree-val">${n.rdep_count}</span>
          <span class="degree-label">used by</span>
        </div>
      </div>
      <div class="deps-sub">direct dependencies</div>
      <div class="deps-list">${depsHtml}</div>
      <div class="deps-sub">indirect (transitive) dependencies</div>
      <div class="deps-list">${transHtml}</div>
    </div>

    <div class="card">
      <div class="card-title">Complexity</div>
      <div class="metrics-grid">
        <span></span>
        <span class="col-head">local</span>
        <span class="col-head">total</span>
        <span class="m-label">LaTeX ℓ</span>${charVal(n.proof_size_tex)}${charVal(n.proof_size_tex_total)}
        <span class="m-label">Lean ℓ</span>${charVal(n.proof_size_lean)}${charVal(n.proof_size_lean_total)}
        <span class="m-label">Effort</span>${workVal(n.effort_local)}${workVal(n.effort_total)}
      </div>
    </div>

    <div class="card">
      <div class="sec-hdr"><span class="card-title" style="margin:0">LaTeX statement</span></div>
      <div class="latex-rendered" id="latex-stmt"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">LaTeX proof</span>
        ${charsPair(n.proof_size_tex, n.proof_size_tex_total)}
      </div>
      <div class="latex-rendered" id="latex-proof"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">Lean code</span>
        ${charsPair(n.proof_size_lean, n.proof_size_lean_total)}
      </div>
      <pre class="code-block" id="lean-code"></pre>
    </div>
  `;

  renderLatex($('latex-stmt'),  n.statement);
  renderLatex($('latex-proof'), n.proof_tex ? n.proof_tex.trim() : '');

  const leanEl = $('lean-code');
  if (n.lean_source) {
    leanEl.innerHTML = highlightLean(n.lean_source);
  } else {
    leanEl.classList.add('empty');
    leanEl.textContent = 'declaration not found';
  }
}

// ── Cone highlighting on click ───────────────────────────────────────────────
// Selecting a node lights up its WHOLE transitive cone — every ancestor and
// descendant and the edges between them — while everything else fades back.

const baseNodeById = {};
for (const vn of graphData.nodes) baseNodeById[vn.id] = vn;

const EDGE_BASE = { color: "#cbd5e1", highlight: "#64748b" };

function highlightCone(id) {
  const cone = coneOf(id);   // {id} ∪ ancestors ∪ descendants
  nodesDS.update(nodesDS.getIds().map(nid =>
    cone.has(nid)
      ? baseNodeById[nid]                                   // full styling
      : { id: nid, color: { background: "#e5e7eb", border: "#d1d5db" },
          font: { color: "#cbd5e1" } }                      // faded
  ));
  edgesDS.update(edgesDS.get().map(e => {
    const on = cone.has(e.from) && cone.has(e.to);
    return { id: e.id,
             color: on ? { color: "#475569", highlight: "#334155" } : { color: "#edf0f4" },
             width: on ? 2.5 : 1 };
  }));
}

function clearHighlight() {
  nodesDS.update(nodesDS.getIds().map(nid => baseNodeById[nid]));
  edgesDS.update(edgesDS.get().map(e => ({ id: e.id, color: EDGE_BASE, width: 1 })));
}

network.on("click", params => {
  if (params.nodes.length) { renderNode(params.nodes[0]); highlightCone(params.nodes[0]); }
  else                     { clearHighlight(); }
});
network.on("doubleClick", params => { if (params.nodes.length) setFocus(params.nodes[0]); });

// ── Initial render ───────────────────────────────────────────────────────────

apply();
</script>
</body>
</html>
