<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="chapter"><option value="">All chapters</option></select>

  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">

  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">

      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

800}, "def:fujiki-constant": {"id": "def:fujiki-constant", "type": "definition", "title": "Fujiki constant", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 2.1.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  The \\emph{Fujiki constant}\n  \\(c_X\\) is the unique positive rational number such that\n  \\(\\int_X \\alpha^{2n} = c_X\\, q_X(\\alpha)^n\\) for all \\(\\alpha \\in H^2(X, \\mathbb{R})\\).", "uses": ["def:bbf-form"], "lean_name": "HK.fujikiConstant", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 17, "proof_size_tex": null, "effort_local": 323, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1123}, "lem:fujiki-relation": {"id": "lem:fujiki-relation", "type": "lemma", "title": "Fujiki relation", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 2.1, equation (1).}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  For all\n  \\(\\alpha \\in H^2(X, \\mathbb{R})\\),\n  \\[\n    \\int_X \\alpha^{2n} = c_X\\, q_X(\\alpha)^n.\n  \\]", "uses": ["def:bbf-form", "def:fujiki-constant"], "lean_name": "HK.fujiki_relation", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:bbf-form, def:fujiki-constant}\n  This is the defining characterization of the Fujiki constant; see Huybrechts\n  \\cite[Proposition~23.14]{huy}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 15, "proof_size_tex": 152, "effort_local": 152, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1275}, "lem:fujiki-polarized": {"id": "lem:fujiki-polarized", "type": "lemma", "title": "Polarized Fujiki relation", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 2.1, equation (2).}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  Assume\n  \\(\\alpha \\in H^2(X, \\mathbb{R})\\) with \\(q_X(\\alpha) = 0\\).  For all\n  \\(\\beta \\in H^2(X, \\mathbb{R})\\),\n  \\[\n    \\frac{1}{2^n}\\binom{2n}{n}\\int_X \\alpha^n \\beta^n = c_X\\, q_X(\\alpha, \\beta)^n.\n  \\]", "uses": ["lem:fujiki-relation"], "lean_name": "HK.fujiki_polarized", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:fujiki-relation}\n  Since \\(q_X(\\alpha) = 0\\), one has \\(\\alpha^{n+1} = 0\\) by\n  \\cite[Proposition~24.1]{huy}.  Compare the coefficients of \\(t^n\\) in\n  \\(\\int_X (t\\alpha + \\beta)^{2n} = c_X q_X(t\\alpha + \\beta)^n\n    = c_X\\bigl(2t\\,q_X(\\alpha, \\beta) + q_X(\\beta)\\bigr)^n\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 284, "effort_local": 284, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1559}, "lem:fujiki-fourfold": {"id": "lem:fujiki-fourfold", "type": "lemma", "title": "Fujiki relation in dimension 4", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 2.1, equation (3).}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold with Fujiki constant \\(c_X\\).  For all\n  \\(\\alpha_1, \\alpha_2, \\alpha_3, \\alpha_4 \\in H^2(X, \\mathbb{Z})\\),\n  \\[\n    3\\int_X \\alpha_1 \\alpha_2 \\alpha_3 \\alpha_4\n    = c_X\\bigl(\n      q_X(\\alpha_1,\\alpha_2)q_X(\\alpha_3,\\alpha_4)\n      + q_X(\\alpha_1,\\alpha_3)q_X(\\alpha_2,\\alpha_4)\n      + q_X(\\alpha_1,\\alpha_4)q_X(\\alpha_2,\\alpha_3)\n    \\bigr).\n  \\]", "uses": ["lem:fujiki-polarized"], "lean_name": "HK.fujiki_fourfold", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:fujiki-polarized}\n  Polarize the Fujiki relation at \\(n = 2\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 72, "effort_local": 72, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1631}, "def:hrr-polynomial": {"id": "def:hrr-polynomial", "type": "definition", "title": "Huybrechts--Riemann--Roch polynomial", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 2.2.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  The\n  \\emph{Huybrechts--Riemann--Roch polynomial} is the unique polynomial\n  \\(P_{RR,X}(T) = \\sum_{i=0}^n a_i T^i \\in \\mathbb{Q}[T]\\) of degree \\(n\\) such that\n  \\(\\chi(X, L) = P_{RR,X}(q_X(c_1(L)))\\) for every line bundle \\(L\\) on \\(X\\).  Its\n  properties are: (a)~the constant term is \\(\\chi(X, \\mathcal{O}_X) = n+1\\); (b)~the\n  leading term is \\(\\dfrac{c_X}{(2n)!}T^n\\); (c)~all coefficients are positive.", "uses": ["def:bbf-form"], "lean_name": "HK.HRRPolynomial", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 16, "proof_size_tex": null, "effort_local": 556, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1356}, "lem:binomial-coefficient": {"id": "lem:binomial-coefficient", "type": "lemma", "title": "Mathlib: binomial coefficient", "chapter": "Overview", "statement": "\\textit{Provided by Mathlib.}\n  For nonneg\\-ative integers \\(n\\) and \\(k\\), the binomial coefficient \\(\\binom{n+k}{k} \\in \\mathbb{N}\\).", "uses": [], "lean_name": "Nat.choose", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:integer-valued-polynomial": {"id": "lem:integer-valued-polynomial", "type": "lemma", "title": "Mathlib: integer-valued polynomial at integers", "chapter": "Overview", "statement": "\\textit{Provided by Mathlib.}\n  A polynomial over \\(\\mathbb{Z}\\) evaluates to an integer at every integer argument.", "uses": [], "lean_name": "Polynomial.eval_intCast_map", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:hrr-integral": {"id": "lem:hrr-integral", "type": "lemma", "title": "HRR polynomial is integer-valued on the lattice", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 2.1.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold.  For every class \\(\\alpha \\in H^2(X, \\mathbb{Z})\\),\n  \\[\n    P_{RR,X}(q_X(\\alpha)) \\in \\mathbb{Z}.\n  \\]", "uses": ["def:hrr-polynomial", "lem:integer-valued-polynomial"], "lean_name": "HK.hrr_integral", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hrr-polynomial}\n  By surjectivity of the period map \\cite[Proposition~25.12]{huy}, the class \\(\\alpha\\)\n  deforms to \\(c_1(L')\\) for a holomorphic line bundle \\(L'\\) on a deformation \\(X'\\)\n  of \\(X\\).  Then \\(P_{RR,X'}(q_{X'}(\\alpha)) = \\chi(X', L') \\in \\mathbb{Z}\\).  Since\n  \\(P_{RR,X}\\) and \\(q_X\\) are deformation invariant, the claim follows.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 15, "proof_size_tex": 358, "effort_local": 358, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1714}, "lem:a-is-integer": {"id": "lem:a-is-integer", "type": "lemma", "title": "The number \\(a\\) is an integer", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 2.2.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  Assume\n  \\(l \\in H^2(X, \\mathbb{Z})\\) with \\(\\int_X l^{2n} = 0\\).  For every\n  \\(m \\in H^2(X, \\mathbb{Z})\\), the number\n  \\[\n    a \\coloneqq \\frac{1}{n!}\\int_X l^n m^n\n  \\]\n  is an integer.", "uses": ["lem:fujiki-relation", "lem:hrr-integral"], "lean_name": "HK.a_is_integer", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:fujiki-relation, lem:hrr-integral}\n  The Fujiki relation gives \\(q_X(l) = 0\\).  Set\n  \\(P(k) \\coloneqq P_{RR,X}(2k\\,q_X(l,m) + q_X(m))\\); this is a degree-\\(n\\) polynomial\n  in \\(k\\) with leading coefficient \\(a/n!\\).\n  By \\cref{lem:hrr-integral}, \\(P\\) takes integer values at all integers, hence \\(a\\) is\n  an integer.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 12, "proof_size_tex": 330, "effort_local": 330, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2519}, "thm:hrr-from-lagrangian": {"id": "thm:hrr-from-lagrangian", "type": "theorem", "title": "HRR polynomial from a Lagrangian fibration with \\(a=1\\)", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Theorem 3.1.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\) with a Lagrangian fibration\n  \\(f \\colon X \\to \\mathbb{P}^n\\).  Set\n  \\(l \\coloneqq c_1(f^*\\mathcal{O}_{\\mathbb{P}^n}(1)) \\in H^2(X, \\mathbb{Z})\\) and assume\n  there exists \\(m \\in H^2(X, \\mathbb{Z})\\) with \\(\\int_X l^n m^n = n!\\).  Then\n  \\(q_X(l,m) = \\pm 1\\), the quadratic form \\(q_X\\) is even, \\(c_X = (2n-1)!!\\),\n  \\[\n    P_{RR,X}(T) = \\binom{\\tfrac{T}{2} + n + 1}{n},\n  \\]\n  and the sublattice \\(\\mathbb{Z}l \\oplus \\mathbb{Z}m\\) of \\((H^2(X, \\mathbb{Z}), q_X)\\)\n  is isomorphic to a hyperbolic plane.", "uses": ["def:bbf-form", "def:hrr-polynomial", "lem:polynomial-parity"], "lean_name": "HK.hrr_from_lagrangian", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hrr-polynomial, lem:hrr-integral, lem:polynomial-parity}\n  Replace \\((X, L)\\) by a deformation where \\(\\operatorname{NS}(X') = \\mathbb{Z}l \\oplus \\mathbb{Z}m\\)\n  and \\(L'\\) is nef; a Lagrangian fibration \\(f'\\) on \\(X'\\) still exists by\n  \\cite[Theorem~1.2, Claims~3.1--3.2]{mat:isotropic}.  Make \\(M\\) ample by replacing it\n  with \\(L^k \\otimes M\\) for \\(k \\gg 0\\).  Then \\(f'_*M\\) is locally free of rank \\(a = 1\\)\n  on \\(\\mathbb{P}^n\\), so \\(f'_*M \\cong \\mathcal{O}_{\\mathbb{P}^n}(d)\\) for some \\(d\\)\n  \\cite[Section~3]{ort}.  The projection formula and definition of \\(P_{RR,X}\\) give\n  \\(P_{RR,X}(T) = \\binom{d + (T - q_X(m))/(2q_X(l,m)) + n}{n}\\).  Using\n  \\(P_{RR,X}(0) = n+1\\) and positivity of coefficients forces \\(q_X(m) = 0\\) and \\(d = 1\\).\n  Apply \\cref{lem:polynomial-parity} with \\(c = n!\\), \\(c' = 1\\), \\(q = 2q_X(l,m)\\) to\n  conclude \\(q_X(l,m) = 1\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 878, "effort_local": 878, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3214}, "lem:polynomial-parity": {"id": "lem:polynomial-parity", "type": "lemma", "title": "Polynomial parity", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 3.2.}\n  Let \\(X\\) be a hyper-K\\\"ahler manifold of dimension \\(2n\\).  Assume there are positive\n  integers \\(c\\), \\(c'\\), and \\(q\\) such that \\(c'\\) is divisible by no nontrivial\n  \\(n\\)-th powers and the polynomial \\(P(T) \\coloneqq \\tfrac{c}{c'} P_{RR,X}(qT)\\) is\n  monic with integral coefficients.  Then either \\(q = 1\\), or \\(q = 2\\) and \\(q_X\\) is\n  even.", "uses": ["lem:hrr-integral"], "lean_name": "HK.polynomial_parity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:hrr-integral}\n  For \\(\\alpha \\in H^2(X, \\mathbb{Z})\\), write \\(q_X(\\alpha)/q = r/s\\) in lowest terms.\n  Since \\(P\\) is monic with integral coefficients, \\(s^n P(r/s) \\equiv r^n \\pmod{s}\\),\n  so \\(s^n P(r/s)\\) is coprime to \\(s^n\\).  But\n  \\(c'\\, s^n P(r/s) = c\\, s^n P_{RR,X}(q_X(\\alpha))\\) is divisible by \\(s^n\\) (using\n  \\cref{lem:hrr-integral}), so \\(s^n \\mid c'\\).  The hypothesis on \\(c'\\) forces\n  \\(s = \\pm 1\\), i.e.\\ \\(q \\mid q_X(\\alpha)\\) for all \\(\\alpha \\in H^2(X, \\mathbb{Z})\\).\n  Since the associated bilinear form of \\(q_X\\) is not divisible, this gives \\(q = 1\\)\n  or \\(q = 2\\) with \\(q_X\\) even.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": 622, "effort_local": 622, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2336}, "def:topological-constant": {"id": "def:topological-constant", "type": "definition", "title": "Topological constant \\(A_X\\)", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 4, equation (5).}\n  For a hyper-K\\\"ahler fourfold \\(X\\), define the topological constant\n  \\[\n    A_X \\coloneqq \\int_X \\mathrm{td}^{1/2}(X)\n    = \\frac{1}{5760}\\bigl(7c_2(X)^2 - 4c_4(X)\\bigr).\n  \\]", "uses": ["def:hyp-kahler-fourfold"], "lean_name": "HK.topologicalConstant", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": null, "effort_local": 276, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 672}, "lem:betti-numbers": {"id": "lem:betti-numbers", "type": "lemma", "title": "Betti numbers of hyper-K\\\"ahler fourfolds", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 4.1.}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold.  Then either:\n  \\begin{enumerate}\n    \\item[(a)] \\(b_2(X) = 23\\), \\(b_3(X) = 0\\), and the Hodge numbers of \\(X\\) are those\n      of the Hilbert square of a K3 surface, with \\(c_4(X) = 324\\) and\n      \\(A_X = 25/32\\); or\n    \\item[(b)] \\(b_2(X) \\le 8\\), \\(c_4(X) \\le 144\\), and \\(5/6 \\le A_X \\le 131/144\\).\n  \\end{enumerate}\n  In particular, if \\(t \\in [0, 1/3)\\), then \\(4A_X - t\\) is an integer only when\n  \\(t = 1/8\\) and \\(A_X = 25/32\\).", "uses": ["def:topological-constant"], "lean_name": "HK.betti_numbers", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:topological-constant}\n  Apply the relation \\(c_4(X) = 3(4b_2(X) + 16 - b_3(X))\\) and the classification of\n  possible Betti numbers for hyper-K\\\"ahler fourfolds from Guan\n  \\cite[Main Theorem]{gua}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 208, "effort_local": 208, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 880}, "lem:sqrt-rationality": {"id": "lem:sqrt-rationality", "type": "lemma", "title": "Square-root rationality", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 4.2.}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold with \\(l, m \\in H^2(X, \\mathbb{Z})\\) satisfying\n  \\(q_X(l) = 0\\) and \\(a \\coloneqq \\tfrac{1}{2}\\int_X l^2 m^2\\).  Then\n  \\(\\sqrt{2aA_X} \\in \\mathbb{Q}\\).", "uses": ["def:topological-constant", "lem:a-is-integer", "def:hrr-polynomial"], "lean_name": "HK.sqrt_rationality", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hrr-polynomial, lem:a-is-integer}\n  From the Fujiki relation and \\cref{lem:a-is-integer}, one has \\(c_X q_X(l,m)^2 = 3a\\).\n  Using \\cite[Lemma~5.7]{jia},\n  \\[\n    P_{RR,X}(T)\n    = \\frac{c_X}{24}T^2 + T\\sqrt{\\tfrac{2}{3}c_X A_X} + 3\n    = \\frac{a}{8}\\Bigl(\\frac{T}{q_X(l,m)}\\Bigr)^{\\!2}\n      + \\sqrt{2aA_X}\\,\\frac{T}{q_X(l,m)} + 3.\n  \\]\n  Since \\(P_{RR,X}\\) has rational coefficients, \\(\\sqrt{2aA_X}\\) is rational.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 425, "effort_local": 425, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3220}, "thm:conjecture14-fourfold": {"id": "thm:conjecture14-fourfold", "type": "theorem", "title": "Conjecture 1.4 in dimension 4", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Theorem 4.3.}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold with \\(l, m \\in H^2(X, \\mathbb{Z})\\) satisfying\n  \\(\\int_X l^4 = 0\\) and \\(\\int_X l^2 m^2 = 2\\).  Then the Chern and Hodge numbers of\n  \\(X\\) are those of the Hilbert square of a K3 surface, and \\(q_X(l,m) = 1\\), \\(q_X\\) is\n  even, \\(c_X = 3\\), and\n  \\[\n    P_{RR,X}(T) = \\binom{\\tfrac{T}{2} + 3}{2}.\n  \\]", "uses": ["lem:betti-numbers", "lem:sqrt-rationality", "lem:polynomial-parity", "def:hrr-polynomial"], "lean_name": "HK.conjecture14_fourfold", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:betti-numbers, lem:sqrt-rationality, lem:polynomial-parity}\n  Replacing \\(m\\) by \\(\\pm m + rl\\) for \\(r \\in \\mathbb{Z}\\), assume\n  \\(\\gamma \\coloneqq q_X(m)/q_X(l,m) \\in (-1, 1]\\).  Set\n  \\(P(k) \\coloneqq P_{RR,X}(2k\\,q_X(l,m) + q_X(m))\\); using \\cref{lem:sqrt-rationality}\n  with \\(a = 1\\),\n  \\[\n    P(k) = \\tfrac{1}{2}k^2 + bk + c,\n    \\quad\n    b = \\tfrac{1}{2}\\gamma + 2\\sqrt{2A_X},\n    \\quad\n    c = \\tfrac{1}{8}\\gamma^2 + \\gamma\\sqrt{2A_X} + 3.\n  \\]\n  Since \\(P\\) takes integer values at integers, \\(4A_X - b^2/2 = 3 - c\\) is an integer,\n  so \\(4A_X - 1/8 \\in \\mathbb{Z}\\).  By \\cref{lem:betti-numbers}, this forces\n  \\(A_X = 25/32\\), giving the K3\\(^{[2]}\\) Hodge/Chern numbers.  Then \\(\\gamma = 0\\),\n  \\(q_X(m) = 0\\), \\(c = 3\\), and \\(P_{RR,X}(2k\\,q_X(l,m)) = \\binom{k+3}{2}\\).\n  Apply \\cref{lem:polynomial-parity} with parameters \\(c = 2\\), \\(c' = 1\\),\n  \\(q = 2q_X(l,m)\\) to conclude \\(q_X(l,m) = 1\\) and \\(q_X\\) even.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 10, "proof_size_tex": 938, "effort_local": 938, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4988}, "def:standard-triple": {"id": "def:standard-triple", "type": "definition", "title": "Standard triple", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 5.2.}\n  A \\emph{standard triple} \\((X, l, m)\\) consists of a hyper-K\\\"ahler fourfold \\(X\\) and\n  classes \\(l, m \\in \\operatorname{NS}(X)\\) satisfying \\(\\int_X l^4 = 0\\) and\n  \\(\\int_X l^2 m^2 = 2\\).  By \\cref{thm:conjecture14-fourfold}, such a triple also\n  satisfies (after possibly replacing \\(m\\) by \\(-m\\) plus a multiple of \\(l\\)):\n  \\(q_X(l) = q_X(m) = 0\\), \\(q_X(l,m) = 1\\), \\(P_{RR,X}(T) = \\binom{T/2 + 3}{2}\\),\n  \\(q_X\\) is even, and \\(c_X = 3\\).", "uses": ["thm:conjecture14-fourfold"], "lean_name": "HK.StandardTriple", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 9, "proof_size_tex": null, "effort_local": 534, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5522}, "def:exceptional-divisor": {"id": "def:exceptional-divisor", "type": "definition", "title": "Exceptional divisor of a standard triple", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section 3.2.}\n  Let \\((X, l, m)\\) be a standard triple with\n  \\(\\operatorname{NS}(X) = \\mathbb{Z}l \\oplus \\mathbb{Z}m\\).  The\n  \\emph{exceptional divisor} \\(E\\) is the unique prime divisor in \\(|L^{-1} \\otimes M|\\)\n  satisfying \\(q_X([E]) = -2\\) and \\(q_X([E], m) = -1\\).", "uses": ["def:standard-triple", "def:bbf-form"], "lean_name": "HK.exceptionalDivisor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": null, "effort_local": 342, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5864}, "lem:prime-exceptional-class": {"id": "lem:prime-exceptional-class", "type": "lemma", "title": "Class of a prime exceptional divisor", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Lemma 5.3.}\n  Let \\((X, l, m)\\) be a standard triple with\n  \\(\\operatorname{NS}(X) = \\mathbb{Z}l \\oplus \\mathbb{Z}m\\), and let \\(E\\) be a prime\n  exceptional divisor on \\(X\\).  Then \\([E] = \\pm(-l + m)\\) in \\(\\operatorname{NS}(X)\\).", "uses": ["def:exceptional-divisor"], "lean_name": "HK.prime_exceptional_class", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exceptional-divisor}\n  Write \\([E] = tl + um\\) with \\(t, u \\in \\mathbb{Z}\\).  By\n  \\cite[Corollary~3.6]{mar}, the class \\(-2q_X([E], \\cdot)/q_X([E])\\) lies in\n  \\(H_2(X, \\mathbb{Z})\\).  Applying this to \\(l\\) and \\(m\\) separately gives\n  \\(|t| = |u| = 1\\).  Since \\(q_X([E]) = -2tu\\,q_X(l,m) = -2tu < 0\\), we have\n  \\(tu > 0\\) is impossible; hence \\(t = -u\\), giving \\([E] = \\pm(-l + m)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 399, "effort_local": 399, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6263}, "lem:nef-movable-coincide": {"id": "lem:nef-movable-coincide", "type": "lemma", "title": "Nef and movable cones coincide", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Proposition 5.5.}\n  Let \\((X, l, m)\\) be a very general standard triple with\n  \\(\\operatorname{NS}(X) = \\mathbb{Z}l \\oplus \\mathbb{Z}m\\).  The nef and movable cones\n  of \\(X\\) coincide; equivalently, \\(X\\) has no nontrivial hyper-K\\\"ahler birational\n  models.", "uses": ["def:standard-triple"], "lean_name": "HK.nef_movable_coincide", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:standard-triple}\n  Assume for contradiction that the nef and movable cones differ.  By\n  \\cite[Theorem~1.1]{wiwi}, there exists a Mukai flop, yielding a Lagrangian\n  \\(\\mathbb{P}^2 \\subset X\\).  Choose \\(A \\in \\operatorname{NS}(X)\\) dual to the line\n  class \\(\\ell \\in H_2(X, \\mathbb{Z})\\) via \\(q_X(A, B) = B \\cdot \\ell\\).  Writing\n  \\([\\mathbb{P}^2] = tA^2 + u q_X^\\vee \\in H^4(X, \\mathbb{Q})\\) and computing the\n  intersection numbers \\([\\mathbb{P}^2]^2\\), \\(c_2(X) \\cdot [\\mathbb{P}^2]\\),\n  \\(A^2 \\cdot [\\mathbb{P}^2]\\) using \\(c_X = 3\\) and the formulas from\n  \\cref{def:standard-triple}, one arrives at the Diophantine equation\n  \\(92\\,q_X(A)^2 + 20\\,q_X(A) - 525 = 0\\), which has no integral solutions.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 719, "effort_local": 719, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6241}, "prop:nef-case-sfz": {"id": "prop:nef-case-sfz", "type": "proposition", "title": "Nef case: structure of the linear systems", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Proposition 5.6.}\n  Let \\((X, l, m)\\) be a very general standard triple in case~(C1): \\(m\\) is nef.  Then\n  one of the following holds:\n  \\begin{enumerate}\n    \\item[(a)] \\(H^0(X, L) \\ne 0\\), \\(H^0(X, M) \\ne 0\\), and there is a Lagrangian\n      fibration \\(f \\colon X \\to \\mathbb{P}^2\\) with\n      \\(f^*\\mathcal{O}_{\\mathbb{P}^2}(1) \\cong L\\) or \\(M\\);\n    \\item[(b)] at least one of \\(H^0(X, L)\\) or \\(H^0(X, M)\\) vanishes, and the image of\n      the rational map \\(\\phi_{L \\otimes M} \\colon X \\dashrightarrow \\mathbb{P}^5\\) is\n      rationally connected.\n  \\end{enumerate}\n  In particular, case~(C1) does not occur: case~(b) is excluded by\n  \\cite[Theorem~4.2]{voisinfib}, while case~(a) contradicts \\cref{def:exceptional-divisor}\n  (in a Lagrangian fibration both \\(L\\) and \\(M\\) cannot be nef simultaneously).", "uses": ["def:standard-triple", "lem:nef-movable-coincide", "def:exceptional-divisor"], "lean_name": "HK.nef_case", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:standard-triple, lem:nef-movable-coincide}\n  \\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section~6.3.}\n  In case~(C1), both \\(l\\) and \\(m\\) are nef and isotropic with\n  \\(h^0(X, L^p \\otimes M^q) = \\binom{pq+3}{2}\\) for \\(p, q > 0\\) by Kodaira vanishing.\n\n  \\textbf{Sub-case~(a):} If \\(H^0(X,L) \\ne 0\\) and \\(H^0(X,M) \\ne 0\\), then by the\n  intersection computation (Lemma~6.1 of the paper) at least one of\n  \\(H^0(X,L)\\) or \\(H^0(X,M)\\) has dimension \\(\\ge 2\\).  By Lemma~5.1 (applied since\n  \\(\\kappa(X,L) > 0\\)) the line bundle \\(L\\) (or \\(M\\)) is globally generated and defines\n  a Lagrangian fibration \\(f \\colon X \\to \\mathbb{P}^2\\).  But then by the discussion\n  of Section~3.2, both \\(L\\) and \\(M\\) cannot be nef simultaneously in a Lagrangian\n  fibration (the exceptional divisor \\(E\\) of class \\(-l+m\\) must be prime and irreducible\n  by \\cref{def:exceptional-divisor}).  Contradiction.\n\n  \\textbf{Sub-case~(b):} If \\(H^0(X,L) = 0\\) or \\(H^0(X,M) = 0\\), the image of\n  \\(\\phi_{L \\otimes M} \\colon X \\dashrightarrow \\mathbb{P}^5\\) is rationally connected\n  (Proposition~6.3 of the paper, proved via Castelnuovo's lemma and Lemma~6.6).\n  This contradicts \\cite[Theorem~4.2]{voisinfib} for very general \\(X\\).\n\n  Hence case~(C1) does not occur.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 1287, "effort_local": 1287, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7870}, "prop:divisorial-contraction": {"id": "prop:divisorial-contraction", "type": "proposition", "title": "Divisorial contraction case: Lagrangian fibration", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Proposition 5.8.}\n  Let \\((X, l, m)\\) be a very general standard triple in case~(C2): there exists a prime\n  exceptional divisor \\(E\\) of class \\(-l + m\\).  There exist a positive integer\n  \\(k_L\\) and a Lagrangian fibration \\(f \\colon X \\to \\mathbb{P}^2\\) such that\n  \\(f^*\\mathcal{O}_{\\mathbb{P}^2}(1) \\cong L^{k_L}\\).", "uses": ["def:standard-triple", "def:exceptional-divisor", "lem:nef-movable-coincide"], "lean_name": "HK.divisorial_contraction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:standard-triple, def:exceptional-divisor}\n  \\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Section~7.}\n  In case~(C2), \\(l\\) is nef and there is a prime exceptional divisor \\(E\\) of class\n  \\(-l + m\\).  The effective cone is generated by \\(l\\) and \\(-l + m\\), so some positive\n  power of \\(L \\otimes M\\) defines a divisorial contraction \\(c \\colon X \\to Y\\) with\n  exceptional locus \\(E\\).\n\n  \\textbf{Step~1 (sections of \\(L^2\\)):} Since \\(c_E^\\ast L\\) restricts to \\(H_\\Sigma\\)\n  on \\(\\Sigma = c(E)\\), which is an ample line bundle on the K3 surface \\(\\Sigma\\) (Lemma~7.2\n  and Lemma~8.2 of the paper), one has \\(H^2(X, M^2) = H^4(X, M^2) = 0\\) and\n  \\(\\chi(X, M^2) = P_{RR,X}(0) = 3\\) (Lemma~7.3), giving \\(h^0(X, M^2) \\ge 3\\).  The\n  reflection that permutes \\(l\\) and \\(m\\) is a monodromy operator (Section~3.2); by\n  deformation and upper semi-continuity, \\(h^0(X, L^2) \\ge 2\\).\n\n  \\textbf{Step~2 (semi-ampleness and Lagrangian fibration):} Since \\(\\kappa(X, L) > 0\\)\n  (as \\(h^0(X, L^k) \\ge 2\\) for some \\(k\\)) and \\(\\dim X = 4\\), the line bundle \\(L\\) is\n  semi-ample by \\cite[Theorem~1.5]{fuk}.  For \\(k_L\\) sufficiently large and divisible,\n  the sections of \\(L^{k_L}\\) define a morphism \\(f \\colon X \\to B\\) with connected fibers.\n  By \\cite{hux}, \\(B \\cong \\mathbb{P}^2\\) and \\(f\\) is a Lagrangian fibration with\n  \\(f^*\\mathcal{O}_{\\mathbb{P}^2}(1) \\cong L^{k_L}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 1412, "effort_local": 1412, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7995}, "def:k3-squared-numerical-type": {"id": "def:k3-squared-numerical-type", "type": "definition", "title": "\\(\\mathrm{K3}^{[2", "chapter": "Overview", "statement": "}\\) numerical type]\n  \n  \n  \n  \n  \n  \\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Introduction.}\n  A hyper-K\\\"ahler fourfold \\(X\\) is \\emph{of \\(\\mathrm{K3}^{[2]}\\) numerical type} if,\n  for some K3 surface \\(S\\), there exists an isomorphism of abelian groups\n  \\(\\psi \\colon H^2(X, \\mathbb{Z}) \\to H^2(S^{[2]}, \\mathbb{Z})\\) such that\n  \\(\\int_X \\alpha^4 = \\int_{S^{[2]}} \\psi(\\alpha)^4\\) for all\n  \\(\\alpha \\in H^2(X, \\mathbb{Z})\\).  Equivalently, the BBF lattices and Fujiki constants\n  of \\(X\\) and \\(S^{[2]}\\) coincide.", "uses": ["def:bbf-form", "def:fujiki-constant"], "lean_name": "HK.K3SquaredNumericalType", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 550, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1673}, "def:k3-squared-deformation-type": {"id": "def:k3-squared-deformation-type", "type": "definition", "title": "\\(\\mathrm{K3}^{[2", "chapter": "Overview", "statement": "}\\) deformation type]\n  \n  \n  \n  \n  \n  \\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Introduction.}\n  A hyper-K\\\"ahler fourfold \\(X\\) is \\emph{of \\(\\mathrm{K3}^{[2]}\\) deformation type} if\n  \\(X\\) can be deformed as a compact complex manifold in a smooth family to the Hilbert\n  scheme \\(S^{[2]}\\) of two points on some K3 surface \\(S\\).", "uses": ["def:hyp-kahler-fourfold"], "lean_name": "HK.K3SquaredDeformationType", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 362, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 758}, "thm:hrr-formula-fourfold": {"id": "thm:hrr-formula-fourfold", "type": "theorem", "title": "HRR formula for fourfolds", "chapter": "Overview", "statement": "\\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Introduction (Theorem 1.5).}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold with \\(l, m \\in H^2(X, \\mathbb{Z})\\) satisfying\n  \\(\\int_X l^4 = 0\\) and \\(\\int_X l^2 m^2 = 2\\).  For all \\(k \\in \\mathbb{Z}\\),\n  \\[\n    P_{RR,X}(2k) = \\chi(\\mathbb{P}^2, \\mathcal{O}_{\\mathbb{P}^2}(k+1)) = \\binom{k+3}{2}.\n  \\]", "uses": ["def:standard-triple", "thm:conjecture14-fourfold", "lem:binomial-coefficient"], "lean_name": "HK.hrr_formula_fourfold", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:conjecture14-fourfold, lem:binomial-coefficient}\n  By \\cref{thm:conjecture14-fourfold}, \\(q_X(l) = 0\\), \\(q_X(l,m) = 1\\), and\n  \\(P_{RR,X}(T) = \\binom{T/2 + 3}{2}\\).  Evaluate at \\(T = 2k\\):\n  \\(P_{RR,X}(2k) = \\binom{k + 3}{2}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 239, "effort_local": 239, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5761}, "thm:k3-deformation-type": {"id": "thm:k3-deformation-type", "type": "theorem", "title": "Fourfolds with \\(\\int l^2 m^2 = 2\\) are of \\(\\mathrm{K3}^{[2", "chapter": "Overview", "statement": "}\\) type]\n  \n  \n  \n  \\textit{Source: Debarre--Huybrechts--Macr\\`i--Voisin \\cite{MR4654610}, Theorem 1.1.}\n  Let \\(X\\) be a hyper-K\\\"ahler fourfold.  Assume there are classes\n  \\(l, m \\in H^2(X, \\mathbb{Z})\\) with \\(\\int_X l^4 = 0\\) and \\(\\int_X l^2 m^2 = 2\\).\n  Then \\(X\\) is of \\(\\mathrm{K3}^{[2]}\\) deformation type.", "uses": ["thm:conjecture14-fourfold", "prop:nef-case-sfz", "prop:divisorial-contraction", "thm:hrr-from-lagrangian"], "lean_name": "HK.k3_deformation_type", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:conjecture14-fourfold, prop:nef-case-sfz, prop:divisorial-contraction, thm:hrr-from-lagrangian}\n  By \\cref{thm:conjecture14-fourfold}, the Chern and Hodge numbers of \\(X\\) match those\n  of \\(\\mathrm{K3}^{[2]}\\).  By deformation theory \\cite[Theorem~1.3]{Ma4}, one can\n  deform to assume \\(l, m\\) are of type \\((1,1)\\) and \\(\\operatorname{NS}(X) = \\mathbb{Z}l \\oplus \\mathbb{Z}m\\)\n  (very general case), forming a standard triple.  By \\cref{prop:nef-case-sfz},\n  case~(C1) does not occur.  In case~(C2), \\cref{prop:divisorial-contraction} provides a\n  Lagrangian fibration \\(f \\colon X \\to \\mathbb{P}^2\\) with\n  \\(f^*\\mathcal{O}_{\\mathbb{P}^2}(1) \\cong L^{k_L}\\).  One shows \\(k_L = 1\\) using\n  \\cref{thm:hrr-from-lagrangian} and the matching of HRR polynomials, giving\n  \\(f^*\\mathcal{O}_{\\mathbb{P}^2}(1) \\cong L\\).  The base of this Lagrangian fibration\n  identifies the deformation type with \\(\\mathrm{K3}^{[2]}\\) by deformation invariance.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 953, "effort_local": 953, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11113}, "cor:ogrady-conjecture": {"id": "cor:ogrady-co const $ = id => document.getElementById(id);

// ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};
for (const id in allNodes) { succ[id] = []; pred[id] = []; deg[id] = 0; }
for (const e of graphData.edges) {
  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;
}
const isOrphan = id => !(deg[id] > 0);

// weakly-connected components via union-find (orphans excluded)
const parent = {};
function find(x) { while (parent[x] !== x) x = parent[x] = parent[parent[x]]; return x; }
for (const id in allNodes) parent[id] = id;
for (const e of graphData.edges)
  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

const compMembers = {};
for (const id in allNodes) {
  if (isOrphan(id)) continue;
  const r = find(id);
  (compMembers[r] = compMembers[r] || []).push(id);
}
const components = Object.values(compMembers).sort((a, b) => b.length - a.length);
const compOf = {};
components.forEach((m, i) => m.forEach(id => compOf[id] = i));

// Isolated nodes are kept out of the force simulation (they'd only drift under
// repulsion); layoutOrphans() grid-places them after each settle instead.
for (const vn of graphData.nodes) if (isOrphan(vn.id)) vn.physics = false;

// Surface the isolated-node count right on the toggle, so it's obvious how many
// there are (and that they exist) without having to switch the view on.
const _isoCount = Object.keys(allNodes).filter(isOrphan).length;
$("iso-count").textContent = `(${_isoCount})`;
if (!_isoCount) $("orphans").disabled = true;

// ── Project-stats overlay ────────────────────────────────────────────────────

// A node needs no more work if it's leanok, in mathlib, or already has a Lean
// proof (effort 0).
const isDone = n => n.proved || n.mathlib_ok || n.effort_local === 0;

function renderStats() {
  const vals = Object.values(allNodes);
  const bp   = vals.filter(n => n.type !== "lean_aux");
  const proved  = bp.filter(n => n.proved).length;
  const mathlib = bp.filter(n => n.mathlib_ok).length;
  const sorry  = vals.filter(n => n.has_sorry).length;
  const doneIds = new Set(vals.filter(isDone).map(n => n.id));
  const ready = bp.filter(n => !isDone(n) &&
                  n.uses.every(d => !(d in allNodes) || doneIds.has(d))).length;
  const gaps   = bp.filter(n => !n.lean_name && !n.mathlib_ok).length;
  const leanok = bp.filter(n => !n.proved && !n.mathlib_ok && n.effort_local === 0).length;
  const isolated   = vals.filter(n => isOrphan(n.id)).length;
  const isolatedBp = bp.filter(n => isOrphan(n.id)).length;

  let done = 0, remLower = 0, infNodes = 0;
  for (const n of vals) {
    if (n.proof_size_lean != null) done += n.proof_size_lean;
    if (n.effort_local == null) infNodes++; else remLower += n.effort_local;
  }
  const pct = bp.length ? Math.round(100 * proved / bp.length) : 0;
  const fmt = v => v.toLocaleString();

  $("stats-panel").innerHTML = `
    <h4>Project</h4>
    <div class="row"><span>Proved (leanok)</span><span class="v done">${proved}/${bp.length} · ${pct}%</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    ${mathlib ? `<div class="row"><span>Mathlib-backed</span><span class="v done">${mathlib}</span></div>` : ''}
    <div class="row"><span>With sorry</span><span class="v ${sorry ? 'inf' : ''}">${sorry}</span></div>
    <div class="row"><span>Ready to formalize</span><span class="v">${ready}</span></div>
    <div class="row"><span>Needs \\lean{}</span><span class="v">${gaps}</span></div>
    <div class="row"><span>Needs \\leanok</span><span class="v">${leanok}</span></div>
    <div class="row" title="Declarations with no \\uses{} in or out — never linked into the graph"><span>Isolated</span><span class="v ${isolated ? 'inf' : ''}">${isolated}${isolatedBp !== isolated ? ` (${isolatedBp} bp)` : ''}</span></div>
    <div class="sep"></div>
