<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">

    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:galois-section": {"id": "def:galois-section", "type": "definition", "title": "GaloisSection", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction.}\n  Let \\(X\\) be a geometrically connected smooth curve over a field \\(k\\) with absolute\n  Galois group \\(\\gal(k)\\). A \\emph{Galois section} of \\(X\\) is an element of\n  \\(\\GalSec{X}{k}\\), the set of sections of \\(\\pi_1(X) \\to \\gal(k)\\) modulo conjugation\n  by \\(\\pi_1(X_{\\bar{k}})\\). Equivalently, in the language of the étale fundamental\n  gerbe, it is an isomorphism class in \\(\\FundGerbe{X}{k}(k)\\).", "uses": [], "lean_name": "BSC.TODO.GaloisSection", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 10, "descendant_count": 32, "proof_size_tex": null, "effort_local": 460, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 460}, "def:geometric-section": {"id": "def:geometric-section", "type": "definition", "title": "GeometricSection", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction.}\n  A Galois section \\(s \\in \\GalSec{X}{k}\\) is \\emph{geometric} if it is associated\n  with a \\(k\\)-rational point of \\(X\\).", "uses": ["def:galois-section"], "lean_name": "BSC.TODO.GeometricSection", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": null, "effort_local": 182, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 642}, "def:cuspidal-section": {"id": "def:cuspidal-section", "type": "definition", "title": "CuspidalSection", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction.}\n  A Galois section \\(s \\in \\GalSec{X}{k}\\) is \\emph{cuspidal} if it is associated\n  with a \\(k\\)-rational point in the boundary \\(\\bar{X} \\setminus X\\), where\n  \\(\\bar{X}\\) is the smooth completion of \\(X\\).", "uses": ["def:galois-section"], "lean_name": "BSC.TODO.CuspidalSection", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": null, "effort_local": 267, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 727}, "def:birl": {"id": "def:birl", "type": "definition", "title": "BiratLiftable", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction.}\n  A Galois section \\(s \\in \\GalSec{X}{k}\\) is \\emph{birationally liftable} (\\(\\BL\\))\n  if it lies in the image of the natural map \\(\\GalSec{k(X)}{k} \\to \\GalSec{X}{k}\\).", "uses": ["def:galois-section"], "lean_name": "BSC.TODO.BiratLiftable", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 17, "proof_size_tex": null, "effort_local": 229, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 689}, "def:tbirl": {"id": "def:tbirl", "type": "definition", "title": "TBiratLiftable", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction.}\n  Let \\(t\\) be an indeterminate. A Galois section \\(s \\in \\GalSec{X}{k}\\) is\n  \\emph{\\(t\\)-birationally liftable} (\\(\\TBL\\)) if the base change\n  \\(s_{k(t)} \\in \\GalSec{X_{k(t)}}{k(t)}\\) is birationally liftable.", "uses": ["def:galois-section", "def:birl"], "lean_name": "BSC.TODO.TBiratLiftable", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 5, "descendant_count": 10, "proof_size_tex": null, "effort_local": 272, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 961}, "def:section-conjecture": {"id": "def:section-conjecture", "type": "definition", "title": "SectionConjecture", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction (Section Conjecture).}\n  The \\emph{Section Conjecture} asserts: for every smooth, geometrically connected\n  hyperbolic curve \\(X\\) over a field \\(k\\) finitely generated over \\(\\Q\\), every\n  Galois section of \\(X\\) is either geometric or cuspidal.", "uses": ["def:galois-section", "def:geometric-section", "def:cuspidal-section"], "lean_name": "BSC.TODO.SectionConjecturePred", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 304, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1213}, "def:bsc": {"id": "def:bsc", "type": "definition", "title": "BiratSectionConj", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction (Birational Section Conjecture).}\n  The \\emph{Birational Section Conjecture} (BSC) asserts: for every smooth,\n  geometrically connected curve \\(X\\) over a field \\(k\\) finitely generated over\n  \\(\\Q\\), every birational Galois section of \\(X\\) is cuspidal.", "uses": ["def:galois-section", "def:cuspidal-section"], "lean_name": "BSC.TODO.BiratSectionConjPred", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 312, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1039}, "def:cuspidalization": {"id": "def:cuspidalization", "type": "definition", "title": "CuspidalizationConj", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Introduction (Cuspidalization Conjecture).}\n  The \\emph{Cuspidalization Conjecture} asserts: for every smooth, geometrically\n  connected hyperbolic curve \\(X\\) over \\(k\\) finitely generated over \\(\\Q\\) and\n  every non-empty open \\(U \\subset X\\), the map \\(\\GalSec{U}{k} \\to \\GalSec{X}{k}\\)\n  is surjective.", "uses": ["def:galois-section"], "lean_name": "BSC.TODO.CuspidalizationConjPred", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": null, "effort_local": 351, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 811}, "def:etale-fund-gerbe": {"id": "def:etale-fund-gerbe", "type": "definition", "title": "EtaleFundGerbe", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Section 1.}\n  \n  For \\(X\\) geometrically connected over \\(k\\), the \\emph{étale fundamental gerbe}\n  \\(\\FundGerbe{X}{k}\\) is a profinite étale stack over \\(k\\) equipped with a morphism\n  \\(X \\to \\FundGerbe{X}{k}\\) that is universal among morphisms to finite étale stacks\n  over \\(k\\). The set \\(\\GalSec{X}{k}\\) of Galois sections is in natural bijection with\n  the set of isomorphism classes of \\(\\FundGerbe{X}{k}(k)\\).", "uses": ["def:galois-section"], "lean_name": "BSC.TODO.EtaleFundGerbe", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 16, "proof_size_tex": null, "effort_local": 463, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 923}, "lem:families": {"id": "lem:families", "type": "lemma", "title": "FamiliesExactSeq", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 1 (families).}\n  Let \\(k\\) be a field of characteristic \\(0\\) and \\(A\\) a ring which is a localization\n  of a \\(1\\)-dimensional regular domain \\(\\tilde{A}\\) of finite type over \\(k\\), write\n  \\(C = \\spec A\\). If \\(X \\to C\\) is a family of curves and \\(F\\) is a geometric fiber,\n  then\n  \\[1 \\to \\pi_1(F) \\to \\pi_1(X) \\to \\pi_1(C) \\to 1\\]\n  is exact.", "uses": [], "lean_name": "BSC.TODO.FamiliesExactSeq", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Reduce to \\(k = \\mathbb{C}\\) by invariance of étale fundamental groups under base\n  change of algebraically closed fields (SGA1, Exp.\\ X, Cor.\\ 1.8). For \\(k = \\mathbb{C}\\),\n  the sequence of topological fundamental groups is exact since \\(\\pi_2(C) = 0\\) (as\n  \\(C\\) is an affine curve), and the profinite completion preserves this exactness\n  (Anderson; Geraghty-Johansson-Zhu). For a localization of a finite-type domain,\n  write \\(\\pi_1(C) \\cong \\varprojlim_U \\pi_1(U)\\) over open \\(U \\supset C\\) in\n  \\(\\tilde{C} = \\spec \\tilde{A}\\), take the projective limit of the short exact\n  sequences, using that the left term \\(\\pi_1(F)\\) is constant.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 13, "proof_size_tex": 646, "effort_local": 646, "proof_size_tex_total": 646, "proof_size_lean_total": null, "effort_total": 646}, "def:rel-fund-gerbe": {"id": "def:rel-fund-gerbe", "type": "definition", "title": "RelFundGerbe", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Section 1.1.}\n  Let \\(X \\to C\\) be a family of curves as in \\cref{lem:families}. The\n  \\emph{relative fundamental gerbe} \\(\\FundGerbe{X}{C}\\) is defined by the\n  \\(2\\)-Cartesian diagram\n  \\[\n    \\begin{array}{ccc}\n      \\FundGerbe{X}{C} & \\to & \\FundGerbe{X}{k} \\\\\n      \\downarrow & & \\downarrow \\\\\n      C & \\to & \\FundGerbe{C}{k},\n    \\end{array}\n  \\]\n  equipped with a structural morphism \\(X \\to \\FundGerbe{X}{C}\\) over \\(C\\). For\n  every field extension \\(k'/k\\) and point \\(c : \\spec k' \\to C\\), the induced\n  morphism \\(\\FundGerbe{X_c}{k'} \\to \\FundGerbe{X}{C} \\times_C \\spec k'\\) is an\n  isomorphism.", "uses": ["def:etale-fund-gerbe", "lem:families"], "lean_name": "BSC.TODO.RelFundGerbe", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 12, "proof_size_tex": null, "effort_local": 654, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2223}, "lem:rel-gerbe-limit": {"id": "lem:rel-gerbe-limit", "type": "lemma", "title": "RelGerbeLimit", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 2.}\n  The relative fundamental gerbe \\(\\FundGerbe{X}{C} \\to C\\) is a projective limit\n  \\(\\varprojlim \\Phi_i\\) of proper, étale morphisms \\(\\Phi_i \\to C\\) which are gerbes\n  over \\(C\\).", "uses": ["def:rel-fund-gerbe"], "lean_name": "BSC.TODO.RelGerbeLimit", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:etale-fund-gerbe}\n  Write \\(\\FundGerbe{X}{k} = \\varprojlim_i \\Psi_i\\) and \\(\\FundGerbe{C}{k} = \\varprojlim_i \\Lambda_i\\)\n  as projective limits of finite étale gerbes over \\(k\\) (Bresciani-Vistoli, Prop.\\ 3.9).\n  Geometric connectedness of the fibers of \\(X \\to C\\) implies\n  \\(\\FundGerbe{X}{k} \\to \\FundGerbe{C}{k}\\) is locally full, so each\n  \\(\\Psi_i \\to \\Lambda_i\\) is a proper étale relative gerbe. Set\n  \\(\\Phi_i = \\Psi_i \\times_{\\Lambda_i} C\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": 461, "effort_local": 461, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2684}, "def:infinite-root-stack": {"id": "def:infinite-root-stack", "type": "definition", "title": "InfRootStack", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Section 2.}\n  \n  For \\(R\\) a DVR with uniformizing parameter \\(\\pi\\), the \\emph{\\(n\\)-th root stack}\n  \\(\\sqrt[n]{\\spec R}\\) is the quotient stack \\([\\spec R(\\sqrt[n]{\\pi})/\\mu_n]\\)\n  (independent of the choice of \\(\\pi\\)). The \\emph{infinite root stack} is\n  \\(\\sqrt[\\infty]{\\spec R} = \\varprojlim_n \\sqrt[n]{\\spec R}\\). Its closed fiber\n  \\(S^1_c\\) (with reduced structure) is non-canonically isomorphic to the classifying\n  stack \\(\\cB_k \\hz(1)\\); there is a non-canonical bijection between isomorphism\n  classes of \\(S^1_c(k)\\) and \\(\\hat{k^*} = \\varprojlim_n k^*/k^{*n}\\).", "uses": [], "lean_name": "BSC.TODO.InfRootStack", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": null, "effort_local": 622, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 622}, "prop:prorootval": {"id": "prop:prorootval", "type": "proposition", "title": "ProrootValCrit", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Proposition 1.}\n  Let \\(X \\to C\\) be a family of curves as in \\cref{lem:families}, \\(c \\in C\\) a\n  closed point with local ring \\(R\\), and \\(z : \\spec K \\to \\FundGerbe{X}{C}\\) a\n  generic Galois section (\\(K\\) = fraction field of \\(C\\)). Then \\(z\\) extends\n  uniquely (up to unique isomorphism) to a morphism \\(\\sqrt[\\infty]{\\spec R} \\to \\FundGerbe{X}{C}\\)\n  compatible with \\(\\spec K \\hookrightarrow \\sqrt[\\infty]{\\spec R}\\) and the map\n  \\(\\spec R \\to C\\). An extension \\(\\spec R \\to \\FundGerbe{X}{C}\\) exists if and only\n  if the induced specializing loop \\(S^1_c \\to \\FundGerbe{X_c}{k(c)}\\) is constant.", "uses": ["lem:rel-gerbe-limit", "def:infinite-root-stack"], "lean_name": "BSC.TODO.ProrootValCrit", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:rel-gerbe-limit, def:infinite-root-stack}\n  By \\cref{lem:rel-gerbe-limit}, \\(\\FundGerbe{X}{C} \\to C\\) is a projective limit of\n  proper morphisms; the claim then follows from the valuative criterion for pro-finite\n  proper stacks (Bresciani-Vistoli, arXiv:1404.7475, Theorem 3.1).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 9, "proof_size_tex": 290, "effort_local": 290, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3596}, "def:spec-loop": {"id": "def:spec-loop", "type": "definition", "title": "SpecLoop", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Definition 1.}\n  With notation as in \\cref{prop:prorootval}, the \\emph{specializing loop} of \\(z\\)\n  at \\(c\\) is the induced morphism \\(\\gamma_z(c) : S^1_c \\to \\FundGerbe{X_c}{k(c)}\\).\n  A \\emph{specialization} of \\(z\\) at \\(c\\) is any Galois section of \\(X_c/k(c)\\) in\n  the essential image of \\(\\gamma_z(c)(k(c)) : S^1_c(k(c)) \\to \\FundGerbe{X_c}{k(c)}(k(c))\\).\n  A specialization always exists but need not be unique; it is unique precisely when\n  \\(\\gamma_z(c)\\) is constant.", "uses": ["prop:prorootval"], "lean_name": "BSC.TODO.SpecLoop", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 524, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4120}, "lem:unique-loop-torus": {"id": "lem:unique-loop-torus", "type": "lemma", "title": "UniqueLoopTorus", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 3.}\n  Let \\(T\\) be a torus over \\(k\\) with surjective valuation \\(\\nu : k^* \\to \\Z\\),\n  and let \\(\\gamma : \\cB_k \\hz(1) \\to \\FundGerbe{T}{k}\\) be a morphism of gerbes.\n  If the image of \\(\\cB_k \\hz(1)(k)\\) in \\(\\FundGerbe{T}{k}(k_\\nu)\\) has finitely\n  many isomorphism classes, then \\(\\gamma\\) is constant.", "uses": ["def:etale-fund-gerbe"], "lean_name": "BSC.TODO.UniqueLoopTorus", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Choose a finite extension \\(k'/k\\) splitting \\(T\\), so \\(T_{k'} \\cong \\Gm^n\\) and\n  \\(\\pi_1(T_{\\bar{k}}) \\cong \\hz^n(1)\\). The surjective valuation \\(\\nu\\) induces a\n  surjection \\(H^1(k, \\hz(1)) \\to \\hz\\). Finiteness of the image forces the composite\n  \\(H^1(k, \\hz(1)) \\xrightarrow{f} H^1(k_\\nu, \\pi_1(T_{\\bar{k}}))\\) to have finite\n  image, hence the map \\(\\hz \\to \\hz^n\\) given by \\(rf\\) is zero. Since \\(r \\neq 0\\)\n  and \\(\\hz\\) is torsion-free, \\(f = 0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 461, "effort_local": 461, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1384}, "lem:unique-loop-curve": {"id": "lem:unique-loop-curve", "type": "lemma", "title": "UniqueLoopCurve", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 4.}\n  Let \\(k\\) be a number field, \\(\\nu\\) a finite place, \\(X\\) a curve over \\(k\\), and\n  \\(\\gamma : \\cB_k \\hz(1) \\to \\FundGerbe{X}{k}\\) a morphism of gerbes. If the image\n  of \\(\\cB_k \\hz(1)(k)\\) in \\(\\FundGerbe{X}{k}(k_\\nu)\\) has finitely many isomorphism\n  classes, then \\(\\gamma\\) is constant.", "uses": ["lem:unique-loop-torus"], "lean_name": "BSC.TODO.UniqueLoopCurve", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:unique-loop-torus}\n  If \\(\\gamma\\) is non-constant, pass to a finite étale cover and assume the\n  abelianization \\(\\cB_k \\hz(1) \\to \\FundGerbe{X}{k}^{\\mathrm{ab}} = \\FundGerbe{J}{k}\\)\n  is non-constant, where \\(J\\) is the semi-abelian Jacobian. By weight reasons\n  \\(\\hz(1) \\to TJ\\) factors through the torus part \\(TT\\). By Mattuck's theorem\n  \\(A(k_\\nu)\\) has finite torsion, so \\(H^1(k_\\nu, TT) \\to H^1(k_\\nu, TJ)\\) is\n  injective. The finiteness hypothesis then forces \\(\\hz(1) \\to TT\\) to be trivial\n  by \\cref{lem:unique-loop-torus}, a contradiction.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": 566, "effort_local": 566, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1950}, "lem:fin-etale-divisor": {"id": "lem:fin-etale-divisor", "type": "lemma", "title": "FinEtaleDivisor", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Section 3, first lemma.}\n  Let \\(R\\) be a DVR, \\(X \\to \\spec R\\) a family of curves, and \\(p \\in X\\) a closed\n  point in the closed fiber. There exists a non-empty divisor \\(D \\subset X\\) finite\n  étale over \\(R\\) with \\(p \\in D\\).", "uses": [], "lean_name": "BSC.TODO.FinEtaleDivisor", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Embed \\(\\bar{X} \\subset \\PP^n_R\\) and choose a generic \\((n-2)\\)-dimensional linear\n  subspace \\(L_k \\subset \\PP^n_k\\) not meeting \\(\\bar{X}_k\\), such that the\n  hyperplane \\(H_i\\) spanned by \\(L_k\\) and each geometric point \\(p_i\\) over \\(p\\)\n  meets \\(\\bar{X}_{\\bar{k}}\\) transversally and avoids \\(D_0\\). The projection from\n  \\(L\\) gives \\(f : \\bar{X} \\to \\PP^1_R\\) étale near \\(f(p)\\). Since\n  \\(k(p) \\cong k[x]/\\bar{q}(x)\\) for a separable \\(\\bar{q}\\), lift to\n  \\(R' = R[x]/q(x)\\) (a DVR, finite étale over \\(R\\)); choose a point\n  \\(E \\subset \\PP^1_R\\) finite étale over \\(R\\) through \\(f(p)\\); then\n  \\(f^{-1}(E)\\) is the desired divisor.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 9, "proof_size_tex": 647, "effort_local": 647, "proof_size_tex_total": 647, "proof_size_lean_total": null, "effort_total": 647}, "cor:cut": {"id": "cor:cut", "type": "corollary", "title": "CutLemma", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Corollary 1.}\n  Let \\(R\\) be a DVR and \\(X \\to \\spec R\\) a family of curves. There exists a direct\n  system \\((D_i)_i\\) of divisors finite étale over \\(R\\) such that\n  \\(X_k \\setminus \\bigcup_i D_i\\) contains only the generic point of \\(X_k\\).", "uses": ["lem:fin-etale-divisor"], "lean_name": "BSC.TODO.CutLemma", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:fin-etale-divisor}\n  Apply \\cref{lem:fin-etale-divisor} to each closed point of \\(X_k\\); the resulting\n  direct system of divisors exhausts all closed points.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 168, "effort_local": 168, "proof_size_tex_total": 815, "proof_size_lean_total": null, "effort_total": 815}, "lem:spec-birl": {"id": "lem:spec-birl", "type": "lemma", "title": "SpecBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 5.}\n  Specializations of \\(\\BL\\) sections are \\(\\BL\\). More precisely: let\n  \\(X \\to \\spec R\\) be a family of curves and \\(z \\in \\FundGerbe{X_K}{K}(K)\\) a\n  generic \\(\\BL\\) Galois section. Then every specialization of \\(z\\) is \\(\\BL\\).", "uses": ["cor:cut", "prop:prorootval", "def:birl"], "lean_name": "BSC.TODO.SpecBirat", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:cut, prop:prorootval}\n  Let \\((D_i)\\) be as in \\cref{cor:cut}; set \\(X_i = X \\setminus D_i\\) and\n  \\(X_\\infty = \\varprojlim_i X_i\\), whose closed fiber is \\(\\spec k(X_k)\\).\n  Since \\(z\\) is \\(\\BL\\), it lifts to \\(z' \\in \\FundGerbe{X_{\\infty,K}}{K}(K)\\).\n  By a limit argument with \\cref{prop:prorootval}, the specializing loops of \\(z'\\)\n  induce \\(\\gamma_{z'} : S^1_c \\to \\FundGerbe{k(X_k)}{k}\\). Every specialization of\n  \\(z\\) thus lifts to \\(\\spec k(X_k)\\), so it is \\(\\BL\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 7, "proof_size_tex": 489, "effort_local": 489, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5129}, "cor:tbirl-birl": {"id": "cor:tbirl-birl", "type": "corollary", "title": "TBiratBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Corollary 2.}\n  Every \\(\\TBL\\) Galois section is \\(\\BL\\).", "uses": ["lem:spec-birl", "def:tbirl"], "lean_name": "BSC.TODO.TBiratBirat", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:spec-birl}\n  Write \\(R = k[t]_{(t)}\\); then \\(s_{k(t)}\\) is a generic section of\n  \\(\\FundGerbe{X_R}{R}\\) and \\(s\\) is a specialization of \\(s_{k(t)}\\). Since\n  \\(s_{k(t)}\\) is \\(\\BL\\) by hypothesis, \\cref{lem:spec-birl} gives that \\(s\\) is\n  \\(\\BL\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 261, "effort_local": 261, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5662}, "lem:spec-tbirl": {"id": "lem:spec-tbirl", "type": "lemma", "title": "SpecTBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 6.}\n  Specializations of \\(\\TBL\\) sections are \\(\\TBL\\). Precisely: let\n  \\(X \\to \\spec R\\) be a family of curves, \\(z\\) a generic \\(\\TBL\\) section, and\n  \\(s\\) a specialization of \\(z\\). Then \\(s\\) is \\(\\TBL\\).", "uses": ["lem:spec-birl", "def:tbirl"], "lean_name": "BSC.TODO.SpecTBirat", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:spec-birl}\n  Let \\(R'\\) be the local ring of the generic point of \\(\\A^1_k \\subset \\A^1_R\\); it\n  is a DVR with fraction field \\(K(t)\\) and residue field \\(k(t)\\). In the family\n  \\(X_{R'} \\to \\spec R'\\), the base change \\(z_{K(t)}\\) is \\(\\BL\\) by hypothesis.\n  Then \\(s_{k(t)}\\) is a specialization of \\(z_{K(t)}\\), hence \\(\\BL\\) by\n  \\cref{lem:spec-birl}, so \\(s\\) is \\(\\TBL\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 389, "effort_local": 389, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5790}, "lem:morph-birl": {"id": "lem:morph-birl", "type": "lemma", "title": "MorphBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 7.}\n  Let \\(f : Y \\to X\\) be a dominant morphism of curves over \\(k\\) and\n  \\(s \\in \\FundGerbe{Y}{k}(k)\\) a Galois section. If \\(s\\) is \\(\\BL\\), then\n  \\(f(s) \\in \\FundGerbe{X}{k}(k)\\) is \\(\\BL\\). If \\(f\\) is finite étale, the\n  converse holds.", "uses": ["def:birl"], "lean_name": "BSC.TODO.MorphBirat", "proved": false, "mathlib_ok": false, "proof_tex": "\n  The forward direction is immediate. For the converse when \\(f\\) is finite étale,\n  use the fibre product identity\n  \\(\\gal(k(Y)) = \\pi_1(Y) \\times_{\\pi_1(X)} \\gal(k(X))\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 171, "effort_local": 171, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 860}, "cor:morph-tbirl": {"id": "cor:morph-tbirl", "type": "corollary", "title": "MorphTBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Corollary 3.}\n  Same as \\cref{lem:morph-birl} with \\(\\BL\\) replaced by \\(\\TBL\\): if \\(f\\) is\n  dominant and \\(s\\) is \\(\\TBL\\), then \\(f(s)\\) is \\(\\TBL\\); if \\(f\\) is finite\n  étale, the converse holds.", "uses": ["lem:morph-birl", "def:tbirl"], "lean_name": "BSC.TODO.MorphTBirat", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:morph-birl}\n  Base-change to \\(k(t)\\): \\(s\\) is \\(\\TBL\\) iff \\(s_{k(t)}\\) is \\(\\BL\\).\n  Applying \\cref{lem:morph-birl} to \\(f_{k(t)}\\) and \\(s_{k(t)}\\) gives\n  \\(f(s_{k(t)}) = f(s)_{k(t)}\\) is \\(\\BL\\), hence \\(f(s)\\) is \\(\\TBL\\).\n  If \\(f\\) is finite étale, the converse follows by the same base-change argument\n  using the converse direction of \\cref{lem:morph-birl}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 378, "effort_local": 378, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1510}, "lem:nf-lift": {"id": "lem:nf-lift", "type": "lemma", "title": "NFLift", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 8.}\n  Let \\(X\\) be a curve over a number field \\(k\\), \\(U \\subseteq X\\) a non-empty open\n  subset, and \\(s \\in \\FundGerbe{X}{k}(k)\\) a \\(\\TBL\\) Galois section. There exists\n  a \\(\\TBL\\) section of \\(U\\) which lifts \\(s\\).", "uses": ["cor:tbirl-birl", "lem:unique-loop-curve", "prop:prorootval"], "lean_name": "BSC.TODO.NFLift", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:tbirl-birl, lem:unique-loop-curve, prop:prorootval, lem:spec-birl}\n  Assume \\(X\\) non-parabolic and \\(s\\) not geometric/cuspidal. By hypothesis,\n  \\(s_{k(t)}\\) lifts to a \\(\\BL\\) section \\(r_0\\) of \\(U_{k(t)}\\). For each closed\n  point \\(c \\in \\A^1\\) with residue field \\(k'\\), choose a finite place \\(\\nu\\) of\n  \\(k\\) with \\(k' \\subset k_\\nu\\) and \\(x_\\nu \\in U\\) (possible by Stix's Theorem~B,\n  which gives density~1). Any specialization \\(r_{0,c}\\) is \\(\\BL\\) by\n  \\cref{lem:spec-birl} and maps to \\(s\\); over \\(k_\\nu\\) it is the geometric section\n  at \\(x_\\nu \\in U \\setminus \\{c\\}\\). By \\cref{lem:unique-loop-curve}, the\n  specializing loop of \\(r_0\\) at \\(c\\) is constant, so \\(r_0\\) extends over\n  \\(\\mathcal{O}_c\\) by \\cref{prop:prorootval}. Doing this for every closed point and\n  using that \\(\\FundGerbe{U \\times \\A^1}{\\A^1} \\cong \\FundGerbe{U}{k} \\times_k \\A^1\\)\n  (Bresciani, arXiv:2003.04649, Cor.\\ A.3), we get \\(r_0 = r_{k(t)}\\) for a\n  \\(\\TBL\\) section \\(r\\) of \\(U\\) lifting \\(s\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1009, "effort_local": 1009, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7698}, "prop:simple": {"id": "prop:simple", "type": "proposition", "title": "SimpleProp", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Proposition 2.}\n  Let \\(k\\) be a number field, \\(\\nu\\) a finite place, and \\(U = \\A^1 \\setminus \\{1,2\\}\\).\n  Let \\(s \\in \\FundGerbe{U}{k}(k)\\) be a \\(\\BL\\) Galois section and\n  \\(x_\\nu \\in \\PP^1(k_\\nu)\\) the unique associated local point. Let\n  \\(\\delta : \\spec k(t) \\to \\A^1\\) be the diagonal (generic) point, and assume that\n  \\(s_{k(t)}\\) lifts to a section of\n  \\(\\spec k(\\A^1) \\otimes_k k(t) \\setminus \\{\\delta\\}\\) (e.g.\\ if \\(s\\) is \\(\\TBL\\)).\n  Then \\(x_\\nu\\) is \\(k\\)-rational.", "uses": ["lem:unique-loop-curve"], "lean_name": "BSC.TODO.SimpleProp", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:unique-loop-curve}\n  \\textbf{Step 1 (Specializations of \\(r\\)).}\n  Let \\(r_0\\) be the lifting and \\(r\\) its image in \\(U_{k(t)} \\setminus \\{\\delta\\}\\).\n  For each \\(k\\)-rational \\(c \\in U(k)\\) with \\(c \\neq x_\\nu\\), any specialization\n  \\(r_c\\) of \\(r\\) at \\(c\\) is \\(\\BL\\) and maps to \\(s\\); over \\(k_\\nu\\) it must be\n  the geometric section at \\(x_\\nu \\in U \\setminus \\{c\\}\\). By\n  \\cref{lem:unique-loop-curve}, the specializing loop at \\(c\\) is constant.\n\n  \\textbf{Step 2 (Change of coordinates).}\n  The automorphism \\(\\phi : y \\mapsto t - y\\) sends \\(U_{k(t)} \\xrightarrow{\\sim} V\\)\n  where \\(V = \\A^1_{k(t)} \\setminus \\{t-1, t-2\\}\\). Then\n  \\(\\phi(r) \\in \\FundGerbe{V \\setminus \\{0\\}}{}(k(t)) \\hookrightarrow \\hat{k(t)^*}\\)\n  gives \\(z = \\lambda \\cdot q^e \\cdot (t-1)^{e_1} \\cdot (t-2)^{e_2}\\) where \\(q\\) is\n  the minimal polynomial of \\(x_\\nu\\), \\(e, e_1, e_2 \\in \\hz\\), \\(\\lambda \\in \\hat{k^*}\\).\n  Step 1 and \\cref{example:gm-loop} force \\(e_c = 0\\) for all closed \\(c \\neq x_\\nu, 1, 2\\).\n\n  \\textbf{Step 3 (Specializations of \\(z\\)).}\n  Fix a finite extension \\(K\\) splitting \\(q\\) and extension \\(\\eta\\) of \\(\\nu\\).\n  Taking sequences \\(c_i \\to 1\\) and \\(c_i \\to 2\\) forces \\(e_1 = e_2 = 0\\).\n  Taking \\(c_i \\to x_\\eta\\) forces \\(e = 1\\). If \\(\\deg q \\geq 2\\), taking\n  \\(c_i \\to y_j\\) (a conjugate of \\(x_\\nu\\)) gives a contradiction, so\n  \\(\\deg q = 1\\) and \\(x_\\nu \\in k\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 1398, "effort_local": 1398, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3348}, "def:quasi-tbirl": {"id": "def:quasi-tbirl", "type": "definition", "title": "QuasiTBirat", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Section 4.}\n  Let \\(X\\) be a geometrically connected curve over \\(k\\). A Galois section \\(s\\) of\n  \\(X\\) is \\emph{quasi-\\(\\TBL\\)} if there exists an open subset \\(U \\subseteq X\\),\n  a lifting \\(s'\\) of \\(s\\) to \\(U\\), and a dominant map \\(f : U \\to Y\\) with \\(Y\\)\n  a non-parabolic curve, such that \\(s'\\) is \\(\\BL\\) and \\(f(s')\\) is \\(\\TBL\\).", "uses": ["def:tbirl", "def:birl"], "lean_name": "BSC.TODO.QuasiTBirat", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": null, "effort_local": 388, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1349}, "lem:spec-quasi": {"id": "lem:spec-quasi", "type": "lemma", "title": "SpecQuasi", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 9.}\n  Let \\(C\\) be a curve with fraction field \\(K\\), \\(X \\to C\\) a family of curves, and\n  \\(s \\in \\FundGerbe{X_K}{K}(K)\\) a generic quasi-\\(\\TBL\\) section. There exists a\n  non-empty open \\(U \\subseteq C\\) such that the specializations of \\(X|_U \\to U\\) are\n  quasi-\\(\\TBL\\).", "uses": ["def:quasi-tbirl", "lem:spec-birl", "lem:spec-tbirl"], "lean_name": "BSC.TODO.SpecQuasi", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:spec-birl, lem:spec-tbirl}\n  Shrink \\(C\\) and \\(X\\) to arrange a non-parabolic family \\(Y \\to C\\) and\n  quasi-finite \\(f : X \\to Y\\) with \\(f(s)\\) \\(\\TBL\\). Specializations of \\(f(s)\\)\n  are \\(\\TBL\\) by \\cref{lem:spec-tbirl}; specializations of \\(s\\) are \\(\\BL\\) by\n  \\cref{lem:spec-birl}; hence they are quasi-\\(\\TBL\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 330, "effort_local": 330, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6508}, "lem:quasi-nf": {"id": "lem:quasi-nf", "type": "lemma", "title": "QuasiNF", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Lemma 10.}\n  Let \\(k\\) be a number field. If every \\(\\TBL\\) section over \\(k\\) is geometric or\n  cuspidal, then every quasi-\\(\\TBL\\) section over \\(k\\) is geometric or cuspidal.", "uses": ["def:quasi-tbirl", "lem:nf-lift"], "lean_name": "BSC.TODO.QuasiNF", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:nf-lift}\n  Let \\(s\\) be quasi-\\(\\TBL\\) with dominant \\(f : X \\to Y\\) (\\(Y\\) non-parabolic) and\n  \\(f(s)\\) \\(\\TBL\\). Since \\(f(s)\\) is \\(\\TBL\\), there is a unique \\(k\\)-rational\n  point \\(y \\in \\bar{Y}(k)\\) with \\(f(x_\\nu) = y\\) for every finite place \\(\\nu\\).\n  Any \\(\\BL\\) lifting of \\(s\\) to \\(X \\setminus f^{-1}(y)\\) is cuspidal by Stix's\n  Theorem~B; hence \\(s\\) is geometric or cuspidal.\n", "lean_source": "", " }\\); then \\(c(s')\\) is a \\(\\TBL\\)\n  section of \\(\\A^1 \\setminus \\{1, 2\\}\\) whose local point is non-\\(k\\)-rational,\n  contradicting \\cref{prop:simple}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 942, "effort_local": 942, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2352}, "thm:main-B": {"id": "thm:main-B", "type": "theorem", "title": "TheoremB", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Theorem B.}\n  Let \\(X\\) be a hyperbolic curve over \\(k\\) finitely generated over \\(\\Q\\). The\n  following are equivalent:\n  \\begin{enumerate}\n    \\item For every finitely generated extension \\(K/k\\), every Galois section of\n      \\(X_K\\) is geometric or cuspidal.\n    \\item For every finitely generated extension \\(K/k\\), every Galois section of\n      \\(X_K\\) is birationally liftable.\n  \\end{enumerate}\n  As a consequence, the Section Conjecture is equivalent to the Cuspidalization\n  Conjecture.", "uses": ["thm:main-A", "cor:cusp-bl2"], "lean_name": "BSC.TODO.TheoremB", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:main-A, cor:cusp-bl2}\n  Follows directly from \\cref{thm:main-A} and \\cref{cor:cusp-bl2}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 98, "effort_local": 98, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3557}, "thm:main-C": {"id": "thm:main-C", "type": "theorem", "title": "TheoremC", "chapter": "Overview", "statement": "\\textit{Source: Bresciani, arXiv:2108.13397, Theorem C.}\n  The following are equivalent:\n  \\begin{enumerate}\n    \\item The BSC holds.\n    \\item For every number field \\(k\\), every const $ = id => document.getElementById(id);

// ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};
for (const id in allNodes) { succ[id] = []; pred[id] = []; deg[id] = 0; }
for (const e of graphData.edges) {
  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;
}
const isOrphan = id => !(deg[id] > 0);

// weakly-connected components via union-find (orphans excluded)
const parent = {};
function find(x) { while (parent[x] !== x) x = parent[x] = parent[parent[x]]; return x; }
for (const id in allNodes) parent[id] = id;
for (const e of graphData.edges)
  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

const compMembers = {};
for (const id in allNodes) {
  if (isOrphan(id)) continue;
  const r = find(id);
  (compMembers[r] = compMembers[r] || []).push(id);
}
const components = Object.values(compMembers).sort((a, b) => b.length - a.length);
const compOf = {};
components.forEach((m, i) => m.forEach(id => compOf[id] = i));

// Isolated nodes are kept out of the force simulation (they'd only drift under
// repulsion); layoutOrphans() grid-places them after each settle instead.
for (const vn of graphData.nodes) if (isOrphan(vn.id)) vn.physics = false;

// Surface the isolated-node count right on the toggle, so it's obvious how many
// there are (and that they exist) without having to switch the view on.
const _isoCount = Object.keys(allNodes).filter(isOrphan).length;

if (!_isoCount) $("orphans").disabled = true;

// ── Project-stats overlay ────────────────────────────────────────────────────

// A node needs no more work if it's leanok, in mathlib, or already has a Lean

const isDone = n => n.proved || n.mathlib_ok || n.effort_local === 0;

function renderStats() {
  const vals = Object.values(allNodes);
  const bp   = vals.filter(n => n.type !== "lean_aux");
  const proved  = bp.filter(n => n.proved).length;
  const mathlib = bp.filter(n => n.mathlib_ok).length;
  const sorry  = vals.filter(n => n.has_sorry).length;
