<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">

  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">

  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:level_structure": {"id": "def:level_structure", "type": "definition", "title": "Level structure", "chapter": "Moduli space of curves", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex); formal definition in \\cite[Theorem~1.8]{OortSteenbrink}.}\n  Fix integers \\(g \\ge 2\\) and \\(\\ell \\ge 3\\). A \\emph{level-\\(\\ell\\) structure} on a smooth\n  projective curve \\(C\\) of genus \\(g\\) is an isomorphism of group schemes\n  \\[\n    \\mathrm{Jac}(C)[\\ell] \\xrightarrow{\\;\\sim\\;} (\\mathbb{Z}/\\ell\\mathbb{Z})^{2g}\n  \\]\n  compatible with the Weil pairing on \\(\\mathrm{Jac}(C)[\\ell]\\). Here \\(\\mathrm{Jac}(C)[\\ell]\\)\n  denotes the \\(\\ell\\)-torsion subgroup scheme of the Jacobian.", "uses": [], "lean_name": "MR4276287UniformityInMordellLangForCurves.ModuliSpace.levelStructure", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ModuliSpace.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 41, "proof_size_tex": null, "effort_local": 618, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 618}, "def:Mg_level": {"id": "def:Mg_level", "type": "definition", "title": "Fine moduli space with level structure", "chapter": "Moduli space of curves", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  Fix \\(g \\ge 2\\) and \\(\\ell \\ge 3\\). The \\emph{fine moduli space} \\(\\mathbb{M}_g\\) of smooth\n  genus-\\(g\\) curves with level-\\(\\ell\\) structure is a scheme over\n  \\(\\mathrm{Spec}\\,\\mathbb{Z}[1/\\ell]\\) that represents the moduli functor\n  associating to each \\(\\mathrm{Spec}\\,\\mathbb{Z}[1/\\ell]\\)-scheme \\(T\\) the set of\n  isomorphism classes of pairs \\((C \\to T, \\alpha)\\), where \\(C \\to T\\) is a smooth proper\n  curve of genus \\(g\\) and \\(\\alpha\\) is a level-\\(\\ell\\) structure on \\(C\\). For \\(\\ell \\ge 3\\),\n  this functor is representable, so \\(\\mathbb{M}_g\\) is a fine (not merely coarse) moduli scheme.", "uses": ["def:level_structure"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ModuliSpace.mgLevel", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ModuliSpace.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 40, "proof_size_tex": null, "effort_local": 749, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1367}, "def:universal_curve": {"id": "def:universal_curve", "type": "definition", "title": "Universal curve", "chapter": "Moduli space of curves", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  There exists a \\emph{universal curve} \\(\\mathfrak{C}_g \\to \\mathbb{M}_g\\): a smooth proper\n  projective morphism of relative dimension \\(1\\) whose geometric fibers are smooth curves of\n  genus \\(g\\). By the fine moduli property of \\(\\mathbb{M}_g\\), the pair\n  \\((\\mathbb{M}_g, \\mathfrak{C}_g)\\) is initial among all families of smooth genus-\\(g\\) curves\n  with level-\\(\\ell\\) structure.", "uses": ["def:Mg_level"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ModuliSpace.universalCurve", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ModuliSpace.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 35, "proof_size_tex": null, "effort_local": 530, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1897}, "prop:Mg_quasiprojective": {"id": "prop:Mg_quasiprojective", "type": "proposition", "title": "Quasi-projectivity of \\(\\mathbb{M}_g\\)", "chapter": "Moduli space of curves", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  For \\(\\ell \\ge 3\\), \\(\\mathbb{M}_g\\) is a smooth, irreducible, quasi-projective variety over\n  \\(\\overline{\\mathbb{Q}}\\) of dimension \\(3g - 3\\). It admits a compactification\n  \\(\\overline{\\mathbb{M}_g}\\) (the Deligne--Mumford compactification by stable curves with\n  level structure), which is a projective variety containing \\(\\mathbb{M}_g\\) as a Zariski\n  open dense subset.", "uses": ["def:Mg_level"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ModuliSpace.mgQuasiProjective", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:Mg_level}\n  The quasi-projectivity and regularity of \\(\\mathbb{M}_g\\) are classical; see\n  \\cite[Chapter~XVI, Theorem~2.11]{ACG:Curve}, \\cite[(5.14)]{DM:irreducibility}, or\n  \\cite[Theorem~1.8]{OortSteenbrink}. The dimension count \\(\\dim \\mathbb{M}_g = 3g - 3\\)\n  is the Riemann count: a smooth curve of genus \\(g \\ge 2\\) has \\(3g - 3\\) moduli.\n  Irreducibility of \\(\\mathbb{M}_g\\) over \\(\\overline{\\mathbb{Q}}\\) is a consequence of\n  \\cite[Theorem~5.15]{DM:irreducibility}. The Deligne--Mumford compactification\n  \\(\\overline{\\mathbb{M}_g}\\) is constructed in \\cite[Theorem~5.2]{DM:irreducibility} by\n  allowing level structure on stable curves; it is projective by the valuative criterion and\n  the properness of the moduli functor for stable curves.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ModuliSpace.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 762, "effort_local": 762, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2129}, "lem:torelli_quasi_finite": {"id": "lem:torelli_quasi_finite", "type": "lemma", "title": "Torelli map is quasi-finite", "chapter": "Moduli space of curves", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  The Torelli map \\(\\tau \\colon \\mathbb{M}_g \\to \\mathbb{A}_g\\), sending a genus-\\(g\\) curve\n  \\([C]\\) to its principally polarized Jacobian \\([\\mathrm{Jac}(C)]\\), is quasi-finite. Here\n  \\(\\mathbb{A}_g\\) denotes the fine moduli space of principally polarized abelian varieties of\n  dimension \\(g\\) with level-\\(\\ell\\) structure.", "uses": ["def:Mg_level", "def:universal_curve"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ModuliSpace.torelliQuasiFinite", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:Mg_level, def:universal_curve}\n  By \\cite[Lemma~1.11]{OortSteenbrink}, the Torelli map \\(\\tau\\) is quasi-finite. More\n  precisely, with level-\\(\\ell\\) structure for \\(\\ell \\ge 3\\), the classical Torelli theorem\n  (which asserts injectivity on \\(\\mathbb{C}\\)-points for the coarse moduli space) implies\n  that the fibers of \\(\\tau\\) over \\(\\mathbb{C}\\)-points are finite. Combined with the fact\n  that \\(\\tau\\) is of finite type (as a morphism between quasi-projective varieties of finite\n  type over \\(\\overline{\\mathbb{Q}}\\)), quasi-finiteness follows.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ModuliSpace.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 563, "effort_local": 563, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2460}, "def:jacobian_av": {"id": "def:jacobian_av", "type": "definition", "title": "Jacobian abelian variety", "chapter": "Jacobian variety of a curve", "statement": "Let \\(g \\ge 2\\) and let \\(C\\) be a smooth projective curve of genus \\(g\\) defined\n  over \\(\\IQbar\\), together with a base point \\(P_0 \\in C(\\IQbar)\\).\n  The \\emph{Jacobian} \\(\\mathrm{Jac}(C)\\) is a \\(g\\)-dimensional abelian variety\n  over \\(\\IQbar\\) equipped with the following universal property: for any abelian\n  variety \\(A\\) over \\(\\IQbar\\) and any morphism \\(f \\colon C \\to A\\) with\n  \\(f(P_0) = 0_A\\), there exists a unique group homomorphism\n  \\(\\varphi \\colon \\mathrm{Jac}(C) \\to A\\) such that \\(\\varphi \\circ \\iota_{P_0} = f\\),\n  where \\(\\iota_{P_0} \\colon C \\to \\mathrm{Jac}(C)\\) is the Abel--Jacobi embedding\n  of \\cref{def:abel_jacobi}.\n\n  Concretely, \\(\\mathrm{Jac}(C)\\) is isomorphic as a group variety to\n  \\(\\mathrm{Pic}^0(C)\\), the group of degree-zero line bundles on \\(C\\) modulo\n  linear equivalence. This isomorphism is the canonical one sending\n  \\(\\iota_{P_0}(P) \\mapsto [\\mathcal{O}_C(P - P_0)]\\).\n\n  This object is axiomatized (not constructed from the Picard group in this project):\n  the existence and universal property of \\(\\mathrm{Jac}(C)\\) are taken as axioms\n  in the Lean formalization.\n  \n  \n  \n  \n  \\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}", "uses": [], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.jacobianAV", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 0, "rdep_count": 6, "descendant_count": 42, "proof_size_tex": null, "effort_local": 1278, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1278}, "lem:jacobian_ppav": {"id": "lem:jacobian_ppav", "type": "lemma", "title": "Principal polarization of the Jacobian", "chapter": "Jacobian variety of a curve", "statement": "\\(\\mathrm{Jac}(C)\\) carries a canonical \\emph{principal polarization}: a group\n  isomorphism \\(\\theta \\colon \\mathrm{Jac}(C) \\xrightarrow{\\;\\sim\\;} \\mathrm{Jac}(C)^\\vee\\)\n  arising from the theta divisor \\(\\Theta \\subset \\mathrm{Jac}(C)\\).\n  Here \\(\\mathrm{Jac}(C)^\\vee = \\mathrm{Pic}^0(\\mathrm{Jac}(C))\\) is the dual\n  abelian variety. In particular, \\((\\mathrm{Jac}(C), \\theta)\\) is a principally\n  polarized abelian variety of dimension \\(g\\).\n  \n  \n  \n  \n  \n  \n  \\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}", "uses": ["def:jacobian_av"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.jacobianPpav", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:jacobian_av}\n  This is a standard fact; see \\cite[Proposition~6.9]{MFK:GIT94}.\n  The theta divisor \\(\\Theta \\subset \\mathrm{Jac}(C)\\) is defined as the image of\n  the \\((g-1)\\)-th symmetric power \\(C^{(g-1)} \\to \\mathrm{Jac}(C)\\) under the map\n  sending an effective divisor \\(D\\) to \\([D - (g-1)P_0]\\).\n  The line bundle \\(\\mathcal{O}(\\Theta)\\) is ample on \\(\\mathrm{Jac}(C)\\) and\n  the induced map \\(\\mathrm{Jac}(C) \\to \\mathrm{Jac}(C)^\\vee\\),\n  \\(x \\mapsto t_x^*\\mathcal{O}(\\Theta) \\otimes \\mathcal{O}(\\Theta)^{-1}\\),\n  is an isomorphism (the principal polarization \\(\\theta\\)).\n  In the Lean formalization, the existence of \\(\\theta\\) is taken as an axiom.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 670, "effort_local": 670, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1948}, "def:abel_jacobi": {"id": "def:abel_jacobi", "type": "definition", "title": "Abel--Jacobi embedding", "chapter": "Jacobian variety of a curve", "statement": "Fix a base point \\(P_0 \\in C(\\IQbar)\\). The \\emph{Abel--Jacobi embedding} is the\n  morphism\n  \\[\n    \\iota_{P_0} \\colon C \\to \\mathrm{Jac}(C), \\qquad P \\mapsto [\\mathcal{O}_C(P - P_0)].\n  \\]\n  In other words, \\(\\iota_{P_0}(P)\\) is the class of the degree-zero divisor \\(P - P_0\\)\n  in \\(\\mathrm{Pic}^0(C) \\cong \\mathrm{Jac}(C)\\). By construction\n  \\(\\iota_{P_0}(P_0) = 0_{\\mathrm{Jac}(C)}\\).\n  \n  \n  \n  \n  \n  \\textit{Source: Section 8 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/RatPt.tex).}", "uses": ["def:jacobian_av"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.abelJacobi", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 9, "proof_size_tex": null, "effort_local": 548, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1826}, "thm:abel_jacobi_closed_immersion": {"id": "thm:abel_jacobi_closed_immersion", "type": "theorem", "title": "Abel--Jacobi is a closed immersion", "chapter": "Jacobian variety of a curve", "statement": "For \\(g \\ge 2\\), the Abel--Jacobi map \\(\\iota_{P_0} \\colon C \\to \\mathrm{Jac}(C)\\)\n  is a closed immersion of algebraic varieties.", "uses": ["def:abel_jacobi"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.abelJacobi_closedImmersion", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:abel_jacobi, def:jacobian_av}\n  This is a classical result; see, e.g., \\cite[Chapter~IV, Theorem~4.2]{ACG:Curve}.\n  Injectivity on points follows because \\(\\iota_{P_0}(P) = \\iota_{P_0}(Q)\\) implies\n  \\(\\mathcal{O}_C(P - Q) \\cong \\mathcal{O}_C\\), i.e., \\(P \\sim Q\\) linearly, which\n  for a genus-\\(g \\ge 2\\) curve forces \\(P = Q\\).\n  The differential of \\(\\iota_{P_0}\\) is injective at every point (Torelli-type\n  argument), so \\(\\iota_{P_0}\\) is a locally closed immersion; since \\(C\\) is\n  projective and \\(\\mathrm{Jac}(C)\\) is separated, it is a closed immersion.\n  In the Lean formalization, this theorem is taken as an axiom stub.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 644, "effort_local": 644, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2470}, "def:faltings_zhang": {"id": "def:faltings_zhang", "type": "definition", "title": "Faltings--Zhang morphism", "chapter": "Jacobian variety of a curve", "statement": "Let \\(M \\ge 1\\) be an integer. The \\emph{Faltings--Zhang morphism} is the map\n  \\[\n    \\mathscr{D}_M \\colon C^{M+1} \\to \\mathrm{Jac}(C)^M,\n    \\qquad\n    (Q_0, Q_1, \\ldots, Q_M) \\mapsto (Q_1 - Q_0,\\, Q_2 - Q_0,\\, \\ldots,\\, Q_M - Q_0),\n  \\]\n  where the differences \\(Q_i - Q_0 := \\iota_{Q_0}(Q_i) \\in \\mathrm{Jac}(C)\\)\n  are computed via the Abel--Jacobi map based at \\(Q_0\\) (varying with the tuple).\n\n  In the relative setting of the paper, for a base \\(S \\to \\mathbb{M}_g\\) and the\n  universal curve \\(\\mathfrak{C}_S\\), this globalizes to a morphism of schemes\n  \\[\n    \\mathscr{D}_M \\colon \\mathfrak{C}_S^{[M+1]} \\to\n    \\mathfrak{A}_g^{[M]} \\times_{\\mathbb{A}_g} S\n  \\]\n  over \\(S\\) (the Faltings--Zhang morphism as in \\cite[(\\ref*{DefFaltingsZhang3})]{MR4276287-mordell-lang-curves}).\n  This morphism is proper because the diagonal arrow in the defining Cartesian\n  diagram is proper.\n  \n  \n  \n  \n  \n  \n  \\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}", "uses": ["def:jacobian_av", "def:abel_jacobi"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.faltingsZhang", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": null, "effort_local": 1053, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2879}, "lem:curve_generates_jacobian": {"id": "lem:curve_generates_jacobian", "type": "lemma", "title": "Curve generates its Jacobian", "chapter": "Jacobian variety of a curve", "statement": "For \\(g \\ge 2\\), the image \\(\\iota_{P_0}(C) \\subset \\mathrm{Jac}(C)\\) generates\n  \\(\\mathrm{Jac}(C)\\) as an abelian group (or equivalently, as an abelian variety):\n  the smallest abelian subvariety of \\(\\mathrm{Jac}(C)\\) containing \\(\\iota_{P_0}(C)\\)\n  is \\(\\mathrm{Jac}(C)\\) itself.\n  \n  \n  \n  \n  \\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}", "uses": ["def:abel_jacobi", "def:jacobian_av"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Jacobian.curveGeneratesJacobian", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:abel_jacobi, def:jacobian_av, lem:jacobian_ppav}\n  This is a standard consequence of the definition of the Jacobian.\n  Let \\(B \\subset \\mathrm{Jac}(C)\\) be an abelian subvariety containing\n  \\(\\iota_{P_0}(C)\\). The universal property of \\(\\mathrm{Jac}(C)\\) applies to\n  the inclusion \\(\\iota_{P_0} \\colon C \\to B \\hookrightarrow \\mathrm{Jac}(C)\\)\n  and to the composition \\(C \\xrightarrow{\\iota_{P_0}} B\\). It gives a unique\n  group homomorphism \\(\\mathrm{Jac}(C) \\to B\\) splitting the inclusion; combined\n  with the inclusion \\(B \\hookrightarrow \\mathrm{Jac}(C)\\), this shows\n  \\(\\mathrm{Jac}(C)\\) and \\(B\\) are isogenous.\n  Since \\(\\dim B \\le g = \\dim \\mathrm{Jac}(C)\\) and \\(B\\) is a subvariety, we\n  conclude \\(B = \\mathrm{Jac}(C)\\).\n  The property is invoked in the proof of \\cref{thm:nondeg_for_bd} (via Gao's\n  Theorem~1.3, hypothesis~(b)) to verify that the Abel--Jacobi image satisfies\n  the non-degeneracy hypotheses.\n  In the Lean formalization, this is axiomatized as an axiom stub.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Jacobian.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1004, "effort_local": 1004, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2830}, "def:Ag_level": {"id": "def:Ag_level", "type": "definition", "title": "Siegel moduli space with level structure", "chapter": "Torelli map and universal Jacobian family", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  Fix integers \\(g \\ge 2\\) and \\(\\ell \\ge 3\\). The \\emph{Siegel moduli space}\n  \\(\\mathbb{A}_g\\) is the fine moduli space of principally polarized abelian\n  varieties of dimension \\(g\\) with level-\\(\\ell\\) structure. More precisely,\n  \\(\\mathbb{A}_g\\) represents the functor associating to each\n  \\(\\mathrm{Spec}\\,\\mathbb{Z}[1/\\ell]\\)-scheme \\(T\\) the set of isomorphism\n  classes of triples \\((A \\to T,\\, \\lambda,\\, \\alpha)\\), where \\(A \\to T\\) is an\n  abelian scheme of relative dimension \\(g\\), \\(\\lambda\\) is a principal\n  polarization of \\(A\\), and \\(\\alpha\\) is a level-\\(\\ell\\) structure on \\(A\\).\n  For \\(\\ell \\ge 3\\), this functor is representable, making \\(\\mathbb{A}_g\\) a\n  fine (not merely coarse) moduli scheme. Over \\(\\overline{\\mathbb{Q}}\\),\n  \\(\\mathbb{A}_g\\) is a smooth, irreducible, quasi-projective variety; see\n  \\cite[Theorem~7.9]{MFK:GIT94} or \\cite[Theorem~1.9]{OortSteenbrink}.", "uses": [], "lean_name": "MR4276287UniformityInMordellLangForCurves.Torelli.agLevel", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": f ism", "chapter": "Torelli map and universal Jacobian family", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from\n  references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  The \\emph{Torelli morphism} is the morphism of schemes\n  \\[\n    \\tau \\colon \\mathbb{M}_g \\longrightarrow \\mathbb{A}_g\n  \\]\n  sending the moduli point \\([C, \\alpha]\\) of a smooth genus-\\(g\\) curve \\(C\\)\n  with level-\\(\\ell\\) structure \\(\\alpha\\) to the isomorphism class of its\n  principally polarized Jacobian \\([\\mathrm{Jac}(C),\\, \\theta_C,\\, \\alpha']\\),\n  where \\(\\theta_C\\) is the canonical principal polarization of \\(\\mathrm{Jac}(C)\\)\n  induced by the theta divisor, and \\(\\alpha'\\) is the induced level-\\(\\ell\\)\n  structure.\n\n  Equivalently, \\(\\tau\\) is the bottom arrow in the Cartesian diagram\n  \\[\n    \\begin{gathered}\n    \\xymatrix{\n      \\mathrm{Jac}(\\mathfrak{C}_g) \\ar[r] \\ar[d] & \\mathfrak{A}_g \\ar[d]^{\\pi^{\\mathrm{univ}}} \\\\\n      \\mathbb{M}_g \\ar[r]_{\\tau} & \\mathbb{A}_g,\n    }\n    \\end{gathered}\n  \\]\n  where the left vertical arrow is the relative Jacobian of the universal curve\n  \\(\\mathfrak{C}_g \\to \\mathbb{M}_g\\) and the Cartesian square expresses that\n  the relative Jacobian is obtained by base change from the universal abelian\n  variety along \\(\\tau\\).", "uses": ["def:Mg_level", "def:Ag_level", "def:jacobian_av"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Torelli.torelliMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Torelli.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 36, "proof_size_tex": null, "effort_local": 1227, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4919}, "thm:torelli_injective": {"id": "thm:torelli_injective", "type": "theorem", "title": "Torelli's theo l \\(P \\in \\mathcal{A}(\\IQbar)\\):\n  \\(\\hat{h}_{\\mathcal{A}}(P) \\ge 0\\), with equality if and only if\n  \\(P\\) is a torsion point of \\(\\mathcal{A}\\).", "uses": ["def:nt_height"], "lean_name": "MR4276287UniformityInMordellLangForCurves.WeilHeight.ntNonneg", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:nt_height, prop:nt_quadratic, lem:northcott_ht, thm:silverman_tate}\n  Non-negativity: the naive height \\(\\hcA\\) takes values in \\([0,\\infty)\\), so\n  \\(\\hat{h}_{\\mathcal{A}}(P) = \\lim_{N\\to\\infty}\\hcA([N]P)/N^2 \\ge 0\\).\n\n  If \\(P\\) is torsion of order \\(n\\), then \\([n]P = 0\\), so by\n  \\cref{prop:nt_quadratic}, \\(n^2\\,\\hat{h}_{\\mathcal{A}}(P) =\n  \\hat{h}_{\\mathcal{A}}([n]P) = \\hat{h}_{\\mathcal{A}}(0) = 0\\),\n  hence \\(\\hat{h}_{\\mathcal{A}}(P) = 0\\).\n\n  Conversely, suppose \\(\\hat{h}_{\\mathcal{A}}(P) = 0\\). By\n  \\cref{prop:nt_quadratic}, \\(\\hat{h}_{\\mathcal{A}}([N]P) = N^2\\,\\hat{h}_{\\mathcal{A}}(P) = 0\\)\n  for all \\(N \\in \\mathbb{Z}\\). Since \\(\\pi([N]P) = \\pi(P)\\) for all \\(N\\),\n  the Silverman--Tate theorem \\cref{thm:silverman_tate} gives\n  \\(\\hcA([N]P) \\le \\hat{h}_{\\mathcal{A}}([N]P) + c\\max\\{1,h_{\\overline{S}}(\\pi(P))\\}\n  = c\\max\\{1,h_{\\overline{S}}(\\pi(P))\\}\\),\n  which is bounded independently of \\(N\\). By the Northcott property\n  \\cref{lem:northcott_ht}, the set \\(\\{[N]P : N \\in \\mathbb{Z}\\}\\) is finite,\n  hence \\(P\\) is torsion.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/WeilHeight.tex", "lean_file": "", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1055, "effort_local": 1055, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9392}, "def:isNef": {"id": "def:isNef", "type": "definition", "title": "Nef line bundle", "chapter": "Positivity of line bundles", "statement": "Let \\(X\\) be a projective variety over a field \\(k\\) and let \ ull, "effort_total": 10869}, "thm:arith_bezout": {"id": "thm:arith_bezout", "type": "theorem", "title": "Arithmetic Bézout theorem", "chapter": "Arithmetic Bézout and intersection estimates", "statement": "\\textit{Source: Autissier, \\cite[Théorème~3]{HauteursAlt3}.}\n  Let \\(Z_1, Z_2\\) be algebraic cycles on \\(\\mathbb{P}^n_{\\mathbb{Z}}\\) of\n  complementary codimension. Their arithmetic intersection number satisfies\n  \\[\n    \\hat{h}(Z_1 \\cdot Z_2)\n    \\le \\deg(Z_1)\\,\\hat{h}(Z_2)\n       + \\deg(Z_2)\\,\\hat{h}(Z_1)\n       + c\\,\\deg(Z_1)\\,\\deg(Z_2),\n  \\]\n  where \\(c > 0\\) is an absolute constant and \\(\\hat{h}\\) denotes the\n  normalized height of a cycle.", "uses": ["def:ambient_setup"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ArithBezout.arithBezout", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:ambient_setup}\n  This is \\cite[Théorème~3]{HauteursAlt3} (Autissier). The proof is an arithmetic\n  intersection theory computation in the Arakelov geometry of \\(\\mathbb{P}^n_{\\mathbb{Z}}\\),\n  using the arithmetic Chern class formalism. The bound is a consequence of the\n  Cauchy--Schwarz inequality for the arithmetic intersection pairing after normalizing\n  the Green functions at the archimedean places. We axiomatize this theorem as a\n  black box and do not reprove it in this project.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ArithBezout.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 498, "effort_local": 498, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8835}, "lem:bihomog_degree": {"id": "lem:bihomog_degree", "type": "lemma", "title": "Bihomogeneous degree bound for \\([N", "chapter": "Arithmetic Bézout and intersection estimates", "statement": "\\)]\n  \n  \n  \n  \n  \n  \\textit{Source: Section 4, proof of Proposition~4.2 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/HtIneq.tex).}\n  Let \\(N = 2^l\\). The graph of multiplication-by-\\(N\\) on \\(\\mathcal{A}\\),\n  viewed as a closed subvariety of\n  \\(\\mathbb{P}^n \\times \\mathbb{P}^n \\times \\mathbb{P}^m\\) via the graph\n  closure \\(\\overline{X_N}\\) from \\cref{lem:graph_construction}, is cut out\n  by \\(n\\) equations that are trihomogeneous of tridegree \\((D_l, 1, D'_l)\\)\n  where\n  \\[\n    D_l = 4^l = N^2, \\qquad D'_l = \\tfrac{4^l - 1}{3}\\,D' \\le D' N^2,\n  \\]\n  for an absolute constant \\(D'\\). In particular, the degree in each of the\n  \\(\\mathbf{X}\\)- and \\(\\mathbf{S}\\)-blocks grows at most as \\(N^2\\).", "uses": ["lem:graph_construction"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ArithBezout.bihomogDegree", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:graph_construction}\n  Multiplication-by-\\(2\\) on the projectively normal abelian variety\n  \\(A \\subset \\mathbb{P}^n_{k(S)}\\) satisfies \\([2]^* L \\cong L^{\\otimes 4}\\) for the\n  symmetric ample line bundle \\(L\\); by a result of Serre\n  \\cite[Corollaire~2, Appendix~II]{Ast6970}, \\([2]\\) is therefore represented by\n  bihomogeneous polynomials \\(f_0, \\ldots, f_n\\) in the projective coordinates\n  \\(\\mathbf{X}\\) of \\(\\mathbb{P}^n\\) and the base coordinates \\(\\mathbf{S}\\) of\n  \\(\\mathbb{P}^m\\), of bidegree \\((4, D')\\) for some constant \\(D'\\).\n  Define \\(f^{(1)}_i = f_i\\) and iterate:\n  \\[\n    f^{(l+1)}_i(\\mathbf{X}, \\mathbf{S})\n    = f_i\\bigl((f^{(l)}_0(\\mathbf{X}, \\mathbf{S}),\n               \\ldots,\n               f^{(l)}_n(\\mathbf{X}, \\mathbf{S})),\\, \\mathbf{S}\\bigr).\n  \\]\n  If \\(f^{(l)}_i\\) has bidegree \\((D_l, D'_l)\\), then \\(f^{(l+1)}_i\\) has\n  bidegree \\((4D_l,\\, D' + 4D'_l)\\). Starting from \\((D_1, D'_1) = (4, D')\\),\n  the recurrence gives \\(D_l = 4^l\\) and \\(D'_l = \\tfrac{4^l - 1}{3}D' \\le D' \\cdot 4^l\\).\n  The graph of \\([N] = [2^l]\\) is then cut out inside \\(\\overline{X} \\times \\mathbb{P}^n\\)\n  by the \\(n\\) trihomogeneous polynomials\n  \\(g_i = Y_i f^{(l)}_0(\\mathbf{X}, \\mathbf{S}) - Y_0 f^{(l)}_i(\\mathbf{X}, \\mathbf{S})\\)\n  of tridegree \\((D_l, 1, D'_l) = (N^2, 1, D'_l)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ArithBezout.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 9, "proof_size_tex": 1307, "effort_local": 1307, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10754}, "lem:siu_intersection_lower": {"id": "lem:siu_intersection_lower", "type": "lemma", "title": "Lower bound on the self-intersection of \\(\\mathcal{F}\\)", "chapter": "Arithmetic Bézout and intersection estimates", "statement": "\\textit{Source: Proposition 4.1, Section 4 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/HtIneq.tex).}\n  Suppose \\(X^{\\mathrm{an}}\\) contains a smooth point at which\n  \\(\\omega|_{X^{\\mathrm{sm,an}}}^{\\wedge d} > 0\\),\n  where \\(\\omega\\) is the Betti form from \\cref{prop:betti_form}.\n  Then there exists a constant \\(\\kappa > 0\\), independent of \\(N\\), such that\n  \\[\n    (\\mathcal{F}^{\\cdot d}) \\ge \\kappa N^{2d}\n  \\]\n  for all \\(N \\in \\mathbb{N}\\), where\n  \\(\\mathcal{F} = \\mathcal{O}(0,1,1)|_{\\overline{X_N}}\\) is the line bundle on the\n  graph closure \\(\\overline{X_N} \\subset \\mathbb{P}^n \\times \\mathbb{P}^n \\times \\mathbb{P}^m\\)\n  introduced in \\cref{lem:graph_construction}.", "uses": ["prop:betti_form", "lem:graph_construction", "def:isNef"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ArithBezout.siuIntersectionLower", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:betti_form,lem:graph_construction}\n  Fix a smooth point \\(P_0 \\in X^{\\mathrm{sm,an}}\\) at which\n  \\(\\omega|_{X^{\\mathrm{sm,an}}}^{\\wedge d} > 0\\). Let \\(\\alpha\\) be the pull-back\n  of the Fubini--Study form on \\(\\mathbb{P}^{(n+1)(m+1)-1}_\\mathbb{C}\\) under the\n  analytification of the Segre morphism\n  \\(\\mathbb{P}^n_\\mathbb{C} \\times \\mathbb{P}^m_\\mathbb{C} \\to \\mathbb{P}^{(n+1)(m+1)-1}_\\mathbb{C}\\),\n  restricted to \\(\\overline{\\mathcal{A}}^{\\mathrm{an}}\\); it represents\n  \\(\\mathcal{O}(1,1)|_{\\overline{\\mathcal{A}}^{\\mathrm{an}}}\\) and is strictly positive on\n  \\(\\mathcal{A}^{\\mathrm{an}}\\).\n  Since the Betti form \\(\\omega\\) is semi-positive by \\cref{prop:betti_form}(i),\n  there exist a compact neighbourhood \\(K \\subset \\Delta \\subset \\pi(P_0)\\) and\n  a constant \\(C > 0\\) such that \\(C\\alpha|_{\\mathcal{A}_\\Delta} - \\omega|_{\\mathcal{A}_\\Delta} \\ge 0\\).\n  Let \\(\\theta\\) be a smooth non-negative cutoff supported on \\(\\pi^{-1}(K)\\) with\n  \\(\\theta(P_0) = 1\\). Using the Betti-form scaling \\([N]^*\\omega = N^2\\omega\\)\n  from \\cref{prop:betti_form} and the fact that \\(\\theta = \\vartheta \\circ \\pi\\) is\n  pulled back from the base (so \\([N]^*\\theta = \\theta\\)), one obtains\n  \\[\n    \\beta := C [N]^*(\\theta\\alpha) - N^2\\theta\\omega \\ge 0\n    \\quad \\text{on } \\mathcal{A}^{\\mathrm{an}}.\n  \\]\n  Writing \\(\\gamma = C [N]^*(\\theta\\alpha)\\) and \\(\\delta = N^2\\theta\\omega\\), both\n  semi-positive with compact support, a wedge-positivity argument\n  \\cite[Proposition~III.1.11]{Demailly} gives\n  \\[\n    \\int_{X^{\\mathrm{sm,an}}} \\gamma^{\\wedge d}\n    \\ge \\int_{X^{\\mathrm{sm,an}}} \\delta^{\\wedge d}\n    = \\kappa' N^{2d}, \\qquad\n    \\kappa' = \\int_{X^{\\mathrm{sm,an}}} (\\theta\\omega)^{\\wedge d} > 0,\n  \\]\n  the strict positivity \\(\\kappa' > 0\\) following from the choice of \\(P_0\\) and\n  \\(\\theta(P_0) = 1\\). Via the graph construction \\cref{lem:graph_construction}\n  (\\(\\overline{X_N} \\xleftarrow{\\rho_1} X_N \\xrightarrow{\\rho_2} \\mathcal{A}\\)),\n  a change-of-coordinates and the identification\n  \\(\\rho_2^*\\mathcal{O}(1,1) = \\mathcal{O}(0,1,1)|_{\\overline{X_N}} = \\mathcal{F}\\)\n  via the projection formula yield\n  \\[\n    \\int_{X^{\\mathrm{sm,an}}} [N]^*(\\theta\\alpha)^{\\wedge d} \\le (\\mathcal{F}^{\\cdot d}).\n  \\]\n  Combining, \\((\\mathcal{F}^{\\cdot d}) \\ge (\\kappa'/C^d)\\,N^{2d}\\), and\n  \\(\\kappa = \\kappa'/C^d > 0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/ArithBezout.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 2331, "effort_local": 2331, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15165}, "lem:siu_intersection_upper": {"id": "lem:siu_intersection_upper", "type": "lemma", "title": "Upper bound on the mixed intersection", "chapter": "Arithmetic Bézout and intersection estimates", "statement": "\\textit{Source: Proposition 4.2, Section 4 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/HtIneq.tex).}\n  Assume \\(d \\ge 1\\). There exists a constant \\(c > 0\\) depending only on \\(X\\) and\n  the ambient data, with the following property. For all \\(N \\ge 1\\) a power of \\(2\\),\n  \\[\n    (\\mathcal{M} \\cdot \\mathcal{F}^{\\cdot(d-1)}) \\le c\\, N^{2(d-1)},\n  \\]\n  where \\(\\mathcal{M} = \\mathcal{O}(0,0,1)|_{\\overline{X_N}}\\) and\n  \\(\\mathcal{F} = \\mathcal{O}(0,1,1)|_{\\overline{X_N}}\\) are the line bundles\n  on the graph closure \\(\\overline{X_N}\\) from \\cref{lem:graph_construction}.", "uses": ["lem:bihomog_degree", "lem:graph_construction", "def:isNef"], "lean_name": "MR4276287UniformityInMordellLangForCurves.ArithBezout.siuIntersectionUpper", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:bihomog_degree,lem:graph_construction}\n  By \\cref{lem:bihomog_degree} with \\(N = 2^l\\), the graph \\(\\overline{X_N}\\) is an\n  irreducible component of the intersection of \\(\\overline{X} \\times ity.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/MR4276287UniformityInMordellLangForCurves_Basic.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1002, "effort_local": 1002, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 27093}, "thm:ht_inequality_full": {"id": "thm:ht_inequality_full", "type": "theorem", "title": "Full height inequality", "chapter": "Geometric and height infrastructure", "statement": "\\textit{Source: Appendix B of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/HtIneqFinalVer.tex).}\n  The appendix first enlarges the Betti-map input to arbitrary regular bases and\n  then performs a six-step devissage: close up \\(X\\), replace the base by the\n  image of \\(X\\), pass to a regular cover carrying level structure and a\n  principal polarization, and finally invoke the height inequality already\n  proved under the paper's hypotheses. The result is the same lower bound for\n  the canonical height on a dense open subset of any non-degenerate subvariety.", "uses": ["prop:betti_map_app", "lem:betti_rank_zar_open_app", "def:nondegenerate_app", "thm:ht_inequality"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Basic.heightInequalityFull", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:betti_map_app, lem:betti_rank_zar_open_app, def:nondegenerate_app, thm:ht_inequality}\n  The proof reduces to \\cref{thm:ht_inequality} via six devissage steps.\n  \\textit{Step (i):} Replace \\(X\\) by its Zariski closure \\(\\overline{X}\\) in \\(\\mathcal{A}\\);\n  non-degeneracy and the conclusion are preserved.\n  \\textit{Step (ii):} Restrict to \\(S' = \\pi(X)\\) with reduced structure; \\(X\\) dominates \\(S'\\)\n  and non-degeneracy pulls back unchanged.\n  \\textit{Step (iii):} Replace \\(S\\) by its regular locus \\(S^{\\mathrm{sm}}\\) and \\(X\\) by\n  \\(X \\cap \\pi^{-1}(S^{\\mathrm{sm}})\\), which is still non-degenerate by \\cref{lem:betti_rank_zar_open_app}.\n  \\textit{Step (iv):} By \\cite[Section~23, Corollary~1]{MumfordAbVar}, pass to a\n  quasi-finite étale dominant cover \\(\\rho \\colon S' \\to S\\) such that the generic fiber of\n  \\(\\mathcal{A}' = \\mathcal{A} \\times_S S'\\) is isogenous to a principally polarized abelian variety;\n  non-degeneracy of an irreducible component of \\(\\rho_{\\mathcal{A}}^{-1}(X)\\) follows from\n  \\cref{lem:betti_rank_zar_open_app} and the local homeomorphism property of the isogeny.\n  \\textit{Step (v):} Replace \\(\\mathcal{A}' \\to S'\\) by the principally polarized abelian scheme\n  \\(\\mathcal{A}'_0 \\to S'\\) isogenous to it; non-degeneracy lifts because the isogeny is\n  a local homeomorphism on the Betti torus.\n  \\textit{Step (vi):} Pass to a finite étale cover \\(S'' \\to S'\\) on which \\(\\mathcal{A}'' = \\mathcal{A}'_0 \\times_{S'} S''\\)\n  acquires level-\\(\\ell\\)-structure (via \\cref{prop:betti_map_app}); this brings us into\n  the setting of \\cref{thm:ht_inequality}, which now applies to give the desired lower bound.\n  Descent back along all the covers via the Height Machine yields the stated inequality on a\n  Zariski open dense subset of the original \\(X\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/MR4276287UniformityInMordellLangForCurves_Basic.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 1795, "effort_local": 1795, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 29672}, "lem:uniform_degree_bound": {"id": "lem:uniform_degree_bound", "type": "lemma", "title": "Uniform degree bound", "chapter": "Geometric and height infrastructure", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  Translates of a fixed fiber curve have uniformly bounded projective degree, and\n  one translate in each fiber has height controlled by the moduli point.", "uses": ["def:ambient_setup"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Basic.uniformDegreeBound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:ambient_setup}\n  By \\cite[Corollaire~17.16.3(ii)]{EGAIV}, there exists a quasi-section of\n  \\(\\mathfrak{C}_g \\to \\mathbb{M}_g\\): an affine scheme \\(S_0\\) with a morphism\n  \\(S_0 \\to \\mathfrak{C}_g\\) factoring through a surjective quasi-finite étale\n  \\(S_0 \\to \\mathbb{M}_g\\).\n  The composition \\(\\mathfrak{C}_g \\times_{\\mathbb{M}_g} S_0 \\to \\mathfrak{A}_g\\)\n  via the Faltings--Zhang morphism \\(\\mathscr{D}_1\\) has image a constructible\n  union of finitely many irreducible locally closed subsets \\(X_i \\subset \\mathfrak{A}_g\\).\n  For any \\(s \\in \\mathbb{M}_g(\\overline{\\mathbb{Q}})\\), the curve \\(\\mathfrak{C}_s - P_s\\)\n  arises as an irreducible component of the intersection of some \\(\\overline{X_i}\\)\n  with the fiber \\(\\mathbb{P}^n \\times \\{\\tau(s)\\}\\).\n  Part (i) follows from Bézout's theorem applied to the Segre embedding\n  \\(\\mathbb{P}^n \\times \\mathbb{P}^m \\to \\mathbb{P}^{(n+1)(m+1)-1}\\):\n  the degree of \\(\\mathfrak{C}_s - P_s\\) is bounded above uniformly in \\(s\\),\n  and translating by any \\(P \\in \\mathfrak{A}_{g,\\tau(s)}(\\overline{\\mathbb{Q}})\\)\n  does not change the degree.\n  Part (ii) follows from the Arithmetic Bézout theorem \\cite[Théorème~3]{HauteursAlt3}:\n  the height of \\(\\overline{X_i}\\) and the degree of \\(\\mathbb{P}^n \\times \\{\\tau(s)\\}\\)\n  are bounded independently of \\(s\\), while the height of the fiber hyperplane is\n  bounded linearly in \\(h(\\tau(s))\\), hence linearly in\n  \\(h_{\\overline{\\mathbb{A}_g},\\mathcal{M}}(\\tau(s))\\) by the Height Machine.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/MR42762 r constraint on\n  the position of \\(P\\) relative to other points in \\(\\Gamma\\).\n  The Mumford inequality gives a separation bound: two distinct such high-height points\n  are far apart in the Néron--Tate metric.\n  Combining these two inequalities shows that there can be at most \\(c^\\rho\\)\n  points of \\(C(\\overline{\\mathbb{Q}}) \\cap \\Gamma\\) with\n  \\(\\hat{h}_L(P) > c\\max\\{1, h(C), c_{\\mathrm{NT}}, h_1\\}\\),\n  where \\(c\\) depends only on \\(n\\) and \\(\\deg C\\), and \\(h_1\\) is a height\n  measuring the complexity of the group law on \\(A\\) in projective coordinates.\n  The \\cref{thm:silverman_tate} controls \\(c_{\\mathrm{NT}}\\) in terms of\n  \\(h_{\\overline{S}}(\\pi(P))\\), and \\cref{lem:uniform_degree_bound} controls\n  \\(h(C)\\) in terms of the moduli height.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/MR4276287UniformityInMordellLangForCurves_Basic.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1138, "effort_local": 1138, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 12042}, "lem:NAlon": {"id": "lem:NAlon", "type": "lemma", "title": "N-Alon combinatorial lemma", "chapter": "Geometric and height infrastructure", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  Large enough subsets of a curve cannot have all \\(M\\)-fold products trapped in\n  a fixed proper closed subset of the ambient product.", "uses": ["def:ambient_setup"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Basic.nAlon", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:ambient_setup}\n  The proof is by induction on \\(M\\). The base case \\(M = 1\\) follows from Bézout's theorem:\n  the finite set \\(Z \\cap C\\) has degree bounded by \\(\\deg Z \\cdot \\deg C\\), so any\n  \\(\\Sigma \\subset C(k)\\) with \\(|\\Sigma| > \\deg Z \\cdot \\deg C\\) satisfies\n  \\(\\Sigma \\not\\subset Z(k)\\).\n  For the inductive step, let \\(q \\colon (\\mathbb{P}^n)^M \\to \\mathbb{P}^n\\)\n  be the projection to the first factor.\n  Decompose \\(Z \\cap C^M\\) into components with \\(\\dim q(\\text{component}) \\ge 1\\)\n  (forming \\(Z'\\)) and components where \\(q\\) maps to a point (forming \\(Z''\\)).\n  The number of components in \\(Z''\\) is bounded by Bézout, so \\(q(Z'')\\) is a finite\n  set of cardinality \\(\\le B''\\).\n  For each \\(P \\in C(k)\\), the fiber \\(q|_{Z'}^{-1}(P) \\cap C^{M-1}\\) does not contain\n  \\(C^{M-1}\\) (since \\(\\dim q|_{Z'}^{-1}(P) \\le \\dim Z' - 1 \\le M - 2\\)),\n  so by the induction hypothesis there exists \\(B'\\) such that any\n  \\(\\Sigma\\) of cardinality \\(\\ge B'\\) satisfies\n  \\(\\{P\\} \\times \\Sigma^{M-1} \\not\\subset Z'(k)\\) for every \\(P \\in C(k)\\).\n  Taking \\(B = \\max\\{B', B'' + 1\\}\\) completes the induction.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/MR4276287UniformityInMordellLangForCurves_Basic.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 1125, "effort_local": 1125, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9462}, "lem:packets_alternative3": {"id": "lem:packets_alternative3", "type": "lemma", "title": "Packets alternative", "chapter": "Geometric and height infrastructure", "statement": "\\textit{Source: Section 6 of \\cite{MR4276287-mordell-lang-curves} (read from references/MR4276287-mordell-lang-curves-source/SettingUp.tex).}\n  A proper closed condition on the Faltings--Zhang image can only hold for\n  uniformly many base points on a curve of genus at least \\(2\\).", "uses": ["def:ambient_setup"], "lean_name": "MR4276287UniformityInMordellLangForCurves.Basic.packetsAlternative", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:ambient_setup}\n
