<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <span class="brand">Blueprint DAG</span>

  <span class="legend"><span class="leg-dot" style="background:#22c55e"></span><span class="leg-txt">done</span><span class="leg-dot" style="background:#3b82f6"></span><span class="leg-txt">mathlib</span><span class="leg-bar"></span><span class="leg-txt">more effort</span><span class="leg-dot" style="background:#ef4444"></span><span class="leg-txt">∞ no proof</span></span>

  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>

<div id="controls">

  <datalist id="node-ids"></datalist>

    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">
        <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

"effort_total": 1277}, "def:spherical-variety": {"id": "def:spherical-variety", "type": "definition", "title": "Affine spherical \\( G \\)-variety", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §2.1 and Notation Table §1.5.}\n\n  An \\emph{affine spherical \\( G \\)-variety} is an affine variety \\( X \\) over \\( k \\)\n  with a \\( G \\)-action having an open dense \\( B \\)-orbit.  We fix:\n  \\begin{itemize}\n    \\item An open \\( B \\)-orbit \\( X^\\circ \\subset X \\) and a base point\n          \\( x_0 \\in X^\\circ(k) \\) with stabilizer \\( H \\subset G \\).\n    \\item The open \\( G \\)-orbit \\( X^\\bullet = H \\backslash G \\).\n    \\item The canonical affine embedding \\( X^{\\mathrm{can}} = \\mathrm{Spec}\\, k[X^\\bullet] \\).\n    \\item The GIT quotient \\( X \\GIT N = \\mathrm{Spec}\\, k[X]^N \\),\n          an affine embedding of a quotient torus \\( T_X \\) of \\( T \\).\n  \\end{itemize}\n  Under the type-T condition (\\cref{def:type-T-condition}) we will have \\( T_X = T \\) and\n  can identify the open orbit in \\( X \\GIT N \\) with \\( T \\).", "uses": ["def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.SphericalVariety", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 10, "descendant_count": 17, "proof_size_tex": null, "effort_local": 862, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2139}, "def:colors-monoid": {"id": "def:colors-monoid", "type": "definition", "title": "Colors and cocharacter monoid", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §2 and Notation Table §1.5.}\n\n  The \\emph{set of colors} \\( \\mathcal{D} \\) is the set of prime \\( B \\)-stable divisors of\n  the open \\( G \\)-orbit \\( X^\\bullet \\) (i.e.\\ those not \\( G \\)-stable).\n  Each color \\( D \\in \\mathcal{D} \\) determines a \\( B \\)-invariant valuation\n  \\( \\checknu_D \\colon k(X)^{(B)} \\to \\mathbb{Z} \\), viewed as an element of\n  \\( \\checkLambda_X \\).\n\n  The \\emph{cocharacter monoid} \\( \\mfc_X \\subset \\checkLambda_X \\) is the dual of the\n  monoid \\( \\mfc_X^\\vee \\) of \\( T_X \\)-weights on \\( k[X \\GIT N] \\).\n  It is a strictly convex submonoid (containing no non-trivial subgroup), and its\n  \\emph{primitive elements} are \\( \\Prim(\\mfc_X) \\).\n\n  We say \\( \\mfc_X \\cong \\mathbb{N}^r \\) is \\emph{free} when the colors\n  \\( \\checknu_1, \\ldots, \\checknu_r \\) (the valuations of the colors) form a\n  \\( \\mathbb{Z} \\)-basis for the lattice they generate and freely generate \\( \\mfc_X \\) as a\n  monoid.  This is always achievable by passing to a finite abelian cover of \\( X^\\bullet \\)\n  and taking its affine closure (§5.2 of the paper).", "uses": ["def:spherical-variety", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ColorsAndMonoid", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 8, "descendant_count": 11, "proof_size_tex": null, "effort_local": 1100, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3239}, "def:type-T-condition": {"id": "def:type-T-condition", "type": "definition", "title": "Type-T (dual group) condition", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1, equation~(1.1) (type-T condition).}\n\n  The \\emph{type-T condition} on an affine spherical \\( G \\)-variety \\( X \\) with open\n  \\( B \\)-orbit \\( X^\\circ \\) is:\n  \\begin{enumerate}\n    \\item \\( B \\) acts freely on \\( X^\\circ \\); and\n    \\item for every simple root \\( \\alpha \\), if \\( P_\\alpha \\) is the minimal parabolic\n          generated by \\( B \\) and the root space \\( \\mathfrak{g}_{-\\alpha} \\), the\n          stabilizer in \\( P_\\alpha \\) of a point in the open \\( P_\\alpha \\)-orbit\n          \\( X^\\circ P_\\alpha \\) is a (necessarily one-dimensional) torus.\n  \\end{enumerate}\n  This condition is equivalent to saying that the Gaitsgory--Nadler--Sakellaridis--Venkatesh\n  dual group \\( \\check{G}_X \\) equals the Langlands dual group \\( \\checkG \\) of \\( G \\).\n  In particular, it implies \\( T_X = T \\), so we may canonically identify \\( X \\GIT N \\) as\n  an affine embedding of \\( T \\).", "uses": ["def:spherical-variety", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.TypeTCondition", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 11, "proof_size_tex": null, "effort_local": 935, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3074}, "def:arc-space": {"id": "def:arc-space", "type": "definition", "title": "Arc space", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1.}\n\n  The \\emph{formal arc space} \\( \\Lplus X \\) is the ind-scheme representing the functor\n  \\( R \\mapsto X(R\\llbracket t \\rrbracket) \\).\n  It is generally infinite-dimensional and singular.\n  However, the Grinberg--Kazhdan--Drinfeld theorem asserts that the singularities at\n  \\emph{generic} points (arcs whose generic fiber lies in the smooth locus \\( X^{\\mathrm{sm}} \\))\n  are of finite type, enabling the definition of an intersection complex on formal neighborhoods.\n  The Lean formalization of this object requires pro-scheme or ind-scheme infrastructure.", "uses": ["def:spherical-variety"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ArcSpace", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": null, "effort_local": 609, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2748}, "def:IC-function": {"id": "def:IC-function", "type": "definition", "title": "IC function", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1.}\n\n  Let \\( k = \\overline{\\mathbb{F}} \\) be the algebraic closure of a finite field,\n  \\( \\mathfrak{o} = k\\llbracket t \\rrbracket \\), \\( F = k(\\!(t)\\!) \\).\n  The \\emph{IC function} \\( \\Phi_0 \\) is a \\( \\overline{\\mathbb{Q}}_\\ell \\)-valued function\n  on \\( X(\\mathfrak{o}) \\cap X^{\\mathrm{sm}}(F) \\), defined as the Frobenius trace of the\n  intersection complex of (finite-dimensional formal models of) \\( \\Lplus X \\).\n  The normalization convention is:\n  \\begin{itemize}\n    \\item On the smooth locus \\( \\Lplus X^{\\mathrm{sm}} \\), the IC sheaf is\n          \\( \\overline{\\mathbb{Q}}_\\ell \\) in degree zero.\n    \\item On a smooth stratum of codimension \\( d \\) in \\( \\Lplus X \\), the IC sheaf is\n          \\( \\overline{\\mathbb{Q}}_\\ell(\\tfrac{d}{2})[d] \\), where\n          \\( \\overline{\\mathbb{Q}}_\\ell(\\tfrac{1}{2}) \\) is a chosen square root of the\n          cyclotomic Tate twist.\n  \\end{itemize}\n  The concrete computation of \\( \\Phi_0 \\) proceeds via finite-dimensional Zastava models\n  (\\cref{def:zastava-model,def:global-model}).", "uses": ["def:arc-space", "def:spherical-variety", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ICFunction", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": null, "effort_local": 1082, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3830}, "def:global-model": {"id": "def:global-model", "type": "definition", "title": "Global model", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.3.}\n\n  Fix a smooth projective curve \\( C \\) over \\( k \\).\n  For an algebraic stack \\( \\mathscr{X} \\) and open substack \\( \\mathscr{X}^\\circ \\),\n  \\( \\Maps_{\\mathrm{gen}}(C, \\mathscr{X} \\supset \\mathscr{X}^\\circ) \\) denotes the\n  prestack of maps \\( C \\times S \\to \\mathscr{X} \\) (for test schemes \\( S \\)) that\n  generically land in \\( \\mathscr{X}^\\circ \\).\n\n  The \\emph{global model} for the arc space of \\( X \\) is the Artin stack\n  \\[\n    \\sM_X = \\Maps_{\\mathrm{gen}}(C,\\; X/G \\supset X^\\bullet/G).\n  \\]\n  It lives over \\( \\Bun_G \\), the moduli stack of \\( G \\)-bundles on \\( C \\).\n  The restriction of a \\( k \\)-point of \\( \\sM_X \\) to the formal neighborhood of\n  a point \\( v \\in |C| \\) gives an element of\n  \\( (X^\\bullet(F_v) \\cap X(\\mathfrak{o}_v))/G(\\mathfrak{o}_v) \\).", "uses": ["def:spherical-variety", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.GlobalModel", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 826, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2965}, "def:zastava-model": {"id": "def:zastava-model", "type": "definition", "title": "Zastava model", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.3 and §3.}\n\n  The \\emph{Zastava model} for \\( X \\) is the stack\n  \\[\n    \\sY_X = \\Maps_{\\mathrm{gen}}(C,\\; X/B \\supset X^\\circ/B).\n  \\]\n  Under the type-T condition (\\cref{def:type-T-condition}), \\( X^\\circ \\cong B \\) so\n  \\( \\sY_X \\) is in fact a scheme.  It lives over \\( \\Bun_B \\).\n\n  The \\emph{toric model} is\n  \\[\n    \\sA = \\Maps_{\\mathrm{gen}}(C,\\; (X \\GIT N)/T \\supset (X^\\circ \\GIT N)/T),\n  \\]\n  and there is a natural map\n  \\[\n    \\pi \\colon \\sY_X \\to \\sA.\n  \\]\n  Under our type-T assumption, \\( X^\\circ \\GIT N \\cong T \\), so \\( \\sA \\) is the scheme of\n  \\( \\mfc_X \\)-valued divisors on \\( C \\) (see §2 of the paper for the identification of\n  \\( \\sA \\) with a partial symmetrization of \\( C \\) via the primitive generators\n  of \\( \\mfc_X \\)).", "uses": ["def:spherical-variety", "def:reductive-group-data", "def:type-T-condition", "def:colors-monoid"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ZastavaModel", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": null, "effort_local": 798, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4972}, "def:compactified-zastava": {"id": "def:compactified-zastava", "type": "definition", "title": "Compactified Zastava space", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.3 and §4.}\n\n  The \\emph{compactified Zastava space} is\n  \\[\n    \\ol{\\sY}_X = \\Maps_{\\mathrm{gen}}\\!\\left(C,\\;\n       \\ol{(X/N)}/T \\supset X^\\circ/B\\right),\n  \\]\n  where \\( \\ol{X/N} \\) denotes the stack \\( (X \\times \\ol{N \\backslash G})/G \\) with\n  \\( \\ol{N \\backslash G} = \\mathrm{Spec}\\, k[N \\backslash G] \\) the affine closure.\n  There is a proper map\n  \\[\n    \\bar\\pi \\colon \\ol{\\sY}_X \\to \\sA\n  \\]\n  extending \\( \\pi \\).\n  The difference between \\( \\bar\\pi_! \\IC_{\\ol{\\sY}} \\) and \\( \\pi_! \\IC_{\\sY} \\) accounts\n  for the ``numerator'' factor\n  \\( \\prod_{\\check\\alpha \\in \\check\\Phi^+}(1 - q^{-1} e^{\\check\\alpha}) \\)\n  in the IC formula.\n  By the decomposition theorem, stratified semi-smallness\n  (\\cref{thm:semismall}) implies that \\( \\bar\\pi_! \\IC_{\\ol{\\sY}} \\) is a direct sum of\n  irreducible perverse sheaves on \\( \\sA \\).", "uses": ["def:zastava-model", "def:spherical-variety", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.CompactifiedZastava", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 8, "proof_size_tex": null, "effort_local": 879, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5851}, "def:central-fibers": {"id": "def:central-fibers", "type": "definition", "title": "Central fibers", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.3, §1.4, and §5.}\n\n  Fix a point \\( v \\in |C| \\).  For \\( \\checklambda \\in \\mfc_X \\), the\n  \\emph{central fiber} \\( \\msf{Y}^{\\checklambda} \\) is the fiber of\n  \\( \\pi \\colon \\sY_X \\to \\sA \\) over the ``diagonal'' stratum corresponding to the\n  \\( \\mfc_X \\)-valued divisor \\( \\checklambda \\cdot [v] \\) concentrated at \\( v \\).\n  Concretely, \\( \\msf{Y}^{\\checklambda}(k) \\) consists of maps\n  \\( C \\to X/B \\) sending \\( C \\setminus \\{v\\} \\) to \\( X^\\circ/B \\).\n\n  Via the identification with semi-infinite orbits in the affine Grassmannian\n  (\\cref{def:MV-cycles}):\n  \\[\n    \\msf{Y}^{\\checklambda}_{\\mathrm{red}}\n      = \\bigl(\\msf{S}^{\\checklambda} \\times_{\\Lplus X/\\Lplus G}\n              \\Lplus X/\\Lplus G \\bigr)_{\\mathrm{red}}.\n  \\]\n  When \\( X = X^{\\mathrm{can}} \\) and \\( \\mfc_X \\cong \\mathbb{N}^r \\) is free, the\n  \\emph{critical dimension} of \\( \\msf{Y}^{\\checklambda} \\) is\n  \\[\n    \\tfrac{1}{2}\\bigl(\\len(\\checklambda) - 1\\bigr),\n    \\quad \\text{where}\\quad\n    \\len(\\checklambda) := \\sum_i m_i\n    \\quad \\text{for } \\checklambda = \\sum_i m_i \\checknu_i.\n  \\]\n  The set \\( \\mfB_{X^\\bullet}^+ \\) of irreducible components of central fibers of critical\n  dimension is the key geometric input for the crystal structure\n  (\\cref{thm:crystal}).", "uses": ["def:zastava-model", "def:compactified-zastava", "def:colors-monoid", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.CentralFibers", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 4, "descendant_count": 7, "proof_size_tex": null, "effort_local": 1293, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7144}, "thm:IC-affine-closure": {"id": "thm:IC-affine-closure", "type": "theorem", "title": "IC function formula for affine closure", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1, Theorem~1.1.}\n\n  Let \\( X = \\ol{H \\backslash G}^{\\mathrm{aff}} \\) be the affine closure of an open orbit\n  satisfying the type-T condition with \\( \\mfc_X \\cong \\mathbb{N}^r \\) free, generators\n  \\( \\checknu_1, \\ldots, \\checknu_r \\) (the color valuations).\n  Then there exists a \\( (\\checkT \\rtimes \\langle \\Fr \\rangle) \\)-representation\n  \\( V_X^+ \\) satisfying:\n  \\begin{enumerate}\n    \\item The \\( \\checkT \\)-weights of \\( V_X^+ \\) lie in \\( \\mfc_X \\setminus \\{0\\} \\).\n    \\item The set of weights (without multiplicities) of \\( V_X^+ \\oplus (V_X^+)^* \\)\n          equals the weight set of a \\( \\checkG \\)-representation \\( \\rho_X \\).\n    \\item The weight space dimensions of \\( V_X^+ \\oplus (V_X^+)^* \\) are\n          \\( W \\)-invariant.\n    \\item Each color valuation \\( \\checknu_i \\) appears as a weight of \\( V_X^+ \\)\n          with multiplicity one.\n    \\item Under the Frobenius action,\n          \\( V_X^+ \\cong \\bigoplus_{\\mfB^+} \\overline{\\mathbb{Q}}_\\ell(\\tfrac{1}{2}) \\)\n          for a permutation action of \\( \\Fr \\) on the multiset \\( \\mfB^+ \\) of weights\n          compatible with its action on \\( \\checkT \\).\n  \\end{enumerate}\n  Moreover, denoting by \\( \\eta \\) the eigencharacter of a \\( G \\)-eigenmeasure on\n  \\( X^\\bullet(F) \\) and by \\( \\delta = |e^{2\\rho_G}| \\) the modular character of \\( B \\),\n  the pushforward of the IC function satisfies\n  \\[\n    (\\eta\\delta)^{1/2} \\cdot \\pi_! \\Phi_0\n    = \\Bigl(\\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(\\check{\\mathfrak{n}}(1))\\bigr)\n      \\Bigr)^{-1}\n      \\cdot \\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(V_X^+)\\bigr).\n  \\]", "uses": ["def:spherical-variety", "def:type-T-condition", "def:colors-monoid", "def:IC-function", "def:zastava-model", "thm:semismall", "thm:crystal", "def:central-fibers"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ICFormulaAffineClosure", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:semismall, thm:crystal, def:compactified-zastava}\n  The proof occupies §8 of the paper (the ``finite fields'' section).\n  The key ingredients are:\n  \\begin{enumerate}\n    \\item \\emph{Stratified semi-smallness} (\\cref{thm:semismall}): the proper map\n          \\( \\bar\\pi \\colon \\ol{\\sY}_X \\to \\sA \\) is stratified semi-small, so by the\n          decomposition theorem \\( \\bar\\pi_! \\IC_{\\ol{\\sY}} \\) is a direct sum of shifted\n          IC sheaves.\n    \\item \\emph{Crystal structure and dimension estimates} (\\cref{thm:crystal},\n          \\cref{thm:dimension-estimates}): the irreducible components of\n          \\( \\msf{Y}^{\\checklambda} \\) of critical dimension biject with the\n          \\( \\checklambda \\)-weight space basis of \\( V_X^+ \\), and their Frobenius-trace\n          contributions are \\( q^{1/2} \\).\n    \\item \\emph{Comparison of Zastava and compactified Zastava} (\\cref{def:compactified-zastava}):\n          the passage from \\( \\bar\\pi_!\\IC_{\\ol{\\sY}} \\) to \\( \\pi_!\\IC_{\\sY} \\)\n          introduces the numerator factor\n          \\( \\prod_{\\check\\alpha \\in \\check\\Phi^+}(1-q^{-1}e^{\\check\\alpha}) \\).\n  \\end{enumerate}\n  Under the sheaf-function dictionary, tracing Frobenius on stalks gives the stated\n  formula for \\( \\pi_!\\Phi_0 \\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 8, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 1257, "effort_local": 1257, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16437}, "thm:IC-general": {"id": "thm:IC-general", "type": "theorem", "title": "General IC function formula", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1, Theorem~1.2.}\n\n  In the general setting where \\( X^\\bullet = H \\backslash G \\) satisfies the type-T\n  condition but \\( \\mfc_{X^\\bullet} \\) may not be free, let\n  \\( \\{\\checktheta_1, \\ldots, \\checktheta_d\\} = \\mathcal{D}^G_{\\mathrm{sat}}(X) \\)\n  be the minimal set of antidominant generators of \\( \\mfc_X \\) not coming from colors.\n  For each \\( \\checktheta_i \\), let \\( V^{\\checktheta_i} \\) be the irreducible\n  \\( \\checkG \\)-module of lowest weight \\( \\checktheta_i \\).\n  Assume the eigencharacter \\( \\eta \\) of the \\( G \\)-eigenmeasure on \\( X(F) \\) is of the\n  form \\( |e^{\\mathfrak{h}}| \\) for some \\( W \\)-fixed algebraic character\n  \\( \\mathfrak{h} \\in \\Lambda^W \\).\n\n  Then the IC formula\n  \\( (\\eta\\delta)^{1/2} \\cdot \\pi_!\\Phi_0\n     = \\bigl(\\mathrm{tr}_{\\checkT}(\\Fr, \\Sym^\\bullet(\\check{\\mathfrak{n}}(1)))\\bigr)^{-1}\n       \\cdot \\mathrm{tr}_{\\checkT}(\\Fr, \\Sym^\\bullet(V_X^+)) \\)\n  holds with\n  \\[\n    V_X^+\n    = V_{X^\\bullet}^+\n      \\oplus \\bigoplus_{i=1}^d\n        V^{\\checktheta_i}\\!\\left(\n          \\frac{\\langle \\mathfrak{h} + 2\\rho_G,\\, \\checktheta_i \\rangle}{2}\n        \\right),\n  \\]\n  where \\( V_{X^\\bullet}^+ \\) is the representation from\n  \\cref{thm:IC-affine-closure} applied to the canonical affine closure\n  \\( \\ol{X^\\bullet}^{\\mathrm{aff}} \\).", "uses": ["thm:IC-affine-closure", "def:compactified-zastava", "def:colors-monoid", "def:spherical-variety"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.ICFormulaGeneral", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:IC-affine-closure, def:compactified-zastava, def:global-model}\n  The reduction from Theorem~B to Theorem~A proceeds via the Hecke algebra action on the\n  global model \\( \\sM_X \\) (§5 of the paper).\n  For each antidominant \\( \\checktheta_i \\in \\mfc_X^- \\), there is a Hecke correspondence\n  \\( \\sM_{X^{\\mathrm{can}}} \\times_{\\Bun_G} \\mathscr{H}^{\\checktheta_i}_{G,C} \\to \\sM_X \\)\n  that is birational onto its image (Theorem~5.4 of the paper).\n  The additional contributions \\( V^{\\checktheta_i}(\\cdots) \\) arise from the IC of these\n  Hecke strata, which by geometric Satake correspond to the \\( \\checkG \\)-module\n  \\( V^{\\checktheta_i} \\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 650, "effort_local": 650, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 17087}, "cor:asymptotics": {"id": "cor:asymptotics", "type": "corollary", "title": "Asymptotics of the IC function", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.2, Corollary~1.3.}\n\n  In the setting of \\cref{thm:IC-general}, let \\( e_\\emptyset^* \\) be the asymptotic map\n  \\( e_\\emptyset^* \\colon C^\\infty(X^\\bullet(F)) \\to C^\\infty(X_\\emptyset^\\bullet(F)) \\)\n  (where \\( X_\\emptyset \\) is the horospherical degeneration of \\( X \\) with\n  \\( X_\\emptyset^\\bullet \\cong N^- \\backslash G \\)).\n  For \\( a \\in T(F) \\):\n  \\[\n    (\\eta\\delta)^{1/2}(a)\\; e_\\emptyset^* \\Phi_0(N^- a G(\\mfo))\n    =\n    \\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(\\check{\\mathfrak{n}})\\bigr)^{-1}\n    \\cdot \\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(V_X^+)\\bigr).\n  \\]\n  Restricting to \\( a = t^{\\checklambda} \\) with\n  \\( \\checklambda \\in \\checkLambda^{-,\\Fr} \\) (antidominant, Frobenius-fixed):\n  \\[\n    (\\eta\\delta)^{1/2}(a)\\; \\Phi_0(x_0 a G(\\mfo))\n    =\n    \\Bigl.\\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(\\check{\\mathfrak{n}})\\bigr)^{-1}\n    \\cdot \\mathrm{tr}_{\\checkT}\\!\\bigl(\\Fr,\\, \\Sym^\\bullet(V_X^+)\\bigr)\n    \\Bigr|_{\\checkLambda^{-,\\Fr}}.\n  \\]\n  The Plancherel density of \\( \\Phi_0 \\) is\n  \\[\n    \\|\\Phi_0\\|^2\n    = \\int_{\\hat{T}/W}\n        L\\!\\left(\\chi,\\, V_X,\\, \\tfrac{1}{2}\\right)\n        \\frac{d\\chi}{L(\\chi,\\, \\checkfg/\\check{\\mathfrak{t}},\\, 0)},\n  \\]\n  where the denominator is the unramified Plancherel measure for \\( G \\).", "uses": ["thm:IC-general", "thm:nearby-asymptotics"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.AsymptoticsICFunction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:IC-general, thm:nearby-asymptotics}\n  By \\cref{thm:IC-general}, \\( (\\eta\\delta)^{1/2} \\cdot \\pi_!\\Phi_0 \\) is expressed as a ratio\n  of symmetric algebra traces. The Radon transform \\( \\pi_{\\emptyset!} \\) on\n  \\( X_\\emptyset^\\bullet \\) is well understood: the indicator function\n  \\( 1_{X_\\emptyset^\\bullet(\\mfo)} \\) maps under \\( \\pi_{\\emptyset!} \\) to\n  \\( \\delta^{-1/2} \\mathrm{tr}_{\\checkT}(\\Fr, \\Sym^\\bullet(\\check{\\mathfrak{n}}))\n  \\cdot \\mathrm{tr}_{\\checkT}(\\Fr, \\Sym^\\bullet(\\check{\\mathfrak{n}}(1)))^{-1} \\),\n  and \\( \\pi_{\\emptyset!} \\) is \\( T(F) \\)-equivariant.\n  Combined with the commutative triangle\n  \\( \\pi_! = \\pi_{\\emptyset!} \\circ e_\\emptyset^* \\) from \\cref{thm:nearby-asymptotics},\n  this yields the formula for \\( e_\\emptyset^*\\Phi_0 \\).\n  The formula for \\( \\Phi_0 \\) on \\( X^\\bullet(F)/G(\\mfo) \\) then follows by\n  restricting the asymptotics to \\( \\checkLambda^{-,\\Fr} \\), using the fact\n  (Sakellaridis, \\textit{Satake isomorphism}, Cor.~5.5) that any \\( G(\\mfo) \\)-invariant\n  function on \\( X^\\bullet(F) \\) equals its asymptotic restricted to antidominant orbits.\n  The Plancherel density formula follows by Mellin transform on \\( X_\\emptyset^\\bullet \\)\n  with respect to the \\( T \\)-action.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1231, "effort_local": 1231, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 19652}, "thm:nearby-asymptotics": {"id": "thm:nearby-asymptotics", "type": "theorem", "title": "Nearby cycles commute with Radon transform", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.2, Theorem~1.5.}\n\n  Let \\( X \\) be an affine spherical variety such that \\( B \\) acts freely on \\( X^\\circ \\)\n  (the first part of the type-T condition).\n  Let \\( \\sY_\\emptyset \\) be the Zastava model for the horospherical degeneration\n  \\( X_\\emptyset \\).\n  Then the triangle of derived category functors\n  \\[\n    \\begin{array}{ccc}\n      \\mathrm{D}^b_c(\\sY) & \\xrightarrow{\\Psi} & \\mathrm{D}^b_c(\\sY_\\emptyset) \\\\\n      & \\searrow_{\\pi_!} & \\downarrow_{\\pi_{\\emptyset!}} \\\\\n      & & \\mathrm{D}^b_c(\\sA)\n    \\end{array}\n  \\]\n  commutes up to natural isomorphism:\n  \\( \\pi_{\\emptyset!} \\circ \\Psi \\cong \\pi_! \\).\n  Here \\( \\Psi \\) is the nearby cycles functor associated to the Rees family\n  \\( \\mathfrak{X} \\to \\mathbb{A}^1 \\) (with general fiber \\( X \\), special fiber\n  \\( X_\\emptyset \\)) constructed via a strictly dominant cocharacter into \\( T \\).", "uses": ["def:zastava-model", "def:global-model", "def:spherical-variety", "def:type-T-condition"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.NearbyAsymptotics", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:zastava-model, def:global-model}\n  The proof uses a contraction principle for the nearby cycles functor on the Zastava model.\n  The Rees family \\( \\mathfrak{X} \\to \\mathbb{A}^1 \\) induces a family\n  \\( \\sY \\to \\sA \\times \\mathbb{A}^1 \\) of Zastava models; the nearby cycles functor at\n  \\( 0 \\in \\mathbb{A}^1 \\) sends \\( \\IC_{\\sY} \\) to an appropriate sheaf on\n  \\( \\sY_\\emptyset \\), and commutativity with \\( \\pi_! \\) follows from the\n  base-change theorem (§8 of the paper, see also Theorem~8.6).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 508, "effort_local": 508, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6306}, "thm:semismall": {"id": "thm:semismall", "type": "theorem", "title": "Semi-smallness of compactified Zastava", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.3, Theorem~1.4.}\n\n  The proper map \\( \\bar\\pi \\colon \\ol{\\sY}_X \\to \\sA \\) is \\emph{stratified semi-small}\n  with respect to the natural stratification of \\( \\sA \\) by strata\n  \\( \\mathring{C}^{\\mathfrak{P}} \\hookrightarrow \\sA \\)\n  indexed by \\( \\mfc_X \\)-valued divisor types \\( \\mathfrak{P} \\)\n  (formal \\( \\mathbb{N} \\)-linear combinations of primitive elements of \\( \\mfc_X \\)).\n\n  That is, for each stratum \\( \\mathring{C}^{\\mathfrak{P}} \\) of codimension \\( d \\) in\n  \\( \\sA \\), the fiber of \\( \\bar\\pi \\) over a geometric point of\n  \\( \\mathring{C}^{\\mathfrak{P}} \\) has dimension at most \\( d/2 \\).", "uses": ["def:compactified-zastava", "thm:dimension-estimates", "def:colors-monoid", "def:central-fibers"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.SemiSmallness", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:dimension-estimates, def:central-fibers, def:compactified-zastava}\n  The proof combines two ingredients:\n  \\begin{enumerate}\n    \\item \\emph{Dimension estimates on central fibers} (\\cref{thm:dimension-estimates}):\n          for \\( X = X^{\\mathrm{can}} \\), every irreducible component of\n          \\( \\msf{Y}^{\\checklambda} \\) has dimension at most\n          \\( \\tfrac{1}{2}(\\len(\\checklambda)-1) \\).\n    \\item \\emph{Factorization property of \\( \\sY_X \\)} (§3 and §6 of the paper):\n          central fibers over composite strata factor as products of central fibers\n          over primitive strata, reducing the semi-smallness check to the single-point\n          case \\( \\mathfrak{P} = [\\checklambda] \\).\n  \\end{enumerate}\n  Together, these imply that fibers of \\( \\bar\\pi \\) over the stratum\n  \\( \\mathring{C}^{[\\checklambda]} \\) have dimension at most \\( \\frac{1}{2}(\\len(\\checklambda)-1) \\),\n  which equals half the codimension of that stratum, confirming semi-smallness.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 983, "effort_local": 983, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10551}, "thm:dimension-estimates": {"id": "thm:dimension-estimates", "type": "theorem", "title": "Dimension estimates (slicing theorem)", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.4, Theorem~1.8.}\n\n  Let \\( X = X^{\\mathrm{can}} \\) be as in \\cref{thm:IC-affine-closure}.\n  Let \\( \\msf{b} \\) be an irreducible component of the central fiber\n  \\( \\msf{Y}^{\\checklambda} \\).  Then:\n  \\begin{enumerate}\n    \\item \\( \\dim \\msf{b} \\le \\tfrac{1}{2}(\\len(\\checklambda) - 1) \\).\n    \\item For a color basis element \\( \\checknu_i \\in \\mfc_X \\),\n          \\( \\msf{Y}^{\\checknu_i} = \\mathrm{pt} \\).\n    \\item Equality \\( \\dim \\msf{b} = \\tfrac{1}{2}(\\len(\\checklambda)-1) \\) holds\n          if and only if there exists a sequence of simple roots\n          \\( \\alpha_1, \\ldots, \\alpha_d \\) (with repetitions) such that\n          \\( \\ol{\\msf{b}} \\cap \\msf{S}^{\\checklambda - \\check{\\alpha}_1 - \\cdots - \\check{\\alpha}_j} \\)\n          has dimension \\( \\dim \\msf{b} - j \\) for each \\( j \\), and\n          \\( \\checklambda - \\sum_{i=1}^d \\check{\\alpha}_i = \\checknu \\) for some color \\( \\checknu \\).\n  \\end{enumerate}", "uses": ["def:central-fibers", "def:MV-cycles", "def:colors-monoid"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.DimensionEstimates", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:MV-cycles, def:central-fibers}\n  The proof uses the Mirković--Vilonen boundary hyperplane argument from §3 of [MV]:\n  the boundary \\( \\ol{\\msf{S}}^{\\checklambda} \\setminus \\msf{S}^{\\checklambda}\n  = \\bigcup_{\\check{\\nu} < \\checklambda} \\msf{S}^{\\check{\\nu}} \\)\n  is a hyperplane section of a projective embedding of \\( \\Gr_G \\).\n  Hence any closed subscheme meeting \\( \\ol{\\msf{S}}^{\\checklambda} \\) also meets\n  its boundary in codimension one (unless already contained in the boundary).\n  Inductively cutting by these boundary hyperplanes reduces \\( \\checklambda \\) to a\n  color generator \\( \\checknu_i \\), at each step lowering the dimension bound by one,\n  yielding part~(1).\n  Part~(2) follows from the identification of \\( \\msf{Y}^{\\checknu_i} \\) with a fiber over a\n  point on the diagonal stratum \\( C \\hookrightarrow \\sA \\) (§5 of the paper).\n  Part~(3) characterizes the equality case by tracking the cutting sequence.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 938, "effort_local": 938, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9568}, "thm:crystal": {"id": "thm:crystal", "type": "theorem", "title": "Crystal structure on \\( \\mfB_{X^\\bullet} \\)", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1 and §7, Theorem~1.6.}\n\n  Let \\( X = \\ol{X^\\bullet}^{\\mathrm{aff}} \\) satisfy the conditions of\n  \\cref{thm:IC-affine-closure}.\n  Let \\( \\mfB_{X^\\bullet} = \\mfB_{X^\\bullet}^+ \\sqcup \\mfB_{X^\\bullet}^- \\), where\n  \\( \\mfB_{X^\\bullet}^+ \\) is the set of irreducible components of central fibers of\n  critical dimension, and \\( \\mfB_{X^\\bullet}^- \\) is a formal copy with negated weights.\n  Then \\( \\mfB_{X^\\bullet} \\) carries the structure of a \\emph{semi-normal, self-dual\n  Kashiwara crystal} over \\( \\checkfg \\) such that:\n  \\begin{enumerate}\n    \\item Weights lie in \\( \\mfc_X \\cup (-\\mfc_X) \\).\n    \\item The weight space dimensions are \\( W \\)-invariant.\n    \\item The color valuations \\( \\checknu_i \\) appear as weights of \\( \\mfB_{X^\\bullet}^+ \\)\n          with multiplicity one each.\n  \\end{enumerate}", "uses": ["def:central-fibers", "thm:dimension-estimates", "def:colors-monoid", "def:type-T-condition", "def:kashiwara-crystal"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.CrystalStructure", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:central-fibers, thm:dimension-estimates, def:MV-cycles}\n  For each simple root \\( \\alpha \\), the crystal operators \\( \\tilde{e}_\\alpha \\) and\n  \\( \\tilde{f}_\\alpha \\) are constructed by factoring\n  \\( X \\to X \\GIT N \\) through \\( X \\to X \\GIT N_{P_\\alpha} \\to X \\GIT N \\)\n  (where \\( P_\\alpha \\) is the minimal parabolic for \\( \\alpha \\)),\n  and analyzing the map\n  \\( \\mfB_{X^\\bullet}^+ \\to \\) \\{irred.\\ comps of \\( \\msf{Y}_{X_\\alpha} \\) of relevant dim.\\}.\n  Two cases arise:\n  \\begin{enumerate}\n    \\item Components mapping to \\( \\msf{Y}_{X_\\alpha^\\bullet} \\) of critical dimension\n          (the ``induction'' case, reduced to the crystal of a torus torsor over\n          \\( \\mathbb{G}_m \\backslash \\mathrm{PGL}_2 \\)).\n    \\item Components mapping to the complement, which are shown to be birationally\n          equivalent to Mirković--Vilonen cycles\n          (\\cref{def:MV-cycles}), whose crystal structure is known from [BGcrys].\n  \\end{enumerate}\n  Self-duality is formal (negating weights swaps \\( \\mfB^+ \\) and \\( \\mfB^- \\)).\n  Semi-normality (\\cref{def:kashiwara-crystal}) follows from the construction of each\n  individual \\( \\mathfrak{sl}_2 \\)-component.\n  The \\( W \\)-invariance follows from \\cref{thm:dimension-estimates} part~(3).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 5, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 1256, "effort_local": 1256, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 13115}, "def:kashiwara-crystal": {"id": "def:kashiwara-crystal", "type": "definition", "title": "Kashiwara crystal", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §7.1, citing Kashiwara (1993).}\n\n  Let \\( I \\) be the set of vertices of the Dynkin diagram of \\( G \\), so\n  \\( \\{\\alpha_i\\}_{i \\in I} = \\Delta_G \\).\n  A \\emph{Kashiwara crystal} over \\( \\checkfg \\) is a set \\( B \\) equipped with:\n  \\begin{itemize}\n    \\item a weight map \\( \\mathrm{wt} \\colon B \\to \\checkLambda_G \\);\n    \\item functions\n          \\( \\varepsilon_i, \\varphi_i \\colon B \\to \\mathbb{Z} \\cup \\{-\\infty\\} \\)\n          for each \\( i \\in I \\);\n    \\item raising and lowering operators\n          \\( \\tilde{e}_i, \\tilde{f}_i \\colon B \\to B \\cup \\{0\\} \\)\n          for each \\( i \\in I \\);\n  \\end{itemize}\n  satisfying the following axioms for all \\( \\mathsf{b} \\in B \\) and \\( i \\in I \\):\n  \\begin{enumerate}\n    \\item \\( \\varphi_i(\\mathsf{b})\n             = \\varepsilon_i(\\mathsf{b}) + \\langle \\alpha_i, \\mathrm{wt}(\\mathsf{b})\\rangle \\).\n    \\item If \\( \\tilde{e}_i \\mathsf{b} \\ne 0 \\):\n          \\( \\mathrm{wt}(\\tilde{e}_i \\mathsf{b}) = \\mathrm{wt}(\\mathsf{b}) + \\check{\\alpha}_i \\),\n          \\( \\varepsilon_i(\\tilde{e}_i \\mathsf{b}) = \\varepsilon_i(\\mathsf{b}) - 1 \\),\n          \\( \\varphi_i(\\tilde{e}_i \\mathsf{b}) = \\varphi_i(\\mathsf{b}) + 1 \\).\n    \\item If \\( \\tilde{f}_i \\mathsf{b} \\ne 0 \\):\n          \\( \\mathrm{wt}(\\tilde{f}_i \\mathsf{b}) = \\mathrm{wt}(\\mathsf{b}) - \\check{\\alpha}_i \\),\n          \\( \\varepsilon_i(\\tilde{f}_i \\mathsf{b}) = \\varepsilon_i(\\mathsf{b}) + 1 \\),\n          \\( \\varphi_i(\\tilde{f}_i \\mathsf{b}) = \\varphi_i(\\mathsf{b}) - 1 \\).\n    \\item \\( \\mathsf{b}_2 = \\tilde{f}_i \\mathsf{b}_1 \\) if and only if\n          \\( \\mathsf{b}_1 = \\tilde{e}_i \\mathsf{b}_2 \\).\n    \\item If \\( \\varphi_i(\\mathsf{b}) = -\\infty \\) then\n          \\( \\tilde{e}_i \\mathsf{b} = \\tilde{f}_i \\mathsf{b} = 0 \\).\n  \\end{enumerate}\n  The crystal is called \\emph{semi-normal} if\n  \\( \\varepsilon_i(\\mathsf{b}) = \\max\\{n \\ge 0 \\mid \\tilde{e}_i^n \\mathsf{b} \\in B\\} \\)\n  and\n  \\( \\varphi_i(\\mathsf{b}) = \\max\\{n \\ge 0 \\mid \\tilde{f}_i^n \\mathsf{b} \\in B\\} \\)\n  for all \\( \\mathsf{b} \\in B \\) and \\( i \\in I \\).\n  It is \\emph{self-dual} if it is equipped with an involution\n  \\( * \\colon B \\to B \\) satisfying\n  \\( \\mathrm{wt}(\\mathsf{b}^*) = -\\mathrm{wt}(\\mathsf{b}) \\) and\n  swapping the roles of \\( \\tilde{e}_i \\) and \\( \\tilde{f}_i \\).", "uses": ["def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.KashiwaraCrystal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": null, "effort_local": 2291, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3568}, "def:representation-crystal": {"id": "def:representation-crystal", "type": "definition", "title": "Crystal of a \\( \\checkG \\)-representation", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §7.1 and §1.1, Conjecture~1.7.}\n\n  For a finite-dimensional \\( \\checkG \\)-module \\( V \\), its \\emph{crystal basis}\n  \\( B(V) \\) is the unique normal crystal isomorphic to the limit at \\( q = 0 \\) of\n  Kashiwara--Lusztig's canonical basis of the corresponding integrable\n  \\( U_q(\\checkfg) \\)-module.\n\n  \\textbf{Conjecture~1.7 (Sakellaridis--Wang).}\n  The crystal \\( \\mfB_{X^\\bullet} \\) of \\cref{thm:crystal} is isomorphic (as a crystal)\n  to the crystal basis \\( B(\\rho_X) \\) of a finite-dimensional \\( \\checkG \\)-module\n  \\( \\rho_X \\), whose irreducible components have highest weights in\n  \\( \\checkLambda^+ \\cap W\\{\\checknu_1, \\ldots, \\checknu_r\\} \\).\n  If Conjecture~1.7 holds, it implies the main conjecture of the paper\n  (the IC function formula with a symplectic \\( \\checkG \\)-representation \\( \\rho_X \\)).", "uses": ["def:kashiwara-crystal", "def:reductive-group-data"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.RepresentationCrystal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 857, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4425}, "def:MV-cycles": {"id": "def:MV-cycles", "type": "definition", "title": "Semi-infinite orbits and MV cycles", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.4.}\n\n  For \\( \\checklambda \\in \\checkLambda \\), the \\emph{semi-infinite orbit} is\n  \\[\n    \\msf{S}^{\\checklambda}(k)\n    = N(F)\\, t^{\\checklambda}\\, G(\\mfo) / G(\\mfo)\n    \\;\\subset\\; \\Gr_G,\n  \\]\n  where \\( \\Gr_G = G(F)/G(\\mfo) \\) is the affine Grassmannian.\n  For \\( \\checktheta \\in \\checkLambda \\) antidominant,\n  the \\emph{Mirković--Vilonen (MV) cycles} of type \\( (\\checklambda, \\checktheta) \\) are the\n  irreducible components of\n  \\( \\msf{S}^{\\checklambda} \\cap \\ol{\\Gr}_G^{\\checktheta} \\)\n  (the intersection of the semi-infinite orbit with the closure of the\n  \\( \\Lplus G \\)-orbit corresponding to \\( \\checktheta \\)).\n  By the geometric Satake equivalence, these are in bijection with the canonical basis of\n  the \\( \\checklambda \\)-weight space of the irreducible \\( \\checkG \\)-module of lowest\n  weight \\( \\checktheta \\).", "uses": ["def:reductive-group-data", "def:arc-space"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.MVCycles", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": null, "effort_local": 877, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3625}, "cor:minuscule": {"id": "cor:minuscule", "type": "corollary", "title": "Minuscule case of the crystal conjecture", "chapter": "Overview", "statement": "\\textit{Source: Sakellaridis--Wang (2020), §1.1.}\n\n  In the setting of \\cref{thm:IC-affine-closure}, when the representation \\( \\rho_X \\)\n  predicted by \\cref{def:representation-crystal} is \\emph{minuscule}\n  (i.e.\\ all weights of \\( \\rho_X \\) are Weyl-conjugate), Conjecture~1.7 holds:\n  \\( \\mfB_{X^\\bullet} \\cong B(\\rho_X) \\), and hence the IC formula of\n  \\cref{thm:IC-affine-closure} holds with \\( \\rho_X \\) a minuscule symplectic\n  \\( \\checkG \\)-representation.\n\n  In particular, when \\( H \\) is reductive (so \\( H \\backslash G \\) is affine),\n  \\( \\rho_X \\) is always minuscule.", "uses": ["thm:crystal", "def:representation-crystal", "thm:IC-affine-closure", "def:colors-monoid"], "lean_name": "MR4433079IntersectionComplexesAndUnramifiedLFactors.MinusculeCase", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:crystal, def:representation-crystal, thm:IC-affine-closure, def:colors-monoid}\n  By \\cref{thm:crystal}, \\( \\mfB_{X^\\bullet} \\) is a semi-normal self-dual crystal with the\n  required weight properties. When all highest weights of \\( \\rho_X \\) are minuscule,\n  the crystal axioms — together with the \\( \\mathfrak{sl}_2 \\) actions and weight multiplicities\n  established in \\cref{thm:crystal} — uniquely determine the crystal structure: a minuscule\n  crystal is completely determined by its weight multiplicities, which by \\cref{thm:crystal}\n  match those of \\( B(\\rho_X) \\). (One reduces to the free monoid case\n  \\( \\mathfrak{c}_{X^\\bullet} \\cong \\mathbb{N}^{\\mathcal{D}} \\) as allowed by the Zastava\n  model fiber comparison.) Hence \\( \\mfB_{X^\\bullet} \\cong B(\\rho_X) \\), confirming\n  Conjecture~1.7 in this case, and \\cref{thm:IC-affine-closure} applies.\n  The statement that \\( H \\) reductive implies \\( \\rho_X \\) minuscule is shown in the paper by\n  direct analysis of the color valuations for reductive \\( H \\): the weights\n  \\( \\check\\Lambda^+ \\cap W\\{\\check\\nu_1,\\ldots,\\check\\nu_r\\} \\) are all minuscule in\n  that case.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Overview.tex", "lean_file": "", "dep_count": 4, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 1137, "effort_local": 1137, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 18431}};
const katexMacros = {"\\C": "\\mathbb{C}", "\\PP": "\\mathbb{P}", "\\K": "\\mathrm{K}", "\\Sym": "\\mathrm{Sym}", "\\Pic": "\\mathrm{Pic}", "\\Gr": "\\mathrm{Gr}", "\\cO": "\\mathcal{O}", "\\cM": "\\mathcal{M}", "\\cS": "\\mathcal{S}", "\\cG": "\\mathcal{G}", "\\cZ": "\\mathcal{Z}", "\\cY": "\\mathcal{Y}", "\\cA": "\\mathcal{A}", "\\cD": "\\mathcal{D}", "\\cB": "\\mathcal{B}", "\\sY": "\\mathscr{Y}", "\\sM": "\\mathscr{M}", "\\sA": "\\mathscr{A}", "\\checkLambda": "\\check{\\Lambda}", "\\checkG": "\\check{G}", "\\checkT": "\\check{T}", "\\checkfg": "\\check{\\mathfrak{g}}", "\\checknu": "\\check{\\nu}", "\\checklambda": "\\check{\\lambda}", "\\checktheta": "\\check{\\theta}", "\\mfc": "\\mathfrak{c}", "\\mfB": "\\mathfrak{B}", "\\IC": "\\mathrm{IC}", "\\Bun": "\\mathrm{Bun}", "\\LocSys": "\\mathrm{LocSys}", "\\Maps": "\\mathrm{Maps}", "\\Fr": "\\mathrm{Fr}", "\\mfo": "\\mathfrak{o}", "\\GIT": "\\!\\sslash\\!", "\\sslash": "/\\!\\!/", "\\ol": "\\overline", "\\Prim": "\\mathrm{Prim}", "\\len": "\\mathrm{len}", "\\msf": "\\mathsf{#1}", "\\Lplus": "\\mathsf{L}^+"};   // blueprint-defined \newcommand etc.

const $ = id => document.getElementById(id);

// ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};
for (const id in allNodes) { succ[id] = []; pred[id] = []; deg[id] = 0; }
for (const e of graphData.edges) {
  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;
}
const isOrphan = id => !(deg[id] > 0);

// weakly-connected components via union-find (orphans excluded)
const parent = {};
function find(x) { while (parent[x] !== x) x = parent[x] = parent[parent[x]]; return x; }
for (const id in allNodes) parent[id] = id;
for (const e of graphData.edges)
  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

const compMembers = {};
for (const id in allNodes) {
  if (isOrphan(id)) continue;
  const r = find(id);
  (compMembers[r] = compMembers[r] || []).push(id);
}
const components = Object.values(compMembers).sort((a, b) => b.length - a.length);
const compOf = {};
components.forEach((m, i) => m.forEach(id => compOf[id] = i));

// Isolated nodes are kept out of the force simulation (they'd only drift under
// repulsion); layoutOrphans() grid-places them after each settle instead.
for (const vn of graphData.nodes) if (isOrphan(vn.id)) vn.physics = false;

// Surface the isolated-node count right on the toggle, so it's obvious how many
// there are (and that they exist) without having to switch the view on.
const _isoCount = Object.keys(allNodes).filter(isOrphan).length;
$("iso-count").textContent = `(${_isoCount})`;
if (!_isoCount) $("orphans").disabled = true;

// ── Project-stats overlay ────────────────────────────────────────────────────

// A node needs no more work if it's leanok, in mathlib, or already has a Lean
// proof (effort 0).
const isDone = n => n.proved || n.mathlib_ok || n.effort_local === 0;

function renderStats() {
  const vals = Object.values(allNodes);
  const bp   = vals.filter(n => n.type !== "lean_aux");
  const proved  = bp.filter(n => n.proved).length;
  const mathlib = bp.filter(n => n.mathlib_ok).length;
  const sorry  = vals.filter(n => n.has_sorry).length;
  const doneIds = new Set(vals.filter(isDone).map(n => n.id));
  const ready = bp.filter(n => !isDone(n) &&
                  n.uses.every(d => !(d in allNodes) || doneIds.has(d))).length;
  const gaps   = bp.filter(n => !n.lean_name && !n.mathlib_ok).length;
  const leanok = bp.filter(n => !n.proved && !n.mathlib_ok && n.effort_local === 0).length;
  const isolated   = vals.filter(n => isOrphan(n.id)).length;
  const isolatedBp = bp.filter(n => isOrphan(n.id)).length;

  let done = 0, remLower = 0, infNodes = 0;
  for (const n of vals) {
    if (n.proof_size_lean != null) done += n.proof_size_lean;
    if (n.effort_local == null) infNodes++; else remLower += n.effort_local;
  }
  const pct = bp.length ? Math.round(100 * proved / bp.length) : 0;
  const fmt = v => v.toLocaleString();

  $("stats-panel").innerHTML = `
    <h4>Project</h4>
    <div class="row"><span>Proved (leanok)</span><span class="v done">${proved}/${bp.length} · ${pct}%</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    ${mathlib ? `<div class="row"><span>Mathlib-backed</span><span class="v done">${mathlib}</span></div>` : ''}
    <div class="row"><span>With sorry</span><span class="v ${sorry ? 'inf' : ''}">${sorry}</span></div>
    <div class="row"><span>Ready to formalize</span><span class="v">${ready}</span></div>
    <div class="row"><span>Needs \\lean{}</span><span class="v">${gaps}</span></div>
    <div class="row"><span>Needs \\leanok</span><span class="v">${leanok}</span></div>
    <div class="row" title="Declarations with no \\uses{} in or out — never linked into the graph"><span>Isolated</span><span class="v ${isolated ? 'inf' : ''}">${isolated}${isolatedBp !== isolated ? ` (${isolatedBp} bp)` : ''}</span></div>
    <div class="sep"></div>
    <h4>Effort (chars)</h4>
    <div class="row"><span>Done</span><span class="v done">${fmt(done)}</span></div>
    <div class="row"><span>Remaining ≥</span><span class="v work">${fmt(remLower)}</span></div>
    <div class="row"><span>∞ nodes</span><span class="v inf">${infNodes}</span></div>
  `;
}
renderStats();

// a human label for each component: its highest-degree member
function compRepr(members) {
  let best = members[0];
  for (const id of members) if ((deg[id] || 0) > (deg[best] || 0)) best = id;
  return best.split(":").pop();
}

const chapters = [...new Set(
  Object.values(allNodes).map(n => n.chapter).filter(Boolean)
)].sort();

// ── Populate controls ───────────────────────────────────────────────────────

$("node-ids").innerHTML =
  Object.keys(allNodes).sort().map(id => `<option value="${id}">`).join("");

$("component").insertAdjacentHTML("beforeend",
  components.map((m, i) =>
    `<option value="${i}">#${i + 1} · ${m.length} nodes · ${compRepr(m)}</option>`
  ).join(""));

$("chapter").insertAdjacentHTML("beforeend",
  chapters.map(c => `<option value="${c.replace(/"/g, "&quot;")}">${c}</option>`).join(""));

// ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,
                nodeset: "union", fileview: "off" };

// Which universe a node belongs to. A node "has Lean" if it carries Lean source
// (lean_aux nodes always do; blueprint nodes do once their \lean{} resolved).
const hasLean    = n => n.type === "lean_aux" || !!(n.lean_source && n.lean_source.length);
const inBlueprint = n => n.type !== "lean_aux";
function inNodeset(id) {
  const n = allNodes[id];
  if (state.nodeset === "blueprint") return inBlueprint(n);
  if (state.nodeset === "lean")      return hasLean(n);
  return true;                                   // union
}

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

// all transitive predecessors of id (its full upstream dependency set)
function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

function visibleSet() {
  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));
  }
  let ids = Object.keys(allNodes).filter(inNodeset);
  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

// ── Network ─────────────────────────────────────────────────────────────────

const nodesDS = new vis.DataSet();
const edgesDS = new vis.DataSet();

// Force-directed layout: connected nodes attract, so each declaration settles
// next to what it depends on. Direction is conveyed by the arrows, not columns.
const N_TOTAL = graphData.nodes.length;
const PHYSICS_OPTS = {
  enabled: true,
  solver: "forceAtlas2Based",
  forceAtlas2Based: {
    gravitationalConstant: -45, centralGravity: 0.012,
    springLength: 85, springConstant: 0.08,
    damping: 0.45, avoidOverlap: 0.7,
  },
  stabilization: { enabled: true, iterations: 300, updateInterval: 25, fit: false },
  minVelocity: 0.75, maxVelocity: 30,
};

const network = new vis.Network(
  $("graph"),
  { nodes: nodesDS, edges: edgesDS },
  {
    // physics does the placement; improvedLayout seeds it (skip on huge graphs)
    layout: { improvedLayout: N_TOTAL <= 250 },
    physics: { enabled: false },   // enabled per-apply, then frozen once settled
    edges: {
      smooth: { enabled: false },
      color: { color: "#cbd5e1", highlight: "#64748b" },
      arrows: { to: { scaleFactor: .55 } },
      width: 1,
    },
    nodes: { shape: "dot" },
    interaction: { hover: true, tooltipDelay: 150, zoomView: false },
  }
);

// Once a settle finishes, freeze the simulation (so the view is stable and
// draggable) and frame the result.
network.on("stabilizationIterationsDone", () => {
  network.setOptions({ physics: false });
  layoutOrphans();
  fitFloored();
});

// ── Isolated-node layout ──────────────────────────────────────────────────────
// Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

const fileOf = (n, mode) => mode === "lean" ? (n.lean_file || "") : (n.tex_file || "");

// A curated, perceptually-distinct palette (d3 category20-style). A file's
// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],
  [174,199,232],[255,187,120],[152,223,138],[255,152,150],[197,176,213],
  [196,156,148],[247,182,210],[252,146,114],[219,219,141],[158,218,229],
];
function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
const _SLOTS = FILE_PALETTE.length * 3;          // 20 hues × 3 lightness tiers
function slotColor(slot) {
  const base = FILE_PALETTE[slot % FILE_PALETTE.length];
  const tier = Math.floor(slot / FILE_PALETTE.length) % 3;   // 0 normal · 1 dark · 2 light
  return tier === 1 ? base.map(v => Math.round(v * 0.68))
       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))
       : base.slice();
}
// Per-mode slot assignment: each file's preferred slot is its name-hash; exact
// collisions within the same mode are bumped to the next free slot. So every
// file in a mode gets a distinct colour (up to _SLOTS files), the colour is
// driven by the name, and it never shifts under focus/reset/filtering (the file
// set is fixed for the session, and the map is cached).
const _fileSlots = {};
function ensureFileSlots(mode) {
  if (_fileSlots[mode]) return _fileSlots[mode];
  const files = Object.keys(fileCounts(mode)).sort();
  const used = new Set(), map = {};
  for (const f of files) {
    let slot = hashStr(f) % _SLOTS, t = 0;
    while (used.has(slot) && t < _SLOTS) { slot = (slot + 1) % _SLOTS; t++; }
    used.add(slot); map[f] = slot;
  }
  return (_fileSlots[mode] = map);
}
function colorRGB(file) {
  const map = ensureFileSlots(state.fileview);
  const slot = (file in map) ? map[file] : hashStr(file) % _SLOTS;
  return slotColor(slot);
}

function fileCounts(mode) {
  const counts = {};
  for (const id in allNodes) {
    const f = fileOf(allNodes[id], mode);
    if (f) counts[f] = (counts[f] || 0) + 1;
  }
  return counts;
}

let fileBg = null;            // {canvas, minX, minY, w, h, W, H} in graph coords

function rebuildFileBg(quick) {
  const mode = state.fileview;
  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
