<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

  <select id="chapter"><option value="">All chapters</option></select>

  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">

  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:higher_direct_image": {"id": "def:higher_direct_image", "type": "definition", "title": "", "chapter": "Higher direct images $R^i f_*$ of quasi-coherent sheaves ($i \\geq 1$)", "statement": "ok\n[Higher direct image]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Cohomology of Schemes, \\S\\,Quasi-coherence of\n  higher direct images (and the underlying Cohomology chapter).}\n  Let \\(f : X \\to S\\) be a morphism of schemes and let \\(\\mathcal{F}\\) be a\n  quasi-coherent \\(\\mathcal{O}_X\\)-module. For \\(i \\geq 0\\) the \\emph{\\(i\\)-th\n  higher direct image} \\(R^i f_*\\mathcal{F}\\) is the \\(i\\)-th right derived functor\n  of the pushforward functor \\(f_*\\) applied to \\(\\mathcal{F}\\). Concretely,\n  \\(R^i f_*\\mathcal{F}\\) is the \\(\\mathcal{O}_S\\)-module obtained as the\n  sheafification of the presheaf\n  \\[\n    V \\;\\longmapsto\\; H^i\\bigl(f^{-1}(V),\\, \\mathcal{F}|_{f^{-1}(V)}\\bigr),\n    \\qquad V \\subset S \\text{ open},\n  \\]\n  where \\(H^i(-, -)\\) denotes sheaf cohomology. For \\(i = 0\\) this recovers the\n  ordinary pushforward \\(R^0 f_*\\mathcal{F} = f_*\\mathcal{F}\\).", "uses": [], "lean_name": "AlgebraicGeometry.higherDirectImage", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def higherDirectImage [HasInjectiveResolutions X.Modules]\n    (f : X ⟶ S) (i : ℕ) (F : X.Modules) : S.Modules :=\n  ((pushforward f).rightDerived i).obj F", "proof_size_lean": 167, "has_sorry": false, "tex_file": "chapters/Cohomology_HigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/HigherDirectImage.lean", "dep_count": 0, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 167, "effort_total": 0}, "lem:right_derived_injective_resolution": {"id": "lem:right_derived_injective_resolution", "type": "lemma", "title": "Right-derived functor via an injective resolution", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  Let \\(\\mathcal{A}\\) be an abelian category with enough injectives,\n  \\(\\mathcal{B}\\) abelian, and \\(G : \\mathcal{A} \\to \\mathcal{B}\\) additive. For an\n  object \\(X\\) of \\(\\mathcal{A}\\), a choice of injective resolution\n  \\(I\\) of \\(X\\) (an exact complex \\(0 \\to X \\to I^0 \\to I^1 \\to \\cdots\\) with each\n  \\(I^n\\) injective), and every \\(n \\in \\mathbb{N}\\), there is a canonical\n  isomorphism in \\(\\mathcal{B}\\)\n  \\[\n    (R^n G)(X)\n      \\;\\cong\\;\n      H^n\\bigl(G(I^\\bullet)\\bigr),\n  \\]\n  where \\(G(I^\\bullet)\\) is the cochain complex obtained by applying \\(G\\)\n  degreewise to the resolution complex \\(I^\\bullet\\) and \\(H^n\\) is its \\(n\\)-th\n  cohomology object. This is the defining computation of the right-derived functor\n  and the seed from which the acyclic-resolution generalization is bootstrapped.", "uses": [], "lean_name": "CategoryTheory.InjectiveResolution.isoRightDerivedObj", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:right_derived_vanishes_injective": {"id": "lem:right_derived_vanishes_injective", "type": "lemma", "title": "Higher derived functors vanish on injectives", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  With \\(\\mathcal{A}, \\mathcal{B}, G\\) as above, if \\(J\\) is an injective object of\n  \\(\\mathcal{A}\\) then \\((R^{n+1} G)(J) = 0\\) for every \\(n \\in \\mathbb{N}\\); that\n  is, the higher right-derived functors vanish on injective objects. In particular\n  every injective object is right-\\(G\\)-acyclic in the sense of\n  Definition~\\ref{def:right_acyclic}.", "uses": [], "lean_name": "CategoryTheory.Functor.isZero_rightDerived_obj_injective_succ", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:right_derived_zero_iso_self": {"id": "lem:right_derived_zero_iso_self", "type": "lemma", "title": "The zeroth derived functor of a left-exact functor", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  With \\(\\mathcal{A}, \\mathcal{B}, G\\) as above, if \\(G\\) is left exact (preserves\n  finite limits) then the natural transformation \\(G \\to R^0 G\\) is an isomorphism,\n  \\[\n    R^0 G \\;\\cong\\; G.\n  \\]", "uses": [], "lean_name": "CategoryTheory.Functor.rightDerivedZeroIsoSelf", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 6, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:homology_long_exact_sequence": {"id": "lem:homology_long_exact_sequence", "type": "lemma", "title": "Long exact homology sequence of a short exact sequence of complexes", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  Let \\(\\mathcal{C}\\) be an abelian category and let\n  \\[\n    0 \\longrightarrow S.X_1 \\longrightarrow S.X_2 \\longrightarrow S.X_3\n      \\longrightarrow 0\n  \\]\n  be a short exact sequence of cochain complexes in \\(\\mathcal{C}\\) --- that is, a\n  short complex \\(S = (S.X_1 \\to S.X_2 \\to S.X_3)\\) of objects of the category of\n  \\(\\mathbb{Z}\\)-indexed cochain complexes \\(\\mathrm{HomologicalComplex}\\,\\mathcal{C}\\)\n  which is short exact (degreewise mono, epi and exact in the middle). Then for every\n  degree \\(n\\) there is a connecting morphism\n  \\[\n    \\delta^n \\;:\\; H^n(S.X_3) \\longrightarrow H^{n+1}(S.X_1)\n  \\]\n  (the Mathlib map \\texttt{ShortComplex.ShortExact.\\(\\delta\\)}), and these assemble\n  into a long exact sequence of homology objects in \\(\\mathcal{C}\\)\n  \\[\n    \\cdots \\longrightarrow H^n(S.X_2) \\longrightarrow H^n(S.X_3)\n      \\xrightarrow{\\ \\delta^n\\ } H^{n+1}(S.X_1)\n      \\longrightarrow H^{n+1}(S.X_2) \\longrightarrow \\cdots .\n  \\]\n  This is the complex-level homology long exact sequence and its connecting\n  homomorphism. The derived-functor long exact sequence used in the sequel is\n  constructed from this complex-level result via a horseshoe lift; see\n  Lemma~\\ref{lem:acyclic_dimension_shift}.", "uses": [], "lean_name": "CategoryTheory.ShortComplex.ShortExact.homology_exact₁, CategoryTheory.ShortComplex.ShortExact.homology_exact₂, CategoryTheory.ShortComplex.ShortExact.homology_exact₃, CategoryTheory.ShortComplex.ShortExact.δ", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 8, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:right_acyclic": {"id": "def:right_acyclic", "type": "definition", "title": "", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "ok\n[Right-\\(G\\)-acyclic object]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Derived Categories, Tag 0157\n  (\\texttt{definition-derived-functor}) and Tag 015C\n  (\\texttt{lemma-F-acyclic}).}\n  Let \\(G : \\mathcal{A} \\to \\mathcal{B}\\) be an additive functor between abelian\n  categories. An object \\(J\\) of \\(\\mathcal{A}\\) is \\emph{right-\\(G\\)-acyclic} when\n  the higher right-derived functors of \\(G\\) vanish at \\(J\\):\n  \\[\n    (R^k G)(J) = 0 \\qquad \\text{for all } k \\geq 1.\n  \\]\n  Equivalently, writing the condition with the index shifted, \\((R^{k+1} G)(J) = 0\\)\n  for all \\(k \\in \\mathbb{N}\\). The Stacks Project defines a right-\\(G\\)-acyclic\n  object intrinsically (as one for which the one-term complex \\(J[0]\\) computes the\n  derived functor \\(RG\\)); for an additive --- in our applications, left exact ---\n  functor \\(G\\) that intrinsic condition is equivalent to the vanishing of all\n  \\((R^k G)(J)\\) with \\(k \\geq 1\\), which is the form we adopt here and which is\n  directly checkable against the injective-resolution computation of\n  Lemma~\\ref{lem:right_derived_injective_resolution}.\n\n  \\emph{Remark (alternative quantifier shapes).} Two equivalent formulations are\n  available: ``\\((R^k G)(J) = 0\\) for all \\(k \\geq 1\\)'' or the index-shifted\n  ``\\((R^{k+1} G)(J) = 0\\) for all \\(k \\in \\mathbb{N}\\)''; the latter avoids the\n  inequality side-condition and aligns with the vanishing statement of\n  Lemma~\\ref{lem:right_derived_vanishes_injective}.", "uses": ["lem:right_derived_injective_resolution"], "lean_name": "CategoryTheory.Functor.IsRightAcyclic", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "class Functor.IsRightAcyclic (G : 𝒜 ⥤ ℬ) [G.Additive] (J : 𝒜) : Prop where\n  vanish : ∀ k : ℕ, Limits.IsZero ((G.rightDerived (k + 1)).obj J)", "proof_size_lean": 141, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 1, "rdep_count": 5, "descendant_count": 8, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:horseshoe_biprod_injective": {"id": "lem:horseshoe_biprod_injective", "type": "lemma", "title": "Degree term: a finite biproduct of injectives is injective", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  In an abelian category, if \\(P\\) and \\(Q\\) are injective objects then their biproduct\n  \\(P \\oplus Q\\) is injective. Consequently each degree term\n  \\(I_B^n := I_A^n \\oplus I_C^n\\) of the middle complex is injective, being the\n  biproduct of the injective terms \\(I_A^n\\) and \\(I_C^n\\) of the two chosen\n  resolutions.", "uses": [], "lean_name": "CategoryTheory.Injective.instBiprod", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:horseshoe_degree_split": {"id": "lem:horseshoe_degree_split", "type": "lemma", "title": "Degree term: the biproduct short complex is split exact", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "\\textit{Provided by Mathlib.}\n  For objects \\(P, Q\\) of an abelian category the short complex\n  \\[\n    P \\xrightarrow{\\ \\iota_P\\ } P \\oplus Q \\xrightarrow{\\ \\pi_Q\\ } Q\n  \\]\n  formed from the biproduct coprojection \\(\\iota_P\\) and projection \\(\\pi_Q\\) carries a\n  canonical \\texttt{ShortComplex.Splitting}; in particular it is a split short exact\n  sequence. Applied in each degree \\(n\\) with \\(P = I_A^n\\), \\(Q = I_C^n\\), this exhibits\n  every degree\n  \\[\n    0 \\longrightarrow I_A^n \\longrightarrow I_B^n \\longrightarrow I_C^n \\longrightarrow 0\n  \\]\n  as split, furnishing the degreewise-splitting data required for the construction.", "uses": [], "lean_name": "CategoryTheory.ShortComplex.Splitting.ofHasBinaryBiproduct", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:horseshoe_stage_mono": {"id": "lem:horseshoe_stage_mono", "type": "lemma", "title": "", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "ok\n[Per-stage monomorphism into the biproduct]\n  \n  \n  \n  Let \\(0 \\to S.X_1 \\xrightarrow{S.f} S.X_2 \\xrightarrow{S.g} S.X_3 \\to 0\\) be an exact\n  short complex with \\(S.f\\) a monomorphism, and let \\(\\alpha : S.X_1 \\to P\\),\n  \\(\\gamma : S.X_3 \\to Q\\) be monomorphisms with \\(P\\) injective. Then the map\n  \\[\n    \\bigl\\langle\\, \\mathrm{factorThru}(\\alpha, S.f)\\,,\\; S.g \\circ \\gamma \\,\\bigr\\rangle\n      \\;:\\; S.X_2 \\longrightarrow P \\oplus Q,\n  \\]\n  whose first component is the injective extension of \\(\\alpha\\) along the mono \\(S.f\\)\n  and whose second component is \\(S.X_2 \\twoheadrightarrow S.X_3 \\hookrightarrow Q\\), is a\n  monomorphism. This is the kernel/cokernel step driving each stage of the recursion:\n  applied to the \\(n\\)-th cosyzygy short exact sequence with \\(P = I_A^{n+1}\\),\n  \\(Q = I_C^{n+1}\\) it produces the monomorphism of the next cosyzygy into the next\n  biproduct term, whose cokernel feeds the following stage (and, at the base stage with\n  the original sequence \\(0 \\to A \\to B \\to C \\to 0\\), the augmentation\n  \\(\\beta : B \\hookrightarrow I_B^0\\)).", "uses": ["lem:horseshoe_biprod_injective"], "lean_name": "CategoryTheory.mono_biprod_lift_factorThru_of_exact", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:horseshoe_biprod_injective}\n  \\leanok\n  Write \\(u := \\langle \\mathrm{factorThru}(\\alpha, S.f), S.g \\circ \\gamma\\rangle\\). To see\n  \\(u\\) is mono it suffices, in an abelian category, to show \\(x \\circ u = 0 \\implies x = 0\\)\n  for any \\(x\\). Composing \\(x \\circ u\\) with the two biproduct projections gives\n  \\(x \\circ \\mathrm{factorThru}(\\alpha, S.f) = 0\\) and \\(x \\circ S.g \\circ \\gamma = 0\\);\n  since \\(\\gamma\\) is mono the latter yields \\(x \\circ S.g = 0\\). Exactness of \\(S\\) at\n  \\(S.X_2\\) (with \\(S.f\\) mono) lets us lift \\(x\\) through \\(S.f\\): there is \\(y\\) with\n  \\(y \\circ S.f = x\\). Then \\(y \\circ \\alpha = y \\circ S.f \\circ \\mathrm{factorThru}(\\alpha, S.f)\n  = x \\circ \\mathrm{factorThru}(\\alpha, S.f) = 0\\), using the defining property\n  \\(S.f \\circ \\mathrm{factorThru}(\\alpha, S.f) = \\alpha\\); as \\(\\alpha\\) is mono, \\(y = 0\\),\n  hence \\(x = y \\circ S.f = 0\\).\n", "lean_source": "lemma mono_biprod_lift_factorThru_of_exact {S : ShortComplex 𝒜} (hS : S.Exact) [Mono S.f]\n    {P Q : 𝒜} [Injective P] (α : S.X₁ ⟶ P) [Mono α] (γ : S.X₃ ⟶ Q) [Mono γ] :\n    Mono (biprod.lift (Injective.factorThru α S.f) (S.g ≫ γ)) := by\n  rw [Preadditive.mono_iff_cancel_zero]\n  intro T x hx\n  have h1 : x ≫ Injective.factorThru α S.f = 0 := by simpa using hx =≫ biprod.fst\n  have h2 : x ≫ S.g ≫ γ = 0 := by simpa using hx =≫ biprod.snd\n  have hxg : x ≫ S.g = 0 := by rw [← cancel_mono γ, zero_comp, Category.assoc]; exact h2\n  have hyf : hS.lift x hxg ≫ S.f = x := hS.lift_f x hxg\n  have hya : hS.lift x hxg ≫ α = 0 := by\n    have h3 : hS.lift x hxg ≫ S.f ≫ Injective.factorThru α S.f = 0 := by\n      rw [← Category.assoc, hyf]; exact h1\n    rwa [Injective.comp_factorThru] at h3\n  have hy0 : hS.lift x hxg = 0 := by rw [← cancel_mono α, zero_comp]; exact hya\n  rw [← hyf, hy0, zero_comp]", "proof_size_lean": 888, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 9, "proof_size_tex": 883, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:horseshoe_twist": {"id": "lem:horseshoe_twist", "type": "lemma", "title": "Off-diagonal twist and augmentation lifts", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "There exist an augmentation \\(\\beta : B \\to I_B^0\\) and a family of morphisms\n  \\[\n    \\tau^n : I_C^n \\longrightarrow I_A^{n+1} \\qquad (n \\in \\mathbb{N})\n  \\]\n  --- the off-diagonal components of the middle differential --- satisfying the cocycle\n  identity\n  \\[\n    \\tau^{n+1} \\circ d_C^n \\;=\\; -\\, d_A^{n+1} \\circ \\tau^n \\qquad (n \\in \\mathbb{N}),\n  \\]\n  together with the compatibility of \\(\\beta\\) with the augmentations \\(A \\to I_A^0\\),\n  \\(C \\to I_C^0\\) and the maps of the original short exact sequence. Each \\(\\tau^n\\) (and\n  \\(\\beta\\)) is produced by the universal lifting property of injectives: the target\n  summand \\(I_A^{n+1}\\) is injective and the relevant source map is a monomorphism\n  (Lemma~\\ref{lem:horseshoe_stage_mono}).", "uses": ["lem:horseshoe_stage_mono"], "lean_name": "CategoryTheory.InjectiveResolution.horseshoeτ, CategoryTheory.InjectiveResolution.horseshoeτ_cocycle, CategoryTheory.InjectiveResolution.horseshoeβ, CategoryTheory.InjectiveResolution.twistPair, CategoryTheory.InjectiveResolution.horseshoeβ₁, CategoryTheory.InjectiveResolution.f_comp_horseshoeβ₁, CategoryTheory.InjectiveResolution.horseshoeH, CategoryTheory.InjectiveResolution.g_comp_horseshoeH, CategoryTheory.InjectiveResolution.horseshoeH_comp_d, CategoryTheory.InjectiveResolution.horseshoeτZero, CategoryTheory.InjectiveResolution.horseshoeτZero_hf, CategoryTheory.InjectiveResolution. ization along this monomorphism to a map\n  \\(\\tau^{n+1} : I_C^{n+1} \\to I_A^{n+2}\\) defined on all of \\(I_C^{n+1}\\) and satisfying\n  \\(\\tau^{n+1} \\circ d_C^n = -\\,d_A^{n+1} \\circ \\tau^n\\) by construction. This is exactly\n  the dual of the inductive lift in the Horseshoe Lemma.\n", "lean_source": "noncomputable def horseshoeτ (n : ℕ) : I_C.cocomplex.X n ⟶ I_A.cocomplex.X (n + 1) :=\n  (twistPair hses I_A I_C n).1\n\nlemma horseshoeτ_cocycle (n : ℕ) :\n    I_C.cocomplex.d n (n + 1) ≫ horseshoeτ hses I_A I_C (n + 1) =\n      -(horseshoeτ hses I_A I_C n ≫ I_A.cocomplex.d (n + 1) (n + 2)) :=\n  (twistPair hses I_A I_C n).2.2\n\nnoncomputable def horseshoeβ : ses.X₂ ⟶ I_A.cocomplex.X 0 ⊞ I_C.cocomplex.X 0 :=\n  biprod.lift (horseshoeβ₁ hses I_A) (ses.g ≫ ιC0 I_C)\n\nnoncomputable def twistPair : (n : ℕ) →\n    Σ' (t0 : I_C.cocomplex.X n ⟶ I_A.cocomplex.X (n + 1))\n       (_t1 : I_C.cocomplex.X (n + 1) ⟶ I_A.cocomplex.X (n + 2)),\n       I_C.cocomplex.d n (n + 1) ≫ _t1 = -(t0 ≫ I_A.cocomplex.d (n + 1) (n + 2))\n  | 0 => ⟨horseshoeτZero hses I_A I_C,\n      I_C.exact₀.descToInjective (-(horseshoeτZero hses I_A I_C ≫ I_A.cocomplex.d 1 2))\n        (horseshoeτZero_hf hses I_A I_C),\n      I_C.exact₀.comp_descToInjective _ _⟩\n  | (n + 1) =>\n      let p := twistPair n\n      ⟨p.2.1,\n        (I_C.exact_succ n).descToInjective (-(p.2.1 ≫ I_A.cocomplex.d (n + 2) (n + 3))) (by\n          have e : (-(p.1 ≫ I_A.cocomplex.d (n + 1) (n + 2))) ≫ I_A.cocomplex.d (n + 2) (n + 3)\n              = 0 := by\n            rw [Preadditive.neg_comp, Category.assoc, HomologicalComplex.d_comp_d, comp_zero,\n              neg_zero]\n          rw [Preadditive.comp_neg, neg_eq_zero, ← Category.assoc, p.2.2]\n          exact e),\n        (I_C.exact_succ n).comp_descToInjective _ _⟩\n\nnoncomputable def horseshoeβ₁ : ses.X₂ ⟶ I_A.cocomplex.X 0 :=\n  @Injective.factorThru _ _ _ _ _ (I_A.injective 0) (I_A.ι.f 0) ses.f hses.mono_f\n\n@[reassoc (attr := simp)]\nlemma f_comp_horseshoeβ₁ : ses.f ≫ horseshoeβ₁ hses I_A = I_A.ι.f 0 :=\n  @Injective.comp_factorThru _ _ _ _ _ (I_A.injective 0) (I_A.ι.f 0) ses.f hses.mono_f\n\nnoncomputable def horseshoeH : ses.X₃ ⟶ I_A.cocomplex.X 1 :=\n  hses.exact.descToInjective (horseshoeβ₁ hses I_A ≫ I_A.cocomplex.d 0 1) (by\n    rw [← Category.assoc, f_comp_horseshoeβ₁]; exact I_A.ι_f_zero_comp_complex_d)\n\n@[reassoc (attr := simp)]\nlemma g_comp_horseshoeH :\n    ses.g ≫ horseshoeH hses I_A = horseshoeβ₁ hses I_A ≫ I_A.cocomplex.d 0 1 :=\n  hses.exact.comp_descToInjective _ _\n\nlemma horseshoeH_comp_d : horseshoeH hses I_A ≫ I_A.cocomplex.d 1 2 = 0 := by\n  haveI := hses.epi_g\n  rw [← cancel_epi ses.g, comp_zero, ← Category.assoc, g_comp_horseshoeH, Category.assoc,\n    HomologicalComplex.d_comp_d, comp_zero]\n\nnoncomputable def horseshoeτZero : I_C.cocomplex.X 0 ⟶ I_A.cocomplex.X 1 :=\n  @Injective.factorThru _ _ _ _ _ (I_A.injective 1) (-horseshoeH hses I_A) (I_C.ι.f 0)\n    (mono_of_isLimit_fork I_C.isLimitKernelFork)\n\nlemma horseshoeτZero_hf :\n    I_C.ι.f 0 ≫ (-(horseshoeτZero hses I_A I_C ≫ I_A.cocomplex.d 1 2)) = 0 := by\n  have e : (-horseshoeH hses I_A) ≫ I_A.cocomplex.d 1 2 = 0 := by\n    rw [Preadditive.neg_comp, horseshoeH_comp_d, neg_zero]\n  rw [Preadditive.comp_neg, neg_eq_zero, ← Category.assoc, ιC_comp_horseshoeτZero]\n  exact e\n\n@[simp]\nlemma horseshoeτ_zero : horseshoeτ hses I_A I_C 0 = horseshoeτZero hses I_A I_C := rfl\n\nlemma horseshoeβ_comp_d :\n    horseshoeβ hses I_A I_C ≫ twistedBiprodD (horseshoeτ hses I_A I_C) 0 = 0 := by\n  have e : ses.g ≫ ιC0 I_C ≫ horseshoeτZero hses I_A I_C\n      = -(horseshoeβ₁ hses I_A ≫ I_A.cocomplex.d 0 (0 + 1)) := by\n    rw [ιC0_comp_τZero, Preadditive.comp_neg, g_comp_horseshoeH]\n  have e2 : ses.g ≫ ιC0 I_C ≫ I_C.cocomplex.d 0 (0 + 1) = 0 := by\n    have h0 : ιC0 I_C ≫ I_C.cocomplex.d 0 (0 + 1) = 0 := I_C.ι_f_zero_comp_complex_d\n    rw [h0, comp_zero]\n  apply biprod.hom_ext\n  · simp only [Category.assoc, twistedBiprodD_fst, Preadditive.comp_add orseshoe\n  construction, step by step''. Take \\(I_A, I_C\\) and set \\(I_B^n := I_A^n \\oplus I_C^n\\):\n  injective by Lemma~\\ref{lem:horseshoe_biprod_injective}, degreewise split by\n  Lemma~\\ref{lem:horseshoe_degree_split}. The twist \\(\\tau\\) and augmentation exist with\n  the cocycle identity (Lemma~\\ref{lem:horseshoe_twist}, via\n  Lemma~\\ref{lem:horseshoe_stage_mono}); the matrix differential then squares to zero\n  (Lemma~\\ref{lem:horseshoe_dComp}) with coprojection and projection chain maps\n  (Lemma~\\ref{lem:horseshoe_chainMap}); and \\(I_B^\\bullet\\) resolves \\(B\\)\n  (Lemma~\\ref{lem:horseshoe_resolvesMiddle}). These data are exactly the asserted\n  degreewise-split short exact sequence \\(0 \\to I_A \\to I_B \\to I_C \\to 0\\) of cochain\n  complexes compatible with the augmentations.\n", "lean_source": "noncomputable def ofShortExact : InjectiveResolution ses.X₂ :=\n  ofShortExact_resolvesMiddle hses I_A I_C", "proof_size_lean": 105, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 8, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 1228, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:right_derived_shift_split_resolution": {"id": "lem:right_derived_shift_split_resolution", "type": "lemma", "title": "", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "ok\n[Resolution-level dimension shift]\n  \n  \n  \n  Let \\(G : \\mathcal{A} \\to \\mathcal{B}\\) be additive and let\n  \\(0 \\to A \\to J \\to Z \\to 0\\) be a short exact sequence with \\(J\\) right-\\(G\\)-acyclic,\n  lifted to a \\emph{degreewise-split} short exact sequence of injective resolutions\n  \\(0 \\to I_A \\to I_J \\to I_Z \\to 0\\) (chain maps \\(\\varphi, \\psi\\) with\n  \\(\\psi \\circ \\varphi = 0\\) and a splitting of \\(0 \\to I_A^n \\to I_J^n \\to I_Z^n \\to 0\\)\n  i cyclic J]\n    (φ : I_A.cocomplex ⟶ I_J.cocomplex) (ψ : I_J.cocomplex ⟶ I_Z.cocomplex)\n    (w : φ ≫ ψ = 0)\n    (splits : ∀ n, ((ShortComplex.mk φ ψ w).map\n      (HomologicalComplex.eval 𝒜 (ComplexShape.up ℕ) n)).Splitting)\n    (k : ℕ) :\n    (G.rightDerived (k + 1)).obj Z ≅ (G.rightDerived (k + 2)).obj A :=\n  have hSG : ((ShortComplex.mk φ ψ w).map\n      (G.mapHomologicalComplex (ComplexShape.up ℕ))).ShortExact :=\n    shortExact_map_mapHomologicalComplex_of_degreewise_splitting splits G\n  (I_Z.isoRightDerivedObj G (k + 1)) ≪≫\n    hSG.δIso (k + 1) (k + 2) (by simp)\n      (G.isZero_homology_mapHomologicalComplex_of_isRightAcyclic I_J k)\n      (G.isZero_homology_mapHomologicalComplex_of_isRightAcyclic I_J (k + 1)) ≪≫\n    (I_A.isoRightDerivedObj G (k + 2)).symm\n\nomit [HasInjectiveResolutions 𝒜] in\n\nlemma shortExact_of_degreewise_splitting\n    {S : ShortComplex (CochainComplex 𝒜 ℕ)}\n    (splits : ∀ n, (S.map (HomologicalComplex.eval 𝒜 (ComplexShape.up ℕ) n)).Splitting) :\n    S.ShortExact :=\n  HomologicalComplex.shortExact_of_degreewise_shortExact S (fun n => (splits n).shortExact)\n\nomit [HasInjectiveResolutions 𝒜] in\n\nlemma shortExact_map_mapHomologicalComplex_of_degreewise_splitting\n    {S : ShortComplex (CochainComplex 𝒜 ℕ)}\n    (splits : ∀ n, (S.map (HomologicalComplex.eval 𝒜 (ComplexShape.up ℕ) n)).Splitting)\n    (G : 𝒜 ⥤ ℬ) [G.Additive] :\n    (S.map (G.mapHomologicalComplex (ComplexShape.up ℕ))).ShortExact :=\n  HomologicalComplex.shortExact_of_degreewise_shortExact _\n    (fun n => ((splits n).map G).shortExact)\n\nlemma Functor.isZero_homology_mapHomologicalComplex_of_isRightAcyclic\n    (G : 𝒜 ⥤ ℬ) [G.Additive] {J : 𝒜} (I : InjectiveResolution J)\n    [G.IsRightAcyclic J] (k : ℕ) :\n    IsZero ((HomologicalComplex.homologyFunctor ℬ (ComplexShape.up ℕ) (k + 1)).obj\n      ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj I.cocomplex)) :=\n  (Functor.IsRightAcyclic.vanish (G := G) (J := J) k).of_iso\n    (I.isoRightDerivedObj G (k + 1)) f_ses, lem:right_derived_shift_split_resolution}\n    \\leanok\n  We first construct the long exact sequence of right-derived functors associated\n  to \\(0 \\to A \\to J \\to Z \\to 0\\). In the classical treatment this sequence is\n  supplied by the \\(\\delta\\)-functor structure of \\(\\{R^k G\\}\\) on the derived\n  category; here it is built directly from the complex-level homology long exact\n  sequence via a horseshoe lift.\n\n  \\emph{Building the long exact sequence.} By the horseshoe lift\n  (Lemma~\\ref{lem:injective_resolution_of_ses}) choose injective resolutions\n  \\(I_A, I_J, I_Z\\) of \\(A, J, Z\\) fitting into a short exact sequence of cochain\n  complexes\n  \\[\n    0 \\longrightarrow I_A \\longrightarrow I_J \\longrightarrow I_Z \\longrightarrow 0\n  \\]\n  that is degreewise split. Apply \\(G\\) degreewise. Because each degree\n  \\(0 \\to I_A^n \\to I_J^n \\to I_Z^n \\to 0\\) is a \\emph{split} short exact sequence\n  (so \\(I_J^n \\cong I_A^n \\oplus I_Z^n\\) compatibly with the maps), the additive\n  functor \\(G\\) carries it to a split short exact sequence\n  \\(0 \\to G(I_A^n) \\to G(I_J^n) \\to G(I_Z^n) \\to 0\\) --- this is where degreewise\n  splitness is essential, since \\(G\\) is not assumed exact and would not in general\n  preserve a non-split short exact sequence. Hence\n  \\[\n    0 \\longrightarrow G(I_A) \\longrightarrow G(I_J) \\longrightarrow G(I_Z)\n      \\longrightarrow 0\n  \\]\n  is a short exact sequence of cochain complexes in \\(\\mathcal{B}\\). The\n  complex-level homology long exact sequence\n  (Lemma~\\ref{lem:homology_long_exact_sequence}) applied to it reads\n  \\[\n    \\cdots \\to H^k\\bigl(G(I_J)\\bigr) \\to H^k\\bigl(G(I_Z)\\bigr)\n      \\xrightarrow{\\ \\delta^k\\ } H^{k+1}\\bigl(G(I_A)\\bigr)\n      \\to H^{k+1}\\bigl(G(I_J)\\bigr) \\to \\cdots .\n  \\]\n  By Lemma~\\ref{lem:right_derived_injective_resolution} the homology of each applied\n  resolution computes the right-derived functor:\n  \\(H^k(G(I_A)) \\cong (R^k G)(A)\\), \\(H^k(G(I_J)) \\cong (R^k G)(J)\\) and\n  \\(H^k(G(I_Z)) \\cong (R^k G)(Z)\\), naturally in the maps of the sequence. Transporting\n  the homology long exact sequence across these isomorphisms gives the long exact\n  sequence of right-derived functors\n  \\[\n    \\cdots \\to (R^k G)(J) \\to (R^k G)(Z)\n      \\xrightarrow{\\ \\delta^k\\ } (R^{k+1} G)(A) \\to (R^{k+1} G)(J) \\to \\cdots,\n  \\]\n  and, using \\(R^0 G \\cong G\\) (Lemma~\\ref{lem:right_derived_zero_iso_self}) at the\n  bottom, its low-degree initial segment\n  \\[\n    0 \\to G(A) \\to G(J) \\to G(Z)\n      \\xrightarrow{\\ \\delta^0\\ } (R^1 G)(A) \\to (R^1 G)(J) \\to \\cdots .\n  \\]\n\n  \\emph{Killing the acyclic terms.} Because \\(J\\) is right-\\(G\\)-acyclic\n  (Definition~\\ref{def:right_acyclic}), every term \\((R^k G)(J)\\) with \\(k \\geq 1\\)\n  vanishes. For \\(k \\geq 1\\) the segment around \\((R^k G)(J)\\),\n  \\[\n    \\underbrace{(R^{k} G)(J)}_{=0} \\to (R^{k} G)(Z)\n      \\xrightarrow{\\ \\delta^k\\ } (R^{k+1} G)(A) \\to \\underbrace{(R^{k+1} G)(J)}_{=0},\n  \\]\n  has both outer terms zero, so the connecting map\n  \\(\\delta^k : (R^{k} G)(Z) \\to (R^{k+1} G)(A)\\) is an isomorphism, which is the\n  asserted dimension shift. (The lowest-degree segment of the same long exact\n  sequence yields the cokernel description of \\((R^1 G)(A)\\); that reading is\n  recorded separately in Lemma~\\ref{lem:acyclic_one_iso_coker}.)\n", "lean_source": "noncomputable def Functor.rightDerivedShiftIsoOfAcyclic\n    (G : 𝒜 ⥤ ℬ) [G.Additive] {ses : ShortComplex 𝒜} (hses : ses.ShortExact)\n    [G.IsRightAcyclic ses.X₂] (k : ℕ) :\n    (G.rightDerived (k + 1)).obj ses.X₃ ≅ (G.rightDerived (k + 2)).obj ses.X₁ :=\n  let I_A : InjectiveResolution ses.X₁ := (inferInstance : HasInjectiveResolution ses.X₁).out.some\n  let I_C : InjectiveResolution ses.X₃ := (inferInstance : HasInjectiveResolution ses.X₃).out.some\n  G.rightDerivedShiftIsoOfSplitResolutionSES I_A\n    (InjectiveReso .rightDerivedZeroIsoSelf).hom.naturality ses.g)\n  rw [Iso.symm_hom, Iso.symm_hom, Iso.comp_inv_eq, Category.assoc, Iso.eq_inv_comp]\n  exact (InjectiveResolution.isoRightDerivedObj_hom_naturality ses.g I_J I_C ψ comm G 0).symm", "proof_size_lean": 2228, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 5, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1885, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:cosyzygy_ses": {"id": "lem:cosyzygy_ses", "type": "lemma", "title": "", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "ok\n[Cosyzygy short exact sequences of an acyclic resolution]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Derived Categories, Tag 05TA\n  (\\texttt{proposition-enough-acyclics}).}\n  Let \\(G : \\mathcal{A} \\to \\mathcal{B}\\) be additive and let\n  \\[\n    0 \\longrightarrow A\n      \\longrightarrow J^0 \\longrightarrow J^1 \\longrightarrow J^2\n      \\longrightarrow \\cdots\n  \\]\n  be an exact resolution of \\(A\\) with every \\(J^n\\) right-\\(G\\)-acyclic. Define the\n  cosyzygies \\(Z^0 := A\\) and, for \\(m \\geq 1\\),\n  \\[\n    Z^m \\;:=\\; \\ker\\bigl(J^m \\to J^{m+1}\\bigr)\n      \\;=\\; \\operatorname{im}\\bigl(J^{m-1} \\to J^m\\bigr).\n  \\]\n  Then for every \\(m \\geq 0\\) the sequence\n  \\[\n    0 \\longrightarrow Z^m \\longrightarrow J^m \\longrightarrow Z^{m+1}\n      \\longrightarrow 0 \\tag{$S_m$}\n  \\]\n  is short exact, with the inclusion \\(Z^m \\hookrightarrow J^m\\) the canonical one,\n  the surjection \\(J^m \\twoheadrightarrow Z^{m+1}\\) the corestriction of\n  \\(J^m \\to J^{m+1}\\) onto its image, and the middle term \\(J^m\\) right-\\(G\\)-acyclic.\n  In particular \\(Z^1 = \\operatorname{im}(J^0 \\to J^1) = \\operatorname{coker}(A \\to J^0)\\).", "uses": ["def:right_acyclic"], "lean_name": "CategoryTheory.Functor.cosyzygyShortExact, CategoryTheory.Functor.cosyzygyShortComplex, CategoryTheory.cosyzygyKernelFork, CategoryTheory.cosyzygy_iCycles_comp_toCycles, CategoryTheory.epi_toCycles_of_exactAt", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:right_acyclic}\n  \\leanok\n  Fix \\(m \\geq 0\\). Mono of \\(Z^m \\hookrightarrow J^m\\) is immediate: \\(Z^m\\) is by\n  definition a subobject of \\(J^m\\) (for \\(m = 0\\) via the injection \\(A \\hookrightarrow\n  J^0\\) of the resolution, for \\(m \\geq 1\\) as the kernel \\(\\ker(J^m \\to J^{m+1})\\)).\n  The map \\(J^m \\to Z^{m+1}\\) is the corestriction of the differential\n  \\(d^m : J^m \\to J^{m+1}\\) onto its image \\(Z^{m+1} = \\operatorname{im}(d^m)\\), hence\n  an epimorphism. Exactness in the middle is exactness of the resolution at \\(J^m\\):\n  the image of \\(Z^m \\hookrightarrow J^m\\) equals \\(\\ker(d^m)\\) --- for \\(m \\geq 1\\)\n  by the definition \\(Z^m = \\ker(J^m \\to J^{m+1})\\), and for \\(m = 0\\) because\n  exactness of \\(0 \\to A \\to J^0 \\to J^1\\) makes \\(A \\hookrightarrow J^0\\) identify\n  \\(A\\) with \\(\\ker(d^0)\\) --- while the kernel of the epimorphism\n  \\(J^m \\twoheadrightarrow Z^{m+1}\\) is exactly \\(\\ker(d^m)\\). Thus\n  \\(\\operatorname{im}(Z^m \\to J^m) = \\ker(J^m \\to Z^{m+1})\\), so \\((S_m)\\) is short\n  exact. The middle term \\(J^m\\) is right-\\(G\\)-acyclic by hypothesis. The final\n  identity \\(Z^1 = \\operatorname{im}(J^0 \\to J^1) = \\operatorname{coker}(A \\to J^0)\\)\n  is the case \\(m = 0\\): \\(\\operatorname{coker}(A \\to J^0) = \\operatorname{coker}(Z^0 \\to J^0)\n  \\cong Z^1\\) by \\((S_0)\\).\n", "lean_source": "theorem Functor.cosyzygyShortExact (K : CochainComplex 𝒜 ℕ) (n : ℕ)\n    (h : K.ExactAt (n + 1)) : (Functor.cosyzygyShortComplex K n).ShortExact where\n  exact := ShortComplex.exact_of_f_is_kernel _ (cosyzygyKernelFork K n)\n  mono_f := by dsimp [Functor.cosyzygyShortComplex]; infer_ins row G(J^n)\\) is the kernel of \\(G(J^n) \\to G(Z^{n+1})\\).\n  Next, the differential \\(G(J^n) \\to G(J^{n+1})\\) of the applied complex factors as\n  \\(G(J^n) \\xrightarrow{G(J^n \\twoheadrightarrow Z^{n+1})} G(Z^{n+1})\n  \\xrightarrow{G(Z^{n+1} \\hookrightarrow J^{n+1})} G(J^{n+1})\\), because the original\n  differential \\(J^n \\to J^{n+1}\\) factors through its image \\(Z^{n+1}\\) as\n  \\(J^n \\twoheadrightarrow Z^{n+1} \\hookrightarrow J^{n+1}\\) and \\(G\\) preserves\n  composition. The second factor \\(G(Z^{n+1}) \\to G(J^{n+1})\\) is a monomorphism (the\n  image of the left-exact application of \\(G\\) to \\((S_{n+1})\\), whose first map\n  \\(G(Z^{n+1}) \\hookrightarrow G(J^{n+1})\\) is mono). A monomorphism does not change\n  kernels under precomposition, so\n  \\(\\ker(G(J^n) \\to G(J^{n+1})) = \\ker(G(J^n) \\to G(Z^{n+1})) = G(Z^n)\\). Hence\n  \\(G(Z^n) \\xrightarrow{\\cong} \\ker(G(J^n) \\to G(J^{n+1}))\\) as subobjects of\n  \\(G(J^n)\\). For \\(n = 0\\), \\(Z^0 = A\\) gives\n  \\(G(A) \\cong \\ker(G(J^0) \\to G(J^1)) = H^0(G(J^\\bullet))\\), the last equality being\n  the definition of the zeroth cohomology of a cochain complex starting in degree\n  \\(0\\) (no incoming differential). The use of \\(R^0 G \\cong G\\)\n  (Lemma~\\ref{lem:right_derived_zero_iso_self}) is what licenses reading \\(G(A)\\) as\n  \\((R^0 G)(A)\\) when this identification feeds the comparison theorem.\n", "lean_source": "noncomputable def Functor.gCosyzygyIsoCocycles (G : 𝒜 ⥤ ℬ) [G.Additive]\n    [Limits.PreservesFiniteLimits G] (K : CochainComplex 𝒜 ℕ) (n : ℕ) :\n    G.obj (K.cycles n) ≅ ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).cycles n :=\n  Limits.IsLimit.conePointUniqueUpToIso\n    (Limits.isLimitForkMapOfIsLimit' G (K.iCycles_d n (n + 1))\n      (K.cyclesIsKernel n (n + 1) (by simp)))\n    (((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).cyclesIsKernel n (n + 1) (by simp))\n\n@[reassoc]\nlemma Functor.gCosyzygyIsoCocycles_hom_iCycles (G : 𝒜 ⥤ ℬ) dots\\bigr)\\) is computed by\n  \\[\n    H^0\\bigl(G(J^\\bullet)\\bigr) \\;\\cong\\; G(A),\n    \\qquad\n    H^n\\bigl(G(J^\\bullet)\\bigr) \\;\\cong\\;\n      \\operatorname{coker}\\bigl(G(J^{n-1}) \\to G(Z^n)\\bigr) \\quad (n \\geq 1),\n  \\]\n  where \\(G(J^{n-1}) \\to G(Z^n)\\) is \\(G\\) applied to the surjection\n  \\(J^{n-1} \\twoheadrightarrow Z^n\\) of \\((S_{n-1})\\).", "uses": ["lem:cosyzygy_ses", "lem:applied_cosyzygy_cycles", "lem:right_derived_zero_iso_self"], "lean_name": "CategoryTheory.Functor.cohomologyAppliedResolutionIso, CategoryTheory.Functor.gHomologyZeroIso", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:cosyzygy_ses, lem:applied_cosyzygy_cycles, lem:right_derived_zero_iso_self}\n  The degree-zero statement is the \\(n = 0\\) case of\n  Lemma~\\ref{lem:applied_cosyzygy_cycles}: \\(H^0(G(J^\\bullet)) = \\ker(G(J^0) \\to G(J^1))\n  \\cong G(Z^0) = G(A)\\). Fix now \\(n \\geq 1\\). By definition of the cohomology of the\n  cochain complex \\(G(J^\\bullet)\\) in positive degree,\n  \\[\n    H^n\\bigl(G(J^\\bullet)\\bigr)\n      \\;=\\; \\ker\\bigl(G(J^n) \\to G(J^{n+1})\\bigr) \\big/\n            \\operatorname{im}\\bigl(G(J^{n-1}) \\to G(J^n)\\bigr).\n  \\]\n  By Lemma~\\ref{lem:applied_cosyzygy_cycles} the numerator is\n  \\(\\ker(G(J^n) \\to G(J^{n+1})) \\cong G(Z^n)\\), realized as the subobject\n  \\(G(Z^n) \\hookrightarrow G(J^n)\\). Under this identification the differential\n  \\(G(J^{n-1}) \\to G(J^n)\\) lands inside \\(G(Z^n)\\): it factors as\n  \\(G(J^{n-1}) \\xrightarrow{G(J^{n-1} \\twoheadrightarrow Z^n)} G(Z^n)\n  \\hookrightarrow G(J^n)\\) by the factorization of \\(J^{n-1} \\to J^n\\) through its image\n  \\(Z^n\\), so its image equals the image of \\(G(J^{n-1}) \\to G(Z^n)\\) inside the\n  subobject \\(G(Z^n)\\). Therefore the quotient\n  \\(\\ker(G(J^n) \\to G(J^{n+1})) / \\operatorname{im}(G(J^{n-1}) \\to G(J^n))\\) is exactly\n  \\(G(Z^n) / \\operatorname{im}(G(J^{n-1}) \\to G(Z^n)) =\n  \\operatorname{coker}(G(J^{n-1}) \\to G(Z^n))\\). Hence\n  \\(H^n(G(J^\\bullet)) \\cong \\operatorname{coker}(G(J^{n-1}) \\to G(Z^n))\\).\n", "lean_source": "noncomputable def Functor.cohomologyAppliedResolutionIso (G : 𝒜 ⥤ ℬ) [G.Additive]\n    [Limits.PreservesFiniteLimits G] (K : CochainComplex 𝒜 ℕ) (m : ℕ) :\n    ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).homology (m + 1) ≅\n      cokernel (G.map (K.toCycles m (m + 1))) :=\n  have iso2 : cokernel (((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).toCycles m (m + 1)) ≅\n      cokernel (G.map (K.toCycles m (m + 1))) :=\n    cokernel.mapIso _ (G.map (K.toCycles m (m + 1))) (Iso.refl _)\n      (G.gCosyzygyIsoCocycles K (m + 1)).symm (by\n        simp only [Iso.symm_hom, Iso.refl_hom, Iso.comp_inv_eq]\n        simp [G.gCosyzygyIsoCocycles_toCycles K m])\n  Limits.IsColimit.coconePointUniqueUpToIso\n      (((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).homologyIsCokernel m (m + 1) (by simp))\n      (cokernelIsCokernel _) ≪≫ iso2\n\nnoncomputable def Functor.gHomologyZeroIso (G : 𝒜 ⥤ ℬ) [G.Additive]\n    [Limits.PreservesFiniteLimits G] (K : CochainComplex 𝒜 ℕ) :\n    G.obj (K.cycles 0) ≅ ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).homology 0 :=\n  G.gCosyzygyIsoCocycles K 0 ≪≫\n    CochainComplex.isoHomologyπ₀ ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K)", "proof_size_lean": 1185, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1374, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:acyclic_resolution_computes_derived": {"id": "lem:acyclic_resolution_computes_derived", "type": "theorem", "title": "", "chapter": "Acyclic resolutions compute right-derived functors", "statement": "ok\n[An acyclic resolution computes the right-derived functor]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Derived Categories, Tag 015E (Leray's acyclicity\n  lemma) and Tag 05TA (\\texttt{proposition-enough-acyclics}).}\n  Let \\(\\mathcal{A}\\) be an abelian category with enough injectives, \\(\\mathcal{B}\\)\n  abelian, and \\(G : \\mathcal{A} \\to \\mathcal{B}\\) an additive left-exact functor.\n  Let\n  \\[\n    0 \\longrightarrow A\n      \\longrightarrow J^0 \\longrightarrow J^1 \\longrightarrow J^2\n      \\longrightarrow \\cdots\n  \\]\n  be a resolution of \\(A\\) (an exact sequence) in which every object \\(J^n\\) is\n  right-\\(G\\)-acyclic in the sense of Definition~\\ref{def:right_acyclic}. Then for\n  every \\(n \\in \\mathbb{N}\\) the \\(n\\)-th right-derived functor of \\(G\\) at \\(A\\) is\n  computed by the resolution: there is an isomorphism in \\(\\mathcal{B}\\)\n  \\[\n    (R^n G)(A) \\;\\cong\\; H^n\\bigl(G(J^\\bullet)\\bigr),\n  \\]\n  where \\(G(J^\\bullet)\\) is the cochain complex\n  \\(G(J^0) \\to G(J^1) \\to G(J^2) \\to \\cdots\\) obtained by applying \\(G\\) degreewise\n  to the augmentation-dropped resolution and \\(H^n\\) is its \\(n\\)-th cohomology\n  object.", "uses": ["def:right_acyclic", "lem:cosyzygy_ses", "lem:cohomology_of_applied_resolution", "lem:acyclic_dimension_shift", "lem:acyclic_one_iso_coker", "lem:right_derived_zero_iso_self", "lem:right_derived_vanishes_injective"], "lean_name": "CategoryTheory.Functor.rightDerivedIsoOfAcyclicResolution", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:right_acyclic, lem:cosyzygy_ses, lem:cohomology_of_applied_resolution,\n    lem:acyclic_dimension_shift, lem:acyclic_one_iso_coker,\n    lem:right_derived_zero_iso_self, lem:right_derived_vanishes_injective}\n    \\leanok\n  The argument is the classical dimension shift, now assembled from the cosyzygy\n  infrastructure and the dimension-shift step proved above. Cut the resolution into\n  its cosyzygy short exact sequences \\((S_m) : 0 \\to Z^m \\to J^m \\to Z^{m+1} \\to 0\\)\n  with \\(Z^0 = A\\) and acyclic middle terms, as furnished by\n  Lemma~\\ref{lem:cosyzygy_ses}.\n\n  \\emph{Degree zero.} By Lemma~\\ref{lem:cohomology_of_applied_resolution},\n  \\(H^0(G(J^\\bullet)) \\cong G(A)\\), and by \\(R^0 G \\cong G\\)\n  (Lemma~\\ref{lem:right_derived_zero_iso_self}) the right-hand side is \\((R^0 G)(A)\\).\n  This is the case \\(n = 0\\).\n\n  \\emph{Positive degrees.} Fix \\(n \\geq 1\\). The sequences\n  \\((S_0), \\ldots, (S_{n-2})\\) all have acyclic middle terms, so the dimension-shift\n  Lemma~\\ref{lem:acyclic_dimension_shift} applied to them gives, for each \\(k \\geq 1\\),\n  isomorphisms \\((R^k G)(Z^{m+1}) \\cong (R^{k+1} G)(Z^m)\\) for \\(0 \\le m \\le n-2\\)\n  (with \\(Z^0 = A\\)). Composing them down the staircase\n  \\[\n    (R^n G)(A)\n      \\;\\cong\\; (R^{n-1} G)(Z^1)\n      \\;\\cong\\; (R^{n-2} G)(Z^2)\n      \\;\\cong\\; \\cdots\n      \\;\\cong\\; (R^{1} G)(Z^{n-1})\n  \\]\n  reduces \\((R^n G)(A)\\) to a single first-derived functor. (For \\(n = 1\\) the\n  staircase is empty and \\((R^1 G)(A) = (R^1 G)(Z^0)\\).) Now apply the lowest-degree\n  cokernel description (Lemma~\\ref{lem:acyclic_one_iso_coker}) to \\((S_{n-1})\\),\n  \\(0 \\to Z^{n-1} \\to J^{n-1} \\to Z^n \\to 0\\), whose middle term \\(J^{n-1}\\) is\n  acyclic:\n  \\[\n    (R^1 G)(Z^{n-1}) \\;\\cong\\; \\operatorname{coker}\\bigl(G(J^{n-1}) \\to G(Z^n)\\bigr).\n  \\]\n  Finally Lemma~\\ref{lem:cohomology_of_applied_resolution} identifies this cokernel\n  with the cohomology of the applied complex,\n  \\(\\operatorname{coker}(G(J^{n-1}) \\to G(Z^n)) \\cong H^n(G(J^\\bullet))\\). Composing\n  the staircase, the cokernel description, and this identification gives\n  \\((R^n G)(A) \\cong H^n(G(J^\\bullet))\\) for every \\(n \\geq 1\\); together with the\n  degree-zero case this proves the theorem for every \\(n \\in \\mathbb{N}\\).\n\n  Every long exact sequence consumed above is the one produced by the dimension-shift\n  Lemma~\\ref{lem:acyclic_dimension_shift} and its lowest-degree companion\n  Lemma~\\ref{lem:acyclic_one_iso_coker}, and is therefore grounded --- through the\n  horseshoe lift and the complex-level homology long exact sequence on which those\n  lemmas rest --- on the injective-resolution computation of \\(R^n G\\). The injective\n  objects supplied by ``enough injectives'' are themselves right-\\(G\\)-acyclic\n  (Lemma~\\ref{lem:right_derived_vanishes_injective}), which is what makes an injective\n  resolution a special case of an acyclic resolution and reconciles the present\n  formula with the defining computation \\((R^n G)(A) \\cong H^n(G(I^\\bullet))\\) for an\n  injective resolution \\(I^\\bullet\\).\n", "lean_source": "noncomputable def Functor.rightDerivedIsoOfAcyclicResolution\n    (G : 𝒜 ⥤ ℬ) [G.Additive] [PreservesFiniteLimits G]\n    (K : CochainComplex 𝒜 ℕ) (A : 𝒜) (e : A ≅ K.cycles 0)\n    (hexact : ∀ n, K.ExactAt (n + 1)) [∀ n, G.IsRightAcyclic (K.X n)] (n : ℕ) :\n    (G.rightDerived n).obj A ≅\n      ((G.mapHomologicalComplex (ComplexShape.up ℕ)).obj K).homology n := by\n\n  have stairGen : ∀ (m s : ℕ), (G.rightDerived (m + 1)).obj (K.cycles s) ≅\n      (G.rightDerived 1).obj (K.cycles (s + m)) := by\n    intro m\n    induction m with\n    | zero => exact fun s => Iso.refl _\n    | succ m ih =>\n        intro s\n        haveI : G.IsRightAcyclic (Functor.cosyzygyShortComplex K s).X₂ :=\n          inferInstanceAs (G.IsRightAcyclic (K.X s))\n        exact (G.rightDerivedShiftIsoOfAcyclic (Functor.cosyzygyShortExact K s (hexact s)) m).symm\n          ≪≫ ih (s + 1) ≪≫\n          eqToIso (congrArg (fun i => (G.rightDerived 1).obj (K.cycles i))\n            (by omega : s + 1 + m = s + (m + 1)))\n  cases n with\n  | zero =>\n      exact (G.rightDerivedZeroIsoSelf.app A) ≪≫ G.mapIso e ≪≫ G.gHomologyZeroIso K\n  | succ m =>\n      haveI : G.IsRightAcyclic (Functor.cosyzygyShortComplex K m).X₂ :=\n        inferInstanceAs (G.IsRightAcyclic (K.X m))\n      exact (G.rightDerived (m + 1)).mapIso e ≪≫ stairGen m 0 ≪≫\n        eqToIso (congrArg (fun i => (G.rightDerived 1).obj (K.cycles i)) (by omega : 0 + m = m)) ≪≫\n        G.rightDerivedOneIsoCokerOfAcyclic (Functor.cosyzygyShortExact K m (hexact m)) ≪≫\n        (G.cohomologyAppliedResolutionIso K m).symm", "proof_size_lean": 1532, "has_sorry": false, "tex_file": "chapters/Cohomology_AcyclicResolution.tex", "lean_file": "AlgebraicJacobian/Cohomology/AcyclicResolution.lean", "dep_count": 7, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 3006, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:cech_nerve": {"id": "def:cech_nerve", "type": "definition", "title": "", "chapter": "{\\v C", "statement": "ok\n[{\\v C}ech nerve of an affine open cover]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Cohomology of Schemes, \\S{\\v C}ech cohomology of\n  quasi-coherent sheaves.}\n  Let \\(X\\) be a scheme and let\n  \\(\\mathcal{U} : X = \\bigcup_{i \\in I} U_i\\) be a finite open cover of \\(X\\) by\n  affine opens, with index set \\(I\\). For a finite nonempty tuple\n  \\(i_0, \\ldots, i_p \\in I\\) write\n  \\(U_{i_0 \\ldots i_p} = U_{i_0} \\cap \\cdots \\cap U_{i_p}\\) for the corresponding\n  intersection. The \\emph{{\\v C}ech nerve} of \\(\\mathcal{U}\\) is the augmented\n  \\emph{cosimplicial} object in \\(\\operatorname{QCoh}(X)\\) whose object in\n  cosimplicial degree \\(p\\) is the direct image, along the open immersions\n  \\(j_{i_0 \\ldots i_p} : U_{i_0 \\ldots i_p} \\hookrightarrow X\\), of the restriction\n  of \\(\\mathcal{O}_X\\) (or of any chosen quasi-coherent sheaf) to the\n  \\((p+1)\\)-fold intersections,\n  \\[\n    [p] \\;\\longmapsto\\;\n      \\prod_{(i_0, \\ldots, i_p) \\in I^{p+1}}\n        (j_{i_0 \\ldots i_p})_* \\,\\bigl(\\,\\cdot\\,|_{U_{i_0 \\ldots i_p}}\\bigr),\n  \\]\n  with cofaces given by the restriction maps that omit one index and\n  codegeneracies by the maps that repeat one index; the augmentation in degree\n  \\(-1\\) is the object on all of \\(X\\). The variance is essential: the geometric\n  nerve of the cover (the iterated fibre powers of \\(\\coprod_i U_i\\) over \\(X\\),\n  introduced in \\S\\ref{sec:cech_three_part} below) is a \\emph{simplicial} object\n  in \\emph{schemes}, but applying the covariant direct-image functor turns it into\n  a \\emph{cosimplicial} object in \\(\\operatorname{QCoh}(X)\\); consequently the\n  associated alternating-coface complex is a \\emph{cochain} complex (differentials\n  raising degree), not a chain complex. When \\(X\\) is separated each intersection\n  \\(U_{i_0 \\ldots i_p}\\) is itself affine. The local affine model is the\n  \\emph{standard open covering} \\(U = \\bigcup_{i=1}^n D(f_i)\\) of an affine open\n  \\(U = \\operatorname{Spec}(A)\\) by basic opens, where \\(f_1, \\ldots, f_n \\in A\\)\n  generate the unit ideal; on such a cover the intersections are again basic opens\n  \\(D(f_{i_0} \\cdots f_{i_p})\\).", "uses": ["def:cover_cech_nerve", "def:push_pull_functor", "def:cech_nerve_cosimplicial", "lem:push_pull_id", "lem:push_pull_comp"], "lean_name": "AlgebraicGeometry.CechNerve", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def CechNerve (𝒰 : X.OpenCover) (F : X.Modules) :\n    CosimplicialObject.Augmented X.Modules :=\n  (CosimplicialObject.Augmented.whiskeringObj (Over X)ᵒᵖ X.Modules (pushPullFunctor F)).obj\n    (coverCechNerveOverAug 𝒰).rightOp", "proof_size_lean": 239, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechHigherDirectImage.lean", "dep_count": 5, "rdep_count": 4, "descendant_count": 13, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 18431, "effort_total": 0}, "def:cech_complex": {"id": "def:cech_complex", "type":  \\ldots i_p}})_*\n  \\bigl(\\mathcal{F}|_{U_{i_0 \\ldots i_p}}\\bigr)\\), and it is a complex in\n  \\(\\operatorname{QCoh}(S)\\) because each \\(U_{i_0 \\ldots i_p}\\) is affine and the\n  pushforward of a quasi-coherent sheaf along a quasi-compact quasi-separated\n  morphism is quasi-coherent.", "uses": ["def:cech_nerve", "def:relative_cech_complex_of_nerve"], "lean_name": "AlgebraicGeometry.CechComplex", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def CechComplex (f : X ⟶ S) (𝒰 : X.OpenCover) (F : X.Modules) :\n    CochainComplex S.Modules ℕ :=\n\n  relativeCechComplexOfNerve f (CechNerve 𝒰 F)", "proof_size_lean": 159, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechHigherDirectImage.lean", "dep_count": 2, "rdep_count": 6, "descendant_count": 11, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 18940, "effort_total": 0}, "def:cover_arrow": {"id": "def:cover_arrow", "type": "definition", "title": "", "chapter": "{\\v C", "statement": "ok\n[Arrow of an affine cover]\n  \n  \n  Let \\(\\mathcal{U} : X = \\bigcup_{i \\in I} U_i\\) be an affine open cover. Its\n  \\emph{cover arrow} is the single morphism\n  \\(\\coprod_{i \\in I} U_i \\longrightarrow X\\) obtained as the universal map out of\n  the coproduct induced by the open immersions \\(U_i \\hookrightarrow X\\). Packaging\n  the cover as one arrow lets the generic {\\v C}ech-nerve-of-an-arrow machinery\n  apply.", "uses": [], "lean_name": "AlgebraicGeometry.coverArrow", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def coverArrow (𝒰 : X.OpenCover) : Arrow Scheme.{u} :=\n  Arrow.mk (Sigma.desc 𝒰.f)", "proof_size_lean": 96, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechHigherDirectImage.lean", "dep_count": 0, "rdep_count": 1, "d \\) is the unit of the adjunction \\(\\bar g^* \\dashv \\bar g_*\\), the\n  second arrow is the pushforward comparison \\(p_{1*}\\bar g_* \\cong (p_1 \\bar g)_*\\),\n  the equality is the substitution \\(p_2 = p_1 \\circ \\bar g\\) of the over-triangle,\n  and the last arrow applies \\(p_{2*}\\) to the pullback comparison\n  \\(\\bar g^* p_1^* \\cong (p_1 \\bar g)^* = p_2^*\\). The two over-triangle\n  substitutions are realised as coercions along \\(p_1 \\circ \\bar g = p_2\\).", "uses": ["def:push_pull_obj"], "lean_name": "AlgebraicGeometry.pushPullMap, AlgebraicGeometry.rawPushPullMap, AlgebraicGeometry.pushPullMap_eq_raw, AlgebraicGeometry.rawPushPullMap_self, AlgebraicGeometry.rawPushPullMap_self_gen, AlgebraicGeometry.pushforwardComp_hom_app_id, AlgebraicGeometry.pushPull_unit_comp", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def pushPullMap (F : X.Modules) {Y₁ Y₂ : Over X} (g : Y₂ ⟶ Y₁) :\n    pushPullObj F Y₁ ⟶ pushPullObj F Y₂ :=\n  (pushforward Y₁.hom).map\n      ((pullbackPushforwardAdjunction g.left).unit.app\n        ((Scheme.Modules.pullback Y₁.hom).obj F)) ≫\n    (pushforwardComp g.left Y₁.hom).hom.app\n      ((Scheme.Modules.pullback g.left).obj ((Scheme.Modules.pullback Y₁.hom).obj F)) ≫\n    eqToHom (congrArg (fun q => (pushforward q).obj\n      ((Scheme.Modules.pullback g.left).obj ((Scheme.Modules.pullback Y₁.hom).obj F)))\n      (Over.w g)) ≫\n    (pushforward Y₂.hom).map ((pullbackComp g.left Y₁.hom).hom.app F) ≫\n    eqToHom (congrArg (fun q => (pushforward Y₂.hom).obj ((Scheme.Modules.pullback q).obj F))\n      (Over.w g))\n\nnoncomputable def rawPushPullMap {Z₁ Z₂ : Scheme.{u}} (a : Z₂ ⟶ Z₁)\n    (p₁ : Z₁ ⟶ X) (p₂ : Z₂ ⟶ X) (w : a ≫ p₁ = p₂) (F : X.Modules) :\n    (Scheme.Modules.pushforward p₁).obj ((Scheme.Modules.pullback p₁).obj F) ⟶\n      (Scheme.Modules.pushforward p₂).obj ((Scheme.Modules.pullback p₂).obj F) :=\n  (Scheme.Modules.pushforward p₁).map\n      ((Scheme.Modules.pullbackPushforwardAdjunction a).unit.app\n        ((Scheme.Modules.pullback p₁).obj F)) ≫\n    (Scheme.Modules.pushforwardComp a p₁).hom.app\n      ((Scheme.Modules.pullback a).obj ((Scheme.Modules.pullback p₁).obj F)) ≫\n    eqToHom (congrArg (fun q => (Scheme.Modules.pushforward q).obj\n      ((Scheme.Modules.pullback a).obj ((Scheme.Modules.pullback p₁).obj F))) w) ≫\n    (Scheme.Modules.pushforward p₂).map ((Scheme.Modules.pullbackComp a p₁).hom.app F) ≫\n    eqToHom (congrArg (fun q => (Scheme.Modules.pushforward p₂).obj\n      ((Scheme.Modules.pullback q).obj F)) w)\n\nset_option maxHeartbeats 1000000 in\n\nlemma pushPullMap_eq_raw (F : X.Modules) {Y₁ Y₂ : Over X} (g : Y₂ ⟶ Y₁) :\n    pushPullMap F g = rawPushPullMap g.left Y₁.hom Y₂.hom (Over.w g) F :=\n  rfl\n\nlemma rawPushPullMap_self {Z₁ Z₂ : Scheme.{u}} (a : Z₂ ⟶ Z₁) (p₁ : Z₁ ⟶ X)\n    (F : X.Modules) :\n    rawPushPullMap a p₁ (a ≫ p₁) rfl F =\n      (Scheme.Modules.pushforward p₁).map\n        ((Scheme.Modules.pullbackPushforwardAdjunction a).unit.app\n            ((Scheme.Modules.pullback p₁).obj F) ≫\n          (Scheme.Modules.pushforward a).map\n            ((Scheme.Modules.pullbackComp a p₁).hom.app F)) := by\n  simp only [rawPushPullMap, pushforwardComp_hom_app_id, eqToHom_refl, Category.id_comp,\n    Category.comp_id, Functor.map_comp]\n  rfl\n\nset_option maxHeartbeats 4000000 in\n\nlemma rawPushPullMap_self_gen {Z₁ Z₂ : Scheme.{u}} (a : Z₂ ⟶ Z₁) (p₁ : Z₁ ⟶ X)\n    (p₂ : Z₂ ⟶ X) (w : a ≫ p₁ = p₂) (F : X.Modules) :\n    rawPushPullMap a p₁ p₂ w F =\n      (Scheme.Modules.pushforward p₁).map\n          ((Scheme.Modules.pullbackPushforwardAdjunction a).unit.app\n              ((Scheme.Modules.pullback p₁).obj F) ≫\n            (Scheme.Modules.pushforward a).map\n              ((Scheme.Modules.pullbackComp a p₁).hom.app F)) ≫\n        eqToHom (congrArg (fun q => (Scheme.Modules.pushforward q).obj\n          ((Scheme.Modules.pullback q).obj F)) w) := by\n  subst w\n  rw [rawPushPullMap_self]\n  exact (Category.comp_id _).symm\n\nlemma pushforwardComp_hom_app_id {Z₁ Z₂ Z₃ : Scheme.{u}} (a : Z₂ ⟶ Z₁) (p : Z₁ ⟶ Z₃)\n    (M : Z₂.Modules) : (Scheme.Modules.pushforwardComp a p).hom.app M = 𝟙 _ :=\n  rfl\n\nlemma pushPull_unit_comp {A B Z : Scheme.{u}} (f : A ⟶ B) (p : B ⟶ Z)\n    (N : Z.Modules) :\n    (Scheme.Modules.pullbackPushforwardAdjunction (f ≫ p)).unit.app N =\n      (Scheme.Modules.pullbackPushforwardAdjunction p).unit.app N ≫\n        (Scheme.Modules.pushforward p).map\n          ((Scheme.Modules.pullbackPushforwardAdjunction f).unit.app\n            ((Scheme.Modules.pullback p).obj N)) ≫\n        (Scheme.Modules.pushforwardComp f p).hom.app\n          ((Scheme.Modules.pullback f).obj ((Scheme.Modules.pullback p).obj N)) ≫\n        (Scheme.Modules.pushforward (f ≫ p)).map\n          ((Scheme.Modules.pullbackComp f p).hom.app N) := by\n  have m := pushPull_unit_mate f p N\n  erw [reassoc_of% m, ← Functor.map_comp, Iso.inv_hom_id_app,\n    CategoryTheory.Functor.map_id, Category.comp_id]", "proof_size_lean": 4028, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechHigherDirectImage.lean", "dep_count": 1, "rdep_count": 5, "descendant_count": 20, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 4167, "effort_total": 0}, "lem:push_pull_id": {"id": "lem:push_pull_id", "type": "lemma", "title": "Push--pull functor — identity law", "chapter": "{\\v C", "statement": "The morphism map of Definition~\\ref{def:push_pull_map} respects identities:\n  \\(G(\\mathrm{id}_Y) = \\mathrm{id}_{G(Y)}\\) for every \\(X\\)-scheme \\(Y\\).", "uses": ["def:push_pull_obj", "def:push_pull_map"], "lean_name": "AlgebraicGeometry.pushPullMap_id", "proved": false, "mathlib_ok": false, "proof_tex": "\n  A direct calculation with comparison isomorphisms, with no sectionwise content.\n  Rewrite the head \\(p_*(\\eta)\\) followed by the pushforward comparison as the\n  conjugate-mate of the inverse pullback comparison; the identity leg then collapses\n  by the identity normalisation of the pseudofunctor together with right unitality,\n  and the two over-triangle transport coercions cancel against the unitality coercion.\n", "lean_source": "lemma pushPullMap_id (F : X.Modules) (Y : Over X) :\n    pushPullMap F (𝟙 Y) = 𝟙 (pushPullObj F Y) := by\n\n  have star := unit_conjugateEquiv (Adjunction.id (C := Y.left.Modules))\n    (Scheme.Modules.pullbackPushforwardAdjunction (𝟙 Y.left))\n    (Scheme.Modules.pullbackId Y.left).hom ((Scheme.Modules.pullback Y.hom).obj F)\n  rw [Scheme.Modules.conjugateEquiv_pullbackId_hom] at star\n  simp only [Adjunction.id_unit, NatTrans.id_app, Functor.id_obj] at star\n\n  have hru := Scheme.Modules.pseudofunctor_right_unitality (X := Y.left) (f := Y.hom)\n  have hru2 := congrArg (fun t => NatTrans.app t F) hru\n  simp only [NatTrans.comp_app, Functor.whiskerLeft_app, Functor.rightUnitor_hom_app] at hru2\n  have hpf : (Scheme.Modules.pushforwardComp (𝟙 Y.left) Y.hom).hom.app\n        ((Scheme.Modules.pullback (𝟙 Y.left)).obj ((Scheme.Modules.pullback Y.hom).obj F)) ≫\n      eqToHom (congrArg (fun q => (Scheme.Modules.pushforward q).obj\n        ((Scheme.Modules.pullback (𝟙 Y.left)).obj ((Scheme.Modules.pullback Y.hom).obj F)))\n        (Category.id_comp Y.hom)) =\n      (Scheme.Modules.pushforward Y.hom).map ((Scheme.Modules.pushforwardId Y.left).hom.app\n        ((Scheme.Modules.pullback (𝟙 Y.left)).obj ((Scheme.Modules.pullback Y.hom).obj F))) := by\n    apply Scheme.Modules.hom_ext\n    intro U; rfl\n\n  have hzig : (Scheme.Modules.pullbackPushforwardAdjunction (𝟙 Y.left)).unit.app\n        ((Scheme.Modules.pullback Y.hom).obj F) ≫\n      (Scheme.Modules.pushforwardId Y.left).hom.app\n        ((Scheme.Modules.pullback (𝟙 Y.left)).obj ((Scheme.Modules.pullback Y.hom).obj F)) ≫\n      (Scheme.Modules.pullbackId Y.left).hom.app ((Scheme.Modules.pullback Y.hom).obj F) =\n      𝟙 ((Scheme.Modules.pullback Y.hom).obj F) := by\n    have hnat := (Scheme.Modules.pushforwardId Y.left).hom.naturality\n      ((Scheme.Modules.pullbackId Y.left).hom.app ((Scheme.Modules.pullback Y.hom).obj F))\n    simp only [Functor.id_map] at hnat\n    erw [← hnat, ← reassoc_of% star]\n    exact Iso.inv_hom_id_app _ _\n\n  have hib_inner : (Scheme.Modules.pullbackComp (𝟙 Y.left) Y.hom).hom.app F ≫\n      eqToHom (congrArg (fun q => (Scheme.Modules.pullback q).obj F) (Category.id_comp Y.hom)) =\n      (Scheme.Modules.pullbackId Y.left).hom.app ((Scheme.Modules.pullback Y.hom).obj F) := by\n    rw [eqToHom_app] at hru2\n    rw [← hru2, ← Category.assoc, Iso.hom_inv_id_app]; simp\n  have hib : (Scheme.Modules.pushforward Y.hom).map\n        ((Scheme.Modules.pullbackComp (𝟙 Y.left) Y.hom).hom.app F) ≫\n      eqToHom (congrArg (fun q => (Scheme.Modules.pushforward Y.hom).obj\n        ((Scheme.Modules.pullback q).obj F)) (Category.id_comp Y.hom)) =\n      (Scheme.Modules.pushforward Y.hom).map\n        ((Scheme.Modules.pullbackId Y.left).hom.app ((Scheme.Modules.pullback Y.hom).obj F)) := by\n    have he : eqToHom (congrArg (fun q => (Scheme.Modules.pushforward Y.hom).obj\n          ((Scheme.Modules.pullback q).obj F)) (Category.id_comp Y.hom)) =\n        (Scheme.Modules.pushforward Y.hom).map\n          (eqToHom (congrArg (fun q => (Scheme.Modules.pullback q).obj F)\n            (Category.id_comp Y.hom))) := by\n      rw [eqToHom_map]\n    rw [he, ← Functor.map_comp]; exact congrArg _ hib_inner\n\n  simp only [pushPullMap, Over.id_left]\n  erw [reassoc_of% hpf, hib, ← Functor.map_comp]\n  erw [hzig, CategoryTheory.Functor.map_id]; rfl", "proof_size_lean": 3301, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechHigherDirectImage.lean", "dep_count": 2, "rdep_count": 2, "descendant_count": 16, "proof_size_tex": 414, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 7468, "effort_total": 0}, "lem:push_pull_comp": {"id": "lem:push_pull_comp", "type": "lemma", "title": "Push--pull functor — composition law", "chapter": "{\\v C", "statement": "The morphism map of Definition~\\ref{def:push_pull_map} is contravariantly functorial:\n  for composable morphisms \\(h : Y_3 \\to Y_2\\), \\(g : Y_2 \\to Y_1\\) of \\(X\\)-schemes,\n  \\[\n    G(g \\circ h) = G(h) \\circ G(g).\n  \\]\n  Together with Lemma~\\ref{lem:push_pull_id} this assembles\n  Definitions~\\ref{def:push_pull_obj}--\\ref{def:push_pull_map} into a functor\n  \\(G : (X/\\mathbf{Sch})^{\\mathrm{op}} \\to \\operatorname{QCoh}(X)\\); composing \\(G\\) with\n  the backbone of Definition~\\ref{def:cover_cech_nerve} yields the {\\v C}ech nerve of\n  Definition~\\ref{def:cech_nerve}.", "uses": ["def:push_pull_obj", "def:push_pull_map", "lem:push_pull_unit_mate", "lem:push_pull_transport_cancel"], "lean_name": "AlgebraicGeometry.pushPullMap_comp, AlgebraicGeometry.rawPushPullMap_comp, AlgebraicGeometry.pushPull_pentagon", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:push_pull_unit_mate, lem:push_pull_transport_cancel}\n  The composition identity \\(G(g \\circ h) = G(h) \\circ G(g)\\) follows from three\n  coherence facts. First, the composite adjunction unit \\(\\eta^{g \\circ h}\\) decomposes into\n  the iterated units \\(\\eta^{g}\\), \\(\\eta^{h}\\) via the mate identity of\n  Lemma~\\ref{lem:push_pull_unit_mate} and the naturality of the adjunction unit. Second,\n  the resulting pullback-side identity is the \\emph{pentagon coherence} of the pullback\n  pseudofunctor — the associativity \\(2\\)-cell relating the two bracketings of the comparison\n  isomorphism \\((p \\circ q \\circ r)^* \\cong r^* q^* p^*\\). Third, the over-triangle transport\n  coherences are absorbed by Lemma~\\ref{lem:push_pull_transport_cancel}.\n", "lean_source": "lemma pushPullMap_comp (F : X.Modules) {Y₁ Y₂ Y₃ : Over X} (g : Y₂ ⟶ Y₁) (h : Y₃ ⟶ Y₂) :\n    pushPullMap F (h ≫ g) = pushPullMap F g ≫ pushPullMap F h := by\n  rw [pushPullMap_eq_raw, pushPullMap_eq_raw, pushPullMap_eq_raw]\n  exact rawPushPullMap_comp g.left h.left Y₁.hom Y₂.hom Y₃.hom (Over.w g) (Over.w h) F\n\nlemma rawPushPullMap_comp {Z₁ Z₂ Z₃ : Scheme.{u}} (a : Z₂ ⟶ Z₁) (b : Z₃ ⟶ Z₂)\n    (p₁ : Z₁ ⟶ X) (p₂ : Z₂ ⟶ X) (p₃ : Z₃ ⟶ X)\n    (wg : a ≫ p₁ = p₂) (wh : b ≫ p₂ = p₃) (F : X.Modules) :\n    rawPushPullMap (b ≫ a) p₁ p₃ (by rw [Category.assoc, wg, wh]) F =\n      rawPushPullMap a p₁ p₂ wg F ≫ rawPushPullMap b p₂ p₃ wh F := by\n  subst wg wh\n  rw [rawPushPullMap_self a p₁ F, rawPushPullMap_self b (a ≫ p₁) F,\n      rawPushPullMap_self_gen (b ≫ a) p₁ (b ≫ a ≫ p₁) (Category.assoc b a p₁) F]\n\n  have he : eqToHom (congrArg (fun q => (Scheme.Modules.pushforward q).obj\n        ((Scheme.Modules.pullback q).obj F)) (Category.assoc b a p₁)) =\n      (Scheme.Modules.pushforward p₁).map (eqToHom (congrArg\n        (fun q => (Scheme.Modules.pushforward (b ≫ a)).obj ((Scheme.Modules.pullback q).obj F))\n        (Category.assoc b a p₁))) := by\n    rw [eqToHom_map]; rfl\n\n  have INNER : (Scheme.Modules.pullbackPushforwardAdjunction (b ≫ a)).unit.app\n          ((Scheme.Modules.pullback p₁).obj F) ≫\n        (Scheme.Modules.pushforward (b ≫ a)).map ((Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F) ≫\n        eqToHom (congrArg (fun q => (Scheme.Modules.pushforward (b ≫ a)).obj\n          ((Scheme.Modules.pullback q).obj F)) (Category.assoc b a p₁)) =\n      ((Scheme.Modules.pullbackPushforwardAdjunction a).unit.app\n            ((Scheme.Modules.pullback p₁).obj F) ≫\n          (Scheme.Modules.pushforward a).map ((Scheme.Modules.pullbackComp a p₁).hom.app F)) ≫\n        (Scheme.Modules.pushforward a).map\n          ((Scheme.Modules.pullbackPushforwardAdjunction b).unit.app\n              ((Scheme.Modules.pullback (a ≫ p₁)).obj F) ≫\n            (Scheme.Modules.pushforward b).map\n              ((Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F)) := by\n    rw [pushPull_unit_comp b a ((Scheme.Modules.pullback p₁).obj F)]\n\n    have INNER2 :\n        (Scheme.Modules.pullbackPushforwardAdjunction b).unit.app\n            ((Scheme.Modules.pullback a).obj ((Scheme.Modules.pullback p₁).obj F)) ≫\n          (Scheme.Modules.pushforward b).map\n            ((Scheme.Modules.pullbackComp b a).hom.app ((Scheme.Modules.pullback p₁).obj F) ≫\n              (Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F ≫\n              eqToHom (congrArg (fun q => (Scheme.Modules.pullback q).obj F)\n                (Category.assoc b a p₁))) =\n        (Scheme.Modules.pullbackComp a p₁).hom.app F ≫\n          (Scheme.Modules.pullbackPushforwardAdjunction b).unit.app\n              ((Scheme.Modules.pullback (a ≫ p₁)).obj F) ≫\n            (Scheme.Modules.pushforward b).map\n              ((Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F) := by\n      have key2 : (Scheme.Modules.pushforward b).map\n            ((Scheme.Modules.pullbackComp b a).hom.app ((Scheme.Modules.pullback p₁).obj F) ≫\n              (Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F ≫\n              eqToHom (congrArg (fun q => (Scheme.Modules.pullback q).obj F)\n                (Category.assoc b a p₁))) =\n          (Scheme.Modules.pushforward b).map\n            ((Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).hom.app F) ≫\n              (Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F) :=\n        congrArg _ (pushPull_pentagon a b p₁ F)\n      have nat2 : (Scheme.Modules.pullbackPushforwardAdjunction b).unit.app\n            ((Scheme.Modules.pullback a).obj ((Scheme.Modules.pullback p₁).obj F)) ≫\n          (Scheme.Modules.pushforward b).map\n            ((Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).hom.app F)) =\n          (Scheme.Modules.pullbackComp a p₁).hom.app F ≫\n            (Scheme.Modules.pullbackPushforwardAdjunction b).unit.app\n              ((Scheme.Modules.pullback (a ≫ p₁)).obj F) :=\n        ((Scheme.Modules.pullbackPushforwardAdjunction b).unit.naturality\n          ((Scheme.Modules.
