 [NatTrans.comp_app, Functor.whiskerRight_app, Functor.whiskerLeft_app,\n    Functor.associator_hom_app, eqToHom_app, Functor.comp_obj,\n    Category.id_comp] at HF\n\n  have cancel : (Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).hom.app F) ≫\n        (Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F ≫\n        (Scheme.Modules.pullbackComp b (a ≫ p₁)).inv.app F ≫\n        (Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).inv.app F) ≫\n        (Scheme.Modules.pullbackComp b a).hom.app ((Scheme.Modules.pullback p₁).obj F) ≫\n        (Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F =\n      (Scheme.Modules.pullbackComp b a).hom.app ((Scheme.Modules.pullback p₁).obj F) ≫\n        (Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F := by\n    have h1 : (Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F ≫\n        (Scheme.Modules.pullbackComp b (a ≫ p₁)).inv.app F = 𝟙 _ := Iso.hom_inv_id_app _ _\n    have h2 : (Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).hom.app F) ≫\n        (Scheme.Modules.pullback b).map ((Scheme.Modules.pullbackComp a p₁).inv.app F) = 𝟙 _ :=\n      ((Scheme.Modules.pullback b).map_comp _ _).symm.trans\n        ((congrArg (Scheme.Modules.pullback b).map (Iso.hom_inv_id_app _ _)).trans\n          ((Scheme.Modules.pullback b).map_id _))\n    simp only [Functor.comp_obj] at h1 h2 ⊢\n    rw [reassoc_of% h1, reassoc_of% h2]\n  have hcd := cancel.symm.trans (congrArg (fun t => (Scheme.Modules.pullback b).map\n    ((Scheme.Modules.pullbackComp a p₁).hom.app F) ≫\n      (Scheme.Modules.pullbackComp b (a ≫ p₁)).hom.app F ≫ t) HF)\n  rw [← Category.assoc ((Scheme.Modules.pullbackComp b a).hom.app\n        ((Scheme.Modules.pullback p₁).obj F))\n      ((Scheme.Modules.pullbackComp (b ≫ a) p₁).hom.app F), hcd]\n  simp [eqToHom_trans]\n\nset_option maxHeartbeats 1600000 in", "proof_size_lean": 7908, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "Algebraic fineOpenCoverOfSpanRangeEqTop}\\bigr)_f\\, i =\n  \\operatorname{Spec.map}\\bigl(\\text{algebraMap}\\; R\\; (\\operatorname{Localization.Away}(s_i))\\bigr)\\),\n  so that the sections over the \\(i\\)-th piece are the \\emph{away} localisation\n  \\(R_{s_i} = \\operatorname{Localization.Away}(s_i)\\) and the geometric piece is\n  \\(D(s_i)\\). This is exactly the standard open covering\n  \\(\\operatorname{Spec} R = \\bigcup_i D(s_i)\\) by basic opens, packaged as a single\n  cover object. It is the spanning-family bundle \\((s, hs)\\) that the affine\n  {\\v C}ech vanishing of Lemma~\\ref{lem:cech_acyclic_affine} is stated over.", "uses": [], "lean_name": "AlgebraicGeometry.Scheme.affineOpenCoverOfSpanRangeEqTop", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:cech_acyclic_affine": {"id": "lem:cech_acyclic_affine", "type": "lemma", "title": "", "chapter": "{\\v C", "statement": "ok\n[Standard-cover {\\v C}ech-complex vanishing on affines]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Cohomology of Schemes,\n  \\texttt{lemma-cech-cohomology-quasi-coherent-trivial} (standard-cover {\\v C}ech\n  vanishing).}\n  Let \\(U = \\operatorname{Spec}(A)\\) be an affine scheme, \\(\\mathcal{F}\\) a\n  quasi-coherent \\(\\mathcal{O}_U\\)-module, and\n  \\(\\mathcal{U} : U = \\bigcup_{i=1}^n D(f_i)\\) a standard open cover (so the\n  \\(f_i \\in A\\) generate the unit ideal). The cover is presented as the\n  spanning-family bundle \\((s : \\iota \\to A,\\; hs : \\operatorname{Ideal.span}\n  (\\operatorname{range} s) = \\top)\\) of Definition~\\ref{def:standard_affine_cover}\n  rather than as a general open cover, so the index set and the affine pieces\n  \\(D(s_i)\\) with sections \\(A_{s_i}\\) are read off directly from the spanning\n  family. Then the {\\v C}ech complex\n  \\(\\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{F})\\) of\n  Definition~\\ref{def:cech_complex} has vanishing cohomology in all positive\n  degrees:\n  \\[\n    \\check{H}^p(\\mathcal{U}, \\mathcal{F}) = 0 \\qquad \\text{for all } p > 0.\n  \\]\n  Equivalently, the extended complex\n  \\(0 \\to M \\to \\prod_{i_0} M_{f_{i_0}} \\to \\prod_{i_0 i_1} M_{f_{i_0} f_{i_1}}\n  \\to \\cdots\\) of localisations is exact. This is the standard-cover {\\v C}ech\n  vanishing only; the sheaf-cohomology Serre vanishing\n  \\(H^p(U, \\mathcal{F}) = 0\\) is the separate\n  Lemma~\\ref{lem:affine_serre_vanishing} below, obtained from this complex\n  vanishing by the basis-comparison Lemma~\\ref{lem:cech_to_cohomology_on_basis}.", "uses": ["def:cech_complex", "def:standard_affine_cover"], "lean_name": "AlgebraicGeometry.CechAcyclic.affine", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_complex}\n  Write \\(U = \\operatorname{Spec}(A)\\) and \\(\\mathcal{F}|_U = \\widetilde{M}\\) for an\n  \\(A\\)-module \\(M\\). By Definition~\\ref{def:cech_complex} the {\\v C}ech complex of\n  the standard cover is the complex of localisations\n  \\[\n    \\prod_{i_0} M_{f_{i_0}} \\;\\to\\;\n    \\prod_{i_0 i_1} M_{f_{i_0} f_{i_1}} \\;\\to\\;\n    \\prod_{i_0 i_1 i_2} M_{f_{i_0} f_{i_1} f_{i_2}} \\;\\to\\; \\cdots,\n  \\]\n  and the claim \\(\\check{H}^p = 0\\) for \\(p > 0\\) is equivalent to exactness of the\n  extended complex \\(0 \\to M \\to \\prod_{i_0} M_{f_{i_0}} \\to \\cdots\\) (whose\n  truncation is studied in Algebra, Lemma \\texttt{algebra-lemma-cover-module}).\n  Exactness may be checked after localising at an arbitrary prime\n  \\(\\mathfrak{p} \\subset A\\) (Algebra, Lemma\n  \\texttt{algebra-lemma-characterize-zero-local}). Choose an index\n  \\(i_{\\mathrm{fix}}\\) with \\(f_{i_{\\mathrm{fix}}} \\notin \\mathfrak{p}\\); then\n  \\(M_{f_{i_{\\mathrm{fix}}}, \\mathfrak{p}} = M_{\\mathfrak{p}}\\), and the\n  prescription \\(h(s)_{i_0 \\ldots i_p} = s_{i_{\\mathrm{fix}} i_0 \\ldots i_p}\\)\n  defines a contracting homotopy of the localised extended complex: a direct\n  computation gives \\((dh + hd)(s) = s\\), so the identity is homotopic to zero and\n  the localised complex is exact. As exactness holds after every localisation, the\n  extended complex is exact and \\(\\check{H}^p(\\mathcal{U}, \\mathcal{F}) = 0\\) for\n  \\(p > 0\\).\n\n  Concretely, exactness is established node-by-node from the spanning family\n  \\((s, hs)\\) of Definition~\\ref{def:standard_affine_cover}: the local-to-global\n  exactness criterion for a span of the unit ideal localises the complex at the\n  spanning elements (the away localisations \\(A_{s_r}\\)), reducing positive-degree\n  exactness of the extended complex to exactness of each localised complex; in the\n  localisation \\(A_{s_r}\\) the fixed index \\(i_{\\mathrm{fix}} = r\\) makes\n  \\(s_r\\) invertible, so the contracting homotopy\n  \\(h(s)_{i_0 \\ldots i_p} = s_{r\\, i_0 \\ldots i_p}\\) is defined globally on that\n  localisation and contracts it.\n", "lean_source": "theorem CechAcyclic.affine {R : CommRingCat.{u}} {S : Scheme.{u}}\n    (f : Spec R ⟶ S) [IsAffineHom f]\n    {ι : Type u} [Finite ι] (s : ι → R) (hs : Ideal.span (Set.range s) = ⊤)\n    (F : (Spec R).Modules) (hF : F.IsQuasicoherent) (p : ℕ) (hp : 1 ≤ p) :\n    IsZero ((CechComplex f ((Scheme.affineOpenCoverOfSpanRangeEqTop s hs).openCover) F).homology p) := by\n  sorry", "proof_size_lean": null, "has_sorry": true, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "AlgebraicJacobian/Cohomology/CechAcyclic.lean", "dep_count": 2, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": 2038, "effort_local": 2038, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2038}, "def:cech_free_presheaf_complex": {"id": "def:cech_free_presheaf_complex", "type": "definition", "title": "Free presheaf complex of a cover", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology,\n  \\texttt{lemma-cech-map-into} (the free complex \\(K(\\mathcal{U})_\\bullet\\)).}\n  Let \\(X\\) be a ringed space and \\(\\mathcal{U} : U = \\bigcup_{i \\in I} U_i\\) an\n  open covering, with \\(j_{i_0 \\ldots i_p} : U_{i_0 \\ldots i_p} \\hookrightarrow X\\)\n  the open immersion of each finite intersection. The Stacks formulation uses, for\n  each intersection \\(U_{i_0 \\ldots i_p}\\), the \\emph{extension-by-zero} presheaf\n  \\((j_{i_0 \\ldots i_p})_{!}\\,\\mathcal{O}_X|_{U_{i_0 \\ldots i_p}}\\), the presheaf of\n  modules sending an open \\(W\\) to \\(\\mathcal{O}_X(W)\\) when\n  \\(W \\subset U_{i_0 \\ldots i_p}\\) and to \\(0\\) otherwise. This extension-by-zero\n  presheaf is, canonically, the \\emph{free presheaf of modules on the representable}\n  \\(\\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots i_p})\\): writing\n  \\(\\mathbf{y}\\,V = \\operatorname{Hom}(-, V)\\) for the Yoneda presheaf of the open\n  \\(V\\) on the site of opens of \\(X\\), the free presheaf of modules\n  \\(\\operatorname{free}(\\mathbf{y}\\,V)\\) sends \\(W\\) to the free\n  \\(\\mathcal{O}_X(W)\\)-module on the set \\(\\operatorname{Hom}(W, V)\\), which is\n  \\(\\mathcal{O}_X(W)\\) if \\(W \\subset V\\) and \\(0\\) otherwise — exactly\n  extension-by-zero of \\(\\mathcal{O}_X|_V\\). Its defining universal property\n  \\[\n    \\operatorname{Hom}_{\\mathrm{PMod}(\\mathcal{O}_X)}\\bigl(\n      \\operatorname{free}(\\mathbf{y}\\,V),\\, \\mathcal{F}\\bigr)\n    \\;\\cong\\; \\mathcal{F}(V)\n  \\]\n  is the free–forgetful adjunction for presheaves of modules composed with the\n  Yoneda isomorphism \\(\\operatorname{Hom}(\\mathbf{y}\\,V, G) \\cong G(V)\\). The\n  \\emph{free presheaf complex} of \\(\\mathcal{U}\\) is the chain complex\n  \\(K(\\mathcal{U})_\\bullet\\) in the abelian category\n  \\(\\mathrm{PMod}(\\mathcal{O}_X)\\) of presheaves of \\(\\mathcal{O}_X\\)-modules whose\n  term in degree \\(p\\) is the direct sum\n  \\[\n    K(\\mathcal{U})_p\n      = \\bigoplus_{(i_0, \\ldots, i_p) \\in I^{p+1}}\n        \\operatorname{free}\\bigl(\\mathbf{y}\\,U_{i_0 \\ldots i_p}\\bigr),\n  \\]\n  with \\(K(\\mathcal{U})_p\\) placed in degree \\(p \\geq 0\\) (and \\(0\\) in negative\n  degrees), and whose differential \\(K(\\mathcal{U})_{p+1} \\to K(\\mathcal{U})_p\\) is\n  the alternating sum \\(\\sum_{j=0}^{p+1} (-1)^j\\) of the maps\n  \\(\\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots i_{p+1}}) \\to\n  \\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots \\widehat{i_j} \\ldots i_{p+1}})\\)\n  obtained by applying \\(\\operatorname{free}\\) to the representable index-dropping\n  maps \\(\\mathbf{y}\\,U_{i_0 \\ldots i_{p+1}} \\to \\mathbf{y}\\,U_{i_0 \\ldots\n  \\widehat{i_j} \\ldots i_{p+1}}\\) induced by the inclusions of opens\n  \\(U_{i_0 \\ldots i_{p+1}} \\subset U_{i_0 \\ldots \\widehat{i_j} \\ldots i_{p+1}}\\)\n  that drop the index \\(i_j\\). Each summand is a \\emph{projective} object of\n  \\(\\mathrm{PMod}(\\mathcal{O}_X)\\), because the universal property above identifies\n  \\(\\operatorname{Hom}_{\\mathcal{O}_X}(\\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots\n  i_p}), -)\\) with the exact ``sections over \\(U_{i_0 \\ldots i_p}\\)'' functor\n  \\((-)(U_{i_0 \\ldots i_p})\\); this is the structural feature exploited below.", "uses": [], "lean_name": "AlgebraicGeometry.cechFreePresheafComplex", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": null, "effort_local": 3079, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3079}, "def:section_cech_complex": {"id": "def:section_cech_complex", "type": "definition", "title": "Section {\\v C}ech complex of a presheaf of modules", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology, \\S{\\v C}ech cohomology of presheaves.}\n  Let \\(X\\) be a ringed space and \\(\\mathcal{U} : U = \\bigcup_{i \\in I} U_i\\) an open\n  covering. For a presheaf of \\(\\mathcal{O}_X\\)-modules \\(\\mathcal{F}\\), the\n  \\emph{section {\\v C}ech complex} \\(\\check{\\mathcal{C}}^\\bullet(\\mathcal{U},\n  \\mathcal{F})\\) is the cochain complex of \\(\\mathcal{O}_X(U)\\)-modules whose term in\n  degree \\(p\\) is the product of sections over the \\((p+1)\\)-fold intersections,\n  \\[\n    \\check{\\mathcal{C}}^p(\\mathcal{U}, \\mathcal{F})\n      = \\prod_{(i_0, \\ldots, i_p) \\in I^{p+1}}\n        \\mathcal{F}\\bigl(U_{i_0 \\ldots i_p}\\bigr),\n  \\]\n  each factor being the value of the ``sections over \\(U_{i_0 \\ldots i_p}\\)'' functor\n  (the evaluation of \\(\\mathcal{F}\\) at the open \\(U_{i_0 \\ldots i_p}\\)), with\n  differential the alternating sum of restriction maps\n  \\[\n    d(s)_{i_0 \\ldots i_{p+1}}\n      = \\sum_{j=0}^{p+1} (-1)^j\\,\n        s_{i_0 \\ldots \\widehat{i_j} \\ldots i_{p+1}}\n        \\big|_{U_{i_0 \\ldots i_{p+1}}}.\n  \\]\n  This object is \\emph{distinct} from the relative {\\v C}ech complex\n  \\(\\check{\\mathcal{C}}^\\bullet(\\mathfrak{U}, \\mathcal{F})\\) of\n  Definition~\\ref{def:cech_complex}: the latter is the pushforward complex with terms\n  \\(\\prod (f|_{U_{i_0 \\ldots i_p}})_*(\\mathcal{F}|_{U_{i_0 \\ldots i_p}})\\) in\n  \\(\\operatorname{QCoh}(S)\\), an object of relative sheaves over the base, whereas the\n  section {\\v C}ech complex here is the simpler complex of \\emph{global sections} of\n  \\(\\mathcal{F}\\) over the intersections, an object of \\(\\mathcal{O}_X(U)\\)-modules.\n  The two must not be conflated: the presheaf-level acyclicity argument below runs\n  entirely on this section complex.", "uses": ["def:cech_complex"], "lean_name": "AlgebraicGeometry.sectionCechComplex", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 1709, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1709}, "lem:cech_complex_hom_identification": {"id": "lem:cech_complex_hom_identification", "type": "lemma", "title": "The free complex represents the {\\v C}ech complex", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology,\n  \\texttt{lemma-cech-map-into}.}\n  Let \\(X\\) be a ringed space and \\(\\mathcal{U} : U = \\bigcup_{i \\in I} U_i\\) an\n  open covering. For every presheaf of \\(\\mathcal{O}_X\\)-modules \\(\\mathcal{F}\\)\n  there is an isomorphism of cochain complexes of \\(\\mathcal{O}_X(U)\\)-modules\n  \\[\n    \\operatorname{Hom}_{\\mathcal{O}_X}\\bigl(K(\\mathcal{U})_\\bullet, \\mathcal{F}\\bigr)\n      \\;=\\;\n    \\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{F}),\n  \\]\n  natural in \\(\\mathcal{F} \\in \\mathrm{PMod}(\\mathcal{O}_X)\\). Here the left side is\n  the cochain complex obtained by applying the contravariant\n  \\(\\operatorname{Hom}_{\\mathcal{O}_X}(-, \\mathcal{F})\\) to the chain complex\n  \\(K(\\mathcal{U})_\\bullet\\) of Definition~\\ref{def:cech_free_presheaf_complex},\n  and the right side is the section {\\v C}ech complex of\n  Definition~\\ref{def:section_cech_complex}.", "uses": ["def:cech_free_presheaf_complex", "def:section_cech_complex"], "lean_name": "AlgebraicGeometry.cechComplex_hom_identification", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_free_presheaf_complex, def:section_cech_complex}\n  The free–forgetful adjunction for presheaves of modules gives, composed with the\n  Yoneda isomorphism \\(\\operatorname{Hom}(\\mathbf{y}\\,V, \\mathcal{F}) \\cong\n  \\mathcal{F}(V)\\), the natural identification, for each multi-index,\n  \\[\n    \\operatorname{Hom}_{\\mathcal{O}_X}\\bigl(\n      \\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots i_p}),\\, \\mathcal{F}\n    \\bigr)\n    \\;\\cong\\;\n    \\operatorname{Hom}\\bigl(\\mathbf{y}\\,U_{i_0 \\ldots i_p},\\,\n      \\mathcal{F}\\bigr)\n    \\;\\cong\\;\n    \\mathcal{F}(U_{i_0 \\ldots i_p}),\n  \\]\n  where the last group is the evaluation of \\(\\mathcal{F}\\) at the open\n  \\(U_{i_0 \\ldots i_p}\\). Taking the product over multi-indices,\n  \\(\\operatorname{Hom}_{\\mathcal{O}_X}(K(\\mathcal{U})_p, \\mathcal{F}) =\n  \\prod_{i_0 \\ldots i_p} \\mathcal{F}(U_{i_0 \\ldots i_p}) =\n  \\check{\\mathcal{C}}^p(\\mathcal{U}, \\mathcal{F})\\); the direct sum\n  \\(K(\\mathcal{U})_p\\) therefore represents the functor \\(\\mathcal{F} \\mapsto\n  \\prod_{i_0 \\ldots i_p} \\mathcal{F}(U_{i_0 \\ldots i_p})\\). Under this\n  identification the \\((-1)^j\\) maps \\(\\operatorname{free}(\\mathbf{y}\\,U_{i_0\n  \\ldots i_{p+1}}) \\to \\operatorname{free}(\\mathbf{y}\\,U_{i_0 \\ldots \\widehat{i_j}\n  \\ldots i_{p+1}})\\) defining the differential of \\(K(\\mathcal{U})_\\bullet\\) become\n  exactly the alternating-sum restriction differential of\n  \\(\\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{F})\\), so the two cochain\n  complexes coincide; naturality in \\(\\mathcal{F}\\) is immediate from the\n  naturality of the free–forgetful adjunction and of Yoneda.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1585, "effort_local": 1585, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6373}, "lem:cech_free_complex_quasi_iso": {"id": "lem:cech_free_complex_quasi_iso", "type": "lemma", "title": "The free complex resolves \\(\\mathcal{O}_U\\)", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology,\n  \\texttt{lemma-homology-complex}.}\n  Let \\(X\\) be a ringed space and \\(\\mathcal{U} : U = \\bigcup_{i \\in I} U_i\\) an\n  open covering. Let \\(\\mathcal{O}_{\\mathcal{U}} \\subset \\mathcal{O}_X\\) be the\n  image presheaf of the augmentation \\(\\bigoplus_i (j_i)_{!}\\,\\mathcal{O}_X|_{U_i}\n  \\to \\mathcal{O}_X\\) (so \\(\\mathcal{O}_{\\mathcal{U}}(W) = \\mathcal{O}_X(W)\\) when\n  \\(W\\) is contained in some \\(U_i\\), and \\(0\\) otherwise). Then the homology\n  presheaves of the free presheaf complex\n  \\(K(\\mathcal{U})_\\bullet\\) of Definition~\\ref{def:cech_free_presheaf_complex}\n  vanish away from degree \\(0\\) and equal \\(\\mathcal{O}_{\\mathcal{U}}\\) in degree\n  \\(0\\):\n  \\[\n    H_i\\bigl(K(\\mathcal{U})_\\bullet\\bigr) =\n    \\begin{cases}\n      \\mathcal{O}_{\\mathcal{U}} & i = 0, \\\\\n      0 & i \\neq 0.\n    \\end{cases}\n  \\]\n  Equivalently, the augmented complex \\(\\cdots \\to K(\\mathcal{U})_1 \\to\n  K(\\mathcal{U})_0 \\to \\mathcal{O}_{\\mathcal{U}} \\to 0\\) is exact as a complex of\n  presheaves; that is, \\(K(\\mathcal{U})_\\bullet\\) is a (projective) resolution of\n  \\(\\mathcal{O}_{\\mathcal{U}}[0]\\), quasi-isomorphic to \\(\\mathcal{O}_{\\mathcal{U}}\\)\n  concentrated in degree \\(0\\).", "uses": ["def:cech_free_presheaf_complex"], "lean_name": "AlgebraicGeometry.cechFreeComplex_quasiIso", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_free_presheaf_complex}\n  Homology of a complex in \\(\\mathrm{PMod}(\\mathcal{O}_X)\\) is computed\n  \\emph{objectwise}: kernels, cokernels and hence homology presheaves are formed\n  open-by-open, so exactness of a complex of presheaves is checked sectionwise. It\n  therefore suffices to show that for every open \\(W \\subset X\\) the extended complex\n  of \\(\\mathcal{O}_X(W)\\)-modules\n  \\[\n    \\cdots \\to K(\\mathcal{U})_1(W) \\to K(\\mathcal{U})_0(W) \\to\n      \\mathcal{O}_{\\mathcal{U}}(W) \\to 0\n  \\]\n  is acyclic; in fact it is contractible. Split the index set as \\(I = I_1 \\amalg\n  I_2\\), where \\(i \\in I_1\\) iff \\(W \\subset U_i\\). If \\(I_1 = \\varnothing\\) the\n  extended complex is identically \\(0\\). If \\(I_1 \\neq \\varnothing\\) then\n  \\(\\mathcal{O}_{\\mathcal{U}}(W) = \\mathcal{O}_X(W)\\) and, by the explicit\n  description of the free presheaves \\(\\operatorname{free}(\\mathbf{y}\\,V)(W) =\n  \\mathcal{O}_X(W)\\) when \\(W \\subset V\\) and \\(0\\) otherwise, \\(K(\\mathcal{U})_p(W) =\n  \\bigoplus_{i_0 \\ldots i_p \\in I_1} \\mathcal{O}_X(W)\\) with the alternating-sum\n  differential. Fixing an index \\(i_{\\mathrm{fix}} \\in I_1\\), the prescription\n  \\[\n    h(s)_{i_0 \\ldots i_{p+1}} =\n      \\begin{cases}\n        s_{i_1 \\ldots i_{p+1}} & i_0 = i_{\\mathrm{fix}}, \\\\\n        0 & i_0 \\neq i_{\\mathrm{fix}}\n      \\end{cases}\n  \\]\n  defines a contracting homotopy: a direct computation gives \\((dh + hd)(s) = s\\),\n  so the identity of \\(K^{\\mathrm{ext}}_\\bullet(W)\\) is homotopic to zero. Hence the\n  extended complex is exact over every \\(W\\), which is the claimed vanishing of the\n  homology presheaves.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1598, "effort_local": 1598, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4677}, "lem:injective_of_adjoint": {"id": "lem:injective_of_adjoint", "type": "lemma", "title": "Right adjoint of a mono-preserving left adjoint preserves injectives", "chapter": "{\\v C", "statement": "\\textit{Provided by Mathlib\n  (\\texttt{Mathlib.CategoryTheory.Preadditive.Injective.Basic}).}\n  Let \\(L \\dashv R\\) be an adjunction between abelian (or, more generally, suitable)\n  categories such that the left adjoint \\(L\\) preserves monomorphisms. Then for every\n  injective object \\(J\\) of the target, \\(R(J)\\) is an injective object of the source.", "uses": [], "lean_name": "CategoryTheory.Injective.injective_of_adjoint", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:mod_pmod_adjunction": {"id": "lem:mod_pmod_adjunction", "type": "lemma", "title": "Sheafification is left adjoint to the inclusion of sheaves of modules", "chapter": "{\\v C", "statement": "\\textit{Provided by Mathlib\n  (\\texttt{Mathlib.Algebra.Category.ModuleCat.Presheaf.Sheafification}).}\n  For the identity ring map \\(\\alpha = \\mathbf{1}\\) over a scheme \\(X\\),\n  sheafification is left adjoint to the inclusion\n  \\(\\mathrm{Mod}(\\mathcal{O}_X) \\hookrightarrow \\mathrm{PMod}(\\mathcal{O}_X)\\) of\n  sheaves of \\(\\mathcal{O}_X\\)-modules into presheaves of \\(\\mathcal{O}_X\\)-modules:\n  \\[\n    \\operatorname{sheafification} \\;\\dashv\\; \\iota,\n    \\qquad\n    \\iota = \\text{the inclusion } X.\\mathrm{Modules} \\hookrightarrow\n    X.\\mathrm{PresheafOfModules}.\n  \\]\n  The left adjoint sheafification is exact, in particular it preserves\n  monomorphisms.", "uses": [], "lean_name": "PresheafOfModules.sheafificationAdjunction", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "lem:injective_cech_acyclic": {"id": "lem:injective_cech_acyclic", "type": "lemma", "title": "Injective modules are {\\v C}ech-acyclic", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology,\n  \\texttt{lemma-injective-trivial-cech}.}\n  Let \\(X\\) be a ringed space, let \\(\\mathcal{U} : U =\n  \\bigcup_{i \\in I} U_i\\) be any open covering, and let \\(\\mathcal{I}\\) be an\n  \\emph{injective} \\(\\mathcal{O}_X\\)-module. Then the {\\v C}ech cohomology of\n  \\(\\mathcal{I}\\) is concentrated in degree zero:\n  \\[\n    \\check{H}^p(\\mathcal{U}, \\mathcal{I}) =\n    \\begin{cases}\n      \\mathcal{I}(U) & p = 0, \\\\\n      0 & p > 0.\n    \\end{cases}\n  \\]", "uses": ["def:cech_complex", "def:section_cech_complex", "lem:cech_complex_hom_identification", "lem:cech_free_complex_quasi_iso", "lem:injective_of_adjoint", "lem:mod_pmod_adjunction"], "lean_name": "AlgebraicGeometry.injective_cech_acyclic", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_complex, def:section_cech_complex, lem:cech_complex_hom_identification, lem:cech_free_complex_quasi_iso, lem:injective_of_adjoint, lem:mod_pmod_adjunction}\n  The argument has two independent parts.\n\n  \\emph{Part 1: an injective sheaf is injective as a presheaf.} Sheafification is\n  left adjoint to the inclusion\n  \\(\\iota : \\mathrm{Mod}(\\mathcal{O}_X) \\hookrightarrow \\mathrm{PMod}(\\mathcal{O}_X)\\)\n  of sheaves of \\(\\mathcal{O}_X\\)-modules into presheaves of\n  \\(\\mathcal{O}_X\\)-modules (Lemma~\\ref{lem:mod_pmod_adjunction}), and its left\n  adjoint sheafification is exact, hence preserves monomorphisms. By\n  Lemma~\\ref{lem:injective_of_adjoint} the right adjoint \\(\\iota\\) carries injective\n  objects to injective objects; thus an injective \\(\\mathcal{O}_X\\)-module\n  \\(\\mathcal{I}\\) is injective as an object of \\(\\mathrm{PMod}(\\mathcal{O}_X)\\). In\n  particular the contravariant functor \\(\\operatorname{Hom}_{\\mathcal{O}_X}(-,\n  \\mathcal{I})\\) is exact on \\(\\mathrm{PMod}(\\mathcal{O}_X)\\).\n\n  \\emph{Part 2: vanishing.} By Lemma~\\ref{lem:cech_free_complex_quasi_iso} the free\n  presheaf complex \\(K(\\mathcal{U})_\\bullet\\) of\n  Definition~\\ref{def:cech_free_presheaf_complex} is a resolution of\n  \\(\\mathcal{O}_{\\mathcal{U}}\\) concentrated in degree \\(0\\); equivalently the\n  augmented complex \\(\\cdots \\to K(\\mathcal{U})_1 \\to K(\\mathcal{U})_0 \\to\n  \\mathcal{O}_{\\mathcal{U}} \\to 0\\) is exact in \\(\\mathrm{PMod}(\\mathcal{O}_X)\\).\n  Applying the exact functor \\(\\operatorname{Hom}_{\\mathcal{O}_X}(-, \\mathcal{I})\\)\n  of Part 1 to this exact augmented complex yields an exact complex; by the\n  identification \\(\\operatorname{Hom}_{\\mathcal{O}_X}(K(\\mathcal{U})_\\bullet,\n  \\mathcal{I}) = \\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{I})\\) of\n  Lemma~\\ref{lem:cech_complex_hom_identification} (with the section {\\v C}ech complex\n  of Definition~\\ref{def:section_cech_complex}), this is precisely the statement that\n  the section {\\v C}ech complex of \\(\\mathcal{I}\\) is exact in positive degrees, with\n  \\(\\operatorname{Hom}_{\\mathcal{O}_X}(\\mathcal{O}_{\\mathcal{U}}, \\mathcal{I}) =\n  \\mathcal{I}(U)\\) supplying degree \\(0\\). Hence\n  \\(\\check{H}^p(\\mathcal{U}, \\mathcal{I}) = 0\\) for all \\(p > 0\\) and\n  \\(\\check{H}^0(\\mathcal{U}, \\mathcal{I}) = \\mathcal{I}(U)\\). This direct route uses\n  neither enough-injectives in \\(\\mathrm{PMod}(\\mathcal{O}_X)\\) nor a right-derived\n  \\(\\delta\\)-functor identification.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 6, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 2427, "effort_local": 2427, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10398}, "lem:ses_cech_h1": {"id": "lem:ses_cech_h1", "type": "lemma", "title": "Surjectivity on sections from cofinal {\\v C}ech-$H^1$ vanishing", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology,\n  \\texttt{lemma-ses-cech-h1}.}\n  Let \\(X\\) be a ringed space and let\n  \\[\n    0 \\to \\mathcal{F} \\to \\mathcal{G} \\to \\mathcal{H} \\to 0\n  \\]\n  be a short exact sequence of \\(\\mathcal{O}_X\\)-modules. Let \\(U \\subset X\\) be\n  open. If there is a cofinal system of open coverings \\(\\mathcal{U}\\) of \\(U\\) with\n  \\(\\check{H}^1(\\mathcal{U}, \\mathcal{F}) = 0\\), then the map on sections\n  \\(\\mathcal{G}(U) \\to \\mathcal{H}(U)\\) is surjective. Equivalently, the short exact\n  sequence is exact on sections over such \\(U\\).", "uses": ["def:cech_complex"], "lean_name": "AlgebraicGeometry.ses_cech_h1", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_complex}\n  Let \\(s \\in \\mathcal{H}(U)\\). Choose an open covering \\(\\mathcal{U} : U =\n  \\bigcup_{i \\in I} U_i\\) fine enough that (a) \\(\\check{H}^1(\\mathcal{U},\n  \\mathcal{F}) = 0\\) and (b) each restriction \\(s|_{U_i}\\) lifts to a section\n  \\(s_i \\in \\mathcal{G}(U_i)\\); both can be arranged simultaneously because the\n  coverings with property (a) are cofinal and (b) holds on any sufficiently fine\n  cover (surjectivity of \\(\\mathcal{G} \\to \\mathcal{H}\\) is a local condition).\n  On the double overlaps form\n  \\[\n    s_{i_0 i_1} = s_{i_1}|_{U_{i_0 i_1}} - s_{i_0}|_{U_{i_0 i_1}}.\n  \\]\n  Because the \\(s_i\\) all lift the single section \\(s\\), the difference\n  \\(s_{i_0 i_1}\\) maps to \\(0\\) in \\(\\mathcal{H}\\), hence lies in the subsheaf\n  \\(\\mathcal{F}(U_{i_0 i_1})\\); the family \\((s_{i_0 i_1})\\) is a {\\v C}ech\n  \\(1\\)-cocycle for \\(\\mathcal{F}\\). By \\(\\check{H}^1(\\mathcal{U}, \\mathcal{F}) = 0\\)\n  it is a coboundary: there are \\(t_i \\in \\mathcal{F}(U_i)\\) with\n  \\(s_{i_0 i_1} = t_{i_1}|_{U_{i_0 i_1}} - t_{i_0}|_{U_{i_0 i_1}}\\). Then the\n  corrected sections \\(s_i - t_i \\in \\mathcal{G}(U_i)\\) agree on overlaps, so by the\n  sheaf condition they glue to a global section of \\(\\mathcal{G}\\) over \\(U\\) whose\n  image in \\(\\mathcal{H}\\) is \\(s\\). Hence \\(\\mathcal{G}(U) \\to \\mathcal{H}(U)\\) is\n  surjective.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 1323, "effort_local": 1323, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1323}, "lem:affine_serre_vanishing": {"id": "lem:affine_serre_vanishing", "type": "lemma", "title": "Serre vanishing on affines", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology of Schemes, Tag 02KG\n  (\\texttt{lemma-quasi-coherent-affine-cohomology-zero}, Serre vanishing on\n  affines).}\n  Let \\(U\\) be an affine scheme and \\(\\mathcal{F}\\) a quasi-coherent\n  \\(\\mathcal{O}_U\\)-module. Then the sheaf cohomology of \\(\\mathcal{F}\\) vanishes in\n  all positive degrees:\n  \\[\n    H^p(U, \\mathcal{F}) = 0 \\qquad \\text{for all } p > 0.\n  \\]", "uses": ["lem:cech_acyclic_affine", "lem:cech_to_cohomology_on_basis"], "lean_name": "AlgebraicGeometry.affine_serre_vanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:cech_acyclic_affine, lem:cech_to_cohomology_on_basis}\n  Take the affine opens of \\(U\\) as a basis \\(\\mathcal{B}\\) of the topology and the\n  standard open covers of affine opens as the admissible covers. The intersection of\n  two standard opens in an affine is again a standard open, so \\(\\mathcal{B}\\) is\n  closed under the relevant intersections; and the standard covers form a cofinal\n  system among the open covers of any basic open. The standard-cover {\\v C}ech\n  vanishing of Lemma~\\ref{lem:cech_acyclic_affine} supplies the acyclicity\n  hypothesis. The {\\v C}ech-to-cohomology comparison on a basis\n  (Lemma~\\ref{lem:cech_to_cohomology_on_basis}) then identifies the sheaf cohomology\n  of \\(\\mathcal{F}\\) on each basic open with its {\\v C}ech cohomology for a standard\n  cover, whence \\(H^p(U, \\mathcal{F}) = 0\\) for all \\(p > 0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 847, "effort_local": 847, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 18072}, "lem:cech_to_cohomology_on_basis": {"id": "lem:cech_to_cohomology_on_basis", "type": "lemma", "title": "{\\v C}ech-to-cohomology comparison on a basis", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology, Tag 01EO, Lemma\n  \\texttt{lemma-cech-vanish-basis}.}\n  Let \\(X\\) be a ringed space, let \\(\\mathcal{B}\\) be a basis for its topology, let\n  \\(\\mathcal{F}\\) be an \\(\\mathcal{O}_X\\)-module, and suppose there is a set\n  \\(\\mathrm{Cov}\\) of open coverings such that: (1) every \\(\\mathcal{U} :\n  U = \\bigcup_{i \\in I} U_i\\) in \\(\\mathrm{Cov}\\) has \\(U, U_i \\in \\mathcal{B}\\) and\n  all intersections \\(U_{i_0 \\ldots i_p} \\in \\mathcal{B}\\); (2) for each\n  \\(U \\in \\mathcal{B}\\) the coverings of \\(U\\) occurring in \\(\\mathrm{Cov}\\) are\n  cofinal among all open coverings of \\(U\\); and (3) for every \\(\\mathcal{U} \\in\n  \\mathrm{Cov}\\) the {\\v C}ech cohomology vanishes,\n  \\(\\check{H}^p(\\mathcal{U}, \\mathcal{F}) = 0\\) for all \\(p > 0\\). Then\n  \\[\n    H^p(U, \\mathcal{F}) = 0 \\qquad \\text{for all } p > 0 \\text{ and any }\n      U \\in \\mathcal{B}.\n  \\]\n  This is the basis-comparison vehicle that upgrades the standard-cover {\\v C}ech\n  vanishing of Lemma~\\ref{lem:cech_acyclic_affine} to the Serre vanishing of\n  Lemma~\\ref{lem:affine_serre_vanishing}: instantiating \\(\\mathcal{B}\\) as the affine\n  opens and \\(\\mathrm{Cov}\\) as the standard affine covers, condition (3) is exactly\n  Lemma~\\ref{lem:cech_acyclic_affine}. The formal target of this lemma is the\n  \\emph{vanishing} conclusion \\(H^p(U, \\mathcal{F}) = 0\\) for \\(p > 0\\) under\n  hypotheses (1)--(3), not an explicit isomorphism \\(\\check{H}^p(\\mathcal{U},\n  \\mathcal{F}) \\cong H^p(U, \\mathcal{F})\\) of {\\v C}ech and sheaf cohomology; only\n  the positive-degree vanishing is needed downstream, and it is all the statement\n  establishes.", "uses": ["def:cech_complex", "lem:injective_cech_acyclic", "lem:ses_cech_h1", "lem:cech_acyclic_affine"], "lean_name": "AlgebraicGeometry.cech_eq_cohomology_of_basis", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:injective_cech_acyclic, lem:ses_cech_h1, lem:cech_acyclic_affine}\n  Say that an \\(\\mathcal{O}_X\\)-module has \\emph{vanishing higher {\\v C}ech\n  cohomology for \\(\\mathrm{Cov}\\)} if condition (3) holds for it. We argue by a\n  dimension shift, taking \\(\\mathcal{F}\\) (with vanishing higher {\\v C}ech\n  cohomology for \\(\\mathrm{Cov}\\)) as the inductive variable and using no input from\n  affine sheaf-cohomology vanishing.\n\n  Embed \\(\\mathcal{F} \\hookrightarrow \\mathcal{I}\\) into an injective\n  \\(\\mathcal{O}_X\\)-module \\(\\mathcal{I}\\). By\n  Lemma~\\ref{lem:injective_cech_acyclic} the injective \\(\\mathcal{I}\\) has\n  \\(\\check{H}^p(\\mathcal{U}, \\mathcal{I}) = 0\\) for all \\(p > 0\\) and every cover, in\n  particular for every \\(\\mathcal{U} \\in \\mathrm{Cov}\\). Put \\(\\mathcal{Q} =\n  \\mathcal{I}/\\mathcal{F}\\), giving the short exact sequence\n  \\[\n    0 \\to \\mathcal{F} \\to \\mathcal{I} \\to \\mathcal{Q} \\to 0.\n  \\]\n  For each \\(U \\in \\mathcal{B}\\) the coverings of \\(\\mathrm{Cov}\\) are cofinal among\n  coverings of \\(U\\) (condition (2)) and \\(\\check{H}^1(\\mathcal{U}, \\mathcal{F}) =\n  0\\) for them, so Lemma~\\ref{lem:ses_cech_h1} makes the sequence exact on sections,\n  \\[\n    0 \\to \\mathcal{F}(U) \\to \\mathcal{I}(U) \\to \\mathcal{Q}(U) \\to 0,\n    \\qquad U \\in \\mathcal{B}.\n  \\]\n  Since by condition (1) every term of a {\\v C}ech complex for a cover\n  \\(\\mathcal{U} \\in \\mathrm{Cov}\\) is a product of values over elements of\n  \\(\\mathcal{B}\\), this section-level exactness yields a short exact sequence of\n  {\\v C}ech complexes\n  \\[\n    0 \\to \\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{F}) \\to\n      \\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{I}) \\to\n      \\check{\\mathcal{C}}^\\bullet(\\mathcal{U}, \\mathcal{Q}) \\to 0,\n  \\]\n  and hence a long exact sequence of {\\v C}ech cohomology. As\n  \\(\\check{H}^p(\\mathcal{U}, \\mathcal{F}) = \\check{H}^p(\\mathcal{U}, \\mathcal{I}) =\n  0\\) for \\(p > 0\\), the long exact sequence forces \\(\\check{H}^p(\\mathcal{U},\n  \\mathcal{Q}) = 0\\) for all \\(p > 0\\): the quotient \\(\\mathcal{Q}\\) again has\n  vanishing higher {\\v C}ech cohomology for \\(\\mathrm{Cov}\\).\n\n  Now run the sheaf-cohomology long exact sequence of \\(0 \\to \\mathcal{F} \\to\n  \\mathcal{I} \\to \\mathcal{Q} \\to 0\\) over a fixed \\(U \\in \\mathcal{B}\\). The\n  injective \\(\\mathcal{I}\\) has \\(H^n(U, \\mathcal{I}) = 0\\) for \\(n > 0\\). The\n  section-level surjectivity \\(\\mathcal{I}(U) = H^0(U, \\mathcal{I}) \\to H^0(U,\n  \\mathcal{Q}) = \\mathcal{Q}(U)\\) established above makes the connecting map into\n  \\(H^1(U, \\mathcal{F})\\) zero, whence \\(H^1(U, \\mathcal{F}) = 0\\). Applying the\n  same conclusion to \\(\\mathcal{Q}\\) (another module with vanishing higher {\\v C}ech\n  cohomology for \\(\\mathrm{Cov}\\)) gives \\(H^1(U, \\mathcal{Q}) = 0\\), and then the\n  long exact sequence with \\(H^1(U, \\mathcal{I}) = H^2(U, \\mathcal{I}) = 0\\) forces\n  \\(H^2(U, \\mathcal{F}) = 0\\). Iterating the dimension shift — at each stage\n  \\(\\mathcal{Q}\\) plays the role of \\(\\mathcal{F}\\) — gives \\(H^p(U, \\mathcal{F}) =\n  0\\) for all \\(p > 0\\) and every \\(U \\in \\mathcal{B}\\).\n\n  The argument never uses affine sheaf-cohomology vanishing\n  (Lemma~\\ref{lem:affine_serre_vanishing}); its only {\\v C}ech-vanishing input is\n  condition (3), which on the affine instantiation is supplied by the standard-cover\n  {\\v C}ech vanishing of Lemma~\\ref{lem:cech_acyclic_affine}. Thus the dependency\n  \\(\\text{affine Serre vanishing} \\to \\text{this lemma}\\) is one-directional and the\n  graph is acyclic.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 3466, "effort_local": 3466, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 17225}, "lem:cech_augmented_resolution": {"id": "lem:cech_augmented_resolution", "type": "lemma", "title": "The augmented {\\v C}ech complex is a resolution", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology of Schemes,\n  \\texttt{lemma-cech-cohomology-quasi-coherent-trivial} (proof).}\n  Let \\(\\mathcal{F}\\) be a quasi-coherent \\(\\mathcal{O}_X\\)-module and let\n  \\(\\mathfrak{U} : X = \\bigcup_{i \\in I} U_i\\) be a finite affine open cover with all\n  intersections affine. Form the augmented {\\v C}ech complex on \\(X\\),\n  \\[\n    0 \\;\\to\\; \\mathcal{F} \\;\\to\\; \\mathcal{C}^0 \\;\\to\\; \\mathcal{C}^1 \\;\\to\\;\n    \\mathcal{C}^2 \\;\\to\\; \\cdots,\n    \\qquad\n    \\mathcal{C}^p \\;=\\; \\prod_{(i_0, \\ldots, i_p) \\in I^{p+1}}\n      (j_{i_0 \\ldots i_p})_*\\bigl(\\mathcal{F}|_{U_{i_0 \\ldots i_p}}\\bigr),\n  \\]\n  the degree-\\(p\\) term being the degree-\\(p\\) object of the {\\v C}ech nerve of\n  Definition~\\ref{def:cech_nerve}, with augmentation the canonical map\n  \\(\\mathcal{F} \\to \\mathcal{C}^0\\). This augmented complex is exact; that is, the\n  {\\v C}ech nerve is a resolution of \\(\\mathcal{F}\\) in \\(\\operatorname{QCoh}(X)\\).", "uses": ["def:cech_nerve", "lem:cech_acyclic_affine"], "lean_name": "AlgebraicGeometry.cechAugmented_exact", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:cech_nerve, lem:cech_acyclic_affine}\n  Exactness of a complex of sheaves is a local question on \\(X\\), so it may be\n  checked on the stalks, equivalently over each affine open of a basis. Restricting\n  to an affine open \\(U = \\operatorname{Spec}(A)\\) on which \\(\\mathcal{F}|_U =\n  \\widetilde{M}\\) and over which the cover restricts to a standard cover \\(U =\n  \\bigcup D(f_i)\\), the augmented {\\v C}ech complex becomes the extended complex of\n  localisations\n  \\(0 \\to M \\to \\prod_{i_0} M_{f_{i_0}} \\to \\prod_{i_0 i_1} M_{f_{i_0} f_{i_1}} \\to\n  \\cdots\\). Its exactness is exactly the standard-cover vanishing of\n  Lemma~\\ref{lem:cech_acyclic_affine}, witnessed by the prime-local contracting\n  homotopy \\(h(s)_{i_0 \\ldots i_p} = s_{i_{\\mathrm{fix}} i_0 \\ldots i_p}\\). As this\n  holds over every affine of the basis, the augmented complex is exact on \\(X\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 865, "effort_local": 865, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2903}, "lem:higher_direct_image_presheaf": {"id": "lem:higher_direct_image_presheaf", "type": "lemma", "title": "Presheaf description of the higher direct images", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology, Tag 01XJ\n  (\\texttt{lemma-describe-higher-direct-images}).}\n  Let \\(f : X \\to S\\) be a morphism of schemes and \\(\\mathcal{G}\\) an\n  \\(\\mathcal{O}_X\\)-module, and assume the category \\(X.\\mathrm{Modules}\\) of\n  \\(\\mathcal{O}_X\\)-modules has injective resolutions\n  (\\([\\,\\mathrm{HasInjectiveResolutions}\\;X.\\mathrm{Modules}\\,]\\)), so that the\n  derived pushforward \\(R^k f_* = (f_*).\\mathrm{rightDerived}\\,k\\) is defined (see the\n  NOTE on Definition~\\ref{def:higher_direct_image}). For every \\(k \\geq 0\\) the\n  higher direct image\n  \\(R^k f_*\\mathcal{G} = (f_*).\\mathrm{rightDerived}\\,k\\,(\\mathcal{G})\\) is the sheaf\n  on \\(S\\) associated to the presheaf\n  \\[\n    V \\;\\longmapsto\\; H^k\\bigl(f^{-1}(V), \\mathcal{G}|_{f^{-1}(V)}\\bigr),\n    \\qquad V \\subseteq S \\text{ open},\n  \\]\n  with the evident restriction maps. In particular \\(R^k f_*\\mathcal{G}\\) vanishes\n  iff \\(H^k(f^{-1}(V), \\mathcal{G}|_{f^{-1}(V)}) = 0\\) for every \\(V\\) in a basis of\n  the topology of \\(S\\); since the affine opens form such a basis, it suffices to\n  check the vanishing on affine \\(V\\). This is the local-on-the-base description\n  through which \\(f_*\\)-acyclicity is reduced to absolute cohomology vanishing on\n  preimages.", "uses": ["def:higher_direct_image"], "lean_name": "AlgebraicGeometry.higherDirectImage_isSheafify_presheafCohomology", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:higher_direct_image}\n  Choose an injective resolution \\(\\mathcal{G} \\to \\mathcal{I}^\\bullet\\) in\n  \\(\\mathcal{O}_X\\)-modules. By definition \\(R^k f_*\\mathcal{G}\\) is the \\(k\\)-th\n  cohomology sheaf of the complex \\(f_*\\mathcal{I}^\\bullet\\); since the abelian\n  structure on \\(\\mathcal{O}_S\\)-modules computes cokernels and kernels objectwise on\n  the level of presheaves and then sheafifies, that cohomology sheaf is the\n  sheafification of the presheaf \\(V \\mapsto H^k\\bigl((f_*\\mathcal{I}^\\bullet)(V)\\bigr)\n  = H^k\\bigl(\\mathcal{I}^\\bullet(f^{-1}(V))\\bigr) = H^k(f^{-1}(V), \\mathcal{G}|_{f^{-1}(V)})\\),\n  the last equality because \\(\\mathcal{I}^\\bullet|_{f^{-1}(V)}\\) is an injective (hence\n  acyclic) resolution computing the absolute cohomology of \\(f^{-1}(V)\\). Evaluation\n  of a sheafification vanishes exactly when the underlying presheaf vanishes on a basis,\n  giving the stated affine-local criterion.\n\n  The comparison identifying \\((f_*).\\mathrm{rightDerived}\\,k\\) with the\n  sheafification of the cohomology presheaf \\(V \\mapsto H^k(f^{-1}(V),\n  \\mathcal{G}|_{f^{-1}(V)})\\) is constructed directly from injective resolutions\n  in \\(X.\\mathrm{Modules}\\): cohomology in \\(S.\\mathrm{Modules}\\) is the\n  sheafification of the objectwise (presheaf-level) homology, because the\n  sheafification/inclusion adjunction preserves the finite limits and colimits\n  computing kernels and cokernels. No presheaf-level \\(\\delta\\)-functor formalism\n  is required.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 1469, "effort_local": 1469, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1469}, "lem:open_immersion_pushforward_comp": {"id": "lem:open_immersion_pushforward_comp", "type": "lemma", "title": "Affine open immersions are $(\\cdot)_*$-acyclic and degenerate the composition", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology of Schemes,\n  \\texttt{lemma-relative-affine-vanishing}.}\n  Let \\(X\\) be separated, \\(j : U \\hookrightarrow X\\) the open immersion of an affine\n  open \\(U\\), and \\(f : X \\to S\\) any morphism, with composite \\(g := f \\circ j : U\n  \\to S\\). Then:\n  \\begin{enumerate}\n    \\item \\(j\\) is an affine morphism (an open immersion of an affine open into a\n      separated scheme), so its higher direct images vanish: \\(R^q j_*\\mathcal{H} = 0\\)\n      for all \\(q \\geq 1\\) and every quasi-coherent \\(\\mathcal{O}_U\\)-module\n      \\(\\mathcal{H}\\); and\n    \\item consequently, for every quasi-coherent \\(\\mathcal{H}\\) on \\(U\\) and every\n      \\(k \\geq 0\\),\n      \\[\n        R^k f_*\\bigl(j_*\\mathcal{H}\\bigr) \\;\\cong\\; R^k g_*\\mathcal{H}.\n      \\]\n  \\end{enumerate}", "uses": ["lem:affine_serre_vanishing", "lem:higher_direct_image_presheaf"], "lean_name": "AlgebraicGeometry.higherDirectImage_openImmersion_comp", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:affine_serre_vanishing, lem:higher_direct_image_presheaf, lem:acyclic_resolution_computes_derived}\n  (1) An open immersion of an affine open \\(U\\) into a separated scheme \\(X\\) is an\n  affine morphism: separatedness makes the immersion \\(j\\) quasi-separated and the\n  preimage of any affine open of \\(X\\) meets \\(U\\) in an affine, so \\(j\\) is affine.\n  The relative affine vanishing for affine morphisms then gives \\(R^q j_*\\mathcal{H} =\n  0\\) for \\(q \\geq 1\\); concretely, by the presheaf description\n  (Lemma~\\ref{lem:higher_direct_image_presheaf}) \\(R^q j_*\\mathcal{H}\\) is the\n  sheafification of \\(V \\mapsto H^q(j^{-1}(V), \\mathcal{H})\\), and for affine \\(V\\) the\n  preimage \\(j^{-1}(V)\\) is affine, on which the Serre vanishing of\n  Lemma~\\ref{lem:affine_serre_vanishing} kills \\(H^q\\) for \\(q \\geq 1\\).\n\n  (2) Choose an injective resolution \\(\\mathcal{H} \\to \\mathcal{I}^\\bullet\\) in\n  \\(\\mathcal{O}_U\\)-modules and apply \\(j_*\\) degreewise. Since each \\(\\mathcal{I}^n\\)\n  is \\(j_*\\)-acyclic by part (1) (\\(R^q j_*\\mathcal{I}^n = 0\\) for \\(q \\geq 1\\)), the\n  complex \\(j_*\\mathcal{I}^\\bullet\\) is a resolution of \\(j_*\\mathcal{H}\\).\n\n  Each \\(j_*\\mathcal{I}^n\\) is \\(f_*\\)-acyclic. By the presheaf description\n  (Lemma~\\ref{lem:higher_direct_image_presheaf}), \\(R^k f_*(j_*\\mathcal{I}^n)\\) is the\n  sheafification of\n  \\[\n    V \\;\\longmapsto\\; H^k\\bigl(f^{-1}(V), (j_*\\mathcal{I}^n)|_{f^{-1}(V)}\\bigr)\n      \\;=\\; H^k\\bigl(U \\cap f^{-1}(V),\\, \\mathcal{I}^n|_{U \\cap f^{-1}(V)}\\bigr),\n  \\]\n  the equality because \\((j_*\\mathcal{I}^n)|_{f^{-1}(V)}\\) is the pushforward of\n  \\(\\mathcal{I}^n|_{U \\cap f^{-1}(V)}\\) along the open immersion\n  \\(U \\cap f^{-1}(V) \\hookrightarrow f^{-1}(V)\\), which leaves cohomology unchanged. For\n  \\(V = \\operatorname{Spec}(A) \\subseteq S\\) affine, \\(f^{-1}(V)\\) is quasi-compact and,\n  \\(X\\) being separated and \\(j\\) affine, the affine open \\(U\\) meets it in the affine\n  open \\(U \\cap f^{-1}(V)\\); hence by Serre vanishing\n  Lemma~\\ref{lem:affine_serre_vanishing} the cohomology\n  \\(H^k(U \\cap f^{-1}(V),\\, \\mathcal{I}^n|_{U \\cap f^{-1}(V)}) = 0\\) for \\(k \\geq 1\\).\n  Since the affine opens form a basis of \\(S\\), this forces\n  \\(R^k f_*(j_*\\mathcal{I}^n) = 0\\) for all \\(k \\geq 1\\).\n\n  Thus \\(j_*\\mathcal{I}^\\bullet\\) is an \\(f_*\\)-acyclic resolution of\n  \\(j_*\\mathcal{H}\\), and the acyclic-resolution comparison\n  Lemma~\\ref{lem:acyclic_resolution_computes_derived} applied with \\(G = f_*\\) gives,\n  for every \\(k\\),\n  \\[\n    R^k f_*\\bigl(j_*\\mathcal{H}\\bigr)\n      \\;\\cong\\; H^k\\bigl(f_*(j_*\\mathcal{I}^\\bullet)\\bigr)\n      \\;=\\; H^k\\bigl((f \\circ j)_*\\mathcal{I}^\\bullet\\bigr)\n      \\;=\\; R^k g_*\\mathcal{H},\n  \\]\n  the middle equality because \\(f_* \\circ j_* = (f \\circ j)_* = g_*\\), and the last\n  because \\(\\mathcal{I}^\\bullet\\) is an injective resolution of \\(\\mathcal{H}\\)\n  computing \\(R^k g_*\\mathcal{H}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 2866, "effort_local": 2866, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 22407}, "lem:cech_term_pushforward_acyclic": {"id": "lem:cech_term_pushforward_acyclic", "type": "lemma", "title": "Each {\\v C}ech term is $f_*$-acyclic", "chapter": "{\\v C", "statement": "\\textit{Source: Stacks Project, Cohomology of Schemes,\n  \\texttt{lemma-relative-affine-vanishing} (relative affine vanishing).}\n  Let \\(f : X \\to S\\) be separated and quasi-compact, \\(\\mathcal{F}\\) a\n  quasi-coherent \\(\\mathcal{O}_X\\)-module, and \\(\\mathfrak{U}\\) a finite affine open\n  cover of \\(X\\) with all intersections affine. Then for every \\(p \\geq 0\\) the\n  degree-\\(p\\) {\\v C}ech term \\(\\mathcal{C}^p =\n  \\prod_{i_0 \\ldots i_p} (j_{i_0 \\ldots i_p})_*(\\mathcal{F}|_{U_{i_0 \\ldots i_p}})\\)\n  is right \\((\\,\\cdot\\,)_*\\)-acyclic for the pushforward \\(f_*\\):\n  \\[\n    (f_*).\\mathrm{rightDerived}\\,k\\,(\\mathcal{C}^p) = 0\n      \\qquad \\text{for all } k \\geq 1.\n  \\]", "uses": ["lem:affine_serre_vanishing", "def:cech_nerve", "lem:higher_direct_image_presheaf", "lem:open_immersion_pushforward_comp"], "lean_name": "AlgebraicGeometry.cechTerm_pushforward_acyclic", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:affine_serre_vanishing, def:cech_nerve, lem:higher_direct_image_presheaf, lem:open_immersion_pushforward_comp}\n  A product of acyclic objects is acyclic, so it suffices to treat a single factor\n  \\((j_s)_*(\\mathcal{F}|_{U_s})\\), where \\(s = (i_0, \\ldots, i_p)\\), \\(U_s =\n  U_{i_0 \\ldots i_p}\\) is affine, and \\(j_s : U_s \\hookrightarrow X\\) is the open\n  immersion. Acyclicity for \\(f_*\\) is a local question on \\(S\\): the derived\n  pushforward \\(R^k f_*\\, \\mathcal{G}\\) is the sheaf associated to the presheaf\n  \\(V \\mapsto H^k(f^{-1}(V), \\mathcal{G}|_{f^{-1}(V)})\\), so it vanishes for\n  \\(k \\geq 1\\) iff that cohomology vanishes for all affine \\(V \\subseteq S\\).\n  Restricting to such a \\(V = \\operatorname{Spec}(A)\\), the base change \\(f_V :\n  f^{-1}(V) \\to V\\) is again separated and quasi-compact over the separated base\n  \\(V\\), hence \\(f^{-1}(V)\\) is separated and the affine \\(U_s\\) meets it in the\n  affine open \\(U_s \\cap f^{-1}(V)\\).\n\n  Now decompose the structure map \\(g_s := f \\circ j_s : U_s \\to S\\). First,\n  \\(j_s\\) is the inclusion of an affine open into the separated scheme \\(X\\), hence\n  an affine morphism, so the higher direct images \\(R^q (j_s)_*\\) vanish for\n  \\(q \\geq 1\\). By Lemma~\\ref{lem:open_immersion_pushforward_comp} part (2),\n  \\(R^k f_*\\bigl((j_s)_*(\\mathcal{F}|_{U_s})\\bigr) \\cong\n  R^k (g_s)_*(\\mathcal{F}|_{U_s})\\). Second, working locally over an affine\n  \\(V \\subseteq S\\) as above, \\(g_s\\) restricts to a morphism of affine schemes\n  \\(U_s \\cap f^{-1}(V) \\to V\\), which is an affine morphism; by the relative affine\n  vanishing \\(R^k (g_s)_*(\\mathcal{F}|_{U_s}) = 0\\) for \\(k \\geq 1\\). That relative\n  vanishing is itself a consequence of Serre vanishing\n  (Lemma~\\ref{lem:affine_serre_vanishing}): \\(R^k(g_s)_*\\mathcal{G}\\) is the\n  sheafification of \\(V \\mapsto H^k(g_s^{-1}(V), \\mathcal{G})\\), and for affine\n  \\(V\\) the preimage \\(g_s^{-1}(V)\\) is affine, on which higher cohomology of a\n  quasi-coherent sheaf vanishes. Combining, \\(R^k f_*(\\mathcal{C}^p) = 0\\) for all\n  \\(k \\geq 1\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Cohomology_CechHigherDirectImage.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 2043, "effort_local": 2043, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 24450}, "lem:cech_computes_cohomology": {"id": "lem:cech_computes_cohomology", "type": "lemma", "title": "", "chapter": "{\\v C", "statement": "ok\n[{\\v C}ech complex computes the higher direct images]\n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Stacks Project, Cohomology of Schemes, Tag 02KE\n  (\\texttt{lemma-cech-cohomology-quasi-coherent}) and\n  \\texttt{lemma-quasi-coherence-higher-direct-images-application}.}\n  Let \\(f : X \\to S\\) be a separated quasi-compact morphism of schemes, let\n  \\(\\mathcal{F}\\) be a quasi-coherent \\(\\mathcal{O}_X\\)-module, and let\n  \\(\\mathfrak{U} : X = \\bigcup_{i \\in I} U_i\\) be a finite affine open cover of\n  \\(X\\) (so, by separatedness, every intersection \\(U_{i_0 \\ldots i_p}\\) is\n  affine). Then the cohomology sheaves of the relative {\\v C}ech complex\n  \\(\\check{\\mathcal{C}}^\\bullet(\\mathfrak{U}, \\mathcal{F})\\) of\n  Definition~\\ref{def:cech_complex} compute the higher direct images: for every\n  \\(i \\geq 0\\) there is a canonical isomorphism of \\(\\mathcal{O}_S\\)-modules\n  \\[\n    H^i\\bigl(\\check{\\mathcal{C}}^\\bullet(\\mathfrak{U}, \\mathcal{F})\\bigr)\n      \\;\\cong\\; R^i f_*\\mathcal{F}.\n  \\]\n  In particular, over an affine base \\(S = \\operatorname{Spec}(A)\\), taking global\n  sections gives \\(H^i(X, \\mathcal{F}) = \\check{H}^i(\\mathfrak{U}, \\mathcal{F}) =\n  H^0(S, R^i f_*\\mathcal{F})\\) as \\(A\\)-modules for all \\(i\\).\n\n  Two points about the precise form of the comparison should be noted. First, the\n  derived-functor higher direct image \\(R^i f_*\\mathcal{F}\\) on the right-hand side\n  is the one obtained from injective resolutions, which is available only when the\n  category of \\(\\mathcal{O}_X\\)-modules has enough injectives; accordingly this\n  comparison is asserted under the hypothesis that injective resolutions exist in\n  \\(\\operatorname{QCoh}(X)\\), and it compares the (always-defined) {\\v C}ech higher\n  direct image \\(H^i(\\check{\\mathcal{C}}^\\bullet(\\mathfrak{U}, \\mathcal{F}))\\)\n  against the derived-functor one only in that case. Second, we assert the comparison in the\n  weak form of the \\emph{existence} of an isomorphism, i.e.\\ as\n  \\(\\bigl(H^i(\\check{\\mathcal{C}}^\\bullet(\\mathfrak{U}, \\mathcal{F})) \\cong\n  R^i f_*\\mathcal{F}\\bigr)\\) without singling out a chosen natural isomorphism.\n  This existence statement is all the downstream consumers (representability of the\n  relative Picard functor, local triviality of the comparison) require: they use\n  only that the unconditional {\\v C}ech \\(R^i f_*\\) and the derived-functor\n  \\(R^i f_*\\) agree as objects, never a spec // Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
  const sc  = network.getScale();
  if (e.ctrlKey) {
    const f        = e.deltaY > 0 ? 0.9 : 1 / 0.9;
    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, sc * f));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    let nx = pos.x + e.deltaX / sc;
    let ny = pos.y + e.deltaY / sc;
    if (graphBounds) {
      nx = Math.max(graphBounds.left, Math.min(graphBounds.right,  nx));
      ny = Math.max(graphBounds.top,  Math.min(graphBounds.bottom, ny));
    }
    network.moveTo({ position: { x: nx, y: ny }, animation: false });
  }
}, { capture: true, passive: false });

// ── Apply current filter state to the canvas ────────────────────────────────

function apply() {
  const vis   = visibleSet();
  const nodes = graphData.nodes.filter(n => vis.has(n.id));
  const edges = graphData.edges.filter(e => vis.has(e.from) && vis.has(e.to));

  nodesDS.clear(); edgesDS.clear();
  nodesDS.add(nodes); edgesDS.add(edges);

  $("stat").innerHTML =
    `${nodes.length} / ${graphData.nodes.length} nodes &middot; ${edges.length} edges`;

  const pill = $("focus-pill");
  if (state.focus) {
    pill.style.display = "inline-flex";
    pill.querySelector(".lbl").textContent = "focus: " + state.focus.split(":").pop();
  } else {
    pill.style.display = "none";
  }

  // Re-settle the now-visible subset; the stabilization handler freezes and
  // fits when it finishes. With nothing to simulate (a lone node, or only
  // isolated nodes — which are physics:false) we lay out and fit directly.
  const anyPhysics = nodes.some(n => n.physics !== false);
  if (nodes.length > 1 && anyPhysics) {
    network.setOptions({ physics: PHYSICS_OPTS });
  } else {
    setTimeout(() => { layoutOrphans(); fitFloored(); }, 0);
  }
}

function syncControls() {
  $("orphans").checked  = state.showOrphans;
  $("nodeset").value    = state.nodeset;
  $("fileview").value   = state.fileview;
  $("component").value  = state.component === null ? "" : String(state.component);
  $("chapter").value    = state.chapter || "";
}

// ── Reveal-aware navigation ─────────────────────────────────────────────────

function goTo(id) {
  if (!allNodes[id]) return;
  if (!visibleSet().has(id)) {            // relax filters until the node is shown
    state.focus = null;
    state.component = null;
    state.chapter = null;
    if (!inNodeset(id)) state.nodeset = "union";
    if (isOrphan(id)) state.showOrphans = true;
    syncControls();
    apply();
  }
  setTimeout(() => jumpTo(id), 70);
}

function jumpTo(id) {
  if (!allNodes[id]) return;
  network.selectNodes([id]);
  network.focus(id, { scale: 1.2, animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  renderNode(id);
  highlightCone(id);
}

function setFocus(id) {
  if (!allNodes[id]) return;
  state.focus = id;
  apply();
  renderNode(id);
  setTimeout(() => jumpTo(id), 70);
}

function clearFocus() { state.focus = null; apply(); }

function resetView() {
  state.showOrphans = false;
  state.focus = null;
  state.component = null;
  state.chapter = null;
  state.nodeset = "union";
  $("search").value = "";
  syncControls();
  apply();
}

// ── Control wiring ──────────────────────────────────────────────────────────

$("orphans").addEventListener("change", e => {
  state.showOrphans = e.target.checked; state.focus = null; apply();
});
$("nodeset").addEventListener("change", e => {
  state.nodeset = e.target.value; state.focus = null; apply();
});
$("component").addEventListener("change", e => {
  state.component = e.target.value === "" ? null : Number(e.target.value);
  state.focus = null; apply();
});
$("chapter").addEventListener("change", e => {
  state.chapter = e.target.value || null; state.focus = null; apply();
});
$("fileview").addEventListener("change", e => {
  state.fileview = e.target.value; rebuildFileBg();
});
$("search").addEventListener("change", e => {
  const v = e.target.value.trim();
  if (allNodes[v]) goTo(v);
});
$("reset").addEventListener("click", resetView);
$("focus-pill").addEventListener("click", clearFocus);

// ── Lean syntax highlighter ─────────────────────────────────────────────────

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _KW      = /\b(def|lemma|theorem|instance|class|structure|inductive|abbrev|noncomputable|private|protected|section|namespace|end|open|variable|where|do|let|have|show|suffices|calc|if|then|else|return|for|in|fun|match|with|by|sorry)\b/g;
const _TACTIC  = /\b(simp|ext|rfl|exact|intro|intros|apply|refine|constructor|use|rw|rewrite|rcases|rintro|obtain|push_neg|norm_num|ring|group|linarith|omega|decide|trivial|assumption|congr|tauto|aesop|cases|induction|revert|clear|next|all_goals|repeat|try|first|solve|fin_cases|positivity|gcongr|field_simp)\b/g;
const _TYPE    = /\b(Nat|Int|Bool|String|List|Array|Option|Type|Prop|Sort|True|False|And|Or|Not|Iff|Eq|Subgroup|Group|Ring|Field|Fintype|Finite)\b/g;
const _NUM     = /\b(\d+)\b/g;
const _STR     = /("(?:[^"\\]|\\.)*")/g;

function highlightLean(raw) {
  return raw.split('\n').map(line => {
    let commentAt = -1;
    let inStr = false;
    for (let i = 0; i < line.length - 1; i++) {
      if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inStr = !inStr;
      if (!inStr && line[i] === '-' && line[i+1] === '-') { commentAt = i; break; }
    }
    const code    = commentAt >= 0 ? line.slice(0, commentAt) : line;
    const comment = commentAt >= 0 ? line.slice(commentAt)    : '';
    let h = esc(code);
    h = h.replace(_STR,    m => `<span class="hl-str">${m}</span>`);
    h = h.replace(_KW,     m => `<span class="hl-kw">${m}</span>`);
    h = h.replace(_TACTIC, m => `<span class="hl-tactic">${m}</span>`);
    h = h.replace(_TYPE,   m => `<span class="hl-type">${m}</span>`);
    h = h.replace(_NUM,    m => `<span class="hl-num">${m}</span>`);
    const commentHtml = comment ? `<span class="hl-comment">${esc(comment)}</span>` : '';
    return h + commentHtml;
  }).join('\n');
}

// ── LaTeX renderer ───────────────────────────────────────────────────────────

function processNonMath(s) {
  return esc(s)
    .replace(/\\emph\{([^}]*)\}/g,   '<em>$1</em>')
    .replace(/\\textbf\{([^}]*)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^}]*)\}/g, '<em>$1</em>')
    .replace(/\\text\{([^}]*)\}/g,   '$1');
}

function renderLatex(el, text) {
  if (!text || !text.trim()) {
    el.classList.add('empty'); el.textContent = '—'; return;
  }
  // Match every math delimiter style leanblueprint uses: $$…$$ and \[…\]
  // (display) and \(…\) and $…$ (inline). $$ and \[ \] come first so the
  // single-$ branch can't grab a $$ opener.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$(?:[^$\\]|\\.)+?\$)/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    html += processNonMath(text.slice(last, m.index));
    const raw = m[0];
    let disp, math;
    if      (raw.startsWith('$$'))  { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\[')) { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\(')) { disp = false; math = raw.slice(2, -2); }
    else                            { disp = false; math = raw.slice(1, -1); }
    if (window.katex) {
      try {
        html += katex.renderToString(math, {
          displayMode: disp, throwOnError: false, macros: katexMacros,
        });
      }
      catch (_) { html += esc(raw); }
    } else {
      html += `<span style="color:#94a3b8">${esc(raw)}</span>`;
    }
    last = re.lastIndex;
  }
  html += processNonMath(text.slice(last));
  el.innerHTML = html;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function charVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  return `<span class="m-val">${v.toLocaleString()}</span>`;
}
function workVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  if (v === 0) return '<span class="m-val m-done">0 ✓</span>';
  return `<span class="m-val m-work">${v.toLocaleString()}</span>`;
}
function charsPair(rel, cum) {
  const f = v => (v === null || v === undefined)
    ? '<span class="chars-inf">∞</span>'
    : `<span class="chars-val">${v}</span>`;
  return `<span class="chars-pair">ℓ<sub>local</sub>=${f(rel)} &nbsp; ℓ<sub>total</sub>=${f(cum)}</span>`;
}

function renderNode(id) {
  const n = allNodes[id];
  if (!n) return;

  $("sidebar-empty").style.display = "none";
  const content = $("sidebar-content");
  content.style.display = "flex";

  const statusBadge = n.proved
    ? '<span class="badge badge-proved">✓ leanok</span>'
    : (n.mathlib_ok
        ? '<span class="badge badge-proved">ⓜ mathlib</span>'
        : (n.has_sorry
            ? '<span class="badge badge-sorry">sorry</span>'
            : '<span class="badge badge-unproved">unproved</span>'));

  const mkChip = u => `<span class="dep-chip" onclick="goTo('${esc(u)}')">${esc(u)}</span>`;
  const depsHtml = n.uses.length
    ? n.uses.map(mkChip).join('')
    : '<span class="no-deps">none — axiom</span>';

  // full transitive upstream, with the direct deps split out
  const anc       = ancestorsOf(id);
  const directSet = new Set(n.uses);
  const indirect  = [...anc].filter(x => !directSet.has(x)).sort();
  const transHtml = indirect.length
    ? indirect.map(mkChip).join('')
    : '<span class="no-deps">none beyond the direct ones</span>';

  const focusLabel = state.focus === id ? 'Clear focus' : 'Focus dependency cone';
  const focusCall  = state.focus === id ? 'clearFocus()' : `setFocus('${esc(id)}')`;

  content.innerHTML = `
    <div class="card">
      <div class="node-badges">
        <span class="badge badge-type">${n.type.toUpperCase()}</span>${statusBadge}
      </div>
      <div class="node-title">${esc(n.title || n.id)}</div>
      <div class="node-id">${esc(n.id)}</div>
      ${n.chapter   ? `<div class="node-chapter">§ ${esc(n.chapter)}</div>` : ''}
      ${n.lean_name ? `<div class="lean-ref">Lean: <code>${esc(n.lean_name)}</code></div>` : ''}
      ${n.tex_file  ? `<div class="lean-ref">tex: <code>${esc(n.tex_file)}</code></div>` : ''}
      ${n.lean_file ? `<div class="lean-ref">file: <code>${esc(n.lean_file)}</code></div>` : ''}
      <button class="btn-focus" onclick="${focusCall}">⊙ ${focusLabel}</button>
    </div>

    <div class="card">
      <div class="card-title">Structure</div>
      <div class="degrees">
        <div class="degree">
          <span class="degree-val">${n.dep_count}</span>
          <span class="degree-label">direct deps</span>
        </div>
        <div class="degree">
          <span class="degree-val">${anc.size}</span>
          <span class="degree-label">total upstream</span>
        </div>
        <div class="degree">
          <span class="degree-val">${n.rdep_count}</span>
          <span class="degree-label">used by</span>
        </div>
      </div>
      <div class="deps-sub">direct dependencies</div>
      <div class="deps-list">${depsHtml}</div>
      <div class="deps-sub">indirect (transitive) dependencies</div>
      <div class="deps-list">${transHtml}</div>
    </div>

    <div class="card">
      <div class="card-title">Complexity</div>
      <div class="metrics-grid">
        <span></span>
        <span class="col-head">local</span>
        <span class="col-head">total</span>
        <span class="m-label">LaTeX ℓ</span>${charVal(n.proof_size_tex)}${charVal(n.proof_size_tex_total)}
        <span class="m-label">Lean ℓ</span>${charVal(n.proof_size_lean)}${charVal(n.proof_size_lean_total)}
        <span class="m-label">Effort</span>${workVal(n.effort_local)}${workVal(n.effort_total)}
      </div>
    </div>

    <div class="card">
      <div class="sec-hdr"><span class="card-title" style="margin:0">LaTeX statement</span></div>
      <div class="latex-rendered" id="latex-stmt"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">LaTeX proof</span>
        ${charsPair(n.proof_size_tex, n.proof_size_tex_total)}
      </div>
      <div class="latex-rendered" id="latex-proof"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">Lean code</span>
        ${charsPair(n.proof_size_lean, n.proof_size_lean_total)}
      </div>
      <pre class="code-block" id="lean-code"></pre>
    </div>
  `;

  renderLatex($('latex-stmt'),  n.statement);
  renderLatex($('latex-proof'), n.proof_tex ? n.proof_tex.trim() : '');

  const leanEl = $('lean-code');
  if (n.lean_source) {
    leanEl.innerHTML = highlightLean(n.lean_source);
  } else {
    leanEl.classList.add('empty');
    leanEl.textContent = 'declaration not found';
  }
}

// ── Cone highlighting on click ───────────────────────────────────────────────
// Selecting a node lights up its WHOLE transitive cone — every ancestor and
// descendant and the edges between them — while everything else fades back.

const baseNodeById = {};
for (const vn of graphData.nodes) baseNodeById[vn.id] = vn;

const EDGE_BASE = { color: "#cbd5e1", highlight: "#64748b" };

function highlightCone(id) {
  const cone = coneOf(id);   // {id} ∪ ancestors ∪ descendants
  nodesDS.update(nodesDS.getIds().map(nid =>
    cone.has(nid)
      ? baseNodeById[nid]                                   // full styling
      : { id: nid, color: { background: "#e5e7eb", border: "#d1d5db" },
          font: { color: "#cbd5e1" } }                      // faded
  ));
  edgesDS.update(edgesDS.get().map(e => {
    const on = cone.has(e.from) && cone.has(e.to);
    return { id: e.id,
             color: on ? { color: "#475569", highlight: "#334155" } : { color: "#edf0f4" },
             width: on ? 2.5 : 1 };
  }));
}

function clearHighlight() {
  nodesDS.update(nodesDS.getIds().map(nid => baseNodeById[nid]));
  edgesDS.update(edgesDS.get().map(e => ({ id: e.id, color: EDGE_BASE, width: 1 })));
}

network.on("click", params => {
  if (params.nodes.length) { renderNode(params.nodes[0]); highlightCone(params.nodes[0]); }
  else                     { clearHighlight(); }
});
network.on("doubleClick", params => { if (params.nodes.length) setFocus(params.nodes[0]); });

// ── Initial render ───────────────────────────────────────────────────────────

apply();
</script>
</body>
</html>
